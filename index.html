  {"id": 31, "text": "한 회사가 Amazon CloudFront와 Application Load Balancer(ALB)를 통해 Amazon EKS에서 공개 웹 애플리케이션을 운영하고 있습니다. 보안 엔지니어는 해당 애플리케이션이 5분 이내에 동일한 최종 사용자 IP 주소로부터 10,000건의 요청을 수신할 경우 기존 Amazon SNS 토픽으로 알림을 보내야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["CloudFront 표준 로깅 및 CloudWatch Logs 메트릭 필터를 구성합니다.", "VPC 흐름 로그 및 CloudWatch 로그 메트릭 필터를 구성합니다.", "ASN 일치 규칙 및 CloudWatch 알람을 사용하여 AWS WAF 웹 ACL을 구성합니다.", "속도 기반 규칙으로 AWS WAF 웹 ACL을 구성합니다. 이를 CloudFront와 연결합니다. SNS에 알림을 보내도록 CloudWatch 알람을 생성합니다."], "answer": "D", "multi": false, "explanation": "AWS WAF rate-based rules are designed specifically to track the number of requests from a single IP address over a configurable time window. According to AWS Certified Security - Specialty guidance, rate-based rules integrate natively with CloudFront and emit CloudWatch metrics that can trigger alarms. CloudFront logs and VPC Flow Logs are not real-time detection tools. ASN match rules do not count request rates."},
  {"id": 32, "text": "한 기업이 AWS KMS 비대칭 키를 사용하는 코드 서명 솔루션을 구축해야 하며, 규정 준수 및 감사 목적으로 키 생성 및 사용에 대한 변경 불가능한 증거를 저장해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "choices": ["S3 객체 잠금이 활성화된 Amazon S3 버킷을 생성합니다. KMS 이벤트에 대한 로그 파일 유효성 검사가 활성화된 AWS CloudTrail 트레일을 생성합니다. 로그를 버킷에 저장하고 감사자에게 액세스 권한을 부여합니다.", "애플리케이션 이벤트를 Amazon CloudWatch Logs에 기록하고 내보냅니다.", "EventBridge를 사용하여 KMS API 호출을 캡처하고 DynamoDB에 저장합니다.", "CloudWatch 메트릭 및 대시보드를 사용하여 KMS 사용량을 추적합니다."], "answer": "A", "multi": false, "explanation": "AWS CloudTrail provides authoritative records of KMS key creation, origin, and usage. Enabling log file validation ensures tamper detection. S3 Object Lock in compliance mode enforces immutability, which is a core audit requirement cited in AWS Certified Security - Specialty materials. CloudWatch and DynamoDB do not provide immutable storage guarantees suitable for compliance evidence."},
  {"id": 33, "text": "한 회사의 애플리케이션 팀에서 Amazon S3와 함께 사용할 새로운 AWS 키 관리 서비스(AWS KMS) 고객 관리형 키가 필요합니다. 회사의 보안 정책에 따라 보안 노출을 최소화하기 위해 각기 다른 AWS 서비스마다 별도의 키가 필요합니다. 보안 엔지니어가 KMS 고객 관리 키가 Amazon S3에서만 작동하도록 제한하려면 어떻게 해야 할까요?", "choices": ["Amazon S3만 kms:Encrypt 작업을 수행할 수 있도록 키 정책을 구성합니다.", "kms:ViaService 조건 키의 값이 Amazon S3 서비스 이름과 일치하는 경우에만 KMS 작업을 허용하도록 키 정책을 구성합니다.", "Amazon S3가 iam:PassRole 작업을 수행할 수 있도록 애플리케이션의 IAM 역할 정책을 구성합니다.", "KMS 고객 관리 키와 결합된 경우에만 S3 작업을 허용하도록 애플리케이션의 IAM 역할 정책을 구성합니다."], "answer": "B", "multi": false, "explanation": "AWS KMS provides condition keys that can be used to tightly scope how and where a customer managed key can be used. According to the AWS Certified Security - Specialty Study Guide, the kms:ViaService condition key is specifically designed to restrict key usage to requests that originate from a particular AWS service in a specific Region. By configuring the key policy to allow KMS cryptographic operations only when kms:ViaService equals s3.<region>.amazonaws.com, the security engineer ensures that the key can be used exclusively by Amazon S3. Even if other IAM principals have permissions to use the key, the key cannot be used by other services such as Amazon EC2, Amazon RDS, or AWS Lambda. Option A is incorrect because AWS services do not assume identities in key policies. Options C and D modify IAM role policies, which do not control how a KMS key is used by AWS services. AWS documentation clearly states that service-level restrictions must be enforced at the KMS key policy level using condition keys. This approach enforces strong separation of duties and limits blast radius, which aligns with AWS security best practices."},
  {"id": 34, "text": "한 회사가 AWS를 사용하여 여러 국가에서 티켓 판매를 관리하는 웹 애플리케이션을 운영하고 있습니다. 최근 이 회사는 해당 애플리케이션을 Amazon API Gateway, AWS Lambda 및 Amazon Aurora Serverless를 포함하는 아키텍처로 마이그레이션했습니다. 이 회사는 애플리케이션이 PCI DSS v4.0(결제 카드 산업 데이터 보안 표준)을 준수해야 합니다. 보안 엔지니어는 애플리케이션에 적용되는 PCI DSS v4.0 통제의 효과성을 보여주는 보고서를 작성해야 합니다. 회사의 규정 준수 팀은 해당 보고서에 수동으로 증거를 추가할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Trusted Advisor를 활성화합니다. Trusted Advisor의 모든 검사를 구성합니다. PCI DSS v4.0 표준에 맞춰 검사를 수동으로 매핑하여 보고서를 생성합니다.", "AWS Config를 활성화하고 구성합니다. AWS Config에 PCI DSS 준수를 위한 운영 모범 사례 팩을 배포합니다. AWS Config를 사용하여 보고서를 생성합니다.", "AWS Security Hub를 활성화합니다. Security Hub PCI DSS 보안 표준을 활성화합니다. AWS Management Console을 사용하여 보안 표준 보고서를 다운로드합니다.", "AWS 관리형 PCI DSS v4.0 표준 프레임워크를 사용하는 AWS Audit Manager 평가를 생성합니다. 모든 증거를 평가에 추가합니다. Audit Manager에서 보고서를 생성하여 다운로드합니다."], "answer": "D", "multi": false, "explanation": "AWS Audit Manager is specifically designed to help organizations continuously audit their AWS usage against compliance frameworks and generate audit-ready reports. According to AWS Certified Security - Specialty documentation, Audit Manager includes AWS managed frameworks for compliance standards, including PCI DSS v4.0. Audit Manager automatically collects evidence from AWS services such as API Gateway, Lambda, RDS, CloudTrail, and Config, and maps the evidence directly to PCI DSS controls. Importantly, Audit Manager allows compliance teams to upload and attach manual evidence, which is a key requirement in this scenario. Option C provides visibility into control status but does not support adding manual evidence. Option B evaluates configuration compliance but does not generate formal compliance reports. Option A requires extensive manual effort and is not aligned with PCI reporting workflows. AWS documentation positions Audit Manager as the authoritative service for compliance reporting and audit evidence management."},
  {"id": 35, "text": "한 회사가 새로운 로그 분석 환경을 구축할 계획입니다. 이 회사는 여러 AWS 서비스의 로그를 거의 실시간으로 분석해야 합니다. 솔루션은 로그 검색 기능을 제공해야 하며, 특정 로그가 탐지 규칙과 일치할 경우 기존 Amazon Simple Notification Service(Amazon SNS) 토픽으로 알림을 전송해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon OpenSearch 서비스를 사용하여 로그를 분석합니다. OpenSearch API에서 로그를 검색합니다. OpenSearch Service 보안 분석을 사용하여 로그를 탐지 규칙과 일치시키고 SNS 주제로 알림을 보낼 수 있습니다.", "AWS Security Hub를 사용하여 로그를 분석합니다. Security Hub의 발견 페이지에서 로그를 검색합니다. 로그를 탐지 규칙과 일치시키고 SNS 주제로 알림을 보내는 사용자 지정 작업을 생성합니다.", "Amazon CloudWatch Logs를 사용하여 로그를 분석합니다. 구독 필터를 사용하여 로그를 탐지 규칙과 일치시키고 SNS 주제로 알림을 보냅니다. CloudWatch Logs Insights를 사용하여 로그를 수동으로 검색합니다.", "Amazon QuickSight를 사용하여 로그를 분석합니다. 대시보드에 쿼리 결과를 나열하여 로그를 검색합니다. 쿼리를 실행하여 로그를 탐지 규칙과 일치시키고 SNS 주제로 알림을 보냅니다."], "answer": "A", "multi": false, "explanation": "Amazon OpenSearch Service is designed for near real-time log ingestion, indexing, and search across large volumes of data. According to the AWS Certified Security - Specialty Study Guide, OpenSearch supports advanced log analytics use cases and integrates with OpenSearch Security Analytics, which provides prebuilt and custom detection rules. Security Analytics can continuously evaluate incoming logs from multiple AWS services and generate alerts when detection rules are matched. These alerts can be forwarded to Amazon SNS with minimal configuration. OpenSearch also provides powerful search and query capabilities through APIs and dashboards. Option C supports detection but lacks advanced correlation and scalable search capabilities. Option B is not a log analytics service. Option D is a visualization service and does not support real-time detection. AWS guidance recommends OpenSearch Service for centralized, near real-time log analysis and alerting."},
  {"id": 36, "text": "한 회사가 AWS Organizations의 조직을 사용하여 여러 AWS 계정을 관리하고 있습니다. 이 회사는 사용자들이 Amazon Q Developer에 중앙 집중식으로 접근할 수 있도록 하고자 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["AWS IAM Identity Center를 활성화하고 Amazon Q Developer를 AWS 관리형 애플리케이션으로 설정합니다.", "Amazon Cognito를 활성화하고 Amazon Q Developer용 새 ID 풀을 생성합니다.", "Amazon Cognito를 활성화하고 Amazon Q Developer를 AWS 관리형 애플리케이션으로 설정합니다.", "AWS IAM Identity Center를 활성화하고 Amazon Q Developer용 새 ID 풀을 생성합니다."], "answer": "A", "multi": false, "explanation": "AWS IAM Identity Center is the recommended service for centrally managing workforce access across multiple AWS accounts within an organization. According to AWS Certified Security - Specialty documentation, Amazon Q Developer integrates natively with IAM Identity Center as an AWS managed application. By enabling IAM Identity Center and assigning Amazon Q Developer to users or groups, the company can centrally control access using permission sets and organizational boundaries. This approach provides centralized authentication, authorization, and auditing with minimal overhead. Amazon Cognito is intended for customer and application user authentication, not workforce access to AWS services. Identity pools are not applicable to IAM Identity Center integrations. AWS best practices clearly recommend IAM Identity Center for workforce access to AWS- managed applications."},
  {"id": 37, "text": "한 회사가 민감한 데이터를 아마존 S3 버킷에 저장합니다. 이 회사는 아마존 S3 관리 키(SSE- S3)를 사용한 서버 측 암호화를 통해 저장된 데이터를 암호화합니다. 보안 엔지니어는 S3 버킷에 저장된 데이터가 변경되지 않도록 보호해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["S3 버킷 정책을 구성하여 객체 삭제 및 PUT 권한을 거부합니다.", "S3 버킷 버전 관리가 활성화된 규정 준수 모드에서 S3 객체 잠금을 구성합니다.", "S3 버킷의 암호화를 AWS Key Management Service(AWS KMS) 고객 관리 키를 사용하도록 변경합니다.", "다중 인증(MFA) 삭제 보호 기능을 사용하여 S3 버킷을 구성합니다."], "answer": "B", "multi": false, "explanation": "Amazon S3 Object Lock in compliance mode provides write-once-read-many (WORM) protection, which prevents objects from being modified or deleted for a specified retention period. According to the AWS Certified Security - Specialty Study Guide, compliance mode enforces immutability even for the root user and cannot be overridden. Enabling S3 Object Lock requires S3 bucket versioning and ensures that once an object is written, it cannot be changed or removed until the retention period expires. This is the strongest protection against data modification and is commonly used for regulatory and legal retention requirements. Option A can be bypassed by administrators. Option D only protects against deletions, not overwrites. Option C changes encryption but does not prevent modification. AWS documentation explicitly identifies S3 Object Lock in compliance mode as the correct solution for immutable data storage."},
  {"id": 38, "text": "한 회사가 인터넷에 연결된 오픈 소스 소프트웨어 플랫폼을 운영하고 있습니다. 이 레거시 소프트웨어 플랫폼은 더 이상 보안 업데이트를 받지 않습니다. 이 플랫폼은 Amazon Route 53 가중치 로드 밸런싱을 사용하여 트래픽을 Amazon RDS 클러스터에 연결된 두 개의 Amazon EC2 인스턴스로 전송합니다. 최근 보고서에 따르면 이 소프트웨어 플랫폼이 SQL 인젝션 공격에 취약하며, 공격 샘플도 제공되었습니다. 회사의 보안 엔지니어는 24시간 이내에 SQL 인젝션 공격으로부터 시스템을 보호해야 합니다. 솔루션은 최소한의 노력으로 구현되어야 하며, 구현 중에도 정상적인 운영이 유지되어야 합니다. 보안 엔지니어는 이러한 요구 사항을 충족하기 위해 무엇을 해야 할까요?", "choices": ["기존 EC2 인스턴스를 대상 그룹으로 사용하여 애플리케이션 로드 밸런서(ALB)를 생성합니다. 이 공격으로부터 애플리케이션을 보호하는 규칙이 포함된 AWS WAF 웹 ACL을 생성한 다음, 이를 ALB에 적용합니다. 취약점이 완화되었는지 테스트한 후, Route 53 레코드가 ALB를 가리키도록 리디렉션합니다. 인터넷에서 직접 접근을 차단하도록 EC2 인스턴스의 보안 그룹을 업데이트합니다.", "EC2 인스턴스 하나를 오리진으로 지정하여 Amazon CloudFront 배포를 생성합니다. 이 공격으로부터 애플리케이션을 보호하는 규칙이 포함된 AWS WAF 웹 ACL을 생성한 다음, 해당 배포에 적용합니다. 취약점이 완화되었는지 테스트한 후, Route 53 레코드를 CloudFront를 가리키도록 리디렉션합니다.", "플랫폼의 최신 소스 코드를 가져와 필요한 업데이트를 수행합니다. 업데이트된 코드를 테스트하여 취약점이 완화되었는지 확인한 후 패치된 버전의 플랫폼을 EC2 인스턴스에 배포합니다.", "EC2 인스턴스에 연결된 보안 그룹을 업데이트하여 SQL 데이터베이스에서 사용하는 TCP 포트에 대한 인터넷 액세스를 차단합니다. 이 공격으로부터 애플리케이션을 보호하는 규칙이 포함된 AWS WAF 웹 ACL을 생성한 다음 EC2 인스턴스에 적용합니다. 취약점이 완화되었는지 테스트한 후 보안 그룹을 원래 설정으로 복원합니다."], "answer": "A", "multi": false, "explanation": "AWS WAF provides managed and custom rules that can immediately mitigate common web exploits such as SQL injection without modifying application code. According to AWS Certified Security - Specialty documentation, placing AWS WAF in front of an Application Load Balancer is a recommended rapid-response control for legacy applications with known vulnerabilities. Creating an ALB in front of the existing EC2 instances allows seamless traffic migration. AWS WAF SQL injection rules can be deployed and tested without downtime. Updating Route 53 to point to the ALB preserves normal operations. Restricting EC2 security groups afterward prevents bypassing the WAF."},
  {"id": 39, "text": "한 회사가 민감한 데이터를 처리하는 애플리케이션을 실행하는 대규모 Amazon Linux 2 Amazon EC2 인스턴스를 보유하고 있습니다. 규정 준수 요구 사항에는 관리 포트 노출 금지, 전체 세션 로깅, AWS IAM Identity Center를 통한 인증이 포함됩니다. DevOps 엔지니어는 문제 해결을 위해 가끔씩 액세스가 필요합니다. 이러한 요구 사항을 충족하면서 원격 액세스를 제공하는 솔루션은 무엇일까요?", "choices": ["EC2 시리얼 콘솔에 대한 액세스 권한을 부여하고 IAM 역할 액세스를 허용합니다.", "EC2 인스턴스 연결을 활성화하고 보안 그룹을 적절하게 구성하십시오.", "AWS Systems Manager에 대한 액세스를 허용하는 EC2 인스턴스 역할을 할당합니다. Systems Manager Session Manager에 대한 액세스 권한을 부여하는 IAM 정책을 생성하고 이를 IAM Identity Center 역할에 할당합니다.", "시스템 관리자 자동화를 사용하여 원격 액세스 포트를 일시적으로 엽니다."], "answer": "C", "multi": false, "explanation": "AWS Systems Manager Session Manager provides secure, auditable shell access to EC2 instances without opening inbound ports. According to AWS Certified Security - Specialty guidance, Session Manager records all session activity to CloudWatch Logs or Amazon S3 and integrates with IAM Identity Center for centralized authentication. This solution meets all requirements: no exposed ports, full audit logging, and identity-based access control. EC2 Instance Connect and serial console access do not integrate with Identity Center and may expose management paths."},
  {"id": 40, "text": "한 회사의 데이터 과학자들이 Amazon S3에 저장된 데이터 세트를 사용하여 Amazon SageMaker를 활용하고 있습니다. 회사 정책에 따라 45일 이상 된 데이터는 삭제해야 합니다. 이 정책을 시행하기 위해 어떤 조치가 필요할까요?", "choices": ["45일 후에 객체를 삭제하도록 S3 수명주기 규칙을 구성합니다.", "객체 업로드 시 트리거되어 이전 데이터를 삭제하는 Lambda 함수를 생성합니다.", "오래된 객체를 매달 삭제하는 예약된 Lambda 함수를 생성합니다.", "S3 인텔리전트 티어링을 구성합니다."], "answer": "A", "multi": false, "explanation": "Amazon S3 Lifecycle rules are the native and most efficient way to enforce data retention policies. AWS Certified Security - Specialty documentation recommends lifecycle rules over custom automation to reduce operational complexity and failure risk. Lifecycle rules automatically and reliably delete objects after a specified age, ensuring compliance without additional compute services. Lambda-based solutions increase cost and management overhead. Intelligent-Tiering manages storage cost, not data deletion."},
  {"id": 41, "text": "한 회사가 아마존 S3 버킷에서 데이터를 읽고 쓰는 웹 애플리케이션을 보유하고 있습니다. 이 회사는 모든 S3 API 호출을 AWS 자격 증명으로 인증해야 합니다. 어떤 솔루션이 애플리케이션에 AWS 자격 증명을 제공할까요?", "choices": ["Amazon Cognito ID 풀과 GetId API를 사용하세요.", "Amazon Cognito ID 풀을 사용하고 AssumeRoleWithWebIdentity를 사용합니다.", "ID 토큰을 사용하여 Amazon Cognito 사용자 풀을 사용합니다.", "액세스 토큰을 사용하여 Amazon Cognito 사용자 풀을 사용합니다."], "answer": "B", "multi": false, "explanation": "Amazon Cognito identity pools provide temporary AWS credentials by exchanging web identity tokens with AWS STS using AssumeRoleWithWebIdentity. According to AWS Certified Security - Specialty documentation, this is the correct mechanism for granting applications AWS credentials. User pools authenticate users but do not issue AWS credentials. Identity pools integrate with IAM roles and STS, enabling secure, temporary access to AWS services."},
  {"id": 42, "text": "한 회사가 인터넷에 연결된 ALB(애플리케이션 로드 밸런싱) 뒤에서 ECS 서비스를 운영하고 있으며, 이 ALB는 CloudFront의 오리진 서버 역할을 합니다. AWS WAF 웹 ACL이 CloudFront와 연결되어 있지만, 클라이언트는 ALB에 직접 접근하여 이 ACL을 우회할 수 있습니다. 어떤 해결책이 ALB에 대한 직접 접근을 차단할 수 있을까요?", "choices": ["ALB와 함께 AWS PrivateLink를 사용하세요.", "ALB를 내부 ALB로 교체합니다.", "ALB 리스너 규칙을 CloudFront IP 범위로 제한합니다.", "CloudFront에서 사용자 지정 헤더를 요구하고 ALB에서 유효성을 검사합니다."], "answer": "D", "multi": false, "explanation": "AWS best practices recommend using a shared secret header between CloudFront and ALB origins to prevent direct access. CloudFront injects a custom header, and the ALB listener rules validate its presence. IP-based controls are brittle due to CloudFront IP changes. PrivateLink and internal ALBs are not supported as CloudFront origins. Header validation is the most reliable and widely recommended pattern."},
  {"id": 43, "text": "한 회사가 Amazon Elastic Container Registry(Amazon ECR)에 저장된 컨테이너 이미지를 사용하여 AWS Lambda 함수를 생성합니다. 이 회사는 컨테이너 이미지의 소프트웨어 취약점과 Lambda 함수의 코드 취약점을 식별해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon GuardDuty를 활성화합니다. GuardDuty에서 Amazon ECR 스캔 및 Lambda 코드 스캔을 구성합니다.", "Amazon GuardDuty를 활성화합니다. GuardDuty에서 런타임 모니터링 및 Lambda 보호를 구성합니다.", "Amazon Inspector를 활성화합니다. Amazon Inspector에서 Amazon ECR 향상된 스캔 및 Lambda 코드 스캔을 구성합니다.", "AWS Security Hub를 활성화합니다. Security Hub에서 런타임 모니터링 및 Lambda 보호를 구성합니다."], "answer": "C", "multi": false, "explanation": "Amazon Inspector is the AWS service designed specifically for vulnerability management across compute workloads, including Amazon ECR container images and AWS Lambda functions. According to the AWS Certified Security - Specialty documentation, Amazon Inspector provides automated vulnerability assessments for container images stored in ECR by performing enhanced image scanning that identifies common vulnerabilities and exposures (CVEs) in operating systems and application dependencies. Inspector also supports Lambda code scanning to analyze function packages and container- based Lambda images for known software vulnerabilities. Findings include severity ratings and remediation guidance, allowing security teams to identify and prioritize risks efficiently. Amazon GuardDuty focuses on threat detection using behavioral analysis and does not perform static vulnerability scanning of container images or Lambda code. AWS Security Hub aggregates findings from other services but does not perform scanning itself. AWS best practices recommend Amazon Inspector for vulnerability detection in container images and serverless workloads."},
  {"id": 44, "text": "보안 엔지니어가 Amazon Elastic Container Service(Amazon ECS)에서 실행되는 Docker 컨테이너와 클라이언트 간에 종단 간 암호화를 제공하는 솔루션을 설계하고 있습니다. 이 솔루션은 변동성이 큰 트래픽 패턴도 처리해야 합니다. 어떤 솔루션이 확장성이 가장 뛰어나고 지연 시간이 가장 짧을까요?", "choices": ["TLS 트래픽을 종료한 다음 컨테이너로 전송되는 트래픽을 다시 암호화하도록 네트워크 로드 밸런서를 구성합니다.", "TLS 트래픽을 종료한 다음 컨테이너로 전송되는 트래픽을 다시 암호화하도록 애플리케이션 로드 밸런서를 구성합니다.", "TCP 리스너가 있는 네트워크 로드 밸런서를 구성하여 TLS 트래픽을 컨테이너로 전달합니다.", "컨테이너로 트래픽을 전송하기 위해 다중값 응답 라우팅을 사용하도록 Amazon Route 53을 구성합니다."], "answer": "C", "multi": false, "explanation": "Network Load Balancers operate at Layer 4 and are optimized for extreme performance, ultra-low latency, and handling sudden traffic spikes. According to AWS Certified Security - Specialty documentation, using a TCP listener on an NLB allows TLS traffic to pass through directly to backend containers without termination, preserving true end-to-end encryption. This approach eliminates the overhead of decrypting and re-encrypting traffic at the load balancer, reducing latency and maximizing throughput. NLBs scale automatically to handle volatile traffic patterns and millions of requests per second. Application Load Balancers operate at Layer 7 and introduce additional latency due to TLS termination and HTTP processing. Route 53 multivalue routing does not provide load balancing at the transport layer and does not ensure encryption handling. AWS recommends NLB TCP pass-through for high-performance, end-to-end encrypted container workloads."},
  {"id": 45, "text": "보안 엔지니어가 공용 트래픽과 사설 트래픽을 분리하기 위해 VPC를 설계했습니다. 이 VPC에는 두 개의 가용 영역이 있으며, 각 가용 영역에는 하나의 공용 서브넷과 하나의 사설 서브넷이 있습니다. 라우팅 테이블은 총 세 개로, 공용 서브넷용 하나와 각 사설 서브넷용 하나씩 존재합니다. 보안 엔지니어는 네 개의 서브넷 모두 VPC에 연결된 인터넷 게이트웨이를 통해 트래픽을 라우팅하고 있음을 발견했습니다. 보안 엔지니어는 이 시나리오를 해결하기 위해 어떤 조치들을 조합하여 취해야 할까요? (두 가지를 선택하세요.)", "choices": ["각 가용 영역의 공용 서브넷에 NAT 게이트웨이가 프로비저닝되었는지 확인합니다.", "각 가용 영역의 프라이빗 서브넷에 NAT 게이트웨이가 프로비저닝되었는지 확인합니다.", "공용 서브넷의 라우팅 테이블을 수정하여 VPC CIDR 범위에 대한 로컬 경로를 추가합니다.", "개인 서브넷의 라우팅 테이블을 수정하여 0.0.0.0/0을 동일한 가용 영역의 공용 서브넷에 있는 NAT 게이트웨이로 라우팅합니다.", "개인 서브넷의 라우팅 테이블을 수정하여 0.0.0.0/0을 인터넷 게이트웨이로 라우팅합니다."], "answer": "A,D", "multi": true, "explanation": "AWS networking best practices require private subnets to access the internet only through NAT gateways located in public subnets. According to the AWS Certified Security - Specialty Study Guide, NAT gateways must be provisioned in public subnets and used as the default route for outbound traffic from private subnets. Verifying NAT gateways in each Availability Zone ensures high availability and fault tolerance. Updating the private subnet route tables to send 0.0.0.0/0 traffic to the NAT gateway prevents direct internet access while allowing outbound connectivity. Routing private subnet traffic directly to an internet gateway violates subnet isolation principles. NAT gateways must never be placed in private subnets."},
  {"id": 46, "text": "한 회사가 Auto Scaling 그룹의 Amazon EC2 인스턴스 플릿에서 웹 애플리케이션을 운영하고 있습니다. Amazon GuardDuty와 AWS Security Hub가 활성화되어 있습니다. 보안 엔지니어는 AWS 모범 사례를 준수하고 애플리케이션 중단을 최소화하는 비정상적인 트래픽에 대한 자동화된 대응책이 필요합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["EventBridge를 사용하여 인스턴스 프로필 액세스 키를 비활성화합니다.", "EventBridge를 사용하여 영향을 받는 인스턴스를 Auto Scaling 그룹에서 제거하고 제한된 보안 그룹으로 격리하는 Lambda 함수를 호출합니다.", "보안 허브를 사용하여 서브넷 네트워크 ACL을 업데이트하여 트래픽을 차단합니다.", "GuardDuty 결과를 Amazon SNS로 전송하여 이메일 알림을 받도록 합니다."], "answer": "B", "multi": false, "explanation": "AWS incident response best practices emphasize isolating compromised resources rather than immediately terminating them. According to AWS Certified Security - Specialty documentation, removing an instance from an Auto Scaling group prevents replacement loops, while applying a restrictive security group isolates the instance for forensic analysis. Using Amazon EventBridge to trigger an AWS Lambda function enables automated, consistent responses to GuardDuty findings. This approach minimizes disruption to the application because healthy instances continue serving traffic while the affected instance is isolated. Disabling credentials or modifying network ACLs can have broader impact on unrelated workloads. SNS notifications alone do not provide response automation. AWS recommends isolate-and-investigate patterns for EC2 incident response."},
  {"id": 47, "text": "한 회사의 보안 엔지니어가 회사 소유의 Amazon Simple Queue Service(Amazon SQS) 큐에 예기치 않은 사용자가 접근했다는 경고를 받았습니다. 회사의 모든 계정은 AWS Organizations 내의 조직에 속해 있습니다. 보안 엔지니어는 규정 위반을 최소화하고 AWS 외부 도구에 대한 투자를 줄이는 완화 솔루션을 구현해야 합니다. 보안 엔지니어는 이러한 요구 사항을 충족하기 위해 무엇을 해야 할까요?", "choices": ["보안 그룹을 생성하고 모든 SQS 큐에 연결합니다.", "모든 VPC의 네트워크 ACL을 수정하여 인바운드 트래픽을 제한합니다.", "Amazon SQS용 VPC 엔드포인트 인터페이스를 생성합니다. aws:SourceVpce 및 aws:를 사용하여 액세스를 제한합니다. PrincipalOrgId 조건.", "타사 클라우드 액세스 보안 브로커(CASB)를 사용합니다."], "answer": "C", "multi": false, "explanation": "Amazon SQS is a regional service that supports AWS PrivateLink through interface VPC endpoints. According to AWS Certified Security - Specialty documentation, the most secure and compliant way to restrict access to AWS services is by using VPC endpoints combined with resource-based policies. By creating interface VPC endpoints for Amazon SQS in all VPCs, traffic to SQS remains on the AWS network and does not traverse the public internet. Using the aws:SourceVpce condition in the SQS queue policy ensures that only requests originating from approved VPC endpoints can access the queue. Adding the aws:PrincipalOrgId condition further restricts access to principals that belong to the same AWS Organization. Security groups and network ACLs do not apply to SQS because SQS is not deployed inside a VPC. Third-party CASB tools add cost and operational overhead."},
  {"id": 48, "text": "한 회사가 민감한 데이터베이스 자격 증명을 구성하는 AWS CloudFormation 템플릿을 배포해야 합니다. 해당 회사는 이미 AWS Key Management Service(AWS KMS)와 AWS Secrets Manager를 사용하고 있습니다. 어떤 솔루션이 요구 사항을 충족할까요?", "choices": ["CloudFormation 템플릿에서 동적 참조를 사용하여 Secrets Manager의 데이터베이스 자격 증명을 참조하십시오.", "CloudFormation 템플릿에서 암호화된 매개변수를 사용합니다.", "Secrets Manager를 참조하려면 SecureString 매개변수를 사용하십시오.", "AWS KMS로 암호화된 SecureString 매개변수를 사용합니다."], "answer": "A", "multi": false, "explanation": "AWS CloudFormation supports dynamic references to AWS Secrets Manager, which allow sensitive values to be retrieved securely at stack runtime. According to AWS Certified Security - Specialty guidance, dynamic references prevent secrets from being stored in plaintext in templates, stack metadata, or logs. Using dynamic references ensures that secrets remain encrypted at rest and are accessed only when required. CloudFormation does not support SecureString parameters for Secrets Manager references, and encrypting templates does not prevent exposure during execution."},
  {"id": 49, "text": "기업은 손상된 IAM 사용자를 모든 AWS 계정에서 즉시 비활성화하고 지난 7일 동안 해당 사용자가 수행한 모든 작업을 수집해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["IAM 사용자를 비활성화하고 Athena를 사용하여 Amazon S3에서 CloudTrail 로그를 조회합니다.", "보안 허브에서 IAM 정책 및 쿼리 로그를 제거합니다.", "CloudWatch Logs Insights를 사용하여 권한 세트를 제거하고 로그를 쿼리합니다.", "IAM Identity Center에서 사용자를 비활성화하고 조직 이벤트 데이터 저장소를 조회합니다."], "answer": "D", "multi": false, "explanation": "AWS IAM Identity Center centrally manages user access across an AWS Organization. Disabling the user in Identity Center immediately revokes access to all AWS accounts. According to AWS Certified Security - Specialty documentation, organizational CloudTrail event data stores provide centralized, queryable access to all events across accounts. Using CloudTrail Lake enables direct querying of activity without exporting logs. Disabling the user at the Identity Center level ensures full containment."},
  {"id": 50, "text": "한 기업에서 아마존 코그니토 사용자 풀 엔드포인트를 대상으로 하는 봇 활동을 감지했습니다. 해당 솔루션은 정상적인 사용자의 접근을 유지하면서 악성 요청을 차단해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "choices": ["Amazon Cognito 위협 보호를 활성화합니다.", "인증된 사용자만 접근할 수 있도록 제한합니다.", "AWS WAF를 Cognito 사용자 풀과 연결합니다.", "CloudWatch로 요청을 모니터링하세요."], "answer": "A", "multi": false, "explanation": "Amazon Cognito threat protection is purpose-built to detect and mitigate malicious authentication activity such as credential stuffing and bot traffic. It uses adaptive risk-based analysis without disrupting legitimate users. AWS WAF cannot be directly associated with Cognito user pools."},
  {"id": 51, "text": "일부 사용자의 경우 권한 불일치로 인해 CloudFormation 스택 배포가 실패합니다. 다음 단계 조합 중 어떤 것이 가장 안전하게 일관된 배포를 보장합니까? (세 가지를 선택하십시오.)", "choices": ["복합 주 서비스 역할을 생성합니다.", "cloudformation.amazonaws.com을 주체로 하는 서비스 역할을 생성합니다.", "서비스 역할에 범위 지정 정책을 연결합니다.", "정책 리소스에 서비스 ARN을 연결합니다.", "각 스택이 서비스 역할을 사용하도록 업데이트합니다.", "서비스 역할에 iam:PassRole을 허용합니다."], "answer": "B,E,F", "multi": true, "explanation": "AWS best practices require CloudFormation to assume a dedicated service role. This ensures consistent permissions regardless of the user. Users must have iam:PassRole permission to pass the role. Updating stacks to use the service role enforces uniform deployment behavior."},
  {"id": 52, "text": "한 기업에서 수백 개의 AWS 계정에 걸쳐 자동 감지 기능을 갖춘 중앙 집중식 로그 모니터링 시스템이 필요합니다. 어떤 솔루션이 최소한의 운영 노력으로 이러한 요구 사항을 충족합니까?", "choices": ["GuardDuty 관리자 계정을 지정하고 보호 기능을 활성화합니다.", "CloudWatch 로그를 중앙 집중화하고 Inspector를 사용합니다.", "CloudTrail 로그를 중앙 집중화하고 Athena를 사용하여 쿼리합니다.", "Kinesis로 스트림 로그를 전송하고 Lambda로 처리합니다."], "answer": "A", "multi": false, "explanation": "Amazon GuardDuty provides fully managed threat detection across accounts when configured with delegated administration. EKS and RDS protections enable workload-aware detection with minimal setup. Other solutions require custom pipelines and higher operational overhead."},
  {"id": 53, "text": "한 회사가 Linux 기반 웹 서버 인스턴스들을 Amazon EC2 Auto Scaling 그룹으로 이전하기로 결정했습니다. 현재 인스턴스들은 고정되어 있으며 수동으로 실행됩니다. 관리자가 로그 파일을 확인해야 할 경우, SSH를 사용하여 인스턴스에 연결한 후 수동으로 로그를 가져옵니다. 이 회사는 애플리케이션 세션 및 사용자 문제에 대한 결과를 얻기 위해 로그를 자주 조회해야 합니다. 또한, 새로운 자동 확장 아키텍처로 인해 인스턴스가 확장될 때 로그 파일이 손실되는 것을 원하지 않습니다. 보안 엔지니어가 이러한 요구 사항을 가장 비용 효율적으로 충족하기 위해 취해야 할 조치 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["인스턴스에 cron 작업을 구성하여 로그 파일을 주기적으로 Amazon S3로 전달합니다.", "AWS Glue와 Amazon Athena가 로그 파일을 쿼리하도록 구성합니다.", "인스턴스에서 Amazon CloudWatch 에이전트를 구성하여 로그를 Amazon CloudWatch Logs로 전달합니다.", "Amazon CloudWatch Logs Insights가 로그 파일을 쿼리하도록 구성합니다.", "인스턴스가 로그를 Amazon Elastic File System(Amazon EFS) 볼륨에 기록하도록 구성합니다."], "answer": "C,D", "multi": true, "explanation": "Amazon CloudWatch Logs is designed to collect, store, and analyze log data from ephemeral compute resources such as EC2 instances in Auto Scaling groups. According to the AWS Certified Security - Specialty Study Guide, using the CloudWatch agent to stream logs off instances ensures log durability even when instances are terminated during scale-in events. CloudWatch Logs Insights provides a fully managed, serverless query engine that enables ad hoc querying, filtering, and aggregation of log data without requiring additional infrastructure. This directly satisfies the requirement to query logs for application sessions and user troubleshooting. Option A introduces operational risk because logs could be lost between cron executions. Option B requires additional services and data pipelines, increasing cost and complexity. Option E adds storage cost and management overhead and is not necessary for log analytics. AWS best practices recommend CloudWatch Logs and Logs Insights as the most cost- effective and scalable solution for centralized log retention and analysis in Auto Scaling environments."},
  {"id": 54, "text": "한 회사의 보안 엔지니어가 AWS로부터 회사 AWS 계정에서 악성코드가 호스팅되고 있다는 알림을 받았습니다. 조사 결과, IAM 사용자가 권한 없이 새로운 Amazon S3 버킷을 생성한 것을 발견했습니다. 보안 엔지니어는 이번 침해로 인한 결과를 최소화하기 위해 어떤 조치들을 조합하여 취해야 할까요? (세 가지를 선택하세요.)", "choices": ["모든 AWS CloudTrail 로그를 암호화합니다.", "Amazon GuardDuty를 켜세요.", "모든 IAM 사용자의 암호를 변경합니다.", "모든 AWS 액세스 키를 회전하거나 삭제합니다.", "모든 Amazon Elastic Block Store(Amazon EBS) 볼륨의 스냅샷을 생성합니다.", "인식되지 않거나 권한이 없는 리소스를 모두 삭제합니다."], "answer": "B,D,F", "multi": true, "explanation": "AWS incident response guidance emphasizes immediate containment, credential invalidation, and removal of malicious resources. According to the AWS Certified Security - Specialty documentation, compromised credentials must be rotated or deleted immediately to prevent further unauthorized actions. Rotating or deleting access keys directly mitigates ongoing abuse. Deleting unrecognized or unauthorized resources, such as the malicious S3 bucket, removes the active threat and limits further damage. Enabling Amazon GuardDuty provides continuous monitoring and helps identify additional compromised resources or malicious behavior that may not yet be visible. Changing passwords for all IAM users is disruptive and unnecessary if compromise scope is limited. Encrypting CloudTrail logs does not reduce active impact. Taking EBS snapshots is primarily for forensic investigation, not immediate consequence minimization. AWS best practices recommend GuardDuty activation, credential rotation, and removal of malicious resources as first-response actions."},
  {"id": 55, "text": "한 회사가 애플리케이션 로드 밸런서(ALB) 뒤에 있는 Amazon EC2 인스턴스에 자사 웹사이트를 호스팅하고 있습니다. 웹사이트가 특정 IoT 기기 브랜드에서 사용하는 고유한 사용자 에이전트로 인해 글로벌 DDoS 공격을 받고 있습니다. 보안 엔지니어가 AWS WAF 웹 ACL을 생성하고 이를 ALB와 연결할 예정입니다. 어떤 규칙 조항이 정상적인 고객을 차단하지 않으면서 이러한 IoT 기기로부터의 현재 및 미래 공격을 완화할 수 있을까요?", "choices": ["IP 세트 일치 규칙문을 사용합니다.", "지리적 일치 규칙문을 사용합니다.", "비율 기반 규칙문을 사용합니다.", "사용자 에이전트에 문자열 일치 규칙문을 사용합니다."], "answer": "D", "multi": false, "explanation": "AWS WAF string match rule statements allow inspection of HTTP headers, including the User- Agent header. According to AWS Certified Security - Specialty guidance, whe n malicious traffic can be uniquely identified by a consistent request attribute, such as a device-specific user agent, a string match rule provides precise mitigation with minimal false positives. IP-based blocking is ineffective for globally distributed botnets. Geographic blocking risks denying access to legitimate users. Rate-based rules limit request volume but do not prevent low-and- slow attacks. By matching the unique IoT device brand in the User-Agent header, the security engineer can block only malicious requests while preserving customer access."},
  {"id": 56, "text": "회사 보안팀은 DoS 공격과 관련된 AWS 악용 보고에 대한 이메일 알림을 거의 실시간으로 받고 싶어합니다. 이미 아마존 SNS에 관련 주제가 있으며 보안팀에서 구독하고 있습니다. 보안 엔지니어는 다음에 무엇을 해야 할까요?", "choices": ["Lambda 함수를 사용하여 Trusted Advisor에서 악용 알림을 폴링합니다.", "AWS_ABUSE_DOS_REPORT에 대한 AWS Health 이벤트와 일치하고 SNS에 게시하는 Amazon EventBridge 규칙을 생성합니다.", "Lambda 함수를 사용하여 AWS 지원 API를 폴링하여 악용 사례를 확인합니다.", "CloudTrail 로그와 CloudWatch 알람을 사용하여 악용 신고를 감지합니다."], "answer": "B", "multi": false, "explanation": "AWS abuse notifications are delivered as AWS Health events. According to the AWS Certified Security - Specialty Study Guide, Amazon EventBridge integrates natively with AWS Health and can be used to detect specific event types such as AWS_ABUSE_DOS_REPORT in near real time. By creating an EventBridge rule that filters for the abuse report event type and publishes directly to Amazon SNS, the solution remains fully managed, low latency, and cost effective. Polling APIs introduces delay and complexity. CloudTrail does not log abuse notifications. EventBridge with AWS Health is the recommended mechanism for reacting to AWS service events."},
  {"id": 57, "text": "보안 엔지니어가 한 회사의 사용자 암호에 최소 길이 제한이 없다는 사실을 발견했습니다. 해당 회사는 다음과 같은 ID 공급자(IdP)를 사용합니다. * AWS Identity and Access Management(IAM)과 온프레미스 Active Directory의 페더레이션 * AWS 클라우드 애플리케이션의 사용자 데이터베이스를 포함하는 Amazon Cognito 사용자 풀. 보안 엔지니어는 필수 최소 암호 길이를 구현하기 위해 어떤 조치를 취해야 합니까? (두 가지를 선택하십시오.)", "choices": ["IAM 구성에서 암호 길이 정책을 업데이트합니다.", "Amazon Cognito 구성에서 암호 길이 정책을 업데이트합니다.", "온프레미스 Active Directory 구성에서 암호 길이 정책을 업데이트합니다.", "AWS Organizations에서 최소 암호 길이를 적용하는 SCP를 생성합니다.", "최소 암호 길이 조건을 포함하는 IAM 정책을 생성합니다."], "answer": "B,C", "multi": true, "explanation": "Password policies are enforced at the identity provider where authentication occurs. According to the AWS Certified Security - Specialty Study Guide, when IAM is federated with an external identity provider such as on-premises Active Directory, IAM does not manage or enforce password policies. Instead, password requirements such as minimum length must be enforced directly in Active Directory Group Policy Objects. Amazon Cognito user pools maintain their own user directory and authentication logic. Cognito provides configurable password policies, including minimum length, complexity, and expiration. To enforce a minimum password length for application users, the Cognito user pool password policy must be updated. IAM password policies apply only to IAM users that authenticate directly with IAM and do not affect federated users or Cognito users. SCPs and IAM policies cannot enforce password length requirements."},
  {"id": 58, "text": "한 회사의 웹 애플리케이션이 Auto Scaling 그룹의 Application Load Balancer(ALB) 뒤에 있는 Amazon EC2 인스턴스에서 실행됩니다. 해당 ALB에는 AWS WAF 웹 접근 제어 목록(ACL)이 연결되어 있습니다. 재부팅 후 인스턴스 로그가 손실되는 문제가 발생하고 있습니다. 운영팀은 특정 PHP 파일을 대상으로 하는 악의적인 활동을 의심하고 있습니다. 향후 유사한 사례 발생 시 공격자의 IP 주소를 식별할 수 있는 일련의 조치는 무엇입니까?", "choices": ["VPC 흐름 로그를 구성하고 PHP 파일 활동을 검색합니다.", "ALB에 CloudWatch 에이전트를 설치하고 애플리케이션 로그를 내보냅니다.", "ALB 액세스 로그를 Amazon OpenSearch 서비스로 내보내고 검색합니다.", "웹 ACL을 구성하여 로그를 Amazon Kinesis Data Firehose로 전송합니다. 로그를 Amazon S3에 저장하고 Amazon Athena를 사용하여 쿼리합니다."], "answer": "D", "multi": false, "explanation": "AWS WAF logs contain detailed request-level information, including source IP addresses, requested URIs, and rule matches. According to AWS Certified Security - Specialty guidance, enabling AWS WAF logging provides the most reliable and tamper-resistant method to investigate web-based attacks, especially when instance-level logs are unavailable. By streaming WAF logs through Amazon Kinesis Data Firehose to Amazon S3, the company ensures durable, centralized log storage that is independent of EC2 lifecycle events. Amazon Athena can then query the logs efficiently to identify repeated requests to the new-user- creation.php endpoint and extract attacker IP addresses. VPC Flow Logs do not capture HTTP-level details. ALB access logs alone may not capture blocked requests. WAF logs provide the best forensic visibility for future detection."},
  {"id": 59, "text": "한 기업은 아마존 오로라 MySQL 데이터베이스에 대해 암호화, 삭제 방지, 공개 액세스 및 감사 로깅과 관련된 보안 요구 사항을 가지고 있습니다. 또한 지속적인 모니터링과 실시간 규정 준수 현황 파악이 필요합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["사용자 지정 프레임워크와 함께 AWS Audit Manager를 사용합니다.", "AWS Config를 활성화하고 관리형 규칙을 사용하여 Aurora MySQL의 규정 준수를 모니터링합니다.", "AWS Security Hub 구성 정책을 사용합니다.", "사용자 지정 메트릭을 사용하여 EventBridge 및 Lambda를 사용합니다."], "answer": "B", "multi": false, "explanation": "AWS Config is the AWS service designed to continuously evaluate resource configurations against defined rules. According to the AWS Certified Security - Specialty Study Guide, AWS Config managed rules exist specifically to check database encryption, public accessibility, deletion protection, and log exports for Amazon RDS and Aurora. AWS Config provides a real-time compliance timeline and displays the compliance state of each resource against each rule at any point in time. This granular visibility is required to assess ongoing compliance with security policies. Audit Manager generates reports but does not provide continuous compliance monitoring. Security Hub aggregates findings but does not track configuration drift. EventBridge and Lambda introduce unnecessary complexity."},
  {"id": 60, "text": "한 회사가 아마존 클라우드프론트를 사용하여 글로벌 전자상거래 웹사이트를 운영하고 있습니다. 이 회사는 데이터 규정을 준수하기 위해 특정 국가에서 오는 트래픽을 차단해야 합니다. 어떤 솔루션이 이러한 요구 사항을 가장 비용 효율적으로 충족할까요?", "choices": ["AWS WAF IP 일치 규칙을 사용합니다.", "AWS WAF 지리적 일치 규칙을 사용합니다.", "CloudFront의 지역 제한을 사용하여 해당 국가의 접근을 차단하세요.", "CloudFront에서 지리 위치 헤더를 사용합니다."], "answer": "C", "multi": false, "explanation": "Amazon CloudFront includes a built-in geo restriction feature that allows content to be allowed or denied based on the viewer's country. According to AWS Certified Security - Specialty documentation, CloudFront geo restriction is the most cost-effective method for country-based blocking because it does not require AWS WAF or additional rule processing. AWS WAF geo match rules incur additional cost and are more appropriate when advanced inspection or layered security controls are required. IP-based blocking is impractical due to frequent IP changes. Geolocation headers do not enforce access control. CloudFront geo restriction is evaluated at the edge and efficiently blocks disallowed countries with minimal latency and cost."},
  {"id": 61, "text": "AWS Lambda 함수가 악용되어 데이터가 변조되었으며, 보안 엔지니어는 누가 해당 함수를 호출했는지, 그리고 어떤 결과가 생성되었는지 파악해야 합니다. 하지만 엔지니어는 Amazon CloudWatch Logs에서 해당 Lambda 함수가 생성한 로그를 찾을 수 없습니다. 다음 중 로그를 사용할 수 없는 이유를 설명하는 것은 무엇입니까?", "choices": ["Lambda 함수의 실행 역할에 CloudWatch Logs에 로그 데이터를 기록할 수 있는 권한이 부여되지 않았습니다.", "Lambda 함수는 Amazon API Gateway를 사용하여 호출되었으므로 로그가 CloudWatch Logs에 저장되지 않습니다.", "Lambda 함수의 실행 역할에 CloudWatch Logs가 로그를 저장하는 Amazon S3 버킷에 쓰기 권한이 부여되지 않았습니다.", "호출된 Lambda 함수의 버전이 최신 버전이 아닙니다."], "answer": "A", "multi": false, "explanation": "AWS Lambda automatically sends function execution logs to Amazon CloudWatch Logs when logging is enabled in the function code. However, this logging capability depends on the Lambda execution role having the appropriate permissions. According to the AWS Certified Security - Specialty Study Guide, the execution role must include permissions such as logs:CreateLogGroup, logs:CreateLogStream, and logs:PutLogEvents. If these permissions are missing, Lambda cannot create log groups or streams, and no execution logs will appear in CloudWatch Logs-even though the function was successfully invoked. This is the most common reason Lambda logs are unavailable during forensic investigations. Option B is incorrect because Lambda logs are stored in CloudWatch Logs regardless of whether the invocation source is API Gateway, EventBridge, or another AWS service. Option C is incorrect because CloudWatch Logs does not require direct S3 permissions from the Lambda execution role. Option D is irrelevant because Lambda versions do not affect logging behavior. AWS documentation emphasizes verifying execution role permissions as a first step when Lambda logs are missing."},
  {"id": 62, "text": "한 회사가 AWS KMS 고객 관리 키를 사용하는 암호화된 Amazon Aurora DB 클러스터를 미국 동부 1 리전에 보유하고 있습니다. 이 회사는 DB 스냅샷을 미국 서부 1 리전으로 복사해야 하지만, 리전 간에 암호화 키에 접근할 수 없습니다. us-west-1에 있는 스냅샷을 제대로 암호화하려면 회사는 어떻게 해야 할까요?", "choices": ["고객 관리 키를 AWS Secrets Manager의 us-west-1에 저장합니다.", "us-west-1에 새 고객 관리 키를 생성하고 이를 사용하여 스냅샷을 암호화합니다.", "us-west-1에서 us-east-1의 키에 액세스할 수 있도록 IAM 정책을 생성합니다.", "us-west-1의 RDS가 us-east-1의 키에 액세스할 수 있도록 허용하는 IAM 정책을 생성합니다."], "answer": "B", "multi": false, "explanation": "AWS KMS keys are strictly regional resources. According to AWS Certified Security - Specialty documentation, a KMS key created in one Region cannot be used to encrypt or decrypt data in another Region. This includes encrypted RDS and Aurora snapshots. When copying an encrypted snapshot to a different Region, the destination Region must have its own KMS key. AWS automatically re-encrypts the snapshot using the specified KMS key in the destination Region during the copy operation. Options C and D are invalid because IAM policies cannot extend a KMS key's scope across Regions. Option A is incorrect because Secrets Manager does not store or manage KMS keys themselves. AWS best practices require creating a new customer managed key in the target Region and using it during the snapshot copy process."},
  {"id": 63, "text": "보안 엔지니어는 보안 사고 발생 시 격리를 위해 Amazon EC2 인스턴스를 준비해야 합니다. AWS Systems Manager Agent(SSM Agent)가 설치되어 있으며, 포렌식 도구를 설치 및 업데이트하는 스크립트도 존재합니다. 보안 사고 발생 시 EC2 인스턴스를 격리할 수 있는 솔루션은 무엇입니까?", "choices": ["AWS Config를 사용하여 SSM 에이전트 버전을 추적합니다.", "외부 연결을 거부하도록 세션 관리자를 구성합니다.", "스크립트를 Amazon S3에 저장하고 읽기 권한을 부여하세요.", "SSM 에이전트가 스크립트를 Systems Manager 실행 명령 문서로 실행할 수 있도록 IAM 권한을 구성합니다."], "answer": "D", "multi": false, "explanation": "AWS Systems Manager Run Command enables secure, remote execution of commands on EC2 instances without requiring network access or inbound ports. According to the AWS Certified Security - Specialty Study Guide, Run Command is a recommended mechanism for incident response actions such as installing forensic tools, collecting evidence, or applying quarantine controls. By granting the SSM Agent permission to execute a predefined Run Command document, the security engineer can immediately run the quarantine script across affected instances. This approach supports automation, scalability, and auditability, all of which are critical during security incidents. Options A, B, and C do not directly enforce quarantine or execute response actions. Tracking versions and storing scripts alone do not trigger incident response. AWS documentation highlights Systems Manager Run Command as a core capability for automated containment and investigation."},
  {"id": 64, "text": "기업은 보안 문제의 근본 원인을 파악하고 해당 문제와 관련된 IAM 역할을 조사해야 합니다. 이를 위해 VPC Flow Logs, Amazon GuardDuty 및 AWS CloudTrail을 활성화했습니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon Detective를 사용하여 IAM 역할을 조사하고 결과를 시각화합니다.", "Amazon Inspector 및 CloudWatch 대시보드를 사용하세요.", "GuardDuty 결과를 S3로 내보내고 Athena로 분석합니다.", "Security Hub 사용자 지정 작업을 사용하여 IAM 역할을 조사합니다."], "answer": "A", "multi": false, "explanation": "Amazon Detective is specifically designed to help security teams investigate and visualize the root cause of security findings. According to AWS Certified Security - Specialty documentation, Detective automatically aggregates and correlates data from GuardDuty, CloudTrail, and VPC Flow Logs to provide interactive visualizations and timelines. Detective enables investigators to pivot from GuardDuty findings to IAM roles, API calls, network traffic, and resource behavior. This makes it the most efficient tool for understanding how IAM roles were used during suspicious activity. Amazon Inspector focuses on vulnerability assessment, not behavioral investigation. Security Hub aggregates findings but does not provide deep investigation graphs. Manual analysis with Athena requires significantly more effort. AWS guidance explicitly recommends Amazon Detective for root cause analysis and visualization of security incidents."},
  {"id": 65, "text": "한 회사가 데이터 파일을 객체 형태로 아마존 S3 버킷에 업로드합니다. 공급업체는 데이터 처리를 위해 해당 객체를 다운로드합니다. 보안 엔지니어는 객체가 S3 버킷에 72시간 이상 상주하지 않도록 하는 솔루션을 구현해야 합니다.", "choices": ["S3 버전 관리를 구성하여 버킷에 72시간 동안 있는 객체 버전이 만료되도록 합니다.", "버킷에 S3 수명 주기 구성 규칙을 설정하여 객체가 72시간 후에 만료되도록 합니다.", "S3 인텔리전트 티어링 스토리지 클래스를 사용하고 만료 시간을 72시간으로 설정합니다.", "72시간 후에 만료되는 사전 서명된 URL을 생성합니다."], "answer": "B", "multi": false, "explanation": "Amazon S3 Lifecycle configuration rules are the native, automated mechanism for managing object retention and deletion. According to AWS Certified Security - Specialty documentation, lifecycle rules can be configured to expire objects based on the number of days since object creation. Once the expiration time is reached, Amazon S3 permanently deletes the objects without manual intervention. This solution directly enforces a maximum retention period of 72 hours and ensures compliance regardless of whether the vendor downloads the data or not. Lifecycle rules are evaluated continuously by Amazon S3 and do not require scripts, cron jobs, or additional services, making them the most operationally efficient and cost-effective solution. S3 Versioning controls versions but does not enforce object deletion timelines. S3 Intelligent- Tiering optimizes storage cost but does not delete objects. Presigned URLs only control access duration and do not remove objects from storage. AWS explicitly recommends lifecycle policies for automated data retention enforcement."},
  {"id": 66, "text": "한 회사가 외부 CI/CD 파이프라인에서 Amazon ECR로 푸시된 취약한 컨테이너 이미지로 인해 보안 사고를 경험했습니다. 어떤 해결책이 취약한 이미지의 배포를 막을 수 있을까요?", "choices": ["Lambda 차단을 사용하여 ECR 향상된 스캐닝을 활성화합니다.", "EventBridge 및 Lambda와 함께 Amazon Inspector를 사용하세요.", "SBOM 생성을 사용하여 Amazon Inspector를 CI/CD 파이프라인에 통합하고, 심각한 오류가 발견되면 파이프라인이 실패하도록 합니다.", "기본 연속 ECR 스캐닝을 활성화합니다."], "answer": "C", "multi": false, "explanation": "Amazon Inspector provides native CI/CD integration capabilities that allow security checks to occur before container images are pushed to Amazon ECR. According to AWS Certified Security - Specialty documentation, Inspector does not block image pushes automatically. Instead, prevention must occur inside the CI/CD pipeline itself. By generating a Software Bill of Materials (SBOM) using the Amazon Inspector SBOM generator and submitting it to Inspector for scanning, the pipeline can detect critical vulnerabilities before the image is uploaded. If vulnerabilities exceed policy thresholds, the pipeline fails, preventing deployment. Post-push scanning solutions only detect vulnerabilities after exposure. Event-driven blocking does not prevent the initial risk. AWS best practices require \"shift-left\" security controls to prevent vulnerable artifacts from entering production."},
  {"id": 67, "text": "AWS Config는 구성 스냅샷을 Amazon S3에 전송할 수 없습니다. 이 문제를 해결할 수 있는 두 가지 조치는 무엇입니까?", "choices": ["S3 버킷 정책에서 config.amazonaws.com을 허용하는지 확인하십시오.", "IAM 역할에 s3:GetBucketAcl 및 s3:PutObject 권한이 있는지 확인합니다.", "S3 버킷이 IAM 역할을 수임할 수 있는지 확인합니다.", "IAM 정책에서 AWS Config가 로그를 기록할 수 있도록 허용하는지 확인합니다.", "AWS Config API 권한을 수정합니다."], "answer": "A,B", "multi": true, "explanation": "AWS Config requires permissions at two levels to deliver configuration data: the AWS Config service role and the S3 bucket policy. The AWS Certified Security - Specialty Study Guide states that the S3 bucket policy must explicitly allow the config.amazonaws.com service principal to write objects. Additionally, the IAM role used by AWS Config must allow s3:GetBucketAcl and s3:PutObject. If either permission is missing, AWS Config cannot deliver snapshots and will log delivery errors in CloudTrail. This dual-permission model ensures least privilege while maintaining secure delivery of compliance data. Other options reference incorrect principals or irrelevant permissions."},
  {"id": 68, "text": "기업은 단일 보안 계정을 사용하여 모든 계정의 모든 Amazon S3 버킷에 있는 민감한 데이터의 목록을 작성해야 합니다.", "choices": ["Amazon Macie 및 Security Hub 관리 권한을 위임합니다.", "Security Hub와 함께 Amazon Inspector를 사용하세요.", "Trusted Advisor와 함께 Inspector를 사용하세요.", "Trusted Advisor와 함께 Macie를 사용하세요."], "answer": "A", "multi": false, "explanation": "Amazon Macie is the AWS service designed to discover and classify sensitive data in S3. Delegated administration enables centralized visibility across an organization. Security Hub aggregates Macie findings for a single-pane-of-glass view. Inspector does not scan S3 data. Trusted Advisor is not a sensitive data discovery tool."},
  {"id": 69, "text": "한 회사가 모든 AWS Lambda 함수의 코드 취약점을 검사해야 합니다.", "choices": ["Amazon Macie를 사용하세요.", "Amazon Inspector Lambda 스캔을 활성화합니다.", "GuardDuty와 Security Hub를 사용하세요.", "GuardDuty Lambda Protection을 사용합니다."], "answer": "B", "multi": false, "explanation": "Amazon Inspector provides native Lambda code vulnerability scanning. GuardDuty focuses on runtime threats, not static code analysis."},
  {"id": 70, "text": "IAM 역할이 수정될 때 알림을 보냅니다.", "choices": ["Amazon Detective를 사용하세요.", "CloudTrail 이벤트와 함께 EventBridge를 사용하세요.", "CloudWatch 메트릭 필터를 사용합니다.", "CloudWatch 구독 필터를 사용합니다."], "answer": "B", "multi": false, "explanation": "EventBridge natively consumes CloudTrail management events and provides near-real-time notifications."},
  {"id": 71, "text": "한 회사가 전송 중 암호화를 적용하지 않는 Amazon S3 버킷을 여러 개 보유하고 있습니다. 보안 엔지니어는 회사의 기존 및 향후 모든 S3 버킷에 대해 전송 중 암호화를 적용하는 솔루션을 구현해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Config를 활성화합니다. 사전 예방적인 AWS Config 사용자 지정 정책 규칙을 생성합니다. S3 버킷 정책을 평가하여 aws:SecureTransport 조건 키에 대해 True 값이 있는지 확인하는 Guard 절을 생성합니다. AWS Config 규칙이 NON_COMPLIANT로 평가되면 리소스 생성을 차단합니다.", "AWS Config를 활성화합니다. s3-bucket-ssl-requests-only AWS Config 관리형 규칙을 구성하고 규칙 트리거 유형을 하이브리드로 설정합니다. aws:SecureTransport 조건 키 값이 False일 때 요청을 거부하는 버킷 정책을 적용하는 AWS Systems Manager Automation 런북을 생성합니다. 자동 복구 기능을 구성합니다. 런북을 규칙의 대상으로 설정합니다.", "Amazon Inspector를 활성화합니다. 사용자 지정 AWS Lambda 규칙을 생성합니다. aws:SecureTransport 조건 키 값이 False일 때 요청을 거부하도록 버킷 정책을 적용하는 Lambda 함수를 생성합니다. 해당 Lambda 함수를 규칙의 대상으로 설정합니다.", "AWS CloudTrail 트레일을 생성합니다. 트레일에서 S3 데이터 이벤트를 활성화합니다. aws:SecureTransport 조건 키 값이 False일 때 요청을 거부하는 버킷 정책을 적용하는 AWS Lambda 함수를 생성합니다. CloudTrail 트레일이 Lambda 함수를 호출하도록 구성합니다."], "answer": "B", "multi": false, "explanation": "To enforce encryption in transit for Amazon S3, AWS best practice is to require HTTPS (TLS) by using a bucket policy condition that denies any request where aws:SecureTransport is false. The requirement includes both existing buckets and future buckets, so the control must continuously evaluate configuration drift and automatically remediate. AWS Config is the service intended for continuous configuration compliance monitoring across resources, and AWS Config managed rules provide standardized checks with low operational overhead. The s3-bucket-ssl-requests- only managed rule evaluates whether S3 buckets enforce SSL-only requests, aligning directly with enforcing encryption in transit. Setting the trigger type to Hybrid ensures evaluation both on configuration changes and periodically. Automatic remediation with an AWS Systems Manager Automation runbook allows the organization to apply or correct the bucket policy consistently at scale without manual work. This approach also supports governance by maintaining a measurable compliance status while actively fixing noncompliance. Option A is not the best fit because a \"proactive\" custom policy rule does not by itself remediate existing buckets and \"block resource creation\" is not how AWS Config enforces controls. Option C is incorrect because Amazon Inspector is a vulnerability management service and does not govern S3 bucket transport policies. Option D is inefficient and indirect because CloudTrail data events are not a compliance engine and would require custom processing."},
  {"id": 72, "text": "한 회사가 중첩된 OU를 사용하는 AWS Organizations를 통해 AWS 계정을 관리하고 있습니다. 이 회사는 계정에 대한 맞춤형 규정 준수 모니터링 서비스를 운영하고 있으며, 해당 서비스는 AWS Lambda 함수로 실행되고 Amazon EventBridge 스케줄러에 의해 호출됩니다. 해당 회사는 조직 내 모든 기존 및 향후 계정에 모니터링 서비스를 배포해야 합니다. 회사는 관리 계정이 필요하지 않은 경우 조직의 관리 계정을 사용하는 것을 피해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["조직의 관리 계정에 CloudFormation 스택 세트를 생성하고 새 계정을 수동으로 추가합니다.", "AWS CloudFormation에 대한 위임된 관리자 계정을 구성합니다. 위임된 관리자 계정에서 조직 루트를 대상으로 자동 배포가 활성화된 CloudFormation StackSet을 생성합니다.", "Systems Manager 위임 관리 및 자동화를 사용하여 Lambda 함수를 배포하고 예약합니다.", "관리 계정에 Systems Manager Automation 런북을 생성하고 이를 다른 계정과 공유합니다."], "answer": "B", "multi": false, "explanation": "AWS Organizations and CloudFormation StackSets provide an organizational deployment mechanism for consistent infrastructure across accounts. AWS Certified Security - Specialty guidance emphasizes minimizing use of the management account and using delegated administrator capabilities where available for centralized governance while reducing blast radius. By configuring a delegated administrator account for AWS CloudFormation, the company can create and manage StackSets without performing day-to-day deployment operations from the management account. Targeting the organization root ensures the StackSet deploys to all existing accounts. Enabling automatic deployment ensures that any future accounts that join the organization (or move into targeted OUs, depending on configuration) automatically receive the monitoring service without manual intervention. This directly meets the requirement to deploy to all existing and future accounts with minimal effort. Option A requires ongoing manual updates when accounts are added, increasing operational overhead. Options C and D rely on Systems Manager Automation, which can work but introduces additional operational complexity and is not the standard AWS mechanism for organization-wide infrastructure rollout compared to StackSets with auto-deployment. StackSets also provide consistent change control, drift detection, and centralized update mechanisms, which align with governance expectations for compliance tooling."},
  {"id": 73, "text": "한 회사가 AWS KMS(고객 관리형 키)를 사용하는 보안 솔루션을 구축하고 있습니다. 이 회사는 AWS Lambda에서 KMS 키를 사용할 수 있도록 허용하고자 하지만, Amazon EC2에서는 해당 키를 사용할 수 없도록 차단하려고 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["EC2 인스턴스 프로필에 대해서는 IAM 명시적 거부를 사용하고 Lambda 역할에 대해서는 허용을 사용하세요.", "kms:ViaService 조건을 사용하는 KMS 키 정책을 이용하여 Lambda 사용을 허용하고 EC2 사용을 거부합니다.", "KMS 키 정책에서 aws:SourceIp 및 aws:AuthorizedService 조건 키를 사용하십시오.", "SCP를 사용하여 EC2를 차단하고 Lambda를 허용합니다."], "answer": "B", "multi": false, "explanation": "AWS KMS access control is primarily enforced through key policies (and optionally grants), and AWS recommends using key policy condition keys to restrict how keys can be used. The kms:ViaService condition key is specifically designed to restrict KMS API usage to requests that come through a particular AWS service endpoint in a specific Region. This is the most robust way to ensure a key can be used only via AWS Lambda (for example, lambda.<region>.amazonaws.com) and not via Amazon EC2 (ec2.<region>.amazonaws.com), even if IAM permissions exist elsewhere. By writing a key policy that uses the Lambda execution role as the principal and conditions on kms:ViaService, the company can tightly bind key usage to Lambda-originated cryptographic operations while preventing use through EC2 service paths. Option A is weaker because EC2 is not the only way an IAM principal might use KMS, and relying on attaching explicit deny policies broadly is harder to manage and can miss principals. Option C is incorrect because aws:AuthorizedService is not the typical mechanism for KMS service restriction, and SourceIp is unreliable for service-to-service calls. Option D is not ideal because SCPs do not provide fine-grained service-path restrictions for KMS usage and cannot \"allow\" beyond IAM; key policy controls still apply."},
  {"id": 74, "text": "한 회사가 아마존 S3 버킷에서 데이터를 읽고 쓰는 웹 애플리케이션을 보유하고 있습니다. 이 회사는 S3 버킷에 대한 모든 S3 API 호출을 인증하기 위해 AWS 자격 증명을 사용해야 합니다. 어떤 솔루션이 애플리케이션에 S3 API 호출에 필요한 AWS 자격 증명을 제공할까요?", "choices": ["Cognito ID 풀과 통합하고 GetId를 사용하여 AWS 자격 증명을 얻습니다.", "Cognito ID 풀과 통합하고 AssumeRoleWithWebIdentity를 사용하여 AWS 자격 증명을 얻습니다.", "Cognito 사용자 풀과 통합하고 ID 토큰을 사용하여 AWS 자격 증명을 얻습니다.", "Cognito 사용자 풀과 통합하고 액세스 토큰을 사용하여 AWS 자격 증명을 얻습니다."], "answer": "B", "multi": false, "explanation": "Amazon Cognito identity pools are designed to provide temporary AWS credentials for applications by exchanging an authenticated identity token for AWS Security Token Service (STS) credentials. AWS Certified Security - Specialty guidance distinguishes between Cognito user pools (authentication) and identity pools (authorization to AWS resources). A user pool can authenticate a user and issue tokens, but an identity pool is required to obtain AWS credentials that can be used to sign AWS API requests, such as S3 API calls. The correct mechanism is for the application to use AssumeRoleWithWebIdentity through STS (which is the underlying federation method used by identity pools) to receive temporary credentials for an IAM role that grants S3 permissions. GetId alone does not provide credentials; it returns an identity identifier that is used as part of the credential exchange flow. Options C and D are incorrect because user pool tokens are not AWS credentials and cannot directly sign S3 requests. The solution therefore must use identity pools to map users to IAM roles and retrieve temporary credentials, satisfying the requirement for authenticated API calls using short-lived credentials."},
  {"id": 75, "text": "한 회사가 AWS Organizations 내 여러 계정에 걸쳐 새로운 워크로드를 실행하고 있습니다. 실행 중인 모든 리소스에는 CostCenter 태그가 있어야 하며, 이 태그는 승인된 세 가지 값 중 하나여야 합니다. 회사는 이 정책을 엄격히 시행하고 CostCenter 태그가 승인되지 않은 값으로 변경되는 것을 방지해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Config 사용자 지정 정책 규칙과 SCP를 사용하여 승인되지 않은 aws:RequestTag/CostCenter 값을 거부합니다.", "CloudTrail + EventBridge + Lambda를 사용하여 생성을 차단합니다.", "태그 정책을 활성화하고, 허용 값을 정의하고, 규정을 준수하지 않는 작업을 강제하고, aws:RequestTag/CostCenter가 null일 때 SCP를 사용하여 생성을 거부합니다.", "태그 정책을 활성화하고 EventBridge + Lambda를 사용하여 변경을 차단합니다."], "answer": "C", "multi": false, "explanation": "AWS Organizations tag policies are designed to standardize and govern tag keys and allowed values across accounts. AWS Certified Security - Specialty documentation describes tag policies as a governance mechanism that helps enforce consistent tagging by specifying required tag keys and permitted values. To ensure every resource has the CostCenter tag at creation time, an SCP can deny create actions when aws:RequestTag/CostCenter is missing (null). This prevents resources from being created without the required tag. Tag policies then define the three approved values and can be configured to enforce or report noncompliance depending on supported services, ensuring that tag values remain within the allowed set and preventing drift to unapproved values. Compared with custom Lambda-based enforcement, this approach minimizes operational overhead and keeps enforcement within AWS native governance services. Option A partially addresses allowed values at request time but does not address ongoing governance as cleanly across many services. Option B is not preventive because Lambda runs after events and cannot reliably block all creations. Option D still relies on custom logic and is not as operationally efficient as tag policies plus SCP guardrails."},
  {"id": 76, "text": "한 회사가 AWS Organizations 내의 조직에 여러 AWS 계정을 보유하고 있습니다. 해당 계정의 Amazon S3 버킷이 공개적으로 접근 가능합니다. 보안 엔지니어는 해당 버킷에 대한 공개 접근을 제거하고 다시는 공개되지 않도록 조치해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["KMS 암호화를 적용하고 SCP를 통한 s3:GetObject 접근을 차단합니다.", "PublicAccessBlock을 활성화하고 SCP를 통한 s3:GetObject 접근을 거부합니다.", "SCP를 통해 PublicAccessBlock을 활성화하고 s3:PutPublicAccessBlock을 거부합니다.", "객체 잠금 관리를 활성화하고 SCP에 의한 s3:PutPublicAccessBlock을 거부합니다."], "answer": "C", "multi": false, "explanation": "Amazon S3 Block Public Access provides centralized controls to prevent public access through bucket policies and ACLs. AWS Certified Security - Specialty guidance recommends enabling Block Public Access to reduce accidental exposure and to enforce guardrails that override public grants. Enabling Block Public Access on the bucket removes current public exposure when combined with correcting policies/ACLs and prevents future misconfiguration. To ensure the bucket cannot be made public again, the security engineer must prevent principals from disabling Block Public Access. An SCP that denies s3:PutPublicAccessBlock prevents changes that would remove or weaken the PublicAccessBlock configuration, enforcing the guardrail across the OU or account. Options A and D do not directly address public exposure control. Option B denies object reads but does not ensure public access cannot be re-enabled; it also does not address the root misconfiguration pathways and could disrupt legitimate access patterns. Option C specifically combines the correct preventive control (PublicAccessBlock) with organizational enforcement to stop future reversal."},
  {"id": 77, "text": "한 회사가 AWS Organizations를 사용하고 있으며, 루트에 SCP(서비스 제공업체 규칙)를 설정하여 외부 계정과의 리소스 공유를 차단했습니다. 이제 이 회사는 마케팅 계정만 외부와 리소스를 공유할 수 있도록 허용하고, 다른 모든 계정은 공유를 차단해야 합니다. 모든 계정은 동일한 OU(조직 단위)에 있습니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["마케팅 계정에 공유를 명시적으로 허용하는 새 SCP를 생성합니다.", "기존 SCP를 수정하여 마케팅 계정을 제외하는 조건을 추가합니다.", "마케팅 계정에 대한 허용 문구를 포함하도록 SCP를 수정하세요.", "마케팅 계정에서 권한 경계를 사용하세요."], "answer": "B", "multi": false, "explanation": "Service control policies (SCPs) define the maximum available permissions for accounts and are evaluated as guardrails. AWS Certified Security - Specialty documentation states SCPs are typically used to apply organization-wide restrictions, and exceptions are commonly handled by using conditions (for example, excluding specific accounts) or by structuring OUs differently. Because all accounts are in the same OU and the company must continue blocking external sharing for everyone except one account, modifying the existing SCP to exclude the marketing account is the most direct solution. An SCP attached at the root affects all accounts unless conditions narrow its scope. Adding a condition that excludes the marketing account allows that account to retain the ability to share resources externally while the SCP continues to block sharing for other accounts. Option A is not feasible because account-level SCPs cannot override a deny applied by a parent SCP; explicit denies always win. Option C misunderstands SCP behavior because SCPs do not grant permissions; they only limit. Option D is an IAM control that cannot override an organization-level deny. Therefore, the only secure, scalable option is to modify the existing SCP with an exception condition for the marketing account."},
  {"id": 78, "text": "보안 엔지니어가 VPC Flow Logs를 Amazon CloudWatch Logs에 게시하도록 구성했습니다. 하지만 10분이 지나도 로그가 나타나지 않습니다. 이 문제는 VPC Flow Logs와 연결된 IAM 역할과 관련된 것으로 확인되었습니다. 이유가 뭘까요?", "choices": ["logs:GetLogEvents가 누락되었습니다.", "엔지니어는 해당 역할을 맡을 수 없습니다.", "vpc-flow-logs.amazonaws.com 주체가 역할을 수임할 수 없습니다.", "해당 역할은 로그 스트림에 태그를 지정할 수 없습니다."], "answer": "C", "multi": false, "explanation": "VPC Flow Logs require an IAM role that CloudWatch Logs can use to publish flow log records. AWS documentation and AWS Certified Security - Specialty materials explain that the VPC Flow Logs service must be able to assume the IAM role through its trust policy. The trust relationship must include the service principal vpc-flow-logs.amazonaws.com. If the trust policy does not allow this principal to assume the role, flow logs cannot be delivered and no records will appear in the CloudWatch Logs log group even when traffic exists. logs:GetLogEvents is not required for delivery; it is used for reading logs. The security engineer's ability to assume the role is not relevant because the service, not the engineer, assumes it. Tagging permissions are not required for basic log delivery. Therefore, the most likely cause is an incorrect trust policy that prevents the VPC Flow Logs service principal from assuming the role."},
  {"id": 79, "text": "한 기업에서 AWS 조직 내의 모든 신규 및 기존 Amazon EC2 인스턴스에 특정 소프트웨어 애플리케이션을 설치해야 합니다. SSM 에이전트는 이미 설치되어 활성화된 상태입니다. 회사는 소프트웨어 애플리케이션의 배포 상태를 어떻게 지속적으로 모니터링할 수 있을까요?", "choices": ["ec2-managedinstance-applications-required 관리형 규칙을 사용하여 조직 전체에서 AWS Config를 사용하고 애플리케이션 이름을 지정합니다.", "승인된 AMI 사용 규칙을 조직 전체에 적용합니다.", "Distributor 패키지를 사용하고 출력을 검토하세요.", "시스템 관리자 애플리케이션 관리자 인벤토리 필터링을 사용합니다."], "answer": "A", "multi": false, "explanation": "Continuous monitoring requires an always-on compliance service that evaluates resources over time. AWS Config provides managed rules that assess configuration state and compliance continuously. AWS Certified Security - Specialty guidance highlights AWS Config for continuous compliance across accounts and regions when used with AWS Organizations. The ec2- managedinstance-applications- required managed rule evaluates whether specifie d software is installed on managed instances, leveraging Systems Manager inventory/managed instance status. By enabling AWS Config organization-wide and deploying this managed rule across all accounts, the company can continuously evaluate both existing and newly launched instances for required application presence. This provides a consistent compliance dashboard and history of compliance changes. Option D can provide inventory lists, but it is not a compliance rule engine that flags noncompliance with the same governance reporting and remediation pathways. Options B and C are operational approaches but do not provide continuous compliance state across the organization."},
  {"id": 80, "text": "한 회사가 EC2 Auto Scaling 인스턴스의 Apache 로그를 1년 보존 기간의 CloudWatch Logs 로그 그룹으로 전송합니다. 로그에 의심스러운 IP 주소가 나타났습니다. 보안 엔지니어는 지난 한 주간의 로그를 분석하여 해당 IP 주소에서 발생한 요청 수와 요청된 URL 목록을 작성해야 합니다. 엔지니어는 최소한의 노력으로 무엇을 해야 할까요?", "choices": ["S3로 내보내고 Macie를 사용하세요.", "OpenSearch로 스트리밍하고 분석합니다.", "CloudWatch Logs Insights를 쿼리와 함께 사용하세요.", "S3로 내보내고 AWS Glue를 사용하세요."], "answer": "C", "multi": false, "explanation": "CloudWatch Logs Insights is a managed, on-demand query capability designed to search and analyze log data stored in CloudWatch Logs without moving the data elsewhere. AWS Certified Security - Specialty documentation highlights Logs Insights as the lowest-effort method for rapid investigations, because it supports filtering, parsing, aggregation, and time- range queries directly over existing log groups. In this scenario, the logs already exist in CloudWatch Logs with sufficient retention. The engineer can write a query that filters for the suspicious IP address, counts occurrences over the last 7 days, and extracts requested URLs using parsing functions. This satisfies both requirements (count and URLs) immediately, without building pipelines or exporting data. Option B adds operational overhead by provisioning and maintaining OpenSearch ingestion and indexing. Options A and D require exporting data and additional services that are not necessary for a one-week forensic query. Therefore, Logs Insights is the most efficient and cost-effective approach."},
  {"id": 81, "text": "한 기업에서 자사의 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터에 대한 무단 접근을 탐지해야 합니다. 이 솔루션은 기존 EKS 배포 환경에 추가적인 구성을 요구하지 않아야 합니다. 어떤 솔루션이 최소한의 운영 노력으로 이러한 요구 사항을 충족할까요?", "choices": ["타사 보안 추가 기능을 설치하세요.", "AWS Security Hub를 활성화하고 Kubernetes 검색 결과를 모니터링합니다.", "EKS에 대한 CloudWatch Container Insights 메트릭을 모니터링합니다.", "Amazon GuardDuty를 활성화하고 EKS 감사 로그 모니터링을 사용하십시오."], "answer": "D", "multi": false, "explanation": "Amazon GuardDuty provides managed threat detection and supports EKS protection features that analyze Kubernetes audit logs to detect suspicious activity, including unauthorized or unauthenticated access attempts. AWS Certified Security - Specialty documentation recommends GuardDuty for low-overhead detection because it is fully managed and does not require deploying agents or modifying application code. EKS Audit Log Monitoring is designed to consume and analyze relevant control plane audit events to identify anomalous or unauthorized actions against the cluster. Compared to third-party add- ons, GuardDuty reduces operational burden and remains fully within AWS managed services. Security Hub aggregates findings from services like GuardDuty but does not itself perform the detection. CloudWatch Container Insights focuses on performance and operational metrics, not authentication security detections. Therefore, enabling GuardDuty with EKS Audit Log Monitoring provides the required detection with the least operational effort and without requiring additional configuration to the existing EKS workload beyond enabling the feature."},
  {"id": 82, "text": "보안 엔지니어가 VPC에서 민감한 워크로드를 실행하는 Amazon EC2 인스턴스 클러스터에 대한 보안 제어를 설계하고 있습니다. 이 엔지니어는 EC2 인스턴스에서 소프트웨어 취약점을 탐지하고 완화하는 솔루션을 구현해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["Amazon Inspector를 사용하여 EC2 인스턴스를 검사합니다. AWS Systems Manager Patch Manager를 사용하여 보안 패치 및 업데이트를 적용합니다.", "각 EC2 인스턴스에 호스트 기반 방화벽 및 바이러스 백신 소프트웨어를 설치합니다. AWS Systems Manager 실행 명령을 사용하여 방화벽 및 바이러스 백신 소프트웨어를 업데이트합니다.", "EC2 인스턴스에 Amazon CloudWatch 에이전트를 설치합니다. 자세한 로깅을 활성화합니다. Amazon EventBridge를 사용하여 소프트웨어 로그를 검토하여 이상 징후를 확인합니다.", "Amazon GuardDuty 맬웨어 방지 기능을 사용하여 EC2 인스턴스를 검사합니다. AWS Systems Manager 패치 관리자를 사용하여 보안 패치 및 업데이트를 적용합니다."], "answer": "A", "multi": false, "explanation": "Amazon Inspector is a security service that helps detect vulnerabilities and unintended network exposure on Amazon EC2 instances. It automatically scans instances for known software vulnerabilities and provides recommendations to mitigate them. AWS Systems Manager Patch Manager complements Amazon Inspector by automating the process of applying security patches and updates to maintain the security of the EC2 fleet. This combination provides a comprehensive solution for both vulnerability detection and patching, aligning with the security engineer's requirement."},
  {"id": 83, "text": "한 회사가 AWS Secrets Manager에 민감한 데이터를 저장하고 있습니다. 보안 엔지니어는 비정상적인 GetSecretValue API 호출이 발생할 경우 알림 이메일을 생성하는 솔루션을 설계해야 합니다. 보안 엔지니어는 AWS CloudTrail에서 제공하는 모든 Secrets Manager 이벤트에 대해 Amazon EventBridge 규칙을 구성했습니다. 이러한 요구 사항을 충족하는 솔루션은 무엇일까요?", "choices": ["EventBridge 규칙의 대상으로 CloudTrail을 구성합니다. IncomingBytes 속성에 속성 필터를 설정하고 이상 감지를 활성화합니다. Amazon Simple Notification Service(Amazon SNS) 토픽을 생성합니다. 해당 SNS 토픽을 사용하여 알림을 전송하는 CloudTrail 알람을 구성합니다.", "EventBridge 규칙의 대상으로 CloudTrail을 구성합니다. IncomingBytes 속성에 속성 필터를 설정하고 이상 감지를 활성화합니다. Amazon Simple Queue Service(Amazon SQS) 큐를 생성합니다. SQS 큐를 사용하여 알림을 보내도록 CloudTrail 알람을 구성합니다.", "EventBridge 규칙의 대상으로 Amazon CloudWatch Logs를 구성합니다. IncomingBytes 메트릭에 대한 메트릭 필터를 설정하고 이상 감지를 활성화합니다. Amazon Simple Notification Service(Amazon SNS) 토픽을 생성합니다. SNS 토픽을 사용하여 알림을 전송하는 CloudWatch 알람을 구성합니다.", "EventBridge 규칙의 대상으로 Amazon CloudWatch Logs를 구성합니다. CloudWatch Logs Insights 쿼리 구문을 사용하여 비정상적인 GetSecretValue API 호출을 검색합니다. Amazon Simple Queue Service(Amazon SQS) 큐를 생성합니다. SQS 큐를 사용하여 알림을 전송하는 CloudWatch 알람을 구성합니다."], "answer": "C", "multi": false, "explanation": "To monitor for anomalous GetSecretValue API calls and trigger notifications, the solution needs to capture the relevant events, filter them for anomalies, and send alerts. By using Amazon CloudWatch Logs as the target for the EventBridge rule, the security engineer can create a CloudWatch Logs metric filter on relevant API call data (such as IncomingBytes), enabling anomaly detection to spot unusual activity. Then, an Amazon SNS topic can be configured to distribute alerts when a CloudWatch alarm (based on the metric filter) is triggered. This setup is efficient for detecting anomalous patterns in API calls and notifying the team via email."},
  {"id": 84, "text": "보안 엔지니어가 개발팀과 협력하여 민감한 재고 데이터를 아마존 S3 버킷에 저장하는 공급망 애플리케이션을 설계하고 있습니다. 이 애플리케이션은 AWS 키 관리 서비스(AWS KMS) 고객 관리 키를 사용하여 아마존 S3에 저장된 데이터를 암호화합니다. Amazon S3에 저장된 재고 데이터는 수백 개의 공급업체와 공유될 예정입니다. 모든 공급업체는 각자의 AWS 계정에서 발급받은 AWS 보안 주체를 사용하여 Amazon S3의 데이터에 접근합니다. 공급업체 목록은 매주 변경될 수 있습니다. 보안 엔지니어는 계정 간 접근을 지원하는 솔루션을 찾아야 합니다. 고객 관리 키에 대한 접근 제어를 관리하는 데 있어 운영 효율성이 가장 높은 솔루션은 무엇입니까?", "choices": ["KMS 권한을 사용하여 키 액세스를 관리합니다. 프로그램 방식으로 권한을 생성하고 취소하여 공급업체 액세스를 관리합니다.", "IAM 역할을 사용하여 주요 액세스를 관리합니다. IAM 역할 정책을 프로그래밍 방식으로 업데이트하여 공급업체 액세스를 관리합니다.", "KMS 키 정책을 사용하여 키 액세스를 관리합니다. 프로그램 방식으로 KMS 키 정책을 업데이트하여 공급업체 액세스를 관리합니다.", "IAM 역할을 사용하여 키 액세스를 관리함으로써 AWS 계정 간에 위임된 액세스를 사용합니다. 계정 간 공급업체 액세스를 관리하기 위해 IAM 신뢰 정책을 프로그래밍 방식으로 업데이트합니다."], "answer": "A", "multi": false, "explanation": "KMS grants provide a scalable and efficient way to manage access to AWS KMS customer- managed keys, especially for cross-account access. Grants allow you to specify who can use the key and what operations they can perform on it without needing to modify the KMS key policy itself. Grants are flexible and can be created, modified, and revoked programmatically, making them ideal for situations where the vendor list changes frequently. This approach minimizes operational overhead while allowing the security engineer to dynamically control access to the KMS key as vendor requirements change."},
  {"id": 85, "text": "한 회사가 애플리케이션 로드 밸런서(ALB) 뒤에 있는 Amazon EC2 인스턴스 클러스터에서 애플리케이션을 운영하고 있습니다. 보안 엔지니어는 VPN을 사용하지 않고 애플리케이션에 안전하게 접근할 수 있도록 해야 합니다. 사용자는 특정 보안 조건(정의된 디바이스 상태 포함)을 충족하는 경우에만 애플리케이션에 접근할 수 있어야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇일까요?", "choices": ["AWS WAF 웹 ACL을 생성합니다. 정의된 장치 상태와 일치하지 않는 트래픽을 차단하도록 사용자 지정 응답을 구성합니다.", "AWS 검증된 액세스를 구성합니다. ALB용 엔드포인트를 생성하여 애플리케이션을 추가합니다.", "Amazon 검증 권한을 구성합니다. 정책 기반 액세스 제어(PBAC) 정책을 사용하여 권한 부여를 수행합니다.", "Amazon 검증 권한을 구성합니다. ALB용 엔드포인트를 생성하여 애플리케이션을 추가합니다."], "answer": "B", "multi": false, "explanation": "AWS Verified Access allows secure access to applications without requiring a VPN, using a zero- trust model to enforce security conditions, including device posture and identity verification. By configuring Verified Access and adding an endpoint for the Application Load Balancer (ALB), the security engineer can ensure that only users who meet specific security conditions can access the application. Verified Access is designed to meet this use case by providing secure access controls based on device posture and other conditions."},
  {"id": 86, "text": "한 회사가 Amazon CloudWatch Logs 로그 그룹에 저장된 데이터를 90일 동안 보존해야 합니다. 또한 로그 그룹 보존 기간이 이 요구 사항을 준수하지 않을 경우 AWS Security Hub에서 알림을 받아야 합니다. 어떤 솔루션이 적절한 알림 기능을 제공할까요?", "choices": ["로그 그룹 보존 기간을 평가하기 위한 보안 허브 사용자 지정 작업을 생성합니다.", "CloudWatch Logs에서 로그 그룹 보존 기간을 평가하기 위한 데이터 보호 정책을 생성합니다.", "보안 허브 자동화 규칙을 생성합니다. 로그 그룹 보존 기간을 평가하도록 자동화 규칙을 구성합니다.", "로그 그룹 보존 기간을 평가하는 AWS Config 관리형 규칙을 사용하십시오. Security Hub에서 AWS Config 통합이 활성화되어 있는지 확인하십시오."], "answer": "D", "multi": false, "explanation": "AWS Config provides managed rules that can assess various configurations, including the retention period of CloudWatch Logs log groups. By enabling the appropriate AWS Config managed rule to check if the log groups have a retention period of 90 days, the company can automatically monitor compliance with this requirement. Integrating AWS Config with AWS Security Hub allows non-compliant findings to be sent to Security Hub, providing the necessary notifications when the retention period is not compliant."},
  {"id": 87, "text": "한 회사가 AWS Organizations에서 회사 조직 외부의 IAM ID와 Amazon S3 객체가 공유되는 것을 방지해야 합니다. 보안 엔지니어가 이 목표를 달성하기 위해 SCP(보안 솔루션)를 생성 및 배포하고 있습니다. 이 회사는 모든 S3 버킷에 대해 S3 공개 액세스 차단 기능을 활성화했습니다. 이러한 요구 사항을 충족하기 위해 SCP는 어떤 작업을 수행해야 할까요?", "choices": ["StringNotEquals 연산자, aws:ResourceOrgID 키, S{aws PrincipalOrgID} 값으로 구성된 조건 요소를 사용하여 S3:* 작업을 거부합니다.", "StringLike 연산자, aws:PrincipalArn 키, 외부 IAM 주체 값으로 구성된 조건 요소를 사용하여 S3:PutAccountPublicAccessBlock 작업을 거부합니다.", "StringNotEquals 연산자, aws:PrincipalOrgID 키, S {aws:PrincipalOrgID} 값으로 구성된 조건 요소를 사용하여 S3:* 작업을 허용합니다.", "StringLike 연산자, aws:PrincipalArn 키, 그리고 외부 IAM 보안 주체 값으로 구성된 조건 요소를 사용하여 S3:* 작업을 거부합니다."], "answer": "A", "multi": false, "explanation": "To restrict access to Amazon S3 objects so that they are only accessible by IAM identities within the company's AWS Organization, the SCP should deny access to any S3:* action where the resource's organization ID (aws:ResourceOrgID) does not match the principal's organization ID (aws:PrincipalOrgID). Using StringNotEquals ensures that only IAM identities within the organization can access the S3 objects. If the resource and principal organization IDs are different, access will be denied."},
  {"id": 88, "text": "보안 엔지니어가 SAML 2.0을 사용한 페더레이션 액세스로 다중 계정 환경에 대한 인증을 구현하고 있습니다. 보안 엔지니어는 AWS IAM Identity Center를 ID 공급자(IdP)로 구성했으며, AWS 계정에 대한 액세스 권한을 부여하는 IAM 역할도 생성했습니다. 연동된 사용자가 새 시스템에 인증을 시도할 때 인증 실패를 보고합니다. 보안 엔지니어는 운영 효율성을 극대화하면서 이 문제를 해결하기 위해 무엇을 해야 할까요?", "choices": ["SAML IdP 로그를 검토하여 오류를 파악하십시오. AWS CloudTrail을 확인하여 사용자가 수행한 API 호출을 검증하십시오.", "SAML IdP 로그를 검토하여 오류를 식별합니다. IAM 정책 시뮬레이터를 사용하여 IAM 역할에 대한 액세스 권한을 검증합니다.", "IAM 액세스 어드바이저를 사용하여 최근 서비스 액세스를 검토하십시오. IAM 정책 시뮬레이터를 사용하여 IAM 역할에 대한 액세스 권한을 검증하십시오.", "사용자가 겪고 있는 동작을 확인하기 위해 별도의 계정에서 SAML IdP를 다시 생성하십시오."], "answer": "A", "multi": false, "explanation": "When troubleshooting SAML-based authentication issues, it's essential to review the logs from the SAML identity provider (IdP) to identify potential errors or misconfigurations in the authentication flow. Additionally, AWS CloudTrail logs provide insights into the API calls made by the user, allowing the security engineer to verify if the authentication attempt reached AWS and identify any issues at that level. This approach is operationally efficient because it focuses on the primary logs related to authentication without recreating the setup or simulating access."},
  {"id": 89, "text": "한 회사가 AWS Lambda 함수를 사용하는 새로운 서버리스 애플리케이션을 개발하고 있습니다. 이 회사는 AWS CloudFormation을 사용하여 Lambda 함수를 배포합니다. 회사 개발자들이 배포된 Lambda 함수를 디버깅하려고 하는데, 해당 함수가 Amazon CloudWatch Logs에 출력을 기록하지 않아 디버깅이 불가능합니다. 보안 엔지니어는 이 문제를 해결하기 위해 어떤 조치들을 조합하여 취해야 할까요? (두 가지를 선택하세요.)", "choices": ["CloudFormation 템플릿에 정의되어 Lambda 함수에 전달되는 역할을 확인하십시오. 서비스 주체 lambda amazonaws.com에 의해 sts:AssumeRole 작업이 허용되는 신뢰 정책이 역할에 있는지 확인하십시오.", "Lambda 함수에 대한 CloudFormation 템플릿에 구성된 실행 역할을 확인하십시오. 실행 역할에 CloudWatch Logs에 기록할 수 있는 필요한 권한이 있는지 확인하십시오.", "CloudFormation 템플릿에서 Lambda 함수 구성을 확인하세요. Lambda 함수에 AWS X- Ray 추적 구성이 활성 모드 또는 통과 모드로 설정되어 있는지 확인하세요.", "Lambda 함수에 대해 CloudFormation 템플릿에 구성된 리소스 정책을 확인하십시오. 리소스 정책에 CloudWatch Logs에 기록할 수 있는 필요한 권한이 있는지 확인하십시오.", "개발자가 Lambda 함수를 디버깅하는 데 사용하는 역할을 확인하세요. 해당 역할에 서비스 주체 lambda.amazonaws.com에 대한 sts:AssumeRole 작업을 허용하는 신뢰 정책이 있는지 확인하세요."], "answer": "A,B", "multi": true, "explanation": "For a Lambda function to run, the execution role assigned to it must have a trust policy that allows AWS Lambda (lambda.amazonaws.com) to assume the role. This ensures that the Lambda service can use the permissions associated with that role. The execution role also needs explicit permissions to write logs to Amazon CloudWatch Logs. Without these permissions, the Lambda function cannot create or update log streams in CloudWatch, which is necessary for logging output."},
  {"id": 90, "text": "한 회사가 협업 애플리케이션을 사용하고 있습니다. 보안 엔지니어는 해당 애플리케이션에 대해 us-west-2 리전의 AWS Security Hub에서 자동 알림을 구성해야 합니다. 보안 엔지니어는 Security Hub에서 새로운 탐지 사항이 감지될 때마다 애플리케이션 내 채널로 알림을 받고 싶어합니다. 보안 엔지니어는 메시지를 애플리케이션에서 요구하는 형식으로 변환하는 AWS Lambda 함수를 생성합니다. 이 Lambda 함수는 또한 해당 메시지를 애플리케이션의 API로 전송합니다. 보안 엔지니어는 Lambda 함수를 대상으로 지정하는 Amazon EventBridge 규칙을 구성합니다. EventBridge 규칙을 구현한 후 채널에서 Security Hub로부터 지속적으로 알림이 수신되기 시작합니다. 이러한 알림 중 상당수는 조치가 필요 없는 Amazon Inspector 알림입니다. 보안 엔지니어는 Amazon Inspector 알림 수신을 중지하려고 합니다. 어떤 솔루션이 최소한의 운영 노력으로 이 요구 사항을 충족할까요?", "choices": ["Amazon Inspector에서 발생하는 이벤트의 패턴 일치 항목을 찾고 결과를 숨기도록 Lambda 함수 코드를 업데이트합니다.", "Amazon Inspector를 제외한 모든 서비스의 결과를 EventBridge 이벤트 버스로 자동으로 전송하는 Security Hub 사용자 지정 작업을 생성합니다.", "EventBridge 규칙의 이벤트 패턴에서 ProductArn 속성 값을 다음과 같이 수정합니다. \"anything-but\": [\"arn:aws:securityhub:us-west-2::product/ aws/inspector\"].", "애플리케이션으로 메시지를 전송하기 위해 Amazon Simple Notification Service(Amazon SNS) 토픽을 생성합니다. 토픽 구독에 필터 정책을 설정하여 product/aws/inspector 문자열이 포함된 메시지를 거부합니다."], "answer": "C", "multi": false, "explanation": "To filter out specific findings, such as those from Amazon Inspector, EventBridge event patterns can be used to selectively route events. By updating the ProductArn attribute in the event pattern with anything-but for Amazon Inspector's ProductArn (arn:aws:securityhub:us- west- ), only findings from other services will trigger the Lambda function. This approach allows the security engineer to filter 2::product/aws/inspector out unnecessary alerts with minimal operational effort, avoiding the need for additional filtering in Lambda or SNS."},
