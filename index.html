<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SCS-C03 모의고사</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1a2236; --border:#1e3a5f;
    --accent:#00d4ff; --accent2:#ff6b35; --success:#00e676; --error:#ff1744;
    --warning:#ffd600; --text:#e8f0fe; --text2:#8bacd0; --text3:#4a6680;
  }
  * { margin:0; padding:0; -webkit-box-sizing:border-box; box-sizing:border-box; }
  html, body { -webkit-text-size-adjust:100%; }
  body {
    font-family:'Noto Sans KR',sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh;
    display:-webkit-flex; display:flex;
    -webkit-flex-direction:column; flex-direction:column;
    -webkit-align-items:center; align-items:center;
    padding:20px;
  }
  .header {
    width:100%; max-width:900px;
    display:-webkit-flex; display:flex;
    -webkit-align-items:center; align-items:center;
    -webkit-justify-content:space-between; justify-content:space-between;
    padding:16px 0 20px; border-bottom:1px solid var(--border); margin-bottom:24px;
  }
  .logo { display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; gap:10px; }
  .logo-badge { background:-webkit-linear-gradient(135deg,#ff6b35,#ff9800); background:linear-gradient(135deg,#ff6b35,#ff9800); color:#fff; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; padding:4px 10px; border-radius:4px; letter-spacing:1px; }
  .logo-text { font-size:15px; font-weight:700; color:var(--text); }
  .stats-bar { display:-webkit-flex; display:flex; gap:16px; -webkit-align-items:center; align-items:center; }
  .stat { display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; -webkit-align-items:center; align-items:center; gap:2px; }
  .stat-val { font-family:'JetBrains Mono',monospace; font-size:17px; font-weight:700; color:var(--accent); }
  .stat-lbl { font-size:10px; color:var(--text3); letter-spacing:0.5px; text-transform:uppercase; }
  .stat-sep { width:1px; height:28px; background:var(--border); }

  /* ───── START SCREEN ───── */
  #startScreen { max-width:900px; width:100%; padding:20px 0; }
  .start-title { font-size:26px; font-weight:900; text-align:center; margin-bottom:8px; background:-webkit-linear-gradient(135deg,var(--accent),#7b8cff); background:linear-gradient(135deg,var(--accent),#7b8cff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .start-sub { color:var(--text2); font-size:13px; text-align:center; margin-bottom:28px; line-height:1.6; }
  .section-label { margin-bottom:12px; font-size:12px; color:var(--text2); font-weight:700; letter-spacing:0.5px; text-transform:uppercase; }

  /* 프리셋 카드 */
  .options-grid { display:-webkit-flex; display:flex; -webkit-flex-wrap:wrap; flex-wrap:wrap; gap:10px; margin-bottom:14px; }
  .opt-card {
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:12px; padding:14px 10px; cursor:pointer;
    -webkit-transition:all 0.2s; transition:all 0.2s;
    text-align:center; -webkit-flex:1; flex:1; min-width:70px;
    -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;
    touch-action:manipulation; font-family:'Noto Sans KR',sans-serif;
    color:var(--text); -webkit-appearance:none; appearance:none; outline:none;
  }
  .opt-card:active { opacity:0.7; }
  .opt-card.selected { border-color:var(--accent); background:rgba(0,212,255,0.1); -webkit-box-shadow:0 0 14px rgba(0,212,255,0.2); box-shadow:0 0 14px rgba(0,212,255,0.2); }
  .opt-num { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--accent); margin-bottom:3px; }
  .opt-label { font-size:11px; color:var(--text2); }
  .opt-card .num-input-inline {
    background:var(--surface2); border:1.5px solid var(--border); border-radius:8px;
    color:var(--text); font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700;
    padding:5px 8px; width:64px; text-align:center; outline:none; margin-top:4px;
    -webkit-appearance:none; appearance:none; touch-action:manipulation;
  }
  .opt-card .num-input-inline:focus { border-color:var(--accent); }

  /* 범위 지정 */
  .custom-range-row {
    display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center;
    -webkit-flex-wrap:wrap; flex-wrap:wrap; gap:8px;
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:12px; padding:12px 16px; margin-bottom:18px;
  }
  .custom-range-row.active { border-color:var(--accent); background:rgba(0,212,255,0.06); }
  .custom-range-row label { font-size:12px; color:var(--text2); font-weight:700; white-space:nowrap; }
  .range-inputs { display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; gap:6px; -webkit-flex-wrap:wrap; flex-wrap:wrap; }
  .range-inputs span { color:var(--text3); font-size:12px; }
  .num-input { background:var(--surface2); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700; padding:7px 8px; width:62px; text-align:center; outline:none; -webkit-appearance:none; appearance:none; }
  .num-input:focus { border-color:var(--accent); }
  .range-preview { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent); }
  .range-error { font-size:12px; color:var(--error); }

  /* ── 문제 선택 그리드 ── */
  .qselect-header {
    display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center;
    -webkit-justify-content:space-between; justify-content:space-between;
    margin-bottom:10px; -webkit-flex-wrap:wrap; flex-wrap:wrap; gap:8px;
  }
  .qselect-count { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent); font-weight:700; }
  .qselect-actions { display:-webkit-flex; display:flex; gap:6px; }
  .btn-xs {
    font-family:'Noto Sans KR',sans-serif; font-size:11px; font-weight:700;
    border:1px solid var(--border); border-radius:6px; padding:5px 10px;
    background:transparent; color:var(--text2); cursor:pointer;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
    -webkit-appearance:none; appearance:none;
  }
  .btn-xs:active { opacity:0.7; }
  .btn-xs.accent { border-color:var(--accent); color:var(--accent); }
  .btn-xs.danger { border-color:var(--error); color:var(--error); }

  .qgrid {
    display:-webkit-flex; display:flex; -webkit-flex-wrap:wrap; flex-wrap:wrap;
    gap:6px; margin-bottom:20px;
    max-height:220px; overflow-y:auto; -webkit-overflow-scrolling:touch;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:14px;
  }
  .qbtn {
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
    width:40px; height:34px; border-radius:7px;
    border:1.5px solid var(--border); background:var(--surface2);
    color:var(--text2); cursor:pointer;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
    -webkit-transition:all 0.12s; transition:all 0.12s;
    -webkit-appearance:none; appearance:none;
    display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center;
  }
  .qbtn:active { opacity:0.6; }
  .qbtn.on { border-color:var(--accent); background:rgba(0,212,255,0.15); color:var(--accent); }

  .btn-start {
    width:100%; background:-webkit-linear-gradient(135deg,var(--accent),#7b8cff); background:linear-gradient(135deg,var(--accent),#7b8cff);
    color:#000; font-family:'Noto Sans KR',sans-serif; font-size:16px; font-weight:700;
    border:none; border-radius:12px; padding:16px; cursor:pointer;
    -webkit-transition:all 0.2s; transition:all 0.2s;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
    -webkit-appearance:none; appearance:none;
  }
  .btn-start:active { opacity:0.8; }
  .btn-start:disabled { opacity:0.4; cursor:not-allowed; }

  /* ───── QUIZ SCREEN ───── */
  #quizScreen { max-width:900px; width:100%; display:none; }
  .quiz-topbar { display:-webkit-flex; display:flex; -webkit-justify-content:space-between; justify-content:space-between; -webkit-align-items:center; align-items:center; margin-bottom:10px; gap:8px; -webkit-flex-wrap:wrap; flex-wrap:wrap; }
  .quiz-left { display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; gap:10px; }
  .q-counter { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent); font-weight:700; }
  .q-timer { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text2); }
  .quiz-right { display:-webkit-flex; display:flex; gap:6px; -webkit-align-items:center; align-items:center; }
  .btn-sm {
    font-family:'Noto Sans KR',sans-serif; font-size:12px; font-weight:700;
    border-radius:7px; padding:7px 11px; cursor:pointer;
    -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;
    touch-action:manipulation; -webkit-appearance:none; appearance:none; outline:none;
  }
  .btn-home { background:transparent; color:var(--text3); border:1px solid var(--border); }
  .btn-home:active { opacity:0.7; }
  .btn-midcheck { background:rgba(255,214,0,0.12); color:var(--warning); border:1px solid rgba(255,214,0,0.3); }
  .btn-midcheck:active { background:rgba(255,214,0,0.25); }

  .progress-bar { height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; margin-bottom:14px; }
  .progress-fill { height:100%; background:-webkit-linear-gradient(left,var(--accent),#7b8cff); background:linear-gradient(90deg,var(--accent),#7b8cff); border-radius:2px; -webkit-transition:width 0.4s ease; transition:width 0.4s ease; }

  .q-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:22px 22px; margin-bottom:14px; }
  .q-tags { display:-webkit-flex; display:flex; gap:6px; margin-bottom:12px; -webkit-flex-wrap:wrap; flex-wrap:wrap; }
  .q-tag { font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; padding:3px 9px; border-radius:4px; background:rgba(0,212,255,0.1); color:var(--accent); border:1px solid rgba(0,212,255,0.2); }
  .q-tag.multi { background:rgba(255,107,53,0.1); color:var(--accent2); border-color:rgba(255,107,53,0.2); }
  .q-text { font-size:14px; line-height:1.9; color:var(--text); white-space:pre-wrap; word-break:keep-all; }

  .choices-list { display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; gap:8px; margin-bottom:14px; }
  .choice-btn {
    background:var(--surface2); border:1.5px solid var(--border); border-radius:10px;
    padding:13px 14px; text-align:left; cursor:pointer;
    -webkit-transition:border-color 0.15s,background 0.15s; transition:border-color 0.15s,background 0.15s;
    display:-webkit-flex; display:flex; -webkit-align-items:flex-start; align-items:flex-start;
    gap:10px; color:var(--text); font-family:'Noto Sans KR',sans-serif;
    font-size:14px; line-height:1.7; width:100%;
    -webkit-tap-highlight-color:transparent; -webkit-appearance:none; appearance:none;
    touch-action:manipulation; word-break:keep-all;
  }
  .choice-btn:active { opacity:0.75; }
  .choice-btn.selected { border-color:var(--accent); background:rgba(0,212,255,0.1); }
  .choice-btn.correct { border-color:var(--success); background:rgba(0,230,118,0.1); color:var(--success); }
  .choice-btn.wrong { border-color:var(--error); background:rgba(255,23,68,0.1); color:#ff6b6b; }
  .choice-btn.reveal-correct { border-color:var(--success); background:rgba(0,230,118,0.06); }
  .choice-label { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:12px; min-width:18px; color:var(--text2); padding-top:2px; -webkit-flex-shrink:0; flex-shrink:0; }
  .choice-btn.correct .choice-label, .choice-btn.reveal-correct .choice-label { color:var(--success); }
  .choice-btn.wrong .choice-label { color:var(--error); }
  .choice-btn.selected .choice-label { color:var(--accent); }

  .feedback-box { margin-top:4px; padding:11px 14px; border-radius:10px; font-size:13px; line-height:1.6; display:none; }
  .feedback-box.correct-fb { background:rgba(0,230,118,0.08); border:1px solid rgba(0,230,118,0.25); color:var(--success); display:block; }
  .explain-box { margin-top:10px; padding:13px 15px; border-radius:10px; font-size:13px; line-height:1.7; display:none; background:var(--surface2); border:1px solid var(--border); color:var(--text2); }
  .explain-box.show { display:block; }
  .explain-box .explain-title { font-size:11px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }
  .feedback-box.wrong-fb { background:rgba(255,23,68,0.08); border:1px solid rgba(255,23,68,0.25); color:#ff6b6b; display:block; }

  .action-row { display:-webkit-flex; display:flex; gap:8px; -webkit-justify-content:space-between; justify-content:space-between; -webkit-align-items:center; align-items:center; margin-top:12px; }
  .action-left { display:-webkit-flex; display:flex; gap:8px; }
  .action-right { display:-webkit-flex; display:flex; gap:8px; }
  .btn {
    font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700;
    border:none; border-radius:8px; padding:11px 20px; cursor:pointer;
    -webkit-transition:all 0.2s; transition:all 0.2s;
    -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;
    touch-action:manipulation; -webkit-appearance:none; appearance:none;
  }
  .btn-primary { background:-webkit-linear-gradient(135deg,var(--accent),#7b8cff); background:linear-gradient(135deg,var(--accent),#7b8cff); color:#000; }
  .btn-primary:active { opacity:0.8; }
  .btn-primary:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-secondary { background:transparent; color:var(--text2); border:1px solid var(--border); }
  .btn-secondary:active { opacity:0.7; }
  .btn-prev { background:rgba(0,212,255,0.08); color:var(--accent); border:1px solid rgba(0,212,255,0.3); }
  .btn-prev:active { background:rgba(0,212,255,0.18); }
  .btn-prev:disabled { opacity:0.25; cursor:not-allowed; }

  /* ───── MODAL ───── */
  .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.75); z-index:1000; -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center; }
  .modal-overlay.open { display:-webkit-flex; display:flex; }
  .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:26px 24px; max-width:440px; width:90%; text-align:center; margin:auto; }
  .modal-title { font-size:17px; font-weight:900; margin-bottom:8px; color:var(--text); }
  .modal-sub { font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:18px; }
  .modal-actions { display:-webkit-flex; display:flex; gap:10px; -webkit-justify-content:center; justify-content:center; }
  .mid-grid { display:-webkit-flex; display:flex; gap:8px; margin-bottom:18px; }
  .mid-stat { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 8px; -webkit-flex:1; flex:1; }
  .mid-stat-val { font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; margin-bottom:3px; }
  .mid-stat-val.green { color:var(--success); }
  .mid-stat-val.red { color:var(--error); }
  .mid-stat-val.orange { color:var(--accent2); }
  .mid-stat-lbl { font-size:11px; color:var(--text3); }

  /* ───── RESULT SCREEN ───── */
  #resultScreen { max-width:900px; width:100%; display:none; text-align:center; }
  .result-score-ring { margin:24px auto 20px; position:relative; width:130px; height:130px; }
  .result-score-ring svg { width:130px; height:130px; -webkit-transform:rotate(-90deg); transform:rotate(-90deg); }
  .result-score-ring .ring-bg { fill:none; stroke:var(--surface2); stroke-width:10; }
  .result-score-ring .ring-fill { fill:none; stroke:var(--accent); stroke-width:10; stroke-linecap:round; -webkit-transition:stroke-dashoffset 0.8s ease; transition:stroke-dashoffset 0.8s ease; }
  .ring-label { position:absolute; top:50%; left:50%; -webkit-transform:translate(-50%,-50%); transform:translate(-50%,-50%); text-align:center; }
  .ring-pct { font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:700; color:var(--accent); }
  .ring-grade { font-size:11px; color:var(--text2); margin-top:2px; }
  .result-title { font-size:19px; font-weight:900; margin-bottom:6px; color:var(--text); }
  .result-sub { color:var(--text2); font-size:13px; margin-bottom:20px; line-height:1.5; }
  .result-grid { display:-webkit-flex; display:flex; gap:8px; margin-bottom:20px; }
  .result-stat { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 6px; -webkit-flex:1; flex:1; }
  .result-stat-val { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; margin-bottom:3px; }
  .result-stat-val.green { color:var(--success); }
  .result-stat-val.red { color:var(--error); }
  .result-stat-val.blue { color:var(--accent); }
  .result-stat-val.orange { color:var(--accent2); }
  .result-stat-lbl { font-size:10px; color:var(--text3); }
  .wrong-list { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; margin-bottom:18px; text-align:left; max-height:320px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .wrong-list-title { font-size:12px; font-weight:700; color:var(--text2); margin-bottom:10px; letter-spacing:0.5px; text-transform:uppercase; }
  .wrong-item { display:-webkit-flex; display:flex; -webkit-align-items:flex-start; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .wrong-item:last-child { border-bottom:none; }
  .wrong-qnum { font-family:'JetBrains Mono',monospace; color:var(--error); font-weight:700; min-width:36px; }
  .wrong-qtext { color:var(--text2); line-height:1.5; word-break:keep-all; }
  .result-actions { display:-webkit-flex; display:flex; gap:8px; -webkit-justify-content:center; justify-content:center; -webkit-flex-wrap:wrap; flex-wrap:wrap; }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--surface2); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span class="logo-badge">AWS</span>
    <span class="logo-text">SCS-C03 모의고사</span>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-val">209</div><div class="stat-lbl">총 문제</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-val">Pro</div><div class="stat-lbl">레벨</div></div>
  </div>
</div>

<!-- ═══ START ═══ -->
<div id="startScreen">
  <div class="start-title">AWS Security Specialty 모의고사</div>
  <div class="start-sub">SCS-C03-KR · 209문제 기출 덤프 · 랜덤 출제 · 즉시 해설</div>

  <!-- 프리셋 -->
  <div class="section-label">빠른 선택</div>
  <div class="options-grid">
    <button class="opt-card" id="card10" type="button" onclick="selectPreset(10,'card10')">
      <div class="opt-num">10</div><div class="opt-label">빠른 테스트</div>
    </button>
    <button class="opt-card selected" id="card20" type="button" onclick="selectPreset(20,'card20')">
      <div class="opt-num">20</div><div class="opt-label">기본</div>
    </button>
    <button class="opt-card" id="card97" type="button" onclick="selectPreset(209,'card97')">
      <div class="opt-num">209</div><div class="opt-label">전체</div>
    </button>
    <button class="opt-card" id="cardCustom" type="button" onclick="focusCustomCount()">
      <div id="customCountDisplay" class="opt-num" style="font-size:14px;line-height:1.4;">직접<br>입력</div>
      <input class="num-input-inline" id="customCountInput" type="number" min="1" max="209" placeholder="1~209"
        onclick="event.stopPropagation()" oninput="onCustomCountInput()" onfocus="onCustomCountFocus()">
    </button>
  </div>

  <!-- 범위 지정 -->
  <div class="custom-range-row" id="customRangeRow">
    <label>범위 지정</label>
    <div class="range-inputs">
      <span>Q</span>
      <input class="num-input" id="rangeFrom" type="number" min="1" max="209" placeholder="1" oninput="onRangeInput()">
      <span>~</span>
      <span>Q</span>
      <input class="num-input" id="rangeTo" type="number" min="1" max="209" placeholder="209" oninput="onRangeInput()">
      <span id="rangePreview" class="range-preview"></span>
    </div>
  </div>

  <!-- 문제 선택 그리드 -->
  <div class="section-label">문제 직접 선택 <span id="selectModeLabel" style="color:var(--accent);font-size:11px;margin-left:6px;">랜덤 출제 모드</span></div>
  <div class="qselect-header">
    <span class="qselect-count" id="qselectCount">선택: 209 / 209</span>
    <div class="qselect-actions">

<script>
var ALL_QUESTIONS = [
  {"id": 1, "text": "보안 관리자가 새 AWS 계정을 설정하고 있습니다. 이 관리자는 회사가 Amazon S3 버킷에 저장하는 데이터를 보호하고자 합니다. 또한 의도치 않은 데이터 노출 가능성과 S3 버킷에 있는 객체의 잘못된 구성 가능성을 줄이고자 합니다. 어떤 솔루션이 운영 부담을 최소화하면서 이러한 요구 사항을 충족할까요?", "choices": ["AWS 계정에 대한 S3 공개 액세스 차단 기능을 구성합니다.", "버킷에 있는 모든 객체에 대해 S3 공개 액세스 차단 기능을 구성합니다.", "버킷에 있는 객체에 대한 ACL을 비활성화합니다.", "Amazon S3 버킷에 액세스하려면 AWS PrivateLink를 사용하세요."], "answer": "A", "multi": false, "explanation": "Amazon S3 Block Public Access configured at the AWS account level is the recommended and most effective approach to protect data stored in Amazon S3 while minimizing operational overhead. AWS Security Specialty documentation explains that S3 Block Public Access provides centralized, preventative controls designed to block public access to S3 buckets and objects regardless of individual bucket policies or object-level ACL configurations. When enabled at the account level, these controls automatically apply to all existing and newly created buckets, significantly reducing the risk of accidental exposure caused by misconfigured permissions. The AWS Certified Security - Specialty Study Guide emphasizes that public access misconfiguration is a leading cause of data leaks in cloud environments. Account-level S3 Block Public Access acts as a guardrail by overriding any attempt to grant public permissions through bucket policies or ACLs. This eliminates the need to manage security settings on a per-bucket or per-object basis, thereby reducing administrative complexity and human error. Configuring Block Public Access at the object level, as in option B, requires continuous monitoring and manual configuration, which increases operational overhead. Disabling ACLs alone, as described in option C, does not fully prevent public access because bucket policies can still allow public permissions. Using AWS PrivateLink, as in option D, controls network access but does not protect against public exposure through misconfigured S3 policies. AWS security best practices explicitly recommend enabling S3 Block Public Access at the account level as the primary mechanism for preventing unintended public data exposure with minimal management effort."},
  {"id": 2, "text": "한 회사의 개발자들이 AWS Lambda 함수 URL을 사용하여 함수를 직접 호출하고 있습니다. 회사는 개발자들이 프로덕션 계정에 인증되지 않은 함수를 구성하거나 배포할 수 없도록 해야 합니다. 회사는 AWS Organizations를 사용하여 이 요구 사항을 충족하고자 합니다. 이 솔루션은 개발자에게 추가적인 작업을 요구하지 않아야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["개발자가 다른 도메인에서 함수를 호출할 때 CORS(교차 출처 리소스 공유)를 지원하도록 모든 함수 URL을 구성하도록 요구합니다.", "AWS WAF 위임 관리자 계정을 사용하여 프로덕션 계정에서 함수를 사용하는 계정의 OU를 기반으로 함수 URL에 대한 인증되지 않은 액세스를 보고 차단할 수 있습니다.", "SCP를 사용하여 lambda:FunctionUrlAuthType 조건 키 값이 AWS_IAM인 모든 lambda:CreateFunctionUrlConfig 및 lambda:UpdateFunctionUrlConfig 작업을 허용합니다.", "SCP를 사용하여 lambda:FunctionUrlAuthType 조건 키 값이 NONE인 모든 lambda:CreateFunctionUrlConfig 및 lambda:UpdateFunctionUrlConfig 작업을 거부합니다."], "answer": "D", "multi": false, "explanation": "AWS Organizations service control policies (SCPs) are designed to enforce preventive guardrails across accounts without requiring application-level changes. According to the AWS Certified Security - Specialty documentation, SCPs can restrict specific API actions or require certain condition keys to enforce security standards centrally. AWS Lambda function URLs support two authentication modes: AWS_IAM and NONE. When the authentication type is set to NONE, the function URL becomes publicly accessible, which introduces a significant security risk in production environments. By using an SCP that explicitly denies the lambda:CreateFunctionUrlConfig and lambda:UpdateFunctionUrlConfig actions when the lambda:FunctionUrlAuthType condition key equals NONE, the organization ensures that unauthenticated function URLs cannot be created or modified in production accounts. This enforcement occurs at the AWS Organizations level and applies automatically to all accounts within the specified organizational units (OUs). Developers are not required to change their workflows or add additional controls, satisfying the requirement of no additional developer effort. Option A relates to browser-based access controls and does not provide authentication or authorization enforcement. Option B is not valid because AWS WAF cannot be attached directly to AWS Lambda function URLs. Option C is incorrect because SCPs do not grant permissions; they only limit permissions. AWS documentation clearly states that SCPs define maximum available permissions and are evaluated before IAM policies. This approach aligns with AWS best practices for centralized governance, least privilege, and preventive security controls."},
  {"id": 3, "text": "보안 엔지니어는 Amazon Elastic Block Store(Amazon EBS) 기반 스토리지를 사용하는 Linux 기반 Amazon EC2 인스턴스에서 의심스러운 활동이 발생했다는 알림을 받았습니다. 해당 인스턴스가 알려진 악성 주소에 연결을 시도하고 있습니다. 해당 인스턴스는 us-east-1 리전의 VPC 내 개발 계정에 있습니다. 이 VPC에는 인터넷 게이트웨이가 있으며 us-east-1a 및 us-east-1b 서브넷이 있습니다. 각 서브넷은 인터넷 게이트웨이를 기본 경로로 사용하는 라우팅 테이블과 연결되어 있습니다. 또한 각 서브넷은 기본 네트워크 ACL을 사용합니다. 의심스러운 EC2 인스턴스는 us-east-1b 서브넷에서 실행 중입니다. 초기 조사 과정에서 보안 엔지니어는 해당 서브넷에서 실행되는 인스턴스가 의심스러운 인스턴스 하나뿐임을 발견했습니다. 어떤 대응이 공격을 즉시 완화하고 근본 원인을 조사하는 데 도움이 될까요?", "choices": ["의심스러운 인스턴스에 로그인하고 netstat 명령을 사용하여 원격 연결을 확인합니다. 이러한 원격 연결의 IP 주소를 사용하여 인스턴스의 보안 그룹에 거부 규칙을 생성합니다. 문제 해결을 위해 인스턴스에 진단 도구를 설치하십시오. 인스턴스 조사 중 첫 번째 규칙으로 us-east-1b 서브넷의 아웃바운드 네트워크 ACL을 업데이트하여 모든 연결을 명시적으로 차단하십시오.", "us-east-1b 서브넷의 아웃바운드 네트워크 ACL을 업데이트하여 첫 번째 규칙으로 모든 연결을 명시적으로 거부하도록 합니다. 기존 보안 그룹을 진단 보안 그룹에서만 연결을 허용하는 새 보안 그룹으로 교체합니다. us-east-1b 서브넷의 아웃바운드 네트워크 ACL에서 모든 연결 거부 규칙을 제거합니다. 진단 도구가 설치된 새 EC2 인스턴스를 시작합니다. 새 보안 그룹을 새 EC2 인스턴스에 할당합니다. 새 EC2 인스턴스를 사용하여 의심스러운 인스턴스를 조사합니다.", "문제가 있는 EC2 인스턴스에 연결된 Amazon Elastic Block Store(Amazon EBS) 볼륨이 인스턴스 종료 시 삭제되지 않도록 합니다. 해당 인스턴스를 종료합니다. 진단 도구가 설치된 새 EC2 인스턴스를 us-east-1a 리전에 시작합니다. 종료된 인스턴스의 EBS 볼륨을 마운트하여 조사합니다.", "의심스러운 인스턴스와의 트래픽을 차단하는 AWS WAF 웹 ACL을 생성합니다. 공격을 완화하기 위해 AWS WAF 웹 ACL을 인스턴스에 연결합니다. 인스턴스에 로그인하여 진단 도구를 설치하고 인스턴스를 조사합니다."], "answer": "C", "multi": false, "explanation": "AWS incident response best practices emphasize immediate containment, preservation of evidence, and safe forensic investigation. According to the AWS Certified Security - Specialty Study Guide, when an EC2 instance is suspected of compromise, security teams should avoid logging in to the instance or installing additional tools, as these actions can alter evidence and increase risk. Terminating the compromised instance after ensuring that its Amazon EBS volumes are preserved prevents further malicious activity immediately. By setting the EBS volumes to not delete on termination, all disk data is retained for forensic analysis. Launching a new, clean EC2 instance in a different subnet or Availability Zone with preinstalled diagnostic tools allows investigators to safely attach and analyze the compromised volumes without executing potentially malicious code. Option A introduces significant risk by logging in to the compromised instance and modifying security controls during active compromise. Option B delays containment and allows continued outbound traffic during investigation steps. Option D is invalid because AWS WAF cannot be attached directly to Amazon EC2 instances and does not control outbound traffic. AWS documentation strongly recommends isolating or terminating compromised resources and performing offline analysis using detached storage volumes. This approach ensures immediate mitigation, preserves forensic integrity, and aligns with AWS incident response frameworks."},
  {"id": 4, "text": "한 회사가 인터넷에 접속할 수 없고 프라이빗 DNS 호스트 이름 옵션이 활성화된 VPC를 보유하고 있습니다. 이 VPC 내에서 Amazon Aurora 데이터베이스가 실행 중입니다. 보안 엔지니어는 AWS Secrets Manager를 사용하여 Aurora 데이터베이스의 자격 증명을 자동으로 갱신하려고 합니다. 보안 엔지니어는 Secrets Manager의 기본 AWS Lambda 자격 증명 갱신 함수가 Aurora 데이터베이스가 사용하는 동일한 VPC 내에서 실행되도록 구성합니다. 하지만 보안 엔지니어는 Lambda 함수가 Secrets Manager 엔드포인트와 통신할 수 없기 때문에 암호를 제대로 변경할 수 없다는 것을 확인했습니다. 보안 엔지니어가 Lambda 함수가 Secrets Manager 엔드포인트와 통신할 수 있도록 하는 가장 안전한 방법은 무엇일까요?", "choices": ["Secrets Manager 엔드포인트에 대한 액세스를 허용하도록 VPC에 NAT 게이트웨이를 추가합니다.", "Secrets Manager 엔드포인트에 대한 액세스를 허용하기 위해 VPC에 게이트웨이 VPC 엔드포인트를 추가합니다.", "Secrets Manager 엔드포인트에 대한 액세스를 허용하기 위해 VPC에 인터페이스 VPC 엔드포인트를 추가합니다.", "VPC에 인터넷 게이트웨이를 추가하여 Secrets Manager 엔드포인트에 대한 액세스를 허용합니다."], "answer": "C", "multi": false, "explanation": "AWS Secrets Manager is a regional service that is accessed through private AWS endpoints. In a VPC without internet access, AWS recommends using AWS PrivateLink through interface VPC endpoints to enable secure, private connectivity to supported AWS services. According to AWS Certified Security - Specialty documentation, interface VPC endpoints allow resources within a VPC to communicate with AWS services without traversing the public internet, NAT devices, or internet gateways. An interface VPC endpoint for Secrets Manager creates elastic network interfaces (ENIs) within the VPC subnets and assigns private IP addresses that route traffic directly to the Secrets Manager service. Because the VPC has private DNS enabled, the standard Secrets Manager DNS hostname resolves to the private IP addresses of the interface endpoint, allowing the Lambda rotation function to communicate securely and transparently. Option A introduces unnecessary complexity and expands the attack surface by allowing outbound internet access. Option B is incorrect because gateway VPC endpoints are supported only for Amazon S3 and Amazon DynamoDB. Option D violates the security requirement by exposing the VPC to the internet. AWS security best practices explicitly recommend interface VPC endpoints as the most secure connectivity method for private VPC workloads accessing AWS managed services."},
  {"id": 5, "text": "보안 엔지니어가 Amazon EC2 인스턴스에서 Amazon CloudWatch로 사용자 지정 애플리케이션 보안 로그를 전달하려고 합니다. 보안 엔지니어는 EC2 인스턴스에 CloudWatch 에이전트를 설치하고 CloudWatch 구성 파일에 로그 경로를 추가합니다. 하지만 CloudWatch는 로그를 수신하지 못합니다. 보안 엔지니어는 EC2 인스턴스에서 awslogs 서비스가 실행 중인지 확인합니다. 보안 엔지니어는 이 문제를 해결하기 위해 다음에 무엇을 해야 할까요?", "choices": ["EC2 인스턴스의 신뢰 정책에 AWS CloudTrail을 추가합니다. 사용자 지정 로그를 CloudWatch 대신 CloudTrail로 보냅니다.", "EC2 인스턴스의 신뢰 정책에 Amazon S3를 추가합니다. CloudWatch가 로그를 수집하는 데 사용할 수 있도록 애플리케이션이 사용자 지정 로그를 S3 버킷에 기록하도록 구성합니다.", "EC2 인스턴스의 신뢰 정책에 Amazon Inspector를 추가합니다. CloudWatch 에이전트 대신 Amazon Inspector를 사용하여 사용자 지정 로그를 수집합니다.", "CloudWatchAgentServerPolicy AWS 관리형 정책을 EC2 인스턴스 역할에 연결합니다."], "answer": "D", "multi": false, "explanation": "The Amazon CloudWatch agent requires explicit IAM permissions to create log groups, create log streams, and put log events into Amazon CloudWatch Logs. According to the AWS Certified Security - Specialty Study Guide, the most common cause of CloudWatch agent log delivery failures is missing or insufficient IAM permissions on the EC2 instance role. The CloudWatchAgentServerPolicy AWS managed policy provides the required permissions, including logs:CreateLogGroup, logs:CreateLogStream, and logs:PutLogEvents. Attaching this policy to the EC2 instance role enables the CloudWatch agent to successfully deliver custom application logs without requiring changes to the application or logging configuration. Options A, B, and C are incorrect because CloudTrail, Amazon S3, and Amazon Inspector are not designed to ingest custom application logs from EC2 instances in this manner. AWS documentation clearly states that IAM permissions must be granted to the EC2 role for CloudWatch Logs ingestion. This approach aligns with AWS best practices for least privilege while ensuring reliable detection and monitoring capabilities."},
  {"id": 6, "text": "한 회사가 Amazon EC2 인스턴스에 대한 포렌식 분석을 시도하고 있지만, AWS Systems Manager Session Manager를 사용하여 해당 인스턴스에 연결할 수 없습니다. 이 회사는 EC2 인스턴스에 AWS Systems Manager Agent(SSM Agent)를 설치했습니다. EC2 인스턴스는 인터넷 게이트웨이가 연결되지 않은 VPC 내 서브넷에 있습니다. 회사는 해당 EC2 인스턴스에 보안 그룹을 연결했지만, 인바운드 또는 아웃바운드 규칙은 설정되어 있지 않습니다. 서브넷의 네트워크 ACL은 모든 인바운드 및 아웃바운드 트래픽을 허용합니다 . 어떤 조치 조합을 취해야 회사가 포렌식 데이터를 손상시키지 않고 EC2 인스턴스에 대한 포렌식 분석을 수행할 수 있을까요? (세 가지를 선택하세요.)", "choices": ["EC2 인스턴스 보안 그룹을 업데이트하여 0.0.0.0에 대한 포트 443에서 아웃바운드 트래픽을 허용하는 규칙을 추가합니다. /0.", "EC2 인스턴스 보안 그룹을 업데이트하여 VPC의 CIDR 범위로 들어오는 트래픽을 포트 443에서 허용하는 규칙을 추가합니다.", "EC2 키 페어를 생성합니다. 생성된 키 페어를 EC2 인스턴스와 연결합니다.", "EC2 인스턴스가 위치한 VPC에 Systems Manager용 VPC 인터페이스 엔드포인트를 생성합니다.", "VPC 인터페이스 엔드포인트에 보안 그룹을 연결합니다. VPC의 CIDR 범위로 들어오는 트래픽을 포트 443에서 허용합니다.", "EC2 인스턴스가 위치한 VPC에 EC2 인스턴스용 VPC 인터페이스 엔드포인트를 생성합니다."], "answer": "A,D,E", "multi": true, "explanation": "AWS Systems Manager Session Manager requires secure outbound HTTPS connectivity from the EC2 instance to Systems Manager endpoints. In a VPC without internet access, AWS Certified Security - Specialty documentation recommends using interface VPC endpoints to enable private connectivity without exposing the instance to the internet. Creating a VPC interface endpoint for Systems Manager allows the SSM Agent to communicate securely with the Systems Manager service. The endpoint must have an attached security group that allows inbound traffic on port 443 from the VPC CIDR range. Additionally, the EC2 instance security group must allow outbound HTTPS traffic on port 443 so the agent can initiate connections. Option C is incorrect because creating or associating key pairs enables SSH access, which can alter forensic evidence and violates forensic best practices. Option B is unnecessary because Session Manager does not require inbound rules on the EC2 instance. Option F is invalid because EC2 does not use interface endpoints for management connectivity. This combination ensures secure, private access for forensic investigation while preserving evidence integrity and adhering to AWS incident response best practices."},
  {"id": 7, "text": "보안팀은 회사의 AWS 키 관리 서비스(AWS KMS) 고객 관리 키를 관리합니다. 보안팀 구성원만 KMS 키를 관리할 수 있습니다. 회사 애플리케이션팀은 특정 소프트웨어 프로세스에서 가끔씩 해당 키에 대한 임시 접근 권한이 필요합니다. 보안팀은 애플리케이션팀의 소프트웨어 프로세스에 키 접근 권한을 제공해야 합니다. 어떤 솔루션이 운영 부담을 최소화하면서 이러한 요구 사항을 충족할까요?", "choices": ["KMS 키 자료를 온프레미스 하드웨어 보안 모듈(HSM)로 내보냅니다. 애플리케이션 팀에 키 자료에 대한 액세스 권한을 부여합니다.", "보안 팀에 KMS 키 액세스 권한을 부여하는 키 정책을 편집하여 애플리케이션 팀을 주체로 추가합니다. 애플리케이션 팀에 더 이상 액세스 권한이 필요하지 않으면 이 변경 사항을 되돌립니다.", "애플리케이션 팀이 KMS 키를 사용할 수 있도록 키 권한을 생성합니다. 애플리케이션 팀에서 더 이상 액세스가 필요하지 않으면 권한을 취소합니다.", "온프레미스에서 키 자료를 생성하여 새 KMS 키를 만듭니다. 애플리케이션 팀에서 액세스가 필요할 때마다 키 자료를 AWS KMS로 가져옵니다. 애플리케이션 팀에 키를 사용할 수 있는 권한을 부여합니다."], "answer": "C", "multi": false, "explanation": "AWS KMS key grants are specifically designed to provide temporary, granular permissions to use customer managed keys without modifying key policies. According to the AWS Certified Security - Specialty Study Guide, grants are the preferred mechanism for delegating key usage permissions to AWS principals for short-term or programmatic access scenarios. Grants allow permissions such as Encrypt, Decrypt, or GenerateDataKey and can be created and revoked dynamically. Using a key grant avoids the operational risk and overhead of editing key policies, which are long- term control mechanisms and should remain stable. AWS documentation emphasizes that frequent key policy changes increase the risk of misconfiguration and accidental privilege escalation. Grants can be revoked immediately when access is no longer required, ensuring strong adherence to the principle of least privilege. Options A and D violate AWS security best practices because AWS KMS does not allow direct export of key material unless the key was explicitly created as an importable key, and exporting key material increases exposure risk. Option B requires manual policy changes and rollback, which introduces operational overhead and audit complexity. AWS recommends key grants as the most efficient and secure way to provide temporary access to KMS keys for applications."},
  {"id": 8, "text": "한 회사가 AWS CloudTrail과 Amazon CloudWatch를 사용하여 AWS 계정의 리소스를 모니터링하고 있습니다. 회사 개발자들은 지난 3개월 동안 해당 계정에서 IAM 역할을 사용해 왔습니다. 보안 엔지니어는 역할에 연결된 고객 관리형 IAM 정책을 개선하여 해당 역할이 최소 권한 액세스를 제공하도록 해야 합니다. 어떤 해결책이 가장 적은 노력으로 이 요구 사항을 충족할까요?", "choices": ["역할에 대한 AWS IAM 액세스 분석기 정책 생성 기능을 구현합니다.", "역할에 대한 AWS IAM 액세스 분석기 정책 유효성 검사를 구현합니다.", "CloudWatch 로그를 검색하여 역할이 호출한 작업을 확인하고 권한을 평가합니다.", "AWS Trusted Advisor를 사용하여 역할에 할당된 정책을 AWS 모범 사례와 비교합니다."], "answer": "A", "multi": false, "explanation": "AWS IAM Access Analyzer policy generation is specifically designed to help security engineers generate least-privilege IAM policies based on actual usage recorded in AWS CloudTrail. According to the AWS Certified Security - Specialty documentation, policy generation analyzes historical CloudTrail data to identify the exact API actions and resources that a role has accessed over a specified time period. Because the role has been actively used for three months, there is sufficient CloudTrail data for IAM Access Analyzer to generate a refined customer managed policy automatically. This significantly reduces manual effort and eliminates the need to analyze logs or infer permissions. The generated policy can be reviewed and attached directly to the role, ensuring least privilege access with minimal engineering effort. Option B only validates existing policies for security warnings and does not reduce permissions. Option C requires manual analysis of CloudWatch logs, which is time-consuming and error- prone. Option D does not analyze real usage and cannot generate role-specific least privilege policies. AWS documentation explicitly recommends IAM Access Analyzer policy generation as the fastest and most accurate method to refine IAM permissions based on observed behavior."},
  {"id": 9, "text": "한 회사가 AWS IAM Identity Center를 SAML 2.0 페더레이션과 함께 사용하고 있습니다. 이 회사는 페더레이션 소스를 하나의 ID 공급자(IdP)에서 다른 IdP로 변경하기로 결정했습니다. 두 IdP 모두 기본 디렉터리는 Active Directory입니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["원래 IdP와의 페더레이션에 참여했던 IAM Identity Center 내의 모든 기존 사용자 및 그룹을 비활성화합니다.", "새 IdP가 보내는 정보와 일치하도록 IAM Identity Center 신뢰 관계 내의 속성 매핑을 수정합니다.", "회사 AWS 계정의 기존 IAM 역할을 모두 재구성하여 새 IdP를 주체로 명시적으로 신뢰하도록 합니다.", "IAM Identity Center와 새 IdP 엔드포인트 간에 네트워크 시간 프로토콜(NTP) 클록 편차가 올바르게 설정되었는지 확인합니다."], "answer": "B", "multi": false, "explanation": "AWS IAM Identity Center relies on SAML assertions and attribute mappings to associate federated users with identities, groups, and permission sets. According to the AWS Certified Security - Specialty documentation, when changing identity providers while maintaining the same underlying directory, existing users and group identities can be preserved by updating attribute mappings to align with the new IdP's SAML assertions. By modifying the attribute mappings, IAM Identity Center can correctly interpret usernames, group memberships, and unique identifiers sent by the new IdP without requiring changes to AWS account roles or permission sets. This approach minimizes operational effort and avoids disruption to access management. Option A unnecessarily disables identities and causes access outages. Option C is incorrect because IAM Identity Center abstracts role trust relationships, and roles do not directly trust the IdP. Option D is unrelated to federation source configuration and only affects authentication timing issues. AWS best practices recommend updating attribute mappings when switching IdPs that share the same directory source."},
  {"id": 10, "text": "한 회사가 AWS에서 애플리케이션을 운영하고 있습니다. 이 회사는 여러 환경으로 구성된 설정을 사용하며, 각 환경은 별도의 AWS 계정에 격리되어 있습니다. 회사는 AWS Organizations에 조직을 생성하여 이러한 계정들을 관리하고 있으며, 조직 전용 보안 계정 하나를 보유하고 있습니다. 회사는 조직 내 모든 계정에 저장된 Amazon S3 버킷의 중요 데이터에 대한 인벤토리를 작성해야 합니다. 모든 데이터는 단일 위치에서 확인할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["보안 계정을 Amazon Macie 및 AWS Security Hub의 위임된 관리자로 설정합니다. Macie가 민감한 데이터 발견 사항을 Security Hub에 게시하도록 활성화하고 구성하십시오.", "보안 계정을 AWS Security Hub의 위임된 관리자로 설정합니다. 각 계정에서 Amazon Inspector를 구성하여 S3 버킷에서 민감한 데이터를 검색합니다. 민감한 데이터 발견 사항을 Security Hub에 게시합니다.", "각 계정에서 Amazon Inspector가 S3 버킷에서 민감한 데이터를 검색하도록 구성합니다. AWS Trusted Advisor와 Amazon Inspector 통합을 활성화합니다. 민감한 데이터 발견 사항을 Trusted Advisor에 게시합니다.", "각 계정에서 Amazon Macie를 활성화하고 구성하여 민감한 데이터를 감지하도록 합니다. AWS Trusted Advisor와의 Macie 통합을 활성화합니다. 민감한 데이터 발견 사항을 Trusted Advisor에 게시합니다."], "answer": "A", "multi": false, "explanation": "Amazon Macie is the AWS service designed specifically to discover, classify, and inventory sensitive data stored in Amazon S3. According to the AWS Certified Security - Specialty Study Guide, Macie can be enabled organization-wide using AWS Organizations, with a delegated administrator account that centrally manages findings across all member accounts . By designating the security account as the delegated administrator for both Amazon Macie and AWS Security Hub, the company can centralize sensitive data findings in a single location. Macie automatically scans S3 buckets for sensitive data such as personally identifiable information (PII) and publishes findings to Security Hub for centralized visibility and reporting. Option B and C are incorrect because Amazon Inspector does not scan S3 objects for sensitive data. Option D is invalid because AWS Trusted Advisor does not ingest Macie sensitive data findings. AWS best practices recommend Amazon Macie with delegated administration and Security Hub integration for centralized sensitive data inventory across multi-account environments."},
  {"id": 11, "text": "기업은 AWS CloudTrail 데이터 이벤트를 수집하고 해당 로그를 7년 동안 보관해야 합니다. 로그는 변경 불가능해야 하며 복잡한 쿼리를 통해 검색할 수 있어야 합니다. 또한 기업은 로그에서 데이터를 시각화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 가장 비용 효율적으로 충족할까요?", "choices": ["CloudTrail Lake 데이터 저장소를 생성합니다. 결과를 시각화하고 쿼리할 수 있도록 CloudTrail Lake 대시보드를 구현합니다.", "AWS Management Console에서 CloudTrail 이벤트 기록 기능을 사용하세요. 콘솔에서 결과를 시각화하고 쿼리할 수 있습니다.", "CloudTrail 로그를 Amazon S3 버킷으로 전송합니다. S3 버킷에 액세스할 수 있는 영구 Amazon EMR 클러스터를 프로비저닝합니다. S3 버킷에 S3 객체 잠금을 활성화합니다. Apache Spark를 사용하여 쿼리를 수행합니다. Amazon QuickSight를 사용하여 시각화합니다 .", "CloudTrail 로그를 Amazon CloudWatch Logs의 로그 그룹으로 전송합니다. CloudWatch Logs 스트림을 설정하여 데이터를 Amazon OpenSearch Service 도메인으로 전송합니다. OpenSearch Service 도메인에 콜드 스토리지를 활성화합니다. 시각화 및 쿼리를 위해 OpenSearch 대시보드를 사용합니다."], "answer": "A", "multi": false, "explanation": "AWS CloudTrail Lake is purpose-built to store, query, and analyze CloudTrail events, including data events, without requiring additional infrastructure. The AWS Certified Security - Specialty documentation explains that CloudTrail Lake provides immutable event storage with configurable retention periods, including multi-year retention, which satisfies long-term compliance requirements such as 7-year retention. Events are stored in an append-only, immutable format managed by AWS, reducing operational complexity. CloudTrail Lake supports SQL-based queries for complex analysis directly against the event data, eliminating the need to export logs to other services for querying. Additionally, CloudTrail Lake includes built-in dashboards and integrations that enable visualization of event trends and patterns without standing up separate analytics or visualization platforms. Option B is invalid because CloudTrail Event History only retains events for up to 90 days and does not support long-term retention or advanced querying. Option C introduces high operational overhead and cost by requiring persistent Amazon EMR clusters and additional services. Option D incurs ongoing ingestion, indexing, and storage costs for OpenSearch Service over a 7-year period, making it less cost-effective than CloudTrail Lake. AWS documentation positions CloudTrail Lake as the most cost-effective and operationally efficient solution for long-term, queryable CloudTrail event storage and visualization."},
  {"id": 12, "text": "한 회사가 모든 애플리케이션을 단일 AWS 리전으로 마이그레이션할 계획입니다. 이 회사의 애플리케이션은 Amazon EC2 인스턴스, Elastic Load Balancing(ELB) 로드 밸런서 및 Amazon S3 버킷을 조합하여 사용할 예정입니다. 회사는 마이그레이션을 최대한 빠르게 완료하고자 합니다. 모든 애플리케이션은 다음 요구 사항을 충족해야 합니다. * 데이터는 저장 시 암호화되어야 합니다. * 데이터는 전송 중에 암호화되어야 합니다. * 엔드포인트는 비정상적인 네트워크 트래픽에 대해 모니터링해야 합니다. 보안 엔지니어가 이러한 요구 사항을 최소한의 노력으로 충족하기 위해 취해야 할 조치는 어떤 조합입니까? (세 가지를 선택하십시오.)", "choices": ["AWS Systems Manager Automation을 사용하여 EC2 인스턴스에 Amazon Inspector 에이전트를 설치합니다.", "모든 AWS 계정에서 Amazon GuardDuty를 활성화합니다.", "Amazon EC2 및 Amazon S3용 VPC 엔드포인트를 생성합니다. VPC 라우팅 테이블을 업데이트하여 보안 VPC 엔드포인트만 사용하도록 합니다.", "AWS Certificate Manager(ACM)를 구성합니다. 로드 밸런서가 ACM의 인증서를 사용하도록 구성합니다.", "키 관리를 위해 AWS 키 관리 서비스(AWS KMS)를 사용하십시오. x-amz-meta-side- encryption 조건을 사용하여 PutObject 명령을 거부하는 S3 버킷 정책을 생성하십시오.", "키 관리를 위해 AWS 키 관리 서비스(AWS KMS)를 사용하십시오. x-amz-server-side- encryption 조건을 사용하여 PutObject 명령을 거부하는 S3 버킷 정책을 생성하십시오."], "answer": "B,D,F", "multi": true, "explanation": "Amazon GuardDuty provides continuous monitoring for anomalous and malicious network activity by analyzing VPC Flow Logs, DNS logs, and CloudTrail events. Enabling GuardDuty across accounts requires minimal configuration and immediately satisfies the requirement to monitor endpoints for anomalous network traffic, as described in the AWS Certified Security - Specialty Study Guide. Encrypting data in transit for applications behind Elastic Load Balancing is most efficiently achieved by using AWS Certificate Manager (ACM). ACM provisions and manages TLS certificates automatically, and integrating ACM with ELB enables encrypted communication without manual certificate management. For encryption at rest in Amazon S3, AWS best practices recommend enforcing server-side encryption using AWS KMS. An S3 bucket policy that denies PutObject requests unless the x- amz- server-side-encryption condition is present ensures that all uploaded objects ar e encrypted at rest using KMS-managed keys. This provides strong encryption guarantees with minimal operational effort. Option A is unnecessary because Amazon Inspector focuses on vulnerability assessment, not encryption or network anomaly detection. Option C adds network complexity and is not required to meet the stated requirements. Option E is incorrect because x-amz-meta-side- encryption is not a valid enforcement mechanism."},
  {"id": 13, "text": "한 회사가 고객 요구사항을 충족하기 위해 새로운 규정 준수 요건을 시행하고 있습니다. 새로운 요건에 따르면, 회사는 기본 스토리지에 암호화가 적용되지 않은 Amazon RDS DB 인스턴스 또는 DB 클러스터를 사용해서는 안 됩니다. 회사는 암호화되지 않은 DB 인스턴스 또는 DB 클러스터가 생성될 경우 이메일 알림을 생성하고, 해당 인스턴스 또는 클러스터를 종료하는 솔루션이 필요합니다. 어떤 솔루션이 이러한 요구 사항을 가장 효율적인 운영 방식으로 충족할까요?", "choices": ["암호화되지 않은 RDS 스토리지를 감지하는 AWS Config 관리형 규칙을 생성합니다. AWS Lambda 함수와 이메일 전송 대상이 구독자로 포함된 Amazon SNS(Amazon Simple Notification Service) 토픽에 메시지를 게시하는 자동 복구 작업을 구성합니다. 암호화되지 않은 리소스를 삭제하도록 Lambda 함수를 구성합니다.", "암호화되지 않은 RDS 스토리지를 감지하는 AWS Config 관리형 규칙을 생성합니다. AWS Lambda 함수를 호출하는 수동 복구 작업을 구성합니다. Lambda 함수가 Amazon SNS(Amazon Simple Notification Service) 토픽에 메시지를 게시하고 암호화되지 않은 리소스를 삭제하도록 구성합니다.", "RDS 이벤트 패턴을 평가하고 DB 인스턴스 또는 DB 클러스터 생성 시 시작되는 Amazon EventBridge 규칙을 생성합니다. AWS Lambda 함수와 이메일 전송 대상을 구독자로 포함하는 Amazon Simple Notification Service(Amazon SNS) 토픽에 메시지를 게시하도록 규칙을 구성합니다. 암호화되지 않은 리소스를 삭제하도록 Lambda 함수를 구성합니다.", "RDS 이벤트 패턴을 평가하고 DB 인스턴스 또는 DB 클러스터 생성 시 시작되는 Amazon EventBridge 규칙을 생성합니다. 규칙이 AWS Lambda 함수를 호출하도록 구성합니다. Lambda 함수가 Amazon Simple Notification Service(Amazon SNS) 토픽에 메시지를 게시하고 암호화되지 않은 리소스를 삭제하도록 구성합니다."], "answer": "A", "multi": false, "explanation": "AWS Config provides managed rules that continuously evaluate resource configurations against compliance requirements. The AWS Certified Security - Specialty documentation highlights AWS Config managed rules as the preferred mechanism for enforcing configuration compliance at scale. The managed rule for encrypted RDS storage automatically detects DB instances and clusters that are created without encryption enabled. By configuring automatic remediation, AWS Config can immediately invoke corrective actions without manual intervention. Integrating remediation with an Amazon SNS topic enables automated email notifications, while an AWS Lambda function can terminate the noncompliant resource. This creates a fully automated detect-alert-remediate workflow. Option B requires manual remediation, which increases operational effort and delays enforcement. Options C and D rely on Amazon EventBridge, which evaluates events rather than configuration state and does not provide continuous compliance monitoring. AWS Config is explicitly designed for configuration compliance and governance use cases. This solution aligns with AWS governance best practices by combining continuous monitoring, automated remediation, and centralized alerting with minimal operational overhead."},
  {"id": 14, "text": "한 회사가 AWS Organizations를 사용하여 세 개의 워크로드 OU로 구성된 조직을 관리합니다 . 운영, 개발 및 테스트. 이 회사는 AWS CloudFormation 템플릿을 사용하여 OU와 연결된 AWS 계정에 워크로드 인프라를 정의하고 배포합니다. 각 워크로드 OU에는 서로 다른 SCP가 연결되어 있습니다. 해당 회사는 개발 OU와 테스트 OU에 있는 워크로드에 CloudFormation 스택 업데이트를 성공적으로 배포했습니다. 하지만 동일한 CloudFormation 템플릿을 사용하여 프로덕션 OU에 있는 계정에 스택 업데이트를 배포하려고 하면 업데이트가 실패합니다. 오류 메시지에는 IAM 권한이 부족하다고 표시됩니다. 보안 엔지니어가 이 문제를 해결하기 위해 가장 먼저 해야 할 일은 무엇입니까?", "choices": ["프로덕션 OU에 있는 계정의 AWS CloudTrail 로그를 검토하십시오. 배포 시도 중에 CloudFormation에서 발생한 API 호출 실패를 찾아보십시오.", "프로덕션 OU에 연결된 모든 SCP를 제거합니다. SCP가 CloudFormation API 호출을 방해했는지 확인하기 위해 CloudFormation 스택 업데이트를 다시 실행합니다.", "CloudFormation에서 사용하는 역할에 CloudFormation 템플릿에서 참조하는 리소스를 생성, 업데이트 및 삭제할 수 있는 충분한 권한이 있는지 확인하십시오.", "프로덕션 OU에 연결된 모든 SCP를 테스트 OU에 연결된 SCP와 동일하게 만듭니다."], "answer": "A", "multi": false, "explanation": "AWS CloudTrail provides a record of all API calls made in an AWS account, including calls initiated by AWS CloudFormation. According to the AWS Certified Security - Specialty Study Guide, CloudTrail is the primary source for troubleshooting authorization failures because it records denied actions and the policy type that caused the denial, including service control policies. Reviewing CloudTrail logs allows a security engineer to identify which specific API calls failed during the CloudFormation deployment and whether the denial was caused by an SCP, an IAM policy, or a permission boundary. This evidence-based approach is the recommended first step before making any configuration changes. Option B is unsafe and violates governance best practices by removing SCPs in production. Option C may be necessary later, but it does not identify whether SCPs are the root cause. Option D introduces unnecessary risk and bypasses the purpose of differentiated controls across OUs. AWS documentation emphasizes observing and validating before modifying security controls, making CloudTrail log analysis the correct initial troubleshooting step."},
  {"id": 15, "text": "한 회사가 인프라 및 애플리케이션 코드를 AWS 외부의 웹 기반 타사 Git 호환 코드 저장소에 저장하고 있습니다. 이 회사는 OpenID Connect(OIDC)를 사용하여 해당 코드 저장소가 회사 AWS 계정 내의 기존 IAM 역할을 안전하게 인증하고 수임할 수 있도록 하고자 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Identity and Access Management(IAM) 페더레이션을 사용하여 OIDC ID 공급자(IdP)를 생성합니다. 코드 리포지토리가 IAM 역할을 수임할 수 있도록 IAM 역할의 신뢰 정책을 수정합니다.", "AWS Identity and Access Management(IAM) Roles Anywhere를 사용하여 OIDC를 사용하는 트러스트 앵커를 생성합니다. 코드 리포지토리가 IAM 역할을 수임할 수 있도록 IAM 역할의 트러스트 정책을 수정합니다.", "AWS IAM Identity Center 계정 인스턴스를 설정합니다. 고객 관리형 OIDC 애플리케이션으로 코드 리포지토리에 대한 액세스를 구성합니다. 애플리케이션에 IAM 역할에 대한 액세스 권한을 부여합니다.", "AWS Resource Access Manager(AWS RAM)를 사용하여 OIDC를 사용하는 새 리소스 공유를 생성합니다. 리소스 공유의 접근 권한을 지정된 코드 리포지토리로 제한합니다. IAM 역할에 리소스 공유에 대한 접근 권한을 부여합니다."], "answer": "A", "multi": false, "explanation": "AWS IAM supports identity federation by allowing external identity providers that use OpenID Connect (OIDC) to authenticate and assume IAM roles. According to the AWS Certified Security - Specialty documentation, IAM OIDC identity providers are the recommended approach for enabling third-party systems, such as external CI/CD pipelines or Git-based repositories, to securely obtain temporary AWS credentials without using long-term access keys. By creating an OIDC identity provider in IAM and configuring the IAM role trust policy to trust the external IdP, the company enables secure, token-based authentication. The trust policy can include conditions that restrict which repositories, branches, or workflows are allowed to assume the role, enforcing least privilege. AWS Security Specialty guidance emphasizes that this method eliminates static credentials and relies on short-lived tokens issued by the OIDC provider. Option B is incorrect because IAM Roles Anywhere is designed for workloads running outside AWS that use X.509 certificates, not OIDC. Option C is intended for workforce identity federation, not machine-to-machine authentication. Option D is invalid because AWS RAM does not provide identity federation or authentication capabilities. This solution aligns with AWS best practices for secure, scalable, and low-overhead authentication for external workloads."},
  {"id": 16, "text": "한 회사가 서로 다른 AWS 서비스에 사용할 별도의 AWS 키 관리 서비스(AWS KMS) 키를 설정하려고 합니다. 회사 보안 엔지니어는 인프라 배포 팀이 InfrastructureDeployment IAM 역할을 사용하여 암호화된 Amazon Elastic Block Store(Amazon EBS) 볼륨을 생성할 수 있도록 키 정책을 만들었습니다. 그런데 최근 보안 엔지니어는 InfrastructureDeployment 역할 외의 다른 IAM 역할에서도 이 키를 다른 서비스에 사용하고 있음을 발견했습니다. 이러한 문제를 해결하기 위해 보안 엔지니어는 정책을 어떻게 수정해야 할까요?", "choices": ["\"키 사용 허용\"이라는 Sid가 포함된 문장 블록의 \"조건\" 블록에서 StringEquals를 StringLike로 변경합니다.", "정책 문서에서 \"IAM 사용자 권한 활성화\"라는 Sid가 포함된 문 블록을 제거합니다. KMS 정책에 키 관리 정책을 추가합니다.", "Sid \"키 사용 허용\"이 포함된 문장 블록의 \"조건\" 블록에서 kms:ViaService 값을 ec2.us- east-1.amazonaws.com으로 변경합니다.", "정책 문서에 보안 엔지니어의 IAM 역할에 kms:Disable* 권한을 부여하는 새 문 블록을 추가합니다."], "answer": "C", "multi": false, "explanation": "AWS KMS key policies can restrict how and where a key is used by leveraging condition keys such as kms:ViaService. According to the AWS Certified Security - Specialty documentation, kms:ViaService limits key usage to requests that originate from a specific AWS service in a specific Region. If this condition is overly broad or incorrect, other IAM roles and services may unintentionally use the key. By explicitly setting the kms:ViaService condition value to ec2.us-east-1.amazonaws.com, the key policy ensures that the KMS key can only be used when requests are made through the Amazon EC2 service in that Region, such as for EBS volume encryption. This prevents other services or unintended IAM roles from using the key. Option A weakens the condition logic and can broaden access. Option B removes essential permissions that allow IAM policies to function with KMS keys and is not recommended. Option D relates to administrative control of the key, not service-level usage restrictions. AWS best practices recommend using kms:ViaService and precise condition values to enforce service- specific key usage and strong separation of duties."},
  {"id": 17, "text": "컨설팅 회사가 한 회사의 운영 AWS 계정에 대한 보안 감사를 수행해야 합니다. 여러 명의 컨설턴트가 해당 계정에 접근해야 합니다. 컨설팅 회사는 이미 자체 AWS 계정을 보유하고 있습니다. 해당 회사는 운영 계정에 대한 모든 접근에 다단계 인증(MFA)을 요구하며, 장기 사용 계정 정보 사용을 금지하고 있습니다. 어떤 솔루션이 컨설팅 기관에 이러한 요구 사항을 충족하는 접근 권한을 제공할까요?", "choices": ["IAM 그룹을 생성합니다. 각 컨설턴트별로 IAM 사용자를 생성합니다. 각 사용자를 그룹에 추가합니다. 각 컨설턴트에 대해 MFA를 활성화합니다.", "컨설팅 회사의 ID 공급자(IdP)를 통해 인증하도록 회사 운영 계정에서 Amazon Cognito를 구성합니다. Cognito 사용자 풀에 MFA를 추가합니다.", "컨설팅 회사의 AWS 계정에 IAM 역할을 생성합니다. MFA를 요구하는 신뢰 정책을 정의합니다. 신탁 정책에서 회사의 운영 계정을 주 계정으로 지정합니다. 해당 신탁 정책을 역할에 연결합니다.", "회사 운영 계정에 IAM 역할을 생성합니다. MFA(다단계 인증)를 요구하는 신뢰 정책을 정의합니다. 신뢰 정책에서 컨설팅 회사의 AWS 계정을 주체로 지정합니다. 신뢰 정책을 역할에 연결합니다."], "answer": "D", "multi": false, "explanation": "AWS best practices strongly discourage the use of long-term credentials and recommend cross- account IAM roles with temporary credentials for third-party access. According to the AWS Certified Security - Specialty Study Guide, creating an IAM role in the resource-owning account and allowing a trusted external AWS account to assume that role is the recommended pattern for external access. By creating the IAM role in the company's production account and specifying the consultant agency's AWS account as the trusted principal, the company retains full control over permissions. The trust policy can enforce MFA by using the aws:MultiFactorAuthPresent condition key, ensuring that all access requires MFA. Access is granted through AWS Security Token Service (STS), which issues short-lived credentials. Option A violates the requirement to avoid long-term credentials. Option B is designed for application user authentication, not AWS account access. Option C incorrectly places the role in the consultant's account, reducing the company's control over access. This solution satisfies MFA enforcement, eliminates long-term credentials, and aligns with AWS third- party access best practices."},
  {"id": 18, "text": "한 회사가 Windows Server를 실행하는 여러 Amazon EC2 인스턴스에서 인터넷에 접속 가능한 애플리케이션을 운영하고 있습니다. 이 회사는 인스턴스 프로필을 사용하여 EC2 인스턴스를 구성했습니다. 현재 보안 팀은 사내 사무실에서 AWS 사이트 간 VPN 터널을 통해 EC2 인스턴스가 호스팅되는 VPC에 접속하고 있습니다. 보안팀은 보안 사고 발생 시 VPC에 대한 모든 외부 접근을 차단하는 정책을 시행하고 있습니다. 그러나 사고 발생 시 보안팀은 인스턴스에 대한 포렌식 정보를 얻기 위해 EC2 인스턴스에 접근할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["EC2 인스턴스에 EC2 Instance Connect를 설치합니다. 필요한 권한을 부여하도록 IAM 역할에 대한 IAM 정책을 업데이트합니다. AWS CLI를 사용하여 인스턴스에 연결하기 위한 터널을 엽니다.", "EC2 인스턴스에 EC2 Instance Connect를 설치합니다. ec2-instance-connect 명령 사용자가 인스턴스에 액세스할 수 있도록 구성합니다. AWS Management Console을 사용하여 EC2 인스턴스에 연결합니다.", "VPC에 EC2 인스턴스 연결 엔드포인트를 생성합니다. EC2 인스턴스와 엔드포인트 간의 액세스를 허용하도록 적절한 보안 그룹을 구성합니다. AWS CLI를 사용하여 인스턴스에 연결하는 터널을 엽니다.", "VPC에 EC2 인스턴스 연결 엔드포인트를 생성합니다. EC2 인스턴스와 엔드포인트 간의 액세스를 허용하도록 적절한 보안 그룹을 구성합니다. AWS 관리 콘솔을 사용하여 EC2 인스턴스에 연결합니다."], "answer": "D", "multi": false, "explanation": "EC2 Instance Connect endpoints provide secure, private connectivity to EC2 instances without requiring public IP addresses, inbound internet access, or VPN connectivity. According to AWS Certified Security - Specialty documentation, Instance Connect endpoints are designed specifically for incident response and secure administrative access scenarios. By deploying an EC2 Instance Connect endpoint in the VPC, the security team can block all external network access while still maintaining controlled access to EC2 instances through the AWS Management Console. The endpoint uses AWS-managed infrastructure and private connectivity, and access is authorized using IAM policies and instance profiles. Options A and B rely on direct EC2 Instance Connect installation and network paths that may still depend on external access. Option C is incorrect because tunneling is not required when using the console-based Instance Connect endpoint. This solution enables forensic access during incidents without reopening external network paths, aligning with AWS incident response best practices."},
  {"id": 19, "text": "최근 한 회사가 클라우드 기반 환경에 대한 악의적인 공격을 받았습니다. 회사는 공격을 성공적으로 차단하고 제거했습니다. 현재 보안 엔지니어가 사고 대응 작업을 진행하고 있습니다. 보안 엔지니어는 Amazon RDS 데이터베이스 클러스터를 마지막으로 정상 작동했던 버전으로 복구해야 합니다. 해당 데이터베이스 클러스터는 14일 동안 보존되는 자동 백업을 생성하도록 구성되어 있습니다. 최초 공격은 5일 전 오후 3시 15분에 발생했습니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["데이터베이스의 리전 클러스터 ARN을 확인합니다. 해당 ARN을 사용하여 특정 시점으로 복원 기능을 통해 리전 클러스터를 복원합니다. 대상 시간을 5일 전 오후 3시 14분으로 설정합니다.", "데이터베이스의 리전 클러스터 ARN을 식별합니다. 클러스터에서 생성된 스냅샷 목록을 표시합니다. 5일 전 오후 3시 14분에 생성된 스냅샷을 사용하여 데이터베이스를 복원하십시오.", "회사 RDS 데이터베이스의 모든 스냅샷 목록을 표시합니다. 5일 전 오후 3시 14분에 생성된 스냅샷을 찾아 복원합니다.", "데이터베이스의 리전 클러스터 ARN을 확인합니다. 해당 ARN을 사용하여 특정 시점으로 복원 기능을 통해 리전 클러스터를 복원합니다. 복원 대상 시간을 14일 전으로 설정합니다."], "answer": "A", "multi": false, "explanation": "Amazon RDS supports point-in-time recovery (PITR) using automated backups within the configured retention window. According to the AWS Certified Security - Specialty Study Guide, PITR allows recovery to any second within the retention period, making it the most precise recovery method following a security incident. By restoring the database cluster to a point just before the attack occurred, such as 3:14 PM, the security engineer ensures that the restored database reflects the last known good state without including malicious changes. This method is more accurate than restoring from snapshots, which are created at fixed intervals and may not align with the exact recovery time. Options B and C rely on snapshot timing and may reintroduce compromised data. Option D restores to an arbitrary time and does not meet the requirement to recover to the last known good version. AWS documentation explicitly recommends point-in-time recovery for incident response scenarios that require precise restoration."},
  {"id": 20, "text": "한 회사가 운영 중인 애플리케이션을 호스팅하는 AWS 계정을 보유하고 있습니다. 이 회사는 Amazon GuardDuty에서 해당 계정에서 Impact:IAMUser/AnomalousBehavior 유형의 보안 사고가 감지되었다는 이메일 알림을 받았습니다. 보안 엔지니어는 애플리케이션에 영향을 주지 않고 이 보안 사고에 대한 조사 플레이북을 실행하고 정보를 수집 및 분석해야 합니다. 어떤 솔루션이 이러한 요구 사항을 가장 빠르게 충족할까요?", "choices": ["읽기 전용 자격 증명을 사용하여 AWS 계정에 로그인합니다. 사용된 IAM 자격 증명에 대한 자세한 내용은 GuardDuty 발견 사항을 검토하십시오. IAM 콘솔을 사용하여 IAM 주체에 DenyAll 정책을 추가합니다.", "읽기 전용 자격 증명을 사용하여 AWS 계정에 로그인합니다. GuardDuty 발견 사항을 검토하여 어떤 API 호출이 발견을 유발했는지 확인합니다. Amazon Detective를 사용하여 API 호출을 컨텍스트 내에서 검토합니다.", "관리자 자격 증명을 사용하여 AWS 계정에 로그인합니다. 사용된 IAM 자격 증명에 대한 자세한 내용은 GuardDuty 결과를 검토하십시오. IAM 콘솔을 사용하여 IAM 주체에 DenyAll 정책을 추가합니다.", "읽기 전용 자격 증명을 사용하여 AWS 계정에 로그인합니다. GuardDuty 발견 사항을 검토하여 어떤 API 호출이 발견 사항을 유발했는지 확인합니다. AWS CloudTrail Insights 및 AWS CloudTrail Lake를 사용하여 API 호출을 컨텍스트 내에서 검토합니다."], "answer": "B", "multi": false, "explanation": "Amazon GuardDuty findings provide high-level detection of suspicious activity but are not designed for deep investigation on their own. The AWS Certified Security - Specialty documentation explains that Amazon Detective is purpose-built to support rapid investigations by automatically collecting, correlating, and visualizing data from GuardDuty, AWS CloudTrail, and VPC Flow Logs. Detective enables security engineers to analyze API calls, user behavior, and resource interactions in context without making any changes to the environment. Using read-only credentials ensures that the investigation does not impact the production application. Amazon Detective allows investigators to pivot directly from a GuardDuty finding into a detailed activity graph, showing which IAM user made anomalous calls, what resources were accessed, and how behavior deviated from the baseline. This significantly accelerates incident investigation. Options A and C involve applying DenyAll policies, which are containment actions and could affect application availability. Option D requires manual analysis and setup and is slower than using Amazon Detective, which is designed for immediate investigative workflows. AWS incident response guidance recommends using Detective for rapid, non-intrusive analysis after GuardDuty findings."},
  {"id": 21, "text": "보안 엔지니어는 AWS 키 관리 서비스(AWS KMS) 고객 관리 키로 암호화된 데이터에 대한 접근을 제어해야 합니다. 또한, 암호문 변조를 방지하기 위해 추가 인증 데이터(AAD)를 사용해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["암호화 및 복호화 API 작업을 호출할 때 키 별칭을 AWS KMS에 전달합니다.", "IAM 정책을 사용하여 암호화 및 복호화 API 작업에 대한 액세스를 제한합니다.", "고객 관리 키에 대한 IAM 정책을 정의할 때 kms:EncryptionContext 조건 키를 사용하십시오.", "키 정책을 사용하여 적절한 IAM 그룹에 대한 액세스를 제한합니다."], "answer": "C", "multi": false, "explanation": "AWS KMS supports additional authenticated data (AAD) through the use of encryption context. According to the AWS Certified Security - Specialty documentation, encryption context is a set of key-value pairs that is cryptographically bound to the ciphertext. Any attempt to decrypt the data must include the same encryption context, or decryption will fail. This mechanism protects against ciphertext tampering and unauthorized reuse. The kms: EncryptionContext condition key allows security engineers to enforce the use of specific encryption context values in IAM or key policies. By defining conditions that require particular encryption context attributes, access to encrypted data can be tightly controlled and bound to specific applications, environments, or workflows. Option A does not provide integrity protection. Option B controls access but does not enforce the use of AAD. Option D restricts administrative access but does not address encryption context enforcement. AWS documentation explicitly states that encryption context combined with policy conditions is the recommended method to implement authenticated encryption and fine-grained access control with KMS."},
  {"id": 22, "text": "한 회사가 AWS IAM Identity Center를 사용하여 AWS 계정에 대한 액세스를 관리합니다. 해당 계정들은 AWS Organizations의 조직에 속해 있습니다. 보안 엔지니어는 조직의 관리 계정에 IAM Identity Center에 대한 위임된 관리 권한을 설정해야 합니다. 보안 엔지니어는 위임된 관리 권한을 구성하기 전에 IAM Identity Center에서 어떤 단계 조합을 수행해야 합니까? (세 가지를 선택하십시오.)", "choices": ["조직의 관리 계정에 최소 권한 액세스 권한을 부여합니다.", "조직의 관리 계정에 새 IAM Identity Center 디렉터리를 생성합니다.", "조직의 관리 계정에 두 번째 AWS 리전을 설정합니다.", "조직의 관리 계정에서만 사용할 권한 세트를 생성합니다.", "조직의 관리 계정에서만 사용할 IAM 사용자를 생성합니다.", "사용자 할당은 조직의 관리 계정에서만 생성합니다."], "answer": "B,D,F", "multi": true, "explanation": "AWS IAM Identity Center delegated administration requires foundational configuration to be completed in the organization's management account before delegation. According to the AWS Certified Security - Specialty documentation, IAM Identity Center must be enabled with a directory in the management account before any delegation can occur. Permission sets must be created in the management account because they define the permissions that will later be delegated to member accounts. Additionally, user assignments must initially exist in the management account to establish baseline access control before delegation is configured. Option A is too generic and not a required prerequisite step. Option C is unrelated to Identity Center delegation. Option E is incorrect because IAM Identity Center uses identities from its directory or external IdPs, not IAM users. AWS guidance clearly outlines directory creation, permission set definition, and initial user assignments as mandatory preparatory steps for delegated administration."},
  {"id": 23, "text": "보안 엔지니어는 Amazon S3 버킷에 저장된 민감한 데이터를 식별하는 솔루션을 구현해야 합니다. 이 솔루션은 기존 Amazon Simple Notification Service(Amazon SNS) 토픽을 사용하여 S3 버킷에 있는 민감한 데이터에 대한 보고서를 생성해야 합니다. 어떤 솔루션이 최소한의 구현 노력으로 이러한 요구 사항을 충족할까요?", "choices": ["AWS Config를 활성화합니다. S3 버킷의 민감한 데이터를 모니터링하고 SNS 주제로 알림을 보내도록 AWS Config를 구성합니다.", "패턴과 일치하는 민감한 데이터를 찾기 위해 S3 버킷을 스캔하는 AWS Lambda 함수를 생성합니다. 람다 함수를 프로그래밍하여 SNS 주제로 알림을 보내도록 하세요.", "Amazon Macie가 관리형 데이터 식별자를 사용하여 민감한 데이터를 식별하고 분류하도록 구성합니다. Amazon EventBridge 규칙을 생성하여 SNS 주제로 알림을 보내도록 합니다.", "Amazon GuardDuty를 활성화합니다. AWS CloudTrail S3 데이터 이벤트를 구성합니다. GuardDuty에서 발견된 사항에 반응하여 SNS 토픽으로 알림을 보내는 Amazon CloudWatch 알람을 생성합니다."], "answer": "C", "multi": false, "explanation": "Amazon Macie is the AWS service designed specifically to discover, classify, and report sensitive data stored in Amazon S3. According to the AWS Certified Security - Specialty Study Guide, Macie uses machine learning and managed data identifiers to automatically detect sensitive data types such as PII and financial information. Macie integrates natively with Amazon EventBridge, allowing findings to be routed to other services such as Amazon SNS with minimal configuration. Creating an EventBridge rule to forward Macie findings to an existing SNS topic satisfies the notification requirement without custom code. Option A is invalid because AWS Config does not inspect object contents. Option B requires custom development and ongoing maintenance. Option D is incorrect because Amazon GuardDuty focuses on threat detection, not sensitive data discovery. AWS documentation emphasizes Macie as the lowest-effort and most accurate solution for sensitive data identification in S3."},
  {"id": 24, "text": "애플리케이션이 IAM 역할이 연결된 Amazon EC2 인스턴스에서 실행 중입니다. 이 IAM 역할은 AWS Key Management Service(AWS KMS) 고객 관리형 키와 Amazon S3 버킷에 대한 액세스 권한을 제공합니다. 해당 키는 S3 버킷에 저장된 2TB의 민감한 데이터에 접근하는 데 사용됩니다. 보안 엔지니어는 민감한 데이터 유출로 이어질 수 있는 EC2 인스턴스의 잠재적 취약점을 발견했습니다. 다른 중요한 작업 때문에 보안 엔지니어는 취약점 패치를 위해 EC2 인스턴스를 즉시 종료할 수 없습니다. 민감한 데이터가 노출되는 것을 막는 가장 빠른 방법은 무엇일까요?", "choices": ["기존 S3 버킷의 데이터를 새 EC2 인스턴스로 다운로드합니다. 그런 다음 S3 버킷에서 데이터를 삭제합니다. 클라이언트 기반 키로 데이터를 다시 암호화합니다. 데이터를 새 S3 버킷에 업로드합니다.", "호스트 기반 방화벽을 사용하여 S3 엔드포인트 IP 주소의 공용 범위에 대한 액세스를 차단합니다. 영향을 받는 EC2 인스턴스에서 인터넷으로 향하는 트래픽이 호스트 기반 방화벽을 통해 라우팅되도록 합니다.", "IAM 역할의 활성 세션 권한을 취소합니다. S3 버킷 정책을 업데이트하여 IAM 역할에 대한 액세스를 거부합니다. EC2 인스턴스 프로필에서 IAM 역할을 제거합니다.", "현재 키를 비활성화합니다. IAM 역할에 액세스 권한이 없는 새 KMS 키를 생성하고 새 키로 모든 데이터를 다시 암호화합니다. 손상된 키를 삭제하도록 예약합니다."], "answer": "C", "multi": false, "explanation": "AWS incident response best practices emphasize rapid containment to prevent further data exposure. According to the AWS Certified Security - Specialty Study Guide, the fastest and least disruptive containment method for compromised compute resources is to immediately revoke credentials and permissions rather than modifying data or infrastructure. Revoking the IAM role's active sessions prevents the EC2 instance from continuing to access AWS services. Updating the S3 bucket policy to explicitly deny access to the IAM role ensures immediate enforcement, even if temporary credentials remain cached. Removing the IAM role from the instance profile further prevents new credentials from being issued. Option A and D involve large-scale data movement or re-encryption, which is time-consuming and operationally expensive. Option B relies on network-level controls that do not prevent access through private AWS endpoints. AWS guidance explicitly recommends credential revocation and policy-based denial as the fastest containment step during active incidents."},
  {"id": 25, "text": "한 회사가 원격 근무자를 위한 클라우드 기반 관리형 데스크톱 솔루션이 필요합니다. 회사는 직원들이 회사에서 제공한 기기를 통해서만 데스크톱에 접속할 수 있도록 보장하고자 합니다. 보안 엔지니어는 비용과 관리 부담을 최소화하는 솔루션을 설계해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["회사 소유 기기에서만 접근을 허용하는 제한 정책이 적용된 사용자 지정 가상 데스크톱 인프라(VDI) 솔루션을 배포합니다.", "Amazon EC2 인스턴스 플릿을 배포합니다. Windows Active Directory를 사용하는 인증서 기반 장치 인증을 통해 각 직원에게 인스턴스를 할당합니다.", "Amazon WorkSpaces를 배포합니다. AWS Identity and Access Management(IAM)를 사용하여 인증 게이트웨이에 IP 차단 기능이 있는 신뢰할 수 있는 장치 정책을 설정합니다.", "Amazon WorkSpaces를 배포합니다. 클라이언트 인증서를 생성하고 신뢰할 수 있는 장치에 배포합니다. 디렉터리 수준에서 액세스 제한을 활성화합니다."], "answer": "D", "multi": false, "explanation": "Amazon WorkSpaces is a fully managed desktop-as-a-service solution designed to minimize infrastructure and operational overhead. According to AWS Certified Security - Specialty documentation, WorkSpaces supports device trust by using client certificates to restrict access to approved devices. By deploying client certificates only to company-managed devices and enforcing restricted access at the directory level, the organization ensures that only trusted endpoints can authenticate. This approach avoids the cost and complexity of building and maintaining a custom VDI or managing individual EC2 instances. Option A and B significantly increase management overhead. Option C is incorrect because IAM does not manage WorkSpaces authentication gateway policies or device trust. AWS best practices highlight Amazon WorkSpaces with certificate-based device trust as the most efficient solution for secure, managed desktops."},
  {"id": 26, "text": "한 회사가 Amazon EC2 인스턴스에서 애플리케이션을 실행합니다. 이 애플리케이션은 송장을 생성하여 Amazon S3 버킷에 저장합니다. 해당 인스턴스에 연결된 인스턴스 프로필은 S3 버킷에 대한 적절한 접근 권한을 가지고 있습니다. 이 회사는 AWS 자격 증명이 없는 여러 고객과 각 송장을 공유해야 합니다. 각 고객은 자신의 송장만 다운로드할 수 있어야 하며, 송장 생성 후 1시간 이내에 다운로드해야 합니다. 또한, 고객은 회사의 AWS 리소스에 접근하기 위해 임시 자격 증명만 사용해야 합니다. 어떤 추가 조치가 이러한 요구 사항을 충족할까요?", "choices": ["사전 서명된 URL을 사용하는 클라이언트가 버킷의 S3 객체에 액세스하기 위해 S3:Get* 권한과 S3:List* 권한을 갖도록 S3 버킷 정책을 업데이트합니다.", "EC2 인스턴스 프로필에 대한 IAM 역할 정책에 문자열 같음 조건을 추가합니다. 각 송장의 s3:ResourceTag/ClientId 태그를 기준으로 액세스를 제한하도록 정책 조건을 구성합니다. 생성된 각 송장에 해당 클라이언트의 ID를 태그로 지정합니다.", "스크립트가 실행될 때마다 AWS STS(AWS Security Token Service)를 사용하여 새 자격 증명을 얻도록 스크립트를 업데이트하세요. 이를 위해 S3:GetObject 권한이 있는 새 역할을 부여합니다. 얻은 자격 증명을 사용하여 사전 서명된 URL을 생성합니다.", "S3 버킷에 대한 S3:GetObject 권한을 가진 IAM 사용자를 위한 액세스 키와 비밀 키를 생성합니다. 생성된 키를 스크립트에 포함시킵니다. 생성된 키를 사용하여 사전 서명된 URL을 생성합니다."], "answer": "B", "multi": false, "explanation": "Amazon S3 pre-signed URLs grant temporary access based on the permissions of the principal that generates them. AWS Certified Security - Specialty documentation explains that fine-grained authorization can be enforced by combining pre-signed URLs with IAM policy conditions. By tagging each invoice object with a client identifier and adding a condition to the EC2 instance role policy using s3:ResourceTag/ClientId, the role can generate pre-signed URLs only for objects associated with a specific client. This ensures that each client can access only their own invoices, even though the URLs are temporary and unauthenticated. Option A over-permissions clients. Option C is unnecessary because instance profiles already use temporary credentials. Option D violates AWS best practices by using long-term credentials. AWS recommends resource tagging with IAM policy conditions for scalable, secure access control."},
  {"id": 27, "text": "한 회사가 EU-West-1 리전에서 애플리케이션을 운영하고 있습니다. 이 애플리케이션은 AWS Key Management Service(AWS KMS) 고객 관리형 키를 사용하여 민감한 데이터를 암호화합니다. 이 회사는 애플리케이션을 EU-North-1 리전에 배포할 계획입니다. 보안 엔지니어는 새로운 리전에 배포될 애플리케이션을 위한 키 관리 솔루션을 구현해야 합니다. 이때 애플리케이션 코드 변경을 최소화해야 합니다. 보안 엔지니어는 이러한 요구 사항을 충족하기 위해 AWS KMS 구성에서 어떤 변경을 해야 할까요?", "choices": ["eu-west-1의 키 정책을 업데이트합니다. eu-north-1의 애플리케이션이 eu-west-1의 애플리케이션과 동일한 고객 관리 키를 사용하도록 지정합니다.", "해당 리전에 배포된 애플리케이션에서 사용할 새 고객 관리 키를 eu-north-1에 할당합니다.", "eu-north-1에 새 고객 관리 키를 할당합니다. 두 키에 동일한 별칭 이름을 생성합니다. 키 별칭을 사용하도록 애플리케이션 배포를 구성합니다.", "eu-north-1에 새 고객 관리 키를 할당합니다. eu--1에 대한 별칭을 생성합니다. 애플리케이션 코드가 eu--1에 대한 별칭을 가리키도록 변경합니다."], "answer": "C", "multi": false, "explanation": "AWS KMS keys are regional resources and cannot be used across Regions. According to AWS Certified Security - Specialty documentation, applications that are deployed in multiple Regions should use region-specific customer managed keys while referencing keys by alias instead of key ID. By creating a new customer managed key in eu-north-1 and assigning it the same alias as the key in eu-west-1, the application code can continue to reference the alias without modification. Each Region resolves the alias to the correct local key, ensuring encryption continues to function correctly. Option A is invalid because KMS keys are regional. Option B requires application changes. Option D introduces unsupported alias patterns. AWS best practices recommend alias-based key references for multi-Region deployments."},
  {"id": 28, "text": "AWS Organizations를 사용하는 한 회사가 AWS IAM Identity Center를 이용하여 AWS 계정에 대한 접근 권한을 관리하고 있습니다. 보안 엔지니어가 IAM Identity Center에서 사용자 지정 권한 집합을 생성하고 있습니다. 이 권한 집합은 여러 계정에서 사용할 예정입니다. AWS 관리형 정책과 고객 관리형 정책이 해당 권한 집합에 연결되어 있습니다. 보안 엔지니어는 관리자 계정에서 모든 관리자 권한을 가지고 있습니다. 보안 엔지니어가 여러 계정에 액세스 권한이 있는 IAM Identity Center 사용자에게 권한 집합을 할당하려고 하면 할당이 실패합니다. 보안 엔지니어는 이 오류를 해결하기 위해 무엇을 해야 할까요?", "choices": ["권한 집합이 할당된 모든 계정에 고객 관리 정책을 생성합니다. 각 계정에서 고객 관리 정책에 동일한 이름과 동일한 권한을 부여합니다.", "권한 집합에서 AWS 관리형 정책 또는 고객 관리형 정책 중 하나를 제거합니다. 삭제된 정책을 포함하는 두 번째 권한 세트를 생성합니다. 두 권한 세트를 사용자에게 각각 적용합니다.", "AWS 관리형 정책과 고객 관리형 정책의 논리를 평가합니다. 배포 전에 권한 집합에서 정책 충돌을 해결합니다.", "새 권한 세트를 사용자에게 추가하지 마십시오. 대신 사용자의 기존 권한 세트를 편집하여 AWS 관리형 정책과 고객 관리형 정책을 포함시키십시오."], "answer": "A", "multi": false, "explanation": "AWS IAM Identity Center permission sets that include customer managed policies require those policies to exist in each target account. According to the AWS Certified Security - Specialty Study Guide, customer managed policies are account-scoped and are not automatically propagated across accounts by Identity Center. When assigning a permission set across multiple accounts, Identity Center attempts to attach the referenced customer managed policy in each account. If the policy does not exist, the assignment fails. Creating the same customer managed policy with identical name and permissions in every target account resolves the issue. Option B increases complexity. Option C does not address the root cause. Option D violates Identity Center management best practices. AWS documentation clearly states that customer managed policies must be present in all accounts where permission sets are applied."},
  {"id": 29, "text": "한 회사가 AWS 계정 하나를 보유하고 있으며, 애플리케이션 코드 테스트를 위해 Amazon EC2 인스턴스를 사용하고 있습니다. 최근 이 회사는 해당 인스턴스가 해킹당하여 악성코드가 유포되고 있음을 발견했습니다. 분석 결과, 해킹 발생 시점은 35일 전으로 나타났습니다. 보안 엔지니어는 심각도가 높은 취약점을 발견하는 즉시 보안 팀에 이메일로 알림을 보내는 지속적인 모니터링 솔루션을 구현해야 합니다. 보안 엔지니어는 이러한 요구 사항을 충족하기 위해 어떤 조치들을 조합하여 취해야 할까요? (세 가지를 선택하세요.)", "choices": ["AWS 계정에서 AWS Security Hub를 활성화합니다.", "AWS 계정에서 Amazon GuardDuty를 활성화합니다.", "Amazon Simple Notification Service(Amazon SNS) 토픽을 생성합니다. 보안팀의 이메일 배포 목록을 해당 토픽에 구독합니다.", "Amazon Simple Queue Service(Amazon SQS) 큐를 생성합니다. 보안팀의 이메일 배포 목록을 해당 큐에 구독합니다.", "심각도가 높은 GuardDuty 발견 사항에 대한 Amazon EventBridge 규칙을 생성합니다. 해당 규칙이 토픽에 메시지를 게시하도록 구성합니다.", "심각도가 높은 Security Hub 발견 사항에 대한 Amazon EventBridge 규칙을 생성합니다. 큐에 메시지를 게시하도록 규칙을 구성합니다."], "answer": "B,C,E", "multi": true, "explanation": "Amazon GuardDuty provides continuous threat detection for compromised instances by analyzing VPC Flow Logs, DNS logs, and CloudTrail events. According to AWS Certified Security - Specialty guidance, GuardDuty is the fastest service to enable for detecting malware and compromised EC2 instances. To notify the security team, Amazon SNS provides a native email notification mechanism with minimal setup. Amazon EventBridge integrates directly with GuardDuty findings and can filter based on severity. Creating an EventBridge rule that matches high severity GuardDuty findings and publishes to SNS ensures immediate notification. Security Hub is not required for this use case and adds additional setup time. Amazon SQS does not support email subscriptions."},
  {"id": 30, "text": "한 회사가 사용자 파일 저장소로 Amazon S3를 사용하는 PHP 기반 웹 애플리케이션을 운영하고 있습니다. 해당 S3 버킷은 Amazon S3 관리형 키(SSE-S3)를 사용한 서버 측 암호화로 구성되어 있습니다. 새로운 요구 사항에 따라 암호화 키에 대한 완전한 제어 권한이 필요하게 되었습니다. 보안 엔지니어가 이러한 요구 사항을 충족하기 위해 취해야 하는 단계 조합은 무엇입니까? (세 가지를 선택하십시오.)", "choices": ["AWS 키 관리 서비스(AWS KMS)에서 새 고객 관리 키를 생성합니다.", "S3 버킷의 SSE-S3 구성을 고객 제공 키를 사용하는 서버 측 암호화(SSE-C)로 변경합니다.", "업로드 전에 PHP SDK가 SSE-S3 키를 사용하도록 구성합니다.", "AWS KMS에서 Amazon S3용 AWS 관리형 키를 생성합니다.", "S3 버킷의 SSE-S3 구성을 AWS KMS 관리형 키를 사용하는 서버 측 암호화(SSE-KMS)로 변경합니다.", "버킷의 모든 S3 객체가 새 암호화 키를 사용하도록 변경합니다."], "answer": "A,E,F", "multi": true, "explanation": "SSE-S3 uses AWS-managed keys and does not provide customer control. AWS Certified Security - Specialty documentation states that SSE-KMS with customer managed keys allows full control, auditing, and key rotation. The security engineer must first create a customer managed KMS key, then update the bucket to use SSE-KMS. Existing objects must be re- encrypted to ensure compliance. SSE-C requires the application to manage keys, increasing complexity and risk. AWS managed keys do not meet the requirement for customer-controlled encryption."},
