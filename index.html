  {"id": 191, "text": "한 회사가 모든 애플리케이션을 단일 AWS 리전으로 마이그레이션할 계획입니다. 이 회사의 애플리케이션은 Amazon EC2 인스턴스, Elastic Load Balancing(ELB) 로드 밸런서 및 Amazon S3 버킷을 조합하여 사용할 예정입니다. 회사는 마이그레이션을 최대한 빠르게 완료하고자 합니다. 모든 애플리케이션은 다음 요구 사항을 충족해야 합니다. * 데이터는 저장 시 암호화되어야 합니다. * 데이터는 전송 중에 암호화되어야 합니다. * 엔드포인트는 비정상적인 네트워크 트래픽에 대해 모니터링해야 합니다. 보안 엔지니어가 이러한 요구 사항을 최소한의 노력으로 충족하기 위해 취해야 할 조치는 어떤 조합입니까? (세 가지를 선택하십시오.)", "choices": ["AWS Systems Manager Automation을 사용하여 EC2 인스턴스에 Amazon Inspector 에이전트를 설치합니다.", "모든 AWS 계정에서 Amazon GuardDuty를 활성화합니다.", "Amazon EC2 및 Amazon S3용 VPC 엔드포인트를 생성합니다. VPC 라우팅 테이블을 업데이트하여 보안 VPC 엔드포인트만 사용하도록 합니다.", "AWS Certificate Manager(ACM)를 구성합니다. 로드 밸런서가 ACM의 인증서를 사용하도록 구성합니다.", "키 관리를 위해 AWS 키 관리 서비스(AWS KMS)를 사용하십시오. x-amz-meta-side- encryption 조건을 사용하여 PutObject 명령을 거부하는 S3 버킷 정책을 생성하십시오.", "키 관리를 위해 AWS 키 관리 서비스(AWS KMS)를 사용하십시오. x-amz-server-side- encryption 조건을 사용하여 PutObject 명령을 거부하는 S3 버킷 정책을 생성하십시오."], "answer": "B,D,F", "multi": true, "explanation": "Amazon GuardDuty는 VPC 흐름 로그, DNS 로그 및 CloudTrail 이벤트를 분석하여 변칙적이고 악의적인 네트워크 활동에 대한 지속적인 모니터링을 제공합니다. 계정 전체에서 GuardDuty를 활성화하려면 최소한의 구성이 필요하며 AWS 공인 보안 – 전문 분야 연구 가이드에 설명된 대로 엔드포인트에서 비정상적인 네트워크 트래픽을 모니터링해야 하는 요구 사항을 즉시 충족합니다. Elastic Load Balancing을 사용하는 애플리케이션의 전송 중 데이터 암호화는 AWS Certificate Manager(ACM)를 사용하여 가장 효율적으로 달성됩니다. ACM은 TLS 인증서를 자동으로 프로비저닝 및 관리하며 ACM과 ELB를 통합하면 수동 인증서 관리 없이 암호화된 통신이 가능합니다. Amazon S3의 저장 암호화의 경우 AWS 모범 사례에서는 AWS KMS를 사용하여 서버 측 암호화를 적용할 것을 권장합니다. x-amz-서버 측 암호화 조건이 존재하지 않는 한 PutObject 요청을 거부하는 S3 버킷 정책은 업로드된 모든 객체가 KMS 관리 키를 사용하여 저장 상태에서 암호화되도록 보장합니다. 이는 최소한의 운영 노력으로 강력한 암호화를 보장합니다. Amazon Inspector는 암호화나 네트워크 이상 탐지가 아닌 취약성 평가에 중점을 두기 때문에 옵션 A는 필요하지 않습니다. 옵션 C는 네트워크 복잡성을 추가하며 명시된 요구 사항을 충족할 필요가 없습니다. x-amz-meta-side- 암호화가 유효한 적용 메커니즘이 아니기 때문에 옵션 E는 올바르지 않습니다."},
  {"id": 192, "text": "한 회사가 네트워크 로드 밸런싱(NLB)의 대상으로 등록된 Amazon EC2 인스턴스를 운영하고 있습니다. 해당 NLB는 보안 그룹과 연결되어 있으며, 보안 그룹은 10.0.0.0/23에서 들어오는 TCP 트래픽을 22번 포트로 허용합니다. 이 회사는 NLB를 동일한 네트워크 ACL 및 라우팅 테이블을 공유하는 두 개의 서브넷에 매핑합니다. 라우팅 테이블에는 0.0.0.0/0에서 인터넷 게이트웨이로 가는 경로가 있습니다. 네트워크 ACL에는 우선순위가 20이고 10.0.0.0/16에서 오는 TCP 트래픽을 포트 22로 허용하는 인바운드 규칙이 하나 있습니다. 보안 엔지니어는 EC2 인스턴스에 무단 SSH 세션이 있다는 경고를 받았습니다. 무단 세션은 10.0.1.5에서 시작되었습니다. 회사 사고 대응 절차에 따라 무단 SSH 세션은 즉시 차단해야 합니다. 인스턴스는 계속 실행되어야 하며, 메모리도 손상되지 않아야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["10.0.1.5에서 오는 22번 포트의 TCP 트래픽을 차단하기 위해 네트워크 ACL에 우선순위 10의 새로운 인바운드 규칙을 추가합니다.", "인터넷 게이트웨이로 가는 경로를 제거하도록 라우팅 테이블을 업데이트합니다.", "10.0.0.0/16에서 포트 22로 들어오는 TCP 트래픽을 허용하는 보안 그룹 규칙을 제거합니다.", "AWS 관리 콘솔 또는 AWS CLI를 사용하여 EC2 인스턴스를 다시 시작합니다."], "answer": "A", "multi": false, "explanation": ""},
  {"id": 193, "text": "한 회사가 민감한 데이터베이스 자격 증명을 구성하는 AWS CloudFormation 템플릿을 배포해야 합니다. 해당 회사는 이미 AWS Key Management Service(AWS KMS)와 AWS Secrets Manager를 사용하고 있습니다. 어떤 솔루션이 요구 사항을 충족할까요?", "choices": ["CloudFormation 템플릿에서 동적 참조를 사용하여 Secrets Manager의 데이터베이스 자격 증명을 참조하십시오.", "CloudFormation 템플릿에서 암호화된 매개변수를 사용합니다.", "Secrets Manager를 참조하려면 SecureString 매개변수를 사용하십시오.", "AWS KMS로 암호화된 SecureString 매개변수를 사용합니다."], "answer": "A", "multi": false, "explanation": "AWS CloudFormation은 AWS Secrets Manager에 대한 동적 참조를 지원하므로 스택 런타임 시 중요한 값을 안전하게 검색할 수 있습니다. AWS 공인 보안 - 전문 지침에 따르면 동적 참조는 암호가 템플릿, 스택 메타데이터 또는 로그에 일반 텍스트로 저장되는 것을 방지합니다. 동적 참조를 사용하면 비밀이 암호화된 상태로 유지되고 필요할 때만 액세스할 수 있습니다. CloudFormation은 Secrets Manager 참조에 대해 SecureString 매개변수를 지원하지 않으며 템플릿을 암호화해도 실행 중 노출이 방지되지 않습니다."},
  {"id": 194, "text": "한 회사가 AWS 계정 하나를 보유하고 있으며, 애플리케이션 코드 테스트를 위해 Amazon EC2 인스턴스를 사용하고 있습니다. 최근 이 회사는 해당 인스턴스가 해킹당하여 악성코드가 유포되고 있음을 발견했습니다. 분석 결과, 해킹 발생 시점은 35일 전으로 나타났습니다. 보안 엔지니어는 심각도가 높은 취약점을 발견하는 즉시 보안 팀에 이메일로 알림을 보내는 지속적인 모니터링 솔루션을 구현해야 합니다. 보안 엔지니어는 이러한 요구 사항을 충족하기 위해 어떤 조치들을 조합하여 취해야 할까요? (세 가지를 선택하세요.)", "choices": ["AWS 계정에서 AWS Security Hub를 활성화합니다.", "AWS 계정에서 Amazon GuardDuty를 활성화합니다.", "Amazon Simple Notification Service(Amazon SNS) 토픽을 생성합니다. 보안팀의 이메일 배포 목록을 해당 토픽에 구독합니다.", "Amazon Simple Queue Service(Amazon SQS) 큐를 생성합니다. 보안팀의 이메일 배포 목록을 해당 큐에 구독합니다.", "심각도가 높은 GuardDuty 발견 사항에 대한 Amazon EventBridge 규칙을 생성합니다. 해당 규칙이 토픽에 메시지를 게시하도록 구성합니다.", "심각도가 높은 Security Hub 발견 사항에 대한 Amazon EventBridge 규칙을 생성합니다. 큐에 메시지를 게시하도록 규칙을 구성합니다."], "answer": "B,C,E", "multi": true, "explanation": "Amazon GuardDuty는 VPC 흐름 로그, DNS 로그 및 CloudTrail 이벤트를 분석하여 손상된 인스턴스에 대한 지속적인 위협 탐지 기능을 제공합니다. AWS 공인 보안 – 전문 분야 지침에 따르면 GuardDuty는 맬웨어 및 손상된 EC2 인스턴스를 탐지하는 데 사용할 수 있는 가장 빠른 서비스입니다. 보안 팀에 알리기 위해 Amazon SNS는 최소한의 설정으로 기본 이메일 알림 메커니즘을 제공합니다. Amazon EventBridge는 GuardDuty 결과와 직접 통합되며 심각도를 기준으로 필터링할 수 있습니다. 심각도가 높은 GuardDuty 결과와 일치하고 SNS에 게시하는 EventBridge 규칙을 생성하면 즉각적인 알림이 보장됩니다. 이 사용 사례에는 Security Hub가 필요하지 않으며 설정 시간이 추가됩니다. Amazon SQS는 이메일 구독을 지원하지 않습니다."},
  {"id": 195, "text": "한 회사가 사용자 파일 저장소로 Amazon S3를 사용하는 PHP 기반 웹 애플리케이션을 운영하고 있습니다. 해당 S3 버킷은 Amazon S3 관리형 키(SSE-S3)를 사용한 서버 측 암호화로 구성되어 있습니다. 새로운 요구 사항에 따라 암호화 키에 대한 완전한 제어 권한이 필요하게 되었습니다. 보안 엔지니어가 이러한 요구 사항을 충족하기 위해 취해야 하는 단계 조합은 무엇입니까? (세 가지를 선택하십시오.)", "choices": ["AWS 키 관리 서비스(AWS KMS)에서 새 고객 관리 키를 생성합니다.", "S3 버킷의 SSE-S3 구성을 고객 제공 키를 사용하는 서버 측 암호화(SSE-C)로 변경합니다.", "업로드 전에 PHP SDK가 SSE-S3 키를 사용하도록 구성합니다.", "AWS KMS에서 Amazon S3용 AWS 관리형 키를 생성합니다.", "S3 버킷의 SSE-S3 구성을 AWS KMS 관리형 키를 사용하는 서버 측 암호화(SSE-KMS)로 변경합니다.", "버킷의 모든 S3 객체가 새 암호화 키를 사용하도록 변경합니다."], "answer": "A,E,F", "multi": true, "explanation": "SSE-S3는 AWS 관리형 키를 사용하며 고객 제어 기능을 제공하지 않습니다. AWS 공인 보안 - 전문 문서에는 고객 관리형 키가 있는 SSE-KMS가 전체 제어, 감사 및 키 순환을 허용한다고 명시되어 있습니다. 보안 엔지니어는 먼저 고객 관리형 KMS 키를 생성한 다음 SSE-KMS를 사용하도록 버킷을 업데이트해야 합니다. 규정 준수를 보장하려면 기존 개체를 다시 암호화해야 합니다. SSE-C에서는 애플리케이션이 키를 관리해야 하므로 복잡성과 위험이 증가합니다. AWS 관리형 키는 고객 제어 암호화 요구 사항을 충족하지 않습니다."},
  {"id": 196, "text": "회사 보안팀은 AWS 액세스 키가 90일 이상 갱신되지 않은 경우 알림을 받아야 합니다. 보안 엔지니어는 이러한 알림을 자동으로 제공하는 솔루션을 개발해야 합니다. 어떤 해결책이 가장 적은 노력으로 이러한 요구 사항을 충족할까요?", "choices": ["24시간 주기로 실행되도록 AWS Config 관리형 규칙을 배포합니다. '액세스 키 순환' 관리형 규칙을 선택하고 maxAccessKeyAge 매개변수를 90일로 설정합니다. AWS Config에서 관리형 규칙에 대해 NON_COMPLIANT 규정 준수 유형과 일치하는 이벤트 패턴을 사용하여 Amazon EventBridge 규칙을 생성합니다. EventBridge가 보안 팀에 Amazon SNS 알림을 보내도록 구성합니다.", "AWS Trusted Advisor에서 IAM 액세스 키 순환 상태를 확인하는 스크립트를 생성하여 .csv 파일을 내보냅니다. 이 스크립트를 AWS Lambda 함수에 로드하여 .csv 파일을 Amazon S3 버킷에 업로드합니다. .csv 파일이 S3 버킷에 업로드되면 실행되는 Amazon Athena 테이블 쿼리를 생성합니다. 90일 이상 된 키에 대한 결과를 Amazon SNS 알림을 통해 보안 팀에 게시합니다.", "주기적으로 IAM 자격 증명 보고서를 다운로드하는 스크립트를 생성합니다. 이 스크립트를 Amazon EventBridge를 통해 예약된 시간에 실행될 AWS Lambda 함수에 로드합니다. Lambda 스크립트를 구성하여 보고서를 메모리에 로드하고, 키가 마지막으로 순환된 지 최소 90일이 지난 레코드만 필터링하도록 합니다. 해당 레코드가 감지되면 보안 팀에 Amazon SNS 알림을 보냅니다.", "AWS Lambda 함수를 생성하여 IAM API를 쿼리하고 모든 사용자 목록을 가져옵니다. ListAccessKeys 작업을 사용하여 사용자 목록을 순회합니다. CreateDate 필드의 값이 90일 이상 경과하지 않았는지 확인합니다. 값이 90일 이상 경과한 경우 보안 팀에 SNS 알림을 보냅니다. EventBridge 규칙을 생성하여 Lambda 함수가 매일 실행되도록 예약합니다."], "answer": "A", "multi": false, "explanation": "AWS Config 관리형 규칙 access-keys-rotated는 이 요구 사항을 위해 특화되어 있습니다. 이 규칙은 활성 IAM 액세스 키가 구성된 maxAccessKeyAge 내에 회전되었는지를 확인하며, 기본값은 90일입니다. 규칙이 IAM 사용자를 NON_COMPLIANT로 평가하면, EventBridge가 AWS Config 규정 준수 변경 이벤트와 일치시키고 Amazon SNS에 알림을 게시할 수 있습니다. 이는 관리형 서비스를 사용하며, 사용자 지정 스크립트, 자격 증명 보고서 파싱, Athena 테이블 또는 Lambda 코드를 피할 수 있습니다. Trusted Advisor와 사용자 지정 IAM API 폴링도 작동할 수 있지만, 더 많은 운영 노력과 사용자 지정 로직이 필요합니다. 가장 적은 노력과 가장 직접적인 솔루션은 AWS Config 관리형 규칙과 EventBridge, SNS를 사용하는 것입니다."},
  {"id": 197, "text": "한 회사의 데이터 과학자들이 Amazon SageMaker를 사용하여 인공지능 및 머신러닝(AI/ML) 학습 모델을 구축하려고 합니다. 이 학습 모델은 Amazon S3 버킷에 있는 대규모 데이터 세트를 사용할 예정입니다. 해당 데이터 세트에는 민감한 정보가 포함되어 있습니다. 데이터 과학자들은 평균적으로 모델 학습에 30일이 소요됩니다. S3 버킷은 적절하게 보안 설정되어 있습니다. 회사 데이터 보존 정책에 따르면 45일 이상 된 모든 데이터는 S3 버킷에서 삭제해야 합니다. 보안 엔지니어는 이러한 데이터 보존 정책을 시행하기 위해 어떤 조치를 취해야 할까요?", "choices": ["S3 버킷에 45일 후 객체를 삭제하는 S3 수명 주기 규칙을 구성합니다.", "S3 객체의 최종 수정일을 확인하고 45일보다 오래된 객체를 삭제하는 AWS Lambda 함수를 생성합니다. 각 PutObject 작업에 대해 Lambda 함수를 호출하는 S3 이벤트 알림을 생성합니다.", "S3 객체의 최종 수정일을 확인하고 45일보다 오래된 객체를 삭제하는 AWS Lambda 함수를 생성합니다. 매달 Lambda 함수를 호출하는 Amazon EventBridge 규칙을 생성합니다.", "S3 버킷에서 S3 인텔리전트 티어링을 구성하여 객체를 다른 스토리지 클래스로 자동으로 전환합니다."], "answer": "A", "multi": false, "explanation": "Amazon S3 라이프사이클 규칙은 객체의 연령에 따라 자동으로 전환하거나 삭제할 수 있는 네이티브 방식의 완전 관리형 메커니즘을 제공합니다. AWS 공인 보안 - 전문 자격 공식 학습 가이드에 따르면, S3 라이프사이클 정책은 자동으로, 일관되게, 맞춤 코드를 사용하지 않고 실행되기 때문에 데이터 보존 요구 사항을 시행하는 데 권장되고 가장 안전한 방법입니다. 객체를 45일 후에 삭제하도록 라이프사이클 규칙을 구성함으로써, 회사는 민감한 데이터 세트를 30일 모델 학습 프로세스를 지원할 만큼 충분히 보관하면서 데이터 보존 정책을 준수하도록 보장합니다. 라이프사이클 규칙은 Amazon S3 자체에 의해 시행되며, 버킷 내 모든 객체 또는 특정 접두사나 태그와 일치하는 객체에 균일하게 적용됩니다."},
  {"id": 198, "text": "한 회사가 애플리케이션을 실행하는 대규모 Amazon Linux 2 Amazon EC2 인스턴스를 보유하고 있습니다. 해당 애플리케이션은 민감한 데이터를 처리하며 다음과 같은 규정 준수 요구 사항을 충족해야 합니다. * EC2 인스턴스에 대한 원격 액세스 관리 포트는 내부 또는 외부로 노출될 수 없습니다. * 모든 원격 세션 활동은 감사 로그에 기록되어야 합니다. * EC2 인스턴스에 대한 모든 원격 액세스는 AWS IAM Identity Center를 통해 인증 및 권한 부여를 받아야 합니다. 회사 DevOps 팀은 문제를 해결하기 위해 가끔 EC2 인스턴스 중 하나에 연결해야 합니다. 어떤 솔루션이 규정 준수 요건을 충족하면서 EC2 인스턴스에 원격으로 액세스할 수 있도록 해줄까요?", "choices": ["계정 수준에서 EC2 시리얼 콘솔에 대한 액세스 권한을 부여합니다.", "EC2 인스턴스 연결을 활성화하고 보안 그룹 규칙을 구성합니다.", "AWS Systems Manager에 대한 액세스 권한을 부여하는 EC2 인스턴스 역할을 할당합니다. Systems Manager 세션 관리자에 대한 액세스 권한을 부여하는 IAM 정책을 생성합니다. 해당 정책을 DevOps 팀의 IAM 역할에 할당합니다.", "AWS Systems Manager Automation 런북을 사용하여 원격 액세스 포트를 엽니다."], "answer": "C", "multi": false, "explanation": "AWS 시스템 관리자 세션 관리자는 EC2 인스턴스에 대한 안전하고 감사 가능하며 포트 없이 접근할 수 있는 기능을 제공합니다. AWS 공인 보안 전문 시험 학습 가이드에 따르면, 세션 관리자는 관리자가 인바운드 SSH 또는 RDP 포트를 열지 않고도 인스턴스에 연결할 수 있게 하여 엄격한 규정 준수 요구 사항을 완전히 충족합니다. 세션 관리자는 AWS IAM Identity Center와 직접 통합되어 모든 접근이 중앙화된 ID 관리를 통해 인증되고 승인되도록 보장합니다. 또한, 세션 관리자는 세션 활동을 자동으로 기록하고 로그를 Amazon CloudWatch Logs 또는 Amazon S3로 전송할 수 있어 세션 동안 실행된 모든 명령의 완전한 감사 추적을 제공합니다."},
  {"id": 199, "text": "IAM 사용자가 Amazon S3 버킷의 객체에 접근하려고 할 때 '액세스 거부' 메시지를 수신합니다. 해당 사용자와 S3 버킷은 동일한 AWS 계정에 속해 있습니다. S3 버킷은 동일한 AWS 계정의 고객 관리 키를 사용하여 모든 객체를 저장 시 암호화하는 AWS KMS 키(SSE- KMS)를 사용하는 서버 측 암호화 방식으로 구성되어 있습니다. 해당 S3 버킷에는 버킷 정책이 정의되어 있지 않습니다. 해당 IAM 사용자는 IAM 정책을 통해 고객 관리 키에 대한 kms:Decrypt 권한을 부여받았습니다. 또한, 해당 IAM 정책은 S3 버킷 및 버킷 내 객체에 대한 s3:List* 및 s3:Get* 권한도 부여합니다. 다음 중 IAM 사용자가 S3 버킷의 객체에 액세스할 수 없는 가능한 이유는 무엇입니까?", "choices": ["IAM 정책에서 thekms:DescribeKey 권한을 허용해야 합니다.", "S3 버킷이 저장된 객체를 암호화하기 위해 AWS 관리형 키를 사용하도록 변경되었습니다.", "IAM 사용자가 객체에 액세스할 수 있도록 S3 버킷 정책을 추가해야 합니다.", "KMS 키 정책이 수정되어 AWS 계정이 키에 대한 전체 액세스 권한을 갖지 못하도록 했습니다."], "answer": "D", "multi": false, "explanation": "SSE-KMS를 사용할 경우, 권한 부여는 두 단계 검증으로 이루어집니다: 호출자는 객체를 읽기 위한 S3 권한을 가져야 하고, 호출자가 복호화를 위해 KMS 키를 사용할 수 있도록 허용되어야 합니다. IAM 정책에서 kms:Decrypt를 부여하더라도, KMS 키 정책이 해당 주체를 허용하지 않거나 계정이 키 사용을 위임하도록 허용하지 않으면 요청은 여전히 실패합니다. KMS 키 정책은 권한의 최종 권위자입니다: IAM 정책에서 허용하는 것으로 보이더라도 키 사용을 막을 수 있습니다. 일반적인 잘못된 구성의 예는 키 정책을 수정하면서 AWS 계정(또는 키 관리자)이 키에 대한 권한을 관리하고 위임할 수 있는 권한을 부여하는 문구를 제거하는 것입니다. 이는 흔히 'IAM 사용자 권한 활성화'를 제거하거나 계정이 IAM 정책을 사용하여 키 사용을 승인하지 못하도록 차단하는 것으로 설명됩니다. 이 경우 IAM 사용자의 IAM에서의 kms:Decrypt 권한만으로는 충분하지 않습니다. 왜냐하면 키 정책이 더 이상 이를 허용하지 않기 때문에, S3가 GetObject 중 사용자를 대신하여 KMS를 호출할 때 Access Denied 오류가 발생하게 됩니다."},
  {"id": 200, "text": "한 회사가 AWS를 사용하여 아마존 S3 버킷에 저장된 데이터에 대한 장시간 분석 프로세스를 실행하고 있습니다. 이 프로세스는 Auto Scaling 그룹에 속한 Amazon EC2 인스턴스 플릿에서 실행됩니다. EC2 인스턴스는 인터넷에 접속할 수 없는 프라이빗 서브넷에 배포됩니다. EC2 인스턴스는 기본 액세스 정책이 적용된 S3 게이트웨이 엔드포인트를 통해 Amazon S3에 액세스합니다. 각 EC2 인스턴스는 필수 S3 버킷에 대해서만 s3:GetObject 및 s3:PutObject 권한을 허용하는 인스턴스 프로필 역할을 사용합니다. 회사에서는 하나 이상의 EC2 인스턴스가 손상되어 회사 AWS 조직 외부의 S3 버킷으로 데이터가 유출되고 있음을 알게 되었습니다. 처리 작업은 계속 진행되어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["S3 게이트웨이 엔드포인트의 정책을 업데이트하여 aws:ResourceOrgId 및 aws: 조건이 모두 충족될 경우에만 S3 작업을 허용합니다. PrincipalOrgId는 회사의 조직과 일치합니다.", "aws:ResourceOrgId를 필수 항목으로 요구하도록 인스턴스 프로필 역할 정책을 업데이트합니다.", "포트 443의 아웃바운드 트래픽을 차단하는 네트워크 ACL 규칙을 추가합니다.", "조직 조건 키를 사용하여 S3 작업을 제한하는 SCP를 적용합니다."], "answer": "A", "multi": false, "explanation": "Amazon S3 게이트웨이 엔드포인트는 엔드포인트를 통해 접근할 수 있는 S3 리소스를 제한할 수 있는 엔드포인트 정책을 지원합니다. AWS Certified Security - Specialty 문서에 따르면, 엔드포인트 정책은 IAM 정책과 함께 평가되며 합법적인 워크로드를 방해하지 않고 데이터 유출 제어를 시행하는 데 이상적입니다. S3 게이트웨이 엔드포인트 정책을 업데이트하여 aws:ResourceOrgId와 aws:PrincipalOrgId가 회사의 AWS 조직과 일치하도록 요구하면, 보안 엔지니어는 EC2 인스턴스가 조직에 속한 S3 버킷에만 접근할 수 있도록 보장할 수 있습니다. 이는 외부 S3 버킷으로의 유출을 즉시 차단하는 동시에 합법적인 내부 데이터 접근은 중단 없이 계속 허용합니다."},
  {"id": 201, "text": "한 회사가 Amazon EC2 온디맨드 인스턴스와 스팟 인스턴스를 혼합하여 실행되는 애플리케이션을 개발 중입니다. 보안 엔지니어는 모든 인스턴스의 로그를 단일 위치에서 확인할 수 있는 로깅 솔루션을 제공해야 합니다. 이 솔루션은 특정 사용자 그룹만 로그를 분석하여 이벤트 패턴을 파악할 수 있도록 허용해야 합니다. 또한, 해당 사용자는 로그에 대한 SQL 쿼리를 사용하여 근본 원인 분석을 수행할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["EC2 인스턴스가 애플리케이션 로그를 단일 Amazon CloudWatch Logs 로그 그룹으로 전송하도록 구성합니다. 특정 사용자만 로그 그룹에 액세스할 수 있도록 허용합니다. CloudWatch Logs Insights를 사용하여 로그 그룹을 쿼리할 수 있습니다.", "EC2 인스턴스가 애플리케이션 로그를 단일 Amazon S3 버킷으로 전송하도록 구성합니다. 특정 사용자만 S3 버킷에 액세스할 수 있도록 허용합니다. Amazon CloudWatch Logs Insights를 사용하여 S3 버킷의 로그 파일을 쿼리합니다.", "각 EC2 인스턴스가 애플리케이션 로그를 특정 Amazon CloudWatch Logs 로그 그룹으로 전송하도록 구성합니다. 특정 사용자만 로그 그룹에 액세스할 수 있도록 허용합니다. Amazon Athena를 사용하여 모든 로그 그룹을 쿼리할 수 있습니다.", "EC2 인스턴스가 애플리케이션 로그를 단일 Amazon CloudWatch Logs 로그 그룹으로 전송하도록 구성합니다. Amazon Detective에 해당 로그 그룹에 대한 액세스 권한을 부여합니다. 특정 사용자만 Detective를 사용하여 로그 그룹을 쿼리할 수 있도록 허용합니다."], "answer": "A", "multi": false, "explanation": "옵션 A는 가장 직접적이고 목적에 맞게 제작된 AWS 로깅 워크플로우로 모든 요구사항을 충족합니다. 각 EC2 인스턴스에 CloudWatch Agent(또는 fluent-bit / 통합 로깅 구성)를 사용하면, 인스턴스가 온디맨드이든 스팟이든 상관없이 애플리케이션 로그를 단일 Amazon CloudWatch Logs 로그 그룹으로 중앙화할 수 있습니다. 중앙화는 스팟 인스턴스가 중단되고 교체되더라도 로그가 여전히 사용 가능하도록 보장합니다. 액세스 제어는 IAM 정책(선택적으로 리소스 정책/KMS 암호화)을 통해 처리되어 특정 사용자만 로그 그룹을 읽거나 쿼리할 수 있습니다. 분석을 위해 CloudWatch Logs Insights는 SQL과 유사하고 일반적으로 문제 해결을 위해 'SQL 쿼리'로 간주되는 대화형 쿼리 언어를 제공합니다. 이를 통해 별도의 데이터 레이크 파이프라인을 구축하지 않고도 대량 로그에서 빠른 필터링, 집계 및 패턴 감지가 가능합니다. 이는 중앙화된 로그 그룹에서 직접 이벤트 패턴 분석 및 근본 원인 조사를 지원합니다."},
  {"id": 202, "text": "한 회사가 AWS Organizations 내의 조직에 여러 AWS 계정을 보유하고 있습니다. 해당 계정의 Amazon S3 버킷이 공개적으로 접근 가능합니다. 보안 엔지니어는 해당 버킷에 대한 공개 접근을 제거하고 다시는 공개되지 않도록 조치해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["KMS 암호화를 적용하고 SCP를 통한 s3:GetObject 접근을 차단합니다.", "PublicAccessBlock을 활성화하고 SCP를 통한 s3:GetObject 접근을 거부합니다.", "SCP를 통해 PublicAccessBlock을 활성화하고 s3:PutPublicAccessBlock을 거부합니다.", "객체 잠금 관리를 활성화하고 SCP에 의한 s3:PutPublicAccessBlock을 거부합니다."], "answer": "C", "multi": false, "explanation": "Amazon S3 공개 액세스 차단은 버킷 정책 및 ACL을 통해 공개 액세스를 방지하는 중앙 집중식 제어 기능을 제공합니다. AWS 공인 보안 – 전문 분야 지침에서는 퍼블릭 액세스 차단을 활성화하여 우발적인 노출을 줄이고 퍼블릭 보조금을 재정의하는 가드레일을 시행할 것을 권장합니다. 버킷에서 공개 액세스 차단을 활성화하면 정책/ACL 수정과 결합될 때 현재 공개 노출이 제거되고 향후 구성 오류가 방지됩니다. 버킷이 다시 공개되지 않도록 보안 엔지니어는 보안 주체가 공개 액세스 차단을 비활성화하지 못하도록 해야 합니다. s3:PutPublicAccessBlock을 거부하는 SCP는 PublicAccessBlock 구성을 제거하거나 약화시키는 변경을 방지하여 OU 또는 계정 전체에 가드레일을 적용합니다. 옵션 A와 D는 대중 노출 통제를 직접적으로 다루지 않습니다. 옵션 B는 객체 읽기를 거부하지만 공용 액세스를 다시 활성화할 수 없도록 보장하지는 않습니다. 또한 루트 잘못된 구성 경로를 해결하지 않으며 합법적인 액세스 패턴을 방해할 수 있습니다. 옵션 C는 올바른 예방 제어(PublicAccessBlock)와 조직적 시행을 구체적으로 결합하여 향후 역전을 방지합니다."},
  {"id": 203, "text": "한 기업이 AWS 계정 전체에 걸쳐 리소스와 워크로드를 안전하게 배포해야 합니다. 해당 계정들은 AWS Organizations 내의 조직에 속해 있습니다. 해당 회사는 승인된 아키텍처 패턴의 IaC(Infrastructure as Code) 관리를 위해 AWS CloudFormation을 사용해야 합니다. 또한 리소스 및 워크로드 구성 및 생성에 대한 태깅 요구 사항과 특정 지침을 준수해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["CloudFormation 스택 정책을 사용하여 태깅 또는 구성 요구 사항을 충족하지 않는 리소스 생성을 방지하십시오. Amazon EventBridge 규칙을 사용하여 CloudFormation 외부에서 리소스를 생성하려는 API 호출을 감지하십시오.", "AWS CodePipeline 파이프라인을 사용하여 IaC로 정의된 워크로드를 CloudFormation을 통해 계정에 테스트 및 배포합니다. AWS Config 규칙을 사용하여 태깅 요구 사항을 적용합니다. 모든 OU에서 잘못 구성된 리소스가 생성되는 것을 방지하기 위해 SCP를 적용하십시오.", "CloudFormation을 통해 잘못 구성된 리소스가 생성되는 것을 방지하고 태깅 요구 사항을 적용하기 위해 IAM 권한 경계를 생성합니다. 모든 계정 역할에 권한 경계를 적용합니다. AWS Config 규칙을 사용하여 잘못 구성된 상태의 기존 리소스를 식별합니다.", "CloudFormation과 함께 AWS Service Catalog를 사용하여 승인된 아키텍처 구성에 대한 액세스를 관리합니다. 조직 전체의 계정에 Service Catalog 포트폴리오를 프로비저닝합니다. AWS Config 규칙을 사용하여 계정 전체에 걸쳐 태깅 요구 사항 및 기타 리소스 구성 정책을 적용합니다."], "answer": "D", "multi": false, "explanation": "AWS 서비스 카탈로그는 조직이 승인된 반복 가능한 CloudFormation 기반 아키텍처 패턴이 필요할 때 적합한 거버넌스 서비스입니다. 제품은 포트폴리오로 패키징되며, 관리자는 포트폴리오를 계정 간에 공유하여 팀이 승인된 구성만 배포하도록 할 수 있습니다. 서비스 카탈로그는 또한 TagOptions 및 템플릿 제약 조건을 지원하여 프로비저닝 중에 허용된 매개변수 값 및 표준화된 태깅을 적용하는 데 도움이 됩니다. 이후 AWS Config는 배포된 리소스의 계정 및 리전 전반에 걸쳐 지속적인 규정 준수 평가를 제공합니다. 스택 정책은 기존 스택 리소스를 업데이트로부터만 보호하며, 생성 시 승인된 아키텍처 패턴이나 태깅을 강제하지는 않습니다. CodePipeline은 템플릿을 배포할 수 있지만, 승인된 패턴의 거버넌스 카탈로그를 제공하지는 않습니다. 권한 경계는 IAM 권한 범위를 제한하지만, 전체 프로비저닝 제어 프레임워크는 아닙니다."},
  {"id": 204, "text": "보안 엔지니어가 VPC Flow Logs를 Amazon CloudWatch Logs에 게시하도록 구성했습니다. 하지만 10분이 지나도 로그가 나타나지 않습니다. 이 문제는 VPC Flow Logs와 연결된 IAM 역할과 관련된 것으로 확인되었습니다. 이유가 뭘까요?", "choices": ["logs:GetLogEvents가 누락되었습니다.", "엔지니어는 해당 역할을 맡을 수 없습니다.", "vpc-flow-logs.amazonaws.com 주체가 역할을 수임할 수 없습니다.", "해당 역할은 로그 스트림에 태그를 지정할 수 없습니다."], "answer": "C", "multi": false, "explanation": "VPC 플로우 로그는 CloudWatch Logs가 플로우 로그 기록을 게시할 수 있도록 사용하는 IAM 역할이 필요합니다. AWS 문서와 AWS 공인 보안 - 전문성 자료에서는 VPC 플로우 로그 서비스가 신뢰 정책을 통해 IAM 역할을 가정할 수 있어야 한다고 설명합니다. 신뢰 관계에는 서비스 주체 vpc-flow-logs.amazonaws.com이 포함되어야 합니다. 신뢰 정책이 이 주체가 역할을 가정하는 것을 허용하지 않으면 플로우 로그는 전달될 수 없고, 트래픽이 존재하더라도 CloudWatch Logs 로그 그룹에 레코드가 나타나지 않습니다. logs:GetLogEvents는 전달에 필요하지 않으며, 로그를 읽는 데 사용됩니다. 보안 엔지니어가 역할을 가정할 수 있는 능력은 관련이 없으며, 역할을 가정하는 것은 엔지니어가 아니라 서비스입니다. 태그 지정 권한은 기본 로그 전달에 필요하지 않습니다. 따라서 가장 가능성이 높은 원인은 VPC 플로우 로그 서비스 주체가 역할을 가정하지 못하게 하는 잘못된 신뢰 정책입니다."},
  {"id": 205, "text": "한 회사가 Windows Server를 실행하는 여러 Amazon EC2 인스턴스에서 인터넷에 접속 가능한 애플리케이션을 운영하고 있습니다. 이 회사는 인스턴스 프로필을 사용하여 EC2 인스턴스를 구성했습니다. 현재 보안 팀은 사내 사무실에서 AWS 사이트 간 VPN 터널을 통해 EC2 인스턴스가 호스팅되는 VPC에 접속하고 있습니다. 보안팀은 보안 사고 발생 시 VPC에 대한 모든 외부 접근을 차단하는 정책을 시행하고 있습니다. 그러나 사고 발생 시 보안팀은 인스턴스에 대한 포렌식 정보를 얻기 위해 EC2 인스턴스에 접근할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["EC2 인스턴스에 EC2 Instance Connect를 설치합니다. 필요한 권한을 부여하도록 IAM 역할에 대한 IAM 정책을 업데이트합니다. AWS CLI를 사용하여 인스턴스에 연결하기 위한 터널을 엽니다.", "EC2 인스턴스에 EC2 Instance Connect를 설치합니다. ec2-instance-connect 명령 사용자가 인스턴스에 액세스할 수 있도록 구성합니다. AWS Management Console을 사용하여 EC2 인스턴스에 연결합니다.", "VPC에 EC2 인스턴스 연결 엔드포인트를 생성합니다. EC2 인스턴스와 엔드포인트 간의 액세스를 허용하도록 적절한 보안 그룹을 구성합니다. AWS CLI를 사용하여 인스턴스에 연결하는 터널을 엽니다.", "VPC에 EC2 인스턴스 연결 엔드포인트를 생성합니다. EC2 인스턴스와 엔드포인트 간의 액세스를 허용하도록 적절한 보안 그룹을 구성합니다. AWS 관리 콘솔을 사용하여 EC2 인스턴스에 연결합니다."], "answer": "D", "multi": false, "explanation": "EC2 Instance Connect 엔드포인트는 퍼블릭 IP 주소, 인바운드 인터넷 액세스 또는 VPN 연결이 필요 없이 EC2 인스턴스에 대한 안전한 프라이빗 연결을 제공합니다. AWS 공인 보안 - 전문 문서에 따르면 Instance Connect 엔드포인트는 사고 대응 및 보안 관리 액세스 시나리오를 위해 특별히 설계되었습니다. 보안 팀은 VPC에 EC2 Instance Connect 엔드포인트를 배포함으로써 AWS Management Console을 통해 EC2 인스턴스에 대한 제어된 액세스를 계속 유지하면서 모든 외부 네트워크 액세스를 차단할 수 있습니다. 엔드포인트는 AWS 관리형 인프라와 프라이빗 연결을 사용하며 IAM 정책과 인스턴스 프로필을 사용하여 액세스가 승인됩니다. 옵션 A와 B는 직접적인 EC2 Instance Connect 설치와 여전히 외부 액세스에 의존할 수 있는 네트워크 경로를 사용합니다. 콘솔 기반 Instance Connect 엔드포인트를 사용할 때 터널링이 필요하지 않기 때문에 옵션 C는 올바르지 않습니다. 이 솔루션은 AWS 사고 대응 모범 사례에 맞춰 외부 네트워크 경로를 다시 열지 않고도 사고 발생 시 포렌식 액세스를 지원합니다."},
  {"id": 206, "text": "보안 엔지니어는 AWS 계정에 대한 보안 감사를 준비해야 합니다.", "choices": ["AWS 아티팩트 보고서", "AWS Audit Manager 제어 기능", "AWS Config 적합성 팩", "AWS Config 규칙", "Amazon Detective 조사", "AWS Identity and Access Management 액세스 분석기 내부 액세스 분석기"], "answer": "A,B,F", "multi": true, "explanation": "AWS Audit Manager controls — CloudTrail, Config, Security Hub에서 감사 평가용 증거를 자동 수집합니다. IAM Access Analyzer internal access analyzers — 계정 내 IAM 주체가 특정 리소스에 접근할 수 있는지 식별합니다. AWS Artifact reports — AWS 보안·규정 준수 문서를 온디맨드로 제공합니다."},
  {"id": 207, "text": "한 회사는 단일 AWS 계정에 대한 Amazon Aurora MySQL 데이터베이스에 대해 다음과 같은 보안 정책을 가지고 있습니다. * 데이터베이스 저장소는 저장 시 암호화되어야 합니다. * 삭제 방지 기능이 활성화되어 있어야 합니다. * 데이터베이스는 공개적으로 접근할 수 없어야 합니다. * 데이터베이스 감사 로그는 Amazon CloudWatch Logs에 게시되어야 합니다. 보안 엔지니어는 Aurora MySQL 리소스가 이 정책을 준수하는지 지속적으로 모니터링하는 솔루션을 구현해야 합니다. 이 솔루션은 언제든지 정책의 각 부분에 대한 데이터베이스의 준수 상태를 표시할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Audit Manager를 활성화합니다. 보안 요구 사항에 맞는 사용자 지정 프레임워크를 사용하도록 Audit Manager를 구성합니다. 규정 준수 상태를 확인하려면 평가 보고서를 생성합니다.", "AWS Config를 활성화합니다. 모든 Aurora MySQL 리소스에 대한 보안 요구 사항을 모니터링하는 AWS Config 관리형 규칙을 구현합니다. AWS Config 대시보드에서 규정 준수 상태를 확인합니다.", "AWS Security Hub를 활성화합니다. 보안 요구 사항을 포함하는 구성 정책을 생성합니다. 생성한 구성 정책을 모든 Aurora MySQL 리소스에 적용합니다. Security Hub에서 규정 준수 상태를 확인합니다.", "Aurora MySQL 리소스가 생성되거나 수정될 때 실행되는 Amazon EventBridge 규칙을 생성합니다. 보안 요구 사항을 확인하고 규정 준수 상태를 CloudWatch 사용자 지정 메트릭으로 전송하는 AWS Lambda 함수를 생성합니다."], "answer": "B", "multi": false, "explanation": "AWS Config는 AWS 리소스 구성을 원하는 구성 기준에 맞춰 지속적으로 모니터링하고 평가할 수 있는 완전관리형 서비스입니다. AWS 공인 보안 전문가 - 스페셜티 공식 학습 가이드에 따르면, AWS Config는 구성 변경을 추적하고, 거의 실시간으로 규정 준수를 평가하며, 개별 AWS 리소스의 규정 준수 상태를 표시하는 주요 서비스입니다. AWS Config는 Aurora MySQL의 나열된 보안 요구 사항과 직접적으로 연결되는 관리형 규칙을 제공하며, 여기에는 저장 시 암호화, 공개 접근성, 삭제 보호, CloudWatch Logs로의 로그 내보내기가 포함됩니다. 이러한 관리형 규칙은 리소스를 지속적으로 평가하고 구성 변경이 발생할 때마다 이를 준수 또는 비준수로 표시합니다. AWS Config 대시보드는 보안 엔지니어가 언제든지 리소스 및 규칙별 규정 준수 상태를 확인할 수 있게 하여, 정책의 각 부분에 대한 규정 준수 상태를 표시해야 하는 요구 사항을 충족합니다."},
  {"id": 208, "text": "보안 엔지니어가 MyLambdaFunction이라는 이름의 AWS Lambda 함수를 문제 해결하고 있습니다. 이 함수는 DOC-EXAMPLE-BUCKET이라는 이름의 Amazon S3 버킷에서 객체를 읽으려고 할 때 오류가 발생합니다. 해당 S3 버킷에는 다음과 같은 버킷 정책이 적용되어 있습니다. { \" Effect \" : \" Allow \" , \" Principal \" : { \" Service \" : \" lambda.amazonaws.com \" }, \" Action \" : \" s3:GetObject \" , \" Resource \" : \" arn:aws:s3:::DOC-EXAMPLE-BUCKET \" , \" Condition \" : { \" ArnLike \" : { \" aws:SourceArn \" : \" arn:aws:lambda:::function:MyLambdaFunction \" } } } 보안 엔지니어는 Lambda 함수가 버킷 객체를 읽을 수 있도록 정책을 어떻게 변경해야 할까요?", "choices": ["Condition 요소를 제거합니다. Principal 요소를 다음과 같이 변경합니다.{ \" AWS \" : \" arn:aws: lambda:::function:MyLambdaFunction \" }", "Action 요소를 다음과 같이 변경하세요:[ \" s3:GetObject* \" , \" s3:GetBucket* \" ]", "Resource 요소를 \" arn:aws:s3:::DOC-EXAMPLE-BUCKET/* \" 로 변경하세요.", "Resource 요소를 \"arn:aws:lambda:::function:MyLambdaFunction\"으로 변경하세요. Principal 요소를 다음과 같이 변경하세요. { \"Service\" : \"s3.amazonaws.com\" }"], "answer": "C", "multi": false, "explanation": "현재 정책은 s3:GetObject를 허용하지만 대상은 thebucket ARN(arn:aws:s3:::DOC-EXAMPLE-BUCKET)입니다. Amazon S3의 경우 GetObject와 같은 객체 수준의 작업은 버킷 ARN이 아니라 객체 ARN을 참조해야 합니다. 올바른 리소스 패턴은 /*를 추가한 버킷 ARN(예: arn:aws:s3:::DOC-EXAMPLE-BUCKET/*)으로, 권한이 버킷 내 객체에 적용되도록 합니다. 이를 설정하지 않으면, S3는 요청된 객체와 일치하지 않는 리소스를 기준으로 요청을 평가하므로, 작업이 올바른 것으로 보이더라도 접근이 거부됩니다."},
  {"id": 209, "text": "회사 보안 정책에 따라 모든 Amazon EC2 인스턴스는 Amazon 시간 동기화 서비스를 사용해야 합니다. 모든 AWS 계정에서 AWS CloudTrail 트레일이 활성화되어 있으며, 모든 VPC에 대해 VPC 흐름 로그가 활성화되어 있습니다. 보안 엔지니어는 인터넷상의 네트워크 시간 프로토콜(NTP) 서버를 사용하려는 모든 EC2 인스턴스를 식별해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["CloudTrail 로그에서 표준 시간 서버가 아닌 서버에 대한 API 호출을 모니터링합니다.", "Amazon 시간 동기화 서비스에 대한 API 호출을 CloudTrail 로그에서 모니터링합니다.", "VPC 흐름 로그를 모니터링하여 표준 시간 서버가 아닌 서버로의 트래픽을 확인합니다.", "Amazon 시간 동기화 서비스로 향하는 트래픽에 대한 VPC 흐름 로그를 모니터링합니다."], "answer": "C", "multi": false, "explanation": "EC2 인스턴스가 Amazon Time Sync Service 대신 인터넷상의 네트워크 시간 프로토콜(NTP) 서버를 사용하려는지 식별하려면 VPC 플로우 로그를 모니터링하는 것이 적절합니다. VPC 플로우 로그는 EC2 인스턴스로 들어오고 나가는 트래픽에 대한 세부 정보를 캡처하며, 외부 NTP 서버로 향하는 트래픽도 포함됩니다. 이러한 로그를 비표준 시간 서버(Amazon Time Sync Service 엔드포인트 외의 IP 주소)로 향하는 트래픽에 대해 분석함으로써, 보안 엔지니어는 회사 정책을 준수하지 않는 인스턴스를 식별할 수 있습니다. 169.254.169.123"},
  {"id": 210, "text": "한 회사의 보안 엔지니어는 최소 권한 원칙에 따라 모든 IAM 사용자 및 역할을 관리하고자 합니다. 이 보안 엔지니어는 정기적으로 IAM 권한 감사를 실시할 계획입니다. 365일 동안 보안 엔지니어는 각 IAM ID가 사용한 권한을 확인해야 합니다. 365일 동안 유효하며 사용하지 않는 권한은 모두 제거해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS CloudTrail 로그를 사용하여 IAM ID 작업을 검토하고 사용하지 않는 권한을 제거합니다.", "AWS Config를 사용하여 각 IAM ID별 구성 변경 사항을 검토하고 사용하지 않는 권한을 제거합니다.", "AWS Identity and Access Management Access Analyzer를 사용하여 최근 액세스 정보를 검토하고 사용하지 않는 권한을 제거합니다.", "AWS Trusted Advisor를 사용하여 권한이 상승된 IAM ID를 확인하고 사용하지 않는 권한을 제거합니다."], "answer": "C", "multi": false, "explanation": "IAM Access Analyzer는 사용되지 않은 접근과 IAM 아이덴티티의 마지막 접근 정보를 분석할 수 있기 때문에 최소 권한 검토에 적합한 서비스입니다. AWS 문서에 따르면 사용되지 않은 접근 분석기는 구성된 기간 내에 사용되지 않은 접근에 대한 결과를 생성할 수 있으며, 선택 가능한 범위는 최대 365일까지입니다. 이는 연간 감사 요구 사항과 직접적으로 일치합니다. CloudTrail 로그에는 원시 활동 데이터가 포함되어 있지만, 각 아이덴티티에 대해 365일치 이벤트를 수동으로 검토하는 것은 많은 노력과 오류 가능성이 있습니다. AWS Config는 구성 변경 사항을 추적하지만 실제 권한 사용량은 추적하지 않습니다. Trusted Advisor는 일부 보안 위험을 식별할 수 있지만, 사용되지 않은 권한을 체계적으로 제거하는 데 필요한 역할 수준 및 사용자 수준의 마지막 접근 분석을 제공하지 않습니다."},
  {"id": 211, "text": "한 회사가 인증 기관(CA)을 사용하여 코드 서명 인증서를 발급하는 코드 서명 애플리케이션을 개발해야 합니다. 이 솔루션은 AWS KMS(Key Management Service) 비대칭 키를 사용해야 합니다. 또한, 규정 준수를 위해 KMS 키의 생성, 출처 및 사용에 대한 변경 불가능한 증거를 수집하고 저장해야 합니다. 이 정보는 내부 감사자에게 제공되어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "choices": ["S3 객체 잠금이 활성화된 Amazon S3 버킷을 생성합니다. 모든 kms.amazonaws.com CreateKey 이벤트에 대해 이벤트 선택기와 로그 파일 유효성 검사가 활성화된 AWS CloudTrail 트레일을 생성합니다. CreateKey 이벤트를 S3 버킷으로 전송하도록 이벤트 선택기를 구성합니다. KMS 키를 생성합니다. 이벤트 선택기를 업데이트하여 KMS 키 ARN을 참조하는 API 호출을 필터링하도록 합니다. 감사 담당자에게 S3 버킷에 대한 액세스 권한을 제공합니다.", "KMS 키를 참조하는 애플리케이션 작업에 대한 로깅을 구현합니다. 로그에 모든 관련 메타데이터가 포함되도록 합니다. 로그를 Amazon CloudWatch Logs 로그 그룹에 저장합니다. 로그 그룹의 자동 내보내기를 구성하고, 내보낸 파일을 감사 담당자에게 전송합니다.", "감사자가 접근할 수 있는 Amazon DynamoDB 테이블을 생성합니다. Amazon EventBridge 규칙이 호출하는 AWS Lambda 함수를 생성합니다. KMS API 호출을 모니터링하도록 EventBridge 규칙을 구성합니다. KMS 키 ARN을 참조하는 모든 API 호출을 필터링하도록 EventBridge 규칙을 구성합니다. Lambda 함수가 API 호출 내용을 DynamoDB 테이블에 저장하도록 구성합니다.", "KMS 키 사용량을 추적하기 위해 사용자 지정 메트릭으로 Amazon CloudWatch Logs Insights를 설정합니다. 실시간 모니터링 기능을 갖춘 CloudWatch 대시보드를 사용하여 메트릭을 시각화합니다. CloudWatch 알람을 구성합니다. 구독 필터를 사용하여 감사자가 검토할 수 있도록 데이터를 별도의 계정으로 복제합니다."], "answer": "A", "multi": false, "explanation": "AWS CloudTrail은 키 생성 및 KMS 키를 참조하는 API 호출을 포함하여 AWS KMS 키 관리 및 사용 이벤트를 기록합니다. 검증된 CloudTrail 로그를 Object Lock이 설정된 S3 버킷에 저장하면 규정 준수를 위한 변경 불가능한 증거를 제공하며, 감사자는 키 생성, 출처 관련 이벤트 및 이후 사용을 검토할 수 있도록 읽기 권한을 부여받을 수 있습니다."},
  {"id": 212, "text": "한 회사가 AWS Organizations를 사용하여 회사 AWS 계정을 관리하고 있습니다. 회사 보안팀은 계정 수준의 루트 자격 증명 사용을 차단하는 예방적 보안 조치를 구현해야 합니다. 이 솔루션은 AWS 계정 루트 사용자의 계정이 손상될 위험을 최소화해야 하며, 루트 액세스 관리에 필요한 노력도 최소화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["모든 멤버 계정에서 루트 사용자를 비활성화하는 AWS Lambda 함수를 생성합니다. 중앙 집중식 결제 또는 AWS KMS 키 복구와 관련된 설정을 수정해야 하는 경우에만 루트 계정을 활성화합니다.", "IAM에서 중앙 집중식 루트 액세스 관리를 활성화합니다. 멤버 계정에서 장기 루트 자격 증명을 제거합니다. 직원들이 새 계정을 생성할 때 조직(Organizations)을 사용하도록 요구하는 회사 정책을 수립합니다.", "AWS Security Hub CSPM을 통해 중앙 집중식 루트 액세스 관리를 활성화합니다. 멤버 계정에서 장기 루트 자격 증명을 제거합니다. Security Hub CSPM에서 루트 자격 증명 없이 새 계정을 생성하도록 구성합니다.", "모든 멤버 계정에 대해 주체가 계정의 루트 사용자일 때 모든 작업을 명시적으로 거부하도록 SCP를 구성합니다. 멤버 계정의 루트 사용자는 MFA(다단계 인증)를 활성화해야 합니다. 루트 자격 증명은 정기적으로 교체해야 합니다."], "answer": "B", "multi": false, "explanation": "IAM에서 중앙 집중식 루트 액세스 관리는 올바른 예방 통제입니다. 이는 조직이 구성원 계정의 특권 루트 사용자 자격 증명을 중앙에서 관리할 수 있게 해주기 때문입니다. AWS 문서에 따르면 루트 액세스를 중앙 집중화한 후에는 조직이 구성원 계정에서 루트 사용자 자격 증명을 삭제할 수 있으며, 여기에는 비밀번호, 액세스 키, 서명 인증서, MFA 구성 등이 포함됩니다. AWS Organizations에서 생성된 새 계정은 기본적으로 루트 자격 증명을 갖고 있지 않습니다. 이는 직접적으로 침해 위험을 줄이고 모든 계정에서 루트 자격 증명을 교체하거나 모니터링하는 운영 부담을 제거합니다. Lambda는 루트 사용자를 완전히 안전하게 비활성화할 수 없습니다. Security Hub CSPM은 이러한 루트 액세스 관리 기능을 제공하지 않습니다. SCP는 많은 루트 작업을 거부할 수 있지만 장기 루트 자격 증명을 제거하지 않으며 여전히 자격 증명 관리 부담이 남아 있습니다."},
  {"id": 213, "text": "한 회사가 AWS Organizations에서 모든 기능이 활성화된 조직을 보유하고 있습니다. 관리 계정에서 회사는 eu-west-2 리전에 있는 해당 조직에 대해 AWS IAM Identity Center를 구성했습니다. 이 회사는 SAML 기반 ID 공급자를 사용하여 IAM Identity Center를 구성했습니다. 해당 회사는 us-east-1 리전의 새 AWS 계정에 IAM Identity Center와 통합되는 AWS 관리형 애플리케이션을 구성해야 합니다. AWS 관리형 애플리케이션에 인증할 사용자 대부분은 회사 ID 공급자에 추가할 수 없는 외부 타사 사용자입니다. 보안 엔지니어는 제3자 사용자를 위한 인증을 구성해야 합니다. 이 솔루션은 회사 ID 공급자와 격리된 환경을 제공해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["관리 계정의 IAM에서 타사 사용자 ID 공급자에 연결하는 SAML ID 공급자를 생성합니다. 관리 계정에서 AWS 관리형 애플리케이션에 대한 액세스를 허용하는 IAM 역할을 생성합니다.", "Amazon Cognito를 us-east-1 지역의 새 AWS 계정에 배포합니다. SAML 기반 ID 공급자를 위한 ID 풀을 구성합니다. sts:AssumeRole 액션을 사용하는 IAM 역할을 구성하여 Amazon Cognito에서 AWS 관리형 애플리케이션에 액세스할 수 있도록 합니다.", "IAM Identity Center에서 계정 인스턴스를 활성화합니다. us-east-1 지역의 새 AWS 계정에 IAM Identity Center 계정 인스턴스를 배포합니다. AWS 관리형 애플리케이션이 새 인스턴스를 사용하도록 구성합니다. 새 계정 인스턴스 디렉터리에 사용자를 구성합니다.", "타사 사용자를 위한 새 ID 공급자를 생성합니다. 새 ID 공급자를 사용하도록 조직의 관리 계정에서 IAM ID 센터에 두 번째 ID 소스를 구성합니다. 새 계정에서 AWS 관리형 애플리케이션에 대한 액세스 권한을 부여하는 새 권한 집합을 생성합니다."], "answer": "C", "multi": false, "explanation": "IAM Identity Center 계정 인스턴스는 단일 AWS 계정에서 지원되는 AWS 관리형 애플리케이션의 격리된 배포를 위해 설계되었습니다. AWS 문서에 따르면 계정 인스턴스는 한 계정에서 애플리케이션이 필요한 격리된 사용자에게 사용되어야 하며, 생성된 계정에 계속 묶여 있어야 합니다. 이는 다음 요구 사항과 일치합니다: 타사 사용자를 회사의 주요 IdP에 추가할 수 없으며, 액세스는 조직 수준 IAM Identity Center 신원 소스와 분리되어야 합니다. Amazon Cognito 신원 풀은 이 패턴에서 IAM Identity Center와 통합된 AWS 관리형 애플리케이션의 인증을 구성하지 않습니다. 관리 계정의 IAM SAML 역할은 애플리케이션 계정을 깔끔하게 격리하지 못합니다. IAM Identity Center는 인스턴스당 하나의 신원 소스만 지원하므로 조직 인스턴스에 두 번째 신원 소스를 추가하는 것은 올바른 설계가 아닙니다."},
  {"id": 214, "text": "한 회사가 여러 애플리케이션을 AWS로 마이그레이션해야 합니다. 이를 위해서는 상당한 양의 스토리지가 필요합니다. 5,000개의 자격 증명. 규정 준수 요건을 충족하기 위해 회사는 기존 암호 관리 시스템을 사용하여 키 순환, 감사 및 타사 비밀 컨테이너와의 통합을 수행할 예정입니다. 해당 회사는 예산이 제한적이므로 보안성을 유지하면서도 비용 효율적인 솔루션을 찾고 있습니다. 회사는 어떻게 하면 가장 낮은 비용으로 이를 달성할 수 있을까요?", "choices": ["아마존 S3 암호화 버킷을 사용하여 비밀 정보를 저장하고, 애플리케이션에 비밀 정보에 접근할 수 있도록 적절한 역할을 구성하십시오.", "회사의 키 관리 솔루션을 AWS Secrets Manager와 통합하도록 구성합니다.", "AWS Systems Manager Parameter Store와 통합되도록 회사 키 관리 솔루션을 구성합니다.", "회사의 키 관리 솔루션을 AWS CloudHSM과 통합하도록 구성합니다."], "answer": "C", "multi": false, "explanation": ""},
  {"id": 215, "text": "한 회사가 Amazon RDS DB 인스턴스와 Amazon Elastic Block Store(Amazon EBS) 볼륨의 백업 복사본을 보관해야 합니다. 이 백업 복사본은 서로 수백 마일 떨어진 데이터 센터에 보관해야 합니다. 이러한 요구 사항을 충족하면서 운영 오버헤드를 최소화하는 솔루션은 무엇일까요?", "choices": ["필요한 일정에 따라 백업을 생성하도록 AWS Backup을 구성합니다. 백업 계획에서 여러 가용 영역을 백업 대상으로 지정합니다.", "Amazon Data Lifecycle Manager를 구성하여 백업을 생성합니다. Amazon Data Lifecycle Manager 정책을 구성하여 백업을 Amazon S3 버킷으로 복사합니다. S3 버킷에서 복제를 활성화합니다.", "필요한 일정에 따라 백업을 생성하도록 AWS Backup을 구성합니다. 다른 AWS 리전에 대상 백업 볼트를 생성합니다. AWS Backup을 구성하여 백업 파일을 대상 백업 저장소로 복사합니다.", "Amazon Data Lifecycle Manager를 구성하여 백업을 생성합니다. 백업을 다른 AWS 리전으로 복사하는 AWS Lambda 함수를 생성합니다. Amazon EventBridge를 사용하여 예약된 시간에 Lambda 함수를 호출합니다."], "answer": "C", "multi": false, "explanation": "AWS Backup은 최소한의 운영 오버헤드로 교차 리전 백업을 관리할 수 있는 효율적인 솔루션을 제공합니다. AWS Backup에서 백업 계획을 구성하여 백업을 생성하고 이를 다른 AWS 리전의 대상 백업 볼트로 복사함으로써, 회사는 백업이 지리적으로 분리된 데이터 센터에 보관되도록 보장할 수 있습니다. 이 접근 방식은 자동 교차 리전 백업 기능을 통해 백업을 수백 마일 떨어진 곳에 저장해야 하는 요구 사항을 충족합니다."},
  {"id": 216, "text": "한 회사가 애플리케이션 로드 밸런싱(ALB)을 사용하여 동적 웹사이트를 운영하고 있습니다. 보안 엔지니어는 서로 다른 IP 주소에서 접속하는 봇들이 무차별 대입 공격을 통해 특정 서비스 엔드포인트를 빈번하게 호출하는 것을 발견했습니다. 이 문제를 해결하는 가장 빠른 방법은 무엇일까요?", "choices": ["ALB 로그를 처리하는 AWS Lambda 함수를 생성합니다. ALB의 보안 그룹에서 봇의 IP 주소를 차단합니다.", "ALB용 AWS WAF 웹 ACL을 생성합니다. 웹 ACL에 속도 기반 규칙을 추가하여 봇을 차단합니다.", "ALB 리스너 규칙을 생성합니다. 소스 IP와 경로 패턴을 조건으로 조합하여 봇과 일치시킵니다. HTTP 403 상태 코드를 반환하는 고정 응답 동작을 지정합니다.", "ALB용 AWS WAF 웹 ACL을 생성합니다. 봇을 차단하기 위해 규칙 그룹에 속도 기반 규칙을 추가합니다. 해당 규칙을 웹 ACL에 연결합니다."], "answer": "B", "multi": false, "explanation": "AWS WAF 비율 기반 규칙은 ALB에 대한 고빈도 봇 또는 브루트포스 요청 패턴에 대한 가장 빠른 네이티브 완화 수단입니다. 비율 기반 규칙은 평가 창 동안 요청을 집계 키(일반적으로 소스 IP 주소)별로 계산하고 구성된 임계값을 초과하는 클라이언트를 차단할 수 있습니다. ALB와 연관된 웹 ACL에 규칙을 직접 생성하는 것이 맞춤 Lambda 로그 처리 로직을 구축하는 것보다 더 빠르고 깔끔합니다. ALB 리스너 규칙은 알려진 소스 IP 및 경로와 일치시킬 수 있지만 분산 브루트포스 동작에 대한 자동 비율 추적을 제공하지 않습니다. 재사용 가능한 규칙 그룹을 생성하는 것은 가능하지만, 즉각적인 요구 사항이 가장 빠른 완화일 경우 불필요한 설정이 추가됩니다."},
  {"id": 217, "text": "한 회사의 보안 엔지니어가 AWS로부터 악용 경고 알림을 받았습니다. 이 알림은 누군가가 회사 AWS 계정을 이용해 악성코드를 호스팅하고 있다는 내용입니다. 조사 결과, 보안 엔지니어는 IAM 사용자가 권한 없이 생성한 새로운 Amazon S3 버킷을 발견했습니다. 보안 엔지니어는 이번 침해로 인한 결과를 최소화하기 위해 어떤 조치들을 조합하여 취해야 할까요? (세 가지를 선택하세요.)", "choices": ["모든 AWS CloudTrail 로그를 암호화합니다.", "Amazon GuardDuty를 켜세요.", "모든 IAM 사용자의 암호를 변경합니다.", "모든 AWS 액세스 키를 회전하거나 삭제합니다.", "모든 Amazon Elastic Block Store(Amazon EBS) 볼륨의 스냅샷을 생성합니다.", "인식되지 않거나 권한이 없는 리소스를 모두 삭제합니다."], "answer": "B,D,F", "multi": true, "explanation": "AWS 사고 대응 모범 사례에서는 침해의 폭발 범위를 최소화하기 위한 신속한 억제, 자격 증명 취소 및 위협 탐지를 강조합니다. AWS 공인 보안 – 전문 분야 공식 연구 가이드에 따르면, 악성 코드를 호스팅하는 Amazon S3 버킷과 같은 승인되지 않은 리소스가 발견되면 계정의 추가 오용을 막고 재발을 방지하기 위해 즉각적인 조치를 취해야 합니다. 모든 AWS 액세스 키(옵션 D)를 교체하거나 삭제하는 것은 중요한 억제 단계입니다. IAM 사용자가 손상된 경우 계속되는 무단 액세스를 방지하기 위해 해당 사용자와 연결된 모든 장기 자격 증명을 즉시 취소해야 합니다. AWS 지침에는 의심되는 자격 증명 손상에 대한 최초 대응 조치로 액세스 키 교체 또는 삭제가 명시적으로 나열되어 있습니다. 인식되지 않거나 승인되지 않은 리소스를 삭제(옵션 F)하면 남용되는 악성 인프라가 직접 제거됩니다. 이 경우 승인되지 않은 S3 버킷을 삭제하면 악성 코드 배포가 즉시 중지되고 평판 및 규정 준수에 미치는 영향이 줄어듭니다. Amazon GuardDuty(옵션 B)를 활성화하면 CloudTrail 이벤트, VPC 흐름 로그 및 DNS 로그를 분석하여 지속적인 위협 탐지가 가능합니다. GuardDuty는 공격자가 설정했을 수 있는 추가 악성 활동, 손상된 자격 증명 또는 지속성 메커니즘을 식별할 수 있습니다. AWS 설명서에서는 현재 진행 중인 위협이나 향후 위협을 탐지하기 위해 사고 도중이나 직후에 GuardDuty를 활성화할 것을 권장합니다."},
  {"id": 218, "text": "한 회사가 AWS 지원팀으로부터 알림을 받았습니다. 이 알림은 단일 독립형 AWS 계정의 액세스 키가 손상되었음을 보여줍니다. 보안 엔지니어는 문제의 범위를 파악해야 합니다. 그런 다음 보안 엔지니어는 문제를 분류하고 해결해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWSCompromisedKeyQuarantineV3 정책이 연결된 IAM 사용자를 삭제합니다. Amazon CloudWatch에서 의심스러운 활동이 있는지 확인합니다.", "AWS CloudTrail 로그를 검토합니다. 승인되지 않은 리소스를 제거합니다. AWSCompromisedKeyQuarantineV3 정책이 적용된 사용자의 모든 IAM 액세스 키를 교체합니다. 해당 사용자에게서 정책을 제거합니다.", "영향을 받는 IAM 사용자로부터 AWSCompromisedKeyQuarantineV3 정책을 제거합니다. AWS CloudTrail 로그를 검토하고 승인되지 않은 리소스를 모두 제거합니다.", "Amazon CloudWatch 로그에서 의심스러운 활동을 검토하십시오. 승인되지 않은 리소스를 모두 제거하십시오. 영향을 받는 IAM 액세스 키를 교체하십시오."], "answer": "B", "multi": false, "explanation": "AWSCompromisedKeyQuarantineV3는 IAM 사용자 자격 증명이 손상되거나 노출될 경우 AWS에서 적용하며, AWS는 지원 케이스 지침을 따르기 전에는 정책을 제거하지 말라고 명시적으로 경고합니다. 올바른 대응은 먼저 손상된 키에 대한 CloudTrail 활동을 검토하여 범위를 확인하고, API 호출 및 무단 리소스를 식별하며, 무단 리소스를 제거하고, 손상된 액세스 키를 교체하거나 회전시키고, 그 후에 보완 조치가 완료된 후에야 격리 정책을 제거하는 것입니다. 사용자를 즉시 삭제하면 유용한 추적 정보를 잃을 수 있으며 정당한 의존성이 깨질 수 있습니다. 먼저 격리 정책을 제거하는 것은 공격자의 권한이 복원될 수 있기 때문에 안전하지 않습니다. CloudWatch 로그만으로는 범위 확인에 필요한 전체 계정 수준의 API 활동 추적 기록을 제공하지 못합니다."},
  {"id": 219, "text": "한 회사가 AWS 클라우드에 여러 계정을 보유하고 있습니다. 개발자 계정의 사용자는 프로덕션 계정의 특정 리소스에 접근해야 합니다. 이러한 접근 권한을 제공하는 가장 안전한 방법은 무엇입니까?", "choices": ["프로덕션 계정에 IAM 사용자를 하나 생성합니다. 필요한 리소스에 적절한 권한을 부여합니다. 암호는 접근 권한이 필요한 사용자에게만 공유합니다.", "개발자 계정의 IAM 역할을 사용하여 교차 계정 액세스를 생성합니다. 이 역할에 적절한 권한을 부여합니다. 개발자 계정의 사용자가 이 역할을 수임하여 프로덕션 리소스에 액세스할 수 있도록 허용합니다.", "프로덕션 계정의 IAM 사용자 계정을 사용하여 교차 계정 액세스를 생성합니다. 이 사용자 계정에 적절한 권한을 부여합니다. 개발자 계정의 사용자가 이 사용자 계정을 사용하여 프로덕션 리소스에 액세스할 수 있도록 허용합니다.", "프로덕션 계정의 IAM 역할을 사용하여 교차 계정 액세스를 생성합니다. 이 역할에 적절한 권한을 부여합니다. 개발자 계정의 사용자가 이 역할을 수임하여 프로덕션 리소스에 액세스할 수 있도록 허용합니다."], "answer": "D", "multi": false, "explanation": "교차 계정 액세스에 대해 가장 안전하고 AWS에서 권장하는 패턴은 대상 계정(프로덕션)에서 IAM 역할을 생성하고, 출처 계정(개발)의 신뢰할 수 있는 사용자들이 AWS STS를 사용하여 해당 역할을 맡을 수 있도록 허용하는 것입니다. 이렇게 하면 프로덕션 계정에서 장기 자격 증명을 피할 수 있으며, 단기 세션 자격 증명을 지원하고, MFA 요구 사항, 세션 기간 제한, 역할에 부여된 정확한 최소 권한과 같은 강력한 제어 기능을 가능하게 합니다. 또한 프로덕션 계정에서 프로덕션 권한의 소유권을 중앙 집중화할 수 있어, 직무 분리 및 거버넌스 측면에서 중요합니다."},
  {"id": 220, "text": "한 회사가 전송 중 암호화를 적용하지 않는 Amazon S3 버킷을 여러 개 보유하고 있습니다. 보안 엔지니어는 회사의 기존 및 향후 모든 S3 버킷에 대해 전송 중 암호화를 적용하는 솔루션을 구현해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Config를 활성화합니다. 사전 예방적인 AWS Config 사용자 지정 정책 규칙을 생성합니다. S3 버킷 정책을 평가하여 aws:SecureTransport 조건 키에 대해 True 값이 있는지 확인하는 Guard 절을 생성합니다. AWS Config 규칙이 NON_COMPLIANT로 평가되면 리소스 생성을 차단합니다.", "AWS Config를 활성화합니다. s3-bucket-ssl-requests-only AWS Config 관리형 규칙을 구성하고 규칙 트리거 유형을 하이브리드로 설정합니다. aws:SecureTransport 조건 키 값이 False일 때 요청을 거부하는 버킷 정책을 적용하는 AWS Systems Manager Automation 런북을 생성합니다. 자동 복구 기능을 구성합니다. 런북을 규칙의 대상으로 설정합니다.", "Amazon Inspector를 활성화합니다. 사용자 지정 AWS Lambda 규칙을 생성합니다. aws:SecureTransport 조건 키 값이 False일 때 요청을 거부하도록 버킷 정책을 적용하는 Lambda 함수를 생성합니다. 해당 Lambda 함수를 규칙의 대상으로 설정합니다.", "AWS CloudTrail 트레일을 생성합니다. 트레일에서 S3 데이터 이벤트를 활성화합니다. aws:SecureTransport 조건 키 값이 False일 때 요청을 거부하는 버킷 정책을 적용하는 AWS Lambda 함수를 생성합니다. CloudTrail 트레일이 Lambda 함수를 호출하도록 구성합니다."], "answer": "B", "multi": false, "explanation": "Amazon S3에 대해 전송 중 암호화를 적용하려면 AWS 모범 사례는 aws:SecureTransport가 false인 모든 요청을 거부하는 버킷 정책 조건을 사용하여 HTTPS(TLS)를 요구하는 것입니다. 요구 사항에는 기존 버킷과 향후 버킷이 모두 포함되므로 제어 장치는 구성 드리프트를 지속적으로 평가하고 자동으로 문제를 해결해야 합니다. AWS Config는 리소스 전반에 걸쳐 지속적인 구성 규정 준수 모니터링을 위한 서비스이며, AWS Config 관리형 규칙은 낮은 운영 오버헤드로 표준화된 검사를 제공합니다. s3-bucket-ssl-requests-only 관리형 규칙은 S3 버킷이 SSL 전용 요청을 적용하는지 여부를 평가하여 전송 중 암호화 적용과 직접적으로 일치합니다. 트리거 유형을 하이브리드로 설정하면 구성 변경 시 및 주기적으로 평가가 보장됩니다. AWS Systems Manager Automation Runbook을 사용한 자동 문제 해결을 통해 조직은 수동 작업 없이 대규모로 일관되게 버킷 정책을 적용하거나 수정할 수 있습니다. 또한 이 접근 방식은 측정 가능한 규정 준수 상태를 유지하면서 규정 위반을 적극적으로 해결함으로써 거버넌스를 지원합니다. \"사전 대응\" 사용자 지정 정책 규칙은 자체적으로 기존 버킷을 수정하지 않고 \"리소스 생성 차단\"은 AWS Config가 제어를 적용하는 방식이 아니기 때문에 옵션 A가 가장 적합하지 않습니다. Amazon Inspector는 취약성 관리 서비스이고 S3 버킷 전송 정책을 관리하지 않기 때문에 옵션 C는 올바르지 않습니다. 옵션 D는 CloudTrail 데이터 이벤트가 규정 준수 엔진이 아니며 맞춤 처리가 필요하기 때문에 비효율적이고 간접적입니다."},
  {"id": 221, "text": "보안 엔지니어에게 기존 CloudTrail의 로그 파일 접두사를 업데이트하라는 요청이 들어왔습니다. CloudTrail 콘솔에서 변경 사항을 저장하려고 할 때 \"버킷 정책에 문제가 있습니다.\"라는 오류 메시지가 표시됩니다. 보안 엔지니어가 변경 사항을 저장할 수 있도록 하려면 어떻게 해야 할까요?", "choices": ["업데이트된 로그 파일 접두사를 사용하여 새 트레일을 생성한 다음 기존 트레일을 삭제합니다.", "Amazon S3 콘솔에서 기존 버킷 정책을 업데이트하여 보안 엔지니어의 주체가 PutBucketPolicy를 수행할 수 있도록 허용한 다음 CloudTrail 콘솔에서 로그 파일 접두사를 업데이트합니다.", "Amazon S3 콘솔에서 기존 버킷 정책을 새 로그 파일 접두사로 업데이트한 다음 CloudTrail 콘솔에서 로그 파일 접두사를 업데이트합니다.", "Amazon S3 콘솔에서 기존 버킷 정책을 업데이트하여 보안 엔지니어의 주체가 GetBucketPolicy를 수행할 수 있도록 허용한 다음 CloudTrail 콘솔에서 로그 파일 접두사를 업데이트합니다."], "answer": "C", "multi": false, "explanation": "CloudTrail은 로그 파일을 트레일에 구성된 정확한 Amazon S3 버킷 접두사로 전송할 수 있어야 합니다. S3 버킷 정책이 여전히 이전 접두사를 참조하면 CloudTrail은 불일치를 감지하고 버킷 정책 오류를 반환합니다. AWS 문서에서는 CloudTrail 로그를 수신하는 버킷에 대한 로그 파일 접두사를 추가, 수정 또는 제거할 때, 먼저 버킷 정책을 일치하는 접두사로 업데이트한 다음 동일한 접두사를 사용하도록 CloudTrail 트레일을 업데이트해야 한다고 명확히 명시하고 있습니다. 새 트레일을 생성할 필요는 없습니다. 보안 엔지니어에게 PutBucketPolicy 또는 GetBucketPolicy를 부여한다고 해서 CloudTrail 서비스 전달 경로가 수정되는 것은 아닙니다. 문제는 버킷 정책의 접두사 값에 있습니다."},
  {"id": 222, "text": "한 회사가 수백 개의 Amazon EC2 인스턴스에 분산된 워크로드를 실행하고 있습니다. 최근 보안 사고 발생 시, 하나의 EC2 인스턴스가 손상되어 악성코드가 실행되었고, 회사가 수동으로 해당 인스턴스를 종료할 때까지 악성코드가 계속 실행되었습니다. 현재 해당 회사는 EC2 인스턴스의 악성코드를 탐지하기 위해 Amazon GuardDuty를 사용하고 있습니다. 보안 엔지니어는 GuardDuty가 인스턴스가 감염되었다고 판단할 경우 자동으로 대응하는 솔루션을 구현해야 합니다. 이 솔루션은 사고를 완화하고 AWS Well-Architected Framework의 사고 대응 지침을 준수해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["GuardDuty 스캔에서 인스턴스가 감염된 것으로 확인되면 AWS Systems Manager 실행 명령이 실행되도록 구성합니다. 실행 명령을 사용하여 감염된 인스턴스의 운영 체제에서 모든 네트워크 어댑터를 제거합니다. 또한 실행 명령을 사용하여 인스턴스에 \"감염됨\" 태그를 추가합니다.", "GuardDuty 스캔에서 인스턴스가 감염된 것으로 확인되면 실행되는 AWS Lambda 함수를 생성합니다. 해당 Lambda 함수가 인스턴스와 연결된 모든 탄력적 네트워크 인터페이스를 삭제하도록 프로그래밍합니다. 또한 해당 인스턴스에 \"감염됨\" 태그를 추가하도록 Lambda 함수를 프로그래밍합니다.", "GuardDuty 스캔에서 인스턴스가 감염된 것으로 확인되면 실행되는 AWS Lambda 함수를 생성합니다. 해당 Lambda 함수가 인스턴스에서 모든 Amazon Elastic Block Store(Amazon EBS) 볼륨을 분리하도록 프로그래밍합니다. 또한, 분리된 EBS 볼륨에 \"감염됨\" 태그를 추가하고 인스턴스를 종료하도록 Lambda 함수를 프로그래밍합니다.", "EC2 인스턴스를 격리하기 위해 별도의 VPC를 정의합니다. 네트워크 트래픽을 허용하지 않는 보안 그룹을 정의합니다. GuardDuty 스캔에서 인스턴스가 감염된 것으로 확인되면 실행되는 AWS Lambda 함수를 생성합니다. Lambda 함수가 인스턴스를 별도의 VPC로 이동하고 인스턴스에 보안 그룹을 할당하도록 프로그래밍합니다."], "answer": "C", "multi": false, "explanation": ""},
  {"id": 223, "text": "한 기업에서 자사의 Amazon Elastic Kubernetes Service(Amazon EKS) 클러스터에 대한 무단 접근을 탐지해야 합니다. 이 솔루션은 기존 EKS 배포 환경에 추가적인 구성을 요구하지 않아야 합니다. 어떤 솔루션이 최소한의 운영 노력으로 이러한 요구 사항을 충족할까요?", "choices": ["타사 보안 추가 기능을 설치하세요.", "AWS Security Hub를 활성화하고 Kubernetes 검색 결과를 모니터링합니다.", "EKS에 대한 CloudWatch Container Insights 메트릭을 모니터링합니다.", "Amazon GuardDuty를 활성화하고 EKS 감사 로그 모니터링을 사용하십시오."], "answer": "D", "multi": false, "explanation": "Amazon GuardDuty는 관리형 위협 탐지 기능을 제공하고 Kubernetes 감사 로그를 분석하여 무단 또는 인증되지 않은 액세스 시도를 포함한 의심스러운 활동을 탐지하는 EKS 보호 기능을 지원합니다. AWS 공인 보안 - 전문 문서에서는 GuardDuty가 완전 관리형이고 에이전트 배포나 애플리케이션 코드 수정이 필요하지 않기 때문에 오버헤드가 낮은 탐지를 위해 권장합니다. EKS 감사 로그 모니터링은 관련 제어 플레인 감사 이벤트를 사용하고 분석하여 클러스터에 대한 비정상적이거나 승인되지 않은 작업을 식별하도록 설계되었습니다. 타사 추가 기능에 비해 GuardDuty는 운영 부담을 줄이고 AWS 관리형 서비스 내에서 완전히 유지됩니다. Security Hub는 GuardDuty와 같은 서비스의 결과를 집계하지만 자체적으로 탐지를 수행하지는 않습니다. CloudWatch Container Insights는 인증 보안 탐지가 아닌 성능 및 운영 지표에 중점을 둡니다. 따라서 EKS 감사 로그 모니터링으로 GuardDuty를 활성화하면 기능 활성화 외에 기존 EKS 워크로드에 대한 추가 구성 없이 최소한의 운영 노력으로 필요한 탐지 기능을 제공할 수 있습니다."},
  {"id": 224, "text": "한 회사가 AWS Organizations를 사용하고 있으며, AWS Shield Advanced를 구독 중입니다. 이 회사는 모든 계정의 타사 방화벽 로그를 Shield 대응팀과 공유해야 합니다. 해당 로그는 서버 측 암호화(SSE-S3)를 사용하는 Amazon S3 버킷에 저장됩니다. 다음 요구 사항을 충족하는 단계 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["`aws shield associate-drt-log-bucket` 명령어를 사용하여 Shield 대응팀에 해당 버킷에 대한 액세스 권한을 부여하십시오.", "Shield Advanced용 위임 관리자 계정을 생성하여 다중 계정 지원을 구성합니다.", "위임된 관리자 계정에서 Shield Advanced가 이벤트를 AWS Security Hub CSPM으로 전달하도록 구성합니다.", "IAM 역할을 생성하고 AWSShieldDRTAccessPolicy 정책을 연결합니다. drt.shield.amazonaws.com 서비스 주체를 사용하여 신뢰 정책을 생성합니다.", "조직에서 새 구성원 계정을 추가할 때 Shield Advanced가 자동으로 활성화되도록 조직 설정에서 자동 활성화 기본 설정을 구성하십시오."], "answer": "A,D", "multi": true, "explanation": "DDoS 이벤트 동안 Shield 대응 팀(SRT)이 지원하도록 하려면, 계정이 명시적으로 SRT 접근을 승인해야 합니다. associate-drt-log-bucket 작업은 제3자 소스 로그를 포함한 로그 데이터를 담고 있는 S3 버킷에 대한 SRT 접근을 승인합니다. SRT는 또한 완화 작업 중 관련 보호 및 로깅 정보를 검사할 수 있도록 AWSShieldDRTAccessPolicy 정책이 있는 IAM 역할과 Shield DRT 서비스 주체에 대한 신뢰 관계가 필요합니다. 위임된 관리 및 자동 활성화는 계정 간 Shield Advanced 관리를 도울 수 있지만, 자체적으로 특정 제3자 방화벽 로그 버킷을 SRT와 공유하지는 않습니다. Security Hub CSPM은 SRT 로그 버킷 접근과 관련이 없습니다."},
  {"id": 225, "text": "한 회사가 아마존 EC2 인스턴스에서 애플리케이션을 실행합니다. 이 애플리케이션은 송장을 생성하여 아마존 S3 버킷에 저장합니다. 해당 인스턴스에 연결된 인스턴스 프로필은 S3 버킷에 대한 적절한 접근 권한을 가지고 있습니다. 해당 회사는 AWS 계정 정보가 없는 여러 고객과 각 청구서를 공유해야 합니다. 각 고객은 본인 소유의 청구서만 다운로드할 수 있어야 합니다. 고객은 청구서 생성 후 1시간 이내에 자신의 청구서를 다운로드해야 합니다. 고객은 회사 AWS 리소스에 접근할 때 임시 자격 증명만 사용해야 합니다. 보안 엔지니어가 EC2 인스턴스에서 실행되는 스크립트를 생성합니다. 이 스크립트는 인스턴스 프로필을 사용하여 클라이언트용 S3 사전 서명 URL을 생성합니다. 각 사전 서명 URL은 1시간 후에 만료됩니다. 어떤 추가 조치가 이러한 요구 사항을 충족할까요?", "choices": ["사전 서명된 URL을 사용하는 클라이언트가 버킷의 S3 객체에 액세스하기 위해 S3:Get* 권한과 S3:List* 권한을 갖도록 S3 버킷 정책을 업데이트합니다.", "EC2 인스턴스 프로필에 대한 IAM 역할 정책에 문자열 같음 조건을 추가합니다. 각 송장의 s3:ResourceTag/ClientId 태그를 기준으로 액세스를 제한하도록 정책 조건을 구성합니다. 생성된 각 송장에 해당 클라이언트의 ID를 태그로 지정합니다.", "스크립트가 실행될 때마다 AWS STS(AWS Security Token Service)를 사용하여 새 자격 증명을 얻도록 스크립트를 업데이트합니다. 이를 위해 S3 GetObject 권한이 있는 새 역할을 부여합니다. 얻은 자격 증명을 사용하여 사전 서명된 URL을 생성합니다.", "S3 버킷에 대한 S3:GetObject 권한을 가진 IAM 사용자를 위한 액세스 키와 비밀 키를 생성합니다. 생성된 키를 스크립트에 포함시킵니다. 생성된 키를 사용하여 사전 서명된 URL을 생성합니다."], "answer": "C", "multi": false, "explanation": "AWS 보안 토큰 서비스(AWS Security Token Service)를 사용하여 역할을 가정하고 임시 자격 증명을 생성하면 장기 자격 증명 대신 단기적이고 일시적인 보안 자격 증명을 기반으로 액세스가 이루어지도록 보장할 수 있습니다. 이러한 임시 자격 증명은 1시간 후에 만료되는 서명된 URL을 생성하는 데 사용되며, 시간 제한된 액세스 요구 사항과 회사의 AWS 리소스에 접근할 때 클라이언트가 임시 자격 증명을 통해서만 상호작용해야 한다는 요구 사항을 모두 충족합니다."},
  {"id": 226, "text": "한 회사가 Amazon EC2 온디맨드 인스턴스와 스팟 인스턴스를 혼합하여 실행되는 애플리케이션을 개발 중입니다. 보안 엔지니어는 모든 인스턴스의 로그를 단일 위치에서 확인할 수 있는 로깅 솔루션을 제공해야 합니다. 이 솔루션은 특정 사용자 그룹만 로그에서 이벤트 패턴을 분석할 수 있도록 허용해야 합니다. 또한, 해당 사용자는 로그에 대한 SQL 쿼리를 사용하여 근본 원인 분석을 수행할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["EC2 인스턴스가 애플리케이션 로그를 단일 Amazon CloudWatch Logs 로그 그룹으로 전송하도록 구성합니다. 특정 사용자만 로그 그룹에 액세스할 수 있도록 허용합니다. CloudWatch Logs Insights를 사용하여 로그 그룹을 쿼리할 수 있습니다.", "EC2 인스턴스가 애플리케이션 로그를 단일 Amazon S3 버킷으로 전송하도록 구성합니다. 특정 사용자만 S3 버킷에 액세스할 수 있도록 허용합니다. Amazon CloudWatch Logs Insights를 사용하여 S3 버킷의 로그 파일을 쿼리합니다.", "각 EC2 인스턴스가 애플리케이션 로그를 특정 Amazon CloudWatch Logs 로그 그룹으로 전송하도록 구성합니다. 특정 사용자만 로그 그룹에 액세스할 수 있도록 허용합니다. Amazon Athena를 사용하여 모든 로그 그룹을 쿼리할 수 있습니다.", "EC2 인스턴스가 애플리케이션 로그를 단일 Amazon CloudWatch Logs 로그 그룹으로 전송하도록 구성합니다. Amazon Detective에 해당 로그 그룹에 대한 액세스 권한을 부여합니다. 특정 사용자만 Detective를 사용하여 로그를 분석할 수 있도록 허용합니다."], "answer": "A", "multi": false, "explanation": "Amazon CloudWatch Logs는 인스턴스가 온디맨드 인스턴스인지 스팟 인스턴스인지에 관계없이 Amazon EC2 인스턴스에서 로그를 수집하고 저장하기 위한 확장 가능한 중앙 집중식 서비스를 제공합니다. AWS 공인 보안 - 전문 분야 공식 연구 가이드에 따르면 CloudWatch Logs는 중앙 집중식 로그 집계와 애플리케이션 및 시스템 로그의 거의 실시간 분석을 위해 권장되는 서비스입니다. 단일 CloudWatch Logs 로그 그룹에 로그를 전송하도록 모든 EC2 인스턴스를 구성함으로써 보안 엔지니어는 모든 인스턴스의 로그를 하나의 중앙 위치에서 사용할 수 있도록 보장합니다. IAM 정책을 사용하여 로그 그룹에 대한 액세스를 제한할 수 있으므로 승인된 사용자만 로그를 보고 분석할 수 있습니다. CloudWatch Logs Insights는 SQL과 유사한 구문을 갖춘 강력한 쿼리 언어를 제공하므로 사용자는 로그 데이터를 효율적으로 검색, 필터링, 집계 및 분석할 수 있습니다. 이는 데이터 이동이나 추가 서비스 없이 이벤트 패턴을 식별하고 근본 원인 분석을 수행하는 SQL 스타일 쿼리에 대한 요구 사항을 직접적으로 충족합니다."},
  {"id": 227, "text": "한 회사의 보안 엔지니어가 AWS로부터 회사 AWS 계정에서 악성코드가 호스팅되고 있다는 알림을 받았습니다. 조사 결과, IAM 사용자가 권한 없이 새로운 Amazon S3 버킷을 생성한 것을 발견했습니다. 보안 엔지니어는 이번 침해로 인한 결과를 최소화하기 위해 어떤 조치들을 조합하여 취해야 할까요? (세 가지를 선택하세요.)", "choices": ["모든 AWS CloudTrail 로그를 암호화합니다.", "Amazon GuardDuty를 켜세요.", "모든 IAM 사용자의 암호를 변경합니다.", "모든 AWS 액세스 키를 회전하거나 삭제합니다.", "모든 Amazon Elastic Block Store(Amazon EBS) 볼륨의 스냅샷을 생성합니다.", "인식되지 않거나 권한이 없는 리소스를 모두 삭제합니다."], "answer": "B,D,F", "multi": true, "explanation": "AWS 사고 대응 지침에서는 즉각적인 격리, 자격 증명 무효화 및 악성 리소스 제거를 강조합니다. AWS 공인 보안 – 전문 문서에 따르면, 추가 무단 활동을 방지하려면 손상된 자격 증명을 즉시 교체하거나 삭제해야 합니다. 액세스 키를 교체하거나 삭제하면 지속적인 남용이 직접적으로 완화됩니다. 악성 S3 버킷과 같이 인식되지 않거나 승인되지 않은 리소스를 삭제하면 활성 위협이 제거되고 추가 피해가 제한됩니다. Amazon GuardDuty를 활성화하면 지속적인 모니터링이 제공되고 아직 눈에 띄지 않을 수 있는 손상된 추가 리소스나 악의적인 행동을 식별하는 데 도움이 됩니다. 모든 IAM 사용자의 암호를 변경하는 것은 손상 범위가 제한된 경우 방해가 되며 불필요합니다. CloudTrail 로그를 암호화해도 활성 영향이 줄어들지 않습니다. EBS 스냅샷을 찍는 것은 즉각적인 결과 최소화가 아닌 주로 법의학 조사를 위한 것입니다. AWS 모범 사례에서는 최초 대응 조치로 GuardDuty 활성화, 자격 증명 교체 및 악성 리소스 제거를 권장합니다."},
  {"id": 228, "text": "한 회사가 곧 출시될 제품을 위해 콘텐츠 전송 네트워크(CDN)를 구축하려고 합니다. 배포 원본 서버는 AWS 클라우드 외부에 있는 웹 서버입니다. 이 원본 서버는 모든 요청에 ​인증 헤더를 포함해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Global Accelerator를 사용하여 사용자 지정 라우팅 가속기를 생성합니다. 가속기가 TCP를 사용하도록 구성합니다. 웹 서버의 IP 주소를 지정합니다. 요청에 필요한 인증 헤더를 포함합니다. 응답 헤더에 서명된 쿠키를 사용하여 인증된 사용자의 요청에 응답하도록 웹 서버를 구성합니다.", "Amazon CloudFront 배포를 생성합니다. OAC(Origin Access Control)를 사용하도록 CloudFront를 구성합니다. 웹 서버를 오리진으로 지정합니다. OAC 요청에 필요한 인증 헤더를 포함합니다. 서명된 URL을 사용하여 인증된 사용자의 요청에 응답하도록 웹 서버를 구성합니다.", "Amazon CloudFront 배포를 생성합니다. CloudFront가 원본 서버로 사용자 지정 헤더를 전달하도록 구성합니다. 배포에 대한 신뢰할 수 있는 키 그룹을 지정합니다. 웹 서버가 서명된 URL을 사용하여 승인된 사용자의 요청에 응답하도록 구성합니다.", "AWS Global Accelerator를 사용하여 오리진 액세스 제어(OAC)를 생성합니다. 웹 서버를 오리진으로 지정합니다. 요청에 사용자 지정 헤더를 포함합니다. 응답 헤더에 서명된 쿠키를 사용하여 권한 있는 사용자의 요청에 응답하도록 웹 서버를 구성합니다."], "answer": "C", "multi": false, "explanation": "CloudFront는 콘텐츠를 전 세계적으로 캐시하고 배포하도록 설계된 CDN 서비스입니다. AWS 외부의 사용자 지정 오리진에 대해 CloudFront는 오리진 요청에 사용자 지정 헤더를 추가하거나 전달할 수 있으며, 이를 통해 오리진 웹 서버가 인증 헤더를 요구하도록 할 수 있습니다. 신뢰할 수 있는 키 그룹은 서명된 URL 또는 서명된 쿠키를 검증하는 권장 CloudFront 메커니즘입니다. 이는 CloudFront가 키 그룹에 있는 공개 키를 사용하여 뷰어 요청 서명을 확인하기 때문입니다. 오리진 액세스 제어는 외부 사용자 지정 웹 서버 오리진에는 적합한 기능이 아닙니다. AWS Global Accelerator는 TCP/UDP 엔드포인트에 대한 네트워크 라우팅을 개선하지만 CDN이 아니며 CloudFront 서명된 URL/키 그룹 동작을 제공하지 않습니다."},
  {"id": 229, "text": "한 회사가 AWS 계정 A와 계정 B 두 개를 보유하고 있습니다. 각 계정에는 VPC가 있습니다. 계정 A의 VPC에서 실행되는 애플리케이션이 계정 B의 Amazon S3 버킷에 데이터를 저장해야 합니다. 계정 A의 애플리케이션은 이미 계정 B의 S3 버킷에 대한 쓰기 권한을 가지고 있습니다. 애플리케이션과 S3 버킷은 동일한 AWS 리전에 있습니다. 이 회사는 공용 인터넷을 통해 네트워크 트래픽을 전송할 수 없습니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["두 계정 모두에서 각 가용 영역의 서브넷에 트랜짓 게이트웨이와 VPC 연결을 생성합니다. VPC 라우팅 테이블을 업데이트합니다.", "계정 A에 소프트웨어 VPN 어플라이언스를 배포합니다. 소프트웨어 VPN 어플라이언스와 계정 B의 가상 프라이빗 게이트웨이 간에 VPN 연결을 생성합니다.", "계정 A의 VPC와 계정 B의 VPC 간에 VPC 피어링 연결을 생성합니다. 피어링된 IP 범위 간의 네트워크 트래픽을 허용하도록 VPC 라우팅 테이블, 네트워크 ACL 및 보안 그룹을 업데이트합니다.", "계정 A에서 Amazon S3용 게이트웨이 VPC 엔드포인트를 생성합니다. 계정 A의 VPC 라우팅 테이블을 업데이트합니다."], "answer": "D", "multi": false, "explanation": "공용 인터넷에서 S3 액세스를 유지하기 위해 표준 AWS 접근 방식은 Amazon S3 게이트웨이 VPC 엔드포인트를 사용하는 것입니다(S3용 AWS PrivateLink는 사용되지 않으며 S3는 게이트웨이 엔드포인트를 사용함). 게이트웨이 엔드포인트는 VPC 라우팅 테이블에 경로를 추가하므로 S3으로 향하는 트래픽이 인터넷 게이트웨이, NAT 게이트웨이 또는 퍼블릭 IP 경로를 통과하지 않고 AWS 백본 네트워크에 유지됩니다. 이는 계정 A의 애플리케이션이 동일한 리전의 S3에 도달하도록 허용하면서 \"공용 인터넷을 통해 트래픽을 보낼 수 없음\" 요구 사항을 충족합니다. 교차 계정 버킷 액세스는 두 계정의 VPC 간 네트워킹이 아닌 IAM 및 S3 버킷 정책에 의해 제어됩니다. 버킷은 계정 B의 VPC 내부가 아닌 S3(지역 서비스)에 상주하므로 VPC 간 연결(피어링, 전송 게이트웨이, VPN)은 본질적으로 S3에 대한 프라이빗 액세스를 제공하지 않습니다. 이러한 옵션은 복잡성을 추가하며 S3 엔드포인트를 사용하지 않는 한 일반적으로 인터넷/NAT가 필요합니다. 계정 A의 게이트웨이 엔드포인트를 사용하면 애플리케이션이 S3에 비공개로 연결할 수 있으며 계정 B의 버킷에 쓸 수 있는 권한이 이미 부여되었기 때문에 공용 인터넷 라우팅 없이 쓰기 작업이 성공합니다."},
  {"id": 230, "text": "한 회사가 새로운 로그 분석 환경을 구축할 계획입니다. 이 회사는 여러 AWS 서비스의 로그를 거의 실시간으로 분석해야 합니다. 솔루션은 로그 검색 기능을 제공해야 하며, 특정 로그가 탐지 규칙과 일치할 경우 기존 Amazon Simple Notification Service(Amazon SNS) 토픽으로 알림을 전송해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon OpenSearch 서비스를 사용하여 로그를 분석합니다. OpenSearch API에서 로그를 검색합니다. OpenSearch Service 보안 분석을 사용하여 로그를 탐지 규칙과 일치시키고 SNS 주제로 알림을 보낼 수 있습니다.", "AWS Security Hub를 사용하여 로그를 분석합니다. Security Hub의 발견 페이지에서 로그를 검색합니다. 로그를 탐지 규칙과 일치시키고 SNS 주제로 알림을 보내는 사용자 지정 작업을 생성합니다.", "Amazon CloudWatch Logs를 사용하여 로그를 분석합니다. 구독 필터를 사용하여 로그를 탐지 규칙과 일치시키고 SNS 주제로 알림을 보냅니다. CloudWatch Logs Insights를 사용하여 로그를 수동으로 검색합니다.", "Amazon QuickSight를 사용하여 로그를 분석합니다. 대시보드에 쿼리 결과를 나열하여 로그를 검색합니다. 쿼리를 실행하여 로그를 탐지 규칙과 일치시키고 SNS 주제로 알림을 보냅니다."], "answer": "A", "multi": false, "explanation": "Amazon OpenSearch Service는 대량의 데이터에 대해 실시간에 가까운 로그 수집, 인덱싱 및 검색을 위해 설계되었습니다. AWS 공인 보안 - 전문 분야 연구 가이드에 따르면 OpenSearch는 고급 로그 분석 사용 사례를 지원하고 사전 구축된 사용자 지정 탐지 규칙을 제공하는 OpenSearch 보안 분석과 통합됩니다. Security Analytics는 여러 AWS 서비스에서 수신되는 로그를 지속적으로 평가하고 탐지 규칙이 일치하면 경고를 생성할 수 있습니다. 이러한 알림은 최소한의 구성으로 Amazon SNS로 전달할 수 있습니다. OpenSearch는 API와 대시보드를 통해 강력한 검색 및 쿼리 기능도 제공합니다. 옵션 C는 탐지를 지원하지만 고급 상관 관계 및 확장 가능한 검색 기능이 부족합니다. 옵션 B는 로그 분석 서비스가 아닙니다. 옵션 D는 시각화 서비스이며 실시간 탐지를 지원하지 않습니다. AWS 지침에서는 중앙 집중식, 실시간에 가까운 로그 분석 및 알림을 위해 OpenSearch 서비스를 권장합니다."},
  {"id": 231, "text": "보안팀은 회사의 AWS 키 관리 서비스(AWS KMS) 고객 관리 키를 관리합니다. 보안팀 구성원만 KMS 키를 관리할 수 있습니다. 회사 애플리케이션팀은 특정 소프트웨어 프로세스에서 가끔씩 해당 키에 대한 임시 접근 권한이 필요합니다. 보안팀은 애플리케이션팀의 소프트웨어 프로세스에 키 접근 권한을 제공해야 합니다. 어떤 솔루션이 운영 부담을 최소화하면서 이러한 요구 사항을 충족할까요?", "choices": ["KMS 키 자료를 온프레미스 하드웨어 보안 모듈(HSM)로 내보냅니다. 애플리케이션 팀에 키 자료에 대한 액세스 권한을 부여합니다.", "보안 팀에 KMS 키 액세스 권한을 부여하는 키 정책을 편집하여 애플리케이션 팀을 주체로 추가합니다. 애플리케이션 팀에 더 이상 액세스 권한이 필요하지 않으면 이 변경 사항을 되돌립니다.", "애플리케이션 팀이 KMS 키를 사용할 수 있도록 키 권한을 생성합니다. 애플리케이션 팀에서 더 이상 액세스가 필요하지 않으면 권한을 취소합니다.", "온프레미스에서 키 자료를 생성하여 새 KMS 키를 만듭니다. 애플리케이션 팀에서 액세스가 필요할 때마다 키 자료를 AWS KMS로 가져옵니다. 애플리케이션 팀에 키를 사용할 수 있는 권한을 부여합니다."], "answer": "C", "multi": false, "explanation": "AWS KMS 키 부여는 키 정책을 수정하지 않고도 고객 관리형 키를 사용할 수 있는 임시적이고 세분화된 권한을 제공하도록 특별히 설계되었습니다. AWS 공인 보안 – 전문 분야 연구 가이드에 따르면, 부여는 단기 또는 프로그래밍 방식 액세스 시나리오에 대해 AWS 보안 주체에게 키 사용 권한을 위임하기 위해 선호되는 메커니즘입니다. 부여는 암호화, 해독 또는 데이터 키 생성과 같은 권한을 허용하며 동적으로 생성 및 취소될 수 있습니다. 키 부여를 사용하면 장기적인 제어 메커니즘이며 안정적으로 유지되어야 하는 주요 정책 편집에 따른 운영 위험과 오버헤드를 피할 수 있습니다. AWS 설명서에서는 주요 정책이 자주 변경되면 구성 오류 및 우발적인 권한 상승 위험이 높아진다는 점을 강조합니다. 액세스가 더 이상 필요하지 않으면 부여를 즉시 취소할 수 있으므로 최소 권한 원칙을 강력하게 준수할 수 있습니다. 옵션 A와 D는 AWS 보안 모범 사례를 위반합니다. AWS KMS는 키가 명시적으로 가져오기 가능한 키로 생성되지 않는 한 키 자료의 직접 내보내기를 허용하지 않고, 키 자료를 내보내면 노출 위험이 증가하기 때문입니다. 옵션 B에는 수동 정책 변경 및 롤백이 필요하므로 운영 오버헤드와 감사 복잡성이 발생합니다. AWS는 애플리케이션에 KMS 키에 대한 임시 액세스를 제공하는 가장 효율적이고 안전한 방법으로 키 부여를 권장합니다."},
  {"id": 232, "text": "한 회사가 AWS를 사용하여 여러 국가에서 티켓 판매를 관리하는 웹 애플리케이션을 운영하고 있습니다. 최근 이 회사는 해당 애플리케이션을 Amazon API Gateway, AWS Lambda 및 Amazon Aurora Serverless를 포함하는 아키텍처로 마이그레이션했습니다. 이 회사는 애플리케이션이 PCI DSS v4.0(결제 카드 산업 데이터 보안 표준)을 준수해야 합니다. 보안 엔지니어는 애플리케이션에 적용되는 PCI DSS v4.0 통제의 효과성을 보여주는 보고서를 작성해야 합니다. 회사의 규정 준수 팀은 해당 보고서에 수동으로 증거를 추가할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Trusted Advisor를 활성화합니다. Trusted Advisor의 모든 검사를 구성합니다. PCI DSS v4.0 표준에 맞춰 검사를 수동으로 매핑하여 보고서를 생성합니다.", "AWS Config를 활성화하고 구성합니다. AWS Config에 PCI DSS 준수를 위한 운영 모범 사례 팩을 배포합니다. AWS Config를 사용하여 보고서를 생성합니다.", "AWS Security Hub를 활성화합니다. Security Hub PCI DSS 보안 표준을 활성화합니다. AWS Management Console을 사용하여 보안 표준 보고서를 다운로드합니다.", "AWS 관리형 PCI DSS v4.0 표준 프레임워크를 사용하는 AWS Audit Manager 평가를 생성합니다. 모든 증거를 평가에 추가합니다. Audit Manager에서 보고서를 생성하여 다운로드합니다."], "answer": "D", "multi": false, "explanation": "AWS Audit Manager는 조직이 규정 준수 프레임워크에 따라 AWS 사용을 지속적으로 감사하고 감사 가능한 보고서를 생성할 수 있도록 특별히 설계되었습니다. AWS 공인 보안 전문 문서에 따르면 Audit Manager에는 PCI DSS v4.0을 비롯한 규정 준수 표준을 위한 AWS 관리형 프레임워크가 포함되어 있습니다. Audit Manager는 API Gateway, Lambda, RDS, CloudTrail 및 Config와 같은 AWS 서비스에서 자동으로 증거를 수집하고 증거를 PCI DSS 제어에 직접 매핑합니다. 중요한 점은 Audit Manager를 사용하면 규정 준수 팀이 수동 증거를 업로드하고 첨부할 수 있다는 점입니다. 이는 이 시나리오의 핵심 요구 사항입니다. 옵션 C는 통제 상태에 대한 가시성을 제공하지만 수동 증거 추가를 지원하지 않습니다. 옵션 B는 구성 준수를 평가하지만 공식적인 준수 보고서를 생성하지 않습니다. 옵션 A는 광범위한 수동 작업이 필요하며 PCI 보고 작업 흐름과 일치하지 않습니다. AWS 설명서에서는 Audit Manager를 규정 준수 보고 및 감사 증거 관리를 위한 권위 있는 서비스로 지정합니다."},
  {"id": 233, "text": "한 회사가 AWS Organizations에서 동일한 조직 아래 12개의 AWS 계정으로 나뉜 플랫폼을 보유하고 있습니다. 이러한 계정 중 상당수는 Amazon API Gateway를 사용하여 회사 프런트엔드 애플리케이션에 API를 노출합니다. 이 회사는 기존 API와 향후 배포될 모든 리소스를 일반적인 SQL 인젝션 및 봇 공격으로부터 보호해야 합니다. 어떤 솔루션이 운영 부담을 최소화하면서 이러한 요구 사항을 충족할까요?", "choices": ["각 API에 대해 AWS WAF 웹 ACL을 생성합니다. SQL 인젝션 및 봇 공격을 차단하는 관리형 규칙을 포함합니다. AWS Config를 사용하여 웹 ACL이 없는 새 리소스를 감지합니다. 이러한 리소스에 웹 ACL을 프로비저닝하는 복구 작업을 구성합니다.", "AWS 방화벽 관리자를 사용하여 AWS WAF 정책을 생성합니다. AWS Bot Control 및 SQL 데이터베이스 관리형 규칙 그룹을 포함하도록 정책을 구성합니다. 리소스 유형으로 API Gateway 단계를 포함하도록 정책 범위를 설정합니다.", "SQL 인젝션 및 봇 공격을 차단하는 규칙을 포함하는 AWS WAF 웹 ACL용 AWS 서비스 카탈로그 제품을 생성합니다. AWS Config를 사용하여 이 제품이 적용되지 않은 새 리소스를 감지합니다. 이러한 리소스에 웹 ACL을 프로비저닝하는 복구 작업을 구성합니다.", "AWS Security Hub를 사용하여 보호되지 않은 리소스를 감지하고 해당 결과를 사용자 지정 작업 이벤트로 Amazon EventBridge에 전송합니다. 이러한 이벤트를 처리하도록 AWS Lambda 함수를 생성하여 보호되지 않은 리소스에 대한 AWS WAF 웹 ACL을 프로비저닝합니다 . SQL 인젝션 및 봇 공격을 차단하는 관리형 규칙을 포함합니다."], "answer": "B", "multi": false, "explanation": "회사는 기존 및 향후 API Gateway 리소스 모두에 대해 많은 계정에 걸쳐 중앙집중적이고 확장 가능한 보호가 필요하며, 최소한의 지속적인 노력으로 이를 수행해야 합니다. AWS Firewall Manager는 이를 위해 특별히 설계되었습니다. Firewall Manager는 AWS Organizations 전반에 걸쳐 AWS WAF 보호 기능을 중앙에서 배포하고 적용할 수 있습니다. Firewall Manager WAF 정책을 생성함으로써 보안 팀은 단일 제어 세트(예: SQL 인젝션 보호를 위한 AWS 관리 규칙 및 AWS Bot Control)를 정의하고, 이를 회원 계정 전반의 범위 내 리소스에 자동으로 적용할 수 있습니다. 중요한 점은 Firewall Manager가 비준수 리소스를 자동으로 수정하도록 구성할 수 있다는 점입니다. 이를 통해 향후 새 API Gateway 스테이지가 생성되더라도 각 계정별 수동 작업 없이 자동으로 정책에 포함되도록 할 수 있습니다. 이는 '기존 및 향후 리소스' 요구 사항을 직접 충족합니다."},
  {"id": 234, "text": "보안 엔지니어가 프라이빗 트래픽과 퍼블릭 트래픽을 분리하기 위해 VPC를 설계했습니다. 이 VPC에는 두 개의 가용 영역이 포함되어 있습니다. 보안 엔지니어는 각 가용 영역에 하나의 프라이빗 서브넷과 하나의 퍼블릭 서브넷을 프로비저닝했습니다. 또한, 환경에서 사용할 라우팅 테이블 세 개를 생성했습니다. 하나는 퍼블릭 서브넷용이고, 나머지 두 개는 프라이빗 서브넷용입니다(각 가용 영역의 프라이빗 서브넷에 하나씩). 보안 엔지니어는 네 개의 서브넷 모두 VPC에 연결된 인터넷 게이트웨이를 통해 트래픽을 내보내려고 시도하고 있음을 발견했습니다. 보안 엔지니어는 이 시나리오를 해결하기 위해 어떤 조치들을 조합하여 취해야 할까요? (두 가지를 선택하세요.)", "choices": ["각 가용 영역의 공용 서브넷에 NAT 게이트웨이가 프로비저닝되었는지 확인합니다.", "각 가용 영역의 프라이빗 서브넷에 NAT 게이트웨이가 프로비저닝되었는지 확인합니다.", "각 공용 서브넷과 연결된 라우팅 테이블을 수정합니다. VPC CIDR 범위에 대한 로컬 대상용 새 경로를 생성합니다.", "각 프라이빗 서브넷과 연결된 라우팅 테이블을 수정합니다. 대상 0.0.0.0/0에 대한 새 경로를 생성합니다. 경로의 대상과 동일한 가용 영역의 퍼블릭 서브넷에 있는 NAT 게이트웨이를 지정합니다.", "각 프라이빗 서브넷과 연결된 라우팅 테이블을 수정합니다. 대상 0.0.0.0/0에 대한 새 경로를 생성합니다. 경로의 대상으로 인터넷 게이트웨이를 지정합니다."], "answer": "A,D", "multi": true, "explanation": "적절하게 분할된 VPC 아키텍처에서 퍼블릭 서브넷은 인터넷 바인딩 트래픽을 인터넷 게이트웨이로 라우팅하고, 프라이빗 서브넷은 퍼블릭 서브넷에 있는 NAT 게이트웨이를 통해 아웃바운드 인터넷 트래픽을 라우팅합니다. AWS 공인 보안 - 전문 분야 공식 학습 안내서 및 Amazon VPC 문서에 따르면 프라이빗 서브넷에는 인터넷 게이트웨이에 대한 직접 경로가 있어서는 안 됩니다. 설명된 문제는 프라이빗 서브넷이 트래픽을 인터넷 게이트웨이로 직접 잘못 라우팅하고 있음을 나타냅니다. 이 문제를 해결하려면 각 퍼블릭 서브넷에 NAT 게이트웨이를 프로비저닝하여 가용 영역 전반에 걸쳐 고가용성을 보장해야 합니다. 이는 개인 리소스가 인터넷에서 직접 연결하지 않고도 아웃바운드 연결을 시작할 수 있다는 요구 사항을 충족합니다. 다음으로, 기본 경로(0.0.0.0/0)가 동일한 가용 영역의 NAT 게이트웨이를 가리키도록 프라이빗 서브넷과 연결된 라우팅 테이블을 업데이트해야 합니다. 이렇게 하면 적절한 트래픽 흐름이 보장되고 AZ 간 종속성이 방지됩니다."},
  {"id": 235, "text": "한 회사가 아마존 EC2 인스턴스 클러스터에서 애플리케이션을 운영하고 있습니다. 이 애플리케이션은 전 세계 사용자들이 이용할 수 있습니다. 회사는 AWS 웹 방화벽(WAF) 웹 접근 제어 목록(ACL)을 애플리케이션 로드 밸런싱(ALB)과 연결하여 트래픽을 EC2 인스턴스로 라우팅합니다. 보안 엔지니어가 애플리케이션 트래픽의 갑작스러운 증가를 조사하고 있습니다. 조사 결과, 두 국가에 걸쳐 수백 개의 IP 주소에서 상당량의 악성 요청이 발생하고 있는 것으로 확인되었습니다. 보안 엔지니어는 악성 요청을 신속하게 차단하고 싶지만, 정상적인 사용자의 애플리케이션 접근은 막고 싶지 않습니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS WAF를 사용하여 모든 수신 요청에 대한 속도 기반 규칙을 구현합니다.", "AWS WAF를 사용하여 두 국가에서 들어오는 모든 트래픽을 차단하는 지리적 일치 규칙을 구현합니다.", "ALB 보안 그룹을 편집하여 두 국가에서 들어오는 모든 트래픽을 차단하는 지리적 일치 규칙을 포함시키십시오.", "ALB 보안 그룹에 IP 주소로부터의 수신 요청을 금지하는 거부 규칙을 추가합니다."], "answer": "A", "multi": false, "explanation": "AWS WAF 속도 기반 규칙은 특히 다수의 IP 주소에서 발생하는 트래픽 폭주 및 분산 공격으로부터 애플리케이션을 보호하도록 설계되었습니다. AWS 공인 보안 전문가 - 전문서 공식 학습 가이드에 따르면, 속도 기반 규칙은 개별 IP 주소에서 들어오는 요청 수를 자동으로 추적하고 정의된 임계값을 초과하는 IP를 일시적으로 차단합니다. 이 시나리오에서 악성 트래픽은 두 개국에 걸쳐 수백 개의 IP 주소에서 발생하며 합법적인 사용자 트래픽과 혼합되어 있습니다. 속도 기반 규칙을 사용하면 보안 엔지니어가 전체 지리적 지역에서의 접근을 완전히 차단하지 않고도 과도한 요청 속도를 제한할 수 있으므로 합법적인 사용자가 여전히 애플리케이션에 접근할 수 있습니다."},
  {"id": 236, "text": "한 회사가 Amazon Elastic Kubernetes Service(Amazon EKS)와 Amazon Aurora를 사용하여 AWS의 Kubernetes 컨테이너에서 마이크로서비스 아키텍처를 운영하고 있습니다. 이 회사는 AWS Organizations에 조직을 구성하여 다양한 마이크로서비스를 호스팅하는 수백 개의 AWS 계정을 관리하고 있습니다. 해당 회사는 모든 계정의 모든 AWS 리소스에서 발생하는 로그를 모니터링할 수 있는 솔루션을 구현해야 합니다. 해당 솔루션에는 보안 관련 문제를 자동으로 감지하는 기능이 포함되어야 합니다. 어떤 솔루션이 최소한의 운영 노력으로 이러한 요구 사항을 충족할까요?", "choices": ["조직의 관리 계정에 Amazon GuardDuty 관리자 계정을 지정합니다. 모든 계정에 GuardDuty를 활성화하십시오. GuardDuty 관리자 계정에서 EKS 보호 및 RDS 보호를 활성화하십시오.", "모니터링 계정을 지정합니다. 모든 계정에서 Amazon CloudWatch 로그를 공유합니다. Amazon Inspector를 사용하여 로그를 평가합니다.", "CloudTrail 로그를 Amazon S3에 중앙 집중화하고 Amazon Athena로 분석합니다.", "CloudWatch 로그를 Amazon Kinesis로 스트리밍하고 사용자 지정 AWS Lambda 함수로 분석합니다."], "answer": "A", "multi": false, "explanation": "Amazon GuardDuty는 CloudTrail 이벤트, VPC 흐름 로그, DNS 로그, EKS 감사 로그, RDS 활동과 같은 AWS 로그를 지속적으로 분석하는 완전 관리형 조직 인식 위협 탐지 서비스입니다. AWS 공인 보안 - 전문 가이드에 따르면, GuardDuty는 최소한의 운영 부담으로 AWS Organizations 전반에서 대규모로 작동하도록 설계되었습니다. 조직의 관리 계정에서 GuardDuty 관리자 계정을 지정하고 조직 전체에서 GuardDuty를 활성화하면 회사는 수백 개의 AWS 계정에서 자동으로 위협 탐지를 활성화할 수 있습니다. EKS 보호를 활성화하면 GuardDuty가 Kubernetes 감사 로그를 분석하여 의심스러운 활동을 탐지할 수 있고, RDS 보호는 Amazon Aurora 데이터베이스에 대한 이상 탐지를 제공합니다."},
  {"id": 237, "text": "보안 엔지니어는 Amazon S3 버킷에 있는 객체에 대한 자세한 정보를 수집하는 로깅 솔루션을 구현해야 합니다. 이 솔루션에는 요청을 수행한 IAM ID와 객체 접근 시간과 같은 세부 정보가 포함되어야 합니다. 데이터는 구조화되어 있어야 하며 거의 실시간으로 제공되어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "choices": ["S3 버킷에서 Amazon S3 서버 액세스 로깅을 활성화합니다. 로그를 저장할 새 S3 버킷을 생성합니다. 로깅용 S3 버킷의 로그를 분석합니다.", "AWS CloudTrail 데이터 이벤트 로깅을 활성화합니다. 로그를 저장할 새 S3 버킷을 생성합니다. 로깅 S3 버킷에서 로그를 분석합니다.", "S3 버킷에 저장된 객체에 대한 접근을 기록하도록 AWS Config 규칙을 구성합니다.", "Amazon Macie가 S3 버킷에 저장된 객체에 대한 액세스 로그를 기록하도록 설정합니다."], "answer": "B", "multi": false, "explanation": "AWS CloudTrail 데이터 이벤트 로깅은 Amazon S3 객체 수준 작업에 대한 상세하고 구조화된 거의 실시간 API 활동을 캡처하도록 특별히 설계되었기 때문에 올바른 솔루션입니다. S3 데이터 이벤트가 활성화되면 CloudTrail은 GetObject, PutObject, DeleteObject와 같은 작업과 IAM 주체, 소스 IP 주소, 이벤트 시간, 요청 매개변수 및 응답 요소를 포함한 중요한 컨텍스트를 기록합니다. 이러한 로그는 JSON 형식으로 제공되어 구조가 매우 잘 갖추어져 있으며 보안 분석, SIEM 통합 및 자동 탐지 워크플로에 적합합니다."},
  {"id": 238, "text": "한 회사가 AWS 계정에서 Amazon Macie, AWS Firewall Manager, Amazon Inspector 및 AWS Shield Advanced를 사용하고 있습니다. 이 회사는 계정에 대한 DDoS 공격이 발생할 경우 알림을 받고 싶어합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["Amazon Macie를 사용하여 활성 DDoS 이벤트를 감지하고 Macie의 감지 결과에 따라 대응하는 Amazon CloudWatch 알람을 생성합니다.", "Amazon Inspector를 사용하여 리소스를 검토하고 DDoS 공격에 취약한 리소스에 대해 Amazon CloudWatch 경보를 호출하세요.", "활성 DDoS 이벤트를 감지하기 위해 AWS Firewall Manager 메트릭을 모니터링하는 Amazon CloudWatch 알람을 생성합니다.", "활성 DDoS 이벤트에 대한 AWS Shield Advanced 메트릭을 모니터링하는 Amazon CloudWatch 알람을 생성합니다."], "answer": "D", "multi": false, "explanation": "AWS Shield Advanced는 네트워크 및 애플리케이션 계층에서 분산 서비스 거부(DDoS) 공격에 대한 탐지, 완화 및 가시성을 제공하도록 특별히 설계된 AWS 고유의 관리형 서비스입니다. Shield Advanced는 DDoSDetected, AttackVolume 및 AttackVector와 같은 DDoS 관련 지표를 게시하여 Amazon CloudWatch와 직접 통합되며, 이러한 지표는 CloudWatch 알람을 사용하여 거의 실시간으로 경고를 트리거하도록 모니터링할 수 있습니다."},
  {"id": 239, "text": "한 회사가 AWS CloudTrail과 Amazon CloudWatch를 사용하여 AWS 계정의 리소스를 모니터링하고 있습니다. 회사 개발자들은 지난 3개월 동안 해당 계정에서 IAM 역할을 사용해 왔습니다. 보안 엔지니어는 역할에 연결된 고객 관리형 IAM 정책을 개선하여 해당 역할이 최소 권한 액세스를 제공하도록 해야 합니다. 어떤 해결책이 가장 적은 노력으로 이 요구 사항을 충족할까요?", "choices": ["역할에 대한 AWS IAM 액세스 분석기 정책 생성 기능을 구현합니다.", "역할에 대한 AWS IAM 액세스 분석기 정책 유효성 검사를 구현합니다.", "CloudWatch 로그를 검색하여 역할이 호출한 작업을 확인하고 권한을 평가합니다.", "AWS Trusted Advisor를 사용하여 역할에 할당된 정책을 AWS 모범 사례와 비교합니다."], "answer": "A", "multi": false, "explanation": "AWS IAM Access Analyser 정책 생성은 보안 엔지니어가 AWS CloudTrail에 기록된 실제 사용량을 기반으로 최소 권한 IAM 정책을 생성할 수 있도록 특별히 설계되었습니다. AWS 공인 보안 전문 문서에 따르면 정책 생성은 기록 CloudTrail 데이터를 분석하여 특정 기간 동안 역할이 액세스한 정확한 API 작업 및 리소스를 식별합니다. 해당 역할은 3개월 동안 적극적으로 사용되었기 때문에 IAM Access Analyser에 대한 CloudTrail 데이터가 충분하여 세분화된 고객 관리형 정책을 자동으로 생성할 수 있습니다. 이렇게 하면 수동 작업이 크게 줄어들고 로그를 분석하거나 권한을 추론할 필요가 없습니다. 생성된 정책을 검토하고 역할에 직접 연결할 수 있으므로 최소한의 엔지니어링 노력으로 최소한의 권한 액세스가 보장됩니다. 옵션 B는 보안 경고에 대한 기존 정책의 유효성만 검증하고 권한을 줄이지 않습니다. 옵션 C에는 CloudWatch 로그를 수동으로 분석해야 하는데, 이는 시간이 많이 걸리고 오류가 발생하기 쉽습니다. 옵션 D는 실제 사용량을 분석하지 않으며 역할별 최소 권한 정책을 생성할 수 없습니다. AWS 설명서에서는 관찰된 동작을 기반으로 IAM 권한을 구체화하는 가장 빠르고 정확한 방법으로 IAM Access Analyser 정책 생성을 명시적으로 권장합니다."},
  {"id": 240, "text": "보안 엔지니어는 보안 사고 발생 시 격리를 위해 Amazon EC2 인스턴스를 준비해야 합니다. AWS Systems Manager Agent(SSM Agent)가 설치되어 있으며, 포렌식 도구를 설치 및 업데이트하는 스크립트도 존재합니다. 보안 사고 발생 시 EC2 인스턴스를 격리할 수 있는 솔루션은 무엇입니까?", "choices": ["AWS Config를 사용하여 SSM 에이전트 버전을 추적합니다.", "외부 연결을 거부하도록 세션 관리자를 구성합니다.", "스크립트를 Amazon S3에 저장하고 읽기 권한을 부여하세요.", "SSM 에이전트가 스크립트를 Systems Manager 실행 명령 문서로 실행할 수 있도록 IAM 권한을 구성합니다."], "answer": "D", "multi": false, "explanation": "AWS Systems Manager Run Command를 사용하면 네트워크 액세스나 인바운드 포트 없이 EC2 인스턴스에서 명령을 안전하게 원격으로 실행할 수 있습니다. AWS 공인 보안 전문 연구 가이드에 따르면 Run Command는 법의학 도구 설치, 증거 수집 또는 격리 제어 적용과 같은 사고 대응 조치에 권장되는 메커니즘입니다. 사전 정의된 Run Command 문서를 실행할 수 있는 SSM 에이전트 권한을 부여함으로써 보안 엔지니어는 영향을 받는 인스턴스 전체에 걸쳐 격리 스크립트를 즉시 실행할 수 있습니다. 이 접근 방식은 보안 사고 발생 시 매우 중요한 자동화, 확장성 및 감사 가능성을 지원합니다. 옵션 A, B, C는 격리를 직접 시행하거나 대응 작업을 실행하지 않습니다. 버전 추적 및 스크립트 저장만으로는 사고 대응이 시작되지 않습니다. AWS 설명서에서는 Systems Manager Run Command를 자동화된 억제 및 조사를 위한 핵심 기능으로 강조합니다."},
  {"id": 241, "text": "한 회사가 AWS Fargate를 사용하는 Amazon Elastic Container Service(Amazon ECS) 클러스터에서 컨테이너화된 애플리케이션을 실행하고 있습니다. 이 애플리케이션은 여러 개의 ECS 서비스로 실행됩니다. 각 ECS 서비스는 인터넷에 연결된 애플리케이션 로드 밸런서(ALB)의 개별 대상 그룹에 속해 있습니다. 이 ALB는 Amazon CloudFront 배포의 오리진 서버입니다. AWS WAF 웹 접근 제어 목록(ACL)이 해당 CloudFront 배포와 연결되어 있습니다. 웹 클라이언트는 CloudFront 배포를 통해 ECS 서비스에 액세스합니다. 회사는 웹 클라이언트가 웹 ACL을 우회하여 ALB에 직접 액세스할 수 있다는 사실을 알게 되었습니다. 웹 클라이언트가 ALB에 직접 접근하는 것을 방지할 수 있는 해결책은 무엇입니까?", "choices": ["AWS PrivateLink 엔드포인트를 생성합니다. 기존 ALB를 대상으로 지정합니다. PrivateLink 엔드포인트를 원본으로 설정하여 CloudFront 배포를 업데이트합니다.", "새 내부 ALB를 생성합니다. 모든 ECS 서비스를 내부 ALB로 이동합니다. 인터넷 연결 ALB를 삭제합니다. 내부 ALB를 오리진으로 설정하여 CloudFront 배포를 업데이트합니다.", "기존 ALB에 대한 리스너 규칙을 수정합니다. CloudFront 오리진 접두사 목록에 있는 IP 주소에서 오는 요청만 전달하는 조건을 추가합니다.", "오리진에 X-Shared-Secret 사용자 지정 헤더를 추가하여 CloudFront 배포를 업데이트합니다. 기존 ALB의 리스너 규칙을 수정하여 X-Shared-Secret 헤더 값이 올바른 요청만 전달하도록 합니다."], "answer": "D", "multi": false, "explanation": "정확한 해결책은 옵션 D입니다. 이는 Amazon CloudFront에서 시작되는 합법적인 트래픽을 허용하면서 인터넷에 직접 노출되는 ALB로의 직접 접근을 효과적으로 방지하기 때문입니다. CloudFront를 구성하여 모든 오리진 요청에 사용자 정의 HTTP 헤더(X-Shared-Secret 등)를 포함시키고, ALB 리스너 규칙을 구성하여 예상된 헤더 값이 포함된 요청만 전달하도록 하면, ALB는 CloudFront를 우회하는 모든 요청을 거부합니다. 이 접근 방식은 CloudFront가 ALB 앞에 배치되고 AWS WAF가 CloudFront 배포와 연결될 때의 AWS 문서화된 모범 사례입니다. AWS WAF는 CloudFront를 통해 흐르는 트래픽만 평가하기 때문에 ALB에 대한 직접 접근을 방지하는 것이 모든 요청이 웹 ACL에 의해 검사되도록 하는 데 중요합니다."},
  {"id": 242, "text": "한 회사가 SAML 페더레이션과 IAM을 사용하여 내부 사용자에게 AWS 계정에 대한 SSO(단일 로그인)를 제공합니다. 이 회사의 ID 공급자 인증서는 일반적인 수명 주기의 일환으로 교체되었습니다. 얼마 지나지 않아 사용자들이 로그인하려고 할 때 다음과 같은 오류 메시지를 받기 시작했습니다. \"오류: 응답 서명이 잘못되었습니다(서비스: AWSSecurityTokenService; 상태 코드: 400; 오류 코드: InvalidIdentityToken)\" 보안 엔지니어는 당면한 문제를 해결하고 재발 방지 조치를 취해야 합니다. 보안 엔지니어는 이 목표를 달성하기 위해 어떤 단계들을 조합하여 수행해야 할까요? (두 가지를 선택하세요.)", "choices": ["ID 공급자로부터 SAML 메타데이터 파일의 새 사본을 다운로드합니다. 새 IAM ID 공급자 엔티티를 생성합니다. 새 메타데이터 파일을 새 IAM ID 공급자 엔티티에 업로드합니다.", "다음 인증서 갱신 기간 동안, 그리고 현재 인증서가 만료되기 전에 새 인증서를 ID 공급자의 보조 인증서로 추가합니다. 새 메타데이터 파일을 생성하여 IAM ID 공급자 엔티티에 업로드합니다. 필요에 따라 자동 또는 수동으로 인증서를 갱신합니다.", "ID 공급자로부터 SAML 메타데이터 파일의 새 사본을 다운로드합니다. 다운로드한 새 메타데이터를 해당 SAML 통합을 위해 구성된 IAM ID 공급자 엔티티에 업로드합니다.", "다음 인증서 갱신 기간 중 및 현재 인증서 만료 전에 새 인증서를 ID 공급자의 보조 인증서로 추가합니다. 메타데이터 파일의 새 복사본을 생성하고 새 IAM ID 공급자 엔티티를 생성합니다. 새 IAM ID 공급자 엔티티에 메타데이터 파일을 업로드합니다. 필요에 따라 자동 또는 수동으로 인증서를 갱신합니다.", "ID 공급자로부터 SAML 메타데이터 파일의 새 복사본을 다운로드합니다. 새 IAM ID 공급자 엔티티를 생성합니다. 새 메타데이터 파일을 새 IAM ID 공급자 엔티티에 업로드합니다. SAML 어설션에 새 IAM ID 공급자 엔티티 이름을 전달하도록 ID 공급자 구성을 업데이트합니다."], "answer": "B,C", "multi": true, "explanation": "즉각적인 오류는 IAM의 인증서 정보가 더 이상 아이덴티티 제공자의 SAML 서명 메타데이터와 일치하지 않음을 나타냅니다. AWS 문제 해결 가이드라인에 따르면 이 오류는 만료되었거나 교체된 인증서가 업데이트되는 등 페더레이션 메타데이터가 변경될 때 발생할 수 있으며, 해결 방법은 IdP에서 업데이트된 SAML 메타데이터 파일을 다운로드하는 것입니다. 메타데이터는 역할 신뢰 관계에 사용되는 기존 IAM SAML 제공자에 업로드해야 합니다. 새로운 제공자 엔터티를 만드는 것은 추가적인 역할 신뢰 및 어설션 변경이 필요하며 즉각적인 깔끔한 해결책은 아닙니다. 향후 교체를 대비하여 만료 전에 새 인증서를 추가하고 메타데이터를 업데이트하면 인증서 수명 주기 동안 또 다른 중단을 방지할 수 있습니다."},
  {"id": 243, "text": "한 회사가 아마존 EC2 인스턴스 클러스터에서 애플리케이션을 운영하고 있습니다. 이 애플리케이션은 전 세계 사용자들이 이용할 수 있습니다. 회사는 AWS 웹 방화벽(WAF) 웹 접근 제어 목록(ACL)을 애플리케이션 로드 밸런싱(ALB)과 연결하여 트래픽을 EC2 인스턴스로 라우팅합니다. 보안 엔지니어가 애플리케이션 트래픽의 갑작스러운 증가를 조사하고 있습니다. 조사 결과, 두 국가에 걸쳐 수백 개의 IP 주소에서 상당량의 악성 요청이 발생하고 있는 것으로 확인되었습니다. 보안 엔지니어는 악성 요청을 신속하게 차단하고자 하지만, 정상적인 사용자의 애플리케이션 접근은 차단하고 싶지 않습니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS WAF를 사용하여 모든 수신 요청에 대한 속도 기반 규칙을 구현합니다.", "AWS WAF를 사용하여 두 국가에서 들어오는 모든 트래픽을 차단하는 지리적 일치 규칙을 구현합니다.", "ALB 보안 그룹을 편집하여 두 국가에서 들어오는 모든 트래픽을 차단하는 지리적 일치 규칙을 포함시키십시오.", "ALB 보안 그룹에 IP 주소로부터의 수신 요청을 금지하는 거부 규칙을 추가합니다."], "answer": "A", "multi": false, "explanation": "AWS WAF의 비율 기반 규칙은 발신 IP별 요청 속도를 추적하고 5분 롤링 윈도우 내에 정의된 임계값을 초과하는 IP를 일시적으로 차단(또는 구성에 따라 카운트/도전)하여 급증 및 잠재적인 레이어 7 플러드를 신속하게 완화하도록 설계되었습니다. 이 시나리오에서는 악성 트래픽이 두 개 국가의 수백 개 IP에 분산되어 있으며, 애플리케이션은 여전히 합법적인 사용자들에게 전 세계적으로 사용 가능해야 합니다. 비율 기반 규칙은 전체 지리적 영역을 영구적으로 차단하지 않고도 남용되는 요청 패턴을 줄이는 빠르고 타겟팅된 제한을 제공합니다. 이는 부수적 영향을 최소화하면서 '빠르게 제한'하는 것과 일치합니다."},
  {"id": 244, "text": "한 회사가 재해 복구(DR) 계획의 일환으로 Amazon RDS 스냅샷을 두 개의 계정으로 전송합니다. 스냅샷은 암호화되어야 하지만, 각 계정은 재해 복구 상황 발생 시 스냅샷을 복호화할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["기본 AWS 키 관리 서비스(AWS KMS) 키를 사용하여 스냅샷을 생성합니다. KMS 암호화 키를 두 계정으로 복사하는 AWS Lambda 함수를 생성합니다.", "AWS Key Management Service(AWS KMS) 고객 관리 키를 사용하여 스냅샷을 생성합니다. 두 계정에서 KMS 키를 가져오는 AWS Lambda 함수를 생성합니다.", "기본 AWS 키 관리 서비스(AWS KMS) 키를 사용하여 스냅샷을 생성합니다. 각 계정에 적절한 KMS 권한이 있는 IAM 주체를 사용하여 두 계정과 KMS 키를 공유합니다.", "AWS Key Management Service(AWS KMS) 고객 관리 키를 사용하여 스냅샷을 생성합니다. 각 계정에 적절한 KMS 권한이 있는 IAM 주체를 사용하여 두 계정과 KMS 키를 공유합니다."], "answer": "D", "multi": false, "explanation": "여러 계정에서 공유해야 하고 대상 계정에서 여전히 암호를 해독할 수 있어야 하는 암호화된 RDS 스냅샷의 경우 고객 관리형 KMS 키를 사용하고 해당 키의 계정 간 사용을 명시적으로 허용해야 합니다. AWS 관리형 기본 키(옵션 A/C)는 일반적으로 고객 관리형 키와 마찬가지로 유연한 방식으로 계정 간 암호 해독을 위해 공유할 수 없으며 AWS 관리형 키를 다른 계정에 \"복사\"할 수 없습니다. 마찬가지로 옵션 B에 설명된 대로 Lambda를 통해 기존 KMS 키를 다른 계정으로 \"가져올\" 수 없습니다. KMS 키는 계정 범위 리소스이며 이와 같은 계정 간에 복사되지 않습니다. 고객 관리형 키(CMK)를 사용하면 키 정책(및/또는 권한 부여)을 통해 DR 계정의 보안 주체가 필요한 암호화 작업(예: kms:Decrypt, kms:CreateGrant 및 관련 설명 권한)에 키를 사용하도록 허용할 수 있습니다. 그런 다음 DR 이벤트 중에 대상 계정에서 스냅샷을 공유하고 복사/사용하면 대상 계정에 동일한 CMK를 사용할 수 있는 권한이 부여되었으므로 이를 해독할 수 있습니다. 이 접근 방식은 계정 간 암호화된 스냅샷 공유를 위한 표준 AWS 패턴이며 CloudTrail을 통한 강력한 거버넌스 및 감사 가능성으로 암호화 및 복구 가능성 요구 사항을 모두 충족합니다."},
  {"id": 245, "text": "한 회사가 새로운 로그 분석 환경을 구축할 계획입니다. 이 회사는 여러 AWS 서비스의 로그를 거의 실시간으로 분석할 수 있는 솔루션을 구현해야 합니다. 솔루션은 로그 검색 기능을 제공해야 하며, 특정 로그가 탐지 규칙과 일치할 경우 기존 Amazon Simple Notification Service(Amazon SNS) 토픽으로 알림을 전송해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon OpenSearch Service를 사용하여 로그를 분석합니다. OpenSearch API에서 로그를 검색합니다. OpenSearch Service 보안 분석을 사용하여 로그를 탐지 규칙과 일치시키고 SNS 주제로 알림을 보냅니다.", "AWS Security Hub를 사용하여 로그를 분석합니다. Security Hub의 발견 페이지에서 로그를 검색합니다. 로그를 탐지 규칙과 일치시키고 SNS 주제로 알림을 보내는 사용자 지정 작업을 생성합니다.", "Amazon CloudWatch Logs를 사용하여 로그를 분석합니다. 구독 필터를 사용하여 로그를 탐지 규칙과 일치시키고 SNS 주제로 알림을 보냅니다. CloudWatch Logs Insights를 사용하여 로그를 수동으로 검색합니다.", "Amazon QuickSight를 사용하여 로그를 분석합니다. 대시보드에 쿼리 결과를 나열하여 로그를 검색합니다. 쿼리를 실행하여 로그를 탐지 규칙과 일치시키고 SNS 토픽으로 알림을 보냅니다."], "answer": "A", "multi": false, "explanation": "Amazon OpenSearch 서비스는 여러 AWS 서비스의 로그에 대한 거의 실시간 로그 수집, 색인 및 검색을 위해 설계되었습니다. OpenSearch 보안 분석은 로그를 탐지 규칙과 대조하여 평가하고, 일치하는 보안 이벤트가 감지될 때 기존 Amazon SNS 주제로 경고를 보낼 수 있습니다."},
  {"id": 246, "text": "한 회사가 Auto Scaling 그룹에 속한 Amazon EC2 인스턴스 플릿에서 웹 애플리케이션을 운영하고 있습니다. 해당 EC2 인스턴스는 다른 워크로드와 동일한 VPC 서브넷에 있습니다. 보안 엔지니어가 Amazon GuardDuty를 배포하고 AWS Security Hub와 통합했습니다. 이 엔지니어는 비정상적인 트래픽 패턴을 감지하고 대응하는 자동화된 솔루션을 구현해야 합니다. 해당 솔루션은 초기 사고 대응에 대한 AWS 모범 사례를 준수해야 하며 웹 애플리케이션에 대한 중단을 최소화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Lambda를 사용하여 인스턴스 프로필 액세스 키를 비활성화합니다.", "영향을 받는 인스턴스를 Auto Scaling 그룹에서 제거하고 AWS Lambda를 사용하여 제한된 보안 그룹으로 격리합니다.", "감지된 트래픽 소스를 차단하도록 네트워크 ACL을 업데이트합니다.", "GuardDuty 결과를 Amazon SNS로 전송하여 이메일 알림을 받도록 합니다."], "answer": "B", "multi": false, "explanation": "AWS 사고 대응 모범 사례는 비즈니스 연속성을 유지하면서 최소한의 영향 범위로 격리하는 것을 강조합니다. AWS 공인 보안 - 전문 공식 학습 가이드에 따르면, 애플리케이션의 운영을 계속 허용하면서 손상된 리소스를 격리하는 것이 권장되는 초기 대응 방법입니다. GuardDuty 이상 트래픽 발견에 반응하고 AWS Lambda 함수를 호출하는 Amazon EventBridge 규칙을 생성함으로써, 보안 엔지니어는 영향을 받은 EC2 인스턴스를 Auto Scaling 그룹에서 자동으로 제거하고 제한된 보안 그룹을 연결할 수 있습니다. 이는 악성 활동을 즉시 중단하면서 Auto Scaling이 인스턴스를 교체하고 애플리케이션을 계속 사용 가능하게 합니다."},
  {"id": 247, "text": "한 회사가 AWS Organizations에 조직을 보유하고 있습니다. 이 회사의 보안 팀은 조직 내 모든 AWS 계정에서 Amazon EC2 인스턴스에 대한 포렌식 증거를 수집하는 자동화 시스템을 개발 중입니다. 회사는 AWS 관리형 키를 사용하여 조직 내 모든 EC2 인스턴스의 Amazon EBS 볼륨을 기본적으로 암호화했습니다. 이 자동화 시스템은 AWS Lambda 함수와 AWS Step Functions 상태 머신으로 구성됩니다. 자동화 프로세스는 대상 AWS 계정에서 IAM 역할을 위임받습니다. 의심스러운 EC2 인스턴스의 스냅샷을 생성하고 보안 팀 계정이 해당 스냅샷을 복사할 수 있도록 권한을 부여합니다. 보안 팀은 스냅샷을 암호화하기 위한 AWS KMS 키를 보유하고 있습니다. 테스트 중 자동화 프로세스가 보안 팀의 AWS 계정으로 스냅샷을 복사하는 데 실패했습니다. 보안팀이 자동화 시스템을 통해 조직 내 모든 AWS 계정의 EC2 포렌식 증거를 수집하려면 어떤 조치들을 조합하여 취해야 할까요? (세 가지를 선택하세요.)", "choices": ["대상 AWS 계정에서 AWS 관리형 키에 대한 KMS 키 정책을 업데이트하여 자동화의 IAM 역할에 대해 kms:Decrypt 및 kms:CreateGrant 작업을 명시적으로 허용합니다.", "대상 AWS 계정에서 고객 관리형 KMS 키를 생성합니다. 자동화의 IAM 역할을 업데이트하여 kms:Encrypt, kms:Decrypt, kms:GenerateDataKey*, kms:CreateGrant 작업을 허용합니다.", "보안 팀의 AWS 계정에서 자동화의 IAM 역할을 업데이트하여 AWS 관리형 키에 대해 kms:Encrypt, kms:Decrypt 및 kms:CreateGrant 작업을 허용하도록 합니다.", "보안 팀의 AWS 계정에서 자동화의 IAM 역할을 업데이트하여 고객이 관리하는 KMS 키에 대해 kms:Encrypt, kms:Decrypt, kms:GenerateDataKey*, kms:CreateGrant 작업을 허용하도록 합니다.", "보안팀의 AWS 계정에서 자동화 코드를 업데이트하여 EBS 스냅샷을 생성하고 AWS 관리형 키를 사용하도록 하십시오.", "보안팀의 AWS 계정에서 자동화 코드를 업데이트하여 EBS 스냅샷을 생성하고 고객이 관리하는 KMS 키를 사용하도록 합니다."], "answer": "B,D,F", "multi": true, "explanation": "기본 AWS 관리 키를 사용하는 암호화된 EBS 스냅샷은 계정 간에 공유할 수 없습니다. AWS 문서에 따르면 고객 관리 키로 암호화된 스냅샷만 공유할 수 있으며, 고객 관리 키는 대상 계정이나 자동화 역할이 사용할 수 있도록 허용해야 합니다. 따라서 대상 계정은 고객 관리 KMS 키와 자동화 역할에 적절한 KMS 권한이 필요합니다. 보안 계정도 증거 스냅샷을 복사하고 재암호화할 때 자체 고객 관리 키를 사용할 권한이 필요합니다. 자동화는 AWS 관리 키가 아닌 고객 관리 KMS 키를 명시적으로 사용해야 합니다. AWS 관리 키 정책을 요구되는 방식으로 업데이트하는 것은 불가능하며, 이는 AWS 관리 키가 AWS에 의해 제어되기 때문입니다."},
  {"id": 248, "text": "보안 엔지니어가 Amazon Macie를 사용하여 회사의 Amazon S3 버킷에서 민감한 데이터가 있는지 검사합니다. 해당 회사는 수많은 S3 버킷과 그 안에 저장된 많은 객체를 보유하고 있습니다. 보안 엔지니어는 민감한 데이터가 포함된 S3 버킷을 식별하고 해당 버킷에 대해 추가 검사를 수행해야 합니다. 어떤 솔루션이 관리 부담을 최소화하면서 이러한 요구 사항을 충족할까요?", "choices": ["S3 버킷에서 S3 교차 리전 복제(CRR)를 구성하여 객체를 두 번째 AWS 리전으로 복제합니다. 두 번째 리전에서 Macie를 구성하여 복제된 객체를 매일 스캔합니다.", "S3 버킷에 대한 S3 이벤트 대상으로 AWS Lambda 함수를 생성합니다. 객체가 S3 버킷에 업로드될 때 해당 객체에 대한 Macie 스캔을 시작하도록 Lambda 함수를 구성합니다.", "Macie 자동 검색을 구성하여 S3 버킷에서 데이터를 지속적으로 샘플링합니다. Macie가 민감한 데이터를 발견하면 S3 버킷에 대해 전체 스캔을 수행합니다.", "Macie 스캔이 S3 버킷에서 실행되도록 구성합니다. 스캔 결과를 Amazon DynamoDB 테이블에 집계합니다. 쿼리에 DynamoDB 테이블을 사용합니다."], "answer": "C", "multi": false, "explanation": "Amazon Macie의 자동화된 민감 데이터 발견 기능은 바로 이를 위해 설계되었습니다. 대규모 환경에서 Macie는 S3 버킷 전반의 객체를 지속적으로 평가하고 샘플링하여 민감 데이터(개인 식별 정보, 금융 데이터, 자격 증명 등)가 존재할 가능성이 있는 위치를 식별합니다. 이를 통해 보안 엔지니어는 각 버킷별 스캔 워크플로를 조직하지 않고도 민감 데이터가 포함된 버킷을 손쉽게 확인할 수 있습니다. Macie가 민감 데이터 발견 사항이 있는 버킷을 표시하면, 엔지니어는 모든 것을 매번 철저히 스캔하는 대신, 우선순위를 정해 추가적이고 보다 타겟팅된 스캔(예: 특정 버킷에 대한 더 깊은 분류 작업)을 수행할 수 있습니다."},
  {"id": 249, "text": "한 회사가 기본 SCP를 사용하여 AWS Organizations를 사용하고 있습니다. 이 회사는 특정 OU에 속한 모든 AWS 계정의 AWS 사용을 제한해야 합니다. 일부 필수적인 글로벌 서비스를 제외하고, 해당 OU에 속한 모든 계정은 eu-west-1 리전에서만 AWS를 사용해야 합니다. 보안 엔지니어는 기존 계정과 OU에 새로 추가되는 모든 계정에 이 제한을 적용하는 SCP를 생성해야 합니다. 어떤 SCP가 이러한 요구 사항을 충족할까요?", "choices": ["NotAction으로 거부하지만 aws:RequestedRegion = eu-west-1에 대해 StringEquals를 사용합니다.", "eu-west-1의 원하는 글로벌 서비스 범위로 액션을 사용하여 허용합니다.", "원하는 글로벌 서비스에 대해 NotAction으로 거부하고 StringNotEquals aws:RequestedRegion = eu-west-", "NotAction 및 StringNotEquals aws:RequestedRegion = eu-west-1을 허용합니다."], "answer": "C", "multi": false, "explanation": "SCP를 사용하여 OU 내에서 활동을 단일 리전으로 제한하려면, 일반적인 패턴은 허용된 리전 외부에서 이루어진 요청에 대해 명시적 거부(explicit Deny)를 적용하고, 동일한 방식으로 aws:RequestedRegion을 사용하지 않거나 리전과 관계없이 계속 사용 가능해야 하는 글로벌 서비스에 대한 예외를 설정하는 것입니다. 이는 Effect: Deny, 허용된 리전(eu-west-1)에 대해 aws:RequestedRegion에 StringNotEquals 조건을 사용, 그리고 여전히 사용 가능해야 하는 글로벌 서비스를 나열하는 NotAction으로 수행됩니다. SCP는 가드레일 역할을 하기 때문에, SCP의 명시적 Deny는 멤버 계정의 IAM Allow보다 우선하여 적용되며, OU에 배치된 모든 기존 및 향후 계정에 대해 제한이 일관되게 적용되도록 보장합니다. StringNotEquals 조건은 eu-west-1 이외의 리전에 대해 거부가 작동하도록 보장하며, NotAction 예외 목록은 지정된 글로벌 서비스가 이 거부 명령에 의해 차단되지 않도록 보장합니다."},
  {"id": 250, "text": "문서 관리 시스템을 개발하는 한 회사가 최근 AWS에서 운영 중인 자사 애플리케이션에 대한 보안 검토를 실시했습니다. 검토 결과, 서명된 URL을 통해 Amazon S3에 문서를 업로드할 때 전송 중 암호화가 이루어지지 않는 문제가 발견되었습니다. 보안 엔지니어는 전송 중 암호화되지 않은 문서 업로드를 방지하는 솔루션을 구현해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["모든 클라이언트 구현에서 애플리케이션에 문서를 업로드할 때 HTTPS를 사용하도록 하십시오.", "AWS Config에서 s3-bucket-ssl-requests-only 관리형 규칙을 구성합니다.", "조건 \"aws:SecureTransport\":\"false\"에 대해 모든 S3 작업을 거부하는 S3 버킷 정책을 추가합니다.", "수혜자가 AllUsers이고, 권한이 WRITE이며, 조건이 secureTransport인 S3 버킷 ACL을 추가합니다."], "answer": "C", "multi": false, "explanation": "강제 적용 가능한 제어는 global condition key aws:SecureTransport가 false일 경우 요청을 거부하는 S3 버킷 정책입니다. 이 조건은 요청이 HTTPS/TLS를 통해 전송되었는지 평가합니다. 거부(Deny) 문은 허용(Allow) 문보다 먼저 평가되므로, 서명된 URL도 암호화되지 않은 전송 경로에서는 사용할 수 없습니다. 클라이언트에게 HTTPS 사용을 안내하는 것은 AWS 측에서 방지하는 제어가 아닙니다. AWS Config의 s3-bucket-ssl-requests-only 관리형 규칙은 비준수 버킷 정책 구성을 감지할 수 있지만, 자체적으로 안전하지 않은 업로드 요청을 차단하지는 않습니다. AllUsers에게 WRITE 권한을 부여하는 ACL은 위험하게 잘못된 설정이며 노출 위험을 증가시킬 것입니다. 버킷 정책의 거부 설정은 전송 중 암호화를 위한 직접적인 보안 강제 실행 메커니즘입니다."},
  {"id": 251, "text": "한 회사가 민감한 데이터를 수집하여 Amazon DynamoDB 테이블에 저장하는 웹 기반 애플리케이션을 운영하고 있습니다. 이 회사는 엔드투엔드 데이터 보호 및 무단 데이터 변경 감지 기능을 제공하는 솔루션을 구현해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇일까요?", "choices": ["AWS 키 관리 서비스(AWS KMS) 고객 관리 키를 사용합니다. 저장된 데이터를 암호화합니다.", "AWS 프라이빗 인증 기관을 사용합니다. 전송 중인 데이터를 암호화합니다.", "DynamoDB 암호화 클라이언트를 사용합니다. 클라이언트 측 암호화를 사용합니다. 테이블 항목에 서명합니다.", "AWS 암호화 SDK를 사용합니다. 클라이언트 측 암호화를 사용합니다. 테이블 항목에 서명합니다."], "answer": "C", "multi": false, "explanation": "DynamoDB 암호화 클라이언트는 데이터를 DynamoDB에 저장하기 전에 클라이언트 측에서 암호화하고 검색할 때 복호화함으로써 종단 간 데이터 보호를 제공합니다. 이를 통해 민감한 데이터가 저장 중이거나 전송 중일 때 모두 보호되도록 보장합니다. 또한, 이 클라이언트를 사용하면 항목에 디지털 서명을 할 수 있어 무결성 검증을 제공하고 데이터의 무단 변경을 감지할 수 있습니다."},
  {"id": 252, "text": "한 회사가 AWS Organizations에서 AWS Config를 활성화했습니다. 이 회사는 조직 전체에 수백 개의 Amazon S3 버킷을 배포했습니다. 보안 엔지니어는 AWS Key Management Service(AWS KMS)로 암호화되지 않은 S3 버킷을 식별해야 합니다. 또한 AWS KMS로 암호화되지 않은 객체가 해당 S3 버킷에 업로드되지 않도록 방지해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["암호화되지 않은 S3 버킷을 식별하려면 thes3-default-encryption-kmsAWS Config 관리 규칙을 사용하세요. AWS KMS로 암호화된 객체에 한해서만 thes3:PutObjectaction을 허용하는 SCP를 생성합니다.", "암호화되지 않은 S3 버킷을 식별하려면 thes3-default-encryption-kmsAWS Config 관리 규칙을 사용하십시오. 각 S3 버킷에 대해 버킷 정책을 생성하여 객체가 S3 관리 키(SSE-S3)를 사용한 서버 측 암호화가 적용된 경우에만 thes3:PutObjectaction을 거부하도록 합니다.", "암호화되지 않은 S3 버킷을 식별하려면 AWS Config 관리 규칙인 thes3-bucket-ssl- requests-only를 사용하십시오. AWS KMS로 암호화된 객체에 한해서만 thes3:PutObjectaction을 허용하는 SCP를 생성합니다.", "암호화되지 않은 S3 버킷을 식별하려면 thes3-bucket-ssl-requests-onlyAWS Config 관리 규칙을 사용하세요. 각 S3 버킷에 대해 객체가 AWS KMS로 암호화된 경우에만 thes3:PutObject 작업을 허용하는 버킷 정책을 생성하세요."], "answer": "A", "multi": false, "explanation": "SSE-KMS를 기본적으로 사용하지 않는 버킷을 찾기 위한 올바른 Config 규칙은 s3-default-encryption-kms입니다. 이 규칙은 버킷의 기본 암호화 설정을 평가하고 KMS 기본 암호화가 활성화되어 있지 않은 버킷을 표시합니다. s3-bucket-ssl-requests-only 규칙은 HTTPS 전용 요청을 강제하는 데 중점을 두며, 저장 시 암호화 설정을 검증하지 않으므로 'KMS로 암호화되지 않은 것 식별' 요구 사항을 충족할 수 없습니다. KMS로 암호화되지 않은 객체 업로드를 방지하려면 조직 전체의 제어가 필요합니다. SCP는 s3:PutObject를 제한하여 요청이 SSE-KMS(선택적으로 특정 KMS 키 지정)를 명시할 때만 업로드가 성공하도록 할 수 있습니다. 이는 여러 계정과 버킷에 걸쳐 광범위하고 적은 관리로 적용할 수 있는 강제 수단을 제공합니다. 버킷 정책도 SSE-KMS를 강제할 수 있지만, 수백 개의 버킷 정책을 관리하고 확인하는 것은 중앙에서 관리되는 SCP 가드레일보다 운영적으로 더 부담이 됩니다."},
  {"id": 253, "text": "보안 엔지니어가 한 회사의 사용자 암호에 최소 길이 제한이 없다는 사실을 발견했습니다. 해당 회사는 다음과 같은 ID 공급자(IdP)를 사용합니다. * AWS Identity and Access Management(IAM)과 온프레미스 Active Directory의 페더레이션 * AWS 클라우드 애플리케이션의 사용자 데이터베이스를 포함하는 Amazon Cognito 사용자 풀. 보안 엔지니어는 필수 최소 암호 길이를 구현하기 위해 어떤 조치를 취해야 합니까? (두 가지를 선택하십시오.)", "choices": ["IAM 구성에서 암호 길이 정책을 업데이트합니다.", "Amazon Cognito 구성에서 암호 길이 정책을 업데이트합니다.", "온프레미스 Active Directory 구성에서 암호 길이 정책을 업데이트합니다.", "AWS Organizations에서 최소 암호 길이를 적용하는 SCP를 생성합니다.", "최소 암호 길이 조건을 포함하는 IAM 정책을 생성합니다."], "answer": "B,C", "multi": true, "explanation": "비밀번호 정책은 인증이 이루어지는 ID 제공자에서 시행됩니다. AWS 공인 보안 - 전문 분야 연구 가이드에 따르면 IAM이 온프레미스 Active Directory와 같은 외부 자격 증명 공급자와 연동되면 IAM은 암호 정책을 관리하거나 시행하지 않습니다. 대신 최소 길이와 같은 암호 요구 사항은 Active Directory 그룹 정책 개체에서 직접 적용되어야 합니다. Amazon Cognito 사용자 풀은 자체 사용자 디렉터리와 인증 논리를 유지합니다. Cognito는 최소 길이, 복잡성 및 만료를 포함하여 구성 가능한 비밀번호 정책을 제공합니다. 애플리케이션 사용자에 대한 최소 비밀번호 길이를 적용하려면 Cognito 사용자 풀 비밀번호 정책을 업데이트해야 합니다. IAM 암호 정책은 IAM으로 직접 인증하는 IAM 사용자에게만 적용되며 연동 사용자나 Cognito 사용자에게는 영향을 미치지 않습니다. SCP 및 IAM 정책은 비밀번호 길이 요구 사항을 적용할 수 없습니다."},
  {"id": 254, "text": "보안 엔지니어가 한 회사의 사용자 암호에 최소 길이 제한이 없다는 사실을 발견했습니다. 해당 회사는 다음과 같은 두 개의 ID 공급자(IdP)를 사용하고 있습니다. * AWS Identity and Access Management(IAM)과 온프레미스 Active Directory의 페더레이션 * 회사가 개발한 AWS 클라우드 애플리케이션의 사용자 데이터베이스가 포함된 Amazon Cognito 사용자 풀. 보안 엔지니어는 암호의 최소 길이를 설정하기 위해 어떤 조치를 취해야 합니까? (두 가지를 선택하십시오.)", "choices": ["IAM 구성에서 암호 길이 정책을 업데이트합니다.", "Cognito 구성에서 암호 길이 정책을 업데이트합니다.", "온프레미스 Active Directory 구성에서 암호 길이 정책을 업데이트합니다.", "AWS Organizations에 SCP를 생성합니다. IAM 및 Cognito에 대해 최소 암호 길이를 적용하도록 SCP를 구성합니다.", "최소 암호 길이 조건을 포함하는 IAM 정책을 생성합니다. IAM 및 Cognito에 대해 해당 정책을 적용합니다."], "answer": "B,C", "multi": true, "explanation": "회사는 두 가지 다른 인증 시스템을 사용하며, 비밀번호 정책은 실제로 비밀번호를 저장하고 관리하는 시스템에서 적용되어야 합니다. 온프레미스 Active Directory와 IAM 페더레이션을 통해 인증하는 사용자의 경우, IAM은 사용자의 비밀번호를 저장하지 않습니다. 비밀번호 정책은 Active Directory에 의해 적용됩니다. 따라서 최소 비밀번호 길이는 온프레미스 AD 비밀번호 정책에서 구성되어야 하며, 페더레이션된 사용자가 비밀번호 생성/변경 시 해당 요구 사항을 준수하게 됩니다. Amazon Cognito 사용자 풀을 사용자 데이터베이스로 사용하는 클라우드 애플리케이션의 경우, Cognito는 해당 사용자의 비밀번호를 저장하고 관리합니다. Cognito 사용자 풀에는 구성 가능한 비밀번호 정책(최소 길이 및 복잡성 요구 사항)이 포함되어 있습니다. Cognito 사용자 풀 비밀번호 정책을 업데이트하면 앞으로 애플리케이션 사용자의 최소 비밀번호 길이가 적용됩니다."},
  {"id": 255, "text": "보안 엔지니어가 개발팀과 협력하여 민감한 재고 데이터를 아마존 S3 버킷에 저장하는 공급망 애플리케이션을 설계하고 있습니다. 이 애플리케이션은 AWS 키 관리 서비스(AWS KMS) 고객 관리 키를 사용하여 아마존 S3에 저장된 데이터를 암호화합니다. Amazon S3에 저장된 재고 데이터는 수백 개의 공급업체와 공유될 예정입니다. 모든 공급업체는 각자의 AWS 계정에서 발급받은 AWS 보안 주체를 사용하여 Amazon S3의 데이터에 접근합니다. 공급업체 목록은 매주 변경될 수 있습니다. 보안 엔지니어는 계정 간 접근을 지원하는 솔루션을 찾아야 합니다. 고객 관리 키에 대한 접근 제어를 관리하는 데 있어 운영 효율성이 가장 높은 솔루션은 무엇입니까?", "choices": ["KMS 권한을 사용하여 키 액세스를 관리합니다. 프로그램 방식으로 권한을 생성하고 취소하여 공급업체 액세스를 관리합니다.", "IAM 역할을 사용하여 주요 액세스를 관리합니다. IAM 역할 정책을 프로그래밍 방식으로 업데이트하여 공급업체 액세스를 관리합니다.", "KMS 키 정책을 사용하여 키 액세스를 관리합니다. 프로그램 방식으로 KMS 키 정책을 업데이트하여 공급업체 액세스를 관리합니다.", "IAM 역할을 사용하여 키 액세스를 관리함으로써 AWS 계정 간에 위임된 액세스를 사용합니다. 계정 간 공급업체 액세스를 관리하기 위해 IAM 신뢰 정책을 프로그래밍 방식으로 업데이트합니다."], "answer": "A", "multi": false, "explanation": "KMS 그랜트는 특히 계정 간 액세스에 대해 AWS KMS 고객 관리 키에 대한 액세스를 관리하는 확장 가능하고 효율적인 방법을 제공합니다. 그랜트를 사용하면 KMS 키 정책 자체를 수정할 필요 없이 누가 키를 사용할 수 있고 어떤 작업을 수행할 수 있는지를 지정할 수 있습니다. 그랜트는 유연하며 프로그램적으로 생성, 수정 및 취소할 수 있어 공급업체 목록이 자주 변경되는 상황에 이상적입니다. 이 접근 방식은 운영 오버헤드를 최소화하면서 보안 엔지니어가 공급업체 요구 사항이 변경됨에 따라 KMS 키에 대한 액세스를 동적으로 제어할 수 있도록 합니다."},
  {"id": 256, "text": "한 회사가 AWS 계정 하나를 보유하고 있으며, 애플리케이션 코드 테스트를 위해 Amazon EC2 인스턴스를 사용하고 있습니다. 최근 이 회사는 해당 인스턴스가 해킹당하여 악성코드를 유포하고 있는 것을 발견했습니다. 분석 결과, 인스턴스가 해킹당한 시점은 35일 전으로 나타났습니다. 보안 엔지니어는 심각도가 높은 탐지 사항에 대해 보안 팀에 최대한 빨리 이메일로 자동 알림을 보내는 지속적인 모니터링 솔루션을 구현해야 합니다. 이러한 요구 사항을 충족하기 위해 보안 엔지니어가 취해야 할 조치는 무엇일까요? (세 가지를 선택하세요.)", "choices": ["심각도가 높은 Security Hub 발견 사항에 대한 Amazon EventBridge 규칙을 생성합니다. 해당 규칙이 큐에 메시지를 게시하도록 구성합니다.", "심각도가 높은 GuardDuty 발견 사항에 대한 Amazon EventBridge 규칙을 생성합니다. 해당 규칙이 토픽에 메시지를 게시하도록 구성합니다.", "AWS 계정에서 Amazon GuardDuty를 활성화하세요.", "Amazon SNS(Amazon Simple Notification Service) 토픽을 생성합니다. 보안팀 이메일 рассылка 목록을 해당 토픽에 구독합니다.", "AWS 계정에서 AWS Security Hub를 활성화하세요.", "Amazon Simple Queue Service(Amazon SQS) 큐를 생성합니다. 보안팀의 이메일 배포 목록을 해당 큐에 구독합니다."], "answer": "B,C,D", "multi": true, "explanation": ""},
  {"id": 257, "text": "한 회사가 AWS Secrets Manager에 민감한 데이터를 저장하고 있습니다. 보안 엔지니어는 비정상적인 GetSecretValue API 호출이 발생할 경우 알림 이메일을 생성하는 솔루션을 설계해야 합니다. 보안 엔지니어는 AWS CloudTrail에서 제공하는 모든 Secrets Manager 이벤트에 대해 Amazon EventBridge 규칙을 구성했습니다. 이러한 요구 사항을 충족하는 솔루션은 무엇일까요?", "choices": ["EventBridge 규칙의 대상으로 CloudTrail을 구성합니다. IncomingBytes 속성에 속성 필터를 설정하고 이상 감지를 활성화합니다. Amazon Simple Notification Service(Amazon SNS) 토픽을 생성합니다. 해당 SNS 토픽을 사용하여 알림을 전송하는 CloudTrail 알람을 구성합니다.", "EventBridge 규칙의 대상으로 CloudTrail을 구성합니다. IncomingBytes 속성에 속성 필터를 설정하고 이상 감지를 활성화합니다. Amazon Simple Queue Service(Amazon SQS) 큐를 생성합니다. SQS 큐를 사용하여 알림을 보내도록 CloudTrail 알람을 구성합니다.", "EventBridge 규칙의 대상으로 Amazon CloudWatch Logs를 구성합니다. IncomingBytes 메트릭에 대한 메트릭 필터를 설정하고 이상 감지를 활성화합니다. Amazon Simple Notification Service(Amazon SNS) 토픽을 생성합니다. SNS 토픽을 사용하여 알림을 전송하는 CloudWatch 알람을 구성합니다.", "EventBridge 규칙의 대상으로 Amazon CloudWatch Logs를 구성합니다. CloudWatch Logs Insights 쿼리 구문을 사용하여 비정상적인 GetSecretValue API 호출을 검색합니다. Amazon Simple Queue Service(Amazon SQS) 큐를 생성합니다. SQS 큐를 사용하여 알림을 전송하는 CloudWatch 알람을 구성합니다."], "answer": "C", "multi": false, "explanation": "GetSecretValue API 호출의 이상 징후를 모니터링하고 알림을 트리거하기 위해, 솔루션은 관련 이벤트를 캡처하고, 이를 이상 징후로 필터링하며, 알림을 전송해야 합니다. EventBridge 규칙의 대상으로 Amazon CloudWatch Logs를 사용하면, 보안 엔지니어는 관련 API 호출 데이터(예: IncomingBytes)에 대해 CloudWatch Logs 메트릭 필터를 생성할 수 있으며, 이를 통해 이상 징후 감지를 수행하여 비정상적인 활동을 식별할 수 있습니다. 그 다음, CloudWatch 경보(메트릭 필터 기반)가 트리거될 때 알림을 배포하기 위해 Amazon SNS 주제를 구성할 수 있습니다. 이 설정은 API 호출에서 이상 패턴을 감지하고 팀에 이메일로 알림을 전달하는 데 효율적입니다."},
