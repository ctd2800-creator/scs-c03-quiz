  {"id": 199, "text": "회사 클라우드 보안 정책에 따르면 회사 VPC와 KMS 간의 통신은 AWS 네트워크 내에서만 이루어져야 하며 공용 서비스 엔드포인트를 사용해서는 안 됩니다. 다음 중 어떤 조치 조합이 이 요구 사항을 가장 잘 충족합니까? (두 가지를 선택하십시오.)", "choices": ["회사 VPC 엔드포인트 ID를 참조하는 theaws:sourceVpcecondition을 AWS KMS 키 정책에 추가합니다.", "VPC에서 VPC 인터넷 게이트웨이를 제거하고 VPC에 가상 프라이빗 게이트웨이를 추가하여 공용 인터넷에 직접 연결되는 것을 방지합니다.", "프라이빗 DNS가 활성화된 AWS KMS용 VPC 엔드포인트를 생성합니다.", "KMS 가져오기 키 기능을 사용하여 VPN을 통해 AWS KMS 키를 안전하게 전송하세요.", "AWS KMS 키 정책에 다음 조건을 추가하세요. \"aws:SourceIp\" : \"10.0.0.0/16\"."], "answer": "A,C", "multi": true, "explanation": "To ensure traffic from a VPC to AWS KMS stays on the AWS network and does not use public endpoints, you should use aninterface VPC endpoint (AWS PrivateLink) for KMS. Creating aVPC endpoint for KMS with private DNS enabled(Option C) causes standard KMS DNS names (for example, kms.<region>.amazonaws.com) to resolve to theprivateendpoint IPs inside the VPC, routing requests over the AWS private network rather than through the internet. This is the core networking control that satisfies \"no public service endpoints.\" To enforce that only calls that come through the intended VPC endpoint can use the key, add an authorization guardrail in theKMS key policyusing the aws:sourceVpce condition (Option A). This ensures that even if a principal has credentials, KMS will deny usage unless the request is made via the specified VPC endpoint, preventing accidental or malicious use over public paths."},
  {"id": 200, "text": "개발팀이 회사의 서비스형 소프트웨어(SaaS) 애플리케이션 관리를 위한 오픈 소스 툴셋을 개발하고 있습니다. 회사는 누구나 툴셋 코드를 보고 다운로드할 수 있도록 공개 저장소에 코드를 저장했습니다. 그런데 해당 코드에 회사 AWS 환경 내 내부 리소스에 접근할 수 있는 IAM 액세스 키와 비밀 키가 포함되어 있는 것을 발견했습니다. 보안 엔지니어는 노출된 자격 증명이 무단으로 사용되었는지 여부를 확인하고, 추가적인 무단 사용을 방지하는 솔루션을 구현해야 합니다. 다음 요구 사항을 충족하는 단계 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["AWS Identity and Access Management Access Analyzer를 사용하여 노출된 자격 증명이 액세스한 리소스와 해당 자격 증명을 사용한 사용자를 확인합니다.", "사용자의 IAM 계정에서 노출된 IAM 액세스 키를 비활성화합니다.", "소스 코드에 있는 액세스 키가 사용되지 않도록 Amazon GuardDuty에 규칙을 생성합니다.", "자격 증명이 노출된 사용자를 위해 새 IAM 액세스 키와 비밀 키를 생성합니다.", "IAM 자격 증명 보고서를 생성합니다. 보고서를 확인하여 액세스 키를 소유한 사용자가 마지막으로 로그인한 시간을 확인합니다."], "answer": "B,E", "multi": true, "explanation": "The immediate containment step for exposed access keys is todisable (deactivate) the compromised IAM access key(Option B). This prevents any further use of the leaked credentials, which is essential once secrets are publicly exposed. Creating a new key (Option D) may be part of recovery later, but it does not stop abuse of the already exposed key unless the exposed key is first deactivated. To determine whether the credentials were used, you need evidence of access activity. Among the provided options, the best fit is generating and reviewing theIAM credential report(Option E). The report includes metadata such as access key status and \"last used\" style details that help triage whether the user's credentials have been exercised recently. While deeper investigation would typically rely on CloudTrail \"AccessKeyId\" searches, the credential report is a quick AWS- native step aligned to the answer choices."},
  {"id": 201, "text": "한 기업에서 중요한 데이터가 영구 삭제되지 않도록 보호하는 솔루션이 필요합니다. 해당 데이터는 Amazon S3 버킷에 저장되어 있습니다. 재해 복구 요건을 충족하기 위해 기업의 기본 AWS 리전에서 보조 리전으로 S3 객체를 복제해야 합니다. 또한 관리자 권한이 있는 사용자가 보조 리전의 데이터를 영구 삭제할 수 없도록 보장해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Backup을 구성하여 리전 간 S3 백업을 수행합니다. 보조 리전에서 백업 볼트를 선택합니다. 보조 리전의 백업에 대해 거버넌스 모드에서 AWS Backup 볼트 잠금을 활성화합니다.", "기본 리전에서 규정 준수 모드로 S3 객체 잠금을 구현합니다. S3 복제를 구성하여 객체를 보조 리전의 S3 버킷으로 복제합니다.", "S3 복제를 구성하여 객체를 보조 리전의 S3 버킷으로 복제합니다. 보조 리전의 S3 버킷에서 s3:ReplicateDelete 작업을 거부하는 S3 버킷 정책을 생성합니다.", "S3 복제를 구성하여 객체를 보조 리전의 S3 버킷으로 복제합니다. 보조 리전의 S3 버킷에서 S3 객체 버전 관리를 구성합니다."], "answer": "B", "multi": false, "explanation": "The requirement is twofold:cross-Region replicationfor disaster recovery andimmutabilityso that even administrators cannot permanently delete data in the secondary Region. The S3- native feature designed to prevent deletion (including version deletion) for a defined retention period isS3 Object Lock. When Object Lock is configured incompliance mode,no user, including the root user and administrators, can remove Object Lock protections or permanently delete protected object versions before retention expires. This meets the \"admins cannot permanently delete\" requirement far better than policy-based controls. To replicate the data for DR, the company can configureS3 replicationfrom the primary Region bucket to a bucket in the secondary Region. With Object Lock in place (and the destination bucket appropriately configured to support Object Lock and versioning), replicated objects can be retained immutably, providing a strongly protected copy for recovery."},
  {"id": 202, "text": "한 회사가 Amazon EC2 인스턴스의 Auto Scaling 그룹에서 애플리케이션을 실행하고 있습니다. 해당 애플리케이션은 로그를 로컬에 저장합니다. 보안 엔지니어는 스케일인 이벤트 이후 로그가 손실되는 것을 발견했습니다. 보안 엔지니어는 로그 데이터의 내구성과 가용성을 보장하는 솔루션을 제안해야 합니다. 모든 로그는 감사 목적으로 최소 1년 동안 보관해야 합니다. 보안 엔지니어는 어떤 것을 권장해야 할까요?", "choices": ["자동 스케일링 라이프사이클 내에 EC2 인스턴스가 생성될 때마다 Amazon Elastic Block Store(Amazon EBS) 로그 볼륨을 생성하고 연결하는 후크를 추가합니다. 인스턴스가 종료되면 로그 검토를 위해 EBS 볼륨을 다른 인스턴스에 다시 연결할 수 있습니다.", "Amazon Elastic File System(Amazon EFS) 파일 시스템을 생성하고 EC2 인스턴스 생성 중에 EFS 파일 시스템을 마운트하도록 Auto Scaling 시작 템플릿의 사용자 데이터 섹션에 명령을 추가합니다. 인스턴스에서 Amazon Elastic Block Store(Amazon EBS) 볼륨의 로그를 EFS 파일 시스템의 디렉터리로 하루에 한 번 복사하는 프로세스를 구성하십시오.", "자동 스케일링 그룹에 사용되는 AMI에 Amazon CloudWatch 에이전트를 추가합니다. 검토를 위해 로그를 Amazon CloudWatch Logs로 전송하도록 CloudWatch 에이전트를 구성합니다.", "Auto Scaling 라이프사이클 내에서 종료 상태 전환 시 라이프사이클 후크를 추가하고 Amazon Simple Notification Service(Amazon SNS)를 통해 라이프사이클 알림을 사용하여 엔지니어링 팀에 알립니다. 인스턴스 종료 전에 보안 로그를 수동으로 검토할 수 있도록 후크가 Terminating:Wait 상태를 1시간 동안 유지하도록 구성합니다."], "answer": "C", "multi": false, "explanation": "In an Auto Scaling group, instances are ephemeral--local disks and instance-level log files can disappear during scale-in or replacement. The most durable, operationally simple pattern is tostream logs off-host continuouslyto a managed log service. Installing and configuring theCloudWatch agent(or unified agent) to ship application logs toAmazon CloudWatch Logsensures logs are centralized and remain available regardless of instance lifecycle events. This directly solves the \"logs lost after scale-in\" problem and provides high availability for audit and investigation. CloudWatch Logs also supports retention controls. The security engineer can set the log group retention toat least 1 year(or longer), meeting the audit requirement without building custom storage workflows. Access can be controlled with IAM to restrict who can view or export logs, and CloudWatch logs can be further integrated with Athena/OpenSearch/SIEM tools if needed."},
  {"id": 203, "text": "한 회사가 아마존 EC2 인스턴스에서 애플리케이션을 실행합니다. 이 애플리케이션은 송장을 생성하여 아마존 S3 버킷에 저장합니다. 해당 인스턴스에 연결된 인스턴스 프로필은 S3 버킷에 대한 적절한 접근 권한을 가지고 있습니다. 해당 회사는 AWS 계정 정보가 없는 여러 고객과 각 청구서를 공유해야 합니다. 각 고객은 본인 소유의 청구서만 다운로드할 수 있어야 합니다. 고객은 청구서 생성 후 1시간 이내에 자신의 청구서를 다운로드해야 합니다. 고객은 회사 AWS 리소스에 접근할 때 임시 자격 증명만 사용해야 합니다. 보안 엔지니어가 EC2 인스턴스에서 실행되는 스크립트를 생성합니다. 이 스크립트는 인스턴스 프로필을 사용하여 클라이언트용 S3 사전 서명 URL을 생성합니다. 각 사전 서명 URL은 1시간 후에 만료됩니다. 어떤 추가 조치가 이러한 요구 사항을 충족할까요?", "choices": ["사전 서명된 URL을 사용하는 클라이언트가 버킷의 S3 객체에 액세스하기 위해 S3:Get* 권한과 S3:List* 권한을 갖도록 S3 버킷 정책을 업데이트합니다.", "EC2 인스턴스 프로필에 대한 IAM 역할 정책에 문자열 같음 조건을 추가합니다. 각 송장의 s3:ResourceTag/ClientId 태그를 기준으로 액세스를 제한하도록 정책 조건을 구성합니다. 생성된 각 송장에 해당 클라이언트의 ID를 태그로 지정합니다.", "스크립트가 실행될 때마다 AWS STS(AWS Security Token Service)를 사용하여 새 자격 증명을 얻도록 스크립트를 업데이트합니다. 이를 위해 S3 GetObject 권한이 있는 새 역할을 부여합니다. 얻은 자격 증명을 사용하여 사전 서명된 URL을 생성합니다.", "S3 버킷에 대한 S3:GetObject 권한을 가진 IAM 사용자를 위한 액세스 키와 비밀 키를 생성합니다. 생성된 키를 스크립트에 포함시킵니다. 생성된 키를 사용하여 사전 서명된 URL을 생성합니다."], "answer": "C", "multi": false, "explanation": "Using AWS Security Token Service to assume a role and generate temporary credentials ensures that access is based on short-lived, ephemeral security credentials rather than long- term credentials. These temporary credentials are then used to create presigned URLs that expire after 1 hour, satisfying both the requirement for time-limited access and the mandate that clients interact only through temporary credentials when accessing the company's AWS resources."},
  {"id": 204, "text": "한 회사가 AWS 계정에서 Amazon Made, AWS Firewall Manager, Amazon Inspector 및 AWS Shield Advanced를 사용하고 있습니다. 이 회사는 계정에 대한 DDoS 공격이 발생할 경우 알림을 받고 싶어합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["Macie를 사용하여 활성 DDoS 이벤트를 감지합니다. Macie에서 감지한 내용에 따라 Amazon CloudWatch 알람을 생성합니다.", "Amazon Inspector를 사용하여 리소스를 검토하고 DDoS 공격에 취약한 리소스에 대해 Amazon CloudWatch 경보를 호출하세요.", "활성 DDoS 이벤트에 대한 방화벽 관리자 메트릭을 모니터링하는 Amazon CloudWatch 알람을 생성합니다.", "활성 DDoS 이벤트에 대한 Shield Advanced 메트릭을 모니터링하는 Amazon CloudWatch 알람을 생성합니다."], "answer": "D", "multi": false, "explanation": "AWS Shield Advanced provides built-in detection and visibility into DDoS attacks, including specific CloudWatch metrics that indicate ongoing attacks. Monitoring these metrics with a CloudWatch alarm enables the company to receive alerts in near real time when a DDoS event is detected."},
  {"id": 205, "text": "한 회사가 온프레미스 레거시 시스템과 AWS 리소스를 모두 관리하고 있습니다. AWS 리소스에는 Amazon DynamoDB 테이블과 Amazon S3 버킷이 포함됩니다. 온프레미스 레거시 시스템은 DynamoDB와 Amazon S3에 정기적으로 연결해야 합니다. 현재 해당 회사는 VPC 내 공용 서브넷에 있는 배스천 호스트를 사용하고 있습니다. 회사는 온프레미스에 저장된 SSH 개인 키를 사용하여 배스천 호스트에 연결합니다. 배스천 호스트에 할당된 인스턴스 프로필은 Amazon S3 및 DynamoDB에 대한 전체 액세스 권한을 가지고 있습니다. 보안팀에서 모든 배스천 호스트를 제거해야 하는 새로운 내부 정책을 발표했습니다. 이 정책에 따라 모든 시스템은 인증서 기반 인증을 사용하여 인증해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Direct Connect 연결을 설정하고 필요한 서비스에 대한 VPC 엔드포인트에 액세스할 수 있는 VPC에 대한 VPN 연결을 생성합니다.", "온프레미스 시스템이 AWS IAM Roles Anywhere를 사용하여 인증하도록 설정합니다.", "AWS 프라이빗 인증 기관을 사용하여 SSL 인증서를 발급하면 온프레미스 시스템에서 AWS의 리소스에 액세스할 수 있습니다.", "IAM 역할을 일시적으로 수임하고 일시적으로 수임한 역할 자격 증명을 사용하여 필요한 리소스에 액세스할 수 있는 권한이 있는 IAM 사용자를 생성합니다."], "answer": "B", "multi": false, "explanation": "IAM Roles Anywhere is designed for workloads that run outside AWS and need certificate- based authentication to obtain temporary AWS credentials. It allows the on-premises systems to use X).509 certificates from the company's PKI to authenticate and then assume an IAM role with permissions to access Amazon S3 and DynamoDB, which satisfies both the requirement to remove bastion hosts and the requirement to use certificate-based authentication."},
  {"id": 206, "text": "한 회사가 AWS Organizations의 조직을 사용하여 여러 AWS 계정을 관리합니다. 사용자는 IAM 사용자와 비밀 액세스 키를 사용하여 AWS 계정에 액세스합니다. 보안 팀은 모든 계정 액세스에 60분 후에 만료되는 임시 보안 자격 증명을 사용하도록 요구합니다. 사용자는 계정에 액세스하기 위해 SAML 기반 ID 공급자(IdP)를 사용해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS 보안 토큰 서비스(AWS STS)에 대한 액세스를 활성화합니다. 사용자가 적절한 시간 간격으로 get-session-token AWS CLI 명령을 실행하도록 합니다. 사용자가 AWS 계정에 액세스하려면 STS 임시 자격 증명을 사용하도록 요구합니다.", "AWS IAM Identity Center를 설정하고 외부 IdP를 구성합니다. 사용자가 필요로 하는 액세스 권한을 허용하는 권한 집합을 구성합니다. 세션 지속 시간 제한을 설정합니다. 사용자가 AWS CLI를 사용하여 SSO 자격 증명을 가져오도록 요구합니다. AWS 계정에서 IAM 사용자를 제거합니다.", "각 AWS 계정에 AWS Secrets Manager와 Amazon Cognito를 설정합니다. 외부 IdP를 사용하고 Secrets Manager에 연결하도록 Cognito ID 풀을 구성합니다. Secrets Manager에서 관리형 비밀 키 순환을 활성화합니다. 사용자가 AWS 계정에 액세스하기 위해 `get-secret- value` AWS CLI 명령을 실행하도록 합니다.", "조직 관리 계정에서 AWS IAM 역할 Anywhere를 활성화합니다. 사용자가 자격 증명 도우미 도구를 설치했는지 확인합니다. 관리 계정 내에서 적절한 세션 지속 시간으로 IAM 역할을 구성합니다. 사용자가 AWS 계정에 액세스하기 위해 자격 증명 도우미 도구에서 임시 자격 증명을 가져오도록 합니다."], "answer": "B", "multi": false, "explanation": "AWS IAM Identity Center is the correct solution because it centrally manages access across AWS Organizations accounts, integrates with an external SAML identity provider, and issues temporary credentials for both console and CLI access. The session duration can be configured on permission sets, including a 60-minute limit, and users can retrieve short-lived credentials through the AWS CLI by signing in through IAM Identity Center. IAM users can then be removed so that all account access uses temporary credentials only."},
  {"id": 208, "text": "AWS Organizations를 통해 50개의 AWS 계정을 관리하는 회사가 중앙 집중식 위협 탐지 솔루션을 구축해야 합니다. 이 솔루션은 조직 내 모든 계정에서 의심스럽거나 악의적인 활동을 식별해야 합니다. 해당 회사는 AWS Control Tower를 사용하고 있으며 보안 발견 사항을 감사 계정에 중앙 집중화하려고 합니다. 보안 팀은 새로운 보안 발견 사항이 발생할 경우 5분 이내에 이메일 알림을 받아야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["감사 계정에 위임된 관리자를 사용하여 Amazon GuardDuty를 구성합니다. 위임된 관리자 계정을 통해 모든 멤버 계정에서 GuardDuty를 활성화합니다. GuardDuty에서 발견된 내용을 보안 팀에 이메일 알림을 보내는 Amazon SNS 주제로 전송하는 Amazon EventBridge 규칙을 생성합니다.", "각 멤버 계정에 Amazon GuardDuty를 설정하고, 감사 계정에서 계정 간 액세스를 허용하는 IAM 역할을 생성합니다. 각 계정에 Amazon CloudWatch 알람을 구성하여 보안 발견 사항을 모니터링하고 감사 계정의 Amazon Simple Notification Service(Amazon SNS) 주제로 알림을 보냅니다.", "감사 계정에서 AWS Config를 활성화하고 조직 전체의 보안 문제를 감지하는 사용자 지정 규칙을 생성합니다. AWS Systems Manager를 사용하여 모든 멤버 계정에서 보안 발견 사항을 수집하고 중앙 집중식 Amazon S3 버킷에 저장합니다. AWS Lambda 함수를 생성하여 S3 버킷을 모니터링하고 새로운 발견 사항이 감지되면 보안 팀에 이메일 알림을 보냅니다.", "조직 내 모든 Amazon EC2 인스턴스에 Amazon Inspector 에이전트를 배포합니다. 감사 계정의 중앙 Amazon Inspector 콘솔로 보고하도록 Amazon Inspector 에이전트를 구성합니다. 각 멤버 계정에 Amazon EventBridge 규칙을 생성하여 감사 계정의 Amazon Simple Notification Service(Amazon SNS) 토픽으로 발견 사항을 전달합니다."], "answer": "A", "multi": false, "explanation": "Amazon GuardDuty is the AWS threat detection service designed to identify suspicious and potentially malicious activity across AWS accounts. In an AWS Organizations environment, the audit account can be configured as the delegated administrator so GuardDuty can be centrally managed across all member accounts. GuardDuty findings are also published to Amazon EventBridge in near real time, and EventBridge can route those findings to an Amazon SNS topic for email alerts, which satisfies the requirement for centralized detection and notifications within minutes."},
  {"id": 209, "text": "보안 엔지니어는 VPC에서 실행되는 공개 웹 애플리케이션을 보호해야 합니다. 해당 VPC는 ​Amazon CloudFront 배포의 오리진 서버를 호스팅합니다. 이 애플리케이션은 여러 차례 레이어 7 DDoS 공격을 경험했습니다. AWS WAF 웹 ACL이 CloudFront 배포와 연결되어 있으며, 웹 ACL에는 평판이 좋지 않은 것으로 알려진 IP 주소를 차단하는 AWS 관리형 규칙이 하나 포함되어 있습니다. 보안 엔지니어는 수동 작업 없이 실시간으로 레이어 7 DDoS 공격을 탐지하고 완화하는 자동화 솔루션을 구성해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["CloudFront 배포에서 AWS Shield Advanced를 활성화합니다. Amazon CloudWatch에서 DDoS 표시기에 대한 알림을 구성합니다.", "AWS Shield Advanced를 활성화하고 AWS DDoS 대응팀과의 사전 예방적 협력을 구성합니다.", "VPC에 AWS 네트워크 방화벽을 배포합니다. DDoS 공격 징후를 감지하는 보안 정책을 생성합니다. 공격 발생 시 웹 ACL 규칙을 자동으로 업데이트하는 AWS Lambda 함수를 생성합니다.", "웹 ACL에 속도 기반 규칙을 추가합니다. AWS Shield Advanced를 활성화합니다. CloudFront 배포에서 애플리케이션 계층 DDoS 공격 완화를 자동으로 활성화합니다."], "answer": "D", "multi": false, "explanation": "The required solution is to use AWS WAF together with AWS Shield Advanced automatic application layer DDoS mitigation for the CloudFront distribution. Shield Advanced can automatically create and manage custom AWS WAF mitigations in real time when it detects layer 7 attacks, providing the automated response with no manual effort that the question requires. AWS documentation also notes that this capability works with a web ACL on CloudFront and relies on the Shield-managed rule group and rate-based protection in AWS WAF."},
  {"id": 210, "text": "한 회사가 모든 기능을 활성화한 AWS Organizations를 사용하고 있습니다. 이 회사는 모든 멤버 계정과 모든 AWS 리전에 AWS Security Hub를 활성화했습니다. 또한, 멤버 AWS 계정의 eu-central-1 리전에 VPC를 생성했습니다. 보안 엔지니어는 VPC 내의 어떤 보안 그룹 규칙도 TCP 포트 22를 통해 모든 IP 주소로부터의 인바운드 트래픽을 허용하지 않는다는 것을 확인했습니다. 보안 엔지니어는 자동화된 시스템이 필요합니다. 이 시스템은 VPC 내에서 TCP 포트 22를 통해 모든 IP 주소로부터의 트래픽을 허용하는 보안 그룹 규칙이 생성되는 것을 방지해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon CloudWatch Logs 로그 그룹에 로그를 기록하는 AWS CloudTrail 조직 트레일을 활성화합니다. 로그 그룹 메트릭 필터를 기반으로 CloudWatch 알람을 생성합니다. 모든 IP 주소에서 들어오는 트래픽을 허용하는 보안 그룹 규칙이 추가될 때 Amazon Simple Notification Service(Amazon SNS) 토픽에 알람을 게시하도록 구성합니다. 보안 엔지니어의 이메일 주소를 SNS 토픽 구독자로 추가합니다.", "모든 IP 주소에서 TCP 포트 22로 들어오는 트래픽을 허용하는 보안 그룹 규칙에 대한 Security Hub 결과를 필터링하는 Amazon EventBridge 규칙을 생성합니다. 원치 않는 보안 그룹 규칙을 제거하는 AWS Lambda 함수를 대상으로 EventBridge 규칙을 구성합니다.", "TCP 포트 22에서 모든 IP 주소로부터의 인바운드 트래픽을 허용하는 보안 그룹 규칙의 생성 또는 수정을 방지하는 SCP를 생성합니다.", "모든 수신 트래픽을 검사하고 TCP 포트 22의 수신 트래픽을 차단하는 규칙을 사용하여 AWS 네트워크 방화벽을 배포합니다."], "answer": "C", "multi": false, "explanation": "A service control policy is the preventive control that can block member accounts from creating or modifying security group rules that allow inbound access from 0.0.0.0/0 on port 22. Because the company uses AWS Organizations with all features enabled, an SCP can be attached to the relevant account or organizational unit to stop the API actions before the insecure rule is created, which satisfies the requirement for automated prevention rather than detection after the fact. Security Hub controls for this issue are detective and recommend removing the offending rule after creation, while SCPs are specifically used to restrict high-risk API calls across accounts."},
  {"id": 214, "text": "한 회사가 인증 기관(CA)을 사용하여 코드 서명 인증서를 발급하는 코드 서명 애플리케이션을 개발해야 합니다. 이 솔루션은 AWS KMS(Key Management Service) 비대칭 키를 사용해야 합니다. 또한, 규정 준수를 위해 KMS 키의 생성, 출처 및 사용에 대한 변경 불가능한 증거를 수집하고 저장해야 합니다. 이 정보는 내부 감사자에게 제공되어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "choices": ["S3 객체 잠금이 활성화된 Amazon S3 버킷을 생성합니다. 모든 kms.amazonaws.com CreateKey 이벤트에 대해 이벤트 선택기와 로그 파일 유효성 검사가 활성화된 AWS CloudTrail 트레일을 생성합니다. CreateKey 이벤트를 S3 버킷으로 전송하도록 이벤트 선택기를 구성합니다. KMS 키를 생성합니다. 이벤트 선택기를 업데이트하여 KMS 키 ARN을 참조하는 API 호출을 필터링하도록 합니다. 감사 담당자에게 S3 버킷에 대한 액세스 권한을 제공합니다.", "KMS 키를 참조하는 애플리케이션 작업에 대한 로깅을 구현합니다. 로그에 모든 관련 메타데이터가 포함되도록 합니다. 로그를 Amazon CloudWatch Logs 로그 그룹에 저장합니다. 로그 그룹의 자동 내보내기를 구성하고, 내보낸 파일을 감사 담당자에게 전송합니다.", "감사자가 접근할 수 있는 Amazon DynamoDB 테이블을 생성합니다. Amazon EventBridge 규칙이 호출하는 AWS Lambda 함수를 생성합니다. KMS API 호출을 모니터링하도록 EventBridge 규칙을 구성합니다. KMS 키 ARN을 참조하는 모든 API 호출을 필터링하도록 EventBridge 규칙을 구성합니다. Lambda 함수가 API 호출 내용을 DynamoDB 테이블에 저장하도록 구성합니다.", "KMS 키 사용량을 추적하기 위해 사용자 지정 메트릭으로 Amazon CloudWatch Logs Insights를 설정합니다. 실시간 모니터링 기능을 갖춘 CloudWatch 대시보드를 사용하여 메트릭을 시각화합니다. CloudWatch 알람을 구성합니다. 구독 필터를 사용하여 감사자가 검토할 수 있도록 데이터를 별도의 계정으로 복제합니다."], "answer": "A", "multi": false, "explanation": "AWS CloudTrail records AWS KMS key management and usage events, including key creation and API calls that reference the KMS key. Storing the validated CloudTrail logs in an S3 bucket with Object Lock provides immutable evidence for compliance, and auditors can be granted read access to review the key's creation, origin-related events, and subsequent use."},
  {"id": 215, "text": "한 회사가 새로운 로그 분석 환경을 구축할 계획입니다. 이 회사는 여러 AWS 서비스의 로그를 거의 실시간으로 분석할 수 있는 솔루션을 구현해야 합니다. 솔루션은 로그 검색 기능을 제공해야 하며, 특정 로그가 탐지 규칙과 일치할 경우 기존 Amazon Simple Notification Service(Amazon SNS) 토픽으로 알림을 전송해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon OpenSearch Service를 사용하여 로그를 분석합니다. OpenSearch API에서 로그를 검색합니다. OpenSearch Service 보안 분석을 사용하여 로그를 탐지 규칙과 일치시키고 SNS 주제로 알림을 보냅니다.", "AWS Security Hub를 사용하여 로그를 분석합니다. Security Hub의 발견 페이지에서 로그를 검색합니다. 로그를 탐지 규칙과 일치시키고 SNS 주제로 알림을 보내는 사용자 지정 작업을 생성합니다.", "Amazon CloudWatch Logs를 사용하여 로그를 분석합니다. 구독 필터를 사용하여 로그를 탐지 규칙과 일치시키고 SNS 주제로 알림을 보냅니다. CloudWatch Logs Insights를 사용하여 로그를 수동으로 검색합니다.", "Amazon QuickSight를 사용하여 로그를 분석합니다. 대시보드에 쿼리 결과를 나열하여 로그를 검색합니다. 쿼리를 실행하여 로그를 탐지 규칙과 일치시키고 SNS 토픽으로 알림을 보냅니다."], "answer": "A", "multi": false, "explanation": "Amazon OpenSearch Service is designed for near real-time log ingestion, indexing, and search across logs from multiple AWS services. OpenSearch Security Analytics can evaluate logs against detection rules and send alerts to an existing Amazon SNS topic when matching security events are detected."},
];
var TOTAL = ALL_QUESTIONS.length;

/* ── 상태 ── */
var mode = 'preset';
var selectedCount = 20;
var rangeFrom = 1, rangeTo = TOTAL;
var customCount = 0;
var selectedQIds = [];   // 그리드에서 선택된 Q id 목록
var quizQuestions = [];
var currentIndex = 0;
var userAnswers = [];
var selectedChoices = [];
var answered = false;
var startTime, timerInterval, totalSeconds = 0;
var isMidResult = false;

/* ── 유틸 ── */
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function gel(id) { return document.getElementById(id); }
function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function show(id) { gel(id).style.display = 'block'; }
function hide(id) { gel(id).style.display = 'none'; }

/* ── 문제 선택 그리드 초기화 ── */
function initQGrid() {
  selectedQIds = [];
  for (var i = 0; i < ALL_QUESTIONS.length; i++) selectedQIds.push(ALL_QUESTIONS[i].id);
  var grid = gel('qgrid');
  grid.innerHTML = '';
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    (function(q) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'qbtn on';
      btn.id = 'qb_' + q.id;
      btn.textContent = q.id;
      btn.onclick = function() { toggleQ(q.id, btn); };
      grid.appendChild(btn);
    })(ALL_QUESTIONS[i]);
  }
  updateQSelectCount();
}

function toggleQ(id, btn) {
  var pos = selectedQIds.indexOf(id);
  if (pos === -1) {
    selectedQIds.push(id);
    btn.classList.add('on');
  } else {
    selectedQIds.splice(pos, 1);
    btn.classList.remove('on');
  }
  updateQSelectCount();
  /* 그리드에서 직접 선택하면 다른 모드 해제 */
  mode = 'custom';
  clearAllCards();
  gel('customCountInput').value = '';
  gel('customCountDisplay').innerHTML = '직접<br>입력';
  gel('rangeFrom').value = '';
  gel('rangeTo').value = '';
  gel('rangePreview').textContent = '';
  gel('customRangeRow').classList.remove('active');
  gel('btnStart').disabled = (selectedQIds.length === 0);
}

function updateQSelectCount() {
  gel('qselectCount').textContent = '선택: ' + selectedQIds.length + ' / ' + TOTAL;
  gel('btnStart').disabled = (selectedQIds.length === 0);
}

function selectAllQ() {
  selectedQIds = [];
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    selectedQIds.push(ALL_QUESTIONS[i].id);
    var btn = gel('qb_' + ALL_QUESTIONS[i].id);
    if (btn) btn.classList.add('on');
  }
  updateQSelectCount();
}

function clearAllQ() {
  selectedQIds = [];
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    var btn = gel('qb_' + ALL_QUESTIONS[i].id);
    if (btn) btn.classList.remove('on');
  }
  mode = 'custom';
  clearAllCards();
  updateQSelectCount();
}

function invertQ() {
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    var id = ALL_QUESTIONS[i].id;
    var pos = selectedQIds.indexOf(id);
    var btn = gel('qb_' + id);
    if (pos === -1) { selectedQIds.push(id); if(btn) btn.classList.add('on'); }
    else { selectedQIds.splice(pos, 1); if(btn) btn.classList.remove('on'); }
  }
  mode = 'custom';
  clearAllCards();
  updateQSelectCount();
}

/* 프리셋 선택하면 그리드도 연동 */
function syncGridToCount(n) {
  /* 전체 선택 후 그리드 표시만 업데이트 */
  selectAllQ();
}

function clearAllCards() {
  var cards = document.querySelectorAll('.opt-card');
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
}

function selectPreset(n, cardId) {
  mode = 'preset';
  selectedCount = n;
  clearAllCards();
  gel(cardId).classList.add('selected');
  gel('customCountInput').value = '';
  gel('customCountDisplay').innerHTML = '직접<br>입력';
  gel('rangeFrom').value = '';
  gel('rangeTo').value = '';
  gel('rangePreview').textContent = '';
  gel('customRangeRow').classList.remove('active');
  selectAllQ();
  gel('btnStart').disabled = false;
}

function focusCustomCount() { gel('customCountInput').focus(); }

function onCustomCountFocus() {
  mode = 'customCount';
  clearAllCards();
  gel('cardCustom').classList.add('selected');
  gel('rangeFrom').value = '';
  gel('rangeTo').value = '';
  gel('rangePreview').textContent = '';
  gel('customRangeRow').classList.remove('active');
  selectAllQ();
  var v = parseInt(gel('customCountInput').value);
  gel('btnStart').disabled = !(v >= 1 && v <= TOTAL);
}

function onCustomCountInput() {
  mode = 'customCount';
  clearAllCards();
  gel('cardCustom').classList.add('selected');
  selectAllQ();
  var v = parseInt(gel('customCountInput').value);
  if (v >= 1 && v <= TOTAL) {
    customCount = v;
    gel('customCountDisplay').innerHTML = '<span style="font-size:20px;font-weight:900;color:var(--accent)">' + v + '</span>';
    gel('btnStart').disabled = false;
  } else {
    customCount = 0;
    gel('customCountDisplay').innerHTML = '직접<br>입력';
    gel('btnStart').disabled = true;
  }
}

function onRangeInput() {
  mode = 'range';
  clearAllCards();
  gel('customCountInput').value = '';
  gel('customCountDisplay').innerHTML = '직접<br>입력';
  gel('customRangeRow').classList.add('active');
  var fv = gel('rangeFrom').value;
  var tv = gel('rangeTo').value;
  var f = parseInt(fv) || 0;
  var t = parseInt(tv) || 0;
  var preview = gel('rangePreview');
  if (!fv && !tv) {
    preview.textContent = '';
    preview.className = 'range-preview';
    gel('btnStart').disabled = true;
    gel('customRangeRow').classList.remove('active');
    return;
  }
  if (f < 1 || f > TOTAL || t < 1 || t > TOTAL || f > t) {
    preview.textContent = '범위 오류';
    preview.className = 'range-error';
    gel('btnStart').disabled = true;
  } else {
    preview.textContent = (t - f + 1) + '문제';
    preview.className = 'range-preview';
    rangeFrom = f; rangeTo = t;
    /* 그리드 연동 */
    selectedQIds = [];
    for (var i = 0; i < ALL_QUESTIONS.length; i++) {
      var id = ALL_QUESTIONS[i].id;
      var btn = gel('qb_' + id);
      if (id >= f && id <= t) { selectedQIds.push(id); if(btn) btn.classList.add('on'); }
      else { if(btn) btn.classList.remove('on'); }
    }
    gel('qselectCount').textContent = '선택: ' + selectedQIds.length + ' / ' + TOTAL;
    gel('btnStart').disabled = false;
  }
}

/* ── 시작 ── */
function startQuiz() {
  var pool = [];
  if (mode === 'custom') {
    /* 그리드에서 직접 고른 문제들, 순서 유지 */
    for (var i = 0; i < ALL_QUESTIONS.length; i++) {
      if (selectedQIds.indexOf(ALL_QUESTIONS[i].id) !== -1) pool.push(ALL_QUESTIONS[i]);
    }
  } else if (mode === 'range') {
    for (var i = 0; i < ALL_QUESTIONS.length; i++) {
      if (ALL_QUESTIONS[i].id >= rangeFrom && ALL_QUESTIONS[i].id <= rangeTo) pool.push(ALL_QUESTIONS[i]);
    }
  } else if (mode === 'customCount') {
    if (!customCount || customCount < 1 || customCount > TOTAL) return;
    pool = shuffle(ALL_QUESTIONS).slice(0, customCount);
  } else {
    /* preset: 전체에서 랜덤 N개 */
    pool = shuffle(ALL_QUESTIONS).slice(0, selectedCount);
  }
  if (!pool.length) return;
  quizQuestions = pool;
  currentIndex = 0;
  userAnswers = [];
  for (var i = 0; i < quizQuestions.length; i++) userAnswers.push(null);
  isMidResult = false; totalSeconds = 0;
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
  hide('startScreen'); show('quizScreen');
  renderQuestion();
}

function updateTimer() {
  totalSeconds = Math.floor((Date.now() - startTime) / 1000);
  var m = Math.floor(totalSeconds / 60); var s = totalSeconds % 60;
  gel('qTimer').textContent = '⏱ ' + (m<10?'0':'') + m + ':' + (s<10?'0':'') + s;
}

/* ── 문제 렌더 ── */
function renderQuestion() {
  var q = quizQuestions[currentIndex];
  var ua = userAnswers[currentIndex];
  answered = (ua !== null);
  selectedChoices = ua ? ua.selected.slice() : [];

  gel('qCounter').textContent = 'Q' + (currentIndex + 1) + ' / ' + quizQuestions.length;
  gel('progressFill').style.width = (currentIndex / quizQuestions.length * 100) + '%';
  gel('qTags').innerHTML =
    '<span class="q-tag">Q' + q.id + '</span>' +
    (q.multi ? '<span class="q-tag multi">복수 정답</span>' : '<span class="q-tag">단일 정답</span>');
  gel('qText').textContent = q.text;

  var list = gel('choicesList');
  list.innerHTML = '';
  var labels = ['A','B','C','D','E','F'];
  var correctArr = q.answer.split(',').sort();

  for (var i = 0; i < q.choices.length; i++) {
    (function(idx) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'choice-btn';
      var ls = document.createElement('span'); ls.className = 'choice-label'; ls.textContent = labels[idx];
      var ts = document.createElement('span'); ts.textContent = q.choices[idx];
      btn.appendChild(ls); btn.appendChild(ts);

      if (answered) {
        btn.disabled = true;
        var inCorrect = (correctArr.indexOf(labels[idx]) !== -1);
        var inUser = (selectedChoices.indexOf(labels[idx]) !== -1);
        if (inCorrect && inUser) { btn.classList.add('correct'); ls.style.color='var(--success)'; }
        else if (inCorrect) { btn.classList.add('reveal-correct'); ls.style.color='var(--success)'; }
        else if (inUser) { btn.classList.add('wrong'); ls.style.color='var(--error)'; }
      } else {
        if (selectedChoices.indexOf(labels[idx]) !== -1) btn.classList.add('selected');
        btn.onclick = function() { toggleChoice(idx, btn, q.multi); };
      }
      list.appendChild(btn);
    })(i);
  }

  /* 피드백 */
  var fb = gel('feedbackBox');
  if (answered && ua) {
    if (ua.skipped) { fb.className = 'feedback-box wrong-fb'; fb.textContent = '건너뛴 문제입니다. 정답: ' + correctArr.join(', '); }
    else if (ua.correct) { fb.className = 'feedback-box correct-fb'; fb.textContent = '✓ 정답입니다!'; }
    else { fb.className = 'feedback-box wrong-fb'; fb.textContent = '✗ 오답입니다. 정답: ' + correctArr.join(', '); }
  } else {
    fb.className = 'feedback-box';
    fb.textContent = '';
  }

  /* 해설 */
  var eb = gel('explainBox');
  if (answered && q.explanation) {
    eb.className = 'explain-box show';
    eb.innerHTML = '<div class="explain-title">해설</div>' + escapeHtml(q.explanation);
  } else {
    eb.className = 'explain-box';
    eb.innerHTML = '';
  }

  /* 버튼 상태 */
  gel('prevBtn').disabled = (currentIndex === 0);
  if (answered) {
    gel('submitBtn').style.display = 'none';
    gel('nextBtn').style.display = 'inline-block';
    gel('nextBtn').textContent = currentIndex < quizQuestions.length - 1 ? '다음 →' : '결과 보기 →';
  } else {
    gel('submitBtn').style.display = 'inline-block';
    gel('submitBtn').disabled = (selectedChoices.length === 0);
    gel('nextBtn').style.display = 'none';
  }
}

function toggleChoice(idx, btn, isMulti) {
  if (answered) return;
  var labels = ['A','B','C','D','E','F'];
  if (isMulti) {
    var pos = selectedChoices.indexOf(labels[idx]);
    if (pos === -1) { selectedChoices.push(labels[idx]); btn.classList.add('selected'); }
    else { selectedChoices.splice(pos, 1); btn.classList.remove('selected'); }
  } else {
    var btns = document.querySelectorAll('.choice-btn');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('selected');
    selectedChoices = [labels[idx]];
    btn.classList.add('selected');
  }
  gel('submitBtn').disabled = (selectedChoices.length === 0);
}

function submitAnswer() {
  if (!selectedChoices.length || answered) return;
  answered = true;
  var q = quizQuestions[currentIndex];
  var correctArr = q.answer.split(',').sort();
  var userArr = selectedChoices.slice().sort();
  var isCorrect = (JSON.stringify(correctArr) === JSON.stringify(userArr));
  userAnswers[currentIndex] = { selected: selectedChoices.slice(), correct: isCorrect };
  renderQuestion();
}

function skipQuestion() {
  if (answered) return;
  userAnswers[currentIndex] = { selected: [], correct: false, skipped: true };
  if (currentIndex < quizQuestions.length - 1) { currentIndex++; renderQuestion(); }
  else showResult(false);
}

function prevQuestion() {
  if (currentIndex > 0) { currentIndex--; renderQuestion(); }
}

function nextQuestion() {
  if (currentIndex < quizQuestions.length - 1) { currentIndex++; renderQuestion(); }
  else showResult(false);
}

function openModal(id) { gel(id).classList.add('open'); }
function closeModal(id) { gel(id).classList.remove('open'); }
function openHomeConfirm() { openModal('homeModal'); }
function confirmGoHome() { closeModal('homeModal'); goHome(); }

function openMidCheck() {
  var answeredCnt = 0, correct = 0, skipped = 0;
  for (var i = 0; i < userAnswers.length; i++) {
    if (userAnswers[i] !== null) { answeredCnt++; if(userAnswers[i].correct) correct++; if(userAnswers[i].skipped) skipped++; }
  }
  var wrong = answeredCnt - correct - skipped;
  gel('midSubText').textContent = '현재까지 ' + answeredCnt + '문제 풀었습니다. (남은: ' + (quizQuestions.length - answeredCnt) + '개)';
  gel('midGrid').innerHTML =
    '<div class="mid-stat"><div class="mid-stat-val green">'+correct+'</div><div class="mid-stat-lbl">정답</div></div>' +
    '<div class="mid-stat"><div class="mid-stat-val red">'+wrong+'</div><div class="mid-stat-lbl">오답</div></div>' +
    '<div class="mid-stat"><div class="mid-stat-val orange">'+skipped+'</div><div class="mid-stat-lbl">건너뜀</div></div>';
  openModal('midModal');
}

function finishFromMid() { closeModal('midModal'); showResult(true); }

function showResult(isMid) {
  clearInterval(timerInterval);
  isMidResult = isMid;
  hide('quizScreen'); show('resultScreen');
  var total = quizQuestions.length;
  var answeredArr = [], correct = 0, skipped = 0;
  for (var i = 0; i < userAnswers.length; i++) {
    if (userAnswers[i] !== null) { answeredArr.push(userAnswers[i]); if(userAnswers[i].correct) correct++; if(userAnswers[i].skipped) skipped++; }
  }
  var wrong = answeredArr.length - correct - skipped;
  var unanswered = total - answeredArr.length;
  var base = answeredArr.length > 0 ? answeredArr.length : 1;
  var pct = Math.round(correct / base * 100);
  var m = Math.floor(totalSeconds/60); var s = totalSeconds%60;
  var timeStr = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;

  gel('resultPct').textContent = pct + '%';
  gel('rCorrect').textContent = correct;
  gel('rWrong').textContent = wrong;
  gel('rSkipped').textContent = skipped + (unanswered > 0 ? '+' + unanswered : '');
  gel('rTime').textContent = timeStr;

  var grade, title;
  if (pct>=90){grade='합격 ★★★';title='훌륭합니다! 실전 준비 완료 🎉';}
  else if(pct>=75){grade='합격 ★★';title='잘 하셨습니다! 조금만 더 다듬어요 👍';}
  else if(pct>=60){grade='보통 ★';title='아쉽네요. 오답 문제를 복습해보세요 📚';}
  else{grade='불합격';title='더 공부가 필요합니다. 오답을 집중 복습하세요 💪';}
  gel('resultGrade').textContent = grade;
  gel('resultTitle').textContent = isMid ? '📊 중간 채점 결과' : title;
  gel('resultSub').textContent = (isMid?'('+answeredArr.length+'/'+total+'문제 응답 기준) ':'')+total+'문제 중 '+correct+'개 정답 · '+m+'분 '+s+'초';

  var circumference = 339.3;
  var offset = circumference - (pct / 100 * circumference);
  var ring = gel('ringFill');
  ring.style.strokeDashoffset = circumference;
  setTimeout(function() { ring.style.strokeDashoffset = offset; }, 50);

  var answeredCount = 0;
  for (var i = 0; i < userAnswers.length; i++) { if (userAnswers[i] !== null) answeredCount++; }
  gel('btnContinue').style.display = (isMid && (total - answeredCount) > 0) ? 'inline-block' : 'none';

  var wrongQs = [];
  for (var i = 0; i < userAnswers.length; i++) {
    if (userAnswers[i] && (!userAnswers[i].correct || userAnswers[i].skipped)) wrongQs.push({q:quizQuestions[i],a:userAnswers[i]});
  }
  var wl = gel('wrongList');
  if (!wrongQs.length) {
    wl.innerHTML = '<div style="text-align:center;color:var(--success);padding:20px;">🎉 모두 정답!</div>';
  } else {
    var html = '<div class="wrong-list-title">오답 목록 ('+wrongQs.length+'개)</div>';
    for (var i = 0; i < wrongQs.length; i++) {
      var q = wrongQs[i].q, a = wrongQs[i].a;
      var text = q.text.length > 70 ? q.text.substring(0,70)+'...' : q.text;
      var status = a.skipped ? '[건너뜀]' : '[오답: '+(a.selected.join(',')||'-')+' → 정답: '+q.answer+']';
      html += '<div class="wrong-item"><span class="wrong-qnum">Q'+q.id+'</span><span class="wrong-qtext">'+
        text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+
        '<br><small style="color:var(--error)">'+status+'</small></span></div>';
    }
    wl.innerHTML = html;
  }
}

function continueFromResult() {
  if (!isMidResult) return;
  var nextIdx = -1;
  for (var i = 0; i < quizQuestions.length; i++) { if (userAnswers[i] === null) { nextIdx = i; break; } }
  if (nextIdx === -1) nextIdx = currentIndex;
  currentIndex = nextIdx;
  hide('resultScreen'); show('quizScreen');
  startTime = Date.now() - totalSeconds * 1000;
  timerInterval = setInterval(updateTimer, 1000);
  isMidResult = false;
  renderQuestion();
}

function reviewWrong() {
  var wrongQs = [];
  for (var i = 0; i < userAnswers.length; i++) {
    if (userAnswers[i] && (!userAnswers[i].correct || userAnswers[i].skipped)) wrongQs.push(quizQuestions[i]);
  }
  if (!wrongQs.length) { goHome(); return; }
  quizQuestions = wrongQs; currentIndex = 0;
  userAnswers = [];
  for (var i = 0; i < quizQuestions.length; i++) userAnswers.push(null);
  isMidResult = false; totalSeconds = 0; startTime = Date.now();
  clearInterval(timerInterval); timerInterval = setInterval(updateTimer, 1000);
  hide('resultScreen'); show('quizScreen');
  renderQuestion();
}

function goHome() {
  clearInterval(timerInterval);
  totalSeconds = 0; isMidResult = false;
  hide('resultScreen'); hide('quizScreen');
  gel('rangeFrom').value=''; gel('rangeTo').value='';
  gel('rangePreview').textContent='';
  gel('customRangeRow').classList.remove('active');
  gel('customCountInput').value='';
  gel('customCountDisplay').innerHTML='직접<br>입력';
  show('startScreen');
}

/* ── 초기화 ── */
initQGrid();
</script>
</body>
</html>
