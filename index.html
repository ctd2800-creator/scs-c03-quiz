  {"id": 121, "text": "AWS Config는 구성 스냅샷을 Amazon S3에 전송할 수 없습니다. 이 문제를 해결할 수 있는 두 가지 조치는 무엇입니까?", "choices": ["S3 버킷 정책에서 config.amazonaws.com을 허용하는지 확인하십시오.", "IAM 역할에 s3:GetBucketAcl 및 s3:PutObject 권한이 있는지 확인합니다.", "S3 버킷이 IAM 역할을 수임할 수 있는지 확인합니다.", "IAM 정책에서 AWS Config가 로그를 기록할 수 있도록 허용하는지 확인합니다.", "AWS Config API 권한을 수정합니다."], "answer": "A,B", "multi": true, "explanation": "AWS Config는 구성 데이터를 전달하기 위해 두 가지 수준의 권한이 필요합니다: AWS Config 서비스 역할과 S3 버킷 정책입니다. AWS Certified Security - Specialty 학습 가이드는 S3 버킷 정책이 config.amazonaws.com 서비스 주체가 객체를 작성할 수 있도록 명시적으로 허용해야 한다고 명시합니다. 추가로, AWS Config에서 사용하는 IAM 역할은 s3:GetBucketAcl과 s3:PutObject를 허용해야 합니다. 어느 권한이라도 누락되면 AWS Config는 스냅샷을 전달할 수 없으며 CloudTrail에 전달 오류를 기록합니다. 이러한 이중 권한 모델은 최소 권한을 보장하면서 준수 데이터의 안전한 전달을 유지합니다. 다른 옵션들은 잘못된 주체나 관련 없는 권한을 참조합니다."},
  {"id": 122, "text": "한 회사가 보안 감사를 받고 있습니다. 회사는 감사 담당자에게 IAM 사용자 자격 증명을 발급했습니다. 하지만 타사 통합 요구 사항으로 인해 감사 담당자는 IAM 역할을 수임할 수 없습니다. 감사 담당자는 계정 암호를 재설정하고 다단계 인증(MFA)을 구성하기 위해 AWS에 처음 로그인하려고 시도합니다. 그러나 암호 재설정 시도 중에 \"액세스 거부\" 오류가 발생합니다. 감사자 계정에는 다음과 같은 IAM 권한이 있습니다. securityhub:Get* securityhub:목록* securityhub:BatchGet* securityhub:설명* iam:ChangePassword on arn:aws:iam::*:user/${aws:username} 어떤 조치를 취해야 이 오류가 해결될까요?", "choices": ["감사자는 비밀번호를 재설정하기 전에 MFA를 구성해야 합니다.", "감사자는 추가 문자나 기호가 필요한 더 복잡한 암호를 생성해야 합니다.", "감사자의 사용자 계정 정책에 리소스: \"*\"를 사용하는 iam:GetAccountPasswordPolicy를 추가합니다.", "감사자의 사용자 계정 정책에 리소스: \"*\"를 사용하는 iam:ChangePassword를 추가합니다."], "answer": "C", "multi": false, "explanation": "감사자는 이미 올바른 사용자 리소스 패턴에 대해 iam:ChangePassword 권한을 가지고 있지만, 콘솔에서는 계정의 암호 요구 사항을 사용자가 확인하고 충족할 수 있도록 계정 암호 정책도 읽을 수 있어야 합니다. IAM 사용자 암호를 관리하는 예시 AWS IAM 정책에는 암호를 변경하는 동안 계정 암호 요구 사항을 보기 위한 iam:GetAccountPasswordPolicy가 포함됩니다. 사용자가 로그인 흐름을 완료할 수 없는 경우 첫 번째 암호 재설정 전에 MFA를 구성할 수 없습니다. 정책을 읽을 수 있으면 암호 복잡성이 중요할 수 있지만, 언급된 오류는 암호 형식 거부가 아닌 권한 실패입니다. 모든 리소스에 iam:ChangePassword를 부여하는 것은 필요 이상으로 광범위하며 누락된 암호 정책 읽기 권한 문제를 해결하지 못합니다."},
  {"id": 123, "text": "한 회사가 Amazon CloudFront와 Application Load Balancer(ALB)를 통해 Amazon EKS에서 공개 웹 애플리케이션을 운영하고 있습니다. 보안 엔지니어는 해당 애플리케이션이 5분 이내에 동일한 최종 사용자 IP 주소로부터 10,000건의 요청을 수신할 경우 기존 Amazon SNS 토픽으로 알림을 보내야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["CloudFront 표준 로깅 및 CloudWatch Logs 메트릭 필터를 구성합니다.", "VPC 흐름 로그 및 CloudWatch 로그 메트릭 필터를 구성합니다.", "ASN 일치 규칙 및 CloudWatch 알람을 사용하여 AWS WAF 웹 ACL을 구성합니다.", "속도 기반 규칙으로 AWS WAF 웹 ACL을 구성합니다. 이를 CloudFront와 연결합니다. SNS에 알림을 보내도록 CloudWatch 알람을 생성합니다."], "answer": "D", "multi": false, "explanation": "AWS WAF 비율 기반 규칙은 구성 가능한 기간 동안 단일 IP 주소의 요청 수를 추적하도록 특별히 설계되었습니다. AWS 공인 보안 - 전문 지침에 따르면 비율 기반 규칙은 CloudFront와 기본적으로 통합되며 경보를 트리거할 수 있는 CloudWatch 지표를 내보냅니다. CloudFront 로그와 VPC 흐름 로그는 실시간 탐지 도구가 아닙니다. ASN 일치 규칙은 요청 비율을 계산하지 않습니다."},
  {"id": 124, "text": "한 의료 회사가 아마존 S3 버킷에 100만 건 이상의 환자 기록을 저장하고 있습니다. 이 환자 기록에는 개인 식별 정보(PII)가 포함되어 있습니다. S3 버킷에는 수백 테라바이트의 데이터가 저장되어 있습니다. 보안 엔지니어가 Amazon GuardDuty 데이터 유출(S3)로 인해 발생한 경고를 받았습니다. /이상행동 발견. 보안 엔지니어는 공격자가 S3 버킷에 대한 s3:GetObject 권한이 있는 손상된 Amazon EC2 인스턴스에서 얻은 임시 자격 증명을 사용하고 있음을 확인했습니다. 공격자는 버킷의 콘텐츠를 다운로드하기 시작했습니다. 보안 엔지니어는 개발팀에 연락했습니다. 개발팀은 수정 사항을 구현하고 배포하는 데 4시간이 소요될 예정입니다. 보안 엔지니어는 공격자가 S3 버킷에서 더 많은 데이터를 다운로드하는 것을 막기 위해 즉각적인 조치를 취해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["EC2 인스턴스에 연결된 인스턴스 프로필과 관련된 임시 세션을 취소합니다.", "기존 보안 그룹을 규칙이 적용되지 않은 새 보안 그룹으로 교체하여 EC2 인스턴스를 격리합니다.", "S3 버킷에서 Amazon Macie를 활성화합니다. 개인 식별 정보(PII)에 대한 관리형 데이터 식별자를 구성합니다. Macie에서 플래그를 지정한 객체에 대해 S3 객체 잠금을 활성화합니다.", "S3 버킷 정책을 임시로 적용합니다. 개발팀이 취약점을 해결하는 동안 다운로드를 차단하기 위해 모든 주체에 대해 읽기 액세스를 거부하도록 정책을 구성합니다."], "answer": "A", "multi": false, "explanation": "Amazon GuardDuty Exfiltration:S3/AnomalousBehavior 발견 사항은 S3 데이터 액세스 패턴이 데이터 유출과 일치함을 나타냅니다. 이 시나리오에서 공격자는 EC2 인스턴스 프로필에서 얻은 임시 자격 증명을 사용하고 있으며, 이는 AWS Security Token Service(STS)에서 발급됩니다. AWS Certified Security - Specialty 문서에 따르면, 가장 빠르고 정확한 대응 방법은 손상된 인스턴스 프로필과 연결된 임시 세션 자격 증명을 철회하는 것입니다. 이는 IAM 역할 권한을 제거하거나 수정하거나, 인스턴스 프로필을 분리하거나, 인스턴스를 중지함으로써 수행할 수 있으며, 이는 임시 자격 증명을 즉시 무효화하고 추가 S3 액세스를 방지합니다."},
  {"id": 125, "text": "한 회사가 아마존 S3 버킷에 객체 수준의 활동을 기록해야 합니다. 또한 디지털 서명을 사용하여 로그 파일의 무결성을 검증해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇일까요?", "choices": ["로그 파일 유효성 검사가 활성화된 AWS CloudTrail 트레일을 생성합니다. 데이터 이벤트를 활성화합니다. 데이터 이벤트 유형으로 Amazon S3를 지정합니다.", "S3 서버 액세스 로그용 새 S3 버킷을 생성합니다. 기존 S3 버킷이 S3 서버 액세스 로그를 새 S3 버킷으로 전송하도록 구성합니다.", "Amazon CloudWatch Logs 로그 그룹을 생성합니다. 기존 S3 버킷이 S3 서버 액세스 로그를 해당 로그 그룹으로 전송하도록 구성합니다.", "로그 파일 유효성 검사가 활성화된 S3 서버 액세스 로그용 새 S3 버킷을 생성합니다. 데이터 이벤트를 활성화합니다. 데이터 이벤트 유형으로 Amazon S3를 지정합니다."], "answer": "A", "multi": false, "explanation": "로그 파일 검증과 Amazon S3에 대한 데이터 이벤트와 함께 AWS CloudTrail을 활성화하면 S3 버킷에 대한 객체 수준 로깅을 제공하고 디지털 서명을 통해 로그 파일 무결성을 보장합니다. CloudTrail 데이터 이벤트는 S3 버킷에서 읽기 및 쓰기 작업과 같은 객체 수준 활동의 자세한 기록을 캡처합니다. 로그 파일 검증을 활성화하면 CloudTrail은 각 로그 파일에 디지털 서명을 추가하여 무결성을 확인할 수 있습니다."},
  {"id": 126, "text": "한 회사가 사고 대응팀을 운영하여 문제를 해결합니다. 사고 대응팀은 문제 해결 시 AWS STS에서 발급받은 임시 자격 증명을 사용하여 계정 간 IAM 역할에 액세스해야 합니다. 때때로 각 팀원은 여러 유형의 사고에 동시에 대응해야 할 수 있습니다. 회사는 사고 유형에 따라 대응하는 팀원에게 최소한의 권한을 동적으로 할당하고자 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["모든 유형의 인시던트에 대해 적절한 권한을 부여하는 정책을 교차 계정 역할에 연결합니다. 세션 정책을 사용하여 해당 권한의 범위를 줄입니다.", "모든 유형의 인시던트에 대해 적절한 권한을 부여하는 정책을 교차 계정 역할에 연결합니다. 권한 경계를 사용하여 해당 권한의 범위를 줄입니다.", "초기에는 교차 계정 역할에 권한을 할당하지 마십시오. 해당 유형의 인시던트에 필요한 권한이 있는 세션 정책을 위임받은 역할에 할당하십시오.", "각 인시던트에 대해 AWS Lambda 함수를 사용합니다. 해당 함수가 AWS 관리형 정책인 AWSSecurityIncidentResponseServiceRolePolicy를 사용하는 임시 교차 계정 역할을 생성하도록 구성합니다. 권한 경계를 사용하여 해당 권한의 범위를 줄입니다."], "answer": "A", "multi": false, "explanation": "STS 세션 정책은 특정 가정 역할 세션에 대한 권한을 줄이도록 설계되었습니다. AWS 문서에 따르면, 결과 세션 권한은 역할의 ID 기반 정책과 세션 정책의 교집합이며, 세션 정책은 역할이 이미 허용한 것보다 더 많은 권한을 부여할 수 없습니다. 따라서 교차 계정 역할은 사건 유형 전반에 필요한 전체 권한 세트를 가져야 하며, 각 사건 대응 세션은 세션 정책으로 동적으로 좁힐 수 있습니다. 옵션 C는 세션 정책이 권한이 없는 역할에 권한을 추가할 수 없기 때문에 불가능합니다. 권한 경계는 개별 STS 세션을 동적으로 조정하는 것이 아니라 ID의 최대 권한을 제한하는 데 사용됩니다. Lambda로 사건별 역할을 만드는 것은 불필요한 운영 부담입니다."},
  {"id": 127, "text": "한 회사가 모든 기능이 활성화된 AWS Organizations 조직을 사용하는 다중 계정 전략을 운영하고 있습니다. 이 회사는 AWS 계정 관리에 대한 신뢰할 수 있는 액세스를 활성화했습니다. 새 계정은 AWS Control Tower Account Factory를 통해 프로비저닝됩니다. 회사는 조직 내 모든 신규 계정이 AWS Security Hub 멤버 계정이 되도록 해야 합니다. 어떤 솔루션이 최소한의 개발 노력으로 이러한 요구 사항을 충족할까요?", "choices": ["조직의 관리 계정에서 Security Hub를 활성화합니다. AWS Step Functions 워크플로를 생성합니다. CreateAccount 이벤트가 발생할 때 워크플로를 호출하도록 Amazon EventBridge 규칙을 생성합니다.", "조직 관리 계정에서 보안 허브를 활성화합니다. 모든 새 계정이 자동 온보딩을 완료할 때까지 기다립니다.", "조직의 관리 계정에서 Security Hub를 활성화합니다. 새 계정에 대해 Security Hub를 활성화하는 AWS Lambda 함수를 생성합니다. 새 계정이 프로비저닝될 때 발생하는 AWS Control Tower 수명 주기 이벤트를 사용하여 Lambda 함수를 호출합니다.", "조직의 관리 계정을 사용하여 Security Hub 위임 관리자 계정을 지정합니다. 위임된 관리자 계정에서 Security Hub를 활성화하는 구성 정책을 생성합니다. 해당 구성 정책을 조직 루트와 연결합니다."], "answer": "D", "multi": false, "explanation": ""},
  {"id": 128, "text": "한 회사가 Auto Scaling 그룹에 속한 Amazon EC2 인스턴스 플릿에서 웹 애플리케이션을 운영하고 있습니다. 해당 EC2 인스턴스는 다른 워크로드와 동일한 VPC 서브넷에 있습니다. 보안 엔지니어가 EC2 인스턴스와 동일한 AWS 리전에 Amazon GuardDuty 탐지기를 배포하고 GuardDuty를 AWS Security Hub와 통합합니다. 보안 엔지니어는 웹 애플리케이션의 비정상적인 트래픽 패턴을 감지하고 적절하게 대응하는 자동화 솔루션을 구현해야 합니다. 이 솔루션은 보안 사고 초기 대응에 대한 AWS 모범 사례를 준수해야 하며 웹 애플리케이션에 미치는 영향을 최소화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Lambda를 사용하여 EC2 인스턴스 프로필 자격 증명을 비활성화합니다.", "GuardDuty가 비정상적인 트래픽을 감지할 때 AWS Lambda 함수를 호출하는 Amazon EventBridge 규칙을 생성합니다. 해당 함수를 구성하여 영향을 받는 인스턴스를 Auto Scaling 그룹에서 제거하고 제한된 보안 그룹에 연결합니다.", "감지된 소스 IP 주소에서 오는 트래픽을 차단하도록 서브넷 네트워크 ACL을 업데이트합니다.", "GuardDuty 결과를 Amazon SNS로 전송하여 이메일 알림을 받도록 합니다."], "answer": "B", "multi": false, "explanation": "AWS 사고 대응 모범 사례는 폭발 범위를 최소화하면서 신속한 격리를 강조합니다. AWS 공인 보안 전문가(전문) 공식 학습 가이드에 따르면, 애플리케이션이 계속 실행될 수 있도록 하면서 손상된 리소스를 격리하는 것이 선호되는 초기 대응 방법입니다. Amazon EventBridge를 사용하여 이상 트래픽과 관련된 GuardDuty 결과를 감지하고 Lambda 함수를 호출함으로써, 보안 엔지니어는 영향을 받은 EC2 인스턴스를 자동으로 Auto Scaling 그룹에서 제거하고 제한된 보안 그룹을 연결할 수 있습니다. 이는 Auto Scaling이 대체 인스턴스를 시작하도록 허용하면서 인스턴스를 즉시 격리하여 애플리케이션 가용성을 보장합니다."},
  {"id": 129, "text": "AWS Organizations를 사용하는 한 회사가 AWS IAM Identity Center를 이용하여 AWS 계정에 대한 접근 권한을 관리하고 있습니다. 보안 엔지니어가 IAM Identity Center에서 사용자 지정 권한 집합을 생성하고 있습니다. 이 권한 집합은 여러 계정에서 사용할 예정입니다. AWS 관리형 정책과 고객 관리형 정책이 해당 권한 집합에 연결되어 있습니다. 보안 엔지니어는 관리자 계정에서 모든 관리자 권한을 가지고 있습니다. 보안 엔지니어가 여러 계정에 액세스 권한이 있는 IAM Identity Center 사용자에게 권한 집합을 할당하려고 하면 할당이 실패합니다. 보안 엔지니어는 이 오류를 해결하기 위해 무엇을 해야 할까요?", "choices": ["권한 집합이 할당된 모든 계정에 고객 관리 정책을 생성합니다. 각 계정에서 고객 관리 정책에 동일한 이름과 동일한 권한을 부여합니다.", "권한 집합에서 AWS 관리형 정책 또는 고객 관리형 정책 중 하나를 제거합니다. 삭제된 정책을 포함하는 두 번째 권한 세트를 생성합니다. 두 권한 세트를 사용자에게 각각 적용합니다.", "AWS 관리형 정책과 고객 관리형 정책의 논리를 평가합니다. 배포 전에 권한 집합에서 정책 충돌을 해결합니다.", "새 권한 세트를 사용자에게 추가하지 마십시오. 대신 사용자의 기존 권한 세트를 편집하여 AWS 관리형 정책과 고객 관리형 정책을 포함시키십시오."], "answer": "A", "multi": false, "explanation": "고객 관리형 정책을 포함하는 AWS IAM Identity Center 권한 세트에는 해당 정책이 각 대상 계정에 존재해야 합니다. AWS 공인 보안 - 전문 분야 연구 가이드에 따르면 고객 관리형 정책은 계정 범위이며 Identity Center에 의해 계정 전체에 자동으로 전파되지 않습니다. 여러 계정에 권한 집합을 할당할 때 Identity Center는 참조된 고객 관리형 정책을 각 계정에 연결하려고 시도합니다. 정책이 없으면 할당이 실패합니다. 모든 대상 계정에서 동일한 이름과 권한을 사용하여 동일한 고객 관리형 정책을 생성하면 문제가 해결됩니다. 옵션 B는 복잡성을 증가시킵니다. 옵션 C는 근본 원인을 해결하지 않습니다. 옵션 D는 Identity Center 관리 모범 사례를 위반합니다. AWS 설명서에는 권한 집합이 적용되는 모든 계정에 고객 관리형 정책이 있어야 한다고 명시되어 있습니다."},
  {"id": 130, "text": "한 회사가 AWS Organizations의 조직을 사용하여 여러 AWS 계정을 관리합니다. 보안 엔지니어는 조직 전체의 AWS 리소스에 대한 보안 규정 준수 여부를 모니터링해야 합니다. 보안 엔지니어는 AWS 리소스가 회사 보안 정책을 준수하지 않을 경우 알림을 받고 싶어합니다.", "choices": ["AWS Config 애그리게이터", "AWS Config 적합성 팩", "AWS Systems Manager를 사용한 AWS Config", "AWS Config 규칙", "AWS 사용자 알림을 포함한 AWS Config"], "answer": "A,B,C,D,E", "multi": true, "explanation": "적합성 팩으로 조직 전체에 규정 준수 규칙을 배포하고, 애그리게이터로 다중 계정·리전 데이터를 중앙화하며, Config 규칙으로 구성을 평가하고, Systems Manager로 자동 교정하며, User Notifications로 위반 알림을 받습니다."},
  {"id": 131, "text": "한 회사가 AWS Lambda 함수 모음을 사용하여 규정을 준수하지 않는 리소스를 자동으로 수정하려고 합니다. 이 회사는 Lambda 함수 모음을 AWS CloudFormation 템플릿으로 패키징했습니다. 그리고 이 Lambda 함수 모음을 모든 AWS Organizations 계정에 배포하려고 합니다. 하지만 Organizations 관리 계정을 배포에 사용할 수 없습니다. 조직 내 모든 계정에 Lambda 함수 제품군을 중앙 집중식으로 배포할 수 있는 솔루션은 무엇입니까?", "choices": ["CloudFormation에 대한 위임된 관리자를 등록합니다. StackSets를 사용하여 조직 내 모든 계정에 템플릿을 배포합니다.", "각 AWS 계정에 고유한 외부 ID를 가진 교차 계정 IAM 역할을 생성합니다. 해당 교차 계정 역할을 사용하여 템플릿을 배포합니다.", "템플릿을 AWS 서비스 카탈로그 제품으로 패키징합니다. 각 계정에 로그인하여 해당 계정에 제품을 프로비저닝합니다.", "각 계정에 AWS CodePipeline을 설정합니다. 조직 관리 계정의 Amazon S3 버킷에서 템플릿을 가져오도록 파이프라인을 구성합니다."], "answer": "A", "multi": false, "explanation": "서비스 관리 권한이 있는 CloudFormation StackSets는 AWS Organizations의 계정 전체에서 동일한 CloudFormation 템플릿을 배포하기 위한 올바른 중앙 집중식 배포 메커니즘입니다. AWS는 구성원 계정을 위임된 CloudFormation 관리자(delegate CloudFormation administrator)로 등록할 수 있도록 하며, 이후 해당 계정은 관리 계정을 사용하지 않고 조직을 위한 StackSets를 생성하고 관리할 수 있습니다. 이는 Organizations 관리 계정을 사용할 수 없다는 제한과 일치합니다. 모든 계정에서 수동으로 역할을 가정하는 것은 운영상 부담이 크고 CloudFormation 서비스 수준에서 중앙 집중화되지 않습니다. 서비스 카탈로그(Service Catalog)는 각 계정에서 프로비저닝이 필요합니다. 모든 계정에서 CodePipeline을 사용하는 것은 불필요하게 분산된 파이프라인 관리를 생성합니다. StackSets는 여러 계정과 지역에 걸쳐 스택을 생성, 업데이트 및 삭제하도록 특별히 설계되었습니다."},
  {"id": 132, "text": "보안 관리자가 새 AWS 계정을 설정하고 있습니다. 이 관리자는 회사가 Amazon S3 버킷에 저장하는 데이터를 보호하고자 합니다. 또한 의도치 않은 데이터 노출 가능성과 S3 버킷에 있는 객체의 잘못된 구성 가능성을 줄이고자 합니다. 어떤 솔루션이 운영 부담을 최소화하면서 이러한 요구 사항을 충족할까요?", "choices": ["AWS 계정에 대한 S3 공개 액세스 차단 기능을 구성합니다.", "버킷에 있는 모든 객체에 대해 S3 공개 액세스 차단 기능을 구성합니다.", "버킷에 있는 객체에 대한 ACL을 비활성화합니다.", "Amazon S3 버킷에 액세스하려면 AWS PrivateLink를 사용하세요."], "answer": "A", "multi": false, "explanation": "AWS 계정 수준에서 구성된 Amazon S3 퍼블릭 액세스 차단은 운영 오버헤드를 최소화하면서 Amazon S3에 저장된 데이터를 보호하기 위한 권장되고 가장 효과적인 접근 방식입니다. AWS Security Specialty 문서에서는 S3 퍼블릭 액세스 차단이 개별 버킷 정책이나 객체 수준 ACL 구성에 관계없이 S3 버킷 및 객체에 대한 퍼블릭 액세스를 차단하도록 설계된 중앙 집중식 예방 제어 기능을 제공한다고 설명합니다. 계정 수준에서 활성화하면 이러한 제어 기능이 기존 버킷과 새로 생성된 모든 버킷에 자동으로 적용되어 잘못 구성된 권한으로 인해 발생하는 우발적인 노출 위험이 크게 줄어듭니다. AWS 공인 보안 – 전문 분야 연구 가이드에서는 퍼블릭 액세스의 잘못된 구성이 클라우드 환경에서 데이터 유출의 주요 원인임을 강조합니다. 계정 수준 S3 퍼블릭 액세스 차단은 버킷 정책이나 ACL을 통해 퍼블릭 권한을 부여하려는 모든 시도를 재정의하여 가드레일 역할을 합니다. 이렇게 하면 버킷별 또는 개체별로 보안 설정을 관리할 필요가 없으므로 관리 복잡성과 인적 오류가 줄어듭니다. 옵션 B와 같이 개체 수준에서 공용 액세스 차단을 구성하려면 지속적인 모니터링과 수동 구성이 필요하므로 운영 오버헤드가 증가합니다. 옵션 C에 설명된 대로 ACL만 비활성화하면 버킷 정책이 여전히 공개 권한을 허용할 수 있으므로 공개 액세스가 완전히 차단되지는 않습니다. 옵션 D와 같이 AWS PrivateLink를 사용하면 네트워크 액세스를 제어할 수 있지만 잘못 구성된 S3 정책을 통한 공개 노출로부터 보호되지는 않습니다. AWS 보안 모범 사례에서는 최소한의 관리 노력으로 의도하지 않은 공개 데이터 노출을 방지하기 위한 기본 메커니즘으로 계정 수준에서 S3 퍼블릭 액세스 차단을 활성화할 것을 명시적으로 권장합니다."},
  {"id": 133, "text": "한 회사가 Amazon EC2 인스턴스의 Auto Scaling 그룹에서 애플리케이션을 실행하고 있습니다. 해당 애플리케이션은 로그를 로컬에 저장합니다. 보안 엔지니어는 스케일인 이벤트 이후 로그가 손실되는 것을 발견했습니다. 보안 엔지니어는 로그 데이터의 내구성과 가용성을 보장하는 솔루션을 제안해야 합니다. 모든 로그는 감사 목적으로 최소 1년 동안 보관해야 합니다. 보안 엔지니어는 어떤 것을 권장해야 할까요?", "choices": ["자동 스케일링 라이프사이클 내에 EC2 인스턴스가 생성될 때마다 Amazon Elastic Block Store(Amazon EBS) 로그 볼륨을 생성하고 연결하는 후크를 추가합니다. 인스턴스가 종료되면 로그 검토를 위해 EBS 볼륨을 다른 인스턴스에 다시 연결할 수 있습니다.", "Amazon Elastic File System(Amazon EFS) 파일 시스템을 생성하고 EC2 인스턴스 생성 중에 EFS 파일 시스템을 마운트하도록 Auto Scaling 시작 템플릿의 사용자 데이터 섹션에 명령을 추가합니다. 인스턴스에서 Amazon Elastic Block Store(Amazon EBS) 볼륨의 로그를 EFS 파일 시스템의 디렉터리로 하루에 한 번 복사하는 프로세스를 구성하십시오.", "자동 스케일링 그룹에 사용되는 AMI에 Amazon CloudWatch 에이전트를 추가합니다. 검토를 위해 로그를 Amazon CloudWatch Logs로 전송하도록 CloudWatch 에이전트를 구성합니다.", "Auto Scaling 라이프사이클 내에서 종료 상태 전환 시 라이프사이클 후크를 추가하고 Amazon Simple Notification Service(Amazon SNS)를 통해 라이프사이클 알림을 사용하여 엔지니어링 팀에 알립니다. 인스턴스 종료 전에 보안 로그를 수동으로 검토할 수 있도록 후크가 Terminating:Wait 상태를 1시간 동안 유지하도록 구성합니다."], "answer": "C", "multi": false, "explanation": "Auto Scaling 그룹에서 인스턴스는 일시적입니다. 로컬 디스크와 인스턴스 수준 로그 파일은 스케일 인 또는 대체 시 사라질 수 있습니다. 가장 내구성이 높고 운영상 단순한 패턴은 로그를 호스트 외부에서 지속적으로 관리형 로그 서비스로 스트리밍하는 것입니다. CloudWatch 에이전트(또는 통합 에이전트)를 설치하고 구성하여 애플리케이션 로그를 Amazon CloudWatch Logs로 전송하면 로그가 중앙화되고 인스턴스 수명 주기 이벤트와 상관없이 로그를 사용할 수 있습니다. 이는 \"스케일 인 후 로그 유실\" 문제를 직접 해결하며 감사 및 조사에 대한 높은 가용성을 제공합니다. CloudWatch Logs는 보관 기간 제어도 지원합니다. 보안 엔지니어는 로그 그룹 보관 기간을 최소 1년(또는 더 길게)로 설정하여 맞춤형 저장 워크플로를 구축하지 않고도 감사 요건을 충족할 수 있습니다. IAM으로 액세스를 제어하여 누가 로그를 보거나 내보낼 수 있는지를 제한할 수 있으며, 필요에 따라 CloudWatch 로그를 Athena/OpenSearch/SIEM 도구와 추가로 통합할 수도 있습니다."},
  {"id": 134, "text": "한 회사가 Amazon CloudWatch Logs 로그 그룹에 저장된 데이터를 90일 동안 보존해야 합니다. 또한 로그 그룹 보존 기간이 이 요구 사항을 준수하지 않을 경우 AWS Security Hub에서 알림을 받아야 합니다. 어떤 솔루션이 적절한 알림 기능을 제공할까요?", "choices": ["로그 그룹 보존 기간을 평가하기 위한 보안 허브 사용자 지정 작업을 생성합니다.", "CloudWatch Logs에서 로그 그룹 보존 기간을 평가하기 위한 데이터 보호 정책을 생성합니다.", "보안 허브 자동화 규칙을 생성합니다. 로그 그룹 보존 기간을 평가하도록 자동화 규칙을 구성합니다.", "로그 그룹 보존 기간을 평가하는 AWS Config 관리형 규칙을 사용하십시오. Security Hub에서 AWS Config 통합이 활성화되어 있는지 확인하십시오."], "answer": "D", "multi": false, "explanation": "AWS Config는 CloudWatch Logs 로그 그룹의 보존 기간을 포함한 다양한 구성을 평가할 수 있는 관리형 규칙을 제공합니다. 로그 그룹이 90일의 보존 기간을 갖고 있는지 확인하는 적절한 AWS Config 관리형 규칙을 활성화하면 회사는 이 요구 사항 준수를 자동으로 모니터링할 수 있습니다. AWS Config를 AWS Security Hub와 통합하면, 준수하지 않는 결과를 Security Hub로 전송할 수 있어 보존 기간이 준수되지 않을 때 필요한 알림을 제공할 수 있습니다."},
  {"id": 135, "text": "한 회사가 Linux 기반 웹 서버 인스턴스들을 Amazon EC2 Auto Scaling 그룹으로 이전하기로 결정했습니다. 현재 인스턴스들은 고정되어 있으며 수동으로 실행됩니다. 관리자가 로그 파일을 확인해야 할 경우, SSH를 사용하여 인스턴스에 연결한 후 수동으로 로그를 가져옵니다. 이 회사는 애플리케이션 세션 및 사용자 문제에 대한 결과를 얻기 위해 로그를 자주 조회해야 합니다. 또한, 새로운 자동 확장 아키텍처로 인해 인스턴스가 확장될 때 로그 파일이 손실되는 것을 원하지 않습니다. 보안 엔지니어가 이러한 요구 사항을 가장 비용 효율적으로 충족하기 위해 취해야 할 조치 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["인스턴스에 cron 작업을 구성하여 로그 파일을 주기적으로 Amazon S3로 전달합니다.", "AWS Glue와 Amazon Athena가 로그 파일을 쿼리하도록 구성합니다.", "인스턴스에서 Amazon CloudWatch 에이전트를 구성하여 로그를 Amazon CloudWatch Logs로 전달합니다.", "Amazon CloudWatch Logs Insights가 로그 파일을 쿼리하도록 구성합니다.", "인스턴스가 로그를 Amazon Elastic File System(Amazon EFS) 볼륨에 기록하도록 구성합니다."], "answer": "C,D", "multi": true, "explanation": "Amazon CloudWatch Logs는 Auto Scaling 그룹의 EC2 인스턴스와 같은 임시 컴퓨팅 리소스에서 로그 데이터를 수집, 저장 및 분석하도록 설계되었습니다. AWS 공인 보안 - 전문 연구 가이드에 따르면 CloudWatch 에이전트를 사용하여 로그오프 인스턴스를 스트리밍하면 축소 이벤트 중에 인스턴스가 종료되는 경우에도 로그 내구성이 보장됩니다. CloudWatch Logs Insights는 추가 인프라 없이 로그 데이터의 임시 쿼리, 필터링 및 집계를 지원하는 완전 관리형 서버리스 쿼리 엔진을 제공합니다. 이는 애플리케이션 세션 및 사용자 문제 해결에 대한 로그 쿼리 요구 사항을 직접적으로 충족합니다. 옵션 A는 크론 실행 사이에 로그가 손실될 수 있으므로 운영 위험을 초래합니다. 옵션 B에는 추가 서비스와 데이터 파이프라인이 필요하므로 비용과 복잡성이 증가합니다. 옵션 E는 스토리지 비용과 관리 오버헤드를 추가하며 로그 분석에는 필요하지 않습니다. AWS 모범 사례에서는 CloudWatch Logs 및 Logs Insights를 Auto Scaling 환경의 중앙 집중식 로그 보존 및 분석을 위한 가장 비용 효율적이고 확장 가능한 솔루션으로 권장합니다."},
  {"id": 136, "text": "한 스타트업 기업이 단일 AWS 계정을 사용하여 단일 AWS 리전에 리소스를 분산 관리하고 있습니다. 보안 엔지니어는 AWS CLI를 사용하여 동일 리전에 AWS CloudTrail 트레일을 구성하고 로그 파일을 Amazon S3 버킷으로 전송하도록 설정했습니다. 이후 기업 확장에 따라 여러 리전에 리소스를 추가하게 되었고, 보안 엔지니어는 새로 추가된 리전의 로그가 S3 버킷에 도달하지 않는 것을 발견했습니다. 보안 엔지니어는 운영 부담을 최소화하면서 이 문제를 해결하기 위해 무엇을 해야 할까요?", "choices": ["새 CloudTrail 트레일을 생성합니다. 회사가 리소스를 추가한 새 리전을 선택합니다.", "모든 리전의 모든 작업을 추적하기 위해 알림을 수신할 S3 버킷을 변경합니다.", "모든 리전에 적용되는 새로운 CloudTrail 트레일을 생성합니다.", "기존 CloudTrail 트레일이 모든 리전에 적용되도록 변경합니다."], "answer": "D", "multi": false, "explanation": "CloudTrail 트레일은 단일 리전(single-Region) 또는 다중 리전(multi-Region)으로 구성할 수 있습니다. 단일 리전 트레일은 생성된 리전의 이벤트만을 전달합니다. 회사가 추가 리전을 사용하기 시작하면, 해당 이벤트는 트레일을 업데이트하지 않는 한 기존 S3 대상으로 기록되지 않습니다. 운영상의 부담을 최소화하려면 기존 트레일을 수정하고 다중 리전 로깅을 활성화하는 것이 가장 좋습니다(즉, 트레일을 '모든 리전에 적용'하도록 구성). 이렇게 하면 현재 S3 버킷 대상, 암호화 설정, 로그 파일 검증 구성, IAM 역할, 기존 트레일 이름과 S3 접두사 구조에 이미 의존하는 모든 통합이 그대로 유지됩니다."},
  {"id": 137, "text": "보안 엔지니어는 Amazon Elastic Block Store(Amazon EBS) 기반 스토리지를 사용하는 Linux 기반 Amazon EC2 인스턴스에서 의심스러운 활동이 발생했다는 알림을 받았습니다. 해당 인스턴스가 알려진 악성 주소에 연결을 시도하고 있습니다. 해당 인스턴스는 us-east-1 리전의 VPC 내 개발 계정에 있습니다. 이 VPC에는 인터넷 게이트웨이가 있으며 us-east-1a 및 us-east-1b 서브넷이 있습니다. 각 서브넷은 인터넷 게이트웨이를 기본 경로로 사용하는 라우팅 테이블과 연결되어 있습니다. 또한 각 서브넷은 기본 네트워크 ACL을 사용합니다. 의심스러운 EC2 인스턴스는 us-east-1b 서브넷에서 실행 중입니다. 초기 조사 과정에서 보안 엔지니어는 해당 서브넷에서 실행되는 인스턴스가 의심스러운 인스턴스 하나뿐임을 발견했습니다. 어떤 대응이 공격을 즉시 완화하고 근본 원인을 조사하는 데 도움이 될까요?", "choices": ["의심스러운 인스턴스에 로그인하고 netstat 명령을 사용하여 원격 연결을 확인합니다. 이러한 원격 연결의 IP 주소를 사용하여 인스턴스의 보안 그룹에 거부 규칙을 생성합니다. 문제 해결을 위해 인스턴스에 진단 도구를 설치하십시오. 인스턴스 조사 중 첫 번째 규칙으로 us-east-1b 서브넷의 아웃바운드 네트워크 ACL을 업데이트하여 모든 연결을 명시적으로 차단하십시오.", "us-east-1b 서브넷의 아웃바운드 네트워크 ACL을 업데이트하여 첫 번째 규칙으로 모든 연결을 명시적으로 거부하도록 합니다. 기존 보안 그룹을 진단 보안 그룹에서만 연결을 허용하는 새 보안 그룹으로 교체합니다. us-east-1b 서브넷의 아웃바운드 네트워크 ACL에서 모든 연결 거부 규칙을 제거합니다. 진단 도구가 설치된 새 EC2 인스턴스를 시작합니다. 새 보안 그룹을 새 EC2 인스턴스에 할당합니다. 새 EC2 인스턴스를 사용하여 의심스러운 인스턴스를 조사합니다.", "문제가 있는 EC2 인스턴스에 연결된 Amazon Elastic Block Store(Amazon EBS) 볼륨이 인스턴스 종료 시 삭제되지 않도록 합니다. 해당 인스턴스를 종료합니다. 진단 도구가 설치된 새 EC2 인스턴스를 us-east-1a 리전에 시작합니다. 종료된 인스턴스의 EBS 볼륨을 마운트하여 조사합니다.", "의심스러운 인스턴스와의 트래픽을 차단하는 AWS WAF 웹 ACL을 생성합니다. 공격을 완화하기 위해 AWS WAF 웹 ACL을 인스턴스에 연결합니다. 인스턴스에 로그인하여 진단 도구를 설치하고 인스턴스를 조사합니다."], "answer": "C", "multi": false, "explanation": "AWS 사고 대응 모범 사례에서는 즉각적인 봉쇄, 증거 보존 및 안전한 법의학 조사를 강조합니다. AWS 공인 보안 - 전문 연구 가이드에 따르면, EC2 인스턴스가 손상되었다고 의심되는 경우 보안 팀은 인스턴스에 로그인하거나 추가 도구를 설치하는 것을 피해야 합니다. 이러한 조치로 인해 증거가 변경되고 위험이 증가할 수 있습니다. Amazon EBS 볼륨이 보존되었는지 확인한 후 손상된 인스턴스를 종료하면 추가 악성 활동을 즉시 방지할 수 있습니다. 종료 시 삭제되지 않도록 EBS 볼륨을 설정하면 포렌식 분석을 위해 모든 디스크 데이터가 보존됩니다. 사전 설치된 진단 도구를 사용하여 다른 서브넷이나 가용 영역에서 새롭고 깨끗한 EC2 인스턴스를 시작하면 조사관은 잠재적인 악성 코드를 실행하지 않고도 손상된 볼륨을 안전하게 연결하고 분석할 수 있습니다. 옵션 A는 손상된 인스턴스에 로그인하고 활성 손상 중에 보안 제어를 수정함으로써 상당한 위험을 초래합니다. 옵션 B는 격리를 지연시키고 조사 단계 동안 지속적인 아웃바운드 트래픽을 허용합니다. AWS WAF는 Amazon EC2 인스턴스에 직접 연결할 수 없고 아웃바운드 트래픽을 제어하지 않기 때문에 옵션 D는 유효하지 않습니다. AWS 설명서에서는 손상된 리소스를 격리 또는 종료하고 분리된 스토리지 볼륨을 사용하여 오프라인 분석을 수행할 것을 강력히 권장합니다. 이 접근 방식은 즉각적인 완화를 보장하고 법의학 무결성을 유지하며 AWS 사고 대응 프레임워크와 일치합니다."},
  {"id": 138, "text": "보안 엔지니어는 회사의 Amazon EC2 인스턴스가 암호화폐 채굴에 사용되고 있는지 여부를 판단하는 솔루션을 구현해야 합니다. 이 솔루션은 암호화폐 관련 활동이 발생할 경우 Amazon SNS(Amazon Simple Notification Service) 토픽으로 알림을 전송해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Guard 사용자 지정 정책을 사용하여 AWS Config 사용자 지정 규칙을 생성합니다. EC2 인스턴스가 암호화폐 관련 활동과 연관된 DNS 도메인 이름을 쿼리할 때 이를 감지하도록 AWS Config 규칙을 구성합니다. SNS 토픽에 대한 알림을 시작하도록 AWS Config를 구성합니다.", "Amazon GuardDuty를 활성화합니다. GuardDuty가 암호화폐 관련 활동과 연관된 발견 사항을 생성할 때 SNS 토픽으로 알림을 보내도록 Amazon EventBridge 규칙을 생성합니다.", "Amazon Inspector를 활성화합니다. Amazon Inspector에서 암호화폐 관련 활동과 연관된 발견 사항이 생성될 때 SNS 토픽으로 알림을 보내도록 Amazon EventBridge 규칙을 생성합니다.", "VPC 흐름 로그를 활성화합니다. 흐름 로그를 Amazon S3 버킷으로 전송합니다. EC2 인스턴스가 암호화폐 관련 활동과 연관된 DNS 도메인 이름을 쿼리할 때 이를 감지하도록 Amazon Athena에서 쿼리를 설정합니다. Athena 쿼리를 구성하여 SNS 토픽에 알림을 전송합니다."], "answer": "B", "multi": false, "explanation": "Amazon GuardDuty에는 암호화폐 채굴과 같은 의심스러운 활동을 식별할 수 있는 내장 위협 탐지 기능이 포함되어 있습니다. GuardDuty가 암호화폐 관련 활동을 감지하면, 경고를 트리거하는 데 사용할 수 있는 발견(Finding)을 생성합니다. 이러한 특정 발견을 포착하고 SNS 주제로 알림을 보내도록 Amazon EventBridge 규칙을 구성함으로써, 이 솔루션은 EC2 인스턴스에서 암호화폐 채굴 활동에 대한 실시간 알림을 제공합니다."},
  {"id": 139, "text": "한 회사가 EC2 Auto Scaling 인스턴스의 Apache 로그를 1년 보존 기간의 CloudWatch Logs 로그 그룹으로 전송합니다. 로그에 의심스러운 IP 주소가 나타났습니다. 보안 엔지니어는 지난 한 주간의 로그를 분석하여 해당 IP 주소에서 발생한 요청 수와 요청된 URL 목록을 작성해야 합니다. 엔지니어는 최소한의 노력으로 무엇을 해야 할까요?", "choices": ["S3로 내보내고 Macie를 사용하세요.", "OpenSearch로 스트리밍하고 분석합니다.", "CloudWatch Logs Insights를 쿼리와 함께 사용하세요.", "S3로 내보내고 AWS Glue를 사용하세요."], "answer": "C", "multi": false, "explanation": "CloudWatch Logs Insights는 데이터를 다른 곳으로 이동하지 않고도 CloudWatch Logs에 저장된 로그 데이터를 검색하고 분석하도록 설계된 관리형 온디맨드 쿼리 기능입니다. AWS 공인 보안 – 전문 문서에서는 Logs Insights가 기존 로그 그룹에 대한 필터링, 구문 분석, 집계 및 시간 범위 쿼리를 직접 지원하기 때문에 신속한 조사를 위한 가장 간편한 방법으로 강조합니다. 이 시나리오에서는 보존이 충분한 로그가 CloudWatch Logs에 이미 존재합니다. 엔지니어는 의심스러운 IP 주소를 필터링하고, 지난 7일 동안의 발생 횟수를 계산하고, 구문 분석 기능을 사용하여 요청된 URL을 추출하는 쿼리를 작성할 수 있습니다. 이는 파이프라인을 구축하거나 데이터를 내보내지 않고도 두 가지 요구 사항(수 및 URL)을 즉시 충족합니다. 옵션 B는 OpenSearch 수집 및 인덱싱을 프로비저닝하고 유지 관리하여 운영 오버헤드를 추가합니다. 옵션 A와 D에는 1주간의 포렌식 쿼리에 필요하지 않은 데이터 및 추가 서비스 내보내기가 필요합니다. 따라서 Logs Insights는 가장 효율적이고 비용 효과적인 접근 방식입니다."},
  {"id": 140, "text": "한 회사가 AWS Organizations의 조직을 사용하여 250개의 멤버 계정을 관리합니다. 또한 SAML 외부 ID 공급자(IdP)와 함께 AWS IAM Identity Center를 사용하고 있습니다. IAM Identity Center는 멤버 계정 중 하나에 위임되었으며, 회사 보안팀은 위임된 계정에 접근할 수 있습니다. 보안팀은 민감한 계정에 접근했을 가능성이 있는 악의적인 내부 사용자를 조사하고 있습니다. 보안팀은 사용자가 지난 7일 동안 언제 조직에 로그인했는지 알아야 합니다. 어떤 솔루션이 접근 시도를 신속하게 식별할 수 있을까요?", "choices": ["위임된 계정에서 Amazon CloudWatch Logs를 사용하여 모든 성공적인 시도에 대해 사용자 세부 정보와 일치하는 이벤트를 검색합니다.", "각 멤버 계정에서 IAM Identity Center 콘솔을 사용하여 모든 시도에 대한 사용자 세부 정보와 일치하는 이벤트를 검색합니다.", "외부 IdP에서 Amazon EventBridge를 사용하여 모든 시도에 대해 사용자 세부 정보와 일치하는 이벤트를 검색합니다.", "조직의 관리 계정에서 AWS CloudTrail을 사용하여 모든 성공 시도에 대한 사용자 세부 정보와 일치하는 이벤트를 검색합니다."], "answer": "D", "multi": false, "explanation": "AWS CloudTrail은 AWS 조직 전체의 아이덴티티 관련 활동에 대한 권위 있는 소스입니다. AWS 공인 보안 전문가 - 스페셜티 공식 학습 가이드에 따르면, CloudTrail은 모든 AWS API 호출 및 인증 이벤트를 기록하며, 여기에는 외부 SAML 아이덴티티 공급자를 통해 AWS IAM Identity Center에서 발생하는 연합 로그인도 포함됩니다. IAM Identity Center가 사용될 경우, 성공적인 연합 로그인 이벤트는 CloudTrail에 ConsoleLogin 및 AssumeRoleWithSAML 이벤트로 기록됩니다. 이러한 이벤트는 CloudTrail이 조직 트레일로 구성될 때 조직의 관리 계정에 기록됩니다. 이를 통해 보안 팀은 모든 구성원 계정에 걸친 인증 활동을 중앙에서 검색하고 상관 관계를 분석할 수 있습니다."},
  {"id": 141, "text": "보안 엔지니어는 보안 사고 발생 시 회사의 Amazon EC2 인스턴스를 격리할 준비를 해야 합니다. 모든 EC2 인스턴스에는 AWS Systems Manager Agent(SSM Agent)가 배포되어 있습니다. 보안 엔지니어는 EC2 인스턴스에 포렌식 도구를 설치하고 업데이트하는 스크립트를 개발했습니다. 보안 사고 발생 시 EC2 인스턴스를 격리할 수 있는 솔루션은 무엇입니까?", "choices": ["AWS Config에서 SSM 에이전트 버전을 추적하는 규칙을 생성합니다.", "시스템 관리자 세션 관리자가 외부 IP 주소로부터의 모든 연결 요청을 거부하도록 구성합니다.", "스크립트를 Amazon S3에 저장하고 인스턴스 프로필에 읽기 권한을 부여합니다.", "SSM 에이전트가 스크립트를 미리 정의된 Systems Manager 실행 명령 문서로 실행할 수 있도록 IAM 권한을 구성합니다."], "answer": "D", "multi": false, "explanation": "AWS Systems Manager Run Command는 보안 엔지니어가 SSH 또는 인바운드 네트워크 액세스를 요구하지 않고 EC2 인스턴스에서 원격으로 스크립트를 안전하게 실행할 수 있도록 합니다. AWS Certified Security - Specialty 인시던트 대응 가이드에 따르면, Run Command는 인스턴스 격리 및 포렌식 준비를 위한 기본 도구입니다. SSM Agent가 미리 정의된 Run Command 문서를 실행할 수 있도록 IAM 권한을 구성함으로써, 보안 엔지니어는 인시던트 동안 영향을 받은 EC2 인스턴스에 포렌식 도구를 신속하게 배포하고, 서비스를 비활성화하며, 시스템 구성을 수정할 수 있습니다. 이 접근법은 Systems Manager 로그를 통해 감사 가능성을 유지하면서 AWS의 격리 및 증거 보존 모범 사례와 일치합니다."},
  {"id": 142, "text": "한 회사가 AWS에서 온라인 게임을 운영하고 있습니다. 플레이어가 게임에 가입하면 사용자 이름과 비밀번호가 아마존 오로라 데이터베이스에 저장됩니다. 사용자 수가 수십만 명에 달하면서 비밀번호 재설정 및 로그인 지원 요청이 폭증해 회사 고객 서비스팀에 부담이 되고 있습니다. 해당 회사는 플레이어들이 게임에 로그인할 수 있는 또 다른 방법을 제공하는 솔루션을 구현해야 합니다. 이 솔루션은 비밀번호 재설정 및 로그인 지원의 번거로움을 없애는 동시에 각 플레이어의 로그인 정보를 안전하게 보호해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["새로운 플레이어가 가입할 때 AWS Lambda 함수를 사용하여 IAM 액세스 키와 비밀 액세스 키를 자동으로 생성합니다.", "Aurora 데이터베이스에서 AWS Secrets Manager로 플레이어 자격 증명을 마이그레이션합니다.", "소셜 ID 공급자(IdP)와 같은 타사 ID 공급자(IdP)를 사용하여 게임 액세스를 연동하도록 Amazon Cognito 사용자 풀을 구성합니다. 게임의 인증 메커니즘을 Cognito로 마이그레이션합니다.", "신규 및 기존 플레이어에게 API 키를 발급하고 인증에 Amazon API Gateway를 사용합니다."], "answer": "C", "multi": false, "explanation": "Amazon Cognito는 웹 및 모바일 애플리케이션을 위한 사용자 인증, 권한 부여, 사용자 관리를 제공하는 완전 관리형 아이덴티티 서비스입니다. AWS Certified Security - Specialty 문서에 따르면, Cognito 사용자 풀은 강력한 보안 통제를 유지하면서 애플리케이션에서 인증 책임을 분산시키도록 특별히 설계되었습니다. 소셜 IdP와 같은 제3자 아이덴티티 제공자와 인증을 페더레이션함으로써, Cognito는 회사가 사용자 비밀번호를 직접 관리할 필요성을 없애줍니다. 이는 비밀번호 재설정 요청과 고객 서비스 부담을 크게 줄이는 동시에 MFA 및 토큰 기반 접근을 포함한 산업 표준 인증 메커니즘을 통해 보안을 향상시킵니다."},
  {"id": 143, "text": "한 회사가 원격 근무자를 위한 클라우드 기반 관리형 데스크톱 솔루션이 필요합니다. 회사는 직원들이 회사에서 제공한 기기를 통해서만 데스크톱에 접속할 수 있도록 보장하고자 합니다. 보안 엔지니어는 비용과 관리 부담을 최소화하는 솔루션을 설계해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["회사 소유 기기에서만 접근을 허용하는 제한 정책이 적용된 사용자 지정 가상 데스크톱 인프라(VDI) 솔루션을 배포합니다.", "Amazon EC2 인스턴스 플릿을 배포합니다. Windows Active Directory를 사용하는 인증서 기반 장치 인증을 통해 각 직원에게 인스턴스를 할당합니다.", "Amazon WorkSpaces를 배포합니다. AWS Identity and Access Management(IAM)를 사용하여 인증 게이트웨이에 IP 차단 기능이 있는 신뢰할 수 있는 장치 정책을 설정합니다.", "Amazon WorkSpaces를 배포합니다. 클라이언트 인증서를 생성하고 신뢰할 수 있는 장치에 배포합니다. 디렉터리 수준에서 액세스 제한을 활성화합니다."], "answer": "D", "multi": false, "explanation": "Amazon WorkSpaces는 인프라 및 운영 오버헤드를 최소화하도록 설계된 완전 관리형 Desktop-as-a-Service 솔루션입니다. AWS 공인 보안 전문 문서에 따르면 WorkSpaces는 클라이언트 인증서를 사용하여 승인된 디바이스에 대한 액세스를 제한함으로써 디바이스 신뢰를 지원합니다. 회사 관리 장치에만 클라이언트 인증서를 배포하고 디렉터리 수준에서 제한된 액세스를 적용함으로써 조직은 신뢰할 수 있는 끝점만 인증할 수 있도록 보장합니다. 이 접근 방식을 사용하면 사용자 지정 VDI를 구축 및 유지 관리하거나 개별 EC2 인스턴스를 관리하는 데 드는 비용과 복잡성을 피할 수 있습니다. 옵션 A와 B는 관리 오버헤드를 크게 증가시킵니다. IAM은 WorkSpaces 인증 게이트웨이 정책 또는 디바이스 신뢰를 관리하지 않기 때문에 옵션 C는 올바르지 않습니다. AWS 모범 사례에서는 인증서 기반 디바이스 신뢰를 갖춘 Amazon WorkSpaces가 안전한 관리형 데스크톱을 위한 가장 효율적인 솔루션임을 강조합니다."},
  {"id": 144, "text": "한 회사가 수백 개의 AWS 계정을 보유하고 있으며 AWS Organizations를 사용하고 있습니다. 이 회사는 제품 팀, 보안 팀, 플랫폼 팀을 위해 각각 다른 IAM 역할과 정책을 생성할 계획입니다. 일부 IAM 정책은 여러 팀에서 공유될 예정입니다. 보안 엔지니어는 각 팀의 IAM 역할을 논리적으로 그룹화하는 솔루션을 구현해야 합니다. 이 솔루션은 플랫폼 팀만 AWS 서비스에 대한 IAM 권한을 위임할 수 있도록 해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["각 팀에 대한 IAM 역할을 포함하는 IAM 경로를 설정합니다. 플랫폼 팀의 IAM 경로를 제외한 모든 엔터티에 대해 iam:PassRole 권한을 거부하는 SCP를 배포합니다.", "각 팀에 대해 IAM 역할에 서로 다른 태그를 적용합니다. 플랫폼 팀의 역할을 제외한 모든 엔터티에 대해 sts:AssumeRole 권한을 거부하는 SCP를 배포합니다.", "각 팀에 대해 IAM 정책에 서로 다른 태그를 적용합니다. 플랫폼 팀의 정책을 제외한 모든 엔터티에 대해 iam:PassRole 권한을 거부하는 SCP를 배포합니다.", "각 팀에 대한 IAM 역할을 포함하는 IAM 경로를 설정합니다. IAM 권한 경계를 사용하여 제품 팀과 보안 팀의 IAM 역할에 대해 sts:AssumeRole 권한을 거부합니다."], "answer": "A", "multi": false, "explanation": "IAM 경로를 사용하면 팀별로 IAM 역할을 조직하고 논리적으로 그룹화할 수 있어 권한 관리가 더 쉬워집니다. 각 팀에 특정한 IAM 경로를 생성함으로써(예: /product-team/, /security-team/, /platform-team/) 플랫폼 팀의 경로 내 역할에만 권한을 제한하는 서비스 제어 정책(SCP)을 적용할 수 있습니다. 이 접근 방식은 플랫폼 팀이 AWS iam:PassRole 서비스에 IAM 권한을 위임할 수 있도록 하면서, 다른 팀은 이를 수행하지 못하게 하여 조직적 요구 사항과 위임 요구 사항을 모두 충족시킬 수 있습니다."},
  {"id": 145, "text": "보안 엔지니어는 VPC에서 실행되는 공개 웹 애플리케이션을 보호해야 합니다. 해당 VPC는 ​Amazon CloudFront 배포의 오리진 서버를 호스팅합니다. 이 애플리케이션은 여러 차례 레이어 7 DDoS 공격을 경험했습니다. AWS WAF 웹 ACL이 CloudFront 배포와 연결되어 있으며, 웹 ACL에는 평판이 좋지 않은 것으로 알려진 IP 주소를 차단하는 AWS 관리형 규칙이 하나 포함되어 있습니다. 보안 엔지니어는 수동 작업 없이 실시간으로 레이어 7 DDoS 공격을 탐지하고 완화하는 자동화 솔루션을 구성해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["CloudFront 배포에서 AWS Shield Advanced를 활성화합니다. Amazon CloudWatch에서 DDoS 표시기에 대한 알림을 구성합니다.", "AWS Shield Advanced를 활성화하고 AWS DDoS 대응팀과의 사전 예방적 협력을 구성합니다.", "VPC에 AWS 네트워크 방화벽을 배포합니다. DDoS 공격 징후를 감지하는 보안 정책을 생성합니다. 공격 발생 시 웹 ACL 규칙을 자동으로 업데이트하는 AWS Lambda 함수를 생성합니다.", "웹 ACL에 속도 기반 규칙을 추가합니다. AWS Shield Advanced를 활성화합니다. CloudFront 배포에서 애플리케이션 계층 DDoS 공격 완화를 자동으로 활성화합니다."], "answer": "D", "multi": false, "explanation": "필요한 솔루션은 CloudFront 배포를 위해 AWS WAF와 AWS Shield Advanced 자동 애플리케이션 계층 DDoS 완화를 함께 사용하는 것입니다. Shield Advanced는 계층 7 공격을 감지하면 실시간으로 사용자 지정 AWS WAF 완화를 자동으로 생성하고 관리할 수 있으며, 질문에서 요구하는 수동 작업 없이 자동 응답을 제공합니다. AWS 문서에서도 이 기능이 CloudFront의 웹 ACL과 함께 작동하며 AWS WAF의 Shield 관리 규칙 그룹 및 비율 기반 보호에 의존한다고 언급하고 있습니다."},
  {"id": 146, "text": "한 회사가 AWS Organizations의 조직을 사용하여 여러 AWS 계정을 관리합니다. 사용자는 IAM 사용자와 비밀 액세스 키를 사용하여 AWS 계정에 액세스합니다. 보안 팀은 모든 계정 액세스에 60분 후에 만료되는 임시 보안 자격 증명을 사용하도록 요구합니다. 사용자는 계정에 액세스하기 위해 SAML 기반 ID 공급자(IdP)를 사용해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS 보안 토큰 서비스(AWS STS)에 대한 액세스를 활성화합니다. 사용자가 적절한 시간 간격으로 get-session-token AWS CLI 명령을 실행하도록 합니다. 사용자가 AWS 계정에 액세스하려면 STS 임시 자격 증명을 사용하도록 요구합니다.", "AWS IAM Identity Center를 설정하고 외부 IdP를 구성합니다. 사용자가 필요로 하는 액세스 권한을 허용하는 권한 집합을 구성합니다. 세션 지속 시간 제한을 설정합니다. 사용자가 AWS CLI를 사용하여 SSO 자격 증명을 가져오도록 요구합니다. AWS 계정에서 IAM 사용자를 제거합니다.", "각 AWS 계정에 AWS Secrets Manager와 Amazon Cognito를 설정합니다. 외부 IdP를 사용하고 Secrets Manager에 연결하도록 Cognito ID 풀을 구성합니다. Secrets Manager에서 관리형 비밀 키 순환을 활성화합니다. 사용자가 AWS 계정에 액세스하기 위해 `get-secret- value` AWS CLI 명령을 실행하도록 합니다.", "조직 관리 계정에서 AWS IAM 역할 Anywhere를 활성화합니다. 사용자가 자격 증명 도우미 도구를 설치했는지 확인합니다. 관리 계정 내에서 적절한 세션 지속 시간으로 IAM 역할을 구성합니다. 사용자가 AWS 계정에 액세스하기 위해 자격 증명 도우미 도구에서 임시 자격 증명을 가져오도록 합니다."], "answer": "B", "multi": false, "explanation": "AWS IAM Identity Center는 AWS Organizations 계정 전반에서 액세스를 중앙에서 관리하고, 외부 SAML 아이덴티티 공급자와 통합되며, 콘솔 및 CLI 액세스를 위한 임시 자격 증명을 발급하기 때문에 올바른 솔루션입니다. 세션 기간은 권한 집합에서 구성할 수 있으며, 60분 제한을 포함할 수 있고, 사용자는 IAM Identity Center를 통해 로그인하여 AWS CLI를 통해 단기 자격 증명을 가져올 수 있습니다. 그런 다음 IAM 사용자를 제거하여 모든 계정 액세스가 임시 자격 증명만 사용하도록 할 수 있습니다."},
  {"id": 147, "text": "한 회사가 데이터 파일을 객체 형태로 아마존 S3 버킷에 업로드합니다. 공급업체는 데이터 처리를 위해 해당 객체를 다운로드합니다. 보안 엔지니어는 객체가 S3 버킷에 72시간 이상 상주하지 않도록 하는 솔루션을 구현해야 합니다.", "choices": ["S3 버전 관리를 구성하여 버킷에 72시간 동안 있는 객체 버전이 만료되도록 합니다.", "버킷에 S3 수명 주기 구성 규칙을 설정하여 객체가 72시간 후에 만료되도록 합니다.", "S3 인텔리전트 티어링 스토리지 클래스를 사용하고 만료 시간을 72시간으로 설정합니다.", "72시간 후에 만료되는 사전 서명된 URL을 생성합니다."], "answer": "B", "multi": false, "explanation": "Amazon S3 수명 주기 구성 규칙은 객체 보존 및 삭제를 관리하기 위한 기본 자동화 메커니즘입니다. According to AWS Certified Security - Specialty documentation, lifecycle rules can be configured to expire objects based on the number of days since object creation. 만료 시간에 도달하면 Amazon S3는 수동 개입 없이 객체를 영구적으로 삭제합니다. This solution directly enforces a maximum retention period of 72 hours and ensures compliance regardless of whether the vendor downloads the data or not. Lifecycle rules are evaluated continuously by Amazon S3 and do not require scripts, cron jobs, or additional services, making them the most operationally efficient and cost-effective solution. S3 버전 관리는 버전을 제어하지만 객체 삭제 일정을 적용하지는 않습니다. S3 지능형 계층화는 스토리지 비용을 최적화하지만 객체를 삭제하지는 않습니다. 미리 서명된 URL은 액세스 기간만 제어하고 저장소에서 개체를 제거하지 않습니다. AWS는 자동화된 데이터 보존 시행을 위한 수명 주기 정책을 명시적으로 권장합니다."},
  {"id": 148, "text": "한 회사가 AWS KMS(고객 관리형 키)를 사용하는 보안 솔루션을 구축하고 있습니다. 이 회사는 AWS Lambda에서 KMS 키를 사용할 수 있도록 허용하고자 하지만, Amazon EC2에서는 해당 키를 사용할 수 없도록 차단하려고 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["EC2 인스턴스 프로필에 대해서는 IAM 명시적 거부를 사용하고 Lambda 역할에 대해서는 허용을 사용하세요.", "kms:ViaService 조건을 사용하는 KMS 키 정책을 이용하여 Lambda 사용을 허용하고 EC2 사용을 거부합니다.", "KMS 키 정책에서 aws:SourceIp 및 aws:AuthorizedService 조건 키를 사용하십시오.", "SCP를 사용하여 EC2를 차단하고 Lambda를 허용합니다."], "answer": "B", "multi": false, "explanation": "AWS KMS 액세스 제어는 주로 키 정책(및 선택적으로 부여)을 통해 시행되며, AWS에서는 키 정책 조건 키를 사용하여 키 사용 방법을 제한할 것을 권장합니다. kms:ViaService 조건 키는 KMS API 사용을 특정 리전의 특정 AWS 서비스 엔드포인트를 통해 들어오는 요청으로 제한하도록 특별히 설계되었습니다. 이는 IAM 권한이 다른 곳에 존재하더라도 Amazon EC2(ec2.<region>.amazonaws.com)를 통해서가 아니라 AWS Lambda(예:lambda.<region>.amazonaws.com)를 통해서만 키를 사용할 수 있도록 하는 가장 강력한 방법입니다. Lambda 실행 역할을 kms:ViaService의 주체 및 조건으로 사용하는 키 정책을 작성함으로써 회사는 EC2 서비스 경로를 통한 사용을 방지하면서 Lambda에서 생성된 암호화 작업에 키 사용을 긴밀하게 바인딩할 수 있습니다. 옵션 A는 EC2가 IAM 주체가 KMS를 사용할 수 있는 유일한 방법이 아니며 명시적 거부 정책을 광범위하게 연결하는 데 의존하면 관리하기가 더 어렵고 주체를 놓칠 수 있기 때문에 더 약합니다. aws:AuthorizedService는 KMS 서비스 제한을 위한 일반적인 메커니즘이 아니며 SourceIp는 서비스 간 호출을 신뢰할 수 없기 때문에 옵션 C는 올바르지 않습니다. 옵션 D는 SCP가 KMS 사용에 대해 세분화된 서비스 경로 제한을 제공하지 않고 IAM 이상을 \"허용\"할 수 없기 때문에 이상적이지 않습니다. 주요 정책 제어가 계속 적용됩니다."},
  {"id": 149, "text": "한 회사가 VPC 내의 프라이빗 서브넷에 애플리케이션을 호스팅하기 위해 Amazon EC2 인스턴스를 사용하고 있습니다. 해당 애플리케이션은 AWS KMS를 사용해야 합니다. 보안 엔지니어가 이 요구 사항을 충족하는 가장 안전한 방법은 무엇일까요?", "choices": ["VPC에 인터넷 게이트웨이를 연결합니다. EC2 인스턴스를 퍼블릭 서브넷으로 이동합니다. 인터넷 게이트웨이를 사용하여 AWS KMS에 연결합니다.", "게이트웨이 VPC 엔드포인트를 생성합니다. 해당 엔드포인트를 사용하여 AWS KMS에 연결합니다.", "VPC에 NAT 게이트웨이를 연결합니다. EC2 인스턴스는 프라이빗 서브넷에 그대로 둡니다. NAT 게이트웨이를 사용하여 AWS KMS에 연결합니다.", "인터페이스 VPC 엔드포인트를 생성합니다. 해당 엔드포인트를 사용하여 AWS KMS에 연결합니다."], "answer": "D", "multi": false, "explanation": "AWS KMS는 AWS PrivateLink를 통해 지원되는 인터페이스 VPC 엔드포인트를 지원합니다. 인터페이스 엔드포인트는 VPC 내 리소스가 공용 IP 주소, 인터넷 게이트웨이, NAT 게이트웨이, VPN 또는 Direct Connect 없이 AWS KMS에 프라이빗 IP 연결을 제공하도록 합니다. 이것은 EC2 인스턴스가 프라이빗 서브넷에 남아 있고 KMS API 트래픽이 AWS 프라이빗 네트워크 경로에 머무르기 때문에 가장 안전한 설계입니다. AWS KMS에는 게이트웨이 엔드포인트가 제공되지 않으며, 게이트웨이 엔드포인트는 Amazon S3 및 DynamoDB와 같은 서비스에 사용됩니다. 인스턴스를 퍼블릭 서브넷으로 이동하거나 NAT 게이트웨이를 통해 라우팅하는 것은 불필요한 인터넷 출구 아키텍처를 도입하기 때문에 덜 안전합니다."},
  {"id": 150, "text": "보안 엔지니어가 Amazon Elastic Container Service(Amazon ECS)에서 실행되는 Docker 컨테이너와 클라이언트 간에 종단 간 암호화를 제공하는 솔루션을 설계하고 있습니다. 이 솔루션은 변동성이 큰 트래픽 패턴도 처리해야 합니다. 어떤 솔루션이 확장성이 가장 뛰어나고 지연 시간이 가장 짧을까요?", "choices": ["TLS 트래픽을 종료한 다음 컨테이너로 전송되는 트래픽을 다시 암호화하도록 네트워크 로드 밸런서를 구성합니다.", "TLS 트래픽을 종료한 다음 컨테이너로 전송되는 트래픽을 다시 암호화하도록 애플리케이션 로드 밸런서를 구성합니다.", "TCP 리스너가 있는 네트워크 로드 밸런서를 구성하여 TLS 트래픽을 컨테이너로 전달합니다.", "컨테이너로 트래픽을 전송하기 위해 다중값 응답 라우팅을 사용하도록 Amazon Route 53을 구성합니다."], "answer": "C", "multi": false, "explanation": "Network Load Balancer는 레이어 4에서 작동하며 최고의 성능, 매우 짧은 지연 시간, 갑작스러운 트래픽 급증 처리에 최적화되어 있습니다. AWS 공인 보안 전문 문서에 따르면 NLB에서 TCP 리스너를 사용하면 TLS 트래픽이 종료 없이 백엔드 컨테이너로 직접 전달되어 진정한 엔드투엔드 암호화가 유지됩니다. 이 접근 방식은 로드 밸런서에서 트래픽을 해독하고 다시 암호화하는 오버헤드를 제거하여 대기 시간을 줄이고 처리량을 최대화합니다. NLB는 자동으로 확장되어 불안정한 트래픽 패턴과 초당 수백만 건의 요청을 처리합니다. Application Load Balancer는 계층 7에서 작동하며 TLS 종료 및 HTTP 처리로 인해 추가 지연 시간이 발생합니다. Route 53 다중값 라우팅은 전송 계층에서 로드 밸런싱을 제공하지 않으며 암호화 처리를 보장하지 않습니다. AWS는 고성능의 종단 간 암호화된 컨테이너 워크로드를 위해 NLB TCP 패스스루를 권장합니다."},
  {"id": 151, "text": "AWS Lambda 함수가 악용되어 데이터가 변조되었으며, 보안 엔지니어는 누가 해당 함수를 호출했는지, 그리고 어떤 결과가 생성되었는지 파악해야 합니다. 하지만 엔지니어는 Amazon CloudWatch Logs에서 해당 Lambda 함수가 생성한 로그를 찾을 수 없습니다. 다음 중 로그를 사용할 수 없는 이유를 설명하는 것은 무엇입니까?", "choices": ["Lambda 함수의 실행 역할에 CloudWatch Logs에 로그 데이터를 기록할 수 있는 권한이 부여되지 않았습니다.", "Lambda 함수는 Amazon API Gateway를 사용하여 호출되었으므로 로그가 CloudWatch Logs에 저장되지 않습니다.", "Lambda 함수의 실행 역할에 CloudWatch Logs가 로그를 저장하는 Amazon S3 버킷에 쓰기 권한이 부여되지 않았습니다.", "호출된 Lambda 함수의 버전이 최신 버전이 아닙니다."], "answer": "A", "multi": false, "explanation": "AWS Lambda automatically sends function execution logs to Amazon CloudWatch Logs when logging is enabled in the function code. However, this logging capability depends on the Lambda execution role having the appropriate permissions. AWS 공인 보안 - 전문 연구 가이드에 따르면 실행 역할에는 로그:CreateLogGroup, 로그:CreateLogStream 및 로그:PutLogEvents와 같은 권한이 포함되어야 합니다. 이러한 권한이 없으면 Lambda는 로그 그룹이나 스트림을 생성할 수 없으며 함수가 성공적으로 호출되었더라도 CloudWatch Logs에 실행 로그가 표시되지 않습니다. This is the most common reason Lambda logs are unavailable during forensic investigations. 호출 소스가 API Gateway, EventBridge 또는 다른 AWS 서비스인지 여부에 관계없이 Lambda 로그가 CloudWatch Logs에 저장되므로 옵션 B는 올바르지 않습니다. Option C is incorrect because CloudWatch Logs does not require direct S3 permissions from the Lambda execution role. Option D is irrelevant because Lambda versions do not affect logging behavior. AWS documentation emphasizes verifying execution role permissions as a first step when Lambda logs are missing."},
  {"id": 152, "text": "한 회사의 보안 엔지니어가 회사 소유의 Amazon Simple Queue Service(Amazon SQS) 큐에 예기치 않은 사용자가 접근했다는 경고를 받았습니다. 회사의 모든 계정은 AWS Organizations 내의 조직에 속해 있습니다. 보안 엔지니어는 규정 위반을 최소화하고 AWS 외부 도구에 대한 투자를 줄이는 완화 솔루션을 구현해야 합니다. 보안 엔지니어는 이러한 요구 사항을 충족하기 위해 무엇을 해야 할까요?", "choices": ["조직 내 모든 VPC의 CIDR 블록에서만 인바운드 트래픽을 허용하는 보안 그룹을 생성합니다. 조직 내 모든 VPC의 모든 SQS 큐에 해당 보안 그룹을 연결합니다.", "조직 내 모든 VPC에서 네트워크 ACL을 조정하여 조직 내 모든 VPC의 CIDR 블록에서 들어오는 트래픽만 허용하도록 합니다. 조직 내 모든 VPC의 모든 서브넷에 네트워크 ACL을 연결합니다.", "조직 내 모든 VPC에 Amazon SQS용 인터페이스 VPC 엔드포인트를 생성합니다. aws를 설정합니다. SQS 정책의 VPC 엔드포인트 식별자에 SourceVpce 조건을 추가합니다. VPC 엔드포인트 정책에 aws:PrincipalOrgId 조건을 추가합니다.", "클라우드 액세스 보안 브로커(CASB)를 사용하여 관리 리소스 목록을 유지 관리합니다. 웹 프록시에서 해당 목록을 기준으로 API 및 콘솔 액세스를 확인하도록 CASB를 구성합니다."], "answer": "C", "multi": false, "explanation": "Amazon SQS는 AWS에서 관리하는 서비스이며 고객 VPC 내에서 작동하지 않습니다. 따라서 보안 그룹과 네트워크 ACL을 사용하여 SQS에 대한 액세스를 제어할 수 없으므로 옵션 A와 B가 유효하지 않게 됩니다. AWS 공인 보안 – 전문 문서에 따르면 VPC 내에서 AWS 서비스에 안전하게 액세스하기 위해 권장되는 접근 방식은 인터페이스 VPC 엔드포인트(AWS PrivateLink)를 통하는 것입니다. Amazon SQS용 인터페이스 VPC 엔드포인트를 생성함으로써 회사는 SQS에 대한 트래픽이 AWS 네트워크 내에 유지되고 공용 인터넷을 통과하지 않도록 보장합니다. aws:SourceVpce 조건을 사용하여 SQS 리소스 정책을 추가하면 지정된 VPC 엔드포인트에서 발생하는 요청만 허용되도록 액세스가 제한됩니다. 또한 aws:PrincipalOrgId 조건을 사용하면 동일한 AWS 조직에 속한 보안 주체만 대기열에 액세스할 수 있습니다. 옵션 D는 외부 도구를 도입하여 비용과 규정 준수의 복잡성을 증가시키며, 이는 AWS 외부 투자를 최소화해야 하는 요구 사항을 직접적으로 위반합니다. AWS 설명서에서는 다중 계정 환경에서 서비스 액세스를 보호하기 위한 모범 사례로서 IAM 조건 키와 결합된 VPC 엔드포인트를 명확하게 식별합니다."},
  {"id": 153, "text": "보안 엔지니어가 AWS Well-Architected Tool을 사용하여 회사가 AWS에서 호스팅하는 다계층 웹 애플리케이션을 평가하고 있습니다. 평가 과정에서 보안 엔지니어는 Well-Architected Framework 보안 기둥의 설계 원칙을 위반하는 여러 리소스를 발견했습니다.", "choices": ["서비스 및 애플리케이션 로깅 구성", "수동 관리 및 대화형 접근을 줄입니다.", "소프트웨어를 프로그래밍 방식으로 배포합니다.", "네트워크 계층 내에서 트래픽 흐름을 제어합니다.", "전송 중인 데이터 보호."], "answer": "A,B,C,D,E", "multi": true, "explanation": "프로그래밍 방식 배포 → 소프트웨어를 프로그래밍 방식으로 배포. 대화형 접근 축소 → 수동 관리 및 대화형 접근을 줄입니다. 트래픽 흐름 제어 → 네트워크 계층 내에서 트래픽 흐름을 제어. 전송 중 데이터 보호 → 전송 중인 데이터 보호. 로깅 구성 → 서비스 및 애플리케이션 로깅 구성."},
  {"id": 154, "text": "한 기업은 아마존 오로라 MySQL 데이터베이스에 대해 암호화, 삭제 방지, 공개 액세스 및 감사 로깅과 관련된 보안 요구 사항을 가지고 있습니다. 또한 지속적인 모니터링과 실시간 규정 준수 현황 파악이 필요합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["사용자 지정 프레임워크와 함께 AWS Audit Manager를 사용합니다.", "AWS Config를 활성화하고 관리형 규칙을 사용하여 Aurora MySQL의 규정 준수를 모니터링합니다.", "AWS Security Hub 구성 정책을 사용합니다.", "사용자 지정 메트릭을 사용하여 EventBridge 및 Lambda를 사용합니다."], "answer": "B", "multi": false, "explanation": "AWS Config는 정의된 규칙에 따라 리소스 구성을 지속적으로 평가하도록 설계된 AWS 서비스입니다. AWS 공인 보안 - 전문 연구 가이드에 따르면 AWS Config 관리형 규칙은 Amazon RDS 및 Aurora에 대한 데이터베이스 암호화, 공개 접근성, 삭제 방지 및 로그 내보내기를 확인하기 위해 특별히 존재합니다. AWS Config는 실시간 규정 준수 타임라인을 제공하고 언제든지 각 규칙에 대한 각 리소스의 규정 준수 상태를 표시합니다. 보안 정책에 대한 지속적인 규정 준수를 평가하려면 이러한 세분화된 가시성이 필요합니다. Audit Manager는 보고서를 생성하지만 지속적인 규정 준수 모니터링을 제공하지 않습니다. Security Hub는 결과를 집계하지만 구성 드리프트를 추적하지 않습니다. EventBridge와 Lambda는 불필요한 복잡성을 초래합니다."},
  {"id": 155, "text": "한 회사의 보안 엔지니어가 회사 소유의 Amazon Simple Queue Service(Amazon SQS) 큐에 예기치 않은 사용자가 접근했다는 경고를 받았습니다. 회사의 모든 계정은 AWS Organizations 내의 조직에 속해 있습니다. 보안 엔지니어는 규정 위반을 최소화하고 AWS 외부 도구에 대한 투자를 줄이는 완화 솔루션을 구현해야 합니다. 보안 엔지니어는 이러한 요구 사항을 충족하기 위해 무엇을 해야 할까요?", "choices": ["보안 그룹을 생성하고 모든 SQS 큐에 연결합니다.", "모든 VPC의 네트워크 ACL을 수정하여 인바운드 트래픽을 제한합니다.", "Amazon SQS용 VPC 엔드포인트 인터페이스를 생성합니다. aws:SourceVpce 및 aws:를 사용하여 액세스를 제한합니다. PrincipalOrgId 조건.", "타사 클라우드 액세스 보안 브로커(CASB)를 사용합니다."], "answer": "C", "multi": false, "explanation": "Amazon SQS는 인터페이스 VPC 엔드포인트를 통해 AWS PrivateLink를 지원하는 지역 서비스입니다. AWS 공인 보안 – 전문 문서에 따르면 AWS 서비스에 대한 액세스를 제한하는 가장 안전하고 규정을 준수하는 방법은 리소스 기반 정책과 결합된 VPC 엔드포인트를 사용하는 것입니다. 모든 VPC에서 Amazon SQS에 대한 인터페이스 VPC 엔드포인트를 생성하면 SQS에 대한 트래픽이 AWS 네트워크에 유지되고 퍼블릭 인터넷을 통과하지 않습니다. SQS 대기열 정책에서 aws:SourceVpce 조건을 사용하면 승인된 VPC 엔드포인트에서 발생한 요청만 대기열에 액세스할 수 있습니다. aws:PrincipalOrgId 조건을 추가하면 동일한 AWS 조직에 속한 보안 주체에 대한 액세스가 더욱 제한됩니다. SQS는 VPC 내부에 배포되지 않으므로 보안 그룹 및 네트워크 ACL은 SQS에 적용되지 않습니다. 타사 CASB 도구는 비용과 운영 오버헤드를 추가합니다."},
  {"id": 156, "text": "한 회사의 보안 엔지니어가 사고 대응 계획의 일환으로 Amazon EC2 인스턴스에 대한 격리 절차를 설계하고 있습니다. 보안 엔지니어는 회사 포렌식 팀의 트래픽을 제외한 모든 트래픽을 차단하기 위해 특정 인스턴스를 격리해야 합니다. 회사의 각 EC2 인스턴스는 고유한 보안 그룹에 속해 있습니다. EC2 인스턴스는 VPC의 서브넷에 배포되며, 하나의 서브넷에는 여러 인스턴스가 포함될 수 있습니다. 보안 엔지니어는 EC2 격리 ​절차를 테스트하기 위해 대상 인스턴스에 SSH 세션을 엽니다. 이 절차는 공격자가 대상 인스턴스에 접근하는 상황을 시뮬레이션합니다. 보안 엔지니어는 기존 보안 그룹 규칙을 제거하고 포렌식 팀이 대상 인스턴스의 22번 포트에 접근할 수 있도록 보안 그룹 규칙을 추가합니다. 이러한 변경 후에도 보안 엔지니어는 SSH 연결이 여전히 활성화되어 있고 사용 가능한 상태임을 확인합니다. 보안 엔지니어가 대상 인스턴스의 공용 IP 주소로 ping 명령을 실행하면 ping 명령이 차단됩니다. 보안 엔지니어는 대상 인스턴스를 격리하기 위해 무엇을 해야 할까요?", "choices": ["보안 그룹에 0.0.0.0/0에서 들어오는 트래픽을 모든 포트에 대해 허용하는 인바운드 규칙을 추가합니다. 보안 그룹에 0.0.0.0/0으로 나가는 트래픽을 모든 포트에 대해 허용하는 아웃바운드 규칙을 추가합니다. 그런 다음 이 규칙들을 즉시 삭제합니다.", "포트 22 보안 그룹 규칙을 제거합니다. 포렌식 팀이 대상 인스턴스에 액세스할 수 있도록 AWS Systems Manager Session Manager 연결을 허용하는 인스턴스 역할 정책을 연결합니다.", "대상 인스턴스의 서브넷과 연결된 네트워크 ACL을 생성합니다. 인바운드 규칙 세트의 맨 위에 0.0.0.0/0에서 들어오는 모든 트래픽을 차단하는 규칙을 추가합니다. 아웃바운드 규칙 세트의 맨 위에 0.0.0.0/0으로 나가는 모든 트래픽을 차단하는 규칙을 추가합니다.", "모든 인바운드 및 아웃바운드 트래픽을 차단하는 호스트 수준 방화벽 규칙을 추가하는 AWS Systems Manager 문서를 생성합니다. 대상 인스턴스에서 해당 문서를 실행합니다."], "answer": "C", "multi": false, "explanation": "Amazon EC2 보안 그룹은 상태 저장됩니다. 즉, 원래 연결을 허용한 인바운드 규칙이 나중에 제거되더라도 일단 연결이 설정되면 반환 트래픽이 자동으로 허용됩니다. AWS 공인 보안 - 전문 분야 공식 학습 가이드 및 Amazon EC2 보안 문서에 따르면 보안 그룹 규칙이 변경되어도 기존 연결은 종료되지 않습니다. 이는 보안 그룹 규칙이 수정된 후에도 SSH 세션이 활성 상태로 유지되는 반면 ICMP ping과 같은 새로운 트래픽은 차단되는 이유를 설명합니다. 사고 대응 시나리오 중에 EC2 인스턴스를 즉시 완전하게 격리하려면 상태 비저장 네트워크 제어를 사용하는 것이 좋습니다. Amazon VPC 네트워크 ACL(NACL)은 상태 비저장입니다. 즉, 트래픽이 기존 연결의 일부인지 여부에 관계없이 모든 패킷이 ACL 규칙에 따라 평가됩니다. 거부 규칙이 추가되면 활성 세션을 포함한 모든 트래픽이 즉시 차단됩니다. 네트워크 ACL을 생성하고 이를 대상 인스턴스가 포함된 서브넷과 연결하고 인바운드 및 아웃바운드 트래픽 모두에 대해 가장 낮은 규칙 번호로 명시적 거부 규칙을 추가함으로써 보안 엔지니어는 인스턴스와의 모든 네트워크 통신이 즉시 중단되도록 보장합니다. 이 접근 방식은 포렌식 분석을 위해 런타임 상태와 메모리를 유지하면서 인스턴스를 격리해야 한다는 요구 사항을 충족합니다. 보안 그룹 수정은 기존 세션을 종료하지 않고, Systems Manager는 네트워크 격리를 강제하지 않으며, 호스트 수준 방화벽 변경은 인스턴스 수준 접근이 필요하고 즉각적이며 네트워크로 강제되는 격리를 제공하지 않기 때문에 다른 옵션은 요구 사항을 충족하지 못합니다."},
  {"id": 157, "text": "기업은 AWS CloudFormation 템플릿을 사용하여 리소스를 배포할 때 보안 모범 사례를 준수해야 합니다. CloudFormation 템플릿은 민감한 데이터베이스 자격 증명을 구성할 수 있어야 합니다. 해당 기업은 이미 AWS Key Management Service(AWS KMS)와 AWS Secrets Manager를 사용하고 있습니다. 어떤 솔루션이 요구 사항을 충족할까요?", "choices": ["CloudFormation 템플릿에서 동적 참조를 사용하여 Secrets Manager의 데이터베이스 자격 증명을 참조하십시오.", "CloudFormation 템플릿에서 매개변수를 사용하여 데이터베이스 자격 증명을 참조합니다. AWS KMS를 사용하여 CloudFormation 템플릿을 암호화합니다.", "CloudFormation 템플릿에서 SecureString 매개변수를 사용하여 Secrets Manager의 데이터베이스 자격 증명을 참조합니다.", "CloudFormation 템플릿에서 SecureString 매개변수를 사용하여 AWS KMS에 있는 암호화된 값을 참조합니다."], "answer": "A", "multi": false, "explanation": "AWS CloudFormation 동적 참조는 스택 생성 또는 업데이트 시 AWS Secrets Manager에서 민감한 값을 안전하게 가져올 수 있는 메커니즘을 제공합니다. AWS 인증 보안 전문가(Specialty) 문서에 따르면, 동적 참조를 사용하면 데이터베이스 자격 증명과 같은 민감한 데이터가 CloudFormation 템플릿, 매개 변수, 스택 메타데이터 또는 로그에 평문으로 저장되지 않도록 보장합니다. Secrets Manager에 대한 동적 참조가 사용되면, CloudFormation은 런타임에 비밀 값을 가져와 이를 필요로 하는 리소스에 안전하게 전달합니다. 비밀 값은 템플릿, 스택 또는 변경 세트를 보는 사용자에게 노출되지 않습니다."},
  {"id": 158, "text": "한 회사가 특정 서브도메인에 대해 DNS 보안 확장(DNSSEC)을 구현해야 합니다. 해당 서브도메인은 이미 Amazon Route 53에 등록되어 있습니다. 보안 엔지니어가 DNSSEC 서명을 활성화하고 키 서명 키(KSK)를 생성했습니다. 보안 엔지니어가 구성을 테스트하려고 하면 신뢰 체인이 손상되었다는 오류가 발생합니다. 보안 엔지니어는 이 오류를 해결하기 위해 무엇을 해야 할까요?", "choices": ["KSK를 영역 서명 키(ZSK)로 교체합니다.", "KSK를 비활성화한 다음 활성화하십시오.", "상위 호스팅 영역에 위임 서명자(DS) 레코드를 생성합니다.", "서브도메인에 위임 서명자(DS) 레코드를 생성합니다."], "answer": "C", "multi": false, "explanation": "DNSSEC 검증은 상위 존(parent zone)에서 서명된 하위 존(signed child zone)으로 이어지는 신뢰 체인(chain of trust)에 의존합니다. DNSSEC 서명을 활성화하고 하위 도메인용 KSK를 생성한 후, 상위 존에는 하위 존의 DNSSEC 키 자료를 가리키는 위임 서명자(DS) 레코드가 포함되어 있어야 합니다. 상위 존에 DS 레코드가 없으면 검증하는 리졸버는 신뢰 체인을 구축할 수 없으므로 구성(configuration)이 깨진 것처럼 보입니다. 이 신뢰 연결 목적을 위해 DS 레코드는 하위 도메인 존 자체에 속하지 않습니다. KSK를 ZSK로 교체하는 것은 개념상 잘못된 것으로, KSK는 DS 레코드 체인과 연관된 키이기 때문입니다. KSK를 재활성화한다고 해서 상위 존의 누락된 위임 서명자 레코드 문제는 해결되지 않습니다."},
  {"id": 159, "text": "한 회사가 AWS Organizations에서 회사 조직 외부의 IAM ID와 Amazon S3 객체가 공유되는 것을 방지해야 합니다. 보안 엔지니어가 이 목표를 달성하기 위해 SCP(보안 솔루션)를 생성 및 배포하고 있습니다. 이 회사는 모든 S3 버킷에 대해 S3 공개 액세스 차단 기능을 활성화했습니다. 이러한 요구 사항을 충족하기 위해 SCP는 어떤 작업을 수행해야 할까요?", "choices": ["StringNotEquals 연산자, aws:ResourceOrgID 키, S{aws PrincipalOrgID} 값으로 구성된 조건 요소를 사용하여 S3:* 작업을 거부합니다.", "StringLike 연산자, aws:PrincipalArn 키, 외부 IAM 주체 값으로 구성된 조건 요소를 사용하여 S3:PutAccountPublicAccessBlock 작업을 거부합니다.", "StringNotEquals 연산자, aws:PrincipalOrgID 키, S {aws:PrincipalOrgID} 값으로 구성된 조건 요소를 사용하여 S3:* 작업을 허용합니다.", "StringLike 연산자, aws:PrincipalArn 키, 그리고 외부 IAM 보안 주체 값으로 구성된 조건 요소를 사용하여 S3:* 작업을 거부합니다."], "answer": "A", "multi": false, "explanation": "Amazon S3 객체에 대한 액세스를 회사의 AWS 조직 내 IAM 사용자만 접근할 수 있도록 제한하려면, SCP는 리소스의 조직 ID(aws:ResourceOrgID)가 주체의 조직 ID(aws:PrincipalOrgID)와 일치하지 않는 모든 S3:* 액션에 대한 액세스를 거부해야 합니다. StringNotEquals를 사용하면 조직 내 IAM 사용자만 S3 객체에 접근할 수 있습니다. 리소스와 주체의 조직 ID가 다르면 액세스가 거부됩니다."},
  {"id": 160, "text": "한 회사의 보안 엔지니어가 AWS 클라우드의 웹 애플리케이션에서 발생하는 의심스러운 트래픽을 조사하고 있습니다. 웹 애플리케이션은 Amazon CloudFront 배포 뒤에 있는 애플리케이션 로드 밸런서(ALB)로 보호됩니다. 해당 ALB에는 AWS WAF 웹 접근 제어 목록(ACL)이 연결되어 있습니다. 회사는 AWS WAF 로그를 Amazon S3 버킷에 저장합니다. 엔지니어는 AWS WAF 로그에서 수신되는 모든 요청이 CloudFront 엣지 로케이션에 해당하는 소수의 IP 주소에서 시작되는 것을 발견했습니다. 보안 엔지니어는 의심스러운 요청을 시작하는 클라이언트의 소스 IP 주소를 식별해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["ALB가 배포된 VPC에서 VPC 흐름 로그를 활성화합니다. 소스 필드를 검사하여 클라이언트 IP 주소를 확인합니다.", "AWS WAF 로그에서 X-Forwarded-For 헤더를 검사하여 원래 클라이언트 IP 주소를 확인합니다.", "CloudFront 배포를 수정하여 ALB 연결 재사용을 비활성화합니다. AWS WAF 로그의 clientIp 필드를 검사하여 원래 클라이언트 IP 주소를 확인합니다.", "ALB로 전송되는 오리진 요청에 Client-IP라는 사용자 지정 헤더를 추가하도록 CloudFront를 구성합니다."], "answer": "B", "multi": false, "explanation": "Amazon CloudFront가 Application Load Balancer(ALB) 앞에서 사용될 때, CloudFront는 ALB로 들어오는 요청의 즉각적인 출처가 됩니다. 그 결과, AWS WAF 로그에는 원래의 뷰어 IP 주소가 아닌 CloudFront 엣지 위치 IP 주소가 클라이언트 IP로 기록됩니다. 이러한 동작은 AWS Certified Security - Specialty 학습 가이드와 AWS WAF와 CloudFront 통합 문서에 명확히 문서화되어 있습니다. 원래 클라이언트 IP 주소를 보존하기 위해 CloudFront는 X-Forwarded-For HTTP 헤더를 자동으로 추가하며, 이 헤더에는 요청 전달에 참여한 모든 프록시 주소 뒤에 원래 클라이언트의 IP 주소가 포함됩니다. AWS WAF 로그에는 이 헤더가 포함되므로, CloudFront 사용 시 실제 클라이언트 IP 주소를 식별하는 권위 있는 소스로 사용됩니다."},
  {"id": 161, "text": "보안 엔지니어가 VPC에서 민감한 워크로드를 실행하는 Amazon EC2 인스턴스 클러스터에 대한 보안 제어를 설계하고 있습니다. 이 엔지니어는 EC2 인스턴스에서 소프트웨어 취약점을 탐지하고 완화하는 솔루션을 구현해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["Amazon Inspector를 사용하여 EC2 인스턴스를 검사합니다. AWS Systems Manager Patch Manager를 사용하여 보안 패치 및 업데이트를 적용합니다.", "각 EC2 인스턴스에 호스트 기반 방화벽 및 바이러스 백신 소프트웨어를 설치합니다. AWS Systems Manager 실행 명령을 사용하여 방화벽 및 바이러스 백신 소프트웨어를 업데이트합니다.", "EC2 인스턴스에 Amazon CloudWatch 에이전트를 설치합니다. 자세한 로깅을 활성화합니다. Amazon EventBridge를 사용하여 소프트웨어 로그를 검토하여 이상 징후를 확인합니다.", "Amazon GuardDuty 맬웨어 방지 기능을 사용하여 EC2 인스턴스를 검사합니다. AWS Systems Manager 패치 관리자를 사용하여 보안 패치 및 업데이트를 적용합니다."], "answer": "A", "multi": false, "explanation": "Amazon Inspector는 Amazon EC2 인스턴스의 취약점과 의도치 않은 네트워크 노출을 탐지하는 데 도움을 주는 보안 서비스입니다. 이 서비스는 인스턴스를 대상으로 알려진 소프트웨어 취약점을 자동으로 스캔하고 이를 완화하기 위한 권장 사항을 제공합니다. AWS Systems Manager Patch Manager는 보안 패치와 업데이트를 적용하여 EC2 인스턴스의 보안을 유지하는 과정을 자동화함으로써 Amazon Inspector를 보완합니다. 이 조합은 취약점 탐지와 패치 관리를 위한 종합적인 솔루션을 제공하며, 이는 보안 엔지니어의 요구 사항과 일치합니다."},
  {"id": 162, "text": "한 회사가 애플리케이션을 실행하는 대규모 Amazon Linux 2 Amazon EC2 인스턴스를 보유하고 있습니다. 해당 애플리케이션은 민감한 데이터를 처리하며 다음과 같은 규정 준수 요건을 충족해야 합니다. - EC2 인스턴스에 대한 원격 액세스 관리 포트는 내부 또는 외부로 노출될 수 없습니다. - 모든 원격 세션 활동은 감사 로그에 기록되어야 합니다. - EC2 인스턴스에 대한 모든 원격 액세스는 인증을 거쳐야 합니다. AWS IAM Identity Center에서 인증되었습니다. - 회사 DevOps 팀은 문제 해결을 위해 가끔 EC2 인스턴스 중 하나에 연결해야 합니다. 어떤 솔루션이 규정 준수 요건을 충족하면서 EC2 인스턴스에 원격으로 액세스할 수 있도록 해줄까요?", "choices": ["계정 수준에서 EC2 시리얼 콘솔에 대한 액세스 권한을 부여합니다. DevOps 팀의 IAM 역할이 EC2 시리얼 콘솔에 액세스할 수 있도록 허용하는 IAM 정책을 생성합니다.", "EC2 인스턴스의 AMI에서 EC2 인스턴스 연결을 활성화합니다. 적절한 보안 그룹 규칙을 구성합니다. DevOps 팀이 EC2 인스턴스 연결에 액세스할 수 있도록 EC2 콘솔 액세스 권한을 부여합니다.", "AWS Systems Manager에 대한 액세스 권한을 부여하는 EC2 인스턴스 역할을 할당합니다. Systems Manager 세션 관리자에 대한 액세스 권한을 부여하는 IAM 정책을 생성합니다. 해당 정책을 DevOps 팀의 IAM 역할에 할당합니다.", "AWS Systems Manager Automation 런북을 사용하여 EC2 인스턴스에 대한 원격 액세스 포트를 엽니다. 런북 실행을 허용하려면 EC2 인스턴스에 역할을 연결합니다."], "answer": "C", "multi": false, "explanation": "원격 액세스 관리 포트 노출 없음: Systems Manager Session Manager는 EC2 인스턴스에서 어떠한 인바운드 포트도 열 필요가 없으므로, 내부 또는 외부에 원격 관리 포트가 노출되지 않아야 한다는 정책을 준수합니다. 원격 세션 활동이 감사 로그에 기록됨: Session Manager는 모든 세션 활동을 AWS CloudTrail 및 Amazon CloudWatch Logs에 자동으로 기록합니다. 이는 원격 세션 활동의 감사 로그 요구 사항을 충족합니다. AWS IAM Identity Center를 통한 인증 및 권한 부여: Session Manager를 사용하면 EC2 인스턴스에 대한 접근이 IAM 정책을 통해 관리되며, AWS IAM Identity Center(이전 AWS Single Sign-On)를 사용하여 접근이 인증되고 권한이 부여되도록 보장합니다."},
  {"id": 163, "text": "한 회사가 특정 보안 사고에 대한 복구 프로세스를 개선하고자 합니다. 현재는 보안 엔지니어가 Amazon EC2 인스턴스에서 알려진 명령 및 제어 서버로의 트래픽이 감지될 경우 수동으로 네트워크 격리를 수행하고 있습니다. 하지만 이러한 수동 네트워크 격리 프로세스는 오류 발생 가능성이 높습니다. 보안 엔지니어는 해당 프로세스를 자동화해야 합니다. 보안 엔지니어는 Amazon GuardDuty를 활성화합니다. 보안 엔지니어는 AWS Systems Manager에서 관리되도록 인스턴스를 구성합니다. 보안 엔지니어는 선택한 인스턴스의 보안 그룹을 변경하기 위한 Systems Manager 자동화 문서를 준비합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon Detective에서 영구 조사를 생성합니다. 모니터링할 모든 리소스를 선택합니다. 알려진 명령 및 제어 트래픽이 감지되면 Detective가 Systems Manager 문서를 호출하도록 구성합니다.", "AWS Config를 설정합니다. 관리형 규칙 ec2-prefix-list-tagged를 사용하여 명령 및 제어 활동에 대해 태그된 네트워크 접두사로 향하는 트래픽을 감지합니다. 자동 복구를 구성하고 자동화 문서를 선택합니다.", "Systems Manager OpsCenter를 활성화합니다. GuardDuty에서 OpsCenter로 전송되는 명령 및 제어 트래픽 경고를 변환하는 Amazon EventBridge 규칙을 생성합니다. 문제 해결을 위해 자동화 문서를 참조하십시오.", "AWS Security Hub CSPM을 구성합니다. NIST SP 800-53 스캔을 사용하여 NIST 경고를 기반으로 손상된 인스턴스를 보고합니다. 자동화 문서를 호출하는 자동화 규칙을 생성합니다."], "answer": "C", "multi": false, "explanation": "GuardDuty는 결과를 EventBridge로 게시하며, 이를 통해 자동화된 사고 대응 워크플로를 트리거할 수 있습니다. Systems Manager OpsCenter는 운영 항목을 중앙 관리하며 EventBridge와 통합되어 GuardDuty 결과를 OpsItem으로 변환하고 Systems Manager Automation 실행 문서와 연결해 수정 조치를 수행할 수 있습니다. 회사가 이미 Systems Manager 관리 인스턴스와 보안 그룹을 변경하는 Automation 문서를 가지고 있으므로, GuardDuty의 명령 및 제어(C2) 결과를 EventBridge를 통해 OpsCenter로 라우팅하는 것이 가장 깔끔한 자동 수정 경로입니다. Amazon Detective는 조사 기능을 지원하지만 수정 실행은 지원하지 않습니다. AWS Config는 구성 준수를 평가하며, 라이브 네트워크 동작을 알려진 C2 대상과 비교하지는 않습니다. Security Hub CSPM은 보안 결과를 집계하고 표준화하지만, NIST 제어 스캔은 GuardDuty C2 트래픽을 직접 감지하거나 준비된 격리 문서를 자동으로 실행하지는 않습니다."},
  {"id": 164, "text": "한 회사가 AWS Lambda 함수를 사용하는 새로운 서버리스 애플리케이션을 개발하고 있습니다. 이 회사는 AWS CloudFormation을 사용하여 Lambda 함수를 배포합니다. 회사 개발자들이 배포된 Lambda 함수를 디버깅하려고 하는데, 해당 함수가 Amazon CloudWatch Logs에 출력을 기록하지 않아 디버깅이 불가능합니다. 보안 엔지니어는 이 문제를 해결하기 위해 어떤 조치들을 조합하여 취해야 할까요? (두 가지를 선택하세요.)", "choices": ["CloudFormation 템플릿에 정의되어 Lambda 함수에 전달되는 역할을 확인하십시오. 서비스 주체 lambda amazonaws.com에 의해 sts:AssumeRole 작업이 허용되는 신뢰 정책이 역할에 있는지 확인하십시오.", "Lambda 함수에 대한 CloudFormation 템플릿에 구성된 실행 역할을 확인하십시오. 실행 역할에 CloudWatch Logs에 기록할 수 있는 필요한 권한이 있는지 확인하십시오.", "CloudFormation 템플릿에서 Lambda 함수 구성을 확인하세요. Lambda 함수에 AWS X- Ray 추적 구성이 활성 모드 또는 통과 모드로 설정되어 있는지 확인하세요.", "Lambda 함수에 대해 CloudFormation 템플릿에 구성된 리소스 정책을 확인하십시오. 리소스 정책에 CloudWatch Logs에 기록할 수 있는 필요한 권한이 있는지 확인하십시오.", "개발자가 Lambda 함수를 디버깅하는 데 사용하는 역할을 확인하세요. 해당 역할에 서비스 주체 lambda.amazonaws.com에 대한 sts:AssumeRole 작업을 허용하는 신뢰 정책이 있는지 확인하세요."], "answer": "A,B", "multi": true, "explanation": "Lambda 함수가 실행되기 위해서는 할당된 실행 역할이 AWS Lambda(lambda.amazonaws.com)가 해당 역할을 가정할 수 있도록 허용하는 신뢰 정책을 가져야 합니다. 이는 Lambda 서비스가 해당 역할과 연결된 권한을 사용할 수 있도록 보장합니다. 또한 실행 역할에는 Amazon CloudWatch Logs에 로그를 작성할 수 있는 명시적인 권한이 필요합니다. 이러한 권한이 없으면 Lambda 함수는 CloudWatch에서 로그 스트림을 생성하거나 업데이트할 수 없으며, 이는 로그 출력을 위해 필요합니다."},
  {"id": 165, "text": "개발팀이 회사의 서비스형 소프트웨어(SaaS) 애플리케이션 관리를 위한 오픈 소스 툴셋을 개발하고 있습니다. 회사는 누구나 툴셋 코드를 보고 다운로드할 수 있도록 공개 저장소에 코드를 저장했습니다. 그런데 해당 코드에 회사 AWS 환경 내 내부 리소스에 접근할 수 있는 IAM 액세스 키와 비밀 키가 포함되어 있는 것을 발견했습니다. 보안 엔지니어는 노출된 자격 증명이 무단으로 사용되었는지 여부를 확인하고, 추가적인 무단 사용을 방지하는 솔루션을 구현해야 합니다. 다음 요구 사항을 충족하는 단계 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["AWS Identity and Access Management Access Analyzer를 사용하여 노출된 자격 증명이 액세스한 리소스와 해당 자격 증명을 사용한 사용자를 확인합니다.", "사용자의 IAM 계정에서 노출된 IAM 액세스 키를 비활성화합니다.", "소스 코드에 있는 액세스 키가 사용되지 않도록 Amazon GuardDuty에 규칙을 생성합니다.", "자격 증명이 노출된 사용자를 위해 새 IAM 액세스 키와 비밀 키를 생성합니다.", "IAM 자격 증명 보고서를 생성합니다. 보고서를 확인하여 액세스 키를 소유한 사용자가 마지막으로 로그인한 시간을 확인합니다."], "answer": "B,E", "multi": true, "explanation": "노출된 액세스 키에 대한 즉각적인 대응 조치는 유출된 IAM 액세스 키를 비활성화(폐지)하는 것입니다(옵션 B). 이렇게 하면 유출된 자격 증명의 추가 사용을 방지할 수 있으며, 비밀 정보가 공개된 경우 필수적인 조치입니다. 새 키를 생성하는 것(옵션 D)은 이후 복구의 일부일 수 있지만, 이미 노출된 키가 먼저 비활성화되지 않으면 오용을 막을 수 없습니다. 자격 증명이 사용되었는지 확인하려면 액세스 활동에 대한 증거가 필요합니다. 제공된 옵션 중 가장 적절한 것은 IAM 자격 증명 보고서를 생성하고 검토하는 것입니다(옵션 E). 이 보고서에는 액세스 키 상태 및 '마지막 사용'과 같은 메타데이터가 포함되어 있어 사용자의 자격 증명이 최근에 사용되었는지 평가하는 데 도움이 됩니다. 보다 심층적인 조사는 일반적으로 CloudTrail의 'AccessKeyId' 검색에 의존하지만, 자격 증명 보고서는 답안 선택지에 맞춘 AWS 기본 단계로 빠르게 수행할 수 있는 방법입니다."},
  {"id": 166, "text": "최근 보안 감사에서 한 회사의 애플리케이션 팀이 AWS Fargate 작업의 환경 변수에 데이터베이스 자격 증명을 삽입하는 것이 확인되었습니다. 해당 회사의 보안 정책은 모든 민감한 데이터를 저장 시와 전송 시 모두 암호화하도록 규정하고 있습니다. 보안팀은 애플리케이션이 보안 정책을 준수하도록 하기 위해 어떤 조치들을 조합하여 취해야 할까요? (세 가지를 선택하세요.)", "choices": ["자격 증명을 애플리케이션 팀의 IAM 역할에만 접근 권한이 부여된 Amazon S3 버킷의 파일에 안전하게 저장하세요. 애플리케이션 팀에게 S3 객체에서 자격 증명을 읽도록 요청하십시오.", "AWS Secrets Manager 시크릿을 생성하고 이 시크릿에 저장할 키-값 쌍을 지정합니다.", "환경 변수 대신 AWS Secrets Manager 시크릿에서 자격 증명을 가져오도록 애플리케이션을 수정합니다.", "필수 비밀 키와 KMS 키에 대해 ssm:GetParameters, secretsmanager:GetSecretValue 및 kms:Decrypt를 허용하는 정책 문을 컨테이너 인스턴스 IAM 역할에 추가합니다.", "필수 비밀 키와 KMS 키에 대해 ssm:GetParameters, secretsmanager:GetSecretValue 및 kms:Decrypt를 허용하는 정책 문을 작업 역할 또는 작업 실행 역할에 추가합니다.", "AWS Fargate 인스턴스에 로그인하여 AWS Secrets Manager에서 비밀 값을 읽어 환경 변수에 주입하는 스크립트를 생성합니다. 애플리케이션 팀에 애플리케이션을 재배포하도록 요청합니다."], "answer": "B,C,E", "multi": true, "explanation": "Secrets Manager는 데이터베이스 자격 증명에 적합한 서비스입니다. 그 이유는 AWS KMS를 사용하여 저장 시 비밀을 암호화하고 TLS를 통해 이를 검색하기 때문입니다. 애플리케이션은 민감한 자격 증명을 직접 환경 변수에 저장하는 것을 중단하고 실행 시 Secrets Manager에서 가져오거나, ECS 태스크가 태스크 정의를 통해 비밀을 안전하게 참조해야 합니다. 어느 설계 방식이든, 태스크 역할 또는 태스크 실행 역할은 특정 비밀과 KMS 키에 대해 secretsmanager:GetSecretValue 및 kms:Decrypt를 호출할 수 있는 권한이 있어야 합니다. 자격 증명을 S3에 저장하는 것은 더 약한 비밀 관리 패턴입니다. Fargate 태스크에는 고객이 관리하는 EC2 컨테이너 인스턴스 역할이 없습니다. Fargate 인스턴스에 로그인하는 것은 유효하지 않으며, 감사가 가능한 안전한 배포 패턴이 될 수 없습니다."},
  {"id": 167, "text": "한 기업에서 아마존 코그니토 사용자 풀 엔드포인트를 대상으로 하는 봇 활동을 감지했습니다. 해당 솔루션은 정상적인 사용자의 접근을 유지하면서 악성 요청을 차단해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "choices": ["Amazon Cognito 위협 보호를 활성화합니다.", "인증된 사용자만 접근할 수 있도록 제한합니다.", "AWS WAF를 Cognito 사용자 풀과 연결합니다.", "CloudWatch로 요청을 모니터링하세요."], "answer": "A", "multi": false, "explanation": "Amazon Cognito 위협 방지는 자격 증명 스터핑 및 봇 트래픽과 같은 악의적인 인증 활동을 탐지하고 완화하기 위해 특별히 구축되었습니다. 합법적인 사용자를 방해하지 않고 적응형 위험 기반 분석을 사용합니다. AWS WAF는 Cognito 사용자 풀과 직접 연결할 수 없습니다."},
  {"id": 168, "text": "한 회사가 애플리케이션 로드 밸런서(ALB) 뒤에 있는 Amazon EC2 인스턴스에 자사 웹사이트를 호스팅하고 있습니다. 웹사이트가 특정 IoT 기기 브랜드에서 사용하는 고유한 사용자 에이전트로 인해 글로벌 DDoS 공격을 받고 있습니다. 보안 엔지니어가 AWS WAF 웹 ACL을 생성하고 이를 ALB와 연결할 예정입니다. 어떤 규칙 조항이 정상적인 고객을 차단하지 않으면서 이러한 IoT 기기로부터의 현재 및 미래 공격을 완화할 수 있을까요?", "choices": ["IP 세트 일치 규칙문을 사용합니다.", "지리적 일치 규칙문을 사용합니다.", "비율 기반 규칙문을 사용합니다.", "사용자 에이전트에 문자열 일치 규칙문을 사용합니다."], "answer": "D", "multi": false, "explanation": "AWS WAF 문자열 일치 규칙 문을 사용하면 User-Agent 헤더를 포함한 HTTP 헤더를 검사할 수 있습니다. AWS 공인 보안 - 전문 지침에 따르면 악성 트래픽이 장치별 사용자 에이전트와 같은 일관된 요청 속성으로 고유하게 식별될 수 있는 경우 문자열 일치 규칙은 최소한의 오탐으로 정확한 완화를 제공합니다. IP 기반 차단은 전 세계적으로 분산된 봇넷에는 효과적이지 않습니다. 지리적 차단은 합법적인 사용자의 접근을 거부할 위험이 있습니다. 속도 기반 규칙은 요청 볼륨을 제한하지만 낮고 느린 공격을 방지하지는 않습니다. User-Agent 헤더에서 고유한 IoT 장치 브랜드를 일치시킴으로써 보안 엔지니어는 고객 액세스를 유지하면서 악의적인 요청만 차단할 수 있습니다."},
  {"id": 169, "text": "보안 엔지니어가 AWS 계정에 영향을 미치는 사고에 대응하고 있습니다. 해당 계정의 ID는 다음과 같습니다. 123456789012. 이 공격으로 인해 여러 AWS 리전에 분산된 워크로드가 생성되었습니다. 보안 엔지니어는 공격을 차단하고 영향을 받은 모든 리전에서 모든 컴퓨팅 및 스토리지 리소스를 제거했습니다. 그러나 공격자는 AWS KMS 키도 생성했습니다. 해당 KMS 키의 키 정책은 IAM 주체에 kms:* 권한을 명시적으로 허용합니다. 해당 키는 전날 삭제될 예정이었습니다. 그러나 키는 여전히 활성화되어 사용 가능합니다. 해당 키의 ARN은 arn:aws:kms:us-east-2:123456789012:key/mrk- 0bb0212cd9864fdea0dcamzo26efb5670입니다. 보안 엔지니어는 가능한 한 빨리 키를 삭제해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["계정 루트 사용자 자격 증명을 사용하여 계정에 로그인합니다. 7일의 대기 기간을 두고 KMS 키 삭제 요청을 다시 제출합니다.", "KMS 키 ID가 존재하는 다른 지역을 식별하고 7일 후에 키를 삭제하도록 예약합니다.", "KMS 키 ARN에 대해 kms:* 권한을 허용하도록 IAM 주체를 업데이트합니다. 7일의 대기 기간을 두고 KMS 키 삭제 요청을 다시 발행합니다.", "KMS 키를 비활성화합니다. 30일 후에 KMS 키 삭제 요청을 다시 제출합니다."], "answer": "A", "multi": false, "explanation": "AWS KMS는 고객 관리 키를 삭제하기 전에 최소 7일의 대기 기간을 필수적으로 적용합니다. AWS 공인 보안 전문가 - 스페셜티 사고 대응 지침에 따르면, KMS 키를 즉시 삭제할 수 있는 방법은 존재하지 않습니다. 가장 빠른 삭제 방법은 최소 7일 대기 기간으로 삭제를 예약하는 것입니다. 이 시나리오에서는 삭제가 이전에 예약되었음에도 불구하고 키는 여전히 활성화되어 사용 가능합니다. 제어를 되찾고 삭제를 즉시 재발행하는 가장 권위 있고 신뢰할 수 있는 방법은 AWS 계정 루트 사용자를 사용하는 것으로, 루트 사용자는 손상된 IAM 주체와 관계없이 KMS 키를 관리할 수 있는 암묵적 권한을 가지고 있습니다."},
  {"id": 170, "text": "보안 엔지니어가 최근 Amazon EC2 인스턴스의 호스트 키를 변경했습니다. 해당 엔지니어는 EC2 인스턴스 연결 기능을 사용하여 EC2 인스턴스에 액세스하려고 시도했지만 호스트 키 유효성 검사 실패 오류가 발생했습니다. 호스트 키를 변경하기 전에는 EC2 인스턴스 연결이 해당 EC2 인스턴스에서 정상적으로 작동했습니다. 보안 엔지니어는 이 오류를 해결하기 위해 무엇을 해야 할까요?", "choices": ["키 자료를 AWS 키 관리 서비스(AWS KMS)로 가져옵니다.", "새 호스트 키를 AWS 신뢰할 수 있는 호스트 키 데이터베이스에 수동으로 업로드합니다.", "AmazonSSMManagedInstanceCore 정책이 EC2 인스턴스 프로필에 연결되어 있는지 확인하십시오.", "EC2 인스턴스용 새 SSH 키 쌍을 생성합니다."], "answer": "B", "multi": false, "explanation": "EC2 인스턴스 연결은 인스턴스의 SSH 호스트 키를 신뢰할 수 있는 호스트 키 출처와 대조하여 서버/호스트 신뢰성 검사를 수행할 수 있습니다. 인스턴스의 호스트 키를 교체하면 호스트는 새로운 지문을 제공합니다. 신뢰할 수 있는 호스트 키 출처에 아직 이전 호스트 키가 남아 있다면, 호스트 키 검증을 강제하는 연결은 호스트 키 검증 오류와 함께 실패합니다. 해결 방법은 신뢰할 수 있는 호스트 키 기록을 업데이트하여 새 호스트 키 지문이 유효한 것으로 인식되도록 하는 것입니다. 따라서 올바른 조치는 EC2 인스턴스 연결 호스트 키 검증에 사용되는 신뢰할 수 있는 호스트 키 데이터베이스에 새 호스트 키를 업로드하는 것입니다."},
  {"id": 171, "text": "한 회사가 Amazon S3 버킷에 접근해야 하는 AWS Lambda 함수를 보유하고 있습니다. 회사의 보안 정책에 따라 Amazon S3에 대한 연결은 사설 네트워크를 통해 이루어져야 하며 보안이 유지되어야 합니다. 해당 회사는 Amazon S3에 대한 액세스를 허용하기 위해 VPC 내에 게이트웨이 VPC 엔드포인트를 구성했습니다. 해당 회사는 Lambda 함수가 VPC 내에서 실행되도록 구성했습니다. 또한, Lambda 함수가 NAT 게이트웨이를 통해 인터넷에 연결되는 경로가 있는 프라이빗 서브넷을 사용하도록 구성했습니다. VPC 내의 다른 리소스들은 이 ​프라이빗 서브넷을 사용하여 인터넷에 정상적으로 액세스하고 있습니다. 하지만 Lambda 함수가 실행될 때, Amazon S3에 액세스할 때 VPC 게이트웨이 엔드포인트 대신 NAT 게이트웨이를 사용하게 됩니다. 보안 엔지니어는 Lambda 함수가 Amazon S3에 대해 게이트웨이 VPC 엔드포인트를 사용하도록 보장하기 위해 무엇을 할 수 있을까요?", "choices": ["Lambda 함수가 사용하는 프라이빗 서브넷의 라우팅 테이블에서 NAT 게이트웨이로 가는 경로를 제거합니다.", "게이트웨이 VPC 엔드포인트를 Lambda 함수가 사용하는 프라이빗 서브넷의 라우팅 테이블과 연결합니다.", "Lambda 함수의 네트워크 인터페이스 주소에서 접근을 허용하도록 게이트웨이 VPC 엔드포인트 정책을 조정합니다.", "Lambda 함수의 보안 그룹을 구성하여 S3 네트워크 주소 공간에 대한 연결을 허용합니다."], "answer": "B", "multi": false, "explanation": "S3 게이트웨이 엔드포인트는 라우트 테이블을 통해 작동합니다. 게이트웨이 엔드포인트가 서브넷 라우트 테이블과 연결되면, AWS는 자동으로 게이트웨이 엔드포인트를 대상으로 하는 S3 프리픽스 리스트에 대한 경로를 추가합니다. 그런 다음 해당 서브넷의 리소스에서 S3로 가는 트래픽은 기본 NAT 게이트웨이를 통한 경로 대신 프라이빗 엔드포인트 경로를 사용합니다. NAT 경로를 제거하면 서브넷의 다른 인터넷 연결 워크로드에 문제가 생기며 이는 불필요합니다. 게이트웨이 엔드포인트 정책은 권한을 제어할 뿐, 경로 선택을 제어하지 않습니다. Lambda 보안 그룹 규칙은 S3 트래픽이 게이트웨이 엔드포인트를 사용하도록 강제하지 않습니다. 누락된 구성은 Lambda 함수의 서브넷에서 사용되는 라우트 테이블에 S3 게이트웨이 엔드포인트를 연결하는 것입니다."},
  {"id": 172, "text": "한 회사가 Amazon EC2 인스턴스에서 애플리케이션을 실행합니다. 이 애플리케이션은 송장을 생성하여 Amazon S3 버킷에 저장합니다. 해당 인스턴스에 연결된 인스턴스 프로필은 S3 버킷에 대한 적절한 접근 권한을 가지고 있습니다. 이 회사는 AWS 자격 증명이 없는 여러 고객과 각 송장을 공유해야 합니다. 각 고객은 자신의 송장만 다운로드할 수 있어야 하며, 송장 생성 후 1시간 이내에 다운로드해야 합니다. 또한, 고객은 회사의 AWS 리소스에 접근하기 위해 임시 자격 증명만 사용해야 합니다. 어떤 추가 조치가 이러한 요구 사항을 충족할까요?", "choices": ["사전 서명된 URL을 사용하는 클라이언트가 버킷의 S3 객체에 액세스하기 위해 S3:Get* 권한과 S3:List* 권한을 갖도록 S3 버킷 정책을 업데이트합니다.", "EC2 인스턴스 프로필에 대한 IAM 역할 정책에 문자열 같음 조건을 추가합니다. 각 송장의 s3:ResourceTag/ClientId 태그를 기준으로 액세스를 제한하도록 정책 조건을 구성합니다. 생성된 각 송장에 해당 클라이언트의 ID를 태그로 지정합니다.", "스크립트가 실행될 때마다 AWS STS(AWS Security Token Service)를 사용하여 새 자격 증명을 얻도록 스크립트를 업데이트하세요. 이를 위해 S3:GetObject 권한이 있는 새 역할을 부여합니다. 얻은 자격 증명을 사용하여 사전 서명된 URL을 생성합니다.", "S3 버킷에 대한 S3:GetObject 권한을 가진 IAM 사용자를 위한 액세스 키와 비밀 키를 생성합니다. 생성된 키를 스크립트에 포함시킵니다. 생성된 키를 사용하여 사전 서명된 URL을 생성합니다."], "answer": "B", "multi": false, "explanation": "Amazon S3의 미리 서명된 URL은 해당 URL을 생성한 보안 주체의 권한에 따라 임시 액세스 권한을 부여합니다. AWS 공인 보안 – 전문 문서에서는 미리 서명된 URL을 IAM 정책 조건과 결합하여 세분화된 권한 부여를 시행할 수 있다고 설명합니다. 클라이언트 식별자로 각 송장 객체에 태그를 지정하고 s3:ResourceTag/ClientId를 사용하여 EC2 인스턴스 역할 정책에 조건을 추가하면 해당 역할은 특정 클라이언트와 연결된 객체에 대해서만 미리 서명된 URL을 생성할 수 있습니다. 이렇게 하면 URL이 임시이고 인증되지 않은 경우에도 각 클라이언트가 자신의 송장에만 액세스할 수 있습니다. 옵션 A는 클라이언트에 과도한 권한을 부여합니다. 인스턴스 프로필이 이미 임시 자격 증명을 사용하고 있으므로 옵션 C는 필요하지 않습니다. 옵션 D는 장기 자격 증명을 사용하여 AWS 모범 사례를 위반합니다. AWS에서는 확장 가능하고 안전한 액세스 제어를 위해 IAM 정책 조건을 사용한 리소스 태그 지정을 권장합니다."},
  {"id": 173, "text": "한 회사가 애플리케이션 로드 밸런서(ALB) 뒤에 있는 Amazon EC2 인스턴스 클러스터에서 애플리케이션을 운영하고 있습니다. 보안 엔지니어는 VPN을 사용하지 않고 애플리케이션에 안전하게 접근할 수 있도록 해야 합니다. 사용자는 특정 보안 조건(정의된 디바이스 상태 포함)을 충족하는 경우에만 애플리케이션에 접근할 수 있어야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇일까요?", "choices": ["AWS WAF 웹 ACL을 생성합니다. 정의된 장치 상태와 일치하지 않는 트래픽을 차단하도록 사용자 지정 응답을 구성합니다.", "AWS 검증된 액세스를 구성합니다. ALB용 엔드포인트를 생성하여 애플리케이션을 추가합니다.", "Amazon 검증 권한을 구성합니다. 정책 기반 액세스 제어(PBAC) 정책을 사용하여 권한 부여를 수행합니다.", "Amazon 검증 권한을 구성합니다. ALB용 엔드포인트를 생성하여 애플리케이션을 추가합니다."], "answer": "B", "multi": false, "explanation": "AWS Verified Access는 VPN을 필요로 하지 않고 애플리케이션에 안전하게 접근할 수 있게 하며, 장치 상태 및 신원 확인을 포함한 보안 조건을 적용하는 제로 트러스트 모델을 사용합니다. Verified Access를 구성하고 애플리케이션 로드 밸런서(ALB)에 엔드포인트를 추가함으로써, 보안 엔지니어는 특정 보안 조건을 충족하는 사용자만 애플리케이션에 접근할 수 있도록 보장할 수 있습니다. Verified Access는 장치 상태 및 기타 조건에 기반한 안전한 접근 제어를 제공함으로써 이러한 사용 사례를 충족하도록 설계되었습니다."},
  {"id": 174, "text": "한 회사가 AWS Organizations를 사용하고 있으며, 루트에 SCP(서비스 제공업체 규칙)를 설정하여 외부 계정과의 리소스 공유를 차단했습니다. 이제 이 회사는 마케팅 계정만 외부와 리소스를 공유할 수 있도록 허용하고, 다른 모든 계정은 공유를 차단해야 합니다. 모든 계정은 동일한 OU(조직 단위)에 있습니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["마케팅 계정에 공유를 명시적으로 허용하는 새 SCP를 생성합니다.", "기존 SCP를 수정하여 마케팅 계정을 제외하는 조건을 추가합니다.", "마케팅 계정에 대한 허용 문구를 포함하도록 SCP를 수정하세요.", "마케팅 계정에서 권한 경계를 사용하세요."], "answer": "B", "multi": false, "explanation": "서비스 제어 정책(SCP)은 계정에 사용 가능한 최대 권한을 정의하고 가드레일로 평가됩니다. AWS 공인 보안 - 전문 문서에 따르면 SCP는 일반적으로 조직 전체에 제한을 적용하는 데 사용되며, 예외는 일반적으로 조건(예: 특정 계정 제외)을 사용하거나 OU를 다르게 구성하여 처리됩니다. 모든 계정이 동일한 OU에 있고 회사는 하나의 계정을 제외한 모든 사람에 대한 외부 공유를 계속 차단해야 하기 때문에 마케팅 계정을 제외하도록 기존 SCP를 수정하는 것이 가장 직접적인 해결책입니다. 루트에 연결된 SCP는 조건이 범위를 좁히지 않는 한 모든 계정에 영향을 미칩니다. 마케팅 계정을 제외하는 조건을 추가하면 SCP가 다른 계정에 대한 공유를 계속 차단하는 동안 해당 계정은 외부적으로 리소스를 공유하는 기능을 유지할 수 있습니다. 계정 수준 SCP는 상위 SCP가 적용한 거부를 재정의할 수 없기 때문에 옵션 A는 실현 가능하지 않습니다. 명시적인 거부는 항상 승리합니다. 옵션 C는 SCP가 권한을 부여하지 않기 때문에 SCP 동작을 오해합니다. 그들은 단지 제한합니다. 옵션 D는 조직 수준 거부를 재정의할 수 없는 IAM 제어입니다. 따라서 안전하고 확장 가능한 유일한 옵션은 마케팅 계정에 대한 예외 조건을 사용하여 기존 SCP를 수정하는 것입니다."},
  {"id": 175, "text": "한 회사의 애플리케이션이 AWS Systems Manager 파라미터 스토어의 표준 계층 SecureString 파라미터를 사용하고 있습니다. 해당 회사가 파라미터를 업데이트하려고 할 때 애플리케이션에서 오류 메시지가 발생합니다. 이 파라미터는 암호화 및 복호화를 위해 AWS KMS 고객 관리형 키를 사용합니다. 오류 메시지가 발생하는 이유는 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["해당 애플리케이션에는 고객 관리 키에 대한 kms:Encrypt 권한이 없습니다.", "고객이 관리하는 키가 이미 다른 SecureString 매개변수를 암호화하는 데 사용되고 있습니다.", "표준 계층 SecureString 매개변수는 암호화에 고객 관리 키를 사용할 수 없습니다.", "애플리케이션에 지정된 고객 관리 키의 키 상태가 사용 안 함으로 설정되었습니다.", "애플리케이션에 지정된 고객 관리 키는 키 ID 대신 키 별칭을 사용하고 있습니다."], "answer": "A,D", "multi": true, "explanation": "파라미터 스토어(Parameter Store)는 생성되거나 변경될 때 SecureString 파라미터 값을 암호화하기 위해 AWS KMS를 사용합니다. 고객 관리 키(customer managed key)를 사용하는 경우 호출자는 SecureString 값을 생성하거나 업데이트할 때 kms:Encrypt를 포함한 명시적인 KMS 권한이 필요합니다. 애플리케이션에 해당 권한이 없으면 업데이트에 실패합니다. 비활성화된 KMS 키도 실패를 초래하는데, 이는 AWS KMS가 비활성화된 키로 암호화 작업을 수행할 수 없기 때문입니다. 고객 관리 키는 여러 SecureString 파라미터를 암호화할 수 있으며, 다른 파라미터에서 이미 사용 중인 것은 문제가 되지 않습니다. 스탠다드(Standard) 티어 SecureString 파라미터는 고객 관리 키를 사용할 수 있습니다. 키 ID 대신 별칭(alias)을 사용하는 것도 지원되므로 별칭이 원인은 아닙니다."},
  {"id": 176, "text": "한 회사가 AWS Organizations의 조직을 통해 여러 AWS 계정을 관리합니다. 이 회사는 조직 내에서 모든 기능을 활성화합니다. 보안팀은 여러 계정에 걸쳐 VPC 보안 그룹을 중앙에서 관리할 수 있는 솔루션을 구현해야 합니다. 회사는 필요한 구성이 완료된 기존 참조 보안 그룹을 사용합니다. 해당 솔루션은 보안 그룹 규칙이 기준 보안 그룹과 다르게 수정되었는지 여부를 감지해야 합니다. 또한, 기준 보안 그룹과 일치하지 않는 보안 그룹을 자동으로 복원해야 합니다. 보안 팀은 사용자 지정 개발이나 스크립팅이 필요 없는 솔루션을 선택해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Firewall Manager를 사용하여 보안 그룹 정책 규칙을 통해 보안 그룹 규칙을 관리합니다.", "AWS Systems Manager Automation 런북을 생성하여 규정을 준수하지 않는 보안 그룹을 식별하고 참조 보안 그룹과 일치시킵니다.", "자동 복구 기능을 사용하는 사용자 지정 AWS Config 규칙을 사용합니다. 규정 준수를 위해 참조 보안 그룹과 비교합니다.", "AWS CloudFormation StackSets를 통해 보안 그룹을 관리합니다. 초기 규칙에는 참조 보안 그룹을 사용합니다."], "answer": "A", "multi": false, "explanation": "AWS Firewall Manager는 AWS Organizations 전반에서 보안 그룹을 관리하기 위한 올바른 코드 없는 중앙 관리 서비스입니다. Firewall Manager 보안 그룹 정책은 중앙에서 제어되는 보안 그룹 정책을 적용하고, 감사 규칙을 적용하며, 비준수 보안 그룹을 식별하고, 편차를 수정할 수 있습니다. AWS 문서에 따르면 Firewall Manager는 정책을 지속적으로 유지 관리하며 조직 전체에 계정과 리소스가 추가되거나 업데이트될 때 이를 적용한다고 되어 있습니다. 또한 기본 보안 그룹을 복제하고 복제본을 기본 그룹과 동기화 상태로 유지하는 일반적인 보안 그룹 정책을 지원합니다. Systems Manager Automation 또는 사용자 지정 AWS Config 수정은 사용자 지정 논리를 필요로 합니다. CloudFormation StackSets는 초기 보안 그룹을 배포할 수 있지만, 요구되는 거버넌스 모델에서 범위를 벗어난 규칙 변경을 지속적으로 감지하고 자동으로 복원하지는 않습니다."},
  {"id": 177, "text": "한 회사가 아마존 클라우드프론트를 사용하여 글로벌 전자상거래 웹사이트를 운영하고 있습니다. 이 회사는 데이터 규정을 준수하기 위해 특정 국가에서 오는 트래픽을 차단해야 합니다. 어떤 솔루션이 이러한 요구 사항을 가장 비용 효율적으로 충족할까요?", "choices": ["AWS WAF IP 일치 규칙을 사용합니다.", "AWS WAF 지리적 일치 규칙을 사용합니다.", "CloudFront의 지역 제한을 사용하여 해당 국가의 접근을 차단하세요.", "CloudFront에서 지리 위치 헤더를 사용합니다."], "answer": "C", "multi": false, "explanation": "Amazon CloudFront에는 시청자의 국가에 따라 콘텐츠를 허용하거나 거부할 수 있는 지리적 제한 기능이 내장되어 있습니다. AWS 공인 보안 - 전문 문서에 따르면 CloudFront 지리적 제한은 AWS WAF 또는 추가 규칙 처리가 필요하지 않기 때문에 국가 기반 차단을 위한 가장 비용 효과적인 방법입니다. AWS WAF 지역 일치 규칙은 추가 비용이 발생하며 고급 검사 또는 계층화된 보안 제어가 필요할 때 더 적합합니다. IP 기반 차단은 잦은 IP 변경으로 인해 실용적이지 않습니다. 지리적 위치 헤더는 액세스 제어를 시행하지 않습니다. CloudFront 지리적 제한은 엣지에서 평가되며 최소한의 지연 시간과 비용으로 허용되지 않는 국가를 효율적으로 차단합니다."},
  {"id": 178, "text": "한 회사가 AWS Organizations의 조직을 사용하여 여러 AWS 계정을 관리합니다. 이 회사는 AWS IAM Identity Center를 사용하여 계정에 대한 액세스를 관리합니다. 또한 AWS Directory Service를 ID 소스로 사용합니다. 직원들은 AWS 액세스 포털을 통해 AWS 콘솔과 특정 AWS 계정 및 권한에 액세스합니다. 보안 엔지니어가 IAM Identity Center에서 새 권한 세트를 생성하고 조직 내 멤버 계정 중 하나에 해당 권한 세트를 할당합니다. 이 권한 세트는 해당 멤버 계정의 DevOps라는 개발자 사용자 그룹에 할당됩니다. 보안 엔지니어는 모든 개발자가 AWS 액세스 포털에서 해당 멤버 계정에 대해 새 권한 세트가 표시될 것으로 예상합니다. 그러나 한 명을 제외한 모든 개발자가 권한 세트를 볼 수 있습니다. 보안 엔지니어는 나머지 한 명의 개발자도 AWS 액세스 포털에서 권한 세트를 볼 수 있도록 해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["디렉터리 서비스의 DevOps 그룹에 나머지 개발자를 추가합니다.", "회원 계정에 설정된 권한을 제거한 다음 다시 추가하세요.", "멤버 계정에 조직에 대한 서비스 연결 역할을 추가합니다.", "나머지 개발자에게 콘솔 접근 권한을 허용하도록 권한 설정을 업데이트합니다."], "answer": "A", "multi": false, "explanation": "IAM Identity Center에서 사용자는 할당을 기반으로 AWS 액세스 포털에서 계정과 권한 세트를 볼 수 있습니다. 여기서 새 권한 세트는 특정 멤버 계정을 위해 DevOps 그룹에 할당되었습니다. 한 명을 제외한 모든 개발자가 권한 세트를 볼 수 있으므로, 권한 세트 자체와 계정 할당은 올바르게 작동하고 있습니다. 가장 가능성이 높은 원인은 남은 개발자가 실제로는 아이덴티티 소스(AWS Directory Service / Active Directory)에서 DevOps 그룹의 멤버가 아니거나, 디렉터리 그룹 할당이 누락되었거나 잘못되어 그룹 멤버십이 반영되지 않는 경우입니다. 가장 영향이 적은 해결 방법은 개발자의 아이덴티티가 디렉터리 내 DevOps 그룹에 올바르게 포함되었는지 확인하는 것입니다. 사용자가 할당된 그룹의 멤버가 되면(정상적인 아이덴티티 동기화/갱신 후) IAM Identity Center는 해당 사용자가 그 권한 세트를 사용할 자격이 있다고 평가하고, 액세스 포털에 권한 세트가 나타납니다."},
  {"id": 179, "text": "한 회사가 Amazon Elastic Kubernetes Service(Amazon EKS)에서 여러 애플리케이션을 운영하고 있습니다. 이 회사는 운영 체제, 네트워크 및 파일 이벤트 외에도 Amazon EKS 감사 로그를 모니터링하여 Kubernetes 보안 위험을 감지하는 솔루션이 필요합니다. 또한, 식별된 위험에 대해 보안 팀과 연결된 메일링 리스트로 이메일 알림을 전송해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Security Hub를 배포하고 EKS 제어를 포함하는 보안 표준을 활성화합니다. Amazon Simple Notification Service(Amazon SNS) 토픽을 생성하고 보안 팀의 메일링 리스트를 구독자로 설정합니다. Amazon EventBridge 규칙을 사용하여 관련 Security Hub 이벤트를 SNS 토픽으로 전송합니다.", "Amazon Inspector 컨테이너 이미지 스캔을 활성화합니다. EKS 보안 로그를 분석하도록 Amazon Detective를 구성합니다. EKS 감사 로그용 Amazon CloudWatch 로그 그룹을 생성합니다. AWS Lambda 함수를 사용하여 로그를 처리하고 보안 팀에 이메일 알림을 보냅니다.", "Amazon GuardDuty를 활성화합니다. GuardDuty에서 Amazon EKS에 대한 EKS 보호 및 런타임 모니터링을 활성화합니다. Amazon Simple Notification Service(Amazon SNS) 토픽을 생성하고 보안 팀의 메일링 리스트를 구독자로 설정합니다. Amazon EventBridge 규칙을 사용하여 관련 GuardDuty 이벤트를 SNS 토픽으로 전송합니다.", "모든 EKS 노드에 AWS Systems Manager 에이전트(SSM 에이전트)를 설치합니다. EKS 감사 로그를 수집하도록 Amazon CloudWatch Logs를 구성합니다. Amazon Simple Notification Service(Amazon SNS) 토픽을 생성하고 보안 팀의 메일링 리스트를 구독자로 설정합니다. 새 감사 로그가 생성될 때 SNS 토픽에 메시지를 게시하도록 CloudWatch 알람을 구성합니다."], "answer": "C", "multi": false, "explanation": "옵션 C는 요구 사항을 가장 잘 충족합니다. Amazon GuardDuty는 EKS 제어 플레인 감사 로그(EKS 보호)를 분석하고 해당 신호를 작업자 노드의 런타임 원격 측정(런타임 모니터링)과 결합하여 Amazon EKS에 대한 Kubernetes 중심 위협 탐지를 제공하기 때문입니다. EKS 감사 로그는 Kubernetes API 활동 및 권한 부여 결정을 캡처하여 GuardDuty가 비정상적인 API 호출, 예상치 못한 액세스 패턴 또는 클러스터 내 손상 지표와 같은 의심스러운 클러스터 작업을 감지할 수 있도록 합니다. 런타임 모니터링은 운영 체제/프로세스 활동, 네트워크 연결 및 노드의 파일 활동까지 범위를 확장합니다. 이는 감사 로그 외에도 OS, 네트워킹 및 파일 이벤트를 모니터링해야 하는 필요성에 직접적으로 부합합니다. 알림의 경우 GuardDuty는 Amazon EventBridge 규칙을 통해 전달될 수 있는 결과를 생성합니다. EventBridge는 관련 GuardDuty 결과를 Amazon SNS 주제로 라우팅할 수 있으며, SNS는 해당 주제에 대한 팀의 메일링 목록을 구독하여 보안 팀에 이메일 알림을 보낼 수 있습니다. 이 접근 방식은 거의 실시간으로 완벽하게 관리되며 사용자 지정 로그 구문 분석 파이프라인 구축을 방지하는 동시에 GuardDuty의 엄선된 EKS 위협 탐지를 기반으로 실행 가능한 경고를 제공합니다."},
  {"id": 180, "text": "한 기업에서 AWS 조직 내의 모든 신규 및 기존 Amazon EC2 인스턴스에 특정 소프트웨어 애플리케이션을 설치해야 합니다. SSM 에이전트는 이미 설치되어 활성화된 상태입니다. 회사는 소프트웨어 애플리케이션의 배포 상태를 어떻게 지속적으로 모니터링할 수 있을까요?", "choices": ["ec2-managedinstance-applications-required 관리형 규칙을 사용하여 조직 전체에서 AWS Config를 사용하고 애플리케이션 이름을 지정합니다.", "승인된 AMI 사용 규칙을 조직 전체에 적용합니다.", "Distributor 패키지를 사용하고 출력을 검토하세요.", "시스템 관리자 애플리케이션 관리자 인벤토리 필터링을 사용합니다."], "answer": "A", "multi": false, "explanation": "지속적인 모니터링을 위해서는 시간이 지남에 따라 리소스를 평가하는 상시 규정 준수 서비스가 필요합니다. AWS Config는 구성 상태와 규정 준수를 지속적으로 평가하는 관리형 규칙을 제공합니다. AWS 공인 보안 – 전문 분야 지침에서는 AWS Organizations와 함께 사용할 때 계정 및 지역 전체에서 지속적인 규정 준수를 위한 AWS Config를 강조합니다. ec2-managedinstance-applications- 필수 관리형 규칙은 Systems Manager 인벤토리/관리형 인스턴스 상태를 활용하여 지정된 소프트웨어가 관리형 인스턴스에 설치되어 있는지 여부를 평가합니다. AWS Config를 조직 전체에서 활성화하고 이 관리형 규칙을 모든 계정에 배포함으로써 회사는 기존 인스턴스와 새로 시작된 인스턴스를 모두 지속적으로 평가하여 필요한 애플리케이션 존재 여부를 확인할 수 있습니다. 이는 일관된 규정 준수 대시보드와 규정 준수 변경 내역을 제공합니다. 옵션 D는 인벤토리 목록을 제공할 수 있지만 동일한 거버넌스 보고 및 수정 경로를 사용하여 비준수를 표시하는 준수 규칙 엔진은 아닙니다. 옵션 B와 C는 운영 접근 방식이지만 조직 전체에 지속적인 규정 준수 상태를 제공하지 않습니다."},
  {"id": 181, "text": "한 회사가 아마존 EC2 인스턴스 중 하나에서 갑자기 CPU 사용량이 급증하는 것을 발견했습니다. 회사는 해당 EC2 인스턴스가 해킹당한 것인지, 아니면 운영 체제가 백그라운드에서 정리 작업을 수행하는 것인지 알 수 없습니다. 보안 엔지니어는 문제를 조사하기 전에 어떤 단계들을 조합하여 수행해야 할까요? (세 가지를 선택하세요.)", "choices": ["종료 보호가 비활성화되지 않은 경우 EC2 인스턴스에 대한 종료 보호를 비활성화합니다.", "EC2 인스턴스에 종료 보호 기능이 활성화되어 있지 않은 경우 종료 보호 기능을 활성화합니다.", "EC2 인스턴스에 연결된 Amazon Elastic Block Store(Amazon EBS) 데이터 볼륨의 스냅샷을 생성합니다.", "EC2 인스턴스에 연결된 Amazon Elastic Block Store(Amazon EBS) 데이터 볼륨의 모든 스냅샷을 제거합니다.", "EC2 인스턴스 메타데이터를 캡처한 다음 EC2 인스턴스를 격리 상태로 태그합니다.", "민감한 정보가 포함된 EC2 인스턴스 메타데이터 항목을 즉시 제거합니다."], "answer": "B,C,E", "multi": true, "explanation": "조사를 시작하기 전에 사고 대응 모범 사례는 증거를 보존하고, 우발적인 자산 손실을 방지하고, 잠재적으로 영향을 받는 리소스를 명확하게 표시하고 제어하는 ​​것입니다. 종료 보호(옵션 B)를 활성화하면 분류 중에 인스턴스가 실수로 종료되어 휘발성 증거가 파괴되고 법의학 및 복구가 복잡해지는 것을 방지하는 데 도움이 됩니다. 연결된 모든 데이터 볼륨의 EBS 스냅샷을 찍으면(옵션 C) 나중에 포렌식 분석, 맬웨어 검색 또는 오프라인 조사를 위해 디스크 증거의 특정 시점 복사본을 보존합니다. 스냅샷을 사용하면 대응자는 잠재적으로 손상될 수 있는 인스턴스를 반복적으로 건드리지 않고도 격리된 환경에서 포렌식 볼륨 또는 AMI를 생성할 수 있습니다. 인스턴스 메타데이터를 캡처하고 인스턴스를 격리 대상으로 태그 지정(옵션 E)하면 조사 및 운영 제어가 모두 지원됩니다. 메타데이터 캡처(인스턴스 ID, IAM 역할, 네트워크 인터페이스, 보안 그룹, 사용자 데이터, 태그, 최근 변경 사항)는 응답자에게 컨텍스트를 제공합니다. 격리 태그 지정을 사용하면 자동화된 워크플로(예: 인스턴스를 격리하거나 IAM을 제한하거나 격리 보안 그룹으로 이동하는 사고 런북)를 활성화하고 인스턴스가 조사 중임을 다른 팀/도구에 알릴 수 있습니다."},
  {"id": 182, "text": "AWS Organizations를 통해 50개의 AWS 계정을 관리하는 회사가 중앙 집중식 위협 탐지 솔루션을 구축해야 합니다. 이 솔루션은 조직 내 모든 계정에서 의심스럽거나 악의적인 활동을 식별해야 합니다. 해당 회사는 AWS Control Tower를 사용하고 있으며 보안 발견 사항을 감사 계정에 중앙 집중화하려고 합니다. 보안 팀은 새로운 보안 발견 사항이 발생할 경우 5분 이내에 이메일 알림을 받아야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["감사 계정에 위임된 관리자를 사용하여 Amazon GuardDuty를 구성합니다. 위임된 관리자 계정을 통해 모든 멤버 계정에서 GuardDuty를 활성화합니다. GuardDuty에서 발견된 내용을 보안 팀에 이메일 알림을 보내는 Amazon SNS 주제로 전송하는 Amazon EventBridge 규칙을 생성합니다.", "각 멤버 계정에 Amazon GuardDuty를 설정하고, 감사 계정에서 계정 간 액세스를 허용하는 IAM 역할을 생성합니다. 각 계정에 Amazon CloudWatch 알람을 구성하여 보안 발견 사항을 모니터링하고 감사 계정의 Amazon Simple Notification Service(Amazon SNS) 주제로 알림을 보냅니다.", "감사 계정에서 AWS Config를 활성화하고 조직 전체의 보안 문제를 감지하는 사용자 지정 규칙을 생성합니다. AWS Systems Manager를 사용하여 모든 멤버 계정에서 보안 발견 사항을 수집하고 중앙 집중식 Amazon S3 버킷에 저장합니다. AWS Lambda 함수를 생성하여 S3 버킷을 모니터링하고 새로운 발견 사항이 감지되면 보안 팀에 이메일 알림을 보냅니다.", "조직 내 모든 Amazon EC2 인스턴스에 Amazon Inspector 에이전트를 배포합니다. 감사 계정의 중앙 Amazon Inspector 콘솔로 보고하도록 Amazon Inspector 에이전트를 구성합니다. 각 멤버 계정에 Amazon EventBridge 규칙을 생성하여 감사 계정의 Amazon Simple Notification Service(Amazon SNS) 토픽으로 발견 사항을 전달합니다."], "answer": "A", "multi": false, "explanation": "Amazon GuardDuty는 AWS 계정 전반에서 의심스러운 활동과 잠재적으로 악의적인 활동을 식별하도록 설계된 AWS 위협 탐지 서비스입니다. AWS Organizations 환경에서는 감사 계정을 위임된 관리자(delegate administrator)로 구성할 수 있어 GuardDuty를 모든 회원 계정에서 중앙에서 관리할 수 있습니다. GuardDuty 탐지 결과는 거의 실시간으로 Amazon EventBridge에 게시되며, EventBridge는 이러한 탐지 결과를 Amazon SNS 주제로 라우팅하여 이메일 알림을 보낼 수 있습니다. 이는 몇 분 내에 중앙 집중식 탐지 및 알림 요구 사항을 충족합니다."},
  {"id": 183, "text": "공용 서브넷에 Amazon EC2 인스턴스 두 개가 있습니다. 이 서브넷에는 사용자 지정 네트워크 접근 제어 목록(ACL)이 설정되어 있습니다. 보안 엔지니어는 서브넷 보안을 강화하기 위한 솔루션을 설계하고 있습니다. 이 솔루션은 포트 443을 통해 TLS를 사용하는 인터넷 서비스로의 아웃바운드 트래픽을 허용해야 합니다. 또한, MySQL 포트 3306으로 향하는 인바운드 트래픽은 차단해야 합니다. 어떤 네트워크 ACL 규칙 세트가 이러한 요구 사항을 충족합니까?", "choices": ["인바운드 규칙 100을 사용하여 TCP 포트 443의 트래픽을 허용합니다. 인바운드 규칙 200을 사용하여 TCP 포트 3306의 트래픽을 차단합니다. 아웃바운드 규칙 100을 사용하여 TCP 포트 443의 트래픽을 허용합니다.", "인바운드 규칙 100을 사용하여 TCP 포트 3306의 트래픽을 차단합니다. 인바운드 규칙 200을 사용하여 TCP 포트 범위 1024-65535의 트래픽을 허용합니다. 아웃바운드 규칙 100을 사용하여 TCP 포트 443의 트래픽을 허용합니다.", "인바운드 규칙 100을 사용하여 TCP 포트 범위 1024-65535의 트래픽을 허용합니다. 인바운드 규칙 200을 사용하여 TCP 포트 3306의 트래픽을 차단합니다. 아웃바운드 규칙 100을 사용하여 TCP 포트 443의 트래픽을 허용합니다.", "인바운드 규칙 100을 사용하여 TCP 포트 3306의 트래픽을 차단합니다. 인바운드 규칙 200을 사용하여 TCP 포트 443의 트래픽을 허용합니다. 아웃바운드 규칙 100을 사용하여 TCP 포트 443의 트래픽을 허용합니다."], "answer": "B", "multi": false, "explanation": "네트워크 ACL에서는 규칙이 순서대로 처리되므로, 규칙의 번호 매김이 중요합니다. 요구 사항은 다음과 같습니다: 인터넷 서비스에 도달하기 위한 포트 443(TLS)의 아웃바운드 트래픽. 포트 3306(MySQL)으로의 인바운드 트래픽을 차단. 올바른 규칙 세트는 다음과 같습니다: 인바운드 규칙 100은 TCP 포트 3306의 트래픽을 차단하여 MySQL 접근을 막습니다. 인바운드 규칙 200은 TCP 포트 범위 1024-65535를 허용하며, 이는 포트 443으로 시작된 아웃바운드 연결에 대한 응답에 사용되는 임시 포트에 필요합니다. 아웃바운드 규칙 100은 TCP 포트 443을 허용하여 필요한 아웃바운드 트래픽을 허용합니다. 이 구성은 포트 443으로 시작된 아웃바운드 트래픽만 임시 포트에서 응답을 받을 수 있도록 보장하고, 포트 3306의 인바운드 MySQL 트래픽을 차단하여 요구 사항을 충족합니다."},
  {"id": 184, "text": "한 회사가 AWS Organizations를 사용하여 회사 AWS 계정을 관리하고 있습니다. 회사 보안팀은 계정 수준의 루트 자격 증명 사용을 차단하는 예방적 보안 조치를 구현해야 합니다. 이 솔루션은 AWS 계정 루트 사용자의 계정이 손상될 위험을 최소화해야 하며, 루트 액세스 관리에 필요한 노력도 최소화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["IAM에서 중앙 집중식 루트 액세스 관리를 활성화합니다. 멤버 계정에서 장기 루트 자격 증명을 제거합니다. 직원들이 새 계정을 생성할 때 조직(Organizations)을 사용하도록 요구하는 회사 정책을 수립합니다.", "모든 멤버 계정에 대해 주체가 계정의 루트 사용자일 경우 모든 작업을 명시적으로 거부하도록 SCP를 구성합니다. 멤버 계정의 루트 사용자는 MFA(다단계 인증)를 활성화해야 합니다. 루트 자격 증명은 정기적으로 교체해야 합니다.", "AWS Security Hub CSPM을 통해 중앙 집중식 루트 액세스 관리를 활성화합니다. 멤버 계정에서 장기 루트 자격 증명을 제거합니다. Security Hub CSPM에서 루트 자격 증명 없이 새 계정을 생성하도록 구성합니다.", "모든 멤버 계정에서 루트 사용자를 비활성화하는 AWS Lambda 함수를 생성합니다. 중앙 집중식 청구 또는 AWS KMS 키 복구와 관련된 설정을 수정해야 하는 경우에만 루트 계정을 활성화합니다."], "answer": "A", "multi": false, "explanation": ""},
  {"id": 185, "text": "한 회사가 아마존 S3 버킷에서 데이터를 읽고 쓰는 웹 애플리케이션을 보유하고 있습니다. 이 회사는 S3 버킷에 대한 모든 S3 API 호출을 인증하기 위해 AWS 자격 증명을 사용해야 합니다. 어떤 솔루션이 애플리케이션에 S3 API 호출에 필요한 AWS 자격 증명을 제공할까요?", "choices": ["Cognito ID 풀과 통합하고 GetId를 사용하여 AWS 자격 증명을 얻습니다.", "Cognito ID 풀과 통합하고 AssumeRoleWithWebIdentity를 사용하여 AWS 자격 증명을 얻습니다.", "Cognito 사용자 풀과 통합하고 ID 토큰을 사용하여 AWS 자격 증명을 얻습니다.", "Cognito 사용자 풀과 통합하고 액세스 토큰을 사용하여 AWS 자격 증명을 얻습니다."], "answer": "B", "multi": false, "explanation": "Amazon Cognito 자격 증명 풀은 인증된 자격 증명 토큰을 AWS Security Token Service(STS) 자격 증명으로 교환하여 애플리케이션에 임시 AWS 자격 증명을 제공하도록 설계되었습니다. AWS 공인 보안 - 전문 지침은 Cognito 사용자 풀(인증)과 자격 증명 풀(AWS 리소스에 대한 권한 부여)을 구별합니다. 사용자 풀은 사용자를 인증하고 토큰을 발급할 수 있지만 S3 API 호출과 같은 AWS API 요청에 서명하는 데 사용할 수 있는 AWS 자격 증명을 얻으려면 자격 증명 풀이 필요합니다. 올바른 메커니즘은 애플리케이션이 STS(자격 증명 풀에서 사용하는 기본 연동 방법)를 통해 AssumeRoleWithWebIdentity를 사용하여 S3 권한을 부여하는 IAM 역할에 대한 임시 자격 증명을 받는 것입니다. GetId만으로는 자격 증명을 제공하지 않습니다. 자격 증명 교환 흐름의 일부로 사용되는 ID 식별자를 반환합니다. 사용자 풀 토큰은 AWS 자격 증명이 아니며 S3 요청에 직접 서명할 수 없기 때문에 옵션 C와 D는 올바르지 않습니다. 따라서 솔루션은 자격 증명 풀을 사용하여 사용자를 IAM 역할에 매핑하고 임시 자격 증명을 검색하여 단기 자격 증명을 사용하여 인증된 API 호출에 대한 요구 사항을 충족해야 합니다."},
  {"id": 186, "text": "한 회사의 보안팀은 AWS에서 DoS 공격 관련 악용 보고에 대한 이메일 알림을 받기를 원합니다. 보안 엔지니어는 AWS가 해당 계정에 대해 전송하는 모든 악용 보고에 대해 거의 실시간으로 알림을 제공하는 솔루션을 구현해야 합니다. 보안 엔지니어는 이미 Amazon Simple Notification Service(Amazon SNS) 토픽을 생성하고 보안팀의 이메일 주소를 해당 토픽에 구독했습니다. 보안 엔지니어는 이러한 요구 사항을 충족하기 위해 다음에 무엇을 해야 할까요?", "choices": ["AWS Trusted Advisor API와 예약된 Lambda 함수를 사용하여 AWS_ABUSE_DOS_REPORT 알림을 감지합니다.", "AWS Health를 사용하고 AWS_ABUSE_DOS_REPORT에 대한 특정 이벤트를 식별하는 Amazon EventBridge 규칙을 생성합니다. 규칙 작업이 SNS 토픽에 메시지를 게시하도록 구성합니다.", "AWS 지원 API와 예약된 Lambda 함수를 사용하여 악용 신고 사례를 감지합니다.", "AWS CloudTrail 로그와 메트릭 필터를 사용하여 AWS_ABUSE_DOS_REPORT 이벤트를 감지합니다."], "answer": "B", "multi": false, "explanation": "AWS Health는 AWS_ABUSE_DOS_REPORT와 같은 남용 알림을 포함하여 AWS 계정에 영향을 미치는 이벤트에 대한 실시간 가시성을 제공합니다. AWS Certified Security - Specialty Study Guide에 따르면, AWS Health 이벤트는 Amazon EventBridge와 기본적으로 통합되어 있어 폴링이나 맞춤 코드를 사용하지 않고도 자동화된 거의 실시간 반응이 가능합니다. 남용 보고와 관련된 AWS Health 이벤트를 수신하도록 EventBridge 규칙을 생성하고, 해당 규칙이 메시지를 SNS 주제로 게시하도록 구성함으로써 보안 엔지니어는 AWS가 계정에 대해 DoS 관련 남용 보고서를 발행할 때마다 보안 팀에 즉시 알림이 가도록 보장합니다."},
  {"id": 187, "text": "한 회사가 인터넷에 접속할 수 없고 프라이빗 DNS 호스트 이름 옵션이 활성화된 VPC를 보유하고 있습니다. 이 VPC 내에서 Amazon Aurora 데이터베이스가 실행 중입니다. 보안 엔지니어는 AWS Secrets Manager를 사용하여 Aurora 데이터베이스의 자격 증명을 자동으로 갱신하려고 합니다. 보안 엔지니어는 Secrets Manager의 기본 AWS Lambda 자격 증명 갱신 함수가 Aurora 데이터베이스가 사용하는 동일한 VPC 내에서 실행되도록 구성합니다. 하지만 보안 엔지니어는 Lambda 함수가 Secrets Manager 엔드포인트와 통신할 수 없기 때문에 암호를 제대로 변경할 수 없다는 것을 확인했습니다. 보안 엔지니어가 Lambda 함수가 Secrets Manager 엔드포인트와 통신할 수 있도록 하는 가장 안전한 방법은 무엇일까요?", "choices": ["Secrets Manager 엔드포인트에 대한 액세스를 허용하도록 VPC에 NAT 게이트웨이를 추가합니다.", "Secrets Manager 엔드포인트에 대한 액세스를 허용하기 위해 VPC에 게이트웨이 VPC 엔드포인트를 추가합니다.", "Secrets Manager 엔드포인트에 대한 액세스를 허용하기 위해 VPC에 인터페이스 VPC 엔드포인트를 추가합니다.", "VPC에 인터넷 게이트웨이를 추가하여 Secrets Manager 엔드포인트에 대한 액세스를 허용합니다."], "answer": "C", "multi": false, "explanation": "AWS Secrets Manager는 프라이빗 AWS 엔드포인트를 통해 액세스되는 지역 서비스입니다. 인터넷 액세스가 불가능한 VPC에서 AWS는 지원되는 AWS 서비스에 대한 안전한 프라이빗 연결을 활성화하기 위해 인터페이스 VPC 엔드포인트를 통해 AWS PrivateLink를 사용할 것을 권장합니다. AWS 공인 보안 - 전문 문서에 따르면 인터페이스 VPC 엔드포인트를 사용하면 VPC 내의 리소스가 공용 인터넷, NAT 장치 또는 인터넷 게이트웨이를 통과하지 않고도 AWS 서비스와 통신할 수 있습니다. Secrets Manager용 인터페이스 VPC 엔드포인트는 VPC 서브넷 내에 탄력적 네트워크 인터페이스(ENI)를 생성하고 트래픽을 Secrets Manager 서비스로 직접 라우팅하는 프라이빗 IP 주소를 할당합니다. VPC에는 프라이빗 DNS가 활성화되어 있으므로 표준 Secrets Manager DNS 호스트 이름은 인터페이스 엔드포인트의 프라이빗 IP 주소로 확인되어 Lambda 교체 기능이 안전하고 투명하게 통신할 수 있습니다. 옵션 A는 불필요한 복잡성을 도입하고 아웃바운드 인터넷 액세스를 허용하여 공격 표면을 확장합니다. 게이트웨이 VPC 엔드포인트는 Amazon S3 및 Amazon DynamoDB에 대해서만 지원되므로 옵션 B는 올바르지 않습니다. 옵션 D는 VPC를 인터넷에 노출하여 보안 요구 사항을 위반합니다. AWS 보안 모범 사례에서는 AWS 관리형 서비스에 액세스하는 프라이빗 VPC 워크로드에 대한 가장 안전한 연결 방법으로 인터페이스 VPC 엔드포인트를 명시적으로 권장합니다."},
  {"id": 188, "text": "지난 6개월 동안 회사의 플랫폼이 급속도로 성장했습니다. 회사의 플랫폼 아키텍처는 이러한 성장에 맞춰 빠르게 진화했습니다. 개발팀은 다양한 AWS 서비스를 활용하여 기능을 신속하게 배포해 왔습니다. 하지만 개발팀은 공식적인 아키텍처 검토를 수행하지 않았습니다. 해당 회사는 AWS 보안 모범 사례에 비추어 자사의 보안 상태를 평가해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Well-Architected Tool에서 새 워크로드를 생성합니다. 개발팀과 협력하여 팀의 현재 상태를 기반으로 보안 질문에 대한 답변을 찾습니다. 마일스톤 저장 기능을 사용하여 식별된 고위험 항목에 대한 개선 사항을 추적합니다.", "AWS Cost Explorer의 비용 권장 사항을 활용하십시오. 보안 구성 오류로 인한 비용 영향을 분석하십시오. AWS 보안 모범 사례 구현으로 인한 잠재적 비용 절감 효과를 기준으로 아키텍처 변경의 우선순위를 정하십시오.", "AWS Security Hub CSPM을 활성화합니다. 기존 서비스를 승인된 아키텍처 패턴에 매핑하는 Security Hub CSPM 자동화 규칙을 생성합니다. 해당 데이터를 사용하여 AWS 모범 사례를 준수하지 않는 부분을 식별하고 규정 준수 보고서를 생성합니다.", "Amazon Detective를 활성화합니다. AWS 보안 모범 사례에 대한 Detective 조사를 생성합니다. 동작 그래프를 사용하여 데이터를 시각화합니다. 엔티티를 분석하여 AWS 보안 모범 사례를 준수하지 않는 아키텍처 구성 요소를 식별합니다."], "answer": "A", "multi": false, "explanation": "AWS Well-Architected Tool은 보안 기둥을 포함한 AWS 모범 사례에 따라 워크로드를 평가하도록 설계되었습니다. 워크로드를 생성하고 현재 아키텍처를 기반으로 보안 질문에 답함으로써 회사는 아이덴티티, 탐지, 인프라 보호, 데이터 보호 및 사고 대응 관행에 대한 구조화된 검토를 받을 수 있습니다. 마일스톤은 특정 시점의 워크로드 상태를 기록하고, 높은 위험도의 문제가 수정될 때 개선 사항을 추적하는 데 도움이 됩니다. Cost Explorer는 보안 상태 검토가 아닌 비용 분석을 위한 도구입니다. Security Hub CSPM은 통제 결과를 제공하지만 전체 Well-Architected 워크로드 검토를 대체하지는 않습니다. Amazon Detective는 보안 발견 조사를 지원하며, 아키텍처 모범 사례 평가를 지원하지는 않습니다."},
  {"id": 189, "text": "한 회사가 모든 AWS Lambda 함수의 코드 취약점을 검사해야 합니다.", "choices": ["Amazon Macie를 사용하세요.", "Amazon Inspector Lambda 스캔을 활성화합니다.", "GuardDuty와 Security Hub를 사용하세요.", "GuardDuty Lambda Protection을 사용합니다."], "answer": "B", "multi": false, "explanation": "Amazon Inspector는 네이티브 Lambda 코드 취약점 스캔을 제공합니다. GuardDuty는 정적 코드 분석이 아니라 런타임 위협에 중점을 둡니다."},
  {"id": 190, "text": "애플리케이션이 IAM 역할이 연결된 Amazon EC2 인스턴스에서 실행 중입니다. 이 IAM 역할은 AWS Key Management Service(AWS KMS) 고객 관리형 키와 Amazon S3 버킷에 대한 액세스 권한을 제공합니다. 해당 키는 S3 버킷에 저장된 2TB의 민감한 데이터에 접근하는 데 사용됩니다. 보안 엔지니어는 민감한 데이터 유출로 이어질 수 있는 EC2 인스턴스의 잠재적 취약점을 발견했습니다. 다른 중요한 작업 때문에 보안 엔지니어는 취약점 패치를 위해 EC2 인스턴스를 즉시 종료할 수 없습니다. 민감한 데이터가 노출되는 것을 막는 가장 빠른 방법은 무엇일까요?", "choices": ["기존 S3 버킷의 데이터를 새 EC2 인스턴스로 다운로드합니다. 그런 다음 S3 버킷에서 데이터를 삭제합니다. 클라이언트 기반 키로 데이터를 다시 암호화합니다. 데이터를 새 S3 버킷에 업로드합니다.", "호스트 기반 방화벽을 사용하여 S3 엔드포인트 IP 주소의 공용 범위에 대한 액세스를 차단합니다. 영향을 받는 EC2 인스턴스에서 인터넷으로 향하는 트래픽이 호스트 기반 방화벽을 통해 라우팅되도록 합니다.", "IAM 역할의 활성 세션 권한을 취소합니다. S3 버킷 정책을 업데이트하여 IAM 역할에 대한 액세스를 거부합니다. EC2 인스턴스 프로필에서 IAM 역할을 제거합니다.", "현재 키를 비활성화합니다. IAM 역할에 액세스 권한이 없는 새 KMS 키를 생성하고 새 키로 모든 데이터를 다시 암호화합니다. 손상된 키를 삭제하도록 예약합니다."], "answer": "C", "multi": false, "explanation": "AWS 사고 대응 모범 사례에서는 추가 데이터 노출을 방지하기 위한 신속한 억제를 강조합니다. AWS 공인 보안 – 전문 분야 연구 가이드에 따르면 손상된 컴퓨팅 리소스에 대한 가장 빠르고 방해가 적은 봉쇄 방법은 데이터나 인프라를 수정하는 대신 자격 증명과 권한을 즉시 취소하는 것입니다. IAM 역할의 활성 세션을 취소하면 EC2 인스턴스가 AWS 서비스에 계속 액세스할 수 없습니다. IAM 역할에 대한 액세스를 명시적으로 거부하도록 S3 버킷 정책을 업데이트하면 임시 자격 증명이 캐시된 상태로 유지되더라도 즉시 적용됩니다. 인스턴스 프로파일에서 IAM 역할을 제거하면 새 자격 증명이 발급되는 것이 더 이상 방지됩니다. 옵션 A와 D에는 대규모 데이터 이동이나 재암호화가 포함되며, 이는 시간이 많이 걸리고 운영상 비용이 많이 듭니다. 옵션 B는 프라이빗 AWS 엔드포인트를 통한 액세스를 차단하지 않는 네트워크 수준 제어를 사용합니다. AWS 지침에서는 활성 사고 중 가장 빠른 봉쇄 단계로 자격 증명 취소 및 정책 기반 거부를 명시적으로 권장합니다."},
