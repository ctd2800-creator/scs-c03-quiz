<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SCS-C03 모의고사</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1a2236; --border:#1e3a5f;
    --accent:#00d4ff; --accent2:#ff6b35; --success:#00e676; --error:#ff1744;
    --warning:#ffd600; --text:#e8f0fe; --text2:#8bacd0; --text3:#4a6680;
  }
  * { margin:0; padding:0; -webkit-box-sizing:border-box; box-sizing:border-box; }
  html, body { -webkit-text-size-adjust:100%; }
  body {
    font-family:'Noto Sans KR',sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh;
    display:-webkit-flex; display:flex;
    -webkit-flex-direction:column; flex-direction:column;
    -webkit-align-items:center; align-items:center;
    padding:20px;
  }
  .header {
    width:100%; max-width:900px;
    display:-webkit-flex; display:flex;
    -webkit-align-items:center; align-items:center;
    -webkit-justify-content:space-between; justify-content:space-between;
    padding:16px 0 20px; border-bottom:1px solid var(--border); margin-bottom:24px;
  }
  .logo { display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; gap:10px; }
  .logo-badge { background:-webkit-linear-gradient(135deg,#ff6b35,#ff9800); background:linear-gradient(135deg,#ff6b35,#ff9800); color:#fff; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; padding:4px 10px; border-radius:4px; letter-spacing:1px; }
  .logo-text { font-size:15px; font-weight:700; color:var(--text); }
  .stats-bar { display:-webkit-flex; display:flex; gap:16px; -webkit-align-items:center; align-items:center; }
  .stat { display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; -webkit-align-items:center; align-items:center; gap:2px; }
  .stat-val { font-family:'JetBrains Mono',monospace; font-size:17px; font-weight:700; color:var(--accent); }
  .stat-lbl { font-size:10px; color:var(--text3); letter-spacing:0.5px; text-transform:uppercase; }
  .stat-sep { width:1px; height:28px; background:var(--border); }

  /* ───── START SCREEN ───── */
  #startScreen { max-width:900px; width:100%; padding:20px 0; }
  .start-title { font-size:26px; font-weight:900; text-align:center; margin-bottom:8px; background:-webkit-linear-gradient(135deg,var(--accent),#7b8cff); background:linear-gradient(135deg,var(--accent),#7b8cff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .start-sub { color:var(--text2); font-size:13px; text-align:center; margin-bottom:28px; line-height:1.6; }
  .section-label { margin-bottom:12px; font-size:12px; color:var(--text2); font-weight:700; letter-spacing:0.5px; text-transform:uppercase; }

  /* 프리셋 카드 */
  .options-grid { display:-webkit-flex; display:flex; -webkit-flex-wrap:wrap; flex-wrap:wrap; gap:10px; margin-bottom:14px; }
  .opt-card {
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:12px; padding:14px 10px; cursor:pointer;
    -webkit-transition:all 0.2s; transition:all 0.2s;
    text-align:center; -webkit-flex:1; flex:1; min-width:70px;
    -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;
    touch-action:manipulation; font-family:'Noto Sans KR',sans-serif;
    color:var(--text); -webkit-appearance:none; appearance:none; outline:none;
  }
  .opt-card:active { opacity:0.7; }
  .opt-card.selected { border-color:var(--accent); background:rgba(0,212,255,0.1); -webkit-box-shadow:0 0 14px rgba(0,212,255,0.2); box-shadow:0 0 14px rgba(0,212,255,0.2); }
  .opt-num { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--accent); margin-bottom:3px; }
  .opt-label { font-size:11px; color:var(--text2); }
  .opt-card .num-input-inline {
    background:var(--surface2); border:1.5px solid var(--border); border-radius:8px;
    color:var(--text); font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700;
    padding:5px 8px; width:64px; text-align:center; outline:none; margin-top:4px;
    -webkit-appearance:none; appearance:none; touch-action:manipulation;
  }
  .opt-card .num-input-inline:focus { border-color:var(--accent); }

  /* 범위 지정 */
  .custom-range-row {
    display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center;
    -webkit-flex-wrap:wrap; flex-wrap:wrap; gap:8px;
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:12px; padding:12px 16px; margin-bottom:18px;
  }
  .custom-range-row.active { border-color:var(--accent); background:rgba(0,212,255,0.06); }
  .custom-range-row label { font-size:12px; color:var(--text2); font-weight:700; white-space:nowrap; }
  .range-inputs { display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; gap:6px; -webkit-flex-wrap:wrap; flex-wrap:wrap; }
  .range-inputs span { color:var(--text3); font-size:12px; }
  .num-input { background:var(--surface2); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700; padding:7px 8px; width:62px; text-align:center; outline:none; -webkit-appearance:none; appearance:none; }
  .num-input:focus { border-color:var(--accent); }
  .range-preview { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--accent); }
  .range-error { font-size:12px; color:var(--error); }

  /* ── 문제 선택 그리드 ── */
  .qselect-header {
    display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center;
    -webkit-justify-content:space-between; justify-content:space-between;
    margin-bottom:10px; -webkit-flex-wrap:wrap; flex-wrap:wrap; gap:8px;
  }
  .qselect-count { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent); font-weight:700; }
  .qselect-actions { display:-webkit-flex; display:flex; gap:6px; }
  .btn-xs {
    font-family:'Noto Sans KR',sans-serif; font-size:11px; font-weight:700;
    border:1px solid var(--border); border-radius:6px; padding:5px 10px;
    background:transparent; color:var(--text2); cursor:pointer;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
    -webkit-appearance:none; appearance:none;
  }
  .btn-xs:active { opacity:0.7; }
  .btn-xs.accent { border-color:var(--accent); color:var(--accent); }
  .btn-xs.danger { border-color:var(--error); color:var(--error); }

  .qgrid {
    display:-webkit-flex; display:flex; -webkit-flex-wrap:wrap; flex-wrap:wrap;
    gap:6px; margin-bottom:20px;
    max-height:220px; overflow-y:auto; -webkit-overflow-scrolling:touch;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:14px;
  }
  .qbtn {
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
    width:40px; height:34px; border-radius:7px;
    border:1.5px solid var(--border); background:var(--surface2);
    color:var(--text2); cursor:pointer;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
    -webkit-transition:all 0.12s; transition:all 0.12s;
    -webkit-appearance:none; appearance:none;
    display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center;
  }
  .qbtn:active { opacity:0.6; }
  .qbtn.on { border-color:var(--accent); background:rgba(0,212,255,0.15); color:var(--accent); }

  .btn-start {
    width:100%; background:-webkit-linear-gradient(135deg,var(--accent),#7b8cff); background:linear-gradient(135deg,var(--accent),#7b8cff);
    color:#000; font-family:'Noto Sans KR',sans-serif; font-size:16px; font-weight:700;
    border:none; border-radius:12px; padding:16px; cursor:pointer;
    -webkit-transition:all 0.2s; transition:all 0.2s;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation;
    -webkit-appearance:none; appearance:none;
  }
  .btn-start:active { opacity:0.8; }
  .btn-start:disabled { opacity:0.4; cursor:not-allowed; }

  /* ───── QUIZ SCREEN ───── */
  #quizScreen { max-width:900px; width:100%; display:none; }
  .quiz-topbar { display:-webkit-flex; display:flex; -webkit-justify-content:space-between; justify-content:space-between; -webkit-align-items:center; align-items:center; margin-bottom:10px; gap:8px; -webkit-flex-wrap:wrap; flex-wrap:wrap; }
  .quiz-left { display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; gap:10px; }
  .q-counter { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent); font-weight:700; }
  .q-timer { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text2); }
  .quiz-right { display:-webkit-flex; display:flex; gap:6px; -webkit-align-items:center; align-items:center; }
  .btn-sm {
    font-family:'Noto Sans KR',sans-serif; font-size:12px; font-weight:700;
    border-radius:7px; padding:7px 11px; cursor:pointer;
    -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;
    touch-action:manipulation; -webkit-appearance:none; appearance:none; outline:none;
  }
  .btn-home { background:transparent; color:var(--text3); border:1px solid var(--border); }
  .btn-home:active { opacity:0.7; }
  .btn-midcheck { background:rgba(255,214,0,0.12); color:var(--warning); border:1px solid rgba(255,214,0,0.3); }
  .btn-midcheck:active { background:rgba(255,214,0,0.25); }

  .progress-bar { height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; margin-bottom:14px; }
  .progress-fill { height:100%; background:-webkit-linear-gradient(left,var(--accent),#7b8cff); background:linear-gradient(90deg,var(--accent),#7b8cff); border-radius:2px; -webkit-transition:width 0.4s ease; transition:width 0.4s ease; }

  .q-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:22px 22px; margin-bottom:14px; }
  .q-tags { display:-webkit-flex; display:flex; gap:6px; margin-bottom:12px; -webkit-flex-wrap:wrap; flex-wrap:wrap; }
  .q-tag { font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; padding:3px 9px; border-radius:4px; background:rgba(0,212,255,0.1); color:var(--accent); border:1px solid rgba(0,212,255,0.2); }
  .q-tag.multi { background:rgba(255,107,53,0.1); color:var(--accent2); border-color:rgba(255,107,53,0.2); }
  .q-text { font-size:14px; line-height:1.9; color:var(--text); white-space:pre-wrap; word-break:keep-all; }

  .choices-list { display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; gap:8px; margin-bottom:14px; }
  .choice-btn {
    background:var(--surface2); border:1.5px solid var(--border); border-radius:10px;
    padding:13px 14px; text-align:left; cursor:pointer;
    -webkit-transition:border-color 0.15s,background 0.15s; transition:border-color 0.15s,background 0.15s;
    display:-webkit-flex; display:flex; -webkit-align-items:flex-start; align-items:flex-start;
    gap:10px; color:var(--text); font-family:'Noto Sans KR',sans-serif;
    font-size:14px; line-height:1.7; width:100%;
    -webkit-tap-highlight-color:transparent; -webkit-appearance:none; appearance:none;
    touch-action:manipulation; word-break:keep-all;
  }
  .choice-btn:active { opacity:0.75; }
  .choice-btn.selected { border-color:var(--accent); background:rgba(0,212,255,0.1); }
  .choice-btn.correct { border-color:var(--success); background:rgba(0,230,118,0.1); color:var(--success); }
  .choice-btn.wrong { border-color:var(--error); background:rgba(255,23,68,0.1); color:#ff6b6b; }
  .choice-btn.reveal-correct { border-color:var(--success); background:rgba(0,230,118,0.06); }
  .choice-label { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:12px; min-width:18px; color:var(--text2); padding-top:2px; -webkit-flex-shrink:0; flex-shrink:0; }
  .choice-btn.correct .choice-label, .choice-btn.reveal-correct .choice-label { color:var(--success); }
  .choice-btn.wrong .choice-label { color:var(--error); }
  .choice-btn.selected .choice-label { color:var(--accent); }

  .feedback-box { margin-top:4px; padding:11px 14px; border-radius:10px; font-size:13px; line-height:1.6; display:none; }
  .feedback-box.correct-fb { background:rgba(0,230,118,0.08); border:1px solid rgba(0,230,118,0.25); color:var(--success); display:block; }
  .explain-box { margin-top:10px; padding:13px 15px; border-radius:10px; font-size:13px; line-height:1.7; display:none; background:var(--surface2); border:1px solid var(--border); color:var(--text2); }
  .explain-box.show { display:block; }
  .explain-box .explain-title { font-size:11px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }
  .feedback-box.wrong-fb { background:rgba(255,23,68,0.08); border:1px solid rgba(255,23,68,0.25); color:#ff6b6b; display:block; }

  .action-row { display:-webkit-flex; display:flex; gap:8px; -webkit-justify-content:space-between; justify-content:space-between; -webkit-align-items:center; align-items:center; margin-top:12px; }
  .action-left { display:-webkit-flex; display:flex; gap:8px; }
  .action-right { display:-webkit-flex; display:flex; gap:8px; }
  .btn {
    font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700;
    border:none; border-radius:8px; padding:11px 20px; cursor:pointer;
    -webkit-transition:all 0.2s; transition:all 0.2s;
    -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;
    touch-action:manipulation; -webkit-appearance:none; appearance:none;
  }
  .btn-primary { background:-webkit-linear-gradient(135deg,var(--accent),#7b8cff); background:linear-gradient(135deg,var(--accent),#7b8cff); color:#000; }
  .btn-primary:active { opacity:0.8; }
  .btn-primary:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-secondary { background:transparent; color:var(--text2); border:1px solid var(--border); }
  .btn-secondary:active { opacity:0.7; }
  .btn-prev { background:rgba(0,212,255,0.08); color:var(--accent); border:1px solid rgba(0,212,255,0.3); }
  .btn-prev:active { background:rgba(0,212,255,0.18); }
  .btn-prev:disabled { opacity:0.25; cursor:not-allowed; }

  /* ───── MODAL ───── */
  .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.75); z-index:1000; -webkit-align-items:center; align-items:center; -webkit-justify-content:center; justify-content:center; }
  .modal-overlay.open { display:-webkit-flex; display:flex; }
  .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:26px 24px; max-width:440px; width:90%; text-align:center; margin:auto; }
  .modal-title { font-size:17px; font-weight:900; margin-bottom:8px; color:var(--text); }
  .modal-sub { font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:18px; }
  .modal-actions { display:-webkit-flex; display:flex; gap:10px; -webkit-justify-content:center; justify-content:center; }
  .mid-grid { display:-webkit-flex; display:flex; gap:8px; margin-bottom:18px; }
  .mid-stat { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 8px; -webkit-flex:1; flex:1; }
  .mid-stat-val { font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; margin-bottom:3px; }
  .mid-stat-val.green { color:var(--success); }
  .mid-stat-val.red { color:var(--error); }
  .mid-stat-val.orange { color:var(--accent2); }
  .mid-stat-lbl { font-size:11px; color:var(--text3); }

  /* ───── RESULT SCREEN ───── */
  #resultScreen { max-width:900px; width:100%; display:none; text-align:center; }
  .result-score-ring { margin:24px auto 20px; position:relative; width:130px; height:130px; }
  .result-score-ring svg { width:130px; height:130px; -webkit-transform:rotate(-90deg); transform:rotate(-90deg); }
  .result-score-ring .ring-bg { fill:none; stroke:var(--surface2); stroke-width:10; }
  .result-score-ring .ring-fill { fill:none; stroke:var(--accent); stroke-width:10; stroke-linecap:round; -webkit-transition:stroke-dashoffset 0.8s ease; transition:stroke-dashoffset 0.8s ease; }
  .ring-label { position:absolute; top:50%; left:50%; -webkit-transform:translate(-50%,-50%); transform:translate(-50%,-50%); text-align:center; }
  .ring-pct { font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:700; color:var(--accent); }
  .ring-grade { font-size:11px; color:var(--text2); margin-top:2px; }
  .result-title { font-size:19px; font-weight:900; margin-bottom:6px; color:var(--text); }
  .result-sub { color:var(--text2); font-size:13px; margin-bottom:20px; line-height:1.5; }
  .result-grid { display:-webkit-flex; display:flex; gap:8px; margin-bottom:20px; }
  .result-stat { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 6px; -webkit-flex:1; flex:1; }
  .result-stat-val { font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; margin-bottom:3px; }
  .result-stat-val.green { color:var(--success); }
  .result-stat-val.red { color:var(--error); }
  .result-stat-val.blue { color:var(--accent); }
  .result-stat-val.orange { color:var(--accent2); }
  .result-stat-lbl { font-size:10px; color:var(--text3); }
  .wrong-list { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; margin-bottom:18px; text-align:left; max-height:320px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .wrong-list-title { font-size:12px; font-weight:700; color:var(--text2); margin-bottom:10px; letter-spacing:0.5px; text-transform:uppercase; }
  .wrong-item { display:-webkit-flex; display:flex; -webkit-align-items:flex-start; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .wrong-item:last-child { border-bottom:none; }
  .wrong-qnum { font-family:'JetBrains Mono',monospace; color:var(--error); font-weight:700; min-width:36px; }
  .wrong-qtext { color:var(--text2); line-height:1.5; word-break:keep-all; }
  .result-actions { display:-webkit-flex; display:flex; gap:8px; -webkit-justify-content:center; justify-content:center; -webkit-flex-wrap:wrap; flex-wrap:wrap; }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--surface2); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span class="logo-badge">AWS</span>
    <span class="logo-text">SCS-C03 모의고사</span>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-val">267</div><div class="stat-lbl">총 문제</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-val">Pro</div><div class="stat-lbl">레벨</div></div>
  </div>
</div>

<!-- ═══ START ═══ -->
<div id="startScreen">
  <div class="start-title">AWS Security Specialty 모의고사</div>
  <div class="start-sub">SCS-C03-KR · 267문제 기출 덤프 · 랜덤 출제 · 즉시 해설</div>

  <!-- 프리셋 -->
  <div class="section-label">빠른 선택</div>
  <div class="options-grid">
    <button class="opt-card" id="card10" type="button" onclick="selectPreset(10,'card10')">
      <div class="opt-num">10</div><div class="opt-label">빠른 테스트</div>
    </button>
    <button class="opt-card selected" id="card20" type="button" onclick="selectPreset(20,'card20')">
      <div class="opt-num">20</div><div class="opt-label">기본</div>
    </button>
    <button class="opt-card" id="card97" type="button" onclick="selectPreset(267,'card97')">
      <div class="opt-num">267</div><div class="opt-label">전체</div>
    </button>
    <button class="opt-card" id="cardCustom" type="button" onclick="focusCustomCount()">
      <div id="customCountDisplay" class="opt-num" style="font-size:14px;line-height:1.4;">직접<br>입력</div>
      <input class="num-input-inline" id="customCountInput" type="number" min="1" max="267" placeholder="1~267"
        onclick="event.stopPropagation()" oninput="onCustomCountInput()" onfocus="onCustomCountFocus()">
    </button>
  </div>

  <!-- 범위 지정 -->
  <div class="custom-range-row" id="customRangeRow">
    <label>범위 지정</label>
    <div class="range-inputs">
      <span>Q</span>
      <input class="num-input" id="rangeFrom" type="number" min="1" max="267" placeholder="1" oninput="onRangeInput()">
      <span>~</span>
      <span>Q</span>
      <input class="num-input" id="rangeTo" type="number" min="1" max="267" placeholder="267" oninput="onRangeInput()">
      <span id="rangePreview" class="range-preview"></span>
    </div>
  </div>

  <!-- 문제 선택 그리드 -->
  <div class="section-label">문제 직접 선택 <span id="selectModeLabel" style="color:var(--accent);font-size:11px;margin-left:6px;">랜덤 출제 모드</span></div>
  <div class="qselect-header">
    <span class="qselect-count" id="qselectCount">선택: 267 / 267</span>
    <div class="qselect-actions">

<script>
var ALL_QUESTIONS = [
  {"id": 1, "text": "한 기업이 컨테이너 워크로드를 데이터 센터에서 Amazon Elastic Container Service(Amazon ECS) 클러스터로 마이그레이션하고 있습니다. 이 기업은 워크로드에서 발생할 수 있는 잠재적 위협을 탐지하고 컨테이너 클러스터의 보안 수준을 향상시키는 솔루션을 구현해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇일까요?", "choices": ["ECS 클러스터가 실행 중인 VPC에 Amazon Inspector를 구성합니다.", "ECS 클러스터에서 Amazon GuardDuty 런타임 모니터링을 활성화합니다.", "Amazon CloudWatch 로그를 사용하여 Amazon ECS API 액세스를 감사하고 무단 액세스를 식별합니다.", "동일한 VPC 내에 컨테이너 클러스터를 생성합니다. VPC 흐름 로그를 사용하여 네트워크 트래픽을 중앙에서 모니터링합니다."], "answer": "B", "multi": false, "explanation": "Amazon GuardDuty 실행 시간 모니터링은 잠재적인 위협을 감지하고 Amazon ECS 클러스터의 보안 상태를 개선하도록 특별히 설계되었습니다. GuardDuty 실행 시간 모니터링은 ECS 환경 내의 비정상적인 행동과 같은 잠재적인 보안 문제를 식별하기 위해 컨테이너 활동에 대한 상세한 분석을 제공합니다. 이 접근 방식은 컨테이너화된 워크로드에서 네트워크 및 애플리케이션 수준의 위협을 모두 모니터링하는 데 효과적입니다."},
  {"id": 2, "text": "한 회사가 AWS 월별 요금 인상 원인을 조사하고 있습니다. 조사 결과, 악의적인 공격자가 일부 Amazon EC2 인스턴스를 해킹하여 대규모 이메일 피싱 캠페인용 웹페이지를 제공한 것으로 밝혀졌습니다. 보안 엔지니어는 향후 비용 증가를 모니터링하고 악의적인 활동을 감지하는 솔루션을 구현해야 합니다. 어떤 솔루션이 회사에 비용 증가를 가장 빨리 감지할 수 있도록 해줄까요?", "choices": ["Amazon EventBridge 규칙을 생성하여 AWS Lambda 함수를 매시간 호출합니다. Lambda 함수가 AWS Data Exports에서 모든 서비스 사용량에 대한 AWS 사용량 보고서를 다운로드하도록 프로그래밍합니다. Lambda 함수가 보고서를 분석하고 이상 징후가 감지되면 알림을 보내도록 프로그래밍합니다.", "AWS 비용 이상 감지에서 비용 모니터를 생성합니다. 예상 비용 대비 초과 비율이 임계값을 초과할 경우 Amazon Simple Notification Service(Amazon SNS) 토픽으로 알림을 보내도록 개별 알림을 구성합니다.", "AWS Cost Explorer를 매일 검토하여 이전 달 대비 비용 변동 사항을 파악하십시오. 이전 달 대비 비용이 크게 증가한 서비스의 사용량을 검토하십시오.", "EC2 인스턴스가 실행되는 VPC에서 VPC 흐름 로그를 캡처합니다. 타사 네트워크 분석 도구를 사용하여 흐름 로그를 분석하고 비용 증가를 초래할 수 있는 네트워크 트래픽의 이상 징후를 감지합니다."], "answer": "B", "multi": false, "explanation": "비정상적인 지출을 가장 조기에 감지하기 위한 가장 직접적이고 목적에 맞게 설계된 기능은 AWS 비용 이상 탐지(AWS Cost Anomaly Detection)입니다. 이 기능은 지출 패턴을 지속적으로 평가하고 기계 학습을 사용하여 예상치 못한 비용 증가를 발생 직후에 식별하며, 구성된 기준에 따라 알림을 전송합니다. 비용 모니터를 생성(예: 연결된 계정, 서비스 또는 비용 범주에 대해)하고 SNS로 게시할 알림을 구성함으로써 보안 팀은 비용이 예상 기준을 벗어날 때 거의 실시간으로 알림을 받을 수 있습니다. 이는 피싱 페이지를 제공하는 악용된 EC2 인스턴스, 암호화폐 채굴 또는 전송 비용을 증가시키는 데이터 유출 패턴과 같은 침해 기반 지출을 감지하는 데 적합합니다."},
  {"id": 3, "text": "한 기업이 Amazon Elastic Block Store(Amazon EBS) 볼륨의 스냅샷을 매년 생성해야 합니다. 생성된 스냅샷은 10년간 보관해야 하며, AWS Key Management Service(AWS KMS)를 사용하여 EBS 볼륨과 스냅샷을 암호화해야 합니다. 암호화 키는 매년 자동으로 교체되어야 합니다. 이전 연도에 생성된 스냅샷은 암호화 키 교체 후에도 읽을 수 있어야 합니다. 이러한 요구 사항을 충족하기 위해 회사는 어떤 유형의 KMS 키를 암호화에 사용해야 할까요?", "choices": ["AWS KMS에서 생성된 키 자료를 사용하는 비대칭 AWS 관리형 KMS 키", "AWS KMS에서 생성된 키 자료를 사용하는 대칭형 고객 관리 KMS 키", "사용자 정의 가져오기 키 자료를 사용하는 대칭형 고객 관리 KMS 키", "사용자 지정으로 가져온 키 자료를 사용하는 비대칭 AWS 관리형 KMS 키"], "answer": "B", "multi": false, "explanation": "AWS KMS를 사용한 EBS 볼륨 암호화의 경우, 대칭 고객 관리형 KMS 키가 자동 키 교체를 지원하고 EBS 볼륨 및 스냅샷 암호화와 호환되기 때문에 권장됩니다. AWS KMS는 이전 키 버전을 자동으로 관리하여, 키 교체 이후에도 이전 키 버전으로 생성된 스냅샷이 계속 읽을 수 있도록 보장합니다. 이는 연간 자동 교체 및 이전 스냅샷 읽기를 위한 하위 호환성 요구 사항을 충족합니다."},
  {"id": 4, "text": "한 회사가 AWS IAM Identity Center를 SAML 2.0 페더레이션과 함께 사용하고 있습니다. 이 회사는 페더레이션 소스를 하나의 ID 공급자(IdP)에서 다른 IdP로 변경하기로 결정했습니다. 두 IdP 모두 기본 디렉터리는 Active Directory입니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["원래 IdP와의 페더레이션에 참여했던 IAM Identity Center 내의 모든 기존 사용자 및 그룹을 비활성화합니다.", "새 IdP가 보내는 정보와 일치하도록 IAM Identity Center 신뢰 관계 내의 속성 매핑을 수정합니다.", "회사 AWS 계정의 기존 IAM 역할을 모두 재구성하여 새 IdP를 주체로 명시적으로 신뢰하도록 합니다.", "IAM Identity Center와 새 IdP 엔드포인트 간에 네트워크 시간 프로토콜(NTP) 클록 편차가 올바르게 설정되었는지 확인합니다."], "answer": "B", "multi": false, "explanation": "AWS IAM Identity Center는 SAML 어설션 및 속성 매핑을 사용하여 연합된 사용자를 자격 증명, 그룹 및 권한 집합과 연결합니다. AWS 공인 보안 - 전문 문서에 따르면 동일한 기본 디렉터리를 유지하면서 자격 증명 공급자를 변경할 때 새 IdP의 SAML 어설션에 맞게 속성 매핑을 업데이트하여 기존 사용자 및 그룹 자격 증명을 보존할 수 있습니다. 속성 매핑을 수정함으로써 IAM Identity Center는 AWS 계정 역할이나 권한 세트를 변경할 필요 없이 새 IdP가 전송한 사용자 이름, 그룹 멤버십 및 고유 식별자를 올바르게 해석할 수 있습니다. 이 접근 방식은 운영 노력을 최소화하고 액세스 관리 중단을 방지합니다. 옵션 A는 불필요하게 ID를 비활성화하고 액세스 중단을 유발합니다. IAM ID 센터는 역할 신뢰 관계를 추상화하고 역할은 IdP를 직접 신뢰하지 않기 때문에 옵션 C는 올바르지 않습니다. 옵션 D는 페더레이션 소스 구성과 관련이 없으며 인증 타이밍 문제에만 영향을 미칩니다. AWS 모범 사례에서는 동일한 디렉터리 소스를 공유하는 IdP를 전환할 때 속성 매핑을 업데이트할 것을 권장합니다."},
  {"id": 5, "text": "한 회사가 AWS IAM Identity Center를 사용하여 AWS 계정에 대한 액세스를 관리합니다. 해당 계정들은 AWS Organizations의 조직에 속해 있습니다. 보안 엔지니어는 조직의 관리 계정에 IAM Identity Center에 대한 위임된 관리 권한을 설정해야 합니다. 보안 엔지니어는 위임된 관리 권한을 구성하기 전에 IAM Identity Center에서 어떤 단계 조합을 수행해야 합니까? (세 가지를 선택하십시오.)", "choices": ["조직의 관리 계정에 최소 권한 액세스 권한을 부여합니다.", "조직의 관리 계정에 새 IAM Identity Center 디렉터리를 생성합니다.", "조직의 관리 계정에 두 번째 AWS 리전을 설정합니다.", "조직의 관리 계정에서만 사용할 권한 세트를 생성합니다.", "조직의 관리 계정에서만 사용할 IAM 사용자를 생성합니다.", "사용자 할당은 조직의 관리 계정에서만 생성합니다."], "answer": "B,D,F", "multi": true, "explanation": "AWS IAM Identity Center 위임 관리를 위해서는 위임하기 전에 조직의 마스터 계정에서 기본 구성을 완료해야 합니다. AWS 공인 보안 – 전문 문서에 따르면 위임이 발생하기 전에 마스터 계정의 디렉터리를 사용하여 IAM 자격 증명 센터를 활성화해야 합니다. 권한 집합은 나중에 회원 계정에 위임될 권한을 정의하기 때문에 마스터 계정에서 생성되어야 합니다. 또한 위임이 구성되기 전에 기본 액세스 제어를 설정하려면 마스터 계정에 사용자 할당이 처음에 존재해야 합니다. 옵션 A는 너무 일반적이며 필수 전제 조건 단계가 아닙니다. 옵션 C는 Identity Center 위임과 관련이 없습니다. IAM ID 센터는 IAM 사용자가 아닌 해당 디렉터리 또는 외부 IdP의 자격 증명을 사용하므로 옵션 E는 올바르지 않습니다. AWS 지침에는 디렉터리 생성, 권한 세트 정의 및 초기 사용자 할당이 위임된 관리를 위한 필수 준비 단계로 명확하게 설명되어 있습니다."},
  {"id": 6, "text": "한 회사가 AWS Lambda 함수를 사용하여 애플리케이션 로직을 구현하고 있습니다. 이 회사는 AWS Organizations 내의 조직을 통해 수백 개의 AWS 계정을 관리합니다. 모든 계정의 Lambda 함수에서 취약점을 지속적으로 모니터링하는 솔루션이 필요하며, 발견된 문제는 대시보드에 표시되어야 합니다. 단, 테스트 또는 개발 중인 Lambda 함수는 대시보드에 표시되지 않아야 합니다. 다음 요구 사항을 충족하는 단계 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["조직의 관리 계정에 위임된 Amazon GuardDuty 관리자 계정을 지정합니다. GuardDuty 요약 대시보드를 사용하여 취약점이 있는 Lambda 함수의 개요를 확인합니다.", "조직의 관리 계정에 위임된 Amazon Inspector 관리자 계정을 지정합니다. Amazon Inspector 대시보드를 사용하여 취약점이 있는 Lambda 함수의 개요를 확인합니다.", "테스트 또는 개발 중인 모든 Lambda 함수에 \"test\" 또는 \"development\" 태그를 적용합니다. 이러한 태그가 포함된 검색 결과를 제외하는 제외 필터를 사용하십시오.", "조직의 관리 계정에서 AWS Shield Advanced를 활성화합니다. Amazon CloudWatch를 사용하여 취약점이 있는 Lambda 함수에 대한 대시보드를 구축합니다.", "모든 계정에 대해 GuardDuty에서 Lambda 보호 기능을 활성화합니다. 새 계정에 대해서는 Lambda 보호 기능을 자동으로 활성화합니다. 테스트 또는 개발 중인 Lambda 함수에 태그를 적용합니다. 태그 키로 GuardDutyExclusion을, 태그 값으로 LambdaStandardScanning을 사용합니다."], "answer": "B,C", "multi": true, "explanation": "Amazon Inspector는 Lambda 함수에서 패키지 의존성 취약성을 스캔하고, 활성화된 경우 Lambda 코드 취약성도 스캔하는 AWS 취약점 관리 서비스입니다. 다중 계정 조직에서는 위임된 Amazon Inspector 관리자가 멤버 계정의 스캔 범위를 중앙에서 관리하고 발견된 결과를 확인할 수 있습니다. Amazon Inspector 대시보드는 스캔된 리소스와 발견 사항에 대한 집계된 가시성을 제공합니다. 테스트 및 개발 Lambda 함수가 대시보드에 나타나지 않도록 하려면, 태그와 같은 기준에 맞는 발견 사항을 숨기는 억제 규칙을 적용할 수 있습니다. GuardDuty Lambda Protection은 소프트웨어 취약점 스캔이 아닌 Lambda 활동에 대한 위협 탐지를 위해 설계되었습니다. AWS Shield Advanced는 Lambda 취약점 관리가 아닌 DDoS 보호를 위한 서비스입니다. 따라서 Inspector 위임 관리와 태그 기반 억제가 올바른 조합입니다."},
  {"id": 7, "text": "한 기업에서 중요한 데이터가 영구 삭제되지 않도록 보호하는 솔루션이 필요합니다. 해당 데이터는 Amazon S3 버킷에 저장되어 있습니다. 재해 복구 요건을 충족하기 위해 기업의 기본 AWS 리전에서 보조 리전으로 S3 객체를 복제해야 합니다. 또한 관리자 권한이 있는 사용자가 보조 리전의 데이터를 영구 삭제할 수 없도록 보장해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Backup을 구성하여 리전 간 S3 백업을 수행합니다. 보조 리전에서 백업 볼트를 선택합니다. 보조 리전의 백업에 대해 거버넌스 모드에서 AWS Backup 볼트 잠금을 활성화합니다.", "기본 리전에서 규정 준수 모드로 S3 객체 잠금을 구현합니다. S3 복제를 구성하여 객체를 보조 리전의 S3 버킷으로 복제합니다.", "S3 복제를 구성하여 객체를 보조 리전의 S3 버킷으로 복제합니다. 보조 리전의 S3 버킷에서 s3:ReplicateDelete 작업을 거부하는 S3 버킷 정책을 생성합니다.", "S3 복제를 구성하여 객체를 보조 리전의 S3 버킷으로 복제합니다. 보조 리전의 S3 버킷에서 S3 객체 버전 관리를 구성합니다."], "answer": "B", "multi": false, "explanation": "요구 사항은 두 가지입니다: 재해 복구를 위한 크로스 리전 복제와, 심지어 관리자도 보조 리전에서 데이터를 영구적으로 삭제할 수 없도록 하는 불변성입니다. 정의된 보존 기간 동안 삭제(버전 삭제 포함)를 방지하도록 설계된 S3 네이티브 기능은 S3 객체 잠금(S3 Object Lock)입니다. 객체 잠금이 준수 모드(compliance mode)로 구성되면 루트 사용자 및 관리자를 포함한 어떤 사용자도 보존 기간이 만료되기 전에 객체 잠금 보호를 제거하거나 보호된 객체 버전을 영구적으로 삭제할 수 없습니다. 이는 정책 기반 제어보다 '관리자가 영구적으로 삭제할 수 없음' 요구 사항을 훨씬 잘 충족합니다. 재해 복구를 위해 데이터를 복제하려면 회사는 기본 리전 버킷에서 보조 리전 버킷으로 S3 복제를 구성할 수 있습니다. 객체 잠금이 설정되고(대상 버킷이 객체 잠금 및 버전 관리를 지원하도록 적절히 구성된 경우) 복제된 객체는 불변으로 보존될 수 있어, 복구를 위한 강력하게 보호된 사본을 제공합니다."},
  {"id": 8, "text": "한 회사가 AWS Organizations 내 여러 계정에 걸쳐 새로운 워크로드를 실행하고 있습니다. 실행 중인 모든 리소스에는 CostCenter 태그가 있어야 하며, 이 태그는 승인된 세 가지 값 중 하나여야 합니다. 회사는 이 정책을 엄격히 시행하고 CostCenter 태그가 승인되지 않은 값으로 변경되는 것을 방지해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS CloudFormation Guard를 사용하여 AWS Config 사용자 지정 정책 규칙을 생성합니다. CostCenter 태그 키와 승인된 값을 포함합니다. aws:RequestTag/CostCenter 조건 키의 값이 승인된 세 가지 값 중 하나가 아닌 경우 리소스 생성을 거부하는 SCP를 생성합니다.", "AWS CloudTrail 트레일을 생성합니다. 새 리소스 생성과 일치하는 규칙문을 포함하는 Amazon EventBridge 규칙을 생성합니다. EventBridge 규칙이 CostCenter 태그를 확인하는 AWS Lambda 함수를 호출하도록 구성합니다. Lambda 함수가 규정을 준수하지 않는 값인 경우 생성을 차단하도록 프로그래밍합니다.", "조직에 대한 태그 정책을 활성화합니다. CostCenter라는 태그 키와 승인된 값을 지정하는 태그 정책을 생성합니다. 정책을 구성하여 규정을 준수하지 않는 작업을 강제합니다. aws:RequestTag/CostCenter 조건 키 값이 null인 경우 리소스 생성을 거부하는 SCP를 생성합니다.", "조직에 대한 태그 정책을 활성화합니다. CostCenter라는 태그 키와 승인된 값을 지정하는 태그 정책을 생성합니다. 규정을 준수하지 않는 태그가 생성될 때 AWS Lambda 함수를 호출하는 Amazon EventBridge 규칙을 생성합니다. Lambda 함수가 태그 변경을 차단하도록 프로그래밍합니다."], "answer": "A", "multi": false, "explanation": "태깅과 승인된 값을 대규모로 강제해야 할 때, 가장 강력한 보호 장치는 SCP입니다. SCP는 리소스가 생성되거나 태그가 변경되기 전에 계정/조직 단위(OUs) 전체에서 API 호출을 차단할 수 있기 때문입니다. aws:RequestTag/CostCenter 조건 키를 사용하고 값이 승인된 값 중 하나인지 확인함으로써, SCP는 요청이 승인되지 않은 값을 설정하려고 할 때 Create(및 지원되는 경우 TagResource/UntagResource)를 거부할 수 있습니다. 이는 '잘못된' CostCenter 값이 도입되는 것을 방지합니다."},
  {"id": 9, "text": "보안 엔지니어가 Amazon EC2 인스턴스에서 Amazon CloudWatch로 사용자 지정 애플리케이션 보안 로그를 전달하려고 합니다. 보안 엔지니어는 EC2 인스턴스에 CloudWatch 에이전트를 설치하고 CloudWatch 구성 파일에 로그 경로를 추가합니다. 하지만 CloudWatch는 로그를 수신하지 못합니다. 보안 엔지니어는 EC2 인스턴스에서 awslogs 서비스가 실행 중인지 확인합니다. 보안 엔지니어는 이 문제를 해결하기 위해 다음에 무엇을 해야 할까요?", "choices": ["EC2 인스턴스의 신뢰 정책에 AWS CloudTrail을 추가합니다. 사용자 지정 로그를 CloudWatch 대신 CloudTrail로 보냅니다.", "EC2 인스턴스의 신뢰 정책에 Amazon S3를 추가합니다. CloudWatch가 로그를 수집하는 데 사용할 수 있도록 애플리케이션이 사용자 지정 로그를 S3 버킷에 기록하도록 구성합니다.", "EC2 인스턴스의 신뢰 정책에 Amazon Inspector를 추가합니다. CloudWatch 에이전트 대신 Amazon Inspector를 사용하여 사용자 지정 로그를 수집합니다.", "CloudWatchAgentServerPolicy AWS 관리형 정책을 EC2 인스턴스 역할에 연결합니다."], "answer": "D", "multi": false, "explanation": "Amazon CloudWatch 에이전트에는 로그 그룹을 생성하고, 로그 스트림을 생성하고, 로그 이벤트를 Amazon CloudWatch Logs에 저장하려면 명시적인 IAM 권한이 필요합니다. AWS 공인 보안 - 전문 분야 연구 가이드에 따르면 CloudWatch 에이전트 로그 전달 실패의 가장 일반적인 원인은 EC2 인스턴스 역할에 대한 IAM 권한이 없거나 부족하기 때문입니다. CloudWatchAgentServerPolicy AWS 관리형 정책은 로그:CreateLogGroup, 로그:CreateLogStream 및 로그:PutLogEvents를 포함하여 필요한 권한을 제공합니다. 이 정책을 EC2 인스턴스 역할에 연결하면 CloudWatch 에이전트가 애플리케이션이나 로깅 구성을 변경할 필요 없이 사용자 지정 애플리케이션 로그를 성공적으로 전달할 수 있습니다. CloudTrail, Amazon S3 및 Amazon Inspector는 이러한 방식으로 EC2 인스턴스에서 사용자 지정 애플리케이션 로그를 수집하도록 설계되지 않았기 때문에 옵션 A, B, C는 올바르지 않습니다. AWS 설명서에는 CloudWatch Logs 수집을 위해 EC2 역할에 IAM 권한을 부여해야 한다고 명시되어 있습니다. 이 접근 방식은 안정적인 감지 및 모니터링 기능을 보장하는 동시에 최소 권한에 대한 AWS 모범 사례에 부합합니다."},
  {"id": 10, "text": "한 회사가 AWS Organizations를 사용하고 있습니다. 이 회사의 여러 팀은 중앙 AWS 계정에 호스팅된 AWS CloudHSM 하드웨어 보안 모듈(HSM)을 사용합니다. 그중 한 팀이 자체적으로 새로운 전용 AWS 계정을 생성하고 중앙 계정에 호스팅된 HSM을 사용하려고 합니다. 보안 엔지니어는 중앙 계정에 호스팅된 HSM을 새 전용 계정과 어떻게 공유해야 할까요?", "choices": ["AWS Resource Access Manager(AWS RAM)를 사용하여 중앙 계정에 호스팅된 HSM의 VPC 서브넷 ID를 새 전용 계정과 공유합니다. CloudHSM 보안 그룹이 새 전용 계정의 클라이언트 인스턴스의 개인 IP 주소에서 들어오는 트래픽을 허용하도록 구성합니다.", "AWS Identity and Access Management(IAM)을 사용하여 중앙 계정에 있는 CloudHSM 클러스터에 액세스할 수 있는 교차 계정 역할을 생성합니다. 새 전용 계정에 새 IAM 사용자를 생성합니다. 새 IAM 사용자에게 교차 계정 역할을 할당합니다.", "AWS IAM Identity Center를 사용하여 AWS 보안 토큰 서비스(AWS STS) 토큰을 생성하여 새 전용 계정에서 중앙 계정으로 인증합니다. STS 토큰에 할당된 계정 간 권한을 사용하여 중앙 계정의 HSM에서 작업을 호출합니다.", "AWS Resource Access Manager(AWS RAM)를 사용하여 중앙 계정에 호스팅된 HSM의 ID를 새 전용 계정과 공유합니다. CloudHSM 보안 그룹이 새 전용 계정의 클라이언트 인스턴스의 개인 IP 주소에서 들어오는 트래픽을 허용하도록 구성합니다."], "answer": "D", "multi": false, "explanation": "AWS CloudHSM은 VPC 범위 서비스입니다. HSM(및 CloudHSM 클러스터)은 중앙 계정의 VPC 내부에 있으며 클라이언트는 네트워크를 통해 연결하여 암호화 작업을 수행합니다. 다른 계정이 중앙에서 관리되는 CloudHSM 클러스터를 사용해야 하는 경우 올바른 접근 방식은 CloudHSM 클러스터를 해당 계정과 공유하고 소비 계정 클라이언트의 네트워크 연결을 허용하는 것입니다. AWS는 CloudHSM 클러스터를 포함하여 지원되는 리소스에 대해 AWS Resource Access Manager(AWS RAM)를 통해 계정 간 리소스 공유를 제공합니다. 클러스터/HSM 식별자를 공유하면 해당 공유 클러스터에 대해 클라이언트 구성을 생성할 수 있는 소비 계정 가시성/능력이 부여됩니다. 공유 후에도 소비 계정의 EC2 인스턴스(CloudHSM 클라이언트)는 여전히 네트워크를 통해 HSM ENI에 연결할 수 있어야 하므로 중앙 계정의 CloudHSM 보안 그룹은 클라이언트 소스로부터의 인바운드 연결을 허용해야 합니다(일반적으로 VPC 연결을 통해 참조하는 보안 그룹에 의해 또는 적절하게 관련 IP 범위/포트를 허용함으로써)."},
  {"id": 11, "text": "한 회사가 AWS Organizations 내의 조직에 수백 개의 AWS 계정을 보유하고 있습니다. 이 회사는 단일 AWS 리전에서 운영됩니다. 또한, 조직 내에 보안 도구 전용 AWS 계정을 보유하고 있습니다. 보안 툴 계정은 Amazon GuardDuty 및 AWS Security Hub에 대한 조직의 위임 관리자로 구성되어 있습니다. 회사는 기존 AWS 계정과 신규 AWS 계정 모두에 대해 GuardDuty 및 Security Hub가 자동으로 활성화되도록 환경을 구성했습니다. 해당 회사는 보안 팀이 보안 이벤트를 감지하고 대응할 수 있는지 확인하기 위해 특정 GuardDuty 탐지 항목에 대한 제어 테스트를 수행하고 있습니다. 보안 팀은 Amazon EC2 인스턴스를 실행하고 테스트 도메인인 example.com에 대해 DNS 요청을 실행하여 DNS 탐지 항목을 생성하려고 시도했습니다. 그러나 GuardDuty 탐지 항목은 Security Hub 위임 관리자 계정에 생성되지 않았습니다. 보안 허브 위임 관리자 계정에 해당 발견 사항이 생성되지 않은 이유는 무엇입니까?", "choices": ["EC2 인스턴스가 시작된 VPC에 대해 VPC 흐름 로그가 활성화되어 있지 않습니다.", "EC2 인스턴스가 시작된 VPC에는 사용자 지정 OpenDNS 확인자에 대한 DHCP 옵션이 구성되어 있습니다.", "해당 문제가 발생한 AWS 계정에서 GuardDuty와 Security Hub의 통합이 활성화된 적이 없습니다.", "보안 허브에서 지역 간 집계가 구성되지 않았습니다."], "answer": "B", "multi": false, "explanation": "GuardDuty의 DNS 관련 탐지는 GuardDuty가 VPC 내 AWS에서 제공하는 DNS 해석 경로를 통해 DNS 쿼리 동작을 관찰할 수 있는 여부에 따라 달라집니다. VPC가 Amazon 제공 DNS 해석기 대신 DHCP 옵션을 통해 커스텀 DNS 해석기(예: OpenDNS 해석기)를 사용하도록 구성된 경우, DNS 쿼리가 GuardDuty가 DNS 분석 및 패턴 감지를 위해 의존하는 가시성 경로를 우회할 수 있습니다. 그 경우 테스트 트래픽(example.com에 대한 쿼리)은 GuardDuty의 DNS 탐지 로직에 의해 평가되지 않을 수 있으므로 DNS 탐지 결과가 생성되지 않으며, 따라서 Security Hub로 전달되는 내용도 없습니다."},
  {"id": 12, "text": "보안 엔지니어는 AWS 키 관리 서비스(AWS KMS) 고객 관리 키로 암호화된 데이터에 대한 접근을 제어해야 합니다. 또한, 암호문 변조를 방지하기 위해 추가 인증 데이터(AAD)를 사용해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["암호화 및 복호화 API 작업을 호출할 때 키 별칭을 AWS KMS에 전달합니다.", "IAM 정책을 사용하여 암호화 및 복호화 API 작업에 대한 액세스를 제한합니다.", "고객 관리 키에 대한 IAM 정책을 정의할 때 kms:EncryptionContext 조건 키를 사용하십시오.", "키 정책을 사용하여 적절한 IAM 그룹에 대한 액세스를 제한합니다."], "answer": "C", "multi": false, "explanation": "AWS KMS는 암호화 컨텍스트를 사용하여 추가 인증 데이터(AAD)를 지원합니다. AWS 공인 보안 – 전문 문서에 따르면 암호화 컨텍스트는 암호 텍스트에 암호화 방식으로 바인딩된 키-값 쌍 세트입니다. 데이터를 해독하려는 모든 시도에는 동일한 암호화 컨텍스트가 포함되어야 합니다. 그렇지 않으면 해독이 실패합니다. 이 메커니즘은 암호문 변조 및 무단 재사용을 방지합니다. kms: EncryptionContext 조건 키를 사용하면 보안 엔지니어가 IAM 또는 키 정책에서 특정 암호화 컨텍스트 값을 사용하도록 강제할 수 있습니다. 특정 암호화 컨텍스트 속성이 필요한 조건을 정의함으로써 암호화된 데이터에 대한 액세스를 엄격하게 제어하고 특정 애플리케이션, 환경 또는 워크플로에 바인딩할 수 있습니다. 옵션 A는 무결성 보호를 제공하지 않습니다. 옵션 B는 액세스를 제어하지만 AAD 사용을 강제하지는 않습니다. 옵션 D는 관리 액세스를 제한하지만 암호화 컨텍스트 시행을 다루지는 않습니다. AWS 설명서에는 정책 조건과 결합된 암호화 컨텍스트가 KMS를 통해 인증된 암호화 및 세분화된 액세스 제어를 구현하는 데 권장되는 방법이라고 명시되어 있습니다."},
  {"id": 13, "text": "한 회사가 온라인 게임을 위한 새로운 웹 기반 계정 관리 시스템을 도입했습니다. 플레이어들은 시스템에 로그인하기 위해 고유한 사용자 이름과 비밀번호를 생성합니다. 해당 회사는 시스템에 AWS WAF 웹 ACL을 구현했습니다. 이 웹 ACL에는 시스템에 서비스를 제공하는 애플리케이션 로드 밸런서의 AWS 관리형 핵심 규칙 세트(CRS) 규칙 그룹이 포함되어 있습니다. 회사 보안팀은 해당 시스템이 자격 증명 탈취 공격의 표적이 되었음을 확인했습니다. 다른 데이터 유출 사고에서 노출된 자격 증명을 사용하여 시스템에 로그인하려는 시도가 있었습니다. 보안팀은 향후 자격 증명 탈취 공격의 성공 가능성을 줄이기 위한 솔루션을 구현해야 합니다. 또한 해당 솔루션은 시스템의 정당한 사용자에게 미치는 영향을 최소화해야 합니다. 다음 요구 사항을 충족하는 조치 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["단일 IP 주소에서 발생한 성공적인 로그인 응답 수를 분석하기 위해 Amazon CloudWatch 사용자 지정 메트릭을 생성합니다.", "웹 ACL에 계정 탈취 방지(ATP) AWS 관리형 규칙 그룹을 추가합니다. 시스템에 대한 로그인 요청을 검사하도록 규칙 그룹을 구성합니다. awswaf:managed:aws:atp:signal:credential_compromised 레이블이 있는 모든 요청을 차단합니다.", "모든 사용자가 로그인할 때 CAPTCHA 퍼즐을 풀도록 요구하는 기본 웹 ACL 작업을 구성합니다.", "웹 ACL에 IP 기반 일치 규칙을 구현하여 로그인 응답이 많이 발생하는 모든 IP 주소를 차단합니다.", "사용자가 시스템 내에서 비밀번호를 재설정할 수 있도록 안전한 워크플로로 리디렉션하는 사용자 지정 차단 응답을 생성합니다."], "answer": "A,B", "multi": true, "explanation": "단일 IP 주소에서 성공적인 로그인 응답 수를 모니터링하기 위해 CloudWatch 맞춤 지표를 생성하면 자격 증명 스터핑을 나타낼 수 있는 이상 패턴을 식별하는 데 도움이 됩니다. 이는 합법적인 사용자에게 즉각적인 영향을 주지 않고 추가 모니터링과 탐지를 가능하게 합니다. AWS WAF 계정 탈취 방지(ATP) 규칙 그룹은 자격 증명 스터핑 공격을 감지하고 완화하도록 특별히 설계되었습니다. ATP를 구성하여 로그인 요청을 검사하고 awswaf:managed:aws:atp:signal:credential_compromised 레이블이 있는 요청을 차단하면 보안 팀은 성공적인 자격 증명 스터핑 공격 가능성을 크게 줄일 수 있습니다. 이 접근 방식은 합법적인 사용자에 대한 영향을 최소화하면서 손상된 자격 증명을 대상으로 합니다."},
  {"id": 14, "text": "한 회사가 Amazon RDS 데이터베이스를 사용하고 있습니다. 이 데이터베이스에는 회사 내 여러 팀에서 공유하는 민감한 데이터가 포함되어 있습니다. 회사는 데이터베이스에 대한 비정상적인 로그인 시도를 감지할 수 있는 솔루션이 필요합니다. 또한, 비정상적인 로그인이 발생하면 기존 Amazon SNS 토픽으로 알림을 보내야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon RDS에 AWS Trusted Advisor 보안 검사를 사용합니다. 보안 검사의 상태 변경을 모니터링하는 Amazon EventBridge 규칙을 생성합니다. EventBridge 규칙을 구성하여 AWS Lambda 함수를 호출하고 SNS 토픽에 메시지를 게시합니다.", "AWS AppFabric을 활성화합니다. AWS AppFabric을 RDS DB 인스턴스에 연결합니다. AWS AppFabric 검색 결과를 전송할 대상으로 Amazon Data Firehose 스트림을 생성합니다. Firehose 스트림에서 호출되어 SNS 토픽에 메시지를 게시하는 AWS Lambda 함수를 생성합니다.", "Amazon GuardDuty를 활성화하고 GuardDuty RDS 보호 기능을 구성합니다. 비정상적인 로그인에 대한 GuardDuty 감지를 모니터링하는 Amazon EventBridge 규칙을 생성합니다. EventBridge 규칙의 대상으로 SNS 토픽을 구성합니다.", "Amazon Inspector를 활성화합니다. 비정상적인 로그인에 대한 Amazon Inspector 결과를 모니터링하기 위해 Amazon EventBridge 규칙을 생성합니다. SNS 토픽을 EventBridge 규칙의 대상으로 구성합니다."], "answer": "C", "multi": false, "explanation": "GuardDuty RDS 보호는 지원되는 Amazon RDS 데이터베이스와 관련된 의심스러운 활동 및 이상 활동, 특히 이상 로그인 동작을 감지하도록 설계된 AWS 위협 탐지 기능입니다. GuardDuty 결과는 자동으로 EventBridge에 게시되며, EventBridge 규칙은 선택된 결과 유형 또는 심각도를 SNS로 라우팅하여 알림을 보낼 수 있습니다. 이는 최소한의 사용자 정의 코드를 사용하여 탐지 및 알림 요구 사항을 직접적으로 충족합니다. Trusted Advisor는 일반적인 계정 및 구성 모범 사례를 확인하지만, 데이터베이스 로그인 이상 감지는 수행하지 않습니다. AppFabric는 SaaS 애플리케이션 보안 데이터 정규화를 위한 것이며 RDS 로그인 모니터링용이 아닙니다. Amazon Inspector는 취약점 관리 서비스로, 데이터베이스 로그인 이상을 감지하지 않습니다. 따라서 GuardDuty RDS 보호와 EventBridge를 통해 SNS로 연결하는 것이 올바른 보안 모니터링 패턴입니다."},
  {"id": 15, "text": "회사 보안팀은 DoS 공격과 관련된 AWS 악용 보고에 대한 이메일 알림을 거의 실시간으로 받고 싶어합니다. 이미 아마존 SNS에 관련 주제가 있으며 보안팀에서 구독하고 있습니다. 보안 엔지니어는 다음에 무엇을 해야 할까요?", "choices": ["Lambda 함수를 사용하여 Trusted Advisor에서 악용 알림을 폴링합니다.", "AWS_ABUSE_DOS_REPORT에 대한 AWS Health 이벤트와 일치하고 SNS에 게시하는 Amazon EventBridge 규칙을 생성합니다.", "Lambda 함수를 사용하여 AWS 지원 API를 폴링하여 악용 사례를 확인합니다.", "CloudTrail 로그와 CloudWatch 알람을 사용하여 악용 신고를 감지합니다."], "answer": "B", "multi": false, "explanation": "AWS 남용 알림은 AWS 상태 이벤트로 전달됩니다. AWS 공인 보안 - 전문 연구 가이드에 따르면 Amazon EventBridge는 기본적으로 AWS 상태와 통합되며 AWS_ABUSE_DOS_REPORT와 같은 특정 이벤트 유형을 거의 실시간으로 감지하는 데 사용할 수 있습니다. 남용 보고서 이벤트 유형을 필터링하고 Amazon SNS에 직접 게시하는 EventBridge 규칙을 생성함으로써 솔루션은 완전 관리형, 짧은 지연 시간 및 비용 효율성을 유지합니다. 폴링 API에는 지연과 복잡성이 발생합니다. CloudTrail은 남용 알림을 기록하지 않습니다. AWS 상태가 포함된 EventBridge는 AWS 서비스 이벤트에 대응하는 데 권장되는 메커니즘입니다."},
  {"id": 16, "text": "한 회사가 AWS KMS 고객 관리 키를 사용하는 암호화된 Amazon Aurora DB 클러스터를 미국 동부 1 리전에 보유하고 있습니다. 이 회사는 DB 스냅샷을 미국 서부 1 리전으로 복사해야 하지만, 리전 간에 암호화 키에 접근할 수 없습니다. us-west-1에 있는 스냅샷을 제대로 암호화하려면 회사는 어떻게 해야 할까요?", "choices": ["고객 관리 키를 AWS Secrets Manager의 us-west-1에 저장합니다.", "us-west-1에 새 고객 관리 키를 생성하고 이를 사용하여 스냅샷을 암호화합니다.", "us-west-1에서 us-east-1의 키에 액세스할 수 있도록 IAM 정책을 생성합니다.", "us-west-1의 RDS가 us-east-1의 키에 액세스할 수 있도록 허용하는 IAM 정책을 생성합니다."], "answer": "B", "multi": false, "explanation": "AWS KMS 키는 엄밀히 말하면 지역별 리소스입니다. AWS 공인 보안 - 전문 문서에 따르면 한 지역에서 생성된 KMS 키를 다른 지역의 데이터를 암호화하거나 해독하는 데 사용할 수 없습니다. 여기에는 암호화된 RDS 및 Aurora 스냅샷이 포함됩니다. 암호화된 스냅샷을 다른 리전에 복사하는 경우 대상 리전에 자체 KMS 키가 있어야 합니다. AWS는 복사 작업 중에 대상 리전의 지정된 KMS 키를 사용하여 스냅샷을 자동으로 다시 암호화합니다. IAM 정책은 KMS 키의 범위를 리전 전체로 확장할 수 없기 때문에 옵션 C와 D는 유효하지 않습니다. Secrets Manager는 KMS 키 자체를 저장하거나 관리하지 않기 때문에 옵션 A는 올바르지 않습니다. AWS 모범 사례에서는 대상 리전에서 새로운 고객 관리형 키를 생성하고 스냅샷 복사 프로세스 중에 이를 사용해야 합니다."},
  {"id": 17, "text": "한 회사가 네트워크 로드 밸런싱(NLB)의 대상으로 등록된 Amazon EC2 인스턴스를 운영하고 있습니다. 해당 NLB는 보안 그룹과 연결되어 있으며, 이 보안 그룹은 특정 포트를 통해 들어오는 TCP 트래픽을 허용합니다. 10.0.0.0/23에서 22개. 이 회사는 NLB를 동일한 네트워크 ACL 및 라우팅 테이블을 공유하는 두 개의 서브넷에 매핑합니다. 라우팅 테이블에는 0.0.0.0/0에서 인터넷 게이트웨이로 가는 경로가 있습니다. 네트워크 ACL에는 우선순위가 높은 인바운드 규칙이 하나 있습니다. 20은 10.0.0.0/16에서 포트 22로 TCP 트래픽을 허용합니다. 보안 엔지니어는 EC2 인스턴스에 무단 SSH 세션이 있다는 경고를 받았습니다. 무단 세션은 10.0.1.5에서 시작되었습니다. 회사 사고 대응 절차에 따라 무단 SSH 세션은 즉시 차단해야 합니다. 인스턴스는 계속 실행되어야 하며, 메모리도 손상되지 않아야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS 관리 콘솔 또는 AWS CLI를 사용하여 EC2 인스턴스를 다시 시작합니다.", "10.0.1.5에서 오는 포트 22의 TCP 트래픽을 거부하기 위해 네트워크 ACL에 우선순위 10의 새 인바운드 규칙을 추가합니다.", "10.0.0.0/16에서 포트 22로 들어오는 TCP 트래픽을 허용하는 보안 그룹 규칙을 제거합니다.", "인터넷 게이트웨이로 가는 경로를 제거하도록 라우팅 테이블을 업데이트합니다."], "answer": "B", "multi": false, "explanation": "네트워크 ACL은 상태를 저장하지 않으며, 규칙 번호에 따라 순서대로 평가되며, 낮은 규칙 번호가 우선합니다. AWS 인증 보안 전문가 - 특수화 사고 대응 지침에 따르면, 네트워크 ACL을 사용하여 인스턴스를 재시작하거나 런타임 상태를 변경하지 않고 서브넷 수준에서 트래픽을 즉시 차단할 수 있습니다. 우선순위 번호가 낮은(10) 거부 규칙을 추가하여 문제의 IP 주소(10.0.1.5)에서 오는 포트 22의 TCP 트래픽을 명시적으로 거부하면, 무단 SSH 세션이 즉시 차단됩니다. 이 접근 방식은 인스턴스를 계속 실행하고 포렌식 분석을 위해 메모리를 보존해야 한다는 요구사항을 충족합니다."},
  {"id": 18, "text": "보안 엔지니어는 회사 주요 웹사이트를 호스팅하는 Amazon EC2 인스턴스와 관련된 보안 취약점을 발견했다는 Amazon GuardDuty 경고를 받았습니다. GuardDuty에서 발견한 내용은 다음과 같습니다. 무단 접근: IAMUser/인스턴스 자격 증명 유출. 보안 엔지니어는 악의적인 공격자가 회사가 운영하지 않는 국가의 EC2 인스턴스에 대한 API 접근 키를 사용한 것을 확인했습니다. 보안 엔지니어는 악의적인 공격자의 접근을 차단해야 합니다. 보안 엔지니어가 가장 먼저 해야 할 일은 무엇일까요?", "choices": ["EC2 콘솔을 열고 0.0.0.0/0에서 들어오는 트래픽을 허용하는 보안 그룹을 모두 제거합니다.", "EC2 인스턴스에 AWS Systems Manager 에이전트를 설치하고 인벤토리 보고서를 실행합니다.", "호스트에 Amazon Inspector 에이전트를 설치하고 CVE 규칙 패키지를 사용하여 평가를 실행합니다.", "IAM 콘솔을 열고 인스턴스 프로필과 연결된 모든 IAM 세션을 취소합니다."], "answer": "D", "multi": false, "explanation": "findingInstanceCredentialExfiltration은 EC2 인스턴스에서 사용할 수 있는 자격 증명(인스턴스 프로필 / IMDS에서)이 도난당했을 가능성이 있으며, 이후 비정상적인 위치에서 사용되었음을 나타냅니다. 악의적인 행위자를 즉시 막는 가장 빠른 방법은 도난당한 현재 사용 가능한 자격 증명을 무효화하는 것입니다. 이러한 자격 증명은 인스턴스 프로필 역할에 발급된 임시 자격 증명이므로, 올바른 첫 번째 격리 조치는 해당 역할의 활성 세션을 철회하여 도난당한 세션 자격 증명이 작동하지 않도록 하는 것입니다. 이는 조사 및 복구를 계속 진행하는 동안 API 사용을 직접 차단합니다."},
  {"id": 19, "text": "한 회사가 여러 애플리케이션을 AWS로 마이그레이션해야 합니다. 이를 위해서는 상당한 양의 스토리지가 필요합니다. 5,000개의 자격 증명. 규정 준수 요건을 충족하기 위해 회사는 기존 암호 관리 시스템을 사용하여 키 순환, 감사 및 타사 비밀 컨테이너와의 통합을 수행할 예정입니다. 해당 회사는 예산이 제한적이므로 보안성을 유지하면서도 비용 효율적인 솔루션을 찾고 있습니다. 회사는 어떻게 하면 가장 낮은 비용으로 이를 달성할 수 있을까요?", "choices": ["회사 키 관리 솔루션을 AWS Systems Manager 파라미터 스토어와 통합하도록 구성합니다.", "회사의 키 관리 솔루션을 AWS Secrets Manager와 통합하도록 구성합니다.", "아마존 S3 암호화 버킷을 사용하여 비밀 정보를 저장하고, 애플리케이션에 비밀 정보에 접근할 수 있도록 적절한 역할을 구성하십시오.", "회사의 키 관리 솔루션을 AWS CloudHSM과 통합하도록 구성합니다."], "answer": "A", "multi": false, "explanation": "AWS Systems Manager Parameter Store는 회사가 이미 외부 비밀번호 관리 시스템으로 회전 및 감사 워크플로를 처리하고 있는 경우, 대량의 구성 값과 SecureString 매개변수에 대해 가장 비용 효율적인 AWS 네이티브 옵션입니다. Parameter Store는 AWS KMS로 암호화된 SecureString 매개변수로 민감한 값을 저장할 수 있으며, 애플리케이션은 자격 증명을 하드코딩하지 않고 안전하게 이를 검색할 수 있습니다. AWS Secrets Manager는 강력한 비밀 관리 서비스이지만, 네이티브 회전이 필요하지 않은 경우 5,000개 이상의 자격 증명에 대해 비밀당 가격이 비싸집니다. S3는 목적에 맞게 설계된 비밀 저장소가 아니며 불필요한 사용자 지정 보안 책임을 초래합니다. CloudHSM은 비용이 높고 단순 애플리케이션 자격 증명 저장에는 과도합니다."},
  {"id": 20, "text": "한 회사가 미국 동부 1(us-east-1) 리전에 암호화된 Amazon Aurora DB 클러스터를 보유하고 있습니다. 이 DB 클러스터는 AWS Key Management Service(AWS KMS) 고객 관리형 키로 암호화되어 있습니다. 규정 준수 요건을 충족하기 위해 회사는 DB 스냅샷을 미국 서부 1(us- west-1) 리전으로 복사해야 합니다. 그러나 스냅샷을 us-west-1 리전으로 복사하려고 하면 원본 데이터베이스를 암호화하는 데 사용된 키에 접근할 수 없습니다. 회사에서 us-west-1에 스냅샷을 적절한 암호화 방식으로 설정하려면 어떻게 해야 할까요?", "choices": ["AWS Secrets Manager를 사용하여 고객 관리 키를 us-west-1에 비밀 키로 저장합니다. 이 비밀 키를 사용하여 us-west-1의 스냅샷을 암호화합니다.", "us-west-1에 새 고객 관리 키를 생성합니다. 이 새 키를 사용하여 us-west-1의 스냅샷을 암호화합니다. 1.", "us-east-1에 있는 고객 관리 키에 대한 액세스를 허용하는 IAM 정책을 생성합니다. arn:aws를 지정합니다. kms:us-west-1:*를 주요 주소로 합니다.", "us-east-1에 있는 고객 관리 키에 대한 액세스를 허용하는 IAM 정책을 생성합니다. 주체로 arn:aws:rds:us-west-1:*를 지정합니다."], "answer": "B", "multi": false, "explanation": "AWS 키 관리 서비스(KMS) 고객 관리 키는 리전별 리소스입니다. AWS 공인 보안 전문가 시험 공식 학습 가이드와 KMS 문서에 따르면, 한 AWS 리전에서 생성된 KMS 키는 다른 리전에서 직접 사용할 수 없습니다. 암호화된 Amazon Aurora DB 스냅샷을 리전 간에 복사할 때, 대상 리전은 해당 리전에 존재하는 KMS 키에 접근할 수 있어야 합니다. 원본 KMS 키가 us-east-1에 존재하기 때문에 us-west-1에서 접근하거나 참조할 수 없습니다. 올바르고 지원되는 방법은 us-west-1에서 새로운 고객 관리 KMS 키를 생성하고, 리전 간 스냅샷 복사 시 해당 키를 지정하는 것입니다. Amazon RDS는 복사 과정에서 원본 리전 키를 사용하여 스냅샷을 자동으로 복호화하고 대상 리전 키를 사용하여 다시 암호화합니다."},
  {"id": 21, "text": "한 회사의 데이터 과학자들이 Amazon S3에 저장된 데이터 세트를 사용하여 Amazon SageMaker를 활용하고 있습니다. 회사 정책에 따라 45일 이상 된 데이터는 삭제해야 합니다. 이 정책을 시행하기 위해 어떤 조치가 필요할까요?", "choices": ["45일 후에 객체를 삭제하도록 S3 수명주기 규칙을 구성합니다.", "객체 업로드 시 트리거되어 이전 데이터를 삭제하는 Lambda 함수를 생성합니다.", "오래된 객체를 매달 삭제하는 예약된 Lambda 함수를 생성합니다.", "S3 인텔리전트 티어링을 구성합니다."], "answer": "A", "multi": false, "explanation": "Amazon S3 수명 주기 규칙은 데이터 보존 정책을 시행하는 기본적이고 가장 효율적인 방법입니다. AWS 공인 보안 – 전문 문서에서는 운영 복잡성과 실패 위험을 줄이기 위해 사용자 지정 자동화보다 수명 주기 규칙을 권장합니다. 수명 주기 규칙은 지정된 기간이 지나면 객체를 자동으로 안정적으로 삭제하므로 추가 컴퓨팅 서비스 없이 규정을 준수할 수 있습니다. Lambda 기반 솔루션은 비용과 관리 오버헤드를 증가시킵니다. Intelligent-Tiering은 데이터 삭제가 아닌 스토리지 비용을 관리합니다."},
  {"id": 22, "text": "한 회사가 AWS Organizations 내 여러 계정에 걸쳐 새로운 워크로드를 실행하고 있습니다. 실행 중인 모든 리소스에는 CostCenter 태그가 있어야 하며, 이 태그는 승인된 세 가지 값 중 하나여야 합니다. 회사는 이 정책을 엄격히 시행하고 CostCenter 태그가 승인되지 않은 값으로 변경되는 것을 방지해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Config 사용자 지정 정책 규칙과 SCP를 사용하여 승인되지 않은 aws:RequestTag/CostCenter 값을 거부합니다.", "CloudTrail + EventBridge + Lambda를 사용하여 생성을 차단합니다.", "태그 정책을 활성화하고, 허용 값을 정의하고, 규정을 준수하지 않는 작업을 강제하고, aws:RequestTag/CostCenter가 null일 때 SCP를 사용하여 생성을 거부합니다.", "태그 정책을 활성화하고 EventBridge + Lambda를 사용하여 변경을 차단합니다."], "answer": "C", "multi": false, "explanation": "AWS Organizations 태그 정책은 계정 전반에 걸쳐 태그 키와 허용되는 값을 표준화하고 관리하도록 설계되었습니다. AWS 공인 보안 – 전문 문서에서는 태그 정책을 필수 태그 키와 허용 값을 지정하여 일관된 태그 지정을 적용하는 데 도움이 되는 거버넌스 메커니즘으로 설명합니다. 생성 시 모든 리소스에 CostCenter 태그가 있는지 확인하기 위해 SCP는 aws:RequestTag/CostCenter가 누락된 경우(null) 생성 작업을 거부할 수 있습니다. 이렇게 하면 필수 태그 없이 리소스가 생성되는 것을 방지할 수 있습니다. 그런 다음 태그 정책은 세 가지 승인된 값을 정의하고 지원되는 서비스에 따라 비준수를 적용하거나 보고하도록 구성하여 태그 값이 허용된 집합 내에 유지되고 승인되지 않은 값으로의 드리프트를 방지할 수 있습니다. 사용자 정의 Lambda 기반 시행과 비교하여 이 접근 방식은 운영 오버헤드를 최소화하고 AWS 기본 거버넌스 서비스 내에서 시행을 유지합니다. 옵션 A는 요청 시 허용되는 값을 부분적으로 다루지만 여러 서비스에서 진행 중인 거버넌스를 깔끔하게 다루지는 않습니다. 옵션 B는 Lambda가 이벤트 후에 실행되고 모든 생성을 안정적으로 차단할 수 없기 때문에 예방적이지 않습니다. 옵션 D는 여전히 사용자 지정 논리에 의존하며 태그 정책과 SCP 가드레일만큼 운영상 효율적이지 않습니다."},
  {"id": 23, "text": "한 회사가 AWS에서 호스팅되는 글로벌 전자상거래 웹사이트를 운영하고 있습니다. 이 회사는 아마존 클라우드프론트를 사용하여 사용자에게 콘텐츠를 제공합니다. 최근 시행된 데이터 규제 정책을 준수하기 위해 특정 국가에서 들어오는 트래픽을 차단하고자 합니다 . 어떤 솔루션이 이러한 요구 사항을 가장 비용 효율적으로 충족할까요?", "choices": ["국가 IP 범위 차단을 위한 IP 일치 조건을 사용하여 AWS WAF 웹 ACL을 생성합니다. 웹 ACL을 CloudFront 배포와 연결합니다.", "특정 국가에 대한 접근을 차단하는 지리적 일치 조건을 사용하여 AWS WAF 웹 ACL을 생성합니다. 해당 웹 ACL을 CloudFront 배포와 연결합니다.", "CloudFront의 지역 제한 기능을 사용하여 특정 국가의 액세스를 차단하세요.", "CloudFront에서 지리 위치 헤더를 사용하여 특정 국가에 대한 액세스를 거부할 수 있습니다."], "answer": "C", "multi": false, "explanation": "Amazon CloudFront에는 콘텐츠 소유자가 시청자의 지리적 위치를 기반으로 배포에 대한 접근을 제어할 수 있는 기본적인 지리 제한(지오블로킹) 기능이 포함되어 있습니다. 시청자의 국가는 요청이 시작된 IP 주소를 사용하여 결정됩니다. AWS 공인 보안 - 전문(보안 특화) 공식 학습 가이드와 Amazon CloudFront 개발자 가이드에 따르면, 지리 제한은 조직이 지역 규제, 라이선스 요구 사항 또는 데이터 주권 정책을 준수해야 하는 시나리오를 위해 특별히 설계되었습니다. 비용 측면에서 CloudFront 지리 제한은 CloudFront 배포 내에서 직접 구성되기 때문에 가장 비용 효율적인 솔루션이며, AWS WAF가 필요하지 않습니다. AWS WAF는 웹 ACL, 규칙 및 요청 처리에 대한 추가 비용을 발생시키며, 요구 사항이 국가를 기반으로 접근을 차단하거나 허용하는 것으로 제한될 경우에는 불필요합니다."},
  {"id": 24, "text": "회사 클라우드 보안 정책에 따르면 회사 VPC와 KMS 간의 통신은 AWS 네트워크 내에서만 이루어져야 하며 공용 서비스 엔드포인트를 사용해서는 안 됩니다. 다음 중 어떤 조치 조합이 이 요구 사항을 가장 잘 충족합니까? (두 가지를 선택하십시오.)", "choices": ["회사 VPC 엔드포인트 ID를 참조하는 theaws:sourceVpcecondition을 AWS KMS 키 정책에 추가합니다.", "VPC에서 VPC 인터넷 게이트웨이를 제거하고 VPC에 가상 프라이빗 게이트웨이를 추가하여 공용 인터넷에 직접 연결되는 것을 방지합니다.", "프라이빗 DNS가 활성화된 AWS KMS용 VPC 엔드포인트를 생성합니다.", "KMS 가져오기 키 기능을 사용하여 VPN을 통해 AWS KMS 키를 안전하게 전송하세요.", "AWS KMS 키 정책에 다음 조건을 추가하세요. \"aws:SourceIp\" : \"10.0.0.0/16\"."], "answer": "A,C", "multi": true, "explanation": "VPC에서 AWS KMS로의 트래픽이 AWS 네트워크 내에 머물고 공용 엔드포인트를 사용하지 않도록 하려면 KMS에 대해 인터페이스 VPC 엔드포인트(AWS PrivateLink)를 사용해야 합니다. 개인 DNS가 활성화된 KMS용 VPC 엔드포인트를 생성하면(옵션 C) 표준 KMS DNS 이름(예: kms.<region>.amazonaws.com)이 VPC 내부의 개인 엔드포인트 IP로 해석되어 요청이 인터넷을 통해가 아니라 AWS 개인 네트워크를 통해 라우팅됩니다. 이것이 \"공용 서비스 엔드포인트 없음\"을 충족하는 핵심 네트워킹 제어입니다. 의도한 VPC 엔드포인트를 통해 들어오는 호출만 키를 사용할 수 있도록 강제하려면 KMS 키 정책에서 aws:sourceVpce 조건을 사용하여 권한 가드레일을 추가하세요(옵션 A). 이렇게 하면 주체가 자격 증명을 가지고 있어도 지정된 VPC 엔드포인트를 통해 요청하지 않으면 KMS가 사용을 거부하여 공용 경로를 통한 우발적이거나 악의적인 사용을 방지할 수 있습니다."},
  {"id": 25, "text": "보안 엔지니어가 SAML 2.0을 사용한 페더레이션 액세스로 다중 계정 환경에 대한 인증을 구현하고 있습니다. 보안 엔지니어는 AWS IAM Identity Center를 ID 공급자(IdP)로 구성했으며, AWS 계정에 대한 액세스 권한을 부여하는 IAM 역할도 생성했습니다. 연동된 사용자가 새 시스템에 인증을 시도할 때 인증 실패를 보고합니다. 보안 엔지니어는 운영 효율성을 극대화하면서 이 문제를 해결하기 위해 무엇을 해야 할까요?", "choices": ["SAML IdP 로그를 검토하여 오류를 파악하십시오. AWS CloudTrail을 확인하여 사용자가 수행한 API 호출을 검증하십시오.", "SAML IdP 로그를 검토하여 오류를 식별합니다. IAM 정책 시뮬레이터를 사용하여 IAM 역할에 대한 액세스 권한을 검증합니다.", "IAM 액세스 어드바이저를 사용하여 최근 서비스 액세스를 검토하십시오. IAM 정책 시뮬레이터를 사용하여 IAM 역할에 대한 액세스 권한을 검증하십시오.", "사용자가 겪고 있는 동작을 확인하기 위해 별도의 계정에서 SAML IdP를 다시 생성하십시오."], "answer": "A", "multi": false, "explanation": "SAML 기반 인증 문제를 해결할 때, 인증 흐름에서 잠재적인 오류나 잘못된 구성을 식별하기 위해 SAML 아이덴티티 제공자(IdP)의 로그를 검토하는 것이 필수적입니다. 또한, AWS CloudTrail 로그는 사용자가 수행한 API 호출에 대한 통찰을 제공하여 보안 엔지니어가 인증 시도가 AWS에 도달했는지 확인하고 해당 수준에서 발생한 문제를 식별할 수 있도록 합니다. 이 접근 방식은 인증과 관련된 주요 로그에 집중하므로 설정을 재구성하거나 접근을 시뮬레이션하지 않고도 운영상 효율적입니다."},
  {"id": 26, "text": "한 회사가 AWS Organizations에서 자사 AWS 계정에 대한 조직을 구성했습니다. AWS CloudTrail은 모든 AWS 리전에서 활성화되어 있습니다. 보안 엔지니어는 CloudTrail이 비활성화되는 것을 방지하기 위한 솔루션을 구현해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["조직 관리 계정에서 CloudTrail 로그 파일 무결성 유효성 검사를 활성화합니다.", "CloudTrail 로그에 대해 AWS KMS 키(SSE-KMS)를 사용한 서버 측 암호화를 활성화합니다. KMS 키를 생성합니다. 로그 복호화를 방지하기 위해 키에 정책을 연결합니다.", "cloudtrail:StopLogging 작업과 cloudtrail:DeleteTrail 작업에 대한 명시적인 거부 규칙이 포함된 서비스 제어 정책(SCP)을 생성합니다. 해당 SCP를 루트 OU에 연결합니다.", "회사 내 모든 사용자가 DescribeTrails 작업과 GetTrailStatus 작업을 수행하지 못하도록 하는 IAM 정책을 생성합니다."], "answer": "C", "multi": false, "explanation": "AWS CloudTrail은 API 활동과 계정 이벤트를 기록하는 기본적인 보안 서비스입니다. AWS 공인 보안 - 전문(Official Study Guide)에 따르면, 여러 AWS 계정에서 CloudTrail이 비활성화되는 것을 중앙에서 신뢰성 있게 방지할 수 있는 유일한 방법은 AWS Organizations 서비스 제어 정책(SCP)을 사용하는 것입니다. SCP는 조직 또는 조직 단위에 있는 모든 계정에 대한 최대 사용 가능한 권한을 정의합니다. cloudtrail:StopLogging 및 cloudtrail:DeleteTrail 작업에 대해 명시적 거부(Deny)를 가진 SCP를 생성하고 이를 루트 조직 단위(OU)에 연결하면, 보안 엔지니어는 모든 회원 계정의 어떤 주체도—관리자를 포함하여—CloudTrail 트레일을 중지하거나 삭제할 수 없도록 보장할 수 있습니다. SCP에서의 명시적 거부는 IAM 권한으로 무시될 수 없습니다."},
  {"id": 27, "text": "한 회사가 모든 기능을 활성화한 AWS Organizations를 사용하고 있습니다. 이 회사는 모든 멤버 계정과 모든 AWS 리전에 AWS Security Hub를 활성화했습니다. 또한, 멤버 AWS 계정의 eu-central-1 리전에 VPC를 생성했습니다. 보안 엔지니어는 VPC 내의 어떤 보안 그룹 규칙도 TCP 포트 22를 통해 모든 IP 주소로부터의 인바운드 트래픽을 허용하지 않는다는 것을 확인했습니다. 보안 엔지니어는 자동화된 시스템이 필요합니다. 이 시스템은 VPC 내에서 TCP 포트 22를 통해 모든 IP 주소로부터의 트래픽을 허용하는 보안 그룹 규칙이 생성되는 것을 방지해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon CloudWatch Logs 로그 그룹에 로그를 기록하는 AWS CloudTrail 조직 트레일을 활성화합니다. 로그 그룹 메트릭 필터를 기반으로 CloudWatch 알람을 생성합니다. 모든 IP 주소에서 들어오는 트래픽을 허용하는 보안 그룹 규칙이 추가될 때 Amazon Simple Notification Service(Amazon SNS) 토픽에 알람을 게시하도록 구성합니다. 보안 엔지니어의 이메일 주소를 SNS 토픽 구독자로 추가합니다.", "모든 IP 주소에서 TCP 포트 22로 들어오는 트래픽을 허용하는 보안 그룹 규칙에 대한 Security Hub 결과를 필터링하는 Amazon EventBridge 규칙을 생성합니다. 원치 않는 보안 그룹 규칙을 제거하는 AWS Lambda 함수를 대상으로 EventBridge 규칙을 구성합니다.", "TCP 포트 22에서 모든 IP 주소로부터의 인바운드 트래픽을 허용하는 보안 그룹 규칙의 생성 또는 수정을 방지하는 SCP를 생성합니다.", "모든 수신 트래픽을 검사하고 TCP 포트 22의 수신 트래픽을 차단하는 규칙을 사용하여 AWS 네트워크 방화벽을 배포합니다."], "answer": "C", "multi": false, "explanation": "서비스 제어 정책(SCP)은 멤버 계정이 포트 22에서 0.0.0.0/0으로의 인바운드 액세스를 허용하는 보안 그룹 규칙을 생성하거나 수정하지 못하도록 차단할 수 있는 예방적 통제입니다. 회사가 모든 기능이 활성화된 AWS Organizations를 사용하기 때문에, 관련 계정이나 조직 단위에 SCP를 연결하여 보안에 취약한 규칙이 생성되기 전에 API 액션을 중지할 수 있으며, 이는 사후 감지가 아닌 자동 예방 요구 사항을 충족합니다. 이 문제에 대한 Security Hub 통제는 탐지적이며, 생성 후 문제가 있는 규칙을 제거하도록 권장하지만, SCP는 계정 전반에서 위험이 높은 API 호출을 제한하는 데 특별히 사용됩니다."},
  {"id": 28, "text": "프랑스의 한 회사가 아마존 코그니토(Amazon Cognito)와 코그니토 호스팅 UI(Cognito Hosted UI)를 로그인 및 가입 프로세스의 ID 브로커로 사용하고 있습니다. 이 회사는 애플리케이션을 출시했으며, 모든 사용자가 프랑스 거주자일 것으로 예상했습니다. 하지만 애플리케이션 출시 후, 회사 보안팀은 해당 애플리케이션에 대한 사기성 가입을 발견했습니다. 사기성 가입의 대부분은 프랑스 이외 지역 사용자들이었습니다. 보안팀은 회원가입 시 맞춤형 유효성 검사를 수행할 수 있는 솔루션이 필요합니다. 유효성 검사 결과에 따라 가입 요청을 승인하거나 거부해야 합니다. 다음 요구 사항을 충족하는 단계 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["사전 가입 AWS Lambda 트리거를 생성합니다. Amazon Cognito 함수를 Amazon Cognito 사용자 풀과 연결합니다.", "지리적 일치 규칙 문을 사용하여 AWS WAF 웹 ACL을 구성합니다. 웹 ACL을 Amazon Cognito 사용자 풀과 연결합니다.", "애플리케이션의 Amazon Cognito 사용자 풀에 대한 앱 클라이언트를 구성합니다. 호스팅된 UI에서 요청의 유효성을 검사하려면 앱 클라이언트 ID를 사용하십시오.", "애플리케이션의 Amazon Cognito 사용자 풀을 업데이트하여 지리적 제한 설정을 구성합니다.", "호스팅된 UI에서 요청을 검증하기 위해 소셜 ID 공급자(IdP)를 구성하려면 Amazon Cognito를 사용하십시오."], "answer": "A,B", "multi": true, "explanation": "회원가입 시 사용자 정의 검증을 수행하고 등록을 명시적으로 수락하거나 거부하려면, Amazon Cognito는 Lambda 트리거를 제공합니다. 사전 회원가입 트리거는 회원가입 흐름(Hosted UI 포함) 동안 동기적으로 실행되며, 사용자 정의 검사를 구현할 수 있습니다(예: IP 평판 검사, 이메일/도메인 검증, 속도 검사, 허용/거부 목록, 또는 외부 서비스를 이용한 지리적 검사). 트리거 로직에 따라 함수는 회원가입을 진행하도록 허용하거나 거부할 수 있으며, 이를 통해 '사용자 정의 검증' 및 '수락/거부' 요구사항을 직접 충족할 수 있습니다. 관찰된 사기의 대부분이 프랑스 외부에서 발생하기 때문에, 프론트 도어 수준의 지리적 제어를 추가하면 Cognito에 도달하기 전에 원하지 않는 트래픽을 줄일 수 있습니다. AWS WAF는 국가별 요청을 허용/거부하기 위해 웹 ACL에서 지리 매치 조건을 지원하며, 이는 지역 제한 애플리케이션에서 일반적인 완화 방법입니다. Hosted UI 엔드포인트를 보호하도록 WAF 웹 ACL을 연결하면 프랑스 이외의 위치에서 발생하는 회원가입 요청을 초기에 차단하여 사기 시도와 부하를 줄일 수 있습니다."},
  {"id": 29, "text": "한 회사가 자사 공개 웹 애플리케이션의 트래픽 증가를 경험한 후 AWS WAF를 사용하기 시작했습니다. 보안 엔지니어는 트래픽 증가가 애플리케이션 계층 공격 때문인지 판단해야 합니다. 이를 위해 AWS WAF 트래픽을 분석할 수 있는 솔루션이 필요합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["AWS WAF를 구성하여 로그를 AWS CloudTrail의 트레일로 전송합니다. Amazon Data Firehose 전송 스트림을 생성하여 로그를 Amazon OpenSearch Service로 전송합니다. OpenSearch 대시보드와 Amazon Athena 커넥터를 사용하여 로그를 쿼리합니다.", "AWS WAF를 구성하여 로그를 Amazon S3 버킷으로 전송합니다. S3 버킷의 파티션 프로젝션을 사용하여 OpenSearch 테이블을 구성합니다. OpenSearch를 사용하여 S3 버킷의 데이터를 쿼리합니다.", "AWS WAF를 구성하여 로그를 Amazon S3 버킷으로 전송합니다. S3 버킷의 파티션 프로젝션을 사용하여 Amazon Athena 테이블을 구성합니다. Athena를 사용하여 S3 버킷의 데이터를 쿼리합니다.", "AWS WAF를 구성하여 로그를 AWS CloudTrail의 트레일로 전송합니다. Amazon Data Firehose 전송 스트림을 생성하여 로그를 Amazon S3 버킷으로 전송합니다. Amazon Athena를 사용하여 S3 버킷의 데이터를 쿼리합니다."], "answer": "C", "multi": false, "explanation": "AWS WAF는 로그를 Amazon S3(일반적으로 Kinesis Data Firehose를 통해)에 전달할 수 있는 전용 기능으로서 WAF 로깅을 지원합니다. 이러한 로그에는 트래픽 급증이 애플리케이션 계층 공격 때문인지 여부를 판단하는 데 필수적인 요청 세부 정보(규칙 일치, 수행된 조치, 헤더, URI, 소스 IP 등)가 포함되어 있습니다. 운영 부담이 적은 분석을 위해, 로그를 S3에 저장하고 Amazon Athena로 쿼리하는 것이 표준적인 패턴입니다. 파티션 프로젝션을 사용하면 수동 파티션 관리를 피하고 시간 기반 접두사에 대한 효율적인 쿼리를 가능하게 하여 관리 작업을 더욱 줄일 수 있습니다."},
  {"id": 30, "text": "한 회사가 민감한 데이터를 처리하는 애플리케이션을 실행하는 대규모 Amazon Linux 2 Amazon EC2 인스턴스를 보유하고 있습니다. 규정 준수 요구 사항에는 관리 포트 노출 금지, 전체 세션 로깅, AWS IAM Identity Center를 통한 인증이 포함됩니다. DevOps 엔지니어는 문제 해결을 위해 가끔씩 액세스가 필요합니다. 이러한 요구 사항을 충족하면서 원격 액세스를 제공하는 솔루션은 무엇일까요?", "choices": ["EC2 시리얼 콘솔에 대한 액세스 권한을 부여하고 IAM 역할 액세스를 허용합니다.", "EC2 인스턴스 연결을 활성화하고 보안 그룹을 적절하게 구성하십시오.", "AWS Systems Manager에 대한 액세스를 허용하는 EC2 인스턴스 역할을 할당합니다. Systems Manager Session Manager에 대한 액세스 권한을 부여하는 IAM 정책을 생성하고 이를 IAM Identity Center 역할에 할당합니다.", "시스템 관리자 자동화를 사용하여 원격 액세스 포트를 일시적으로 엽니다."], "answer": "C", "multi": false, "explanation": "AWS Systems Manager Session Manager는 인바운드 포트를 열지 않고도 EC2 인스턴스에 대한 안전하고 감사 가능한 셸 액세스를 제공합니다. AWS 공인 보안 - 전문 지침에 따르면 Session Manager는 모든 세션 활동을 CloudWatch Logs 또는 Amazon S3에 기록하고 중앙 집중식 인증을 위해 IAM Identity Center와 통합합니다. 이 솔루션은 노출된 포트 없음, 전체 감사 로깅, ID 기반 액세스 제어 등 모든 요구 사항을 충족합니다. EC2 Instance Connect 및 직렬 콘솔 액세스는 Identity Center와 통합되지 않으며 관리 경로를 노출할 수 있습니다."},
  {"id": 31, "text": "한 회사가 자사 공개 웹 애플리케이션의 트래픽 증가를 경험한 후 AWS WAF를 사용하기 시작했습니다. 보안 엔지니어는 트래픽 증가가 애플리케이션 계층 공격 때문인지 판단해야 합니다. 이를 위해 AWS WAF 트래픽을 분석할 수 있는 솔루션이 필요합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["AWS WAF 로그를 AWS CloudTrail로 전송하고 OpenSearch로 분석합니다.", "AWS WAF 로그를 Amazon S3로 전송하고 OpenSearch를 사용하여 직접 쿼리합니다.", "AWS WAF 로그를 Amazon S3로 전송합니다. 파티션 프로젝션을 사용하여 Amazon Athena 테이블을 생성합니다. Athena를 사용하여 로그를 쿼리합니다.", "AWS WAF 로그를 AWS CloudTrail로 전송하고 Amazon Athena로 분석합니다."], "answer": "C", "multi": false, "explanation": "AWS WAF는 소스 IP 주소, 요청 URI, 헤더, 규칙 평가 결과를 포함한 자세한 HTTP 요청 정보를 로깅하는 것을 지원합니다. AWS 공인 보안 전문가 문서에 따르면, Amazon S3와 Amazon Athena를 결합하는 것이 AWS WAF 로그의 임시 및 포렌식 분석을 위해 권장되며 가장 비용 효율적인 솔루션입니다. AWS WAF를 구성하여 로그를 Amazon S3에 전달하고 Athena에서 파티션 프로젝션을 사용하면 보안 엔지니어는 파티션을 수동으로 유지하지 않고도 대량의 로그 데이터를 효율적으로 쿼리할 수 있습니다. 이는 SQL 인젝션, 크로스사이트 스크립팅, 봇 활동과 같은 애플리케이션 계층 공격을 신속하게 식별할 수 있게 해줍니다."},
  {"id": 32, "text": "한 회사가 AWS 외부에서 애플리케이션을 실행하고 있습니다. 이 외부 애플리케이션은 IAM 사용자 자격으로 AWS에 인증합니다. 보안 엔지니어는 이 외부 애플리케이션이 IAM 역할을 사용하도록 마이그레이션해야 합니다. 해당 회사의 기존 사용자들은 이미 AWS IAM Identity Center를 통해 IAM 역할을 사용하고 있습니다. 어떤 솔루션을 사용하면 외부 애플리케이션이 IAM 역할을 사용할 수 있게 될까요?", "choices": ["IAM Identity Center에서 외부 애플리케이션을 관리형 애플리케이션으로 설정합니다. 외부 애플리케이션에서 사용할 IAM 역할을 생성하기 위해 새 계정 할당을 생성합니다.", "AWS Verified Access 인스턴스를 생성합니다. 외부 애플리케이션에 대한 신뢰 공급자를 설정합니다. 외부 애플리케이션이 IAM 역할을 수임할 수 있도록 검증된 액세스 정책을 생성합니다.", "IAM Roles Anywhere를 사용합니다. AWS에 트러스트 앵커와 프로필을 생성합니다. 외부 애플리케이션에 자격 증명 도우미 도구를 설정합니다. IAM 역할이 IAM Roles Anywhere를 신뢰하도록 구성합니다.", "IAM을 사용하여 페더레이션을 활성화합니다. 외부 애플리케이션과 AWS 간에 신뢰 당사자 트러스트를 추가하여 SAML 2.0 페더레이션을 구성합니다. 외부 애플리케이션이 사용할 IAM 역할을 설정합니다."], "answer": "C", "multi": false, "explanation": "IAM Roles Anywhere는 AWS 외부에서 실행되고 IAM 역할을 통해 임시 AWS 자격 증명이 필요한 워크로드를 위해 구축되었습니다. 이 서비스는 X.509 인증서, 신뢰 앵커, 프로필 및 역할 신뢰 정책을 사용하여 외부 서버, 컨테이너 또는 애플리케이션이 IAM 사용자 액세스 키 없이 단기 자격 증명을 얻을 수 있도록 합니다. AWS는 또한 외부 애플리케이션이 SDK credential_process 통합과 함께 사용할 수 있는 자격 증명 도우미를 제공합니다. IAM Identity Center는 주로 인력 접근 및 관리되는 애플리케이션을 위한 것이며, 비인간 워크로드 인증을 위한 것은 아닙니다. AWS Verified Access는 애플리케이션 접근을 제어하지만, 외부 워크로드를 위한 AWS 역할 수임(assumption)을 제어하지 않습니다. 일반 SAML 연합은 아이덴티티 제공자에 대해 작동할 수 있지만, 이 질문은 IAM 사용자 자격 증명을 대체하는 외부 애플리케이션에 관한 것이며, 이는 정확히 IAM Roles Anywhere의 사용 사례입니다."},
  {"id": 33, "text": "한 회사가 AWS에서 애플리케이션을 운영하고 있습니다. 이 회사는 여러 환경으로 구성된 설정을 사용하며, 각 환경은 별도의 AWS 계정에 격리되어 있습니다. 회사는 AWS Organizations에 조직을 생성하여 이러한 계정들을 관리하고 있으며, 조직 전용 보안 계정 하나를 보유하고 있습니다. 회사는 조직 내 모든 계정에 저장된 Amazon S3 버킷의 중요 데이터에 대한 인벤토리를 작성해야 합니다. 모든 데이터는 단일 위치에서 확인할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["보안 계정을 Amazon Macie 및 AWS Security Hub의 위임된 관리자로 설정합니다. Macie가 민감한 데이터 발견 사항을 Security Hub에 게시하도록 활성화하고 구성하십시오.", "보안 계정을 AWS Security Hub의 위임된 관리자로 설정합니다. 각 계정에서 Amazon Inspector를 구성하여 S3 버킷에서 민감한 데이터를 검색합니다. 민감한 데이터 발견 사항을 Security Hub에 게시합니다.", "각 계정에서 Amazon Inspector가 S3 버킷에서 민감한 데이터를 검색하도록 구성합니다. AWS Trusted Advisor와 Amazon Inspector 통합을 활성화합니다. 민감한 데이터 발견 사항을 Trusted Advisor에 게시합니다.", "각 계정에서 Amazon Macie를 활성화하고 구성하여 민감한 데이터를 감지하도록 합니다. AWS Trusted Advisor와의 Macie 통합을 활성화합니다. 민감한 데이터 발견 사항을 Trusted Advisor에 게시합니다."], "answer": "A", "multi": false, "explanation": "Amazon Macie는 Amazon S3에 저장된 민감한 데이터를 검색, 분류 및 목록화하기 위해 특별히 설계된 AWS 서비스입니다. AWS 공인 보안 전문 연구 가이드에 따르면 Macie는 모든 회원 계정의 결과를 중앙에서 관리하는 위임된 관리자 계정을 통해 AWS Organizations를 사용하여 조직 전체에서 활성화할 수 있습니다. Amazon Macie와 AWS Security Hub 모두에 대해 보안 계정을 위임된 관리자로 지정함으로써 회사는 중요한 데이터 결과를 단일 위치에 중앙 집중화할 수 있습니다. Macie는 S3 버킷에서 개인 식별 정보(PII)와 같은 민감한 데이터를 자동으로 검사하고 중앙 집중식 가시성 및 보고를 위해 결과를 Security Hub에 게시합니다. Amazon Inspector는 S3 객체에서 민감한 데이터를 검색하지 않기 때문에 옵션 B와 C는 올바르지 않습니다. AWS Trusted Advisor는 Macie 민감한 데이터 결과를 수집하지 않기 때문에 옵션 D는 유효하지 않습니다. AWS 모범 사례에서는 다중 계정 환경 전반에 걸쳐 중앙 집중식 민감한 데이터 인벤토리를 위한 위임된 관리 및 Security Hub 통합을 갖춘 Amazon Macie를 권장합니다."},
  {"id": 34, "text": "기업은 손상된 IAM 사용자를 모든 AWS 계정에서 즉시 비활성화하고 지난 7일 동안 해당 사용자가 수행한 모든 작업을 수집해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["IAM 사용자를 비활성화하고 Athena를 사용하여 Amazon S3에서 CloudTrail 로그를 조회합니다.", "보안 허브에서 IAM 정책 및 쿼리 로그를 제거합니다.", "CloudWatch Logs Insights를 사용하여 권한 세트를 제거하고 로그를 쿼리합니다.", "IAM Identity Center에서 사용자를 비활성화하고 조직 이벤트 데이터 저장소를 조회합니다."], "answer": "D", "multi": false, "explanation": "AWS IAM Identity Center는 AWS 조직 전체의 사용자 액세스를 중앙에서 관리합니다. Identity Center에서 사용자를 비활성화하면 모든 AWS 계정에 대한 액세스가 즉시 취소됩니다. AWS 공인 보안 - 전문 문서에 따르면 조직의 CloudTrail 이벤트 데이터 저장소는 계정 전체의 모든 이벤트에 대한 중앙 집중식 쿼리 가능한 액세스를 제공합니다. CloudTrail Lake를 사용하면 로그를 내보내지 않고도 활동을 직접 쿼리할 수 있습니다. Identity Center 수준에서 사용자를 비활성화하면 완전한 격리가 보장됩니다."},
  {"id": 35, "text": "한 회사는 전송 중인 모든 데이터를 암호화해야 하는 규정 준수 요건을 가지고 있습니다. 그런데 최근 이 요건을 충족하지 않는 아마존 오로라 클러스터를 발견했습니다. 회사는 Aurora 클러스터에 대한 모든 연결에 암호화를 어떻게 적용할 수 있을까요?", "choices": ["Aurora 클러스터 구성에서 therequire_secure_transportDB 클러스터 매개변수를 ON으로 설정합니다.", "AWS Directory Service for Microsoft Active Directory를 사용하여 사용자 디렉터리를 생성하고 Aurora에서 Kerberos 인증을 적용합니다.", "AWS Certificate Manager(ACM)를 사용하여 암호화 인증서를 제공하도록 Aurora 클러스터를 구성합니다.", "Amazon RDS 프록시를 생성합니다. 암호화를 활성화하려면 프록시를 Aurora 클러스터에 연결합니다."], "answer": "A", "multi": false, "explanation": "Aurora로 전송 중인 암호화를 시행하려면 클라이언트가 데이터베이스에 연결할 때 TLS/SSL을 사용하도록 요구해야 합니다. Aurora(엔진 종류에 따라)는 비TLS 연결을 거부하여 보안 전송을 시행하는 매개변수를 지원합니다. DB(클러스터/인스턴스) 매개변수인 require_secure_transport를 ON으로 설정하면 클라이언트가 SSL/TLS를 협상하도록 강제하며, 그렇지 않으면 서버가 연결을 거부하여 전송 중 모든 데이터가 암호화되도록 합니다. 이는 클라이언트 동작과 관계없이 데이터베이스 엔드포인트 자체에서 규정 준수 요건을 직접 시행하는 것입니다."},
  {"id": 36, "text": "기업은 단일 보안 계정을 사용하여 모든 계정의 모든 Amazon S3 버킷에 있는 민감한 데이터의 목록을 작성해야 합니다.", "choices": ["Amazon Macie 및 Security Hub 관리 권한을 위임합니다.", "Security Hub와 함께 Amazon Inspector를 사용하세요.", "Trusted Advisor와 함께 Inspector를 사용하세요.", "Trusted Advisor와 함께 Macie를 사용하세요."], "answer": "A", "multi": false, "explanation": "Amazon Macie는 S3에서 민감한 데이터를 발견하고 분류하도록 설계된 AWS 서비스입니다. 위임된 관리는 조직 전체에서 중앙 집중식 가시성을 가능하게 합니다. Security Hub는 단일 창 보기용으로 Macie 결과를 집계합니다. Inspector는 S3 데이터를 스캔하지 않습니다. Trusted Advisor는 민감한 데이터 발견 도구가 아닙니다."},
  {"id": 37, "text": "한 회사가 아마존 S3 Glacier에 데이터를 저장하고 있습니다. 보안 엔지니어가 10TB 데이터에 대한 새로운 볼트 잠금 정책을 구현하고 12시간 전에 initiate-vault-lock 작업을 호출했습니다. 감사팀은 정책에 오타가 있어 의도치 않은 볼트 접근이 허용되고 있음을 발견했습니다. 이 오류를 수정하는 가장 비용 효율적인 방법은 무엇입니까?", "choices": ["abort-vault-lock 작업을 호출합니다. 정책을 업데이트합니다. initiate-vault-lock 작업을 다시 호출합니다.", "볼트 데이터를 새 S3 버킷으로 복사합니다. 볼트를 삭제합니다. 해당 데이터를 사용하여 새 볼트를 생성합니다.", "금고 잠금을 유지하도록 정책을 업데이트하세요.", "정책을 업데이트합니다. 새 정책을 적용하려면 initiate-vault-lock 작업을 다시 호출하십시오."], "answer": "A", "multi": false, "explanation": "Amazon S3 Glacier Vault Lock는 initiate-vault-lock가 호출된 후 24시간의 진행 중 기간이 있습니다. 이 기간 동안에는 잠금이 아직 변경 불가능하지 않으며, AWS는 금고 잠금 과정을 중단할 수 있도록 허용합니다. 보안 엔지니어가 오타를 발견한 시점이 시작 후 12시간밖에 되지 않았기 때문에, 가장 비용 효율적인 수정 방법은 현재 금고 잠금을 중단하고, 정책을 수정한 후, 다시 금고 잠금 과정을 시작하는 것입니다. 10TB 데이터를 새 위치로 복사하는 것은 불필요하며, 비용이 많이 들고 운영상 낭비입니다. 잠금을 중단하지 않고 정책을 업데이트하는 것은 진행 중인 금고 잠금 정책을 올바르게 해결하지 않습니다. 잠금이 완료되면 정책은 변경 불가능하게 되므로, 완료 전에 조치를 취해야 합니다."},
  {"id": 38, "text": "보안 엔지니어가 새로운 AWS KMS 고객 관리형 키를 생성하려고 합니다. KMSAdmin IAM 역할은 이 키를 생성하고 비활성화합니다. KMSUser IAM 역할은 이 키를 사용하여 암호를 복호화합니다. 어떤 핵심 정책이 이러한 요건을 충족할까요?", "choices": ["KMSAdmin에게 kms:Create 및 kms:Disable* 권한만 부여하고 KMSUser에게 kms:Decrypt 권한을 부여하는 키 정책입니다.", "KMSAdmin에게 kms:Create* 및 kms:Disable* 권한을 부여하고 KMSUser에게 kms:Decrypt 권한을 부여하는 키 정책입니다.", "KMSAdmin 및 KMSUser에게 kms:CreateGrant 권한을 부여하지만 KMSUser에게 kms:Decrypt 권한은 부여하지 않는 키 정책입니다.", "KMSAdmin과 KMSUser 모두에게 kms:Decrypt* 권한만 부여하는 키 정책입니다."], "answer": "B", "multi": false, "explanation": "키 정책은 키 관리를 키 사용과 분리해야 합니다. KMSAdmin은 생성 관련 및 사용 중지 관련 KMS 작업을 수행할 수 있는 권한이 필요하므로 kms:Create*와 kms:Disable*가 관리 요구사항과 일치합니다. KMSUser는 단지 암호화 작업 중 복호화 권한만 필요하므로 kms:Decrypt만으로 충분합니다. AWS KMS 문서는 모든 KMS 키에는 키 정책이 필요하며, 키 관리자는 키를 관리할 수 있고 키 사용자는 복호화와 같은 암호화 작업 권한을 부여받을 수 있음을 설명합니다. 옵션 A는 기술적으로 약하며, kms:Create는 KMS 생성 작업에 대한 올바른 와일드카드 형태가 아니기 때문입니다. 옵션 C는 필요한 복호화 권한이 부족합니다. 옵션 D는 KMSAdmin에게 생성 또는 사용 중지 기능을 제공하지 않습니다."},
  {"id": 39, "text": "기업은 보안 문제의 근본 원인을 파악하고 해당 문제와 관련된 IAM 역할을 조사해야 합니다. 이를 위해 VPC Flow Logs, Amazon GuardDuty 및 AWS CloudTrail을 활성화했습니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon Detective를 사용하여 IAM 역할을 조사하고 결과를 시각화합니다.", "Amazon Inspector 및 CloudWatch 대시보드를 사용하세요.", "GuardDuty 결과를 S3로 내보내고 Athena로 분석합니다.", "Security Hub 사용자 지정 작업을 사용하여 IAM 역할을 조사합니다."], "answer": "A", "multi": false, "explanation": "Amazon Detective는 보안 팀이 보안 결과의 근본 원인을 조사하고 시각화하는 데 도움을 주기 위해 특별히 설계되었습니다. AWS 공인 보안 전문 문서에 따르면 Detective는 GuardDuty, CloudTrail 및 VPC 흐름 로그의 데이터를 자동으로 집계하고 상호 연결하여 대화형 시각화 및 타임라인을 제공합니다. Detective를 사용하면 조사관은 GuardDuty 결과에서 IAM 역할, API 호출, 네트워크 트래픽 및 리소스 동작으로 전환할 수 있습니다. 이는 의심스러운 활동 중에 IAM 역할이 어떻게 사용되었는지 이해하는 가장 효율적인 도구입니다. Amazon Inspector는 행동 조사가 아닌 취약성 평가에 중점을 둡니다. Security Hub는 결과를 집계하지만 심층적인 조사 그래프를 제공하지는 않습니다. Athena를 사용한 수동 분석에는 훨씬 더 많은 노력이 필요합니다. AWS 지침에서는 보안 사고의 근본 원인 분석 및 시각화를 위해 Amazon Detective를 명시적으로 권장합니다."},
  {"id": 40, "text": "보안 엔지니어가 Amazon Elastic Container Service(Amazon ECS)에서 실행되는 Docker 컨테이너와 클라이언트 간에 종단 간 암호화를 제공하는 솔루션을 설계하고 있습니다. 이 솔루션은 변동성이 큰 트래픽 패턴도 처리해야 합니다. 어떤 솔루션이 가장 확장성이 뛰어나고 지연 시간이 가장 짧을까요?", "choices": ["TLS 트래픽을 종료한 다음 컨테이너로 전송되는 트래픽을 다시 암호화하도록 네트워크 로드 밸런서를 구성합니다.", "TLS 트래픽을 종료한 다음 컨테이너로 전송되는 트래픽을 다시 암호화하도록 애플리케이션 로드 밸런서를 구성합니다.", "TCP 리스너가 있는 네트워크 로드 밸런서를 구성하여 TLS 트래픽을 컨테이너로 전달합니다.", "컨테이너로 트래픽을 전송하기 위해 다중값 응답 라우팅을 사용하도록 Amazon Route 53을 구성합니다."], "answer": "C", "multi": false, "explanation": "TCP 리스너가 있는 네트워크 로드 밸런서(NLB)는 다음과 같은 이유로 이 경우에 가장 적합한 솔루션입니다: 확장성: NLB는 낮은 지연 시간으로 대량의 트래픽을 처리하도록 설계되었습니다. 연결 수준(레이어 4)에서 작동하므로 특히 변동이 심한 트래픽 패턴에서도 효율적으로 확장할 수 있습니다. 낮은 지연 시간: NLB는 TLS 트래픽을 연결을 종료하지 않고 그대로 컨테이너로 전달함으로써 트래픽을 복호화하고 재암호화하는 오버헤드를 피합니다. 이는 지연 시간을 최소화하고 클라이언트와 컨테이너 간의 빠른 통신을 보장합니다. 이 구성은 로드 밸런서 수준에서 암호화 종료 및 재암호화를 처리할 필요 없이 엔드투엔드 암호화(TLS)를 가능하게 하며, 불필요한 복잡성과 처리 시간을 추가하지 않습니다."},
  {"id": 41, "text": "한 회사가 중첩된 OU를 사용하는 AWS Organizations를 통해 AWS 계정을 관리하고 있습니다. 이 회사는 계정에 대한 맞춤형 규정 준수 모니터링 서비스를 운영하고 있으며, 해당 서비스는 AWS Lambda 함수로 실행되고 Amazon EventBridge 스케줄러에 의해 호출됩니다. 해당 회사는 조직 내 모든 기존 및 향후 계정에 모니터링 서비스를 배포해야 합니다. 회사는 관리 계정이 필요하지 않은 경우 조직의 관리 계정을 사용하는 것을 피해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["조직의 관리 계정에 CloudFormation 스택 세트를 생성하고 새 계정을 수동으로 추가합니다.", "AWS CloudFormation에 대한 위임된 관리자 계정을 구성합니다. 위임된 관리자 계정에서 조직 루트를 대상으로 자동 배포가 활성화된 CloudFormation StackSet을 생성합니다.", "Systems Manager 위임 관리 및 자동화를 사용하여 Lambda 함수를 배포하고 예약합니다.", "관리 계정에 Systems Manager Automation 런북을 생성하고 이를 다른 계정과 공유합니다."], "answer": "B", "multi": false, "explanation": "AWS Organizations 및 CloudFormation StackSets는 계정 전체에서 일관된 인프라를 위한 조직 배포 메커니즘을 제공합니다. AWS 공인 보안 – 전문 분야 지침에서는 폭발 반경을 줄이면서 중앙 집중식 거버넌스가 가능한 경우 마스터 계정 사용을 최소화하고 위임된 관리자 기능을 사용하는 것을 강조합니다. AWS CloudFormation에 대해 위임된 관리자 계정을 구성하면 회사는 마스터 계정에서 일상적인 배포 작업을 수행하지 않고도 StackSets를 생성하고 관리할 수 있습니다. 조직 루트를 대상으로 하면 StackSet가 모든 기존 계정에 배포됩니다. 자동 배포를 활성화하면 조직에 가입하는(또는 구성에 따라 대상 OU로 이동하는) 모든 향후 계정이 수동 개입 없이 자동으로 모니터링 서비스를 받을 수 있습니다. 이는 최소한의 노력으로 모든 기존 계정과 향후 계정에 배포해야 하는 요구 사항을 직접적으로 충족합니다. 옵션 A에는 계정이 추가될 때 지속적인 수동 업데이트가 필요하므로 운영 오버헤드가 증가합니다. 옵션 C와 D는 작동할 수 있지만 추가적인 운영 복잡성을 초래하는 Systems Manager Automation을 사용하며 자동 배포 기능이 있는 StackSet와 비교할 때 조직 전체의 인프라 롤아웃을 위한 표준 AWS 메커니즘이 아닙니다. StackSets는 또한 규정 준수 도구에 대한 거버넌스 기대치에 부합하는 일관된 변경 제어, 드리프트 감지 및 중앙 집중식 업데이트 메커니즘을 제공합니다."},
  {"id": 42, "text": "한 회사가 AWS Organizations의 조직을 사용하여 여러 AWS 계정을 관리하고 있습니다. 이 회사는 사용자들이 Amazon Q Developer에 중앙 집중식으로 접근할 수 있도록 하고자 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["AWS IAM Identity Center를 활성화하고 Amazon Q Developer를 AWS 관리형 애플리케이션으로 설정합니다.", "Amazon Cognito를 활성화하고 Amazon Q Developer용 새 ID 풀을 생성합니다.", "Amazon Cognito를 활성화하고 Amazon Q Developer를 AWS 관리형 애플리케이션으로 설정합니다.", "AWS IAM Identity Center를 활성화하고 Amazon Q Developer용 새 ID 풀을 생성합니다."], "answer": "A", "multi": false, "explanation": "AWS IAM Identity Center는 조직 내의 여러 AWS 계정에 대한 인력 액세스를 중앙에서 관리하는 데 권장되는 서비스입니다. AWS 공인 보안 - 전문 문서에 따르면 Amazon Q Developer는 기본적으로 AWS 관리형 애플리케이션으로 IAM Identity Center와 통합됩니다. IAM ID 센터를 활성화하고 Amazon Q Developer를 사용자 또는 그룹에 할당함으로써 회사는 권한 집합과 조직 경계를 사용하여 중앙에서 액세스를 제어할 수 있습니다. 이 접근 방식은 최소한의 오버헤드로 중앙 집중식 인증, 권한 부여 및 감사를 제공합니다. Amazon Cognito는 직원이 AWS 서비스에 액세스하는 것이 아니라 고객 및 애플리케이션 사용자 인증을 위해 만들어졌습니다. IAM ID 센터 통합에는 자격 증명 풀을 적용할 수 없습니다. AWS 모범 사례에서는 직원이 AWS 관리형 애플리케이션에 액세스할 수 있도록 IAM Identity Center를 권장합니다."},
  {"id": 43, "text": "한 회사가 서로 다른 AWS 서비스에 사용할 별도의 AWS 키 관리 서비스(AWS KMS) 키를 설정하려고 합니다. 회사 보안 엔지니어는 인프라 배포 팀이 InfrastructureDeployment IAM 역할을 사용하여 암호화된 Amazon Elastic Block Store(Amazon EBS) 볼륨을 생성할 수 있도록 키 정책을 만들었습니다. 그런데 최근 보안 엔지니어는 InfrastructureDeployment 역할 외의 다른 IAM 역할에서도 이 키를 다른 서비스에 사용하고 있음을 발견했습니다. 이러한 문제를 해결하기 위해 보안 엔지니어는 정책을 어떻게 수정해야 할까요?", "choices": ["\"키 사용 허용\"이라는 Sid가 포함된 문장 블록의 \"조건\" 블록에서 StringEquals를 StringLike로 변경합니다.", "정책 문서에서 \"IAM 사용자 권한 활성화\"라는 Sid가 포함된 문 블록을 제거합니다. KMS 정책에 키 관리 정책을 추가합니다.", "Sid \"키 사용 허용\"이 포함된 문장 블록의 \"조건\" 블록에서 kms:ViaService 값을 ec2.us- east-1.amazonaws.com으로 변경합니다.", "정책 문서에 보안 엔지니어의 IAM 역할에 kms:Disable* 권한을 부여하는 새 문 블록을 추가합니다."], "answer": "C", "multi": false, "explanation": "AWS KMS 키 정책은 kms:ViaService와 같은 조건 키를 활용하여 키가 사용되는 방법과 위치를 제한할 수 있습니다. AWS 공인 보안 - 전문 문서에 따르면 kms:ViaService는 특정 리전의 특정 AWS 서비스에서 발생하는 요청으로 키 사용을 제한합니다. 이 조건이 지나치게 광범위하거나 잘못된 경우 다른 IAM 역할 및 서비스가 의도치 않게 키를 사용할 수 있습니다. kms:ViaService 조건 값을 ec2.us-east-1.amazonaws.com으로 명시적으로 설정하면 키 정책은 EBS 볼륨 암호화와 같이 해당 리전의 Amazon EC2 서비스를 통해 요청이 이루어질 때만 KMS 키를 사용할 수 있도록 보장합니다. 이렇게 하면 다른 서비스나 의도하지 않은 IAM 역할이 키를 사용하는 것을 방지할 수 있습니다. 옵션 A는 조건 논리를 약화시키고 액세스를 확대할 수 있습니다. 옵션 B는 IAM 정책이 KMS 키와 함께 작동하도록 허용하는 필수 권한을 제거하므로 권장되지 않습니다. 옵션 D는 서비스 수준 사용 제한이 아닌 키의 관리 제어와 관련이 있습니다. AWS 모범 사례에서는 kms:ViaService 및 정확한 조건 값을 사용하여 서비스별 키 사용 및 강력한 업무 분리를 적용할 것을 권장합니다."},
  {"id": 44, "text": "한 회사의 애플리케이션 팀이 내부 애플리케이션을 Amazon EC2 인스턴스, AWS Lambda 함수 및 Amazon S3 버킷으로 구성된 새로운 AWS 아키텍처로 교체하려고 합니다. 이 아키텍처는 단일 AWS 리전에 위치합니다. 아키텍처 검토 후 보안 팀은 애플리케이션 네트워크 트래픽이 어떤 지점에서도 공용 인터넷을 통과해서는 안 된다고 요구했습니다. 보안 팀은 이미 AWS Organizations에서 해당 회사의 조직에 대해 인터넷 게이트웨이, NAT 게이트웨이 및 송신 전용 게이트웨이 생성을 제한하는 SCP(보안 정책)를 수립해 놓은 상태입니다. 이러한 요구사항을 충족하기 위해 애플리케이션 팀은 어떤 단계들을 조합하여 진행해야 할까요? (세 가지를 선택하세요.)", "choices": ["애플리케이션의 VPC에 대한 전체 액세스 정책이 있는 S3 엔드포인트를 생성합니다.", "S3 버킷에 대한 S3 액세스 포인트를 생성합니다. 네트워크 출처를 VPC로 제한하는 정책을 포함합니다.", "Lambda 함수를 실행합니다. 공개 액세스 차단 구성을 활성화합니다.", "S3 엔드포인트를 대상으로 하는 포트 443에 대한 아웃바운드 규칙이 있는 보안 그룹을 생성합니다. 해당 보안 그룹을 EC2 인스턴스와 연결합니다.", "S3 액세스 포인트를 대상으로 하는 포트 443에 대한 아웃바운드 규칙이 있는 보안 그룹을 생성합니다. 해당 보안 그룹을 EC2 인스턴스와 연결합니다.", "VPC에서 Lambda 함수를 실행합니다."], "answer": "A,B,F", "multi": true, "explanation": "애플리케이션 트래픽을 공개 인터넷에서 차단하려면 EC2 및 Lambda 리소스가 프라이빗 VPC 네트워킹을 통해 S3에 접근해야 합니다. S3 게이트웨이 엔드포인트는 인터넷 게이트웨이나 NAT 게이트웨이를 사용하지 않고 VPC에서 S3로의 프라이빗 액세스를 제공합니다. S3 액세스 포인트 또한 VPC 소스를 제한할 수 있어 구성된 VPC 경로에서 나오지 않은 요청은 S3가 거부합니다. Lambda 함수는 S3 트래픽이 프라이빗 엔드포인트 경로를 사용할 수 있도록 VPC 내에서 실행되어야 합니다. Lambda의 '퍼블릭 액세스 차단(block public access)'은 관련 S3 네트워크 제어가 아닙니다. 보안 그룹은 S3 게이트웨이 엔드포인트나 S3 액세스 포인트를 distractors가 설명하는 방식으로 대상 리소스로 지정할 수 없습니다."},
  {"id": 45, "text": "한 회사가 인터넷에 연결된 ALB(애플리케이션 로드 밸런싱) 뒤에서 ECS 서비스를 운영하고 있으며, 이 ALB는 CloudFront의 오리진 서버 역할을 합니다. AWS WAF 웹 ACL이 CloudFront와 연결되어 있지만, 클라이언트는 ALB에 직접 접근하여 이 ACL을 우회할 수 있습니다. 어떤 해결책이 ALB에 대한 직접 접근을 차단할 수 있을까요?", "choices": ["ALB와 함께 AWS PrivateLink를 사용하세요.", "ALB를 내부 ALB로 교체합니다.", "ALB 리스너 규칙을 CloudFront IP 범위로 제한합니다.", "CloudFront에서 사용자 지정 헤더를 요구하고 ALB에서 유효성을 검사합니다."], "answer": "D", "multi": false, "explanation": "AWS 모범 사례에서는 CloudFront와 ALB 원본 간에 공유 암호 헤더를 사용하여 직접 액세스를 방지할 것을 권장합니다. CloudFront는 사용자 지정 헤더를 삽입하고 ALB 리스너 규칙은 헤더의 존재를 검증합니다. CloudFront IP 변경으로 인해 IP 기반 제어가 취약합니다. PrivateLink 및 내부 ALB는 CloudFront 오리진으로 지원되지 않습니다. 헤더 유효성 검사는 가장 안정적이고 널리 권장되는 패턴입니다."},
  {"id": 46, "text": "한 회사의 웹 애플리케이션이 Auto Scaling 그룹의 Application Load Balancer(ALB) 뒤에 있는 Amazon EC2 인스턴스에서 실행됩니다. 해당 ALB에는 AWS WAF 웹 접근 제어 목록(ACL)이 연결되어 있습니다. 재부팅 후 인스턴스 로그가 손실되는 문제가 발생하고 있습니다. 운영팀은 특정 PHP 파일을 대상으로 하는 악의적인 활동을 의심하고 있습니다. 향후 유사한 사례 발생 시 공격자의 IP 주소를 식별할 수 있는 일련의 조치는 무엇입니까?", "choices": ["VPC 흐름 로그를 구성하고 PHP 파일 활동을 검색합니다.", "ALB에 CloudWatch 에이전트를 설치하고 애플리케이션 로그를 내보냅니다.", "ALB 액세스 로그를 Amazon OpenSearch 서비스로 내보내고 검색합니다.", "웹 ACL을 구성하여 로그를 Amazon Kinesis Data Firehose로 전송합니다. 로그를 Amazon S3에 저장하고 Amazon Athena를 사용하여 쿼리합니다."], "answer": "D", "multi": false, "explanation": "AWS WAF 로그에는 소스 IP 주소, 요청된 URI, 규칙 일치 등 자세한 요청 수준 정보가 포함되어 있습니다. AWS 공인 보안 - 전문 지침에 따르면 AWS WAF 로깅을 활성화하면 특히 인스턴스 수준 로그를 사용할 수 없는 경우 웹 기반 공격을 조사할 수 있는 가장 안정적이고 변조 방지 방법이 제공됩니다. Amazon Kinesis Data Firehose를 통해 Amazon S3로 WAF 로그를 스트리밍함으로써 회사는 EC2 수명 주기 이벤트와 무관한 내구성이 뛰어난 중앙 집중식 로그 스토리지를 보장합니다. 그런 다음 Amazon Athena는 로그를 효율적으로 쿼리하여 new-user-creation.php 엔드포인트에 대한 반복되는 요청을 식별하고 공격자 IP 주소를 추출할 수 있습니다. VPC 흐름 로그는 HTTP 수준 세부 정보를 캡처하지 않습니다. ALB 액세스 로그만으로는 차단된 요청을 캡처할 수 없습니다. WAF 로그는 향후 탐지를 위한 최고의 포렌식 가시성을 제공합니다."},
  {"id": 47, "text": "한 기업의 보안 엔지니어가 IAM 사용자 계정 자격 증명 유출 사고에 대한 대응 계획을 수립해야 합니다. 이 기업은 AWS Organizations의 조직과 AWS IAM Identity Center를 사용하여 사용자 액세스를 관리합니다. 또한 위임된 관리자 계정을 통해 AWS Security Hub를 구현했으며, 이 위임된 관리자 계정에는 모든 이벤트를 Amazon S3 버킷에 기록하는 AWS CloudTrail 조직 트레일이 포함되어 있습니다. 더불어, 조직 이벤트 데이터 저장소(EDS)를 구성하여 트레일에서 발생하는 모든 이벤트를 수집하고 있습니다. 사고 대응 계획에는 보안 엔지니어가 보안 사고 알림을 수신했을 때 손상된 IAM 사용자를 즉시 ​비활성화하기 위한 조치가 포함되어야 합니다. 또한 해당 IAM 사용자가 모든 AWS 계정에서 사용되지 않도록 차단해야 합니다. 아울러, 손상된 IAM 사용자가 지난 7일 동안 모든 계정에서 수행한 모든 AWS 작업을 수집해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["조직 관리 계정에서 손상된 IAM 사용자를 비활성화합니다. Amazon Athena를 사용하여 S3 버킷에 있는 조직의 CloudTrail 로그를 조회하여 해당 IAM 사용자가 지난 7일 동안 수행한 작업을 확인합니다.", "조직 관리 계정에서 IAM 사용자에게 연결된 모든 IAM 정책을 제거합니다. AWS Security Hub를 사용하여 CloudTrail 로그에서 IAM 사용자가 지난 7일 동안 수행한 작업을 조회할 수 있습니다.", "IAM Identity Center에서 해당 IAM 사용자에게 할당된 모든 권한 세트를 제거합니다. Amazon CloudWatch Logs Insights를 사용하여 S3 버킷의 CloudTrail 로그를 쿼리하여 해당 IAM 사용자가 지난 7일 동안 수행한 작업을 확인합니다.", "IAM Identity Center에서 IAM 사용자의 액세스를 비활성화합니다. AWS CloudTrail을 사용하여 조직 이벤트 데이터 저장소에서 IAM 사용자가 지난 7일 동안 수행한 작업을 조회합니다."], "answer": "D", "multi": false, "explanation": "AWS IAM Identity Center를 사용하여 AWS 조직 전체에서 사용자 액세스를 관리할 때, Identity Center는 사용자 액세스를 활성화하고 비활성화하는 권한 관리의 권위 있는 제어 평면입니다. AWS Certified Security - Specialty 공식 학습 가이드에 따르면, IAM Identity Center에서 사용자를 비활성화하면 해당 사용자는 권한 세트를 통해 할당된 모든 AWS 계정이나 역할에 즉시 접근할 수 없게 되어, 조직 전체의 액세스를 중지해야 하는 요구 사항을 충족합니다."},
  {"id": 48, "text": "한 회사가 AWS Organizations에서 모든 기능이 활성화된 조직을 사용하고 있습니다. 이 조직에는 OU(조직 단위)가 포함되어 있습니다. 회사는 AWS IAM Identity Center에 대한 위임된 관리자 계정을 구성했습니다. 이 위임된 관리자 계정에는 권한 집합이 포함된 AWS CloudFormation 스택이 배포되어 있습니다. 보안 엔지니어는 CloudFormation 스택 삭제를 방지하기 위한 솔루션을 구현해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["CloudFormation 스택에 대한 종료 보호를 활성화합니다. 스택의 ARN에 대해 cloudformation:UpdateTerminationProtection 작업을 거부하는 SCP를 생성합니다. 해당 SCP를 조직의 루트에 적용합니다.", "CloudFormation 스택에 대한 종료 보호를 활성화합니다. 스택의 ARN에 대해 cloudformation:DeleteStack 작업을 거부하는 SCP를 생성합니다. 위임된 관리자 계정이 포함된 OU를 제외한 모든 OU에 SCP를 적용합니다.", "CloudFormation 스택의 모든 리소스에 대해 DeletionPolicy 속성을 Retain으로 설정합니다. 스택의 ARN에 대해 cloudformation:DeleteStack 작업을 거부하는 IAM 정책을 생성합니다. 조직의 관리 계정에 있는 모든 IAM 사용자 및 역할에 해당 IAM 정책을 연결합니다.", "스택 리소스에 대한 업데이트를 거부하는 스택 정책을 할당합니다. 스택의 ARN에 대해 cloudformation:UpdateStack 작업을 거부하는 SCP를 생성합니다. 해당 SCP를 모든 OU와 조직의 관리 계정에 적용합니다."], "answer": "A", "multi": false, "explanation": "CloudFormation 종료 보호는 스택이 삭제되는 것을 방지하는 특정 기능입니다. 사용자가 보호된 스택을 삭제하려고 시도하면 삭제 작업이 실패합니다. 그러나 cloudformation:UpdateTerminationProtection 권한을 가진 사용자는 보호를 해제하고 스택을 삭제할 수 있습니다. 따라서 가장 강력한 제어 방법은 종료 보호를 활성화하고 조직 전체에서 해당 스택 ARN에 대해 UpdateTerminationProtection을 거부하는 SCP를 사용하는 것입니다. 옵션 B는 위임된 관리자 OU를 제외하므로 스택이 실제로 존재하는 위치를 제외하게 되어 더 약합니다. DeletionPolicy: Retain은 스택 삭제 후 자원을 유지하지만 스택 삭제 자체를 방지하지는 않습니다. 스택 정책은 스택 삭제가 아니라 스택 자원에 대한 업데이트를 제어합니다."},
  {"id": 49, "text": "한 회사가 외부 CI/CD 파이프라인에서 Amazon ECR로 푸시된 취약한 컨테이너 이미지로 인해 보안 사고를 경험했습니다. 어떤 해결책이 취약한 이미지의 배포를 막을 수 있을까요?", "choices": ["Lambda 차단을 사용하여 ECR 향상된 스캐닝을 활성화합니다.", "EventBridge 및 Lambda와 함께 Amazon Inspector를 사용하세요.", "SBOM 생성을 사용하여 Amazon Inspector를 CI/CD 파이프라인에 통합하고, 심각한 오류가 발견되면 파이프라인이 실패하도록 합니다.", "기본 연속 ECR 스캐닝을 활성화합니다."], "answer": "C", "multi": false, "explanation": "Amazon Inspector는 보안 검사가 컨테이너 이미지가 Amazon ECR에 푸시되기 전에 수행될 수 있도록 하는 네이티브 CI/CD 통합 기능을 제공합니다. AWS 공인 보안 전문가(Specialty) 문서에 따르면, Inspector는 이미지 푸시를 자동으로 차단하지 않습니다. 대신, 예방은 CI/CD 파이프라인 자체 내에서 발생해야 합니다. Amazon Inspector SBOM 생성기를 사용하여 소프트웨어 자재 명세서(SBOM)를 생성하고 이를 Inspector에 제출하여 스캔을 수행함으로써, 파이프라인은 이미지 업로드 전에 중요한 취약성을 감지할 수 있습니다. 취약성이 정책 임계값을 초과하면, 파이프라인은 실패하여 배포를 방지합니다. 푸시 후 스캔 솔루션은 노출 후에만 취약성을 감지합니다. 이벤트 기반 차단은 초기 위험을 방지하지 않습니다. AWS 모범 사례에서는 취약한 아티팩트가 프로덕션에 들어가는 것을 방지하기 위해 '쉬프트-레프트(shift-left)' 보안 제어를 요구합니다."},
  {"id": 50, "text": "한 회사가 Amazon RDS 스냅샷에 대한 데이터 수명주기 관리를 구현해야 합니다. 이 회사는 AWS Backup을 사용하여 스냅샷을 관리할 예정입니다. 해당 회사는 RDS 자동 스냅샷을 5년간 보관해야 하며, 장기 보관을 위해 Amazon S3를 사용할 예정입니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Backup을 사용하여 RDS 스냅샷에 5년 보존 태그를 적용합니다.", "AWS Backup이 RDS 스냅샷에 사용하는 S3 버킷에서 버전 관리를 활성화합니다. 구성 5년 보존 기간.", "S3 수명 주기 정책을 생성합니다. AWS Backup에서 RDS 스냅샷에 사용하는 S3 버킷에 대해 5년의 보존 기간을 포함합니다.", "AWS Backup에서 백업 계획을 생성합니다. 5년 보존 기간을 구성합니다."], "answer": "D", "multi": false, "explanation": "AWS Backup를 사용하면 RDS 스냅샷의 수명 주기를 관리하기 위해 정의된 보존 기간을 포함하는 백업 계획을 생성할 수 있습니다. AWS Backup 계획에서 5년 보존 기간을 구성함으로써 회사는 RDS 스냅샷이 필요한 기간 동안 보존되도록 보장할 수 있습니다. 또한 AWS Backup은 백업 계획에 명시된 대로 장기 보관을 위해 백업을 Amazon S3로 이동하는 작업도 처리할 수 있습니다."},
  {"id": 51, "text": "한 회사가 AWS Config 규칙을 사용하여 회사 데이터 보호 정책을 준수하지 않는 Amazon S3 버킷을 식별합니다. 해당 S3 버킷은 여러 AWS 리전과 여러 AWS 계정에 호스팅되어 있으며, 이 계정들은 AWS Organizations 내의 조직에 속해 있습니다. 이 회사는 조직의 기존 비준수 S3 버킷과 향후 생성될 모든 비준수 S3 버킷을 해결할 수 있는 솔루션이 필요합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["조직 전체 리소스 데이터 집계를 위한 AWS Config 애그리게이터를 배포합니다. AWS Config에서 규정을 준수하지 않는 S3 버킷을 발견하면 해당 S3 버킷을 삭제하거나 재구성하여 대응하는 AWS Lambda 함수를 생성합니다.", "조직 전체 리소스 데이터 집계를 위한 AWS Config 애그리게이터를 배포합니다. 새로운 비준수 S3 버킷 생성을 방지하는 거부 문이 포함된 SCP를 생성합니다. 해당 SCP를 조직의 모든 OU에 적용합니다.", "회사가 현재 사용 중인 계정 및 리전만 대상으로 하는 AWS Config 애그리게이터를 배포합니다. AWS Config에서 규정을 준수하지 않는 S3 버킷을 발견하면 해당 S3 버킷을 삭제하거나 재구성하는 AWS Lambda 함수를 생성합니다.", "회사에서 현재 사용 중인 계정 및 리전만 포함하는 AWS Config 애그리게이터를 배포합니다. 새로운 비준수 S3 버킷 생성을 방지하는 거부 문이 포함된 SCP를 생성합니다. 조직의 모든 OU에 SCP를 적용합니다."], "answer": "A", "multi": false, "explanation": "이 요구 사항에는 기존 규격 미준수 버킷을 수정하는 것뿐만 아니라 여러 계정 및 리전에서 향후 규격 미준수 버킷을 처리하는 것도 포함됩니다. 조직 전체의 AWS Config 집계기를 사용하면 모든 회원 계정/리전의 규정 준수 상태를 중앙에서 확인할 수 있습니다. 수정하기 위해, AWS Config는 자동화(AWS Lambda 함수나 SSM Automation을 호출하는 이벤트브리지/EventBridge 또는 SNS를 통해 일반적으로)를 트리거하여 버킷이 규정 미준수로 평가될 때 기본 암호화 활성화, 공개 액세스 차단 또는 필요한 버킷 정책 적용과 같은 수정 조치를 수행할 수 있습니다. 이는 기존 발견 사항(현재 규정 미준수 리소스에서 수정 실행)과 새로운 발견 사항(새로운 버킷이 생성되거나 구성 변경이 발생할 때 자동 대응) 모두를 처리합니다."},
  {"id": 52, "text": "한 회사가 아마존 S3 버킷에서 데이터를 읽고 쓰는 웹 애플리케이션을 보유하고 있습니다. 이 회사는 모든 S3 API 호출을 AWS 자격 증명으로 인증해야 합니다. 어떤 솔루션이 애플리케이션에 AWS 자격 증명을 제공할까요?", "choices": ["Amazon Cognito ID 풀과 GetId API를 사용하세요.", "Amazon Cognito ID 풀을 사용하고 AssumeRoleWithWebIdentity를 사용합니다.", "ID 토큰을 사용하여 Amazon Cognito 사용자 풀을 사용합니다.", "액세스 토큰을 사용하여 Amazon Cognito 사용자 풀을 사용합니다."], "answer": "B", "multi": false, "explanation": "Amazon Cognito 자격 증명 풀은 AssumeRoleWithWebIdentity를 사용하여 AWS STS와 웹 자격 증명 토큰을 교환함으로써 임시 AWS 자격 증명을 제공합니다. AWS 공인 보안 - 전문 문서에 따르면 이는 애플리케이션에 AWS 자격 증명을 부여하는 올바른 메커니즘입니다. 사용자 풀은 사용자를 인증하지만 AWS 자격 증명을 발급하지는 않습니다. 자격 증명 풀은 IAM 역할 및 STS와 통합되어 AWS 서비스에 대한 안전하고 임시적인 액세스를 지원합니다."},
  {"id": 53, "text": "한 회사가 매장 수를 늘리고 있습니다. 각 신규 매장이 문을 여는 날, 회사는 해당 매장 전용 웹 애플리케이션을 출시하려고 합니다. 각 매장의 애플리케이션은 비운영 환경과 운영 환경을 가지며, 각 환경은 별도의 AWS 계정에 배포될 예정입니다. 해당 회사는 AWS Organizations를 사용하고 있으며, 이러한 계정만을 위해 사용되는 OU(조직 단위)를 보유하고 있습니다. 이 회사는 대부분의 개발 작업을 외부 개발팀에 위탁합니다. 보안 엔지니어는 각 팀이 회사의 AWS 리소스 배포 계획을 준수하는지 확인해야 합니다. 또한 보안 엔지니어는 배포 계획에 대한 접근 권한을 필요한 개발자에게만 제한해야 합니다. 보안 엔지니어는 이미 해당 배포 계획을 구현하는 AWS CloudFormation 템플릿을 생성했습니다. 보안 엔지니어는 요구 사항을 가장 안전한 방식으로 충족하기 위해 다음에 무엇을 해야 할까요?", "choices": ["조직의 관리 계정에 AWS 서비스 카탈로그 포트폴리오를 생성합니다. CloudFormation 템플릿을 업로드합니다. 포트폴리오의 제품 목록에 템플릿을 추가합니다. 포트폴리오를 OU와 공유합니다.", "CloudFormation CLI를 사용하여 CloudFormation 템플릿에서 모듈을 생성합니다. CloudFormation 레지스트리에 모듈을 비공개 확장으로 등록합니다. 확장을 게시합니다. OU에서 확장에 대한 액세스를 허용하는 SCP를 생성합니다.", "조직의 관리 계정에 AWS 서비스 카탈로그 포트폴리오를 생성합니다. CloudFormation 템플릿을 업로드합니다. 포트폴리오의 제품 목록에 템플릿을 추가합니다. OU 계정의 사용자가 포트폴리오에 교차 계정으로 액세스할 수 있도록 허용하는 신뢰 정책이 있는 IAM 역할을 생성합니다. AWSServiceCatalogEndUserFullAccess 관리형 정책을 해당 역할에 연결합니다.", "CloudFormation CLI를 사용하여 CloudFormation 템플릿에서 모듈을 생성합니다. CloudFormation 레지스트리에 모듈을 비공개 확장으로 등록합니다. 확장을 게시합니다. 확장을 OU와 공유합니다."], "answer": "A", "multi": false, "explanation": "AWS 서비스 카탈로그는 조직이 제품으로 알려진 승인된 CloudFormation 템플릿 세트를 생성하고 관리하며 특정 계정이나 조직 단위(OU)에 제공할 수 있도록 설계되었습니다. AWS 공인 보안 - 전문 가이드(AWS Certified Security - Specialty Study Guide)에 따르면, 서비스 카탈로그는 강력한 액세스 제어를 유지하면서 표준화된 인프라 배포를 시행하기 위한 선호되는 거버넌스 메커니즘입니다. 관리 계정에서 서비스 카탈로그 포트폴리오를 생성하고 이를 특정 OU와 공유함으로써 보안 엔지니어는 해당 OU 내의 계정만 승인된 CloudFormation 템플릿을 배포할 수 있도록 보장합니다. 이는 제3자 개발자가 템플릿 자체를 수정하거나 직접 액세스하지 않고 회사의 사전에 정의된 배포 계획에 따라 인프라를 배포할 수 있도록 보장합니다."},
