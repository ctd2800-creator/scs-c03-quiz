  {"id": 148, "text": "보안 엔지니어는 탄력적 IP 주소를 사용하는 네트워크 로드 밸런서(NLB)에 대한 DDoS 공격 방지 설정을 구성해야 합니다. 이 엔지니어는 NLB를 보호하기 위해 속도 기반 규칙문을 사용하는 AWS WAF 웹 ACL을 설정하려고 합니다. 보안 엔지니어는 정상적인 트래픽을 차단하지 않는 속도 제한을 설정해야 합니다. 보안 엔지니어는 소스 IP 주소를 기준으로 집계하도록 규칙 문을 구성했습니다. 보안 엔지니어는 NLB를 보호하기 위해 규칙을 어떻게 구성해야 할까요?", "choices": ["카운트 작업을 사용하도록 규칙을 구성합니다.", "차단 작업을 사용하도록 규칙을 구성합니다.", "모니터 작업을 사용하도록 규칙을 구성합니다.", "허용 작업을 사용하도록 규칙을 구성합니다."], "answer": "A", "multi": false, "explanation": "AWS WAF rate-based rules are designed to help protect applications and resources from traffic floods and application-layer DDoS attacks by tracking the number of requests from individual source IP addresses over a rolling time window. According to the AWS Certified Security - Specialty Official Study Guide and AWS WAF documentation, rate-based rules can be configured with different actions, including Count, Block, and Allow. When a security engineer is determining an appropriate rate limit that will not block legitimate traffic, AWS best practices recommend initially configuring the rate-based rule with the Count action. The Count action allows AWS WAF to monitor and log requests that exceed the specified rate threshold without actively blocking them. This provides visibility into traffic patterns and enables the security engineer to analyze how the rule would behave in production. By using the Count action, the security engineer can safely evaluate whether legitimate users would be affected by the chosen rate limit. Once the engineer is confident that the threshold accurately distinguishes between normal traffic and malicious behavior, the action can later be changed to Block."},
  {"id": 149, "text": "한 회사의 보안 엔지니어가 AWS로부터 악용 경고 알림을 받았습니다. 이 알림은 누군가가 회사 AWS 계정을 이용해 악성코드를 호스팅하고 있다는 내용입니다. 조사 결과, 보안 엔지니어는 IAM 사용자가 권한 없이 생성한 새로운 Amazon S3 버킷을 발견했습니다. 보안 엔지니어는 이번 침해로 인한 결과를 최소화하기 위해 어떤 조치들을 조합하여 취해야 할까요? (세 가지를 선택하세요.)", "choices": ["모든 AWS CloudTrail 로그를 암호화합니다.", "Amazon GuardDuty를 켜세요.", "모든 IAM 사용자의 암호를 변경합니다.", "모든 AWS 액세스 키를 회전하거나 삭제합니다.", "모든 Amazon Elastic Block Store(Amazon EBS) 볼륨의 스냅샷을 생성합니다.", "인식되지 않거나 권한이 없는 리소스를 모두 삭제합니다."], "answer": "B,D,F", "multi": true, "explanation": "AWS incident response best practices emphasize rapid containment, credential revocation, and threat detection to minimize the blast radius of a compromise. According to the AWS Certified Security - Specialty Official Study Guide, when unauthorized resources such as an Amazon S3 bucket hosting malware are discovered, immediate action must be taken to stop further misuse of the account and to prevent recurrence. Rotating or deleting all AWS access keys (Option D) is a critical containment step. If an IAM user has been compromised, any long-term credentials associated with that user must be revoked immediately to prevent continued unauthorized access. AWS guidance explicitly lists access key rotation or deletion as a first-response action for suspected credential compromise. Deleting unrecognized or unauthorized resources (Option F) directly removes the malicious infrastructure that is being abused. In this case, deleting the unauthorized S3 bucket immediately stops malware distribution and reduces reputational and compliance impact. Turning on Amazon GuardDuty (Option B) enables continuous threat detection by analyzing CloudTrail events, VPC Flow Logs, and DNS logs. GuardDuty can identify additional malicious activity, compromised credentials, or persistence mechanisms that the attacker may have established. AWS documentation recommends enabling GuardDuty during or immediately after an incident to detect ongoing or future threats."},
  {"id": 150, "text": "한 회사가 AWS Organizations 내의 조직에 AWS 계정을 보유하고 있습니다. 해당 조직에는 전용 보안 계정이 포함되어 있습니다. 모든 멤버 계정의 모든 AWS 계정 활동은 지정된 보안 계정에 기록 및 보고되어야 합니다. 회사는 모든 활동 로그를 지정된 보안 계정 내의 안전한 저장 위치에 2년 동안 보관해야 합니다. 로그를 변경하거나 삭제하는 것은 허용되지 않습니다. 운영 부담을 최소화하면서 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["전용 보안 계정에서 Amazon S3 버킷을 생성합니다. S3 객체 잠금을 규정 준수 모드로 구성하고 보존 기간을 2년으로 설정합니다. 조직의 관리 계정이 S3 버킷에 쓰기 작업을 수행할 수 있도록 버킷 정책을 설정합니다.", "전용 보안 계정에서 Amazon S3 버킷을 생성합니다. S3 객체 잠금을 규정 준수 모드로 구성하고 보존 기간을 2년으로 설정합니다. 조직의 구성원 계정이 S3 버킷에 쓰기 작업을 수행할 수 있도록 버킷 정책을 설정합니다.", "전용 보안 계정에서 객체가 2년 후에 만료되는 S3 수명 주기 구성을 사용하여 Amazon S3 버킷을 생성합니다. 멤버 계정이 버킷에 쓰기 권한을 갖도록 허용합니다.", "AWS CloudTrail 조직 트레일을 생성합니다. 지정된 보안 계정의 Amazon S3 버킷으로 로그가 전송되도록 구성합니다.", "각 계정에서 AWS CloudTrail을 활성화하고 AWS Lambda 및 Amazon Data Firehose를 사용하여 로그를 전용 보안 계정으로 전달합니다."], "answer": "A,D", "multi": true, "explanation": "AWS CloudTrail organization trails are specifically designed to provide centralized, organization- wide logging with minimal operational effort. According to the AWS Certified Security - Specialty Official Study Guide, an organization trail records all management events for all member accounts and delivers them to a single Amazon S3 bucket. To ensure that logs cannot be altered or deleted, Amazon S3 Object Lock in compliance mode must be used. Compliance mode enforces write-once-read-many (WORM) protection, meaning no user, including the root user, can delete or modify objects before the retention period expires. This directly satisfies the requirement that no changes or deletions are allowed for 2 years. The S3 bucket must reside in the dedicated security account to provide isolation and strong security boundaries. Granting write permissions to the organization's management account (Option A) aligns with AWS best practices, because the management account owns and manages the organization trail and centrally delivers logs on behalf of all member accounts."},
  {"id": 152, "text": "한 회사가 AWS 계정에서 Amazon Macie, AWS Firewall Manager, Amazon Inspector 및 AWS Shield Advanced를 사용하고 있습니다. 이 회사는 계정에 대한 DDoS 공격이 발생할 경우 알림을 받고 싶어합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["Amazon Macie를 사용하여 활성 DDoS 이벤트를 감지하고 Macie의 감지 결과에 따라 대응하는 Amazon CloudWatch 알람을 생성합니다.", "Amazon Inspector를 사용하여 리소스를 검토하고 DDoS 공격에 취약한 리소스에 대해 Amazon CloudWatch 경보를 호출하세요.", "활성 DDoS 이벤트를 감지하기 위해 AWS Firewall Manager 메트릭을 모니터링하는 Amazon CloudWatch 알람을 생성합니다.", "활성 DDoS 이벤트에 대한 AWS Shield Advanced 메트릭을 모니터링하는 Amazon CloudWatch 알람을 생성합니다."], "answer": "D", "multi": false, "explanation": "AWS Shield Advanced is the AWS-native managed service specifically designed to provide detection, mitigation, and visibility for Distributed Denial of Service (DDoS) attacks at both the network and application layers. Shield Advanced integrates directly with Amazon CloudWatch by publishing DDoS-related metrics such as DDoSDetected, AttackVolume, and AttackVector, which can be monitored using CloudWatch alarms to trigger alerts in near real time."},
  {"id": 153, "text": "보안 엔지니어는 Amazon S3 버킷에 있는 객체에 대한 자세한 정보를 수집하는 로깅 솔루션을 구현해야 합니다. 이 솔루션에는 요청을 수행한 IAM ID와 객체 접근 시간과 같은 세부 정보가 포함되어야 합니다. 데이터는 구조화되어 있어야 하며 거의 실시간으로 제공되어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "choices": ["S3 버킷에서 Amazon S3 서버 액세스 로깅을 활성화합니다. 로그를 저장할 새 S3 버킷을 생성합니다. 로깅용 S3 버킷의 로그를 분석합니다.", "AWS CloudTrail 데이터 이벤트 로깅을 활성화합니다. 로그를 저장할 새 S3 버킷을 생성합니다. 로깅 S3 버킷에서 로그를 분석합니다.", "S3 버킷에 저장된 객체에 대한 접근을 기록하도록 AWS Config 규칙을 구성합니다.", "Amazon Macie가 S3 버킷에 저장된 객체에 대한 액세스 로그를 기록하도록 설정합니다."], "answer": "B", "multi": false, "explanation": "AWS CloudTrail data event logging is the correct solution because it is specifically designed to capture detailed, structured, and near-real-time API activity for Amazon S3 object-level operations. When S3 data events are enabled, CloudTrail records actions such as GetObject, PutObject, and DeleteObject, along with critical context including the IAM principal, source IP address, event time, request parameters, and response elements. These logs are delivered in JSON format, making them highly structured and suitable for security analysis, SIEM integration, and automated detection workflows."},
  {"id": 154, "text": "보안 엔지니어는 VPC에서 실행되는 공개 웹 애플리케이션을 보호해야 합니다. 해당 VPC는 ​Amazon CloudFront 배포의 오리진 서버를 호스팅합니다. 이 애플리케이션은 여러 차례 레이어 7 DDoS 공격을 경험했습니다. AWS WAF 웹 ACL이 CloudFront 배포와 연결되어 있으며, 웹 ACL에는 평판이 좋지 않은 것으로 알려진 IP 주소를 차단하는 AWS 관리형 규칙이 하나 포함되어 있습니다. 보안 엔지니어는 수동 작업 없이 실시간으로 레이어 7 DDoS 공격을 탐지하고 완화하는 자동화 솔루션을 구성해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["CloudFront 배포에서 AWS Shield Advanced를 활성화합니다. Amazon CloudWatch에서 DDoS 표시기에 대한 알림을 구성합니다.", "AWS Shield Advanced를 활성화하고 AWS DDoS 대응팀(DRT)과의 사전 예방적 상호 작용을 구성합니다.", "VPC에 AWS 네트워크 방화벽을 배포합니다. DDoS 공격 징후를 감지하는 보안 정책을 생성합니다. 공격 발생 시 웹 ACL 규칙을 자동으로 업데이트하는 AWS Lambda 함수를 생성합니다.", "웹 ACL에 속도 기반 규칙을 추가합니다. AWS Shield Advanced를 활성화합니다. CloudFront 배포에서 애플리케이션 계층 DDoS 공격 완화를 자동으로 활성화합니다."], "answer": "D", "multi": false, "explanation": "Option D is the correct solution because it provides fully automated, real-time detection and mitigation of application-layer (Layer 7) DDoS attacks with no manual intervention. AWS Shield Advanced includes automatic application layer DDoS mitigation when it is enabled for supported resources such as Amazon CloudFront distributions. This feature continuously monitors traffic patterns and, when an attack is detected, automatically deploys AWS WAF rules to mitigate malicious requests. Adding a rate-based rule to the AWS WAF web ACL further strengthens protection by automatically blocking IP addresses that exceed a defined request threshold, which is a common characteristic of Layer 7 DDoS attacks. This combination aligns directly with AWS best practices for protecting web applications against volumetric and application-layer threats."},
  {"id": 155, "text": "한 회사가 AWS Organizations의 조직과 AWS IAM Identity Center를 사용하여 AWS 환경을 관리합니다. 이 회사는 적절하게 구성된 AD 커넥터를 통해 온프레미스 Active Directory에 액세스하도록 IAM Identity Center를 구성했습니다. 회사 직원 모두는 Cloud라는 Active Directory 그룹에 속해 있습니다. 직원들은 조직 내 거의 모든 AWS 계정을 조회하고 접근할 수 있으며, 필요한 권한을 모두 보유하고 있습니다. 그러나 '계정 A'라는 이름의 계정에는 접근할 수 없습니다. 회사 측에서는 '계정 A'가 조직 내에 실제로 존재하는지 확인했습니다. 직원들이 A 계정에 접근할 수 없는 가장 유력한 이유는 무엇일까요?", "choices": ["회사는 계정 A를 조직 내 조직 단위(OU)에 추가하지 않았습니다.", "회사는 클라우드 Active Directory 그룹을 온프레미스 Active Directory와 동기화하지 않았습니다.", "회사는 유효한 권한 집합을 사용하여 IAM ID 센터에서 계정 A에 클라우드 Active Directory 그룹을 할당하지 않았습니다.", "회사가 계정 A에 IAM 권한 경계를 적용하여 계정 접근이 차단되었습니다."], "answer": "C", "multi": false, "explanation": "In AWS IAM Identity Center (formerly AWS Single Sign-On), users and groups do not automatically gain access to all accounts in an AWS Organization simply because the accounts exist. Access is explicitly granted by assigning aprincipal(user or group) to a specific AWS account along with apermission set. Permission sets define the IAM policies that are provisioned into the target account as IAM roles."},
  {"id": 156, "text": "한 회사가 AWS Fargate를 사용하는 Amazon Elastic Container Service(Amazon ECS) 클러스터에서 컨테이너화된 애플리케이션을 실행하고 있습니다. 이 애플리케이션은 여러 개의 ECS 서비스로 실행됩니다. 각 ECS 서비스는 인터넷에 연결된 애플리케이션 로드 밸런서(ALB)의 개별 대상 그룹에 속해 있습니다. 이 ALB는 Amazon CloudFront 배포의 오리진 서버입니다. AWS WAF 웹 접근 제어 목록(ACL)이 해당 CloudFront 배포와 연결되어 있습니다. 웹 클라이언트는 CloudFront 배포를 통해 ECS 서비스에 액세스합니다. 회사는 웹 클라이언트가 웹 ACL을 우회하여 ALB에 직접 액세스할 수 있다는 사실을 알게 되었습니다. 웹 클라이언트가 ALB에 직접 접근하는 것을 방지할 수 있는 해결책은 무엇입니까?", "choices": ["AWS PrivateLink 엔드포인트를 생성합니다. 기존 ALB를 대상으로 지정합니다. PrivateLink 엔드포인트를 원본으로 설정하여 CloudFront 배포를 업데이트합니다.", "새 내부 ALB를 생성합니다. 모든 ECS 서비스를 내부 ALB로 이동합니다. 인터넷 연결 ALB를 삭제합니다. 내부 ALB를 오리진으로 설정하여 CloudFront 배포를 업데이트합니다.", "기존 ALB에 대한 리스너 규칙을 수정합니다. CloudFront 오리진 접두사 목록에 있는 IP 주소에서 오는 요청만 전달하는 조건을 추가합니다.", "오리진에 X-Shared-Secret 사용자 지정 헤더를 추가하여 CloudFront 배포를 업데이트합니다. 기존 ALB의 리스너 규칙을 수정하여 X-Shared-Secret 헤더 값이 올바른 요청만 전달하도록 합니다."], "answer": "D", "multi": false, "explanation": "The correct solution is option D because it effectively prevents direct access to the internet- facing ALB while allowing legitimate traffic that originates from Amazon CloudFront. By configuring CloudFront to include a custom HTTP header (such as X-Shared-Secret) in all origin requests, and then configuring ALB listener rules to only forward requests that contain the expected header value, the ALB will reject any requests that bypass CloudFront. This approach is a documented AWS best practice when CloudFront is placed in front of an ALB and AWS WAF is associated with the CloudFront distribution. AWS WAF only evaluates traffic that flows through CloudFront; therefore, preventing direct access to the ALB is critical to ensure that all requests are inspected by the web ACL."},
  {"id": 157, "text": "한 회사가 Amazon Elastic Kubernetes Service(Amazon EKS)에서 여러 애플리케이션을 운영하고 있습니다. 이 회사는 운영 체제, 네트워크 및 파일 이벤트 외에도 Amazon EKS 감사 로그를 모니터링하여 Kubernetes 보안 위험을 감지하는 솔루션이 필요합니다. 또한, 식별된 위험에 대해 보안 팀과 연결된 메일링 리스트로 이메일 알림을 전송해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Security Hub를 배포하고 EKS 제어를 포함하는 보안 표준을 활성화합니다. Amazon Simple Notification Service(Amazon SNS) 토픽을 생성하고 보안 팀의 메일링 리스트를 구독자로 설정합니다. Amazon EventBridge 규칙을 사용하여 관련 Security Hub 이벤트를 SNS 토픽으로 전송합니다.", "Amazon Inspector 컨테이너 이미지 스캔을 활성화합니다. EKS 보안 로그를 분석하도록 Amazon Detective를 구성합니다. EKS 감사 로그용 Amazon CloudWatch 로그 그룹을 생성합니다. AWS Lambda 함수를 사용하여 로그를 처리하고 보안 팀에 이메일 알림을 보냅니다.", "Amazon GuardDuty를 활성화합니다. GuardDuty에서 Amazon EKS에 대한 EKS 보호 및 런타임 모니터링을 활성화합니다. Amazon Simple Notification Service(Amazon SNS) 토픽을 생성하고 보안 팀의 메일링 리스트를 구독자로 설정합니다. Amazon EventBridge 규칙을 사용하여 관련 GuardDuty 이벤트를 SNS 토픽으로 전송합니다.", "모든 EKS 노드에 AWS Systems Manager 에이전트(SSM 에이전트)를 설치합니다. EKS 감사 로그를 수집하도록 Amazon CloudWatch Logs를 구성합니다. Amazon Simple Notification Service(Amazon SNS) 토픽을 생성하고 보안 팀의 메일링 리스트를 구독자로 설정합니다. 새 감사 로그가 생성될 때 SNS 토픽에 메시지를 게시하도록 CloudWatch 알람을 구성합니다."], "answer": "C", "multi": false, "explanation": "Option C best meets the requirements because Amazon GuardDuty provides Kubernetes- focused threat detection for Amazon EKS by analyzingEKS control plane audit logs(EKS Protection) and combining that signal withruntime telemetryfrom the worker nodes (Runtime Monitoring). EKS audit logs capture Kubernetes API activity and authorization decisions, allowing GuardDuty to detect suspicious cluster actions such as unusual API calls, unexpected access patterns, or indicators of compromise within the cluster. Runtime Monitoring extends coverage tooperating system/process activity, network connections, and file activityon the nodes, which directly aligns with the need to monitor OS, networking, and file events in addition to audit logs. For notifications, GuardDuty generatesfindingsthat can be delivered throughAmazon EventBridgerules. EventBridge can route relevant GuardDuty findings to anAmazon SNS topic, and SNS can sendemail alertsto the security team by subscribing the team's mailing list to the topic. This approach is fully managed, near real time, and avoids building custom log- parsing pipelines while still providing actionable alerts based on GuardDuty's curated EKS threat detections."},
  {"id": 158, "text": "프랑스의 한 회사가 아마존 코그니토(Amazon Cognito)와 코그니토 호스팅 UI(Cognito Hosted UI)를 로그인 및 가입 프로세스의 ID 브로커로 사용하고 있습니다. 이 회사는 애플리케이션을 출시했으며, 모든 사용자가 프랑스 거주자일 것으로 예상했습니다. 하지만 애플리케이션 출시 후, 회사 보안팀은 해당 애플리케이션에 대한 사기성 가입을 발견했습니다. 사기성 가입의 대부분은 프랑스 이외 지역 사용자들이었습니다. 보안팀은 회원가입 시 맞춤형 유효성 검사를 수행할 수 있는 솔루션이 필요합니다. 유효성 검사 결과에 따라 가입 요청을 승인하거나 거부해야 합니다. 다음 요구 사항을 충족하는 단계 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["사전 가입 AWS Lambda 트리거를 생성합니다. Amazon Cognito 함수를 Amazon Cognito 사용자 풀과 연결합니다.", "지리적 일치 규칙 문을 사용하여 AWS WAF 웹 ACL을 구성합니다. 웹 ACL을 Amazon Cognito 사용자 풀과 연결합니다.", "애플리케이션의 Amazon Cognito 사용자 풀에 대한 앱 클라이언트를 구성합니다. 호스팅된 UI에서 요청의 유효성을 검사하려면 앱 클라이언트 ID를 사용하십시오.", "애플리케이션의 Amazon Cognito 사용자 풀을 업데이트하여 지리적 제한 설정을 구성합니다.", "호스팅된 UI에서 요청을 검증하기 위해 소셜 ID 공급자(IdP)를 구성하려면 Amazon Cognito를 사용하십시오."], "answer": "A,B", "multi": true, "explanation": "To performcustom validation at sign-upand explicitlyaccept or denyregistrations, Amazon Cognito providesLambda triggers. APre sign-up triggerruns synchronously during the sign-up flow (including the Hosted UI) and can implement custom checks (for example, IP reputation checks, email/domain validation, velocity checks, allow/deny lists, or geo checks using an external service). Based on the trigger logic, the function can allow the sign-up to proceed or reject it, meeting the \"custom validation\" and \"accept/deny\" requirement directly. Because the observed fraud largely originatesoutside France, adding a front-door geographic control reduces unwanted traffic before it reaches Cognito.AWS WAFsupportsGeo matchconditions in a web ACL to allow/deny requests by country, which is a common mitigation for region-scoped applications. Associating a WAF web ACL to protect the Hosted UI endpoint helps block sign-up requests from non-French locations early, reducing fraud attempts and load."},
  {"id": 159, "text": "한 회사가 AWS Organizations에서 조직을 사용하여 여러 AWS 계정을 관리합니다. 보안 엔지니어가 us-east-1 리전의 AWS Firewall Manager에서 WAF 정책을 생성합니다. 보안 엔지니어는 해당 정책의 적용 범위를 조직 내 멤버 계정 중 하나에서 WAF-protected:true 태그가 지정된 리소스로 설정합니다. 마지막으로, 보안 엔지니어는 규정을 준수하지 않는 리소스를 자동으로 수정하는 구성을 설정합니다. 보안 엔지니어가 회원 계정에서 웹 ACL을 사용하여 us-east-1 리전에 있는 Amazon API Gateway REST API를 보호하려고 시도했습니다. 그러나 몇 분이 지나도 REST API는 웹 ACL과 연결되지 않았습니다. 이 문제의 원인은 무엇일까요?", "choices": ["웹 ACL은 REST API에 적용할 수 없습니다.", "REST API에 WAF 보호 키가 포함된 태그와 true 값이 누락되었습니다.", "웹 ACL이 이미 다른 REST API와 연결되어 있습니다.", "웹 ACL이 이미 Amazon CloudFront 배포와 연결되어 있습니다."], "answer": "B", "multi": false, "explanation": "AWS Firewall Manager applies and enforces AWS WAF protections based on thepolicy scopeyou define. In this scenario, the policy is explicitly scoped toonlythose resources that have the tag keyWAF-protectedwith a value oftrue. If the API Gateway REST API does not have that exact tag (correct key, correct value, correct spelling/case), Firewall Manager will treat the resource asout of scope. Out-of-scope resources are not evaluated for compliance and are not remediated, so the expected automatic association of the web ACL will never occur. This is the most common reason for \"nothing happens\" when Firewall Manager is configured with tag-based scoping: the resource is missing the tag, the value is different (for example \"True\" vs \"true\"), or the tag was applied to a different resource than the one Firewall Manager evaluates."},
  {"id": 160, "text": "보안 엔지니어가 최근 Amazon EC2 인스턴스의 호스트 키를 변경했습니다. 해당 엔지니어는 EC2 인스턴스 연결 기능을 사용하여 EC2 인스턴스에 액세스하려고 시도했지만 호스트 키 유효성 검사 실패 오류가 발생했습니다. 호스트 키를 변경하기 전에는 EC2 인스턴스 연결이 해당 EC2 인스턴스에서 정상적으로 작동했습니다. 보안 엔지니어는 이 오류를 해결하기 위해 무엇을 해야 할까요?", "choices": ["키 자료를 AWS 키 관리 서비스(AWS KMS)로 가져옵니다.", "새 호스트 키를 AWS 신뢰할 수 있는 호스트 키 데이터베이스에 수동으로 업로드합니다.", "AmazonSSMManagedInstanceCore 정책이 EC2 인스턴스 프로필에 연결되어 있는지 확인하십시오.", "EC2 인스턴스용 새 SSH 키 쌍을 생성합니다."], "answer": "B", "multi": false, "explanation": "EC2 Instance Connect can performserver/host authenticity checksby validating the instance's SSHhost keyagainst atrusted host keyssource. When you rotate the instance's host keys, the host presents anewfingerprint. If the trusted host keys source still contains theoldhost key, connections that enforce host key verification will fail with ahost key validationerror. The fix is to update the trusted host key record so the new host key fingerprint is recognized as valid. Therefore, the correct action is toupload the new host keyto the trusted host keys database used for EC2 Instance Connect host key verification."},
  {"id": 161, "text": "보안 엔지니어는 회사의 암호화 작업에 사용되는 키를 생성하고 관리하는 솔루션을 구현해야 합니다. 보안 엔지니어는 AWS CloudHSM 클러스터 기반의 사용자 지정 키 저장소에서 키 자료를 생성하고 사용하는 대칭 키를 생성해야 합니다. 또한 애플리케이션 내에서 로컬로 사용하기 위해 대칭 및 비대칭 데이터 키 쌍을 활용해야 합니다. 더불어 보안 엔지니어는 키 사용 내역을 감사해야 합니다. 보안 엔지니어는 어떻게 이러한 요구 사항을 충족할 수 있을까요?", "choices": ["키를 생성하려면 AWS Key Management Service(AWS KMS)와 CloudHSM 클러스터의 사용자 지정 키 저장소를 사용하십시오. 감사를 위해서는 Amazon Athena를 사용하십시오.", "키를 생성하려면 Amazon S3와 CloudHSM 클러스터의 사용자 지정 키 저장소를 사용하십시오. 감사를 위해서는 AWS CloudTrail을 사용하십시오.", "키를 생성하려면 AWS Key Management Service(AWS KMS)와 CloudHSM 클러스터의 사용자 지정 키 저장소를 사용하십시오. 감사를 위해서는 Amazon GuardDuty를 사용하십시오.", "키를 생성하려면 AWS Key Management Service(AWS KMS)와 CloudHSM 클러스터의 사용자 지정 키 저장소를 사용하십시오. 감사를 위해서는 AWS CloudTrail을 사용하십시오."], "answer": "D", "multi": false, "explanation": "The requirement is to havekey material generated and used inside a custom key store backed by an AWS CloudHSM cluster. This is exactly whatAWS KMS Custom Key Storesprovide: KMS manages the keys and policies, but the cryptographic operations for those KMS keys occur in the associatedCloudHSMcluster, keeping the key material within HSM boundaries. For applications that needlocal-use data keys(both symmetric data keys and asymmetric data key pairs), KMS supports generating data keys and data key pairs that applications can use for envelope encryption and local cryptographic operations, while the master key protections remain within KMS (and within CloudHSM when using a custom key store). For auditing, AWS best practice isAWS CloudTrail, which records KMS API calls (such as CreateKey, GenerateDataKey, GenerateDataKeyPair, Encrypt/Decrypt, etc.) and provides an immutable event history for compliance and investigation. Athena can query logs, but it is not the primary audit record source; GuardDuty is for threat detection, not authoritative key- usage auditing. Therefore, the correct combination isKMS with a CloudHSM-backed custom key storeplusCloudTrailfor auditability."},
  {"id": 162, "text": "한 회사가 아마존 EC2 인스턴스 클러스터에서 애플리케이션을 운영하고 있습니다. 이 애플리케이션은 전 세계 사용자들이 이용할 수 있습니다. 회사는 AWS 웹 방화벽(WAF) 웹 접근 제어 목록(ACL)을 애플리케이션 로드 밸런싱(ALB)과 연결하여 트래픽을 EC2 인스턴스로 라우팅합니다. 보안 엔지니어가 애플리케이션 트래픽의 갑작스러운 증가를 조사하고 있습니다. 조사 결과, 두 국가에 걸쳐 수백 개의 IP 주소에서 상당량의 악성 요청이 발생하고 있는 것으로 확인되었습니다. 보안 엔지니어는 악성 요청을 신속하게 차단하고자 하지만, 정상적인 사용자의 애플리케이션 접근은 차단하고 싶지 않습니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS WAF를 사용하여 모든 수신 요청에 대한 속도 기반 규칙을 구현합니다.", "AWS WAF를 사용하여 두 국가에서 들어오는 모든 트래픽을 차단하는 지리적 일치 규칙을 구현합니다.", "ALB 보안 그룹을 편집하여 두 국가에서 들어오는 모든 트래픽을 차단하는 지리적 일치 규칙을 포함시키십시오.", "ALB 보안 그룹에 IP 주소로부터의 수신 요청을 금지하는 거부 규칙을 추가합니다."], "answer": "A", "multi": false, "explanation": "A rate-based rule in AWS WAF is designed to quickly mitigate spikes and potential layer 7 floods bytracking request rates per originating IPand temporarily blocking (or counting/challenging, depending on configuration) IPs that exceed a defined threshold within a 5-minute rolling window. In this scenario, the malicious traffic is distributed acrosshundreds of IPsin two countries, and the application still needs to remain available globally for legitimate users. A rate-based rule provides fast, targeted throttling that reduces abusive request patterns without permanently blocking entire geographies. This aligns with \"quickly limit\" while minimizing collateral impact."},
  {"id": 163, "text": "한 회사가 Amazon EC2 온디맨드 인스턴스와 스팟 인스턴스를 혼합하여 실행되는 애플리케이션을 개발 중입니다. 보안 엔지니어는 모든 인스턴스의 로그를 단일 위치에서 확인할 수 있는 로깅 솔루션을 제공해야 합니다. 이 솔루션은 특정 사용자 그룹만 로그를 분석하여 이벤트 패턴을 파악할 수 있도록 허용해야 합니다. 또한, 해당 사용자는 로그에 대한 SQL 쿼리를 사용하여 근본 원인 분석을 수행할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["EC2 인스턴스가 애플리케이션 로그를 단일 Amazon CloudWatch Logs 로그 그룹으로 전송하도록 구성합니다. 특정 사용자만 로그 그룹에 액세스할 수 있도록 허용합니다. CloudWatch Logs Insights를 사용하여 로그 그룹을 쿼리할 수 있습니다.", "EC2 인스턴스가 애플리케이션 로그를 단일 Amazon S3 버킷으로 전송하도록 구성합니다. 특정 사용자만 S3 버킷에 액세스할 수 있도록 허용합니다. Amazon CloudWatch Logs Insights를 사용하여 S3 버킷의 로그 파일을 쿼리합니다.", "각 EC2 인스턴스가 애플리케이션 로그를 특정 Amazon CloudWatch Logs 로그 그룹으로 전송하도록 구성합니다. 특정 사용자만 로그 그룹에 액세스할 수 있도록 허용합니다. Amazon Athena를 사용하여 모든 로그 그룹을 쿼리할 수 있습니다.", "EC2 인스턴스가 애플리케이션 로그를 단일 Amazon CloudWatch Logs 로그 그룹으로 전송하도록 구성합니다. Amazon Detective에 해당 로그 그룹에 대한 액세스 권한을 부여합니다. 특정 사용자만 Detective를 사용하여 로그 그룹을 쿼리할 수 있도록 허용합니다."], "answer": "A", "multi": false, "explanation": "Option A satisfies all requirements with the most direct, purpose-built AWS logging workflow. By using the CloudWatch Agent (or fluent-bit / unified logging configuration) on each EC2 instance-- regardless of whether it is On-Demand or Spot--the application logs can be centralized into asingle Amazon CloudWatch Logs log group. Centralization ensures the logs remain available even as Spot Instances are interrupted and replaced. Access control is handled withIAM policies(and optionally resource policies/KMS encryption) so that only a specific set of users can read/query the log group. For analysis,CloudWatch Logs Insightsprovides an interactive query language that is SQL- like and commonly treated as \"SQL queries\" for troubleshooting. It enables fast filtering, aggregation, and pattern detection across large log volumes without building a separate data lake pipeline. This supports event-pattern analysis and root cause investigation directly from the centralized log group."},
  {"id": 164, "text": "보안 엔지니어가 MyLambdaFunction이라는 이름의 AWS Lambda 함수를 문제 해결하고 있습니다. 이 함수는 DOC-EXAMPLE-BUCKET이라는 이름의 Amazon S3 버킷에서 객체를 읽으려고 할 때 오류가 발생합니다. 해당 S3 버킷에는 다음과 같은 버킷 정책이 적용되어 있습니다. { \" Effect \" : \" Allow \" , \" Principal \" : { \" Service \" : \" lambda.amazonaws.com \" }, \" Action \" : \" s3:GetObject \" , \" Resource \" : \" arn:aws:s3:::DOC-EXAMPLE-BUCKET \" , \" Condition \" : { \" ArnLike \" : { \" aws:SourceArn \" : \" arn:aws:lambda:::function:MyLambdaFunction \" } } } 보안 엔지니어는 Lambda 함수가 버킷 객체를 읽을 수 있도록 정책을 어떻게 변경해야 할까요?", "choices": ["Condition 요소를 제거합니다. Principal 요소를 다음과 같이 변경합니다.{ \" AWS \" : \" arn:aws: lambda:::function:MyLambdaFunction \" }", "Action 요소를 다음과 같이 변경하세요:[ \" s3:GetObject* \" , \" s3:GetBucket* \" ]", "Resource 요소를 \" arn:aws:s3:::DOC-EXAMPLE-BUCKET/* \" 로 변경하세요.", "Resource 요소를 \"arn:aws:lambda:::function:MyLambdaFunction\"으로 변경하세요. Principal 요소를 다음과 같이 변경하세요. { \"Service\" : \"s3.amazonaws.com\" }"], "answer": "C", "multi": false, "explanation": "The policy currently grants s3:GetObject but targets thebucket ARN(arn:aws:s3:::DOC- EXAMPLE- BUCKET). For Amazon S3, object-level actions such asGetObjectmust referenceobject ARNs, not the bucket ARN. The correct resource pattern is the bucket ARNwith /*appended (for example, arn:aws:s3:::DOC-EXAMPLE-BUCKET/*) so the permission applies to objects within the bucket. Without this, S3 evaluates the request against a resource that does not match the requested object, resulting in an access denial even though the action appears correct."},
  {"id": 165, "text": "한 회사가 AWS 계정 A와 계정 B 두 개를 보유하고 있습니다. 각 계정에는 VPC가 있습니다. 계정 A의 VPC에서 실행되는 애플리케이션이 계정 B의 Amazon S3 버킷에 데이터를 저장해야 합니다. 계정 A의 애플리케이션은 이미 계정 B의 S3 버킷에 대한 쓰기 권한을 가지고 있습니다. 애플리케이션과 S3 버킷은 동일한 AWS 리전에 있습니다. 이 회사는 공용 인터넷을 통해 네트워크 트래픽을 전송할 수 없습니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["두 계정 모두에서 각 가용 영역의 서브넷에 트랜짓 게이트웨이와 VPC 연결을 생성합니다. VPC 라우팅 테이블을 업데이트합니다.", "계정 A에 소프트웨어 VPN 어플라이언스를 배포합니다. 소프트웨어 VPN 어플라이언스와 계정 B의 가상 프라이빗 게이트웨이 간에 VPN 연결을 생성합니다.", "계정 A의 VPC와 계정 B의 VPC 간에 VPC 피어링 연결을 생성합니다. 피어링된 IP 범위 간의 네트워크 트래픽을 허용하도록 VPC 라우팅 테이블, 네트워크 ACL 및 보안 그룹을 업데이트합니다.", "계정 A에서 Amazon S3용 게이트웨이 VPC 엔드포인트를 생성합니다. 계정 A의 VPC 라우팅 테이블을 업데이트합니다."], "answer": "D", "multi": false, "explanation": "To keep S3 accessoff the public internet, the standard AWS approach is to use anAmazon S3 gateway VPC endpoint(AWS PrivateLink for S3 is not used; S3 uses gateway endpoints). A gateway endpoint adds routes in the VPC route tables so traffic destined for S3 stays on the AWS backbone network rather than traversing an internet gateway, NAT gateway, or public IP paths. This satisfies the \"cannot send traffic over the public internet\" requirement while allowing the application in Account A to reach S3 in the same Region. Cross-account bucket access is controlled byIAM and the S3 bucket policy, not by networking between the two accounts' VPCs. The bucket resides in S3 (a regional service), not inside Account B's VPC, so connecting VPC-to-VPC (peering, transit gateway, VPN) does not inherently provide private access to S3. Those options would add complexity and still typically require internet/NAT unless S3 endpoints are used. With the gateway endpoint in Account A, the application can privately reach S3, and because permissions are already granted to write to the bucket in Account B, the write operations will succeed without public internet routing."},
  {"id": 166, "text": "한 회사가 애플리케이션 로드 밸런서 뒤에서 프런트엔드 서비스를 호스팅하기 위해 Amazon EC2 인스턴스를 사용합니다. Amazon Elastic Block Store(Amazon EBS) 볼륨이 EC2 인스턴스에 연결되어 있습니다. 회사는 이미지와 음악과 같은 대용량 파일을 저장하기 위해 Amazon S3 버킷을 사용합니다. 회사는 잠재적인 랜섬웨어 공격을 예방, 식별 및 격리하기 위해 AWS에 보안 아키텍처를 구현했습니다. 이제 회사는 위험을 더욱 줄이고자 합니다. 보안 엔지니어는 공격자가 예방 및 탐지 제어를 우회하는 경우 정상적인 운영으로 복구할 수 있는 재해 복구 솔루션을 개발해야 합니다. 이 솔루션은 1시간의 RPO(복구 목표 시점)를 충족해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Backup을 사용하여 EC2 인스턴스와 S3 버킷의 백업을 매시간 생성합니다. 기존 아키텍처 구성 요소를 복제하는 AWS CloudFormation 템플릿을 생성합니다. Git 리포지토리를 사용하여 CloudFormation 템플릿과 애플리케이션 구성 코드를 함께 저장합니다.", "AWS Backup을 사용하여 EBS 볼륨과 S3 객체의 백업을 매일 생성하십시오. Amazon Security Lake를 사용하여 AWS CloudTrail 로그 및 VPC 흐름 로그를 위한 중앙 집중식 데이터 레이크를 구축하십시오. 자동화된 대응을 위해 로그를 활용하십시오.", "Amazon Security Lake를 사용하여 AWS CloudTrail 로그 및 VPC 흐름 로그를 위한 중앙 집중식 데이터 레이크를 구축합니다. 자동화된 대응을 위해 로그를 활용합니다. AWS Security Hub를 활성화하여 복구 절차를 위한 단일 위치를 설정합니다. 기존 아키텍처 구성 요소를 복제하는 AWS CloudFormation 템플릿을 생성합니다. Git 리포지토리를 사용하여 CloudFormation 템플릿과 애플리케이션 구성 코드를 함께 저장합니다.", "4시간마다 EBS 스냅샷을 생성합니다. Amazon GuardDuty 맬웨어 방지 기능을 활성화합니다. GuardDuty에서 Execution:EC2/MaliciousFile 오류가 발생하는 모든 EC2 인스턴스에 대해 가장 최근 스냅샷을 즉시 복원하는 자동화를 생성합니다."], "answer": "A", "multi": false, "explanation": "An RPO of1 hourmeans the company must be able to restore data with at most60 minutes of loss. Option A directly meets this by usingAWS Backupto takehourly backupsof both the compute layer (EC2) and the data layer (S3). AWS Backup provides centralized policy-based scheduling, retention, and (when configured) immutable protections such as Backup Vault Lock to help defend backups from tampering--important in ransomware recovery scenarios. Backing up the S3 buckets hourly also addresses recovery of critical objects such as images and music that users rely on. In addition, recovery to \"normal operations\" is not only about data restoration; it also requires rapidly re-creating infrastructure reliably. UsingAWS CloudFormation templatesstored in aversion- controlled Git repositorysupports consistent, repeatable rebuilds of the ALB, EC2 fleet configuration, IAM roles, security groups, and related components. This infrastructure- as-code approach reduces human error under incident pressure and accelerates disaster recovery execution."},
  {"id": 167, "text": "한 스타트업 기업이 단일 AWS 계정을 사용하여 단일 AWS 리전에 리소스를 분산 관리하고 있습니다. 보안 엔지니어는 AWS CLI를 사용하여 동일 리전에 AWS CloudTrail 트레일을 구성하고 로그 파일을 Amazon S3 버킷으로 전송하도록 설정했습니다. 이후 기업 확장에 따라 여러 리전에 리소스를 추가하게 되었고, 보안 엔지니어는 새로 추가된 리전의 로그가 S3 버킷에 도달하지 않는 것을 발견했습니다. 보안 엔지니어는 운영 부담을 최소화하면서 이 문제를 해결하기 위해 무엇을 해야 할까요?", "choices": ["새 CloudTrail 트레일을 생성합니다. 회사가 리소스를 추가한 새 리전을 선택합니다.", "모든 리전의 모든 작업을 추적하기 위해 알림을 수신할 S3 버킷을 변경합니다.", "모든 리전에 적용되는 새로운 CloudTrail 트레일을 생성합니다.", "기존 CloudTrail 트레일이 모든 리전에 적용되도록 변경합니다."], "answer": "D", "multi": false, "explanation": "CloudTrail trails can be configured as eithersingle-Regionormulti-Region. A single-Region trail delivers events only for the Region in which it is created; when the company begins using additional Regions, those events will not be logged to the existing S3 destination unless the trail is updated. The least operational overhead is tomodify the existing trailand enablemulti- Regionlogging (that is, configure the trail to \"apply to all Regions\"). This preserves the current S3 bucket destination, encryption settings, log file validation configuration, IAM roles, and any integrations that already depend on the existing trail name and S3 prefix structure."},
  {"id": 168, "text": "한 회사가 기존 시스템 중 하나를 온프레미스 데이터 센터에서 AWS로 마이그레이션하고 있습니다. 애플리케이션 서버는 AWS에서 실행되지만, 데이터베이스는 규정 준수상의 이유로 온프레미스 데이터 센터에 유지되어야 합니다. 데이터베이스는 네트워크 지연 시간에 민감합니다. 또한 온프레미스 데이터 센터와 AWS 간에 전송되는 데이터는 IPsec 암호화를 사용해야 합니다. 다음 요구 사항을 충족하는 AWS 솔루션 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["AWS 사이트 간 VPN", "AWS Direct Connect", "AWS VPN 클라우드허브", "VPC 피어링", "NAT 게이트웨이"], "answer": "A,B", "multi": true, "explanation": "The database islatency-sensitive, so the connectivity option should minimize jitter and provide more consistent performance than traversing the public internet.AWS Direct Connectprovides a dedicated network connection from the on-premises environment into AWS, typically delivering more stable throughput and lower/consistent latency characteristics compared with internet- based paths. However, Direct Connect by itself does not automatically provideIPsec encryption. To satisfy the explicit requirement that traffic must haveIPsec encryption, the common AWS pattern is to run anAWS Site-to-Site VPN(IPsec tunnels) in conjunction with Direct Connect. This can be done as \"VPN over Direct Connect\" to encrypt the traffic while still taking advantage of Direct Connect's private, predictable connectivity. This combination meets both requirements: improved latency characteristics (Direct Connect) and IPsec encryption (Site-to-Site VPN)."},
  {"id": 169, "text": "한 회사가 AWS Organizations를 사용하고 있습니다. 이 회사의 여러 팀은 중앙 AWS 계정에 호스팅된 AWS CloudHSM 하드웨어 보안 모듈(HSM)을 사용합니다. 그중 한 팀이 자체적으로 새로운 전용 AWS 계정을 생성하고 중앙 계정에 호스팅된 HSM을 사용하려고 합니다. 보안 엔지니어는 중앙 계정에 호스팅된 HSM을 새 전용 계정과 어떻게 공유해야 할까요?", "choices": ["AWS Resource Access Manager(AWS RAM)를 사용하여 중앙 계정에 호스팅된 HSM의 VPC 서브넷 ID를 새 전용 계정과 공유합니다. CloudHSM 보안 그룹이 새 전용 계정의 클라이언트 인스턴스의 개인 IP 주소에서 들어오는 트래픽을 허용하도록 구성합니다.", "AWS Identity and Access Management(IAM)을 사용하여 중앙 계정에 있는 CloudHSM 클러스터에 액세스할 수 있는 교차 계정 역할을 생성합니다. 새 전용 계정에 새 IAM 사용자를 생성합니다. 새 IAM 사용자에게 교차 계정 역할을 할당합니다.", "AWS IAM Identity Center를 사용하여 AWS 보안 토큰 서비스(AWS STS) 토큰을 생성하여 새 전용 계정에서 중앙 계정으로 인증합니다. STS 토큰에 할당된 계정 간 권한을 사용하여 중앙 계정의 HSM에서 작업을 호출합니다.", "AWS Resource Access Manager(AWS RAM)를 사용하여 중앙 계정에 호스팅된 HSM의 ID를 새 전용 계정과 공유합니다. CloudHSM 보안 그룹이 새 전용 계정의 클라이언트 인스턴스의 개인 IP 주소에서 들어오는 트래픽을 허용하도록 구성합니다."], "answer": "D", "multi": false, "explanation": "AWS CloudHSM is aVPC-scopedservice: the HSMs (and the CloudHSM cluster) live inside a VPC in the central account, and clients connect over the network to perform cryptographic operations. When another account needs to use a centrally managed CloudHSM cluster, the right approach is toshare the CloudHSM clusterwith that account and allow network connectivity from the consuming account's clients. AWS provides cross-account resource sharing throughAWS Resource Access Manager (AWS RAM)for supported resources, including CloudHSM clusters. Sharing thecluster/HSM identifieris what grants the consuming account visibility/ability to create client configurations against that shared cluster. After sharing, the consuming account's EC2 instances (CloudHSM clients) still must be able to reach the HSM ENIs over the network, so the CloudHSM security group in the central account must allow inbound connections from the client sources (typically by security group referencing via VPC connectivity, or by allowing the relevant IP range/ports as appropriate)."},
  {"id": 170, "text": "한 회사가 외부 업체와 계약하여 여러 AWS 계정에 대한 감사를 진행하고 있습니다. 감사를 위해 감사 대상 계정 각각에 계정 간 IAM 역할이 생성되었습니다. 그런데 감사 담당자가 일부 계정에 접근하는 데 어려움을 겪고 있습니다. 다음 중 이 문제의 원인이 될 수 있는 것은 무엇입니까? (세 가지를 선택하십시오.)", "choices": ["감사자가 사용하는 외부 ID가 없거나 잘못되었습니다.", "감사자가 잘못된 비밀번호를 사용하고 있습니다.", "감사자는 대상 계정의 역할에 대해 asumeRole 권한을 부여받지 못했습니다.", "감사자가 사용하는 Amazon EC2 역할은 대상 계정 역할로 설정되어야 합니다.", "감사자가 사용하는 비밀 키가 없거나 잘못되었습니다.", "감사자가 사용하는 역할 ARN이 없거나 잘못되었습니다."], "answer": "A,C,F", "multi": true, "explanation": "Cross-account access for an external auditor typically usesSTS AssumeRoleinto a role that exists in each target account. Three common failure points are: (1) therole ARNbeing wrong or missing, (2) the auditor lacking permission to callsts:AssumeRoleon that role, and (3) anexternal IDmismatch when the role trust policy requires it. Theexternal IDis a best practice for third-party access to mitigate the confused-deputy problem; if the trust policy includes an sts:ExternalId condition, the auditor must supply the exact expected value. If it's absent or incorrect, AssumeRole will be denied. The auditor must also be authorized on their side (IAM user/role policy) to call sts:AssumeRole (permission), and the destination role'strust policymust trust the auditor principal. If either side is misconfigured, the assume operation fails. Finally, the auditor must reference the correctrole ARNfor each account; using an incorrect ARN (wrong account ID/role name/path) is a frequent reason only \"some accounts\" fail."},
  {"id": 171, "text": "보안 엔지니어는 회사 주요 웹사이트를 호스팅하는 Amazon EC2 인스턴스와 관련된 보안 취약점을 발견했다는 Amazon GuardDuty 경고를 받았습니다. GuardDuty에서 발견한 내용은 다음과 같습니다. 무단 접근: IAMUser/인스턴스 자격 증명 유출. 보안 엔지니어는 악의적인 공격자가 회사가 운영하지 않는 국가의 EC2 인스턴스에 대한 API 접근 키를 사용한 것을 확인했습니다. 보안 엔지니어는 악의적인 공격자의 접근을 차단해야 합니다. 보안 엔지니어가 가장 먼저 해야 할 일은 무엇일까요?", "choices": ["EC2 콘솔을 열고 0.0.0.0/0에서 들어오는 트래픽을 허용하는 보안 그룹을 모두 제거합니다.", "EC2 인스턴스에 AWS Systems Manager 에이전트를 설치하고 인벤토리 보고서를 실행합니다.", "호스트에 Amazon Inspector 에이전트를 설치하고 CVE 규칙 패키지를 사용하여 평가를 실행합니다.", "IAM 콘솔을 열고 인스턴스 프로필과 연결된 모든 IAM 세션을 취소합니다."], "answer": "D", "multi": false, "explanation": "The findingInstanceCredentialExfiltrationindicates that credentials available to the EC2 instance (from the instance profile / IMDS) were likely stolen and then used from an unusual location. The fastest way todeny the malicious actor immediatelyis to invalidate the stolen, currently usable credentials. Because these aretemporary credentialsissued to the instance profile role, the correct first containment action is torevoke active sessionsfor that role so the stolen session credentials stop working. This directly blocks continued API use while you continue investigation and remediation."},
  {"id": 172, "text": "한 회사가 AWS Organizations에서 동일한 조직 아래 12개의 AWS 계정으로 나뉜 플랫폼을 보유하고 있습니다. 이러한 계정 중 상당수는 Amazon API Gateway를 사용하여 회사 프런트엔드 애플리케이션에 API를 노출합니다. 이 회사는 기존 API와 향후 배포될 모든 리소스를 일반적인 SQL 인젝션 및 봇 공격으로부터 보호해야 합니다. 어떤 솔루션이 운영 부담을 최소화하면서 이러한 요구 사항을 충족할까요?", "choices": ["각 API에 대해 AWS WAF 웹 ACL을 생성합니다. SQL 인젝션 및 봇 공격을 차단하는 관리형 규칙을 포함합니다. AWS Config를 사용하여 웹 ACL이 없는 새 리소스를 감지합니다. 이러한 리소스에 웹 ACL을 프로비저닝하는 복구 작업을 구성합니다.", "AWS 방화벽 관리자를 사용하여 AWS WAF 정책을 생성합니다. AWS Bot Control 및 SQL 데이터베이스 관리형 규칙 그룹을 포함하도록 정책을 구성합니다. 리소스 유형으로 API Gateway 단계를 포함하도록 정책 범위를 설정합니다.", "SQL 인젝션 및 봇 공격을 차단하는 규칙을 포함하는 AWS WAF 웹 ACL용 AWS 서비스 카탈로그 제품을 생성합니다. AWS Config를 사용하여 이 제품이 적용되지 않은 새 리소스를 감지합니다. 이러한 리소스에 웹 ACL을 프로비저닝하는 복구 작업을 구성합니다.", "AWS Security Hub를 사용하여 보호되지 않은 리소스를 감지하고 해당 결과를 사용자 지정 작업 이벤트로 Amazon EventBridge에 전송합니다. 이러한 이벤트를 처리하도록 AWS Lambda 함수를 생성하여 보호되지 않은 리소스에 대한 AWS WAF 웹 ACL을 프로비저닝합니다 . SQL 인젝션 및 봇 공격을 차단하는 관리형 규칙을 포함합니다."], "answer": "B", "multi": false, "explanation": "The company needs centralized, scalable protection acrossmany accountsfor bothexisting and futureAPI Gateway resources, with minimal ongoing effort.AWS Firewall Manageris specifically designed for this: it can centrally deploy and enforceAWS WAFprotections across AWS Organizations. By creating a Firewall ManagerWAF policy, the security team defines a single set of controls (for example, AWS Managed Rules for SQL injection protection andAWS Bot Control) and applies them automatically to in-scope resources across member accounts. Critically, Firewall Manager can be configured toauto-remediate noncompliant resources, ensuring that if new API Gateway stages are created later, they are automatically brought under the policy without manual per-account work. This directly meets the \"existing and future resources\" requirement."},
  {"id": 173, "text": "한 회사가 AWS Organizations의 조직을 사용하여 여러 AWS 계정을 관리합니다. 이 회사는 AWS IAM Identity Center를 사용하여 계정에 대한 액세스를 관리합니다. 또한 AWS Directory Service를 ID 소스로 사용합니다. 직원들은 AWS 액세스 포털을 통해 AWS 콘솔과 특정 AWS 계정 및 권한에 액세스합니다. 보안 엔지니어가 IAM Identity Center에서 새 권한 세트를 생성하고 조직 내 멤버 계정 중 하나에 해당 권한 세트를 할당합니다. 이 권한 세트는 해당 멤버 계정의 DevOps라는 개발자 사용자 그룹에 할당됩니다. 보안 엔지니어는 모든 개발자가 AWS 액세스 포털에서 해당 멤버 계정에 대해 새 권한 세트가 표시될 것으로 예상합니다. 그러나 한 명을 제외한 모든 개발자가 권한 세트를 볼 수 있습니다. 보안 엔지니어는 나머지 한 명의 개발자도 AWS 액세스 포털에서 권한 세트를 볼 수 있도록 해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["디렉터리 서비스의 DevOps 그룹에 나머지 개발자를 추가합니다.", "회원 계정에 설정된 권한을 제거한 다음 다시 추가하세요.", "멤버 계정에 조직에 대한 서비스 연결 역할을 추가합니다.", "나머지 개발자에게 콘솔 접근 권한을 허용하도록 권한 설정을 업데이트합니다."], "answer": "A", "multi": false, "explanation": "In IAM Identity Center, users see accounts and permission sets in the AWS access portal based onassignments. Here, the new permission set was assigned to theDevOps groupfor a specific member account. Sinceall developers except onecan see the permission set, the permission set itself and the account assignment are working correctly. The most likely cause is that the remaining developer isnot actually a memberof the DevOps group in the identity source (AWS Directory Service / Active Directory), or their group membership is not reflected due to missing/incorrect directory group assignment. The least disruptive fix is to ensure the developer's identity is correctly included in theDevOpsgroup within the directory. Once the user is a member of the assigned group (and after normal identity sync/refresh behavior), IAM Identity Center will evaluate the user as entitled to that permission set, and it will appear in the access portal."},
  {"id": 174, "text": "한 회사가 기본 SCP를 사용하여 AWS Organizations를 사용하고 있습니다. 이 회사는 특정 OU에 속한 모든 AWS 계정의 AWS 사용을 제한해야 합니다. 일부 필수적인 글로벌 서비스를 제외하고, 해당 OU에 속한 모든 계정은 eu-west-1 리전에서만 AWS를 사용해야 합니다. 보안 엔지니어는 기존 계정과 OU에 새로 추가되는 모든 계정에 이 제한을 적용하는 SCP를 생성해야 합니다. 어떤 SCP가 이러한 요구 사항을 충족할까요?", "choices": ["NotAction으로 거부하지만 aws:RequestedRegion = eu-west-1에 대해 StringEquals를 사용합니다.", "eu-west-1의 원하는 글로벌 서비스 범위로 액션을 사용하여 허용합니다.", "원하는 글로벌 서비스에 대해 NotAction으로 거부하고 StringNotEquals aws:RequestedRegion = eu-west-", "NotAction 및 StringNotEquals aws:RequestedRegion = eu-west-1을 허용합니다."], "answer": "C", "multi": false, "explanation": "To restrict activity to a single Region in an OU using an SCP, the standard pattern is an explicitDenyfor requests madeoutsidethe allowed Region, while carving out exceptions forglobal servicesthat do not use aws:RequestedRegion in the same way (or that must remain usable regardless of Region). This is done withEffect: Deny, aConditionusing StringNotEquals on aws:RequestedRegion for the allowed Region (here, eu-west-1), andNotActionlisting the global services that should remain available. This works because SCPs act asguardrails: an explicit Deny in an SCP overrides IAM Allow in member accounts, ensuring the restriction applies consistently to all existing and future accounts placed in the OU. The StringNotEquals condition ensures the deny triggers for any Region other than eu-west-1. The NotAction exception list ensures that the specified global services are not blocked by this deny statement."},
  {"id": 175, "text": "한 회사가 AWS Organizations에서 AWS Config를 활성화했습니다. 이 회사는 조직 전체에 수백 개의 Amazon S3 버킷을 배포했습니다. 보안 엔지니어는 AWS Key Management Service(AWS KMS)로 암호화되지 않은 S3 버킷을 식별해야 합니다. 또한 AWS KMS로 암호화되지 않은 객체가 해당 S3 버킷에 업로드되지 않도록 방지해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["암호화되지 않은 S3 버킷을 식별하려면 thes3-default-encryption-kmsAWS Config 관리 규칙을 사용하세요. AWS KMS로 암호화된 객체에 한해서만 thes3:PutObjectaction을 허용하는 SCP를 생성합니다.", "암호화되지 않은 S3 버킷을 식별하려면 thes3-default-encryption-kmsAWS Config 관리 규칙을 사용하십시오. 각 S3 버킷에 대해 버킷 정책을 생성하여 객체가 S3 관리 키(SSE-S3)를 사용한 서버 측 암호화가 적용된 경우에만 thes3:PutObjectaction을 거부하도록 합니다.", "암호화되지 않은 S3 버킷을 식별하려면 AWS Config 관리 규칙인 thes3-bucket-ssl- requests-only를 사용하십시오. AWS KMS로 암호화된 객체에 한해서만 thes3:PutObjectaction을 허용하는 SCP를 생성합니다.", "암호화되지 않은 S3 버킷을 식별하려면 thes3-bucket-ssl-requests-onlyAWS Config 관리 규칙을 사용하세요. 각 S3 버킷에 대해 객체가 AWS KMS로 암호화된 경우에만 thes3:PutObject 작업을 허용하는 버킷 정책을 생성하세요."], "answer": "A", "multi": false, "explanation": "The correct Config rule for finding buckets that are not usingSSE-KMS by defaultiss3-default- encryption-kms. It evaluates the bucket's default encryption settings and flags buckets that do not have KMS default encryption enabled. The s3-bucket-ssl-requests-only rule focuses on enforcing HTTPS-only requests and does not validate encryption-at-rest settings, so it cannot satisfy the \"identify not encrypted with KMS\" requirement. For preventing uploads of objects that are not encrypted with KMS, an organization-wide control is needed. AnSCPcan restrict s3:PutObject so that uploads succeed only when the request specifiesSSE- KMS(and optionally a specific KMS key). This provides broad, low -touch enforcement across many accounts and buckets. While bucket policies can also enforce SSE- KMS, managing and verifying hundreds of bucket policies is more operationally heavy than a centrally managed SCP guardrail."},
  {"id": 176, "text": "한 회사가 민감한 데이터를 처리하는 애플리케이션을 배포하기 위해 Amazon Elastic Container Service(Amazon ECS)를 사용하고 있습니다. 최근 보안 감사에서 Amazon RDS 자격 증명이 회사 소스 코드 저장소의 애플리케이션 코드와 함께 저장되어 있는 보안 취약점이 발견되었습니다. 보안 엔지니어는 데이터베이스 자격 증명을 안전하게 저장하고 주기적으로 교체하는 솔루션을 개발해야 합니다. 자격 증명은 애플리케이션에서만 접근할 수 있어야 하며, 데이터베이스 관리자가 자격 증명을 평문으로 다른 팀원과 공유하는 것을 방지해야 합니다. 또한, 관리 오버헤드를 최소화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "choices": ["AWS Systems Manager 파라미터 스토어를 사용하여 데이터베이스 자격 증명을 생성합니다. ECS 작업에 IAM 프로필을 사용하여 특정 컨테이너에만 데이터베이스 자격 증명에 대한 액세스를 제한합니다.", "AWS Secrets Manager를 사용하여 데이터베이스 자격 증명을 저장하세요. ECS 작업에 대해 IAM 인라인 정책을 사용하여 특정 컨테이너만 데이터베이스 자격 증명에 액세스할 수 있도록 제한하세요.", "AWS Systems Manager 파라미터 스토어를 사용하여 데이터베이스 자격 증명을 저장하세요. ECS 작업에 IAM 역할을 사용하여 특정 컨테이너만 데이터베이스 자격 증명에 액세스할 수 있도록 제한하세요.", "AWS Secrets Manager를 사용하여 데이터베이스 자격 증명을 저장하세요. ECS 작업에 IAM 역할을 사용하여 특정 컨테이너만 데이터베이스 자격 증명에 액세스할 수 있도록 제한하세요."], "answer": "D", "multi": false, "explanation": "AWS Secrets Manageris the AWS service designed to store secrets securely and to supportautomatic rotationon a schedule--commonly used for Amazon RDS credentials. Storing credentials in Secrets Manager removes them from source code, enables fine- grained access control, and supports auditability of secret retrieval through CloudTrail. Rotation can be configured to periodically change the database password and update the stored secret automatically, minimizing operational overhead compared to manual rotation processes. To ensure the credentials are accessibleonly to the application, the correct ECS pattern is to useIAM roles for tasks. A task role can be scoped to allow only secretsmanager:GetSecretValue (and related actions if needed) for the specific secret ARN. Only tasks running with that role can retrieve the secret at runtime, which prevents broad access. This also helps reduce the risk of database administrators sharing plaintext credentials, because the recommended operational model is that humans should not need direct access; the application retrieves the secret programmatically, and access can be limited to break-glass workflows if required."},
  {"id": 177, "text": "한 회사가 AWS 클라우드에 여러 계정을 보유하고 있습니다. 개발자 계정의 사용자는 프로덕션 계정의 특정 리소스에 접근해야 합니다. 이러한 접근 권한을 제공하는 가장 안전한 방법은 무엇입니까?", "choices": ["프로덕션 계정에 IAM 사용자를 하나 생성합니다. 필요한 리소스에 적절한 권한을 부여합니다. 암호는 접근 권한이 필요한 사용자에게만 공유합니다.", "개발자 계정의 IAM 역할을 사용하여 교차 계정 액세스를 생성합니다. 이 역할에 적절한 권한을 부여합니다. 개발자 계정의 사용자가 이 역할을 수임하여 프로덕션 리소스에 액세스할 수 있도록 허용합니다.", "프로덕션 계정의 IAM 사용자 계정을 사용하여 교차 계정 액세스를 생성합니다. 이 사용자 계정에 적절한 권한을 부여합니다. 개발자 계정의 사용자가 이 사용자 계정을 사용하여 프로덕션 리소스에 액세스할 수 있도록 허용합니다.", "프로덕션 계정의 IAM 역할을 사용하여 교차 계정 액세스를 생성합니다. 이 역할에 적절한 권한을 부여합니다. 개발자 계정의 사용자가 이 역할을 수임하여 프로덕션 리소스에 액세스할 수 있도록 허용합니다."], "answer": "D", "multi": false, "explanation": "The most secure and AWS-recommended pattern for cross-account access is to create anIAM role in the target account (production)and allow trusted principals from the source account (developer) toassume the roleby using AWS STS. This avoids long-term credentials in the production account, supports short-lived session credentials, and enables strong controls such as MFA requirements, session duration limits, and precise least-privilege permissions attached to the role. It also centralizes ownership of production permissions in the production account, which is important for separation of duties and governance."},
  {"id": 178, "text": "한 회사가 AWS Organizations 내 여러 계정에 걸쳐 새로운 워크로드를 실행하고 있습니다. 실행 중인 모든 리소스에는 CostCenter 태그가 있어야 하며, 이 태그는 승인된 세 가지 값 중 하나여야 합니다. 회사는 이 정책을 엄격히 시행하고 CostCenter 태그가 승인되지 않은 값으로 변경되는 것을 방지해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS CloudFormation Guard를 사용하여 AWS Config 사용자 지정 정책 규칙을 생성합니다. CostCenter 태그 키와 승인된 값을 포함합니다. aws:RequestTag/CostCenter 조건 키의 값이 승인된 세 가지 값 중 하나가 아닌 경우 리소스 생성을 거부하는 SCP를 생성합니다.", "AWS CloudTrail 트레일을 생성합니다. 새 리소스 생성과 일치하는 규칙문을 포함하는 Amazon EventBridge 규칙을 생성합니다. EventBridge 규칙이 CostCenter 태그를 확인하는 AWS Lambda 함수를 호출하도록 구성합니다. Lambda 함수가 규정을 준수하지 않는 값인 경우 생성을 차단하도록 프로그래밍합니다.", "조직에 대한 태그 정책을 활성화합니다. CostCenter라는 태그 키와 승인된 값을 지정하는 태그 정책을 생성합니다. 정책을 구성하여 규정을 준수하지 않는 작업을 강제합니다. aws:RequestTag/CostCenter 조건 키 값이 null인 경우 리소스 생성을 거부하는 SCP를 생성합니다.", "조직에 대한 태그 정책을 활성화합니다. CostCenter라는 태그 키와 승인된 값을 지정하는 태그 정책을 생성합니다. 규정을 준수하지 않는 태그가 생성될 때 AWS Lambda 함수를 호출하는 Amazon EventBridge 규칙을 생성합니다. Lambda 함수가 태그 변경을 차단하도록 프로그래밍합니다."], "answer": "A", "multi": false, "explanation": "Toenforcerequired tagging and approved values at scale, the strongest guardrail is anSCPbecause SCPs can prevent API calls across accounts/OUs before resources are created or tags are changed. By using the aws:RequestTag/CostCenter condition key and checking that the value is one of the approved values, an SCP candeny Create (and TagResource/UntagResource where supported)* when the request attempts to set a non- approved value. This prevents \"bad\" CostCenter values from being introduced."},
  {"id": 179, "text": "한 회사는 전송 중인 모든 데이터를 암호화해야 하는 규정 준수 요건을 가지고 있습니다. 그런데 최근 이 요건을 충족하지 않는 아마존 오로라 클러스터를 발견했습니다. 회사는 Aurora 클러스터에 대한 모든 연결에 암호화를 어떻게 적용할 수 있을까요?", "choices": ["Aurora 클러스터 구성에서 therequire_secure_transportDB 클러스터 매개변수를 ON으로 설정합니다.", "AWS Directory Service for Microsoft Active Directory를 사용하여 사용자 디렉터리를 생성하고 Aurora에서 Kerberos 인증을 적용합니다.", "AWS Certificate Manager(ACM)를 사용하여 암호화 인증서를 제공하도록 Aurora 클러스터를 구성합니다.", "Amazon RDS 프록시를 생성합니다. 암호화를 활성화하려면 프록시를 Aurora 클러스터에 연결합니다."], "answer": "A", "multi": false, "explanation": "To enforce encryption in transit to Aurora, you must require clients to useTLS/SSLwhen connecting to the database. Aurora (depending on engine flavor) supports a parameter that enforces secure transport by rejecting non-TLS connections. Setting the DB (cluster/instance) parameter such asrequire_secure_transporttoONforces clients to negotiate SSL/TLS; otherwise the server refuses the connection, ensuring all data in transit is encrypted. This directly enforces the compliance requirement at the database endpoint itself, independent of client behavior."},
  {"id": 180, "text": "한 회사가 AWS Config 규칙을 사용하여 회사 데이터 보호 정책을 준수하지 않는 Amazon S3 버킷을 식별합니다. 해당 S3 버킷은 여러 AWS 리전과 여러 AWS 계정에 호스팅되어 있으며, 이 계정들은 AWS Organizations 내의 조직에 속해 있습니다. 이 회사는 조직의 기존 비준수 S3 버킷과 향후 생성될 모든 비준수 S3 버킷을 해결할 수 있는 솔루션이 필요합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["조직 전체 리소스 데이터 집계를 위한 AWS Config 애그리게이터를 배포합니다. AWS Config에서 규정을 준수하지 않는 S3 버킷을 발견하면 해당 S3 버킷을 삭제하거나 재구성하여 대응하는 AWS Lambda 함수를 생성합니다.", "조직 전체 리소스 데이터 집계를 위한 AWS Config 애그리게이터를 배포합니다. 새로운 비준수 S3 버킷 생성을 방지하는 거부 문이 포함된 SCP를 생성합니다. 해당 SCP를 조직의 모든 OU에 적용합니다.", "회사가 현재 사용 중인 계정 및 리전만 대상으로 하는 AWS Config 애그리게이터를 배포합니다. AWS Config에서 규정을 준수하지 않는 S3 버킷을 발견하면 해당 S3 버킷을 삭제하거나 재구성하는 AWS Lambda 함수를 생성합니다.", "회사에서 현재 사용 중인 계정 및 리전만 포함하는 AWS Config 애그리게이터를 배포합니다. 새로운 비준수 S3 버킷 생성을 방지하는 거부 문이 포함된 SCP를 생성합니다. 조직의 모든 OU에 SCP를 적용합니다."], "answer": "A", "multi": false, "explanation": "The requirement includesremediating existing noncompliant bucketsand also handlingfuture noncompliant bucketsacross multiple accounts and Regions. Anorganization-wide AWS Config aggregatorprovides centralized visibility into compliance status across all member accounts/Regions. To remediate, AWS Config can trigger automation (commonly via EventBridge/SNS) that invokes anAWS Lambda function(or SSM Automation) to take corrective action--such as enabling default encryption, blocking public access, or applying required bucket policies--whenever a bucket is evaluated as noncompliant. This addresses both existing findings (by running remediation on current noncompliant resources) and new ones (by automatically reacting when new buckets appear or configurations drift)."},
  {"id": 181, "text": "한 회사가 타사 애플리케이션을 설치하여 여러 Amazon EC2 인스턴스와 온프레미스 서버에 배포했습니다. 이 회사의 IT 팀은 소프트웨어 유지 관리 작업을 수행하기 위해 SSH를 사용하여 각 시스템에 연결해야 하는 경우가 있습니다. 이러한 작업이 필요한 시간을 제외하고는 해당 시스템은 네트워크의 나머지 부분과 완전히 격리되어야 합니다. 이 회사는 SSH 키를 관리하고 싶지 않으며, SSH 연결이 있는 시간만큼만 비용을 지불하기를 원합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["머신에 연결하기 위해 포트 포워딩이 설정된 배스천 호스트를 생성합니다.", "임시 연결을 허용하도록 AWS Systems Manager 세션 관리자를 설정합니다.", "AWS CloudShell을 사용하여 서버리스 연결을 생성합니다.", "개인 연결을 위해 각 머신에 대한 인터페이스 VPC 엔드포인트를 설정합니다."], "answer": "B", "multi": false, "explanation": "AWS Systems ManagerSession Managerprovides interactive shell access to managed instanceswithout inbound SSH,without bastion hosts, andwithout managing SSH keys. Access is controlled through IAM policies, and every session can be logged to CloudWatch Logs/S3 for auditability. This directly satisfies the \"no SSH keys\" requirement and reduces the network exposure surface because you can keep port 22 closed and still obtain shell access when needed. To meet the isolation requirement, the instances can be placed in private subnets with no inbound access, and you can use Systems Manager connectivity (via SSM endpoints/agents) for administrative sessions only when required. On-premises servers can also be managed by Systems Manager by registering them as managed instances (hybrid activations), allowing the same no-SSH-key operational model across EC2 and on-prem environments."},
  {"id": 182, "text": "보안 엔지니어가 한 회사의 사용자 암호에 최소 길이 제한이 없다는 사실을 발견했습니다. 해당 회사는 다음과 같은 두 개의 ID 공급자(IdP)를 사용하고 있습니다. * AWS Identity and Access Management(IAM)과 온프레미스 Active Directory의 페더레이션 * 회사가 개발한 AWS 클라우드 애플리케이션의 사용자 데이터베이스가 포함된 Amazon Cognito 사용자 풀. 보안 엔지니어는 암호의 최소 길이를 설정하기 위해 어떤 조치를 취해야 합니까? (두 가지를 선택하십시오.)", "choices": ["IAM 구성에서 암호 길이 정책을 업데이트합니다.", "Cognito 구성에서 암호 길이 정책을 업데이트합니다.", "온프레미스 Active Directory 구성에서 암호 길이 정책을 업데이트합니다.", "AWS Organizations에 SCP를 생성합니다. IAM 및 Cognito에 대해 최소 암호 길이를 적용하도록 SCP를 구성합니다.", "최소 암호 길이 조건을 포함하는 IAM 정책을 생성합니다. IAM 및 Cognito에 대해 해당 정책을 적용합니다."], "answer": "B,C", "multi": true, "explanation": "The company uses two different identity systems, and password policy must be enforcedat the system that actually stores and manages the passwords. For users authenticating throughIAM federation with on-premises Active Directory, IAM is not storing the users' passwords; the password policy is enforced byActive Directory. Therefore, the minimum password length must be configured in theon-premises AD password policyso federated users are subject to the requirement during password creation/changes. For the cloud application that usesAmazon Cognito user poolsas its user database, Cognitodoesstore and manage user passwords for those users. Cognito user pools include a configurable password policy (minimum length and complexity requirements). Updating the Cognito user pool password policy enforces the required minimum length for the application's users going forward."},
  {"id": 183, "text": "한 회사의 웹 기반 애플리케이션이 애플리케이션 로드 밸런싱(ALB) 뒤에서 실행되고 있습니다. 이 애플리케이션은 자격 증명 스터핑 공격을 받고 있으며, 이로 인해 수많은 로그인 시도가 실패하고 있습니다. 공격은 여러 IP 주소에서 발생하고 있으며, 로그인 시도에는 알려진 모바일 기기 에뮬레이터의 사용자 에이전트 문자열이 사용되고 있습니다. 보안 엔지니어는 자격 증명 스터핑 공격을 완화하기 위한 솔루션을 구현해야 합니다. 해당 솔루션은 애플리케이션에 대한 정상적인 로그인을 계속 허용해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["지정된 사용자 에이전트 문자열이 포함된 로그인 시도에 반응하는 Amazon CloudWatch 알람을 생성합니다. 알람에 Amazon Simple Notification Service(Amazon SNS) 토픽을 추가합니다.", "ALB의 인바운드 보안 그룹을 수정하여 공격에 연루된 IP 주소에서 오는 트래픽을 차단하십시오.", "ALB용 AWS WAF 웹 ACL을 생성합니다. 디바이스 에뮬레이터의 사용자 에이전트 문자열을 포함하는 요청을 차단하는 사용자 지정 규칙을 생성합니다.", "ALB용 AWS WAF 웹 ACL을 생성합니다. 유효한 사용자 에이전트 문자열에서 오는 요청을 허용하는 사용자 지정 규칙을 생성합니다."], "answer": "C", "multi": false, "explanation": "A credential stuffing attack at the ALB is aLayer 7problem and is best mitigated withAWS WAF. The attacker is distributed across many IPs, so blocking by IP in a security group (Option B) is ineffective and operationally heavy. A CloudWatch alarm (Option A) only alerts; it does not block or mitigate requests. Because the malicious traffic uses a distinctive, knownUser-Agentstring associated with a mobile device emulator, AWS WAF can quickly reduce the attack by inspecting the User- Agent header and blocking matching requests. This approach is targeted: it blocks the identified automated attack pattern while allowing legitimate users who do not present that emulator User-Agent to continue logging in. The WAF rule can be deployed immediately on the existing ALB-associated web ACL and can be further refined (for example, applied only to /login paths, combined with rate-based rules, or integrated with Bot Control) to minimize false positives."},
  {"id": 184, "text": "한 회사가 재해 복구(DR) 계획의 일환으로 Amazon RDS 스냅샷을 두 개의 계정으로 전송합니다. 스냅샷은 암호화되어야 하지만, 각 계정은 재해 복구 상황 발생 시 스냅샷을 복호화할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["기본 AWS 키 관리 서비스(AWS KMS) 키를 사용하여 스냅샷을 생성합니다. KMS 암호화 키를 두 계정으로 복사하는 AWS Lambda 함수를 생성합니다.", "AWS Key Management Service(AWS KMS) 고객 관리 키를 사용하여 스냅샷을 생성합니다. 두 계정에서 KMS 키를 가져오는 AWS Lambda 함수를 생성합니다.", "기본 AWS 키 관리 서비스(AWS KMS) 키를 사용하여 스냅샷을 생성합니다. 각 계정에 적절한 KMS 권한이 있는 IAM 주체를 사용하여 두 계정과 KMS 키를 공유합니다.", "AWS Key Management Service(AWS KMS) 고객 관리 키를 사용하여 스냅샷을 생성합니다. 각 계정에 적절한 KMS 권한이 있는 IAM 주체를 사용하여 두 계정과 KMS 키를 공유합니다."], "answer": "D", "multi": false, "explanation": "For encrypted RDS snapshots that must be shared across accounts and still bedecryptablein the target accounts, you should use acustomer managed KMS keyand explicitly grant cross- account use of that key. AWS-managed default keys (Option A/C) generally cannot be shared for cross- account decryption in the same flexible way as customer managed keys, and you cannot \"copy\" an AWS- managed key to another account. Likewise, you cannot \"import\" an existing KMS key into another account via Lambda as described in Option B; KMS keys are account-scoped resources and are not copied between accounts like that. With acustomer managed key (CMK), the key policy (and/or grants) can allow principals in the DR accounts to use the key for the required cryptographic operations (for example, kms:Decrypt, kms:CreateGrant, and relevant describe permissions). Then, when the snapshot is shared and copied/used in the destination account during a DR event, the destination account can decrypt it because it has been granted permission to use the same CMK. This approach is the standard AWS pattern for cross-account encrypted snapshot sharing and meets both encryption and recoverability requirements with strong governance and auditability through CloudTrail."},
  {"id": 185, "text": "한 회사가 AWS Organizations 내의 조직에 수백 개의 AWS 계정을 보유하고 있습니다. 이 회사는 단일 AWS 리전에서 운영됩니다. 또한, 조직 내에 보안 도구 전용 AWS 계정을 보유하고 있습니다. 보안 툴 계정은 Amazon GuardDuty 및 AWS Security Hub에 대한 조직의 위임 관리자로 구성되어 있습니다. 회사는 기존 AWS 계정과 신규 AWS 계정 모두에 대해 GuardDuty 및 Security Hub가 자동으로 활성화되도록 환경을 구성했습니다. 해당 회사는 보안 팀이 보안 이벤트를 감지하고 대응할 수 있는지 확인하기 위해 특정 GuardDuty 탐지 항목에 대한 제어 테스트를 수행하고 있습니다. 보안 팀은 Amazon EC2 인스턴스를 실행하고 테스트 도메인인 example.com에 대해 DNS 요청을 실행하여 DNS 탐지 항목을 생성하려고 시도했습니다. 그러나 GuardDuty 탐지 항목은 Security Hub 위임 관리자 계정에 생성되지 않았습니다. 보안 허브 위임 관리자 계정에 해당 발견 사항이 생성되지 않은 이유는 무엇입니까?", "choices": ["EC2 인스턴스가 시작된 VPC에 대해 VPC 흐름 로그가 활성화되어 있지 않습니다.", "EC2 인스턴스가 시작된 VPC에는 사용자 지정 OpenDNS 확인자에 대한 DHCP 옵션이 구성되어 있습니다.", "해당 문제가 발생한 AWS 계정에서 GuardDuty와 Security Hub의 통합이 활성화된 적이 없습니다.", "보안 허브에서 지역 간 집계가 구성되지 않았습니다."], "answer": "B", "multi": false, "explanation": "GuardDuty's DNS-related detections depend on GuardDuty being able to observeDNS query behaviorthrough AWS-provided DNS resolution paths in the VPC. If a VPC is configured to use acustom DNS resolvervia DHCP options (for example, an OpenDNS resolver) instead of the AmazonProvidedDNS resolver, DNS queries may bypass the visibility path GuardDuty relies on for DNS analysis and pattern detection. In that case, the test traffic (queries to example.com) might not be evaluated by GuardDuty's DNS finding logic, so no DNS finding is generated--and therefore nothing is forwarded into Security Hub."},
  {"id": 186, "text": "한 회사의 공개 웹사이트는 애플리케이션 로드 밸런서(ALB), ALB 뒤에서 상태 비저장 애플리케이션을 실행하는 Amazon EC2 인스턴스 세트, 그리고 애플리케이션이 데이터를 읽어오는 Amazon DynamoDB 테이블로 구성됩니다. 이 회사는 악의적인 스캐닝 및 DDoS 공격에 대해 우려하고 있습니다. 따라서 각 클라이언트 IP 주소가 5분 동안 최대 3번까지만 데이터를 읽을 수 있도록 제한을 두려고 합니다. 어떤 해결책이 가장 적은 노력으로 이 요구 사항을 충족할까요?", "choices": ["ALB 앞에 AWS WAF를 설정합니다. 각 IP 주소에 대해 5분 동안 3건을 초과하는 요청을 차단하는 규칙을 생성합니다.", "Amazon CloudWatch 요청을 기반으로 AWS Lambda 함수를 생성합니다. Lambda 함수가 5분 간격으로 각 IP 주소에 대한 요청 수를 계산하고, 요청 수가 3을 초과하면 알림을 제공하도록 구성합니다.", "EC2 애플리케이션을 수정하여 요청의 소스 IP 주소를 계산하고 5분 단위로 누적 합계를 계산합니다. 누적 합계가 3보다 크면 오류 메시지를 반환합니다.", "소스 IP 주소와 요청 시간을 DynamoDB 테이블에 추가합니다. 요청 시간을 기준으로 5분 TTL 설정을 추가합니다. DynamoDB 테이블 처리량의 읽기 용량을 3으로 변경합니다."], "answer": "A", "multi": false, "explanation": "This is a classic Layer 7 rate-limiting requirement tied toclient IPand atime window, and AWS WAF provides this natively withrate-based rules. Placing AWS WAF in front of the ALB allows the company to count requests per source IP over a rolling window and take action (block, CAPTCHA/challenge, or count depending on configuration) once the threshold is exceeded. This approach mitigates scanning and application-layer request floods early, before requests consume EC2 or DynamoDB capacity, and it requires minimal custom code or operational work."},
  {"id": 187, "text": "한 회사가 사용자들에게 모바일 앱을 다운로드할 수 있도록 제공하고 있습니다. 이 앱은 MQTT 기반이며 AWS IoT Core에 연결하여 특정 클라이언트 관련 토픽을 구독합니다. 최근 이 회사는 악의적인 공격자들이 정상적인 모바일 기기에 트로이 목마를 심으려 시도하고 있음을 발견했습니다. 이 트로이 목마는 정식 애플리케이션으로 위장하여 특수 문자가 삽입된 클라이언트 ID를 사용하여 클라이언트의 권한 범위를 벗어난 토픽에 접근합니다. 이러한 위협을 예방하기 위해 회사는 어떤 조치들을 조합하여 취해야 할까요? (두 가지를 선택하세요.)", "choices": ["애플리케이션에서 IoT 사물 이름을 클라이언트 ID로 사용하여 디바이스를 AWS IoT Core에 연결합니다.", "애플리케이션에 클라이언트 ID 확인 기능을 추가하세요. 특수 문자가 감지되면 서버 연결을 끊으세요.", "주체를 \"client/${iot:Connection.Thing.ThingName}\"으로 설정하고 \"AWSIoTWirelessDataAccess\"를 허용하는 AWS IoT Core 정책을 적용합니다.", "AWS IoT Core 정책을 디바이스에 적용하여 리소스를 \"클라이언트\"로 설정하고 \"iot:Connect\"를 허용합니다. /${iot:ClientId} \" .", "AWS IoT Core 정책을 디바이스에 적용하여 리소스를 \"클라이언트\"로 설정하고 \"iot:Connect\"를 허용합니다. /${iot:Connection.Thing.ThingName} \" ."], "answer": "A,E", "multi": true, "explanation": "The threat is client ID manipulation to break authorization boundaries. The strongest control is tobind the MQTT client identity to the authenticated device identity(the Thing) rather than trusting arbitrary client IDs provided by the client. Using theThing name as the client ID(Option A) removes ambiguity and makes the identifier predictable and tied to a registered identity. On the authorization side, AWS IoT Core policies can use policy variables. Allowing iot:Connect only when the resource matches client/${iot:Connection.Thing.ThingName} (Option E) ensures the connection is permittedonlyif the client ID exactly equals the authenticated Thing name from the TLS certificate/Thing principal context. This prevents attackers from injecting special characters or choosing a different client ID to escalate access, because the policy evaluation ties the allowed client resource to the Thing identity, not the attacker-controlled string."},
  {"id": 188, "text": "한 회사가 자사 공개 웹 애플리케이션의 트래픽 증가를 경험한 후 AWS WAF를 사용하기 시작했습니다. 보안 엔지니어는 트래픽 증가가 애플리케이션 계층 공격 때문인지 판단해야 합니다. 이를 위해 AWS WAF 트래픽을 분석할 수 있는 솔루션이 필요합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["AWS WAF를 구성하여 로그를 AWS CloudTrail의 트레일로 전송합니다. Amazon Data Firehose 전송 스트림을 생성하여 로그를 Amazon OpenSearch Service로 전송합니다. OpenSearch 대시보드와 Amazon Athena 커넥터를 사용하여 로그를 쿼리합니다.", "AWS WAF를 구성하여 로그를 Amazon S3 버킷으로 전송합니다. S3 버킷의 파티션 프로젝션을 사용하여 OpenSearch 테이블을 구성합니다. OpenSearch를 사용하여 S3 버킷의 데이터를 쿼리합니다.", "AWS WAF를 구성하여 로그를 Amazon S3 버킷으로 전송합니다. S3 버킷의 파티션 프로젝션을 사용하여 Amazon Athena 테이블을 구성합니다. Athena를 사용하여 S3 버킷의 데이터를 쿼리합니다.", "AWS WAF를 구성하여 로그를 AWS CloudTrail의 트레일로 전송합니다. Amazon Data Firehose 전송 스트림을 생성하여 로그를 Amazon S3 버킷으로 전송합니다. Amazon Athena를 사용하여 S3 버킷의 데이터를 쿼리합니다."], "answer": "C", "multi": false, "explanation": "AWS WAF supportsWAF loggingas a dedicated feature that can deliver logs to destinations such as Amazon S3 (commonly via Kinesis Data Firehose). These logs contain rich request details (rule matches, action taken, headers, URI, source IP, etc.) that are essential for determining whether traffic spikes are due to application-layer attacks. For analysis with low operational overhead, storing logs inS3and querying them withAmazon Athenais a standard pattern. Usingpartition projectionfurther reduces administrative work by avoiding manual partition management and enabling efficient queries over time-based prefixes."},
  {"id": 189, "text": "보안 엔지니어가 Amazon Macie를 사용하여 회사의 Amazon S3 버킷에서 민감한 데이터가 있는지 검사합니다. 해당 회사는 수많은 S3 버킷과 그 안에 저장된 많은 객체를 보유하고 있습니다. 보안 엔지니어는 민감한 데이터가 포함된 S3 버킷을 식별하고 해당 버킷에 대해 추가 검사를 수행해야 합니다. 어떤 솔루션이 관리 부담을 최소화하면서 이러한 요구 사항을 충족할까요?", "choices": ["S3 버킷에서 S3 교차 리전 복제(CRR)를 구성하여 객체를 두 번째 AWS 리전으로 복제합니다. 두 번째 리전에서 Macie를 구성하여 복제된 객체를 매일 스캔합니다.", "S3 버킷에 대한 S3 이벤트 대상으로 AWS Lambda 함수를 생성합니다. 객체가 S3 버킷에 업로드될 때 해당 객체에 대한 Macie 스캔을 시작하도록 Lambda 함수를 구성합니다.", "Macie 자동 검색을 구성하여 S3 버킷에서 데이터를 지속적으로 샘플링합니다. Macie가 민감한 데이터를 발견하면 S3 버킷에 대해 전체 스캔을 수행합니다.", "Macie 스캔이 S3 버킷에서 실행되도록 구성합니다. 스캔 결과를 Amazon DynamoDB 테이블에 집계합니다. 쿼리에 DynamoDB 테이블을 사용합니다."], "answer": "C", "multi": false, "explanation": "Amazon Macie'sautomated sensitive data discoveryis designed for exactly this: at scale, Macie continuously evaluates andsamplesobjects across S3 buckets to identify where sensitive data (PII, financial data, credentials, etc.) is likely present. This gives the security engineer a low-touch way toidentify which buckets contain sensitive datawithout having to orchestrate per-bucket scanning workflows. Once Macie flags buckets with sensitive data findings, the engineer can then prioritize and runadditional, more targeted scanning(for example, deeper classification jobs on those specific buckets) rather than scanning everything exhaustively all the time."},
  {"id": 190, "text": "한 전자상거래 웹사이트가 DDoS 공격으로 인해 1시간 동안 접속이 불가능했습니다. 공격 시간 동안 사용자들은 웹사이트에 접속할 수 없었습니다. 해당 전자상거래 회사의 보안팀은 향후 발생할 수 있는 공격에 대해 우려하고 있으며, 이에 대비하고자 합니다. 회사는 향후 유사한 공격 발생 시 웹사이트 접속 중단 시간을 최소화해야 합니다. 이 목표를 달성하는 데 도움이 될 단계는 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["Amazon GuardDuty를 활성화하여 악의적인 활동을 자동으로 모니터링하고 무단 액세스를 차단합니다.", "AWS Shield Advanced를 구독하고 공격 발생 시 AWS 지원팀에 문의하세요.", "VPC Flow Logs를 사용하여 네트워크 트래픽을 모니터링하고 AWS Lambda 함수를 사용하여 보안 그룹을 통해 공격자의 IP를 자동으로 차단합니다.", "AWS CloudTrail 이벤트를 실시간으로 모니터링하기 위해 Amazon EventBridge 규칙을 설정하고, 구성을 감사하기 위해 AWS Config 규칙을 사용하고, 문제 해결을 위해 AWS Systems Manager를 사용합니다.", "AWS WAF를 사용하여 이러한 공격에 대응하는 규칙을 생성하세요."], "answer": "B,E", "multi": true, "explanation": "To minimize downtime during future DDoS events, the company should use services that provideactive DDoS protection and rapid mitigationat scale.AWS Shield Advanced(Option B) is designed for enhanced DDoS protection for internet-facing applications. It provides expanded detection and mitigation capabilities, cost protection in certain cases, and--critically--access to theAWS DDoS Response Team (DRT)through AWS Support so the company can engage experts during an attack to reduce impact and restore availability faster. In addition,AWS WAF(Option E) helps mitigateapplication-layer (Layer 7)attacks that often accompany DDoS events (such as HTTP floods, bot-driven abuse, and known exploit patterns). WAF can block or challenge suspicious requests, apply rate-based controls, and use managed rule groups to reduce malicious traffic before it reaches the origin, improving resilience and availability."},
  {"id": 191, "text": "한 회사가 아마존 API 게이트웨이를 사용하여 사용자에게 REST API를 제공합니다. API 개발자는 로그 파일을 분석하지 않고도 API 접근 패턴을 분석하고 싶어합니다. 다음 요구사항을 가장 적은 노력으로 충족할 수 있는 단계 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["필요한 API 단계에 대한 액세스 로깅을 구성합니다.", "API Gateway 이벤트에 대한 AWS CloudTrail 트레일 대상을 구성합니다. userIdentity, userAgent 및 sourceIPAddress 필드에 필터를 구성합니다.", "API Gateway 로그를 저장할 Amazon S3 대상을 구성합니다. Amazon Athena 쿼리를 실행하여 API 액세스 정보를 분석합니다.", "Amazon CloudWatch Logs Insights를 사용하여 API 액세스 정보를 분석합니다.", "필요한 API 단계에서 '상세 CloudWatch 메트릭 활성화' 옵션을 선택합니다."], "answer": "D,E", "multi": true, "explanation": "To analyze API access patterns with minimal effort andwithout parsing raw log files, the best approach is to rely onmetricsand built-in query tooling. EnablingDetailed CloudWatch Metricsfor an API Gateway stage (Option E) provides near-real-time, aggregated visibility into usage and performance patterns (such as request counts, latency, error rates like 4XX/5XX) that are ideal for identifying trends and spikes without handling logs. For deeper pattern exploration when needed,CloudWatch Logs Insights(Option D) provides an interactive query experience over logs that are already in CloudWatch Logs, allowing quick filtering and aggregation. In practice, developers use metrics to understand access patterns at a high level and Logs Insights to slice and dice request data without building a separate parsing pipeline."},
  {"id": 192, "text": "최근 한 회사가 Amazon GuardDuty를 설치했는데, 회사 내 IP 주소에서 높은 빈도로 탐지 결과가 나오고 있습니다. 보안 엔지니어는 해당 IP 주소들이 신뢰할 수 있고 허용된 주소임을 확인했습니다. 보안 엔지니어는 GuardDuty에서 해당 IP 주소에 대한 탐지 결과가 표시되지 않도록 구성하기 위해 어떤 단계를 조합하여 수행해야 합니까? (두 가지를 선택하십시오.)", "choices": ["신뢰할 수 있는 IP 주소가 포함된 일반 텍스트 구성 파일을 생성합니다.", "신뢰할 수 있는 IP 주소가 포함된 JSON 구성 파일을 생성합니다.", "설정 파일을 GuardDuty에 직접 업로드합니다.", "설정 파일을 Amazon S3에 업로드합니다. GuardDuty에 해당 파일을 가리키는 새 신뢰 IP 목록을 추가합니다.", "구성 파일 데이터를 수동으로 복사하여 GuardDuty의 신뢰할 수 있는 IP 목록에 붙여넣으세요."], "answer": "A,D", "multi": true, "explanation": "GuardDuty supports \"Trusted IP lists\" to suppress findings that would otherwise be generated for activity originating from known safe IP addresses (for example, corporate NAT egress IPs, security scanners, or monitoring systems). To use a trusted IP list, you create aplain textfile that contains the IP addresses (typically one per line or in supported list form) and store it inAmazon S3. You then configure GuardDuty to reference that S3 object as a trusted IP list. GuardDuty periodically retrieves the file from S3 and uses it to adjust finding generation accordingly. That maps directly to Option A (create a plaintext file) and Option D (upload to S3 and create a trusted IP list in GuardDuty pointing to the file)."},
  {"id": 193, "text": "한 기업이 온프레미스 데이터 센터에서 핵심 워크로드를 운영하고 있습니다. 이 기업은 1시간 미만의 RTO(복구 목표 시간)를 달성할 수 있는 AWS 기반 재해 복구(DR) 솔루션을 구현하고자 합니다. 물리적 및 가상 서버를 지속적으로 복제해야 하며, 데이터 저장 및 대역폭 사용 비용을 최적화해야 합니다. 또한, DR 솔루션은 자동화되어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Backup을 사용하여 온프레미스 서버를 AWS로 직접 복제합니다. 리전 간 백업 복사 및 데이터 볼팅을 활성화합니다. 정의된 RTO에 맞춰 복구 지점을 구성합니다. AWS Step Functions를 사용하여 복구 단계를 자동화합니다.", "AWS Storage Gateway Volume Gateway를 구성하여 Amazon Elastic Block Store(Amazon EBS) 스냅샷을 복구에 사용하도록 합니다. AWS Backup을 구성하여 스냅샷을 관리합니다. 자동화된 복구 절차를 생성합니다.", "AWS 탄력적 재해 복구를 활성화합니다. 각 온프레미스 서버를 지속적으로 복제하도록 복제 에이전트를 구성합니다. 기본 스테이징 영역 서브넷 구성을 활성화합니다.", "온프레미스 데이터 센터와 AWS 간에 AWS Direct Connect 연결을 생성합니다. 장애를 모니터링하고 장애 발생 시 AMI에서 사전 구성된 Amazon EC2 인스턴스를 시작하는 AWS Lambda 함수를 호출하도록 Amazon EventBridge를 구성합니다."], "answer": "C", "multi": false, "explanation": "AWS Elastic Disaster Recovery (AWS DRS)is purpose-built for continuously replicatingphysical and virtual serversinto AWS with low RTO/RPO. It uses lightweight replication agents to stream block- level changes to a low-coststaging areain AWS, which helps optimize storage costs (only the staging resources run continuously) and reduces bandwidth usage through efficient replication mechanisms. In a disaster or test, AWS DRS can automatically launch recovery instances in AWS based on a defined blueprint (instance types, networking, security groups), enabling rapid failover workflows that commonly meetsub-hour RTOobjectives."},
  {"id": 194, "text": "한 회사가 아마존 EC2 인스턴스 중 하나에서 갑자기 CPU 사용량이 급증하는 것을 발견했습니다. 회사는 해당 EC2 인스턴스가 해킹당한 것인지, 아니면 운영 체제가 백그라운드에서 정리 작업을 수행하는 것인지 알 수 없습니다. 보안 엔지니어는 문제를 조사하기 전에 어떤 단계들을 조합하여 수행해야 할까요? (세 가지를 선택하세요.)", "choices": ["종료 보호가 비활성화되지 않은 경우 EC2 인스턴스에 대한 종료 보호를 비활성화합니다.", "EC2 인스턴스에 종료 보호 기능이 활성화되어 있지 않은 경우 종료 보호 기능을 활성화합니다.", "EC2 인스턴스에 연결된 Amazon Elastic Block Store(Amazon EBS) 데이터 볼륨의 스냅샷을 생성합니다.", "EC2 인스턴스에 연결된 Amazon Elastic Block Store(Amazon EBS) 데이터 볼륨의 모든 스냅샷을 제거합니다.", "EC2 인스턴스 메타데이터를 캡처한 다음 EC2 인스턴스를 격리 상태로 태그합니다.", "민감한 정보가 포함된 EC2 인스턴스 메타데이터 항목을 즉시 제거합니다."], "answer": "B,C,E", "multi": true, "explanation": "Before beginning an investigation, incident response best practice is topreserve evidence,prevent accidental loss of the asset, andclearly mark and control the potentially affected resource. Enablingtermination protection(Option B) helps ensure the instance is not accidentally terminated during triage, which would destroy volatile evidence and complicate forensics and recovery. TakingEBS snapshotsof all attached data volumes (Option C) preserves a point-in-time copy of disk evidence for later forensic analysis, malware scanning, or offline investigation. Snapshots allow responders to create forensic volumes or AMIs in an isolated environment without repeatedly touching the potentially compromised instance. Capturinginstance metadataand tagging the instance asunder quarantine(Option E) supports both investigation and operational control. Metadata capture (instance ID, IAM role, network interfaces, security groups, user-data, tags, recent changes) provides context for responders. Quarantine tagging enables automated workflows (for example, incident runbooks that isolate the instance, restrict IAM, or move it to a quarantine security group) and signals to other teams/tools that the instance is under investigation."},
  {"id": 195, "text": "한 회사가 민감한 데이터가 포함된 모든 객체를 Amazon S3 버킷에 저장하려고 합니다. 이 회사는 서버 측 암호화를 사용하여 S3 버킷을 암호화할 예정입니다. 회사 운영팀은 S3 버킷에 대한 접근 권한을 관리하고, 보안팀은 암호화 키에 대한 접근 권한을 관리합니다. 회사는 두 팀의 업무를 분리하여, 어느 한 팀의 설정 오류로 인해 무단으로 평문 데이터에 접근하여 데이터가 손상되는 것을 방지하고자 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["운영팀에서 Amazon S3 관리형 암호화 키(SSE-S3)를 사용한 서버 측 암호화를 사용하도록 S3 버킷의 기본 버킷 암호화를 구성했는지 확인하십시오. 보안팀에서 암호화 키 사용에 대한 액세스를 제어하는 ​IAM 정책을 생성했는지 확인하십시오.", "운영팀에서 고객이 관리하는 AWS KMS 키(SSE-KMS)를 사용한 서버 측 암호화를 요청 시 사용하도록 요구하는 버킷 정책을 생성하도록 합니다. 보안팀에서 암호화 키에 대한 액세스를 제어하는 ​키 정책을 생성하도록 합니다.", "운영팀에서 Amazon S3 관리형 키(SSE-S3)를 사용한 서버 측 암호화를 요청하도록 요구하는 버킷 정책을 생성하도록 합니다. 보안팀에서 암호화 키에 대한 액세스를 제어하는 ​IAM 정책을 생성하도록 합니다.", "운영팀에서 고객이 제공한 암호화 키(SSE-C)를 사용한 서버 측 암호화를 요청 시 사용하도록 요구하는 버킷 정책을 생성하도록 합니다. 보안팀에서 고객이 제공한 키를 AWS 키 관리 서비스(AWS KMS)에 저장하도록 합니다. 보안팀에서 암호화 키에 대한 접근을 제어하는 ​키 정책을 생성하도록 합니다."], "answer": "B", "multi": false, "explanation": "To achieve true separation of duties, the company needs a design whereS3 access alone is not sufficientto read plaintext data.SSE-KMS with a customer managed KMS keyprovides that separation because successful object reads require both: (1) S3 permissions to read the object and (2) permission to use the KMS key to decrypt it. This enables the operations team to manage bucket and object permissions while the security team independently controls key usage through theKMS key policy(and grants). If either team misconfigures only their part, the data is still protected: an overly permissive bucket policy won't expose plaintext unless KMS decrypt is also allowed; similarly, KMS permissions alone are not sufficient without S3 read access."},
  {"id": 196, "text": "IAM 사용자가 Amazon S3 버킷의 객체에 접근하려고 할 때 '액세스 거부' 메시지를 수신합니다. 해당 사용자와 S3 버킷은 동일한 AWS 계정에 속해 있습니다. S3 버킷은 동일한 AWS 계정의 고객 관리 키를 사용하여 모든 객체를 저장 시 암호화하는 AWS KMS 키(SSE- KMS)를 사용하는 서버 측 암호화 방식으로 구성되어 있습니다. 해당 S3 버킷에는 버킷 정책이 정의되어 있지 않습니다. 해당 IAM 사용자는 IAM 정책을 통해 고객 관리 키에 대한 kms:Decrypt 권한을 부여받았습니다. 또한, 해당 IAM 정책은 S3 버킷 및 버킷 내 객체에 대한 s3:List* 및 s3:Get* 권한도 부여합니다. 다음 중 IAM 사용자가 S3 버킷의 객체에 액세스할 수 없는 가능한 이유는 무엇입니까?", "choices": ["IAM 정책에서 thekms:DescribeKey 권한을 허용해야 합니다.", "S3 버킷이 저장된 객체를 암호화하기 위해 AWS 관리형 키를 사용하도록 변경되었습니다.", "IAM 사용자가 객체에 액세스할 수 있도록 S3 버킷 정책을 추가해야 합니다.", "KMS 키 정책이 수정되어 AWS 계정이 키에 대한 전체 액세스 권한을 갖지 못하도록 했습니다."], "answer": "D", "multi": false, "explanation": "WithSSE-KMS, authorization is a two-part check: the caller must have S3 permissions to read the objectandthe caller must be allowed to use the KMS key for decryption. Even if an IAM policy grants kms:Decrypt, the request will still fail if theKMS key policydoes not allow the principal (or does not allow the account to delegate use of the key). KMS key policies are authoritative: they can prevent key usage even when IAM policies appear to allow it. A common misconfiguration is editing the key policy and removing the statement that grants the AWS account (or key administrators) the ability to manage and delegate permissions for the key-- often described as removing \"Enable IAM user permissions\" or otherwise blocking the account from using IAM policies to authorize key usage. In that case, the IAM user's kms:Decrypt permission in IAM is not sufficient because the key policy no longer permits it, resulting in Access Denied when S3 attempts to call KMS on the user's behalf during GetObject."},
  {"id": 197, "text": "한 회사가 AWS 월별 요금 인상 원인을 조사하고 있습니다. 조사 결과, 악의적인 공격자가 일부 Amazon EC2 인스턴스를 해킹하여 대규모 이메일 피싱 캠페인용 웹페이지를 제공한 것으로 밝혀졌습니다. 보안 엔지니어는 향후 비용 증가를 모니터링하고 악의적인 활동을 감지하는 솔루션을 구현해야 합니다. 어떤 솔루션이 회사에 비용 증가를 가장 빨리 감지할 수 있도록 해줄까요?", "choices": ["Amazon EventBridge 규칙을 생성하여 AWS Lambda 함수를 매시간 호출합니다. Lambda 함수가 AWS Data Exports에서 모든 서비스 사용량에 대한 AWS 사용량 보고서를 다운로드하도록 프로그래밍합니다. Lambda 함수가 보고서를 분석하고 이상 징후가 감지되면 알림을 보내도록 프로그래밍합니다.", "AWS 비용 이상 감지에서 비용 모니터를 생성합니다. 예상 비용 대비 초과 비율이 임계값을 초과할 경우 Amazon Simple Notification Service(Amazon SNS) 토픽으로 알림을 보내도록 개별 알림을 구성합니다.", "AWS Cost Explorer를 매일 검토하여 이전 달 대비 비용 변동 사항을 파악하십시오. 이전 달 대비 비용이 크게 증가한 서비스의 사용량을 검토하십시오.", "EC2 인스턴스가 실행되는 VPC에서 VPC 흐름 로그를 캡처합니다. 타사 네트워크 분석 도구를 사용하여 흐름 로그를 분석하고 비용 증가를 초래할 수 있는 네트워크 트래픽의 이상 징후를 감지합니다."], "answer": "B", "multi": false, "explanation": "For the earliest detection of abnormal spend, the most direct and purpose-built capability isAWS Cost Anomaly Detection. It continuously evaluates spend patterns and uses machine learning to identify unexpected cost increases soon after they begin, then sends alerts based on the configured thresholds. By creating acost monitor(for example, for linked accounts, services, or cost categories) and configuring an alert to publish toSNS, the security team can receive near- real-time notifications when costs deviate beyond an expected baseline. This is well suited for detecting compromise-driven spend (such as abused EC2 instances serving phishing pages, crypto-mining, or data exfiltration patterns that raise transfer costs)."},
  {"id": 198, "text": "보안 엔지니어는 AWS CloudTrail이 여러 AWS 리전에서 꺼진 경우 다시 켜는 솔루션을 구축해야 합니다. 이 해결책을 구현하는 가장 효율적인 방법은 무엇일까요?", "choices": ["관리형 규칙이 있는 AWS Config를 사용하여 AWS-EnableCloudTrail 수정 작업을 시작하세요.", "CloudTrail.amazonaws.com 이벤트 소스와 StartLogging 이벤트 이름을 사용하여 Amazon EventBridge 이벤트를 생성하고, AWS Lambda 함수를 호출하여 StartLogging API를 실행합니다.", "cloudtrail.amazonaws.com 이벤트 소스와 StopLogging 이벤트 이름을 사용하여 Amazon CloudWatch 알람을 생성하고 AWS Lambda 함수를 호출하여 StartLogging API를 실행합니다.", "CloudTrail 로깅이 활성화되어 있는지 확인하기 위해 AWS Trusted Advisor를 모니터링합니다."], "answer": "A", "multi": false, "explanation": "The most efficient approach is to useAWS Configbecause Config is designed for continuous compliance evaluation and can automatically triggermanaged remediationwhen a resource drifts from the desired state. A managed Config rule that detects when CloudTrail is not logging, combined with theAWS-EnableCloudTrailremediation action, provides an automated way to re- enable CloudTrail without building and maintaining custom event processing code. This is especially valuable in multi-Region environments because Config can evaluate configurations across Regions and enforce the intended posture consistently."},
