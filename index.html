  {"id": 91, "text": "한 회사가 AWS Organizations에 조직을 보유하고 있습니다. 이 조직은 여러 개의 OU로 구성되어 있습니다. 회사는 조직 외부의 IAM 주체가 조직의 Amazon S3 버킷에 접근하는 것을 차단해야 합니다. 이 솔루션은 각 OU가 기존에 S3 버킷에 접근하는 권한에 영향을 미치지 않아야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇일까요?", "choices": ["모든 S3 버킷에 대해 S3 공개 액세스 차단을 구성합니다.", "모든 AWS 계정에 대해 S3 공개 액세스 차단을 구성합니다.", "\"aws:ResourceOrgPaths\": \"${aws:PrincipalOrgPaths}\" 조건을 포함하는 SCP를 배포합니다.", "\"aws:ResourceOrgID\": \"${aws:PrincipalOrgID}\" 조건을 포함하는 SCP를 배포합니다."], "answer": "D", "multi": false, "explanation": "By using an SCP with the aws:ResourceOrgID and aws:PrincipalOrgID condition, you ensure that only IAM principals from within the same AWS Organization can access the S3 buckets. This SCP restricts access from any IAM principals outside the organization while allowing access within the organization. This approach meets the requirement without affecting existing permissions within the OUs."},
  {"id": 92, "text": "한 회사가 Amazon RDS 스냅샷에 대한 데이터 수명주기 관리를 구현해야 합니다. 이 회사는 AWS Backup을 사용하여 스냅샷을 관리할 예정입니다. 해당 회사는 RDS 자동 스냅샷을 5년간 보관해야 하며, 장기 보관을 위해 Amazon S3를 사용할 예정입니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Backup을 사용하여 RDS 스냅샷에 5년 보존 태그를 적용합니다.", "AWS Backup이 RDS 스냅샷에 사용하는 S3 버킷에서 버전 관리를 활성화합니다. 구성 5년 보존 기간.", "S3 수명 주기 정책을 생성합니다. AWS Backup에서 RDS 스냅샷에 사용하는 S3 버킷에 대해 5년의 보존 기간을 포함합니다.", "AWS Backup에서 백업 계획을 생성합니다. 5년 보존 기간을 구성합니다."], "answer": "D", "multi": false, "explanation": "AWS Backup allows you to create backup plans that include defined retention periods for managing the lifecycle of RDS snapshots. By configuring a 5- year retention period in the AWS Backup plan, the company can ensure that RDS snapshots are retained for the required duration. AWS Backup can also handle moving backups to Amazon S3 for long-term archival storage as specified in the backup plan."},
  {"id": 93, "text": "회사 보안 정책에 따라 모든 Amazon EC2 인스턴스는 Amazon 시간 동기화 서비스를 사용해야 합니다. 모든 AWS 계정에서 AWS CloudTrail 트레일이 활성화되어 있으며, 모든 VPC에 대해 VPC 흐름 로그가 활성화되어 있습니다. 보안 엔지니어는 인터넷상의 네트워크 시간 프로토콜(NTP) 서버를 사용하려는 모든 EC2 인스턴스를 식별해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["CloudTrail 로그에서 표준 시간 서버가 아닌 서버에 대한 API 호출을 모니터링합니다.", "Amazon 시간 동기화 서비스에 대한 API 호출을 CloudTrail 로그에서 모니터링합니다.", "VPC 흐름 로그를 모니터링하여 표준 시간 서버가 아닌 서버로의 트래픽을 확인합니다.", "Amazon 시간 동기화 서비스로 향하는 트래픽에 대한 VPC 흐름 로그를 모니터링합니다."], "answer": "C", "multi": false, "explanation": "To identify EC2 instances attempting to use Network Time Protocol (NTP) servers on the internet instead of the Amazon Time Sync Service, monitoring VPC flow logs is appropriate. VPC flow logs capture details about traffic to and from EC2 instances, including any traffic directed to external NTP servers. By analyzing these logs for traffic to non-standard time servers (IP addresses other than the Amazon Time Sync Service endpoint ), the security engineer can identify instances that are not complying with the company's policy. 169.254.169.123"},
  {"id": 94, "text": "한 회사가 모든 기능이 활성화된 AWS Organizations 조직을 사용하는 다중 계정 전략을 운영하고 있습니다. 이 회사는 AWS 계정 관리에 대한 신뢰할 수 있는 액세스를 활성화했습니다. 새 계정은 AWS Control Tower Account Factory를 통해 프로비저닝됩니다. 회사는 조직 내 모든 신규 계정이 AWS Security Hub 멤버 계정이 되도록 해야 합니다. 어떤 솔루션이 최소한의 개발 노력으로 이러한 요구 사항을 충족할까요?", "choices": ["조직의 관리 계정에서 Security Hub를 활성화합니다. AWS Step Functions 워크플로를 생성합니다. CreateAccount 이벤트가 발생할 때 워크플로를 호출하도록 Amazon EventBridge 규칙을 생성합니다.", "조직 관리 계정에서 보안 허브를 활성화합니다. 모든 새 계정이 자동 온보딩을 완료할 때까지 기다립니다.", "조직의 관리 계정에서 Security Hub를 활성화합니다. 새 계정에 대해 Security Hub를 활성화하는 AWS Lambda 함수를 생성합니다. 새 계정이 프로비저닝될 때 발생하는 AWS Control Tower 수명 주기 이벤트를 사용하여 Lambda 함수를 호출합니다.", "조직의 관리 계정을 사용하여 Security Hub 위임 관리자 계정을 지정합니다. 위임된 관리자 계정에서 Security Hub를 활성화하는 구성 정책을 생성합니다. 해당 구성 정책을 조직 루트와 연결합니다."], "answer": "D", "multi": false, "explanation": ""},
  {"id": 95, "text": "한 회사가 아마존 엘라스틱 쿠버네티스 서비스(Amazon EKS) 클러스터를 사용하여 쿠버네티스 기반 애플리케이션을 실행합니다. 이 회사는 아마존 가드듀티(Amazon GuardDuty)를 사용하여 애플리케이션을 보호합니다. GuardDuty에서 EKS 보호 기능이 활성화되어 있습니다. 하지만 해당 GuardDuty 기능은 Kubernetes 기반 애플리케이션을 모니터링하지 않습니다. GuardDuty가 Kubernetes 기반 애플리케이션을 모니터링하도록 하려면 어떤 솔루션을 선택해야 할까요?", "choices": ["EKS 클러스터를 호스팅하는 VPC에 대해 VPC 흐름 로그를 활성화합니다.", "EKS 클러스터에 CloudWatchEventsFullAccess AWS 관리형 정책을 할당합니다.", "AmazonGuardDutyFullAccess AWS 관리형 정책이 GuardDuty 서비스 역할에 연결되어 있는지 확인하십시오.", "Amazon EKS에서 컨트롤 플레인 로그를 활성화합니다. 로그가 Amazon CloudWatch로 수집되는지 확인합니다."], "answer": "D", "multi": false, "explanation": "Amazon GuardDuty's EKS Protection relies on Amazon EKS control plane logs to monitor Kubernetes activity and detect potential security threats. Enabling control plane logging (e.g., API server logs) in EKS and sending these logs to Amazon CloudWatch allows GuardDuty to analyze the Kubernetes activity, making it possible to detect threats in the EKS clusters."},
  {"id": 96, "text": "한 회사가 아마존 S3 버킷에 객체 수준의 활동을 기록해야 합니다. 또한 디지털 서명을 사용하여 로그 파일의 무결성을 검증해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇일까요?", "choices": ["로그 파일 유효성 검사가 활성화된 AWS CloudTrail 트레일을 생성합니다. 데이터 이벤트를 활성화합니다. 데이터 이벤트 유형으로 Amazon S3를 지정합니다.", "S3 서버 액세스 로그용 새 S3 버킷을 생성합니다. 기존 S3 버킷이 S3 서버 액세스 로그를 새 S3 버킷으로 전송하도록 구성합니다.", "Amazon CloudWatch Logs 로그 그룹을 생성합니다. 기존 S3 버킷이 S3 서버 액세스 로그를 해당 로그 그룹으로 전송하도록 구성합니다.", "로그 파일 유효성 검사가 활성화된 S3 서버 액세스 로그용 새 S3 버킷을 생성합니다. 데이터 이벤트를 활성화합니다. 데이터 이벤트 유형으로 Amazon S3를 지정합니다."], "answer": "A", "multi": false, "explanation": "Enabling AWS CloudTrail with log file validation and data events for Amazon S3 provides object- level logging for S3 buckets and ensures log file integrity through digital signatures. CloudTrail data events capture detailed records of object-level activity, such as read and write operations, in S3 buckets. By enabling log file validation, CloudTrail adds a digital signature to each log file, allowing you to verify its integrity."},
  {"id": 97, "text": "한 회사가 온라인 게임을 위한 새로운 웹 기반 계정 관리 시스템을 도입했습니다. 플레이어들은 시스템에 로그인하기 위해 고유한 사용자 이름과 비밀번호를 생성합니다. 해당 회사는 시스템에 AWS WAF 웹 ACL을 구현했습니다. 이 웹 ACL에는 시스템에 서비스를 제공하는 애플리케이션 로드 밸런서의 AWS 관리형 핵심 규칙 세트(CRS) 규칙 그룹이 포함되어 있습니다. 회사 보안팀은 해당 시스템이 자격 증명 탈취 공격의 표적이 되었음을 확인했습니다. 다른 데이터 유출 사고에서 노출된 자격 증명을 사용하여 시스템에 로그인하려는 시도가 있었습니다. 보안팀은 향후 자격 증명 탈취 공격의 성공 가능성을 줄이기 위한 솔루션을 구현해야 합니다. 또한 해당 솔루션은 시스템의 정당한 사용자에게 미치는 영향을 최소화해야 합니다. 다음 요구 사항을 충족하는 조치 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["단일 IP 주소에서 발생한 성공적인 로그인 응답 수를 분석하기 위해 Amazon CloudWatch 사용자 지정 메트릭을 생성합니다.", "웹 ACL에 계정 탈취 방지(ATP) AWS 관리형 규칙 그룹을 추가합니다. 시스템에 대한 로그인 요청을 검사하도록 규칙 그룹을 구성합니다. awswaf:managed:aws:atp:signal:credential_compromised 레이블이 있는 모든 요청을 차단합니다.", "모든 사용자가 로그인할 때 CAPTCHA 퍼즐을 풀도록 요구하는 기본 웹 ACL 작업을 구성합니다.", "웹 ACL에 IP 기반 일치 규칙을 구현하여 로그인 응답이 많이 발생하는 모든 IP 주소를 차단합니다.", "사용자가 시스템 내에서 비밀번호를 재설정할 수 있도록 안전한 워크플로로 리디렉션하는 사용자 지정 차단 응답을 생성합니다."], "answer": "A,B", "multi": true, "explanation": "Creating a CloudWatch custom metric to monitor the number of successful login responses from a single IP address can help identify unusual patterns that might indicate credential stuffing. This allows for additional monitoring and detection without immediately impacting legitimate users. The AWS WAF Account Takeover Prevention (ATP) rule group is specifically designed to detect and mitigate credential stuffing attacks. By configuring ATP to inspect login requests and blocking requests with the awswaf:managed:aws:atp:signal:credential_compromised label, the security team can significantly reduce the chances of successful credential stuffing attacks. This approach targets compromised credentials while minimizing impact on legitimate users."},
  {"id": 98, "text": "한 회사가 Amazon CloudWatch Logs의 로그 그룹으로 로그를 전송하는 애플리케이션을 운영하고 있습니다. 해당 로그에는 애플리케이션 사용자들의 이메일 주소가 포함되어 있습니다. 회사 개발자들이 CloudWatch Logs에서 로그를 확인해야 합니다. 보안 엔지니어는 로그 그룹에 접근하는 개발자들이 사용자 이메일 주소를 볼 수 없도록 해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["Amazon Macie를 사용하여 로그 그룹을 스캔합니다. Macie에서 이메일 주소 패턴을 식별하기 위해 정규 표현식을 사용하는 사용자 지정 데이터 식별자를 사용하도록 구성합니다. Macie에서 자동 데이터 검색을 활성화합니다.", "AWS 키 관리 서비스(AWS KMS) 키를 생성합니다. 로그 그룹이 해당 키를 사용하여 로그를 암호화하도록 구성합니다. 개발자가 CloudWatch Logs를 사용하기 위해 사용하는 IAM 역할에 대한 액세스를 거부하도록 키 정책을 구성합니다.", "로그 그룹에 대한 구독 필터를 생성합니다. 로그 구독을 구성하여 로그 데이터를 AWS Lambda 함수로 전송합니다. Lambda 함수가 로그 항목을 구문 분석하고 이메일 주소인 값을 마스킹하도록 프로그래밍합니다.", "로그 그룹에 대한 데이터 보호 정책을 구성합니다. 마스킹할 데이터 유형에 대해 AWS 관리형 데이터 식별자인 EmailAddress를 지정합니다. 로그 그룹에 대한 데이터 보호를 활성화합니다."], "answer": "D", "multi": false, "explanation": "Amazon CloudWatch Logs supports data protection policies that can mask sensitive information such as email addresses in log groups. By configuring a data protection policy for the log group and specifying the AWS managed data identifier for EmailAddress, the company can automatically mask email addresses in the logs, allowing developers to access the log data without seeing the email addresses."},
  {"id": 99, "text": "보안 엔지니어가 회사 AWS 환경에 로깅 솔루션을 구현하고 있습니다. 보안 엔지니어는 회사 AWS 계정에 AWS CloudTrail 트레일을 구성했습니다. 로그는 제3자 서비스 제공업체가 모니터링할 수 있도록 Amazon S3 버킷에 저장됩니다. 해당 서비스 제공업체는 S3 버킷에 접근할 수 있는 지정된 IAM 역할을 보유하고 있습니다. 해당 회사는 모든 로그를 고객 관리 키를 사용하여 저장 시 암호화하도록 요구합니다. 보안 엔지니어는 AWS 키 관리 서비스(AWS KMS)를 사용하여 고객 관리 키와 키 정책을 생성합니다. 또한 보안 엔지니어는 CloudTrail이 해당 키를 사용하여 트레일을 암호화하도록 구성합니다. 보안 엔지니어가 이 설정을 구현하면 서비스 제공업체는 더 이상 로그를 읽을 수 없습니다. 보안 엔지니어는 서비스 제공업체가 로그를 읽을 수 있도록 하려면 어떻게 해야 할까요?", "choices": ["S3 버킷 정책이 서비스 제공자 역할에 객체 암호 해독 권한을 부여하는지 확인하십시오.", "서비스 제공자 역할이 해당 키에 대해 kms:Decrypt 작업을 수행할 수 있도록 키 정책에 문을 추가합니다.", "서비스 제공자 역할에 AWSKeyManagementServicePowerUser AWS 관리형 정책을 추가합니다.", "키를 AWS Certificate Manager(ACM)로 마이그레이션하여 키에 액세스할 수 있는 공유 엔드포인트를 생성합니다."], "answer": "B", "multi": false, "explanation": "When using a customer-managed AWS KMS key to encrypt CloudTrail logs, any role or principal that needs to read (decrypt) the logs must have permission to use the kms:Decrypt action on the key. By adding a statement to the key policy that grants kms:Decrypt access to the service provider's IAM role, the security engineer can ensure that the service provider has the necessary permissions to decrypt and read the encrypted logs in the S3 bucket."},
  {"id": 100, "text": "한 회사가 Amazon RDS DB 인스턴스와 Amazon Elastic Block Store(Amazon EBS) 볼륨의 백업 복사본을 보관해야 합니다. 이 백업 복사본은 서로 수백 마일 떨어진 데이터 센터에 보관해야 합니다. 이러한 요구 사항을 충족하면서 운영 오버헤드를 최소화하는 솔루션은 무엇일까요?", "choices": ["필요한 일정에 따라 백업을 생성하도록 AWS Backup을 구성합니다. 백업 계획에서 여러 가용 영역을 백업 대상으로 지정합니다.", "Amazon Data Lifecycle Manager를 구성하여 백업을 생성합니다. Amazon Data Lifecycle Manager 정책을 구성하여 백업을 Amazon S3 버킷으로 복사합니다. S3 버킷에서 복제를 활성화합니다.", "필요한 일정에 따라 백업을 생성하도록 AWS Backup을 구성합니다. 다른 AWS 리전에 대상 백업 볼트를 생성합니다. AWS Backup을 구성하여 백업 파일을 대상 백업 저장소로 복사합니다.", "Amazon Data Lifecycle Manager를 구성하여 백업을 생성합니다. 백업을 다른 AWS 리전으로 복사하는 AWS Lambda 함수를 생성합니다. Amazon EventBridge를 사용하여 예약된 시간에 Lambda 함수를 호출합니다."], "answer": "C", "multi": false, "explanation": "AWS Backup provides a streamlined solution for managing cross-Region backups with minimal operational overhead. By configuring a backup plan in AWS Backup to create backups and copy them to a destination backup vault in a different AWS Region, the company can ensure backups are retained in geographically separate data centers. This approach meets the requirement to store backups several hundred miles apart with automated cross- Region backup capabilities."},
  {"id": 101, "text": "한 회사가 수백 개의 Amazon EC2 인스턴스에 분산된 워크로드를 실행하고 있습니다. 최근 보안 사고 발생 시, 하나의 EC2 인스턴스가 손상되어 악성코드가 실행되었고, 회사가 수동으로 해당 인스턴스를 종료할 때까지 악성코드가 계속 실행되었습니다. 현재 해당 회사는 EC2 인스턴스의 악성코드를 탐지하기 위해 Amazon GuardDuty를 사용하고 있습니다. 보안 엔지니어는 GuardDuty가 인스턴스가 감염되었다고 판단할 경우 자동으로 대응하는 솔루션을 구현해야 합니다. 이 솔루션은 사고를 완화하고 AWS Well-Architected Framework의 사고 대응 지침을 준수해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["GuardDuty 스캔에서 인스턴스가 감염된 것으로 확인되면 AWS Systems Manager 실행 명령이 실행되도록 구성합니다. 실행 명령을 사용하여 감염된 인스턴스의 운영 체제에서 모든 네트워크 어댑터를 제거합니다. 또한 실행 명령을 사용하여 인스턴스에 \"감염됨\" 태그를 추가합니다.", "GuardDuty 스캔에서 인스턴스가 감염된 것으로 확인되면 실행되는 AWS Lambda 함수를 생성합니다. 해당 Lambda 함수가 인스턴스와 연결된 모든 탄력적 네트워크 인터페이스를 삭제하도록 프로그래밍합니다. 또한 해당 인스턴스에 \"감염됨\" 태그를 추가하도록 Lambda 함수를 프로그래밍합니다.", "GuardDuty 스캔에서 인스턴스가 감염된 것으로 확인되면 실행되는 AWS Lambda 함수를 생성합니다. 해당 Lambda 함수가 인스턴스에서 모든 Amazon Elastic Block Store(Amazon EBS) 볼륨을 분리하도록 프로그래밍합니다. 또한, 분리된 EBS 볼륨에 \"감염됨\" 태그를 추가하고 인스턴스를 종료하도록 Lambda 함수를 프로그래밍합니다.", "EC2 인스턴스를 격리하기 위해 별도의 VPC를 정의합니다. 네트워크 트래픽을 허용하지 않는 보안 그룹을 정의합니다. GuardDuty 스캔에서 인스턴스가 감염된 것으로 확인되면 실행되는 AWS Lambda 함수를 생성합니다. Lambda 함수가 인스턴스를 별도의 VPC로 이동하고 인스턴스에 보안 그룹을 할당하도록 프로그래밍합니다."], "answer": "C", "multi": false, "explanation": ""},
  {"id": 102, "text": "공용 서브넷에 Amazon EC2 인스턴스 두 개가 있습니다. 이 서브넷에는 사용자 지정 네트워크 접근 제어 목록(ACL)이 설정되어 있습니다. 보안 엔지니어는 서브넷 보안을 강화하기 위한 솔루션을 설계하고 있습니다. 이 솔루션은 포트 443을 통해 TLS를 사용하는 인터넷 서비스로의 아웃바운드 트래픽을 허용해야 합니다. 또한, MySQL 포트 3306으로 향하는 인바운드 트래픽은 차단해야 합니다. 어떤 네트워크 ACL 규칙 세트가 이러한 요구 사항을 충족합니까?", "choices": ["인바운드 규칙 100을 사용하여 TCP 포트 443의 트래픽을 허용합니다. 인바운드 규칙 200을 사용하여 TCP 포트 3306의 트래픽을 차단합니다. 아웃바운드 규칙 100을 사용하여 TCP 포트 443의 트래픽을 허용합니다.", "인바운드 규칙 100을 사용하여 TCP 포트 3306의 트래픽을 차단합니다. 인바운드 규칙 200을 사용하여 TCP 포트 범위 1024-65535의 트래픽을 허용합니다. 아웃바운드 규칙 100을 사용하여 TCP 포트 443의 트래픽을 허용합니다.", "인바운드 규칙 100을 사용하여 TCP 포트 범위 1024-65535의 트래픽을 허용합니다. 인바운드 규칙 200을 사용하여 TCP 포트 3306의 트래픽을 차단합니다. 아웃바운드 규칙 100을 사용하여 TCP 포트 443의 트래픽을 허용합니다.", "인바운드 규칙 100을 사용하여 TCP 포트 3306의 트래픽을 차단합니다. 인바운드 규칙 200을 사용하여 TCP 포트 443의 트래픽을 허용합니다. 아웃바운드 규칙 100을 사용하여 TCP 포트 443의 트래픽을 허용합니다."], "answer": "B", "multi": false, "explanation": "In a network ACL, rules are processed in order, so the numbering of the rules is important. The solution requires: Outbound traffic on port 443 (TLS) to reach an internet service. Inbound traffic on port 3306 (MySQL) to be denied. The correct rule set: Inbound rule 100 denies traffic on TCP port 3306 to block MySQL access. Inbound rule 200 allows TCP port range 1024-65535, which is required for ephemeral ports used in response to outbound connections on port 443. Outbound rule 100 allows TCP port 443, permitting the required outbound traffic. This configuration meets the requirements by ensuring that only traffic initiated outbound on port 443 can receive responses on ephemeral ports, and inbound MySQL traffic on port 3306 is denied."},
  {"id": 103, "text": "한 회사가 IAM 역할이 수행한 작업을 조사하고 있습니다. 해당 역할이 AWS Security Hub에 마지막으로 액세스한 시점과 Security Hub에서 DeleteInsight 작업을 마지막으로 사용한 시점을 파악해야 합니다. 이러한 정보를 제공하는 솔루션은 무엇일까요?", "choices": ["AWS Trusted Advisor에서 보안 범주에 대한 검사를 사용하십시오. 역할을 검색하고 수행된 조치를 검토하십시오.", "AWS Identity and Access Management(IAM)의 액세스 어드바이저 탭을 사용하세요. Security Hub와 수행된 작업을 검색하세요.", "AWS Identity and Access Management(IAM)을 사용하여 자격 증명 보고서를 생성합니다. 보고서에서 Security Hub 활동을 검색합니다.", "AWS Identity and Access Management Access Analyzer에서 분석기를 생성합니다. Security Hub에서 역할의 작업에 대한 결과를 검토합니다."], "answer": "B", "multi": false, "explanation": "The Access Advisor feature in IAM provides information about the services that an IAM role or user has accessed and the last time they accessed each service. This feature shows when the IAM role last accessed AWS Security Hub. To find specific actions like DeleteInsight, you can review CloudTrail logs, but Access Advisor is the first step to quickly see the last access to the service."},
  {"id": 104, "text": "한 기업이 컨테이너 워크로드를 데이터 센터에서 Amazon Elastic Container Service(Amazon ECS) 클러스터로 마이그레이션하고 있습니다. 이 기업은 워크로드에서 발생할 수 있는 잠재적 위협을 탐지하고 컨테이너 클러스터의 보안 수준을 향상시키는 솔루션을 구현해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇일까요?", "choices": ["ECS 클러스터가 실행 중인 VPC에 Amazon Inspector를 구성합니다.", "ECS 클러스터에서 Amazon GuardDuty 런타임 모니터링을 활성화합니다.", "Amazon CloudWatch 로그를 사용하여 Amazon ECS API 액세스를 감사하고 무단 액세스를 식별합니다.", "동일한 VPC 내에 컨테이너 클러스터를 생성합니다. VPC 흐름 로그를 사용하여 네트워크 트래픽을 중앙에서 모니터링합니다."], "answer": "B", "multi": false, "explanation": "Amazon GuardDuty Runtime Monitoring is specifically designed to detect potential threats and improve the security posture of Amazon ECS clusters. GuardDuty Runtime Monitoring provides detailed analysis of container activity to identify potential security issues, such as unusual behavior within the ECS environment. This approach is effective for monitoring both network and application-level threats in containerized workloads."},
  {"id": 105, "text": "보안 엔지니어는 회사의 Amazon EC2 인스턴스가 암호화폐 채굴에 사용되고 있는지 여부를 판단하는 솔루션을 구현해야 합니다. 이 솔루션은 암호화폐 관련 활동이 발생할 경우 Amazon SNS(Amazon Simple Notification Service) 토픽으로 알림을 전송해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Guard 사용자 지정 정책을 사용하여 AWS Config 사용자 지정 규칙을 생성합니다. EC2 인스턴스가 암호화폐 관련 활동과 연관된 DNS 도메인 이름을 쿼리할 때 이를 감지하도록 AWS Config 규칙을 구성합니다. SNS 토픽에 대한 알림을 시작하도록 AWS Config를 구성합니다.", "Amazon GuardDuty를 활성화합니다. GuardDuty가 암호화폐 관련 활동과 연관된 발견 사항을 생성할 때 SNS 토픽으로 알림을 보내도록 Amazon EventBridge 규칙을 생성합니다.", "Amazon Inspector를 활성화합니다. Amazon Inspector에서 암호화폐 관련 활동과 연관된 발견 사항이 생성될 때 SNS 토픽으로 알림을 보내도록 Amazon EventBridge 규칙을 생성합니다.", "VPC 흐름 로그를 활성화합니다. 흐름 로그를 Amazon S3 버킷으로 전송합니다. EC2 인스턴스가 암호화폐 관련 활동과 연관된 DNS 도메인 이름을 쿼리할 때 이를 감지하도록 Amazon Athena에서 쿼리를 설정합니다. Athena 쿼리를 구성하여 SNS 토픽에 알림을 전송합니다."], "answer": "B", "multi": false, "explanation": "Amazon GuardDuty includes built-in threat detection capabilities that can identify suspicious activity such as cryptocurrency mining. When GuardDuty detects cryptocurrency-related activity, it generates a finding that can be used to trigger alerts. By configuring an Amazon EventBridge rule to capture these specific findings and send notifications to an SNS topic, the solution provides real-time alerts for cryptocurrency mining activity on EC2 instances."},
  {"id": 106, "text": "한 기업이 Amazon Elastic Block Store(Amazon EBS) 볼륨의 스냅샷을 매년 생성해야 합니다. 생성된 스냅샷은 10년간 보관해야 하며, AWS Key Management Service(AWS KMS)를 사용하여 EBS 볼륨과 스냅샷을 암호화해야 합니다. 암호화 키는 매년 자동으로 교체되어야 합니다. 이전 연도에 생성된 스냅샷은 암호화 키 교체 후에도 읽을 수 있어야 합니다. 이러한 요구 사항을 충족하기 위해 회사는 어떤 유형의 KMS 키를 암호화에 사용해야 할까요?", "choices": ["AWS KMS에서 생성된 키 자료를 사용하는 비대칭 AWS 관리형 KMS 키", "AWS KMS에서 생성된 키 자료를 사용하는 대칭형 고객 관리 KMS 키", "사용자 정의 가져오기 키 자료를 사용하는 대칭형 고객 관리 KMS 키", "사용자 지정으로 가져온 키 자료를 사용하는 비대칭 AWS 관리형 KMS 키"], "answer": "B", "multi": false, "explanation": "For EBS volume encryption with AWS KMS, symmetric customer managed KMS keys are recommended because they support automatic key rotation and are compatible with EBS volume and snapshot encryption. AWS KMS automatically manages previous key versions, ensuring that snapshots created with older key versions remain readable even after key rotation. This meets the requirement for automatic annual rotation and backward compatibility for reading older snapshots."},
  {"id": 107, "text": "한 회사가 수백 개의 AWS 계정을 보유하고 있으며 AWS Organizations를 사용하고 있습니다. 이 회사는 제품 팀, 보안 팀, 플랫폼 팀을 위해 각각 다른 IAM 역할과 정책을 생성할 계획입니다. 일부 IAM 정책은 여러 팀에서 공유될 예정입니다. 보안 엔지니어는 각 팀의 IAM 역할을 논리적으로 그룹화하는 솔루션을 구현해야 합니다. 이 솔루션은 플랫폼 팀만 AWS 서비스에 대한 IAM 권한을 위임할 수 있도록 해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["각 팀에 대한 IAM 역할을 포함하는 IAM 경로를 설정합니다. 플랫폼 팀의 IAM 경로를 제외한 모든 엔터티에 대해 iam:PassRole 권한을 거부하는 SCP를 배포합니다.", "각 팀에 대해 IAM 역할에 서로 다른 태그를 적용합니다. 플랫폼 팀의 역할을 제외한 모든 엔터티에 대해 sts:AssumeRole 권한을 거부하는 SCP를 배포합니다.", "각 팀에 대해 IAM 정책에 서로 다른 태그를 적용합니다. 플랫폼 팀의 정책을 제외한 모든 엔터티에 대해 iam:PassRole 권한을 거부하는 SCP를 배포합니다.", "각 팀에 대한 IAM 역할을 포함하는 IAM 경로를 설정합니다. IAM 권한 경계를 사용하여 제품 팀과 보안 팀의 IAM 역할에 대해 sts:AssumeRole 권한을 거부합니다."], "answer": "A", "multi": false, "explanation": "Using IAM paths allows you to organize and logically group IAM roles by team, making it easier to manage permissions. By creating IAM paths specific to each team (e.g., /product- team/, /security- team/, /platform-team/), you can apply a Service Control Policy (SCP) that restricts the permission to only roles within the platform team's path. This approach allows the platform team to delegate IAM permissions to AWS iam:PassRole services while preventing other teams from doing so, meeting both organizational and delegation requirements."},
  {"id": 108, "text": "보안 엔지니어는 특정 AWS 리소스에 대한 구성 변경 사항을 평가하여 해당 리소스가 규정 준수 표준을 충족하는지 확인하려고 합니다. 그러나 보안 엔지니어는 해당 리소스에 여러 구성 변경이 빠르게 연속적으로 발생하는 상황을 우려하고 있습니다. 보안 엔지니어는 일련의 변경 사항이 미치는 누적 영향을 파악하기 위해 해당 리소스의 최신 구성만 기록하고자 합니다. 어떤 솔루션이 운영 효율성을 극대화하면서 이러한 요구 사항을 충족할까요?", "choices": ["AWS CloudTrail을 사용하여 API 호출을 필터링하여 구성 변경 사항을 모니터링함으로써 구성 변경을 감지할 수 있습니다. 여러 API 호출의 누적 영향을 나타내려면 가장 최근의 API 호출을 사용하십시오.", "AWS Config를 사용하여 구성 변경 사항을 감지하고 여러 구성 변경이 있는 경우 최신 구성을 기록합니다.", "Amazon CloudWatch를 사용하여 API 호출을 필터링하여 구성 변경 사항을 모니터링하고 이를 감지합니다. 여러 호출의 누적 영향을 나타내려면 가장 최근의 API 호출을 사용합니다.", "AWS Cloud Map을 사용하여 구성 변경 사항을 감지합니다. 슬라이딩 타임 윈도우를 사용하여 AWS Cloud Map에서 구성 변경 사항 보고서를 생성하고 최신 상태를 추적합니다."], "answer": "B", "multi": false, "explanation": "AWS Config is designed to detect, track, and evaluate configuration changes to AWS resources. It provides snapshots of the latest configuration of resources, capturing the cumulative impact of changes over time. If multiple changes occur in quick succession, AWS Config records the final state after all changes, meeting the requirement to track only the latest configuration efficiently."},
  {"id": 109, "text": "한 회사가 민감한 데이터를 수집하여 Amazon DynamoDB 테이블에 저장하는 웹 기반 애플리케이션을 운영하고 있습니다. 이 회사는 엔드투엔드 데이터 보호 및 무단 데이터 변경 감지 기능을 제공하는 솔루션을 구현해야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇일까요?", "choices": ["AWS 키 관리 서비스(AWS KMS) 고객 관리 키를 사용합니다. 저장된 데이터를 암호화합니다.", "AWS 프라이빗 인증 기관을 사용합니다. 전송 중인 데이터를 암호화합니다.", "DynamoDB 암호화 클라이언트를 사용합니다. 클라이언트 측 암호화를 사용합니다. 테이블 항목에 서명합니다.", "AWS 암호화 SDK를 사용합니다. 클라이언트 측 암호화를 사용합니다. 테이블 항목에 서명합니다."], "answer": "C", "multi": false, "explanation": "The DynamoDB Encryption Client provides end-to-end data protection by encrypting data on the client side before it is stored in DynamoDB and decrypting it when retrieved. This ensures that sensitive data remains protected both at rest and in transit. Additionally, the client allows you to digitally sign items, which provides integrity verification and enables detection of unauthorized changes to the data."},
  {"id": 110, "text": "보안 엔지니어가 Amazon Elastic Container Service(Amazon ECS)에서 실행되는 Docker 컨테이너와 클라이언트 간에 종단 간 암호화를 제공하는 솔루션을 설계하고 있습니다. 이 솔루션은 변동성이 큰 트래픽 패턴도 처리해야 합니다. 어떤 솔루션이 가장 확장성이 뛰어나고 지연 시간이 가장 짧을까요?", "choices": ["TLS 트래픽을 종료한 다음 컨테이너로 전송되는 트래픽을 다시 암호화하도록 네트워크 로드 밸런서를 구성합니다.", "TLS 트래픽을 종료한 다음 컨테이너로 전송되는 트래픽을 다시 암호화하도록 애플리케이션 로드 밸런서를 구성합니다.", "TCP 리스너가 있는 네트워크 로드 밸런서를 구성하여 TLS 트래픽을 컨테이너로 전달합니다.", "컨테이너로 트래픽을 전송하기 위해 다중값 응답 라우팅을 사용하도록 Amazon Route 53을 구성합니다."], "answer": "C", "multi": false, "explanation": "A Network Load Balancer (NLB) with a TCP listener is the best solution in this case because: Scalability: The NLB is designed to handle large volumes of traffic with low latency. It operates at the connection level (Layer 4), which allows it to scale efficiently, especially under volatile traffic patterns. Low latency: By passing through TLS traffic directly to the containers without terminating the connection, the NLB avoids the overhead of decrypting and re-encrypting traffic. This minimizes latency and ensures faster communication between clients and containers. This setup allows for end-to-end encryption (TLS) without needing to handle encryption termination and re-encryption at the load balancer level, which would add unnecessary complexity and processing time."},
  {"id": 111, "text": "한 회사가 애플리케이션을 실행하는 대규모 Amazon Linux 2 Amazon EC2 인스턴스를 보유하고 있습니다. 해당 애플리케이션은 민감한 데이터를 처리하며 다음과 같은 규정 준수 요건을 충족해야 합니다. - EC2 인스턴스에 대한 원격 액세스 관리 포트는 내부 또는 외부로 노출될 수 없습니다. - 모든 원격 세션 활동은 감사 로그에 기록되어야 합니다. - EC2 인스턴스에 대한 모든 원격 액세스는 인증을 거쳐야 합니다. AWS IAM Identity Center에서 인증되었습니다. - 회사 DevOps 팀은 문제 해결을 위해 가끔 EC2 인스턴스 중 하나에 연결해야 합니다. 어떤 솔루션이 규정 준수 요건을 충족하면서 EC2 인스턴스에 원격으로 액세스할 수 있도록 해줄까요?", "choices": ["계정 수준에서 EC2 시리얼 콘솔에 대한 액세스 권한을 부여합니다. DevOps 팀의 IAM 역할이 EC2 시리얼 콘솔에 액세스할 수 있도록 허용하는 IAM 정책을 생성합니다.", "EC2 인스턴스의 AMI에서 EC2 인스턴스 연결을 활성화합니다. 적절한 보안 그룹 규칙을 구성합니다. DevOps 팀이 EC2 인스턴스 연결에 액세스할 수 있도록 EC2 콘솔 액세스 권한을 부여합니다.", "AWS Systems Manager에 대한 액세스 권한을 부여하는 EC2 인스턴스 역할을 할당합니다. Systems Manager 세션 관리자에 대한 액세스 권한을 부여하는 IAM 정책을 생성합니다. 해당 정책을 DevOps 팀의 IAM 역할에 할당합니다.", "AWS Systems Manager Automation 런북을 사용하여 EC2 인스턴스에 대한 원격 액세스 포트를 엽니다. 런북 실행을 허용하려면 EC2 인스턴스에 역할을 연결합니다."], "answer": "C", "multi": false, "explanation": "No remote access management ports exposed: Systems Manager Session Manager does not require the opening of any inbound ports on the EC2 instances, which ensures compliance with the policy that no remote management ports should be exposed internally or externally. Remote session activity recorded in an audit log: Session Manager automatically records all session activity in AWS CloudTrail and Amazon CloudWatch Logs. This meets the requirement for audit logs of remote session activity. Authentication and authorization by AWS IAM Identity Center: With Session Manager, access to EC2 instances is managed through IAM policies, ensuring that access is authenticated and authorized using AWS IAM Identity Center (formerly known as AWS Single Sign-On)."},
  {"id": 112, "text": "한 회사가 AWS에서 호스팅되는 글로벌 전자상거래 웹사이트를 운영하고 있습니다. 이 회사는 아마존 클라우드프론트를 사용하여 사용자에게 콘텐츠를 제공합니다. 최근 시행된 데이터 규제 정책을 준수하기 위해 특정 국가에서 들어오는 트래픽을 차단하고자 합니다 . 어떤 솔루션이 이러한 요구 사항을 가장 비용 효율적으로 충족할까요?", "choices": ["국가 IP 범위 차단을 위한 IP 일치 조건을 사용하여 AWS WAF 웹 ACL을 생성합니다. 웹 ACL을 CloudFront 배포와 연결합니다.", "특정 국가에 대한 접근을 차단하는 지리적 일치 조건을 사용하여 AWS WAF 웹 ACL을 생성합니다. 해당 웹 ACL을 CloudFront 배포와 연결합니다.", "CloudFront의 지역 제한 기능을 사용하여 특정 국가의 액세스를 차단하세요.", "CloudFront에서 지리 위치 헤더를 사용하여 특정 국가에 대한 액세스를 거부할 수 있습니다."], "answer": "C", "multi": false, "explanation": "Amazon CloudFront includes a native geo restriction (geoblocking) capability that allows content owners to control access to their distributions based on the geographic location of the viewer. The viewer's country is determined using the IP address from which the request originates. According to the AWS Certified Security - Specialty Official Study Guide and the Amazon CloudFront Developer Guide, geo restriction is specifically designed for scenarios where organizations must comply with regional regulations, licensing requirements, or data sovereignty policies. From a cost perspective, CloudFront geo restriction is the most cost-effective solution because it is configured directly within the CloudFront distribution and does not require AWS WAF. AWS WAF introduces additional costs for web ACLs, rules, and request processing, which is unnecessary when the requirement is limited strictly to blocking or allowing access based on country."},
  {"id": 113, "text": "한 회사가 애플리케이션 로드 밸런서(ALB) 뒤에 있는 Amazon EC2 인스턴스에 자사 웹사이트를 호스팅하고 있습니다. 해당 웹사이트는 특정 IoT 기기 브랜드의 고유한 사용자 에이전트를 사용하는 글로벌 DDoS 공격을 받고 있습니다. 보안 엔지니어가 AWS WAF 웹 ACL을 생성하고 이를 ALB와 연결하려고 합니다. 보안 엔지니어는 웹 ACL의 일부로 요청을 차단하는 규칙문을 구현해야 합니다. 이 규칙문은 고객의 요청을 차단하지 않으면서 해당 IoT 장치에서 발생하는 현재 및 미래의 공격을 완화해야 합니다. 어떤 규칙 설명이 이러한 요구 사항을 충족할까요?", "choices": ["사용자 에이전트에서 IoT 장치의 IP 주소를 포함하는 IP 세트 일치 규칙 문을 사용합니다.", "지리적 일치 규칙 문을 사용하십시오. IoT 장치가 위치한 국가를 차단하도록 규칙을 구성하십시오.", "속도 기반 규칙문을 사용하십시오. IoT 장치에서 들어오는 요청 수와 동일한 속도 제한을 설정하십시오.", "사용자 에이전트에서 제공하는 IoT 장치 브랜드 정보를 포함하는 문자열 일치 규칙문을 사용합니다."], "answer": "D", "multi": false, "explanation": "AWS WAF allows security engineers to create string match rule statements that inspect specific parts of web requests, including HTTP headers such as the User-Agent header. According to the AWS Certified Security - Specialty Study Guide and AWS WAF documentation, string match rules are ideal for blocking requests that contain known malicious identifiers, such as a distinctive user agent associated with a specific bot or IoT device brand. In this scenario, the attack originates from a specific IoT device brand that uses a unique user agent. A string match rule that inspects the User-Agent header can precisely block malicious requests while allowing legitimate customer traffic to continue uninterrupted. This approach provides targeted mitigation for both current and future attacks originating from the same device signature."},
  {"id": 114, "text": "한 회사가 아마존 EC2 인스턴스 플릿에서 애플리케이션을 실행합니다. 이 회사는 애플리케이션에 아무런 위험 없이 플릿에서 인스턴스를 제거할 수 있습니다. 모든 EC2 인스턴스는 ProdFleet이라는 동일한 보안 그룹을 사용합니다. 회사 AWS 계정에서 Amazon GuardDuty와 AWS Config가 활성화되어 있습니다. 보안 엔지니어는 GuardDuty에서 암호화폐 탐지 이벤트가 발생할 경우 EC2 인스턴스가 외부 트래픽을 전송하지 못하도록 하는 솔루션을 제공해야 합니다. 보안 엔지니어는 외부 트래픽 규칙이 없는 Isolate라는 새로운 보안 그룹을 생성합니다. 그런 다음 AWS Lambda 함수를 구성하여 EC2 인스턴스를 ProdFleet 보안 그룹에서 제거하고 Isolate 보안 그룹에 추가합니다 . 이 요구사항을 충족하는 추가 조치는 무엇입니까?", "choices": ["GuardDuty가 CryptoCurrency:EC2/* 발견 이벤트를 생성할 경우 Lambda 함수를 직접 호출하도록 GuardDuty를 구성합니다.", "EC2 인스턴스에 대해 CryptoCurrency:EC2/* 구성 변경 이벤트가 발생하면 Lambda 함수를 호출하는 AWS Config 규칙을 구성합니다.", "GuardDuty에서 CryptoCurrency:EC2/* 찾기 이벤트가 생성되면 Lambda 함수를 호출하는 Amazon EventBridge 규칙을 구성합니다.", "AWS Config가 EC2 인스턴스에 대한 CryptoCurrency:EC2/* 구성 변경 이벤트를 감지하면 Lambda 함수를 호출하는 Amazon EventBridge 규칙을 구성합니다."], "answer": "C", "multi": false, "explanation": "Amazon GuardDuty generates security findings when it detects suspicious or malicious activity, including CryptoCurrency:EC2/* findings that indicate an EC2 instance may be involved in unauthorized cryptocurrency mining. According to AWS Certified Security - Specialty documentation, GuardDuty findings are published as events to Amazon EventBridge (formerly Amazon CloudWatch Events). Amazon EventBridge is the recommended service for building automated incident response workflows. By creating an EventBridge rule that listens for GuardDuty findings of type CryptoCurrency:EC2/*, the security engineer can automatically invoke a Lambda function to isolate the affected EC2 instance by modifying its security group attachments."},
  {"id": 115, "text": "한 회사의 보안 엔지니어가 AWS 클라우드의 웹 애플리케이션에서 발생하는 의심스러운 트래픽을 조사하고 있습니다. 웹 애플리케이션은 Amazon CloudFront 배포 뒤에 있는 애플리케이션 로드 밸런서(ALB)로 보호됩니다. 해당 ALB에는 AWS WAF 웹 접근 제어 목록(ACL)이 연결되어 있습니다. 회사는 AWS WAF 로그를 Amazon S3 버킷에 저장합니다. 엔지니어는 AWS WAF 로그에서 수신되는 모든 요청이 CloudFront 엣지 로케이션에 해당하는 소수의 IP 주소에서 시작되는 것을 발견했습니다. 보안 엔지니어는 의심스러운 요청을 시작하는 클라이언트의 소스 IP 주소를 식별해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["ALB가 배포된 VPC에서 VPC 흐름 로그를 활성화합니다. 소스 필드를 검사하여 클라이언트 IP 주소를 확인합니다.", "AWS WAF 로그에서 X-Forwarded-For 헤더를 검사하여 원래 클라이언트 IP 주소를 확인합니다.", "CloudFront 배포를 수정하여 ALB 연결 재사용을 비활성화합니다. AWS WAF 로그의 clientIp 필드를 검사하여 원래 클라이언트 IP 주소를 확인합니다.", "ALB로 전송되는 오리진 요청에 Client-IP라는 사용자 지정 헤더를 추가하도록 CloudFront를 구성합니다."], "answer": "B", "multi": false, "explanation": "When Amazon CloudFront is used in front of an Application Load Balancer, CloudFront becomes the immediate source of incoming requests to the ALB. As a result, AWS WAF logs record the CloudFront edge location IP addresses as the client IPs, not the original viewer IP addresses. This behavior is explicitly documented in the AWS Certified Security - Specialty Study Guide and the AWS WAF and CloudFront integration documentation. To preserve the original client IP address, CloudFront automatically adds the X-Forwarded- For HTTP header, which contains the IP address of the originating client followed by any proxy addresses involved in forwarding the request. AWS WAF logs include this header, making it the authoritative source for identifying true client IP addresses when CloudFront is used."},
  {"id": 116, "text": "한 회사의 보안 엔지니어가 회사 소유의 Amazon Simple Queue Service(Amazon SQS) 큐에 예기치 않은 사용자가 접근했다는 경고를 받았습니다. 회사의 모든 계정은 AWS Organizations 내의 조직에 속해 있습니다. 보안 엔지니어는 규정 위반을 최소화하고 AWS 외부 도구에 대한 투자를 줄이는 완화 솔루션을 구현해야 합니다. 보안 엔지니어는 이러한 요구 사항을 충족하기 위해 무엇을 해야 할까요?", "choices": ["조직 내 모든 VPC의 CIDR 블록에서만 인바운드 트래픽을 허용하는 보안 그룹을 생성합니다. 조직 내 모든 VPC의 모든 SQS 큐에 해당 보안 그룹을 연결합니다.", "조직 내 모든 VPC에서 네트워크 ACL을 조정하여 조직 내 모든 VPC의 CIDR 블록에서 들어오는 트래픽만 허용하도록 합니다. 조직 내 모든 VPC의 모든 서브넷에 네트워크 ACL을 연결합니다.", "조직 내 모든 VPC에 Amazon SQS용 인터페이스 VPC 엔드포인트를 생성합니다. aws를 설정합니다. SQS 정책의 VPC 엔드포인트 식별자에 SourceVpce 조건을 추가합니다. VPC 엔드포인트 정책에 aws:PrincipalOrgId 조건을 추가합니다.", "클라우드 액세스 보안 브로커(CASB)를 사용하여 관리 리소스 목록을 유지 관리합니다. 웹 프록시에서 해당 목록을 기준으로 API 및 콘솔 액세스를 확인하도록 CASB를 구성합니다."], "answer": "C", "multi": false, "explanation": "Amazon SQS is an AWS-managed service and does not operate within customer VPCs. Therefore, security groups and network ACLs cannot be used to control access to SQS, making options A and B invalid. According to AWS Certified Security - Specialty documentation, the recommended approach to securely access AWS services from within a VPC is through interface VPC endpoints (AWS PrivateLink). By creating interface VPC endpoints for Amazon SQS, the company ensures that traffic to SQS stays within the AWS network and does not traverse the public internet. Adding an SQS resource policy with the aws:SourceVpce condition restricts access so that only requests originating from the specified VPC endpoint are allowed. Additionally, using the aws:PrincipalOrgId condition ensures that only principals belonging to the same AWS Organization can access the queue. Option D introduces an external tool, increasing cost and compliance complexity, which directly violates the requirement to minimize investment outside AWS. AWS documentation clearly identifies VPC endpoints combined with IAM condition keys as a best practice for securing service access in multi-account environments."},
  {"id": 117, "text": "한 의료 회사가 아마존 S3 버킷에 100만 건 이상의 환자 기록을 저장하고 있습니다. 이 환자 기록에는 개인 식별 정보(PII)가 포함되어 있습니다. S3 버킷에는 수백 테라바이트의 데이터가 저장되어 있습니다. 보안 엔지니어가 Amazon GuardDuty 데이터 유출(S3)로 인해 발생한 경고를 받았습니다. /이상행동 발견. 보안 엔지니어는 공격자가 S3 버킷에 대한 s3:GetObject 권한이 있는 손상된 Amazon EC2 인스턴스에서 얻은 임시 자격 증명을 사용하고 있음을 확인했습니다. 공격자는 버킷의 콘텐츠를 다운로드하기 시작했습니다. 보안 엔지니어는 개발팀에 연락했습니다. 개발팀은 수정 사항을 구현하고 배포하는 데 4시간이 소요될 예정입니다. 보안 엔지니어는 공격자가 S3 버킷에서 더 많은 데이터를 다운로드하는 것을 막기 위해 즉각적인 조치를 취해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["EC2 인스턴스에 연결된 인스턴스 프로필과 관련된 임시 세션을 취소합니다.", "기존 보안 그룹을 규칙이 적용되지 않은 새 보안 그룹으로 교체하여 EC2 인스턴스를 격리합니다.", "S3 버킷에서 Amazon Macie를 활성화합니다. 개인 식별 정보(PII)에 대한 관리형 데이터 식별자를 구성합니다. Macie에서 플래그를 지정한 객체에 대해 S3 객체 잠금을 활성화합니다.", "S3 버킷 정책을 임시로 적용합니다. 개발팀이 취약점을 해결하는 동안 다운로드를 차단하기 위해 모든 주체에 대해 읽기 액세스를 거부하도록 정책을 구성합니다."], "answer": "A", "multi": false, "explanation": "Amazon GuardDuty Exfiltration:S3/AnomalousBehavior findings indicate that S3 data access patterns are consistent with data exfiltration. In this scenario, the attacker is using temporary credentials obtained from an EC2 instance profile, which are issued by AWS Security Token Service (STS). According to AWS Certified Security - Specialty documentation, the fastest and most targeted remediation is to revoke the temporary session credentials associated with the compromised instance profile. This can be accomplished by removing or modifying the IAM role permissions, detaching the instance profile, or stopping the instance, which immediately invalidates the temporary credentials and prevents further S3 access."},
  {"id": 118, "text": "한 회사가 매장 수를 늘리고 있습니다. 각 신규 매장이 문을 여는 날, 회사는 해당 매장 전용 웹 애플리케이션을 출시하려고 합니다. 각 매장의 애플리케이션은 비운영 환경과 운영 환경을 가지며, 각 환경은 별도의 AWS 계정에 배포될 예정입니다. 해당 회사는 AWS Organizations를 사용하고 있으며, 이러한 계정만을 위해 사용되는 OU(조직 단위)를 보유하고 있습니다. 이 회사는 대부분의 개발 작업을 외부 개발팀에 위탁합니다. 보안 엔지니어는 각 팀이 회사의 AWS 리소스 배포 계획을 준수하는지 확인해야 합니다. 또한 보안 엔지니어는 배포 계획에 대한 접근 권한을 필요한 개발자에게만 제한해야 합니다. 보안 엔지니어는 이미 해당 배포 계획을 구현하는 AWS CloudFormation 템플릿을 생성했습니다. 보안 엔지니어는 요구 사항을 가장 안전한 방식으로 충족하기 위해 다음에 무엇을 해야 할까요?", "choices": ["조직의 관리 계정에 AWS 서비스 카탈로그 포트폴리오를 생성합니다. CloudFormation 템플릿을 업로드합니다. 포트폴리오의 제품 목록에 템플릿을 추가합니다. 포트폴리오를 OU와 공유합니다.", "CloudFormation CLI를 사용하여 CloudFormation 템플릿에서 모듈을 생성합니다. CloudFormation 레지스트리에 모듈을 비공개 확장으로 등록합니다. 확장을 게시합니다. OU에서 확장에 대한 액세스를 허용하는 SCP를 생성합니다.", "조직의 관리 계정에 AWS 서비스 카탈로그 포트폴리오를 생성합니다. CloudFormation 템플릿을 업로드합니다. 포트폴리오의 제품 목록에 템플릿을 추가합니다. OU 계정의 사용자가 포트폴리오에 교차 계정으로 액세스할 수 있도록 허용하는 신뢰 정책이 있는 IAM 역할을 생성합니다. AWSServiceCatalogEndUserFullAccess 관리형 정책을 해당 역할에 연결합니다.", "CloudFormation CLI를 사용하여 CloudFormation 템플릿에서 모듈을 생성합니다. CloudFormation 레지스트리에 모듈을 비공개 확장으로 등록합니다. 확장을 게시합니다. 확장을 OU와 공유합니다."], "answer": "A", "multi": false, "explanation": "AWS Service Catalog is designed to allow organizations to create and manage approved sets of CloudFormation templates, known as products, and make them available to specific accounts or organizational units (OUs). According to the AWS Certified Security - Specialty Study Guide, Service Catalog is the preferred governance mechanism for enforcing standardized infrastructure deployments while maintaining strong access controls. By creating a Service Catalog portfolio in the management account and sharing it with a specific OU, the security engineer ensures that only accounts within that OU can deploy the approved CloudFormation template. This guarantees that third-party developers can deploy infrastructure only in accordance with the company's predefined deployment plan, without modifying or directly accessing the template itself."},
  {"id": 119, "text": "한 회사가 AWS에서 온라인 게임을 운영하고 있습니다. 플레이어가 게임에 가입하면 사용자 이름과 비밀번호가 아마존 오로라 데이터베이스에 저장됩니다. 사용자 수가 수십만 명에 달하면서 비밀번호 재설정 및 로그인 지원 요청이 폭증해 회사 고객 서비스팀에 부담이 되고 있습니다. 해당 회사는 플레이어들이 게임에 로그인할 수 있는 또 다른 방법을 제공하는 솔루션을 구현해야 합니다. 이 솔루션은 비밀번호 재설정 및 로그인 지원의 번거로움을 없애는 동시에 각 플레이어의 로그인 정보를 안전하게 보호해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["새로운 플레이어가 가입할 때 AWS Lambda 함수를 사용하여 IAM 액세스 키와 비밀 액세스 키를 자동으로 생성합니다.", "Aurora 데이터베이스에서 AWS Secrets Manager로 플레이어 자격 증명을 마이그레이션합니다.", "소셜 ID 공급자(IdP)와 같은 타사 ID 공급자(IdP)를 사용하여 게임 액세스를 연동하도록 Amazon Cognito 사용자 풀을 구성합니다. 게임의 인증 메커니즘을 Cognito로 마이그레이션합니다.", "신규 및 기존 플레이어에게 API 키를 발급하고 인증에 Amazon API Gateway를 사용합니다."], "answer": "C", "multi": false, "explanation": "Amazon Cognito is a fully managed identity service that provides user authentication, authorization, and user management for web and mobile applications. According to AWS Certified Security - Specialty documentation, Cognito user pools are specifically designed to offload authentication responsibilities from applications while maintaining strong security controls. By federating authentication with third-party identity providers (such as social IdPs), Cognito eliminates the need for the company to manage user passwords directly. This dramatically reduces password reset requests and customer service overhead, while also improving security through industry-standard authentication mechanisms, including MFA and token- based access."},
  {"id": 120, "text": "보안 엔지니어는 보안 사고 발생 시 회사의 Amazon EC2 인스턴스를 격리할 준비를 해야 합니다. 모든 EC2 인스턴스에는 AWS Systems Manager Agent(SSM Agent)가 배포되어 있습니다. 보안 엔지니어는 EC2 인스턴스에 포렌식 도구를 설치하고 업데이트하는 스크립트를 개발했습니다. 보안 사고 발생 시 EC2 인스턴스를 격리할 수 있는 솔루션은 무엇입니까?", "choices": ["AWS Config에서 SSM 에이전트 버전을 추적하는 규칙을 생성합니다.", "시스템 관리자 세션 관리자가 외부 IP 주소로부터의 모든 연결 요청을 거부하도록 구성합니다.", "스크립트를 Amazon S3에 저장하고 인스턴스 프로필에 읽기 권한을 부여합니다.", "SSM 에이전트가 스크립트를 미리 정의된 Systems Manager 실행 명령 문서로 실행할 수 있도록 IAM 권한을 구성합니다."], "answer": "D", "multi": false, "explanation": "AWS Systems Manager Run Command enables security engineers to remotely and securely execute scripts on EC2 instances without requiring SSH or inbound network access. According to AWS Certified Security - Specialty incident response guidance, Run Command is a foundational tool for instance quarantine and forensic preparation. By configuring IAM permissions that allow the SSM Agent to execute a predefined Run Command document, the security engineer can rapidly deploy forensic tools, disable services, or modify system configurations across affected EC2 instances during an incident. This approach aligns with AWS best practices for containment and evidence preservation, while maintaining auditability through Systems Manager logs."},
  {"id": 121, "text": "한 회사가 AWS 계정에서 워크로드를 실행하고 있습니다. 보안 엔지니어가 Amazon GuardDuty에서 비정상적인 활동을 발견했습니다. 보안 엔지니어는 특정 IAM 역할을 조사하고 조사 보고서를 생성하려고 합니다. 보고서에는 비정상적인 동작 및 침해 징후에 대한 세부 정보가 포함되어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon Detective를 사용하여 IAM 역할에 대한 조사를 수행합니다.", "AWS Audit Manager를 사용하여 평가를 생성합니다. IAM 역할을 지정합니다. 평가 보고서를 실행합니다.", "Amazon Inspector를 사용하여 평가를 생성합니다. IAM 역할을 지정합니다. 평가 보고서를 실행합니다.", "Amazon Inspector를 사용하여 IAM 역할에 대한 온디맨드 스캔을 실행합니다."], "answer": "A", "multi": false, "explanation": "Amazon Detective is a purpose-built AWS service designed to analyze, investigate, and visualize security data to help identify the root cause of suspicious or malicious activity. According to the AWS Certified Security - Specialty Official Study Guide, Amazon Detective directly integrates with Amazon GuardDuty findings, AWS CloudTrail logs, Amazon VPC Flow Logs, and Amazon EKS audit logs to automatically create behavior graphs and timelines. When GuardDuty generates findings related to anomalous activity, Amazon Detective enables security engineers to pivot directly to an investigation focused on a specific IAM role, user, or resource. Detective automatically correlates historical activity, identifies deviations from baseline behavior, and highlights indicators of compromise, such as unusual API calls, credential misuse, or suspicious network activity."},
  {"id": 122, "text": "회사의 웹 애플리케이션은 Auto Scaling 그룹의 Application Load Balancer(ALB) 뒤에서 실행되는 Amazon EC2 인스턴스에 호스팅됩니다. AWS WAF 웹 ACL이 해당 ALB와 연결되어 있습니다. AWS CloudTrail이 활성화되어 있으며 로그는 Amazon S3 및 Amazon CloudWatch Logs에 저장됩니다. 운영팀은 일부 EC2 인스턴스가 무작위로 재부팅되는 현상을 관찰했습니다. 재부팅 후 해당 인스턴스의 모든 액세스 로그가 삭제되었습니다. 조사 결과, 각 재부팅은 new-user- creation.php 파일에서 PHP 오류가 발생한 직후에 일어나는 것으로 확인되었습니다. 운영팀은 회사가 공격을 받고 있는지 여부를 판단하기 위해 로그 정보를 확인해야 합니다. 향후 유사한 사례 발생 시 공격자의 IP 주소를 식별할 수 있는 일련의 조치는 무엇입니까?", "choices": ["ALB가 위치한 서브넷에서 VPC 흐름 로그를 구성하고 데이터를 CloudWatch로 스트리밍합니다. CloudWatch에서 new-user-creation.php 항목을 검색하세요.", "ALB에서 CloudWatch 에이전트를 구성하고 애플리케이션 로그를 CloudWatch Logs로 전송합니다.", "ALB를 구성하여 액세스 로그를 Amazon OpenSearch Service 클러스터로 내보내고 new- user-creation.php 항목을 검색합니다.", "웹 ACL을 구성하여 로그를 Amazon Data Firehose로 전송하고, Amazon Data Firehose는 로그를 S3 버킷에 저장합니다. Amazon Athena를 사용하여 로그를 쿼리하고 new-user- creation.php 항목을 찾습니다."], "answer": "D", "multi": false, "explanation": "AWS WAF logs capture detailed request-level information, including source IP address, request URI, headers, and rule evaluation results. According to the AWS Certified Security - Specialty documentation, AWS WAF logging is a critical detection control when application- level attacks are suspected, especially when host-based logs are unreliable or can be erased by attackers. By configuring the AWS WAF web ACL to send logs to Amazon Data Firehose, the company ensures that all future requests are centrally captured and delivered to a durable storage service such as Amazon S3. Using Amazon Athena, the security team can query these logs to identify requests targeting specific application paths such as new-user-creation.php and extract the originating client IP addresses."},
  {"id": 123, "text": "한 회사의 보안팀은 AWS에서 DoS 공격 관련 악용 보고에 대한 이메일 알림을 받기를 원합니다. 보안 엔지니어는 AWS가 해당 계정에 대해 전송하는 모든 악용 보고에 대해 거의 실시간으로 알림을 제공하는 솔루션을 구현해야 합니다. 보안 엔지니어는 이미 Amazon Simple Notification Service(Amazon SNS) 토픽을 생성하고 보안팀의 이메일 주소를 해당 토픽에 구독했습니다. 보안 엔지니어는 이러한 요구 사항을 충족하기 위해 다음에 무엇을 해야 할까요?", "choices": ["AWS Trusted Advisor API와 예약된 Lambda 함수를 사용하여 AWS_ABUSE_DOS_REPORT 알림을 감지합니다.", "AWS Health를 사용하고 AWS_ABUSE_DOS_REPORT에 대한 특정 이벤트를 식별하는 Amazon EventBridge 규칙을 생성합니다. 규칙 작업이 SNS 토픽에 메시지를 게시하도록 구성합니다.", "AWS 지원 API와 예약된 Lambda 함수를 사용하여 악용 신고 사례를 감지합니다.", "AWS CloudTrail 로그와 메트릭 필터를 사용하여 AWS_ABUSE_DOS_REPORT 이벤트를 감지합니다."], "answer": "B", "multi": false, "explanation": "AWS Health provides real-time visibility into events that affect AWS accounts, including abuse notifications such as AWS_ABUSE_DOS_REPORT. According to the AWS Certified Security - Specialty Study Guide, AWS Health events are natively integrated with Amazon EventBridge, enabling automated, near-real-time responses without polling or custom code. By creating an EventBridge rule that listens for AWS Health events related to abuse reports and configuring the rule to publish messages to an SNS topic, the security engineer ensures immediate notification to the security team whenever AWS issues a DoS-related abuse report for the account."},
  {"id": 125, "text": "한 회사는 단일 AWS 계정에 대한 Amazon Aurora MySQL 데이터베이스에 대해 다음과 같은 보안 정책을 가지고 있습니다. * 데이터베이스 저장소는 저장 시 암호화되어야 합니다. * 삭제 방지 기능이 활성화되어 있어야 합니다. * 데이터베이스는 공개적으로 접근할 수 없어야 합니다. * 데이터베이스 감사 로그는 Amazon CloudWatch Logs에 게시되어야 합니다. 보안 엔지니어는 Aurora MySQL 리소스가 이 정책을 준수하는지 지속적으로 모니터링하는 솔루션을 구현해야 합니다. 이 솔루션은 언제든지 정책의 각 부분에 대한 데이터베이스의 준수 상태를 표시할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Audit Manager를 활성화합니다. 보안 요구 사항에 맞는 사용자 지정 프레임워크를 사용하도록 Audit Manager를 구성합니다. 규정 준수 상태를 확인하려면 평가 보고서를 생성합니다.", "AWS Config를 활성화합니다. 모든 Aurora MySQL 리소스에 대한 보안 요구 사항을 모니터링하는 AWS Config 관리형 규칙을 구현합니다. AWS Config 대시보드에서 규정 준수 상태를 확인합니다.", "AWS Security Hub를 활성화합니다. 보안 요구 사항을 포함하는 구성 정책을 생성합니다. 생성한 구성 정책을 모든 Aurora MySQL 리소스에 적용합니다. Security Hub에서 규정 준수 상태를 확인합니다.", "Aurora MySQL 리소스가 생성되거나 수정될 때 실행되는 Amazon EventBridge 규칙을 생성합니다. 보안 요구 사항을 확인하고 규정 준수 상태를 CloudWatch 사용자 지정 메트릭으로 전송하는 AWS Lambda 함수를 생성합니다."], "answer": "B", "multi": false, "explanation": "AWS Config is a fully managed service that provides continuous monitoring and evaluation of AWS resource configurations against desired configuration baselines. According to the AWS Certified Security - Specialty Official Study Guide, AWS Config is the primary service used to track configuration changes, evaluate compliance in near real time, and display compliance states for individual AWS resources. AWS Config provides managed rules that directly map to the listed Aurora MySQL security requirements, including encryption at rest, public accessibility, deletion protection, and log exports to CloudWatch Logs. These managed rules continuously evaluate resources and mark them as compliant or noncompliant whenever a configuration change occurs. The AWS Config dashboard enables security engineers to view per-resource and per-rule compliance states at any point in time, satisfying the requirement to display compliance status for each part of the policy."},
  {"id": 126, "text": "한 회사가 네트워크 로드 밸런싱(NLB)의 대상으로 등록된 Amazon EC2 인스턴스를 운영하고 있습니다. 해당 NLB는 보안 그룹과 연결되어 있으며, 이 보안 그룹은 특정 포트를 통해 들어오는 TCP 트래픽을 허용합니다. 10.0.0.0/23에서 22개. 이 회사는 NLB를 동일한 네트워크 ACL 및 라우팅 테이블을 공유하는 두 개의 서브넷에 매핑합니다. 라우팅 테이블에는 0.0.0.0/0에서 인터넷 게이트웨이로 가는 경로가 있습니다. 네트워크 ACL에는 우선순위가 높은 인바운드 규칙이 하나 있습니다. 20은 10.0.0.0/16에서 포트 22로 TCP 트래픽을 허용합니다. 보안 엔지니어는 EC2 인스턴스에 무단 SSH 세션이 있다는 경고를 받았습니다. 무단 세션은 10.0.1.5에서 시작되었습니다. 회사 사고 대응 절차에 따라 무단 SSH 세션은 즉시 차단해야 합니다. 인스턴스는 계속 실행되어야 하며, 메모리도 손상되지 않아야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS 관리 콘솔 또는 AWS CLI를 사용하여 EC2 인스턴스를 다시 시작합니다.", "10.0.1.5에서 오는 포트 22의 TCP 트래픽을 거부하기 위해 네트워크 ACL에 우선순위 10의 새 인바운드 규칙을 추가합니다.", "10.0.0.0/16에서 포트 22로 들어오는 TCP 트래픽을 허용하는 보안 그룹 규칙을 제거합니다.", "인터넷 게이트웨이로 가는 경로를 제거하도록 라우팅 테이블을 업데이트합니다."], "answer": "B", "multi": false, "explanation": "Network ACLs are stateless and are evaluated in order based on rule number, with lower rule numbers taking precedence. According to AWS Certified Security - Specialty incident response guidance, network ACLs can be used to immediately block traffic at the subnet level without restarting instances or modifying their runtime state. By adding a deny rule with a lower priority number (10) that explicitly denies TCP traffic on port 22 from the offending IP address (10.0.1.5), the unauthorized SSH session is immediately interrupted. This approach satisfies the requirement to keep the instance running and to preserve memory for forensic analysis."},
  {"id": 127, "text": "한 회사가 미국 동부 1(us-east-1) 리전에 암호화된 Amazon Aurora DB 클러스터를 보유하고 있습니다. 이 DB 클러스터는 AWS Key Management Service(AWS KMS) 고객 관리형 키로 암호화되어 있습니다. 규정 준수 요건을 충족하기 위해 회사는 DB 스냅샷을 미국 서부 1(us- west-1) 리전으로 복사해야 합니다. 그러나 스냅샷을 us-west-1 리전으로 복사하려고 하면 원본 데이터베이스를 암호화하는 데 사용된 키에 접근할 수 없습니다. 회사에서 us-west-1에 스냅샷을 적절한 암호화 방식으로 설정하려면 어떻게 해야 할까요?", "choices": ["AWS Secrets Manager를 사용하여 고객 관리 키를 us-west-1에 비밀 키로 저장합니다. 이 비밀 키를 사용하여 us-west-1의 스냅샷을 암호화합니다.", "us-west-1에 새 고객 관리 키를 생성합니다. 이 새 키를 사용하여 us-west-1의 스냅샷을 암호화합니다. 1.", "us-east-1에 있는 고객 관리 키에 대한 액세스를 허용하는 IAM 정책을 생성합니다. arn:aws를 지정합니다. kms:us-west-1:*를 주요 주소로 합니다.", "us-east-1에 있는 고객 관리 키에 대한 액세스를 허용하는 IAM 정책을 생성합니다. 주체로 arn:aws:rds:us-west-1:*를 지정합니다."], "answer": "B", "multi": false, "explanation": "AWS Key Management Service (KMS) customer managed keys are regional resources. According to the AWS Certified Security - Specialty Official Study Guide and KMS documentation, a KMS key created in one AWS Region cannot be used directly in another Region. When copying an encrypted Amazon Aurora DB snapshot across Regions, the destination Region must have access to a KMS key that exists in that Region. Because the original KMS key resides in us-east-1, it cannot be accessed or referenced in us- west-1. The correct and supported approach is to create a new customer managed KMS key in us-west-1 and specify that key when performing the cross-Region snapshot copy. Amazon RDS automatically decrypts the snapshot using the source Region key and re- encrypts it using the destination Region key during the copy process."},
  {"id": 128, "text": "한 회사가 애플리케이션을 실행하는 대규모 Amazon Linux 2 Amazon EC2 인스턴스를 보유하고 있습니다. 해당 애플리케이션은 민감한 데이터를 처리하며 다음과 같은 규정 준수 요구 사항을 충족해야 합니다. * EC2 인스턴스에 대한 원격 액세스 관리 포트는 내부 또는 외부로 노출될 수 없습니다. * 모든 원격 세션 활동은 감사 로그에 기록되어야 합니다. * EC2 인스턴스에 대한 모든 원격 액세스는 AWS IAM Identity Center를 통해 인증 및 권한 부여를 받아야 합니다. 회사 DevOps 팀은 문제를 해결하기 위해 가끔 EC2 인스턴스 중 하나에 연결해야 합니다. 어떤 솔루션이 규정 준수 요건을 충족하면서 EC2 인스턴스에 원격으로 액세스할 수 있도록 해줄까요?", "choices": ["계정 수준에서 EC2 시리얼 콘솔에 대한 액세스 권한을 부여합니다.", "EC2 인스턴스 연결을 활성화하고 보안 그룹 규칙을 구성합니다.", "AWS Systems Manager에 대한 액세스 권한을 부여하는 EC2 인스턴스 역할을 할당합니다. Systems Manager 세션 관리자에 대한 액세스 권한을 부여하는 IAM 정책을 생성합니다. 해당 정책을 DevOps 팀의 IAM 역할에 할당합니다.", "AWS Systems Manager Automation 런북을 사용하여 원격 액세스 포트를 엽니다."], "answer": "C", "multi": false, "explanation": "AWS Systems Manager Session Manager provides secure, auditable, and portless access to EC2 instances. According to the AWS Certified Security - Specialty Study Guide, Session Manager allows administrators to connect to instances without opening inbound SSH or RDP ports, fully satisfying strict compliance requirements. Session Manager integrates directly with AWS IAM Identity Center, ensuring that all access is authenticated and authorized using centralized identity management. Additionally, Session Manager automatically records session activity and can send logs to Amazon CloudWatch Logs or Amazon S3, providing a complete audit trail of all commands executed during a session."},
  {"id": 129, "text": "한 회사가 AWS Fargate를 사용하는 Amazon Elastic Container Service(Amazon ECS) 클러스터에서 컨테이너화된 애플리케이션을 실행하고 있습니다. 해당 애플리케이션은 여러 개의 ECS 서비스로 실행됩니다. ECS 서비스는 인터넷에 연결된 애플리케이션 로드 밸런서(ALB)의 개별 대상 그룹에 속합니다. ALB는 Amazon CloudFront 배포의 오리진 서버입니다. AWS WAF 웹 ACL이 CloudFront 배포와 연결되어 있습니다. 웹 클라이언트는 CloudFront 배포를 통해 ECS 서비스에 액세스합니다. 회사는 웹 클라이언트가 웹 ACL을 우회하여 ALB에 직접 액세스할 수 있다는 사실을 알게 되었습니다. 웹 클라이언트가 ALB에 직접 접근하는 것을 방지할 수 있는 해결책은 무엇입니까?", "choices": ["AWS PrivateLink 엔드포인트를 생성하고 이를 CloudFront 오리진으로 설정합니다.", "새 내부 ALB를 생성하고 인터넷 연결 ALB를 삭제합니다.", "ALB 리스너 규칙을 수정하여 CloudFront IP 범위만 허용합니다.", "CloudFront에 사용자 지정 X-Shared-Secret 헤더를 추가하고 ALB 리스너 규칙을 구성하여 헤더 값이 일치하는 경우에만 요청을 허용합니다."], "answer": "D", "multi": false, "explanation": "When an internet-facing ALB is used as a CloudFront origin, it remains directly accessible unless additional access controls are enforced. According to AWS Certified Security - Specialty guidance, CloudFront IP allow lists alone are insufficient, because CloudFront IP ranges change and are not guaranteed to be exclusive. The recommended and most secure approach is to configure CloudFront to send a custom origin header (such as X-Shared-Secret) with a secret value on every request to the origin. The ALB listener rules are then configured to forward traffic only when the header exists and matches the expected value. Requests that attempt to bypass CloudFront will not include this header and will be denied."},
  {"id": 130, "text": "보안 엔지니어가 프라이빗 트래픽과 퍼블릭 트래픽을 분리하기 위해 VPC를 설계했습니다. 이 VPC에는 두 개의 가용 영역이 포함되어 있습니다. 보안 엔지니어는 각 가용 영역에 하나의 프라이빗 서브넷과 하나의 퍼블릭 서브넷을 프로비저닝했습니다. 또한, 환경에서 사용할 라우팅 테이블 세 개를 생성했습니다. 하나는 퍼블릭 서브넷용이고, 나머지 두 개는 프라이빗 서브넷용입니다(각 가용 영역의 프라이빗 서브넷에 하나씩). 보안 엔지니어는 네 개의 서브넷 모두 VPC에 연결된 인터넷 게이트웨이를 통해 트래픽을 내보내려고 시도하고 있음을 발견했습니다. 보안 엔지니어는 이 시나리오를 해결하기 위해 어떤 조치들을 조합하여 취해야 할까요? (두 가지를 선택하세요.)", "choices": ["각 가용 영역의 공용 서브넷에 NAT 게이트웨이가 프로비저닝되었는지 확인합니다.", "각 가용 영역의 프라이빗 서브넷에 NAT 게이트웨이가 프로비저닝되었는지 확인합니다.", "각 공용 서브넷과 연결된 라우팅 테이블을 수정합니다. VPC CIDR 범위에 대한 로컬 대상용 새 경로를 생성합니다.", "각 프라이빗 서브넷과 연결된 라우팅 테이블을 수정합니다. 대상 0.0.0.0/0에 대한 새 경로를 생성합니다. 경로의 대상과 동일한 가용 영역의 퍼블릭 서브넷에 있는 NAT 게이트웨이를 지정합니다.", "각 프라이빗 서브넷과 연결된 라우팅 테이블을 수정합니다. 대상 0.0.0.0/0에 대한 새 경로를 생성합니다. 경로의 대상으로 인터넷 게이트웨이를 지정합니다."], "answer": "A,D", "multi": true, "explanation": "In a properly segmented VPC architecture, public subnets route internet-bound traffic to an internet gateway, while private subnets route outbound internet traffic through a NAT gateway that resides in a public subnet. According to the AWS Certified Security - Specialty Official Study Guide and Amazon VPC documentation, private subnets must never have a direct route to an internet gateway. The issue described indicates that private subnets are incorrectly routing traffic directly to the internet gateway. To remediate this, a NAT gateway must be provisioned in each public subnet to ensure high availability across Availability Zones. This satisfies the requirement that private resources can initiate outbound connections without being directly reachable from the internet. Next, the route tables associated with the private subnets must be updated so that the default route (0.0.0.0/0) points to the NAT gateway in the same Availability Zone. This ensures proper traffic flow and prevents cross-AZ dependencies."},
  {"id": 131, "text": "보안 엔지니어가 AWS 계정에 영향을 미치는 사고에 대응하고 있습니다. 해당 계정의 ID는 다음과 같습니다. 123456789012. 이 공격으로 인해 여러 AWS 리전에 분산된 워크로드가 생성되었습니다. 보안 엔지니어는 공격을 차단하고 영향을 받은 모든 리전에서 모든 컴퓨팅 및 스토리지 리소스를 제거했습니다. 그러나 공격자는 AWS KMS 키도 생성했습니다. 해당 KMS 키의 키 정책은 IAM 주체에 kms:* 권한을 명시적으로 허용합니다. 해당 키는 전날 삭제될 예정이었습니다. 그러나 키는 여전히 활성화되어 사용 가능합니다. 해당 키의 ARN은 arn:aws:kms:us-east-2:123456789012:key/mrk- 0bb0212cd9864fdea0dcamzo26efb5670입니다. 보안 엔지니어는 가능한 한 빨리 키를 삭제해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["계정 루트 사용자 자격 증명을 사용하여 계정에 로그인합니다. 7일의 대기 기간을 두고 KMS 키 삭제 요청을 다시 제출합니다.", "KMS 키 ID가 존재하는 다른 지역을 식별하고 7일 후에 키를 삭제하도록 예약합니다.", "KMS 키 ARN에 대해 kms:* 권한을 허용하도록 IAM 주체를 업데이트합니다. 7일의 대기 기간을 두고 KMS 키 삭제 요청을 다시 발행합니다.", "KMS 키를 비활성화합니다. 30일 후에 KMS 키 삭제 요청을 다시 제출합니다."], "answer": "A", "multi": false, "explanation": "AWS KMS enforces a mandatory minimum waiting period of 7 days before a customer managed key can be deleted. According to AWS Certified Security - Specialty incident response guidance, no method exists to immediately delete a KMS key. The fastest possible deletion is achieved by scheduling deletion with the minimum 7-day waiting period. In this scenario, although deletion was previously scheduled, the key remains enabled and usable. The most authoritative and reliable method to regain control and reissue deletion immediately is to use the AWS account root user, which has implicit permissions to manage KMS keys regardless of compromised IAM principals."},
  {"id": 132, "text": "한 회사가 AWS를 사용하여 아마존 S3 버킷에 저장된 데이터에 대한 장시간 분석 프로세스를 실행하고 있습니다. 이 프로세스는 Auto Scaling 그룹에 속한 Amazon EC2 인스턴스 플릿에서 실행됩니다. EC2 인스턴스는 인터넷에 접속할 수 없는 프라이빗 서브넷에 배포됩니다. EC2 인스턴스는 기본 액세스 정책이 적용된 S3 게이트웨이 엔드포인트를 통해 Amazon S3에 액세스합니다. 각 EC2 인스턴스는 필수 S3 버킷에 대해서만 s3:GetObject 및 s3:PutObject 권한을 허용하는 인스턴스 프로필 역할을 사용합니다. 회사에서는 하나 이상의 EC2 인스턴스가 손상되어 회사 AWS 조직 외부의 S3 버킷으로 데이터가 유출되고 있음을 알게 되었습니다. 처리 작업은 계속 진행되어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["S3 게이트웨이 엔드포인트의 정책을 업데이트하여 aws:ResourceOrgId 및 aws: 조건이 모두 충족될 경우에만 S3 작업을 허용합니다. PrincipalOrgId는 회사의 조직과 일치합니다.", "aws:ResourceOrgId를 필수 항목으로 요구하도록 인스턴스 프로필 역할 정책을 업데이트합니다.", "포트 443의 아웃바운드 트래픽을 차단하는 네트워크 ACL 규칙을 추가합니다.", "조직 조건 키를 사용하여 S3 작업을 제한하는 SCP를 적용합니다."], "answer": "A", "multi": false, "explanation": "Amazon S3 gateway endpoints support endpoint policies that can restrict which S3 resources are accessible through the endpoint. According to AWS Certified Security - Specialty documentation, endpoint policies are evaluated in addition to IAM policies and are ideal for enforcing data exfiltration controls without breaking legitimate workloads. By updating the S3 gateway endpoint policy to require both aws:ResourceOrgId and aws:PrincipalOrgId to match the company's AWS Organization, the security engineer ensures that EC2 instances can access only S3 buckets that belong to the organization. This immediately blocks exfiltration to external S3 buckets while allowing legitimate internal data access to continue uninterrupted."},
  {"id": 133, "text": "한 회사의 데이터 과학자들이 Amazon SageMaker를 사용하여 인공지능 및 머신러닝(AI/ML) 학습 모델을 구축하려고 합니다. 이 학습 모델은 Amazon S3 버킷에 있는 대규모 데이터 세트를 사용할 예정입니다. 해당 데이터 세트에는 민감한 정보가 포함되어 있습니다. 데이터 과학자들은 평균적으로 모델 학습에 30일이 소요됩니다. S3 버킷은 적절하게 보안 설정되어 있습니다. 회사 데이터 보존 정책에 따르면 45일 이상 된 모든 데이터는 S3 버킷에서 삭제해야 합니다. 보안 엔지니어는 이러한 데이터 보존 정책을 시행하기 위해 어떤 조치를 취해야 할까요?", "choices": ["S3 버킷에 45일 후 객체를 삭제하는 S3 수명 주기 규칙을 구성합니다.", "S3 객체의 최종 수정일을 확인하고 45일보다 오래된 객체를 삭제하는 AWS Lambda 함수를 생성합니다. 각 PutObject 작업에 대해 Lambda 함수를 호출하는 S3 이벤트 알림을 생성합니다.", "S3 객체의 최종 수정일을 확인하고 45일보다 오래된 객체를 삭제하는 AWS Lambda 함수를 생성합니다. 매달 Lambda 함수를 호출하는 Amazon EventBridge 규칙을 생성합니다.", "S3 버킷에서 S3 인텔리전트 티어링을 구성하여 객체를 다른 스토리지 클래스로 자동으로 전환합니다."], "answer": "A", "multi": false, "explanation": "Amazon S3 Lifecycle rules provide a native, fully managed mechanism to automatically transition or delete objects based on their age. According to the AWS Certified Security - Specialty Official Study Guide, S3 Lifecycle policies are the recommended and most secure method for enforcing data retention requirements because they operate automatically, consistently, and without custom code. By configuring a lifecycle rule to delete objects after 45 days, the company ensures that sensitive datasets are retained long enough to support the 30-day model training process while remaining compliant with the data retention policy. Lifecycle rules are enforced by Amazon S3 itself and apply uniformly to all objects in the bucket or to objects that match specific prefixes or tags."},
  {"id": 134, "text": "한 회사가 여러 AWS CloudFormation 스택을 사용하여 애플리케이션 제품군의 배포를 처리합니다. 회사 애플리케이션 개발팀의 팀장은 일부 팀원들이 스택을 배포하려고 할 때 권한 오류로 인해 배포가 실패하는 것을 발견했습니다. 그러나 다른 팀원들은 스택을 성공적으로 배포할 수 있었습니다. 팀 구성원들은 특정 권한 집합을 가진 역할을 부여받아 계정에 접근합니다. 모든 팀 구성원은 스택에 대한 작업을 수행할 수 있는 권한을 가지고 있습니다. 스택의 일관된 배포를 가장 안전하게 보장하는 단계 조합은 무엇입니까? (세 가지를 선택하십시오.)", "choices": ["필요한 권한이 필요한 각 서비스를 포함하는 복합 주체를 가진 서비스 역할을 생성합니다.", "서비스 주체로 cloudformation.amazonaws.com을 포함하는 서비스 역할을 생성합니다.", "각 CloudFormation 스택 ARN을 참조하는 정책을 추가합니다.", "권한이 필요한 각 AWS 서비스의 ARN을 참조하는 정책을 추가합니다.", "각 스택이 서비스 역할을 사용하도록 업데이트합니다.", "각 멤버 역할에 정책을 추가하여 서비스 역할에 대해 iam:PassRole 작업을 허용합니다."], "answer": "B,E,F", "multi": true, "explanation": "AWS CloudFormation supports the use of a service role, which allows CloudFormation to assume a dedicated IAM role to create and manage resources on behalf of users. According to the AWS Certified Security - Specialty Study Guide, using a service role is the most secure and consistent way to ensure predictable stack deployments when users have varying permission sets. By creating a service role with cloudformation.amazonaws.com as the trusted service principal (Option B), CloudFormation--not individual users--assumes responsibility for resource creation. Updating each stack to explicitly use this service role (Option E) ensures that all deployments use the same permission set, eliminating inconsistencies. Granting the team members permission to pass the service role via iam:PassRole (Option F) is required so that CloudFormation can assume the role during stack operations. This approach adheres to the principle of least privilege and prevents users from gaining direct access to elevated permissions."},
  {"id": 135, "text": "한 기업에서 AWS 계정의 보안 취약점에 대한 근본 원인을 파악할 수 있어야 합니다. 해당 기업은 VPC Flow Logs, Amazon GuardDuty 및 AWS CloudTrail을 활성화했습니다. 기업은 보안 취약점과 관련된 모든 IAM 역할을 조사하고 그 결과를 시각화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon Detective를 사용하여 IAM 역할에 대한 조사를 실행하고 결과를 시각화할 수 있습니다.", "Amazon Inspector를 사용하여 IAM 역할에 대한 조사를 실행하고 결과를 시각화합니다.", "GuardDuty 결과를 Amazon S3로 내보내고 Amazon Athena로 분석하세요.", "AWS Security Hub를 활성화하고 사용자 지정 작업을 사용하여 IAM 역할을 조사합니다."], "answer": "A", "multi": false, "explanation": "Amazon Detective is a managed service designed specifically to investigate and analyze security findings by automatically correlating data from Amazon GuardDuty, AWS CloudTrail, and VPC Flow Logs. According to the AWS Certified Security - Specialty Official Study Guide, Detective enables security teams to identify root causes, anomalous behavior, and indicators of compromise through interactive visualizations. Amazon Detective allows investigators to pivot directly to IAM roles, users, and resources that are involved in GuardDuty findings. Detective builds behavior graphs and timelines that show API activity, network traffic, and historical context, making it easier to understand how and why a security incident occurred."},
  {"id": 136, "text": "한 회사가 Amazon Elastic Kubernetes Service(Amazon EKS)와 Amazon Aurora를 사용하여 AWS의 Kubernetes 컨테이너에서 마이크로서비스 아키텍처를 운영하고 있습니다. 이 회사는 AWS Organizations에 조직을 구성하여 다양한 마이크로서비스를 호스팅하는 수백 개의 AWS 계정을 관리하고 있습니다. 해당 회사는 모든 계정의 모든 AWS 리소스에서 발생하는 로그를 모니터링할 수 있는 솔루션을 구현해야 합니다. 해당 솔루션에는 보안 관련 문제를 자동으로 감지하는 기능이 포함되어야 합니다. 어떤 솔루션이 최소한의 운영 노력으로 이러한 요구 사항을 충족할까요?", "choices": ["조직의 관리 계정에 Amazon GuardDuty 관리자 계정을 지정합니다. 모든 계정에 GuardDuty를 활성화하십시오. GuardDuty 관리자 계정에서 EKS 보호 및 RDS 보호를 활성화하십시오.", "모니터링 계정을 지정합니다. 모든 계정에서 Amazon CloudWatch 로그를 공유합니다. Amazon Inspector를 사용하여 로그를 평가합니다.", "CloudTrail 로그를 Amazon S3에 중앙 집중화하고 Amazon Athena로 분석합니다.", "CloudWatch 로그를 Amazon Kinesis로 스트리밍하고 사용자 지정 AWS Lambda 함수로 분석합니다."], "answer": "A", "multi": false, "explanation": "Amazon GuardDuty is a fully managed, organization-aware threat detection service that continuously analyzes AWS logs such as CloudTrail events, VPC Flow Logs, DNS logs, EKS audit logs, and RDS activity. According to the AWS Certified Security - Specialty Official Study Guide, GuardDuty is designed to operate at scale across AWS Organizations with minimal operational overhead. By designating a GuardDuty administrator account in the organization's management account and enabling GuardDuty organization-wide, the company can automatically enable threat detection across hundreds of AWS accounts. Enabling EKS Protection allows GuardDuty to analyze Kubernetes audit logs for suspicious activity, while RDS Protection provides anomaly detection for Amazon Aurora databases."},
  {"id": 137, "text": "한 회사가 자사 공개 웹 애플리케이션의 트래픽 증가를 경험한 후 AWS WAF를 사용하기 시작했습니다. 보안 엔지니어는 트래픽 증가가 애플리케이션 계층 공격 때문인지 판단해야 합니다. 이를 위해 AWS WAF 트래픽을 분석할 수 있는 솔루션이 필요합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["AWS WAF 로그를 AWS CloudTrail로 전송하고 OpenSearch로 분석합니다.", "AWS WAF 로그를 Amazon S3로 전송하고 OpenSearch를 사용하여 직접 쿼리합니다.", "AWS WAF 로그를 Amazon S3로 전송합니다. 파티션 프로젝션을 사용하여 Amazon Athena 테이블을 생성합니다. Athena를 사용하여 로그를 쿼리합니다.", "AWS WAF 로그를 AWS CloudTrail로 전송하고 Amazon Athena로 분석합니다."], "answer": "C", "multi": false, "explanation": "AWS WAF supports logging of detailed HTTP request information, including source IP addresses, request URIs, headers, and rule evaluation results. According to the AWS Certified Security - Specialty documentation, Amazon S3 combined with Amazon Athena is the recommended and most cost-effective solution for ad hoc and forensic analysis of AWS WAF logs. By configuring AWS WAF to deliver logs to Amazon S3 and using Athena with partition projection, the security engineer can efficiently query large volumes of log data without maintaining partitions manually. This enables rapid identification of application-layer attacks such as SQL injection, cross-site scripting, and bot activity."},
  {"id": 138, "text": "한 회사가 Auto Scaling 그룹에 속한 Amazon EC2 인스턴스 플릿에서 웹 애플리케이션을 운영하고 있습니다. 해당 EC2 인스턴스는 다른 워크로드와 동일한 VPC 서브넷에 있습니다. 보안 엔지니어가 Amazon GuardDuty를 배포하고 AWS Security Hub와 통합했습니다. 이 엔지니어는 비정상적인 트래픽 패턴을 감지하고 대응하는 자동화된 솔루션을 구현해야 합니다. 해당 솔루션은 초기 사고 대응에 대한 AWS 모범 사례를 준수해야 하며 웹 애플리케이션에 대한 중단을 최소화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Lambda를 사용하여 인스턴스 프로필 액세스 키를 비활성화합니다.", "영향을 받는 인스턴스를 Auto Scaling 그룹에서 제거하고 AWS Lambda를 사용하여 제한된 보안 그룹으로 격리합니다.", "감지된 트래픽 소스를 차단하도록 네트워크 ACL을 업데이트합니다.", "GuardDuty 결과를 Amazon SNS로 전송하여 이메일 알림을 받도록 합니다."], "answer": "B", "multi": false, "explanation": "AWS incident response best practices emphasize containment with minimal blast radius while preserving business continuity. According to the AWS Certified Security - Specialty Official Study Guide, isolating a compromised resource while allowing the application to continue operating is the recommended initial response. By creating an Amazon EventBridge rule that reacts to GuardDuty anomalous traffic findings and invokes an AWS Lambda function, the security engineer can automatically remove the affected EC2 instance from the Auto Scaling group and attach a restricted security group. This immediately stops malicious activity while allowing Auto Scaling to replace the instance and keep the application available."},
  {"id": 139, "text": "한 회사의 보안 엔지니어가 사고 대응 계획의 일환으로 Amazon EC2 인스턴스에 대한 격리 절차를 설계하고 있습니다. 보안 엔지니어는 회사 포렌식 팀의 트래픽을 제외한 모든 트래픽을 차단하기 위해 특정 인스턴스를 격리해야 합니다. 회사의 각 EC2 인스턴스는 고유한 보안 그룹에 속해 있습니다. EC2 인스턴스는 VPC의 서브넷에 배포되며, 하나의 서브넷에는 여러 인스턴스가 포함될 수 있습니다. 보안 엔지니어는 EC2 격리 ​절차를 테스트하기 위해 대상 인스턴스에 SSH 세션을 엽니다. 이 절차는 공격자가 대상 인스턴스에 접근하는 상황을 시뮬레이션합니다. 보안 엔지니어는 기존 보안 그룹 규칙을 제거하고 포렌식 팀이 대상 인스턴스의 22번 포트에 접근할 수 있도록 보안 그룹 규칙을 추가합니다. 이러한 변경 후에도 보안 엔지니어는 SSH 연결이 여전히 활성화되어 있고 사용 가능한 상태임을 확인합니다. 보안 엔지니어가 대상 인스턴스의 공용 IP 주소로 ping 명령을 실행하면 ping 명령이 차단됩니다. 보안 엔지니어는 대상 인스턴스를 격리하기 위해 무엇을 해야 할까요?", "choices": ["보안 그룹에 0.0.0.0/0에서 들어오는 트래픽을 모든 포트에 대해 허용하는 인바운드 규칙을 추가합니다. 보안 그룹에 0.0.0.0/0으로 나가는 트래픽을 모든 포트에 대해 허용하는 아웃바운드 규칙을 추가합니다. 그런 다음 이 규칙들을 즉시 삭제합니다.", "포트 22 보안 그룹 규칙을 제거합니다. 포렌식 팀이 대상 인스턴스에 액세스할 수 있도록 AWS Systems Manager Session Manager 연결을 허용하는 인스턴스 역할 정책을 연결합니다.", "대상 인스턴스의 서브넷과 연결된 네트워크 ACL을 생성합니다. 인바운드 규칙 세트의 맨 위에 0.0.0.0/0에서 들어오는 모든 트래픽을 차단하는 규칙을 추가합니다. 아웃바운드 규칙 세트의 맨 위에 0.0.0.0/0으로 나가는 모든 트래픽을 차단하는 규칙을 추가합니다.", "모든 인바운드 및 아웃바운드 트래픽을 차단하는 호스트 수준 방화벽 규칙을 추가하는 AWS Systems Manager 문서를 생성합니다. 대상 인스턴스에서 해당 문서를 실행합니다."], "answer": "C", "multi": false, "explanation": "Amazon EC2 security groups are stateful, meaning that once a connection is established, return traffic is automatically allowed, even if the inbound rule that originally permitted the connection is later removed. According to the AWS Certified Security - Specialty Official Study Guide and Amazon EC2 security documentation, existing connections are not terminated when security group rules change. This explains why the SSH session remains active even after the security group rules were modified, while new traffic such as ICMP ping is blocked. To immediately and fully isolate an EC2 instance during an incident response scenario, AWS recommends using stateless network controls. Amazon VPC network ACLs (NACLs) are stateless, which means that every packet is evaluated against the ACL rules regardless of whether the traffic is part of an existing connection. When a deny rule is added, all traffic is immediately blocked, including active sessions. By creating a network ACL and associating it with the subnet that contains the target instance, and by adding explicit deny rules with the lowest rule numbers for both inbound and outbound traffic, the security engineer ensures that all network communication to and from the instance is immediately interrupted. This approach satisfies the requirement to isolate the instance while preserving its runtime state and memory for forensic analysis. Other options fail to meet the requirement because security group modifications do not terminate existing sessions, Systems Manager does not enforce network isolation, and host- level firewall changes require instance-level access and do not provide immediate, network- enforced isolation."},
  {"id": 140, "text": "한 회사가 매장 수를 늘리고 있습니다. 각 신규 매장이 문을 여는 날, 회사는 해당 매장 전용 웹 애플리케이션을 출시하려고 합니다. 각 매장의 애플리케이션은 비운영 환경과 운영 환경을 가지며, 각 환경은 별도의 AWS 계정에 배포될 예정입니다. 해당 회사는 AWS Organizations를 사용하고 있으며, 이러한 계정만을 위해 사용되는 OU(조직 단위)를 보유하고 있습니다. 이 회사는 대부분의 개발 작업을 외부 개발팀에 위탁합니다. 보안 엔지니어는 각 팀이 회사의 AWS 리소스 배포 계획을 준수하는지 확인해야 합니다. 또한 보안 엔지니어는 배포 계획에 대한 접근 권한을 필요한 개발자에게만 제한해야 합니다. 보안 엔지니어는 이미 해당 배포 계획을 구현하는 AWS CloudFormation 템플릿을 생성했습니다. 보안 엔지니어는 요구 사항을 가장 안전한 방식으로 충족하기 위해 다음에 무엇을 해야 할까요?", "choices": ["조직의 관리 계정에 AWS 서비스 카탈로그 포트폴리오를 생성합니다. CloudFormation 템플릿을 업로드합니다. 포트폴리오의 제품 목록에 템플릿을 추가합니다. 포트폴리오를 OU와 공유합니다.", "CloudFormation CLI를 사용하여 CloudFormation 템플릿에서 모듈을 생성합니다. CloudFormation 레지스트리에 모듈을 비공개 확장 프로그램으로 등록합니다. 확장 프로그램을 게시합니다. 확장 프로그램에 대한 액세스를 허용하는 SCP를 생성합니다.", "AWS 서비스 카탈로그 포트폴리오를 생성하고 계정 간 액세스를 위한 IAM 역할을 생성합니다. AWSServiceCatalogEndUserFullAccess 관리형 정책을 해당 역할에 연결합니다.", "CloudFormation CLI를 사용하여 모듈을 생성하고 확장 프로그램을 OU와 직접 공유합니다."], "answer": "A", "multi": false, "explanation": "AWS Service Catalog is specifically designed to help organizations govern and control how AWS resources are provisioned at scale. According to the AWS Certified Security - Specialty Official Study Guide, Service Catalog enables administrators to define approved CloudFormation templates as products and to control which accounts, users, or organizational units can deploy those products. By creating a Service Catalog portfolio in the management account and sharing it with a specific OU, the security engineer ensures that only accounts within that OU can deploy the approved infrastructure. Third-party developers can deploy resources only by using the predefined CloudFormation template and cannot alter the deployment plan, which enforces consistency and compliance. This approach also limits access to the deployment plan itself, because developers interact with the Service Catalog product rather than the raw template. No cross-account IAM roles or excessive permissions are required, which reduces the attack surface."},
  {"id": 141, "text": "기업은 AWS CloudFormation 템플릿을 사용하여 리소스를 배포할 때 보안 모범 사례를 준수해야 합니다. CloudFormation 템플릿은 민감한 데이터베이스 자격 증명을 구성할 수 있어야 합니다. 해당 기업은 이미 AWS Key Management Service(AWS KMS)와 AWS Secrets Manager를 사용하고 있습니다. 어떤 솔루션이 요구 사항을 충족할까요?", "choices": ["CloudFormation 템플릿에서 동적 참조를 사용하여 Secrets Manager의 데이터베이스 자격 증명을 참조하십시오.", "CloudFormation 템플릿에서 매개변수를 사용하여 데이터베이스 자격 증명을 참조합니다. AWS KMS를 사용하여 CloudFormation 템플릿을 암호화합니다.", "CloudFormation 템플릿에서 SecureString 매개변수를 사용하여 Secrets Manager의 데이터베이스 자격 증명을 참조합니다.", "CloudFormation 템플릿에서 SecureString 매개변수를 사용하여 AWS KMS에 있는 암호화된 값을 참조합니다."], "answer": "A", "multi": false, "explanation": "AWS CloudFormation dynamic references provide a secure mechanism for retrieving sensitive values from AWS Secrets Manager at stack creation or update time. According to the AWS Certified Security - Specialty documentation, dynamic references ensure that sensitive data such as database credentials are never stored in plaintext in CloudFormation templates, parameters, stack metadata, or logs. When a dynamic reference to Secrets Manager is used, CloudFormation retrieves the secret value at runtime and passes it securely to the resource that requires it. The secret value is not exposed to users who view the template, stack, or change sets."},
  {"id": 142, "text": "한 회사가 Auto Scaling 그룹에 속한 Amazon EC2 인스턴스 플릿에서 웹 애플리케이션을 운영하고 있습니다. 해당 EC2 인스턴스는 다른 워크로드와 동일한 VPC 서브넷에 있습니다. 보안 엔지니어가 EC2 인스턴스와 동일한 AWS 리전에 Amazon GuardDuty 탐지기를 배포하고 GuardDuty를 AWS Security Hub와 통합합니다. 보안 엔지니어는 웹 애플리케이션의 비정상적인 트래픽 패턴을 감지하고 적절하게 대응하는 자동화 솔루션을 구현해야 합니다. 이 솔루션은 보안 사고 초기 대응에 대한 AWS 모범 사례를 준수해야 하며 웹 애플리케이션에 미치는 영향을 최소화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Lambda를 사용하여 EC2 인스턴스 프로필 자격 증명을 비활성화합니다.", "GuardDuty가 비정상적인 트래픽을 감지할 때 AWS Lambda 함수를 호출하는 Amazon EventBridge 규칙을 생성합니다. 해당 함수를 구성하여 영향을 받는 인스턴스를 Auto Scaling 그룹에서 제거하고 제한된 보안 그룹에 연결합니다.", "감지된 소스 IP 주소에서 오는 트래픽을 차단하도록 서브넷 네트워크 ACL을 업데이트합니다.", "GuardDuty 결과를 Amazon SNS로 전송하여 이메일 알림을 받도록 합니다."], "answer": "B", "multi": false, "explanation": "AWS incident response best practices emphasize rapid containment with minimal blast radius. According to the AWS Certified Security - Specialty Official Study Guide, isolating a compromised resource while allowing the application to continue running is the preferred initial response. By using Amazon EventBridge to detect GuardDuty findings related to anomalous traffic and invoking a Lambda function, the security engineer can automatically remove the affected EC2 instance from the Auto Scaling group and attach a restricted security group. This immediately isolates the instance while allowing Auto Scaling to launch a replacement instance, ensuring application availability."},
  {"id": 143, "text": "한 회사가 AWS Organizations의 조직을 사용하여 250개의 멤버 계정을 관리합니다. 또한 SAML 외부 ID 공급자(IdP)와 함께 AWS IAM Identity Center를 사용하고 있습니다. IAM Identity Center는 멤버 계정 중 하나에 위임되었으며, 회사 보안팀은 위임된 계정에 접근할 수 있습니다. 보안팀은 민감한 계정에 접근했을 가능성이 있는 악의적인 내부 사용자를 조사하고 있습니다. 보안팀은 사용자가 지난 7일 동안 언제 조직에 로그인했는지 알아야 합니다. 어떤 솔루션이 접근 시도를 신속하게 식별할 수 있을까요?", "choices": ["위임된 계정에서 Amazon CloudWatch Logs를 사용하여 모든 성공적인 시도에 대해 사용자 세부 정보와 일치하는 이벤트를 검색합니다.", "각 멤버 계정에서 IAM Identity Center 콘솔을 사용하여 모든 시도에 대한 사용자 세부 정보와 일치하는 이벤트를 검색합니다.", "외부 IdP에서 Amazon EventBridge를 사용하여 모든 시도에 대해 사용자 세부 정보와 일치하는 이벤트를 검색합니다.", "조직의 관리 계정에서 AWS CloudTrail을 사용하여 모든 성공 시도에 대한 사용자 세부 정보와 일치하는 이벤트를 검색합니다."], "answer": "D", "multi": false, "explanation": "AWS CloudTrail is the authoritative source for identity-related activity across an AWS Organization. According to the AWS Certified Security - Specialty Official Study Guide, CloudTrail records all AWS API calls and authentication events, including federated sign-ins that occur through AWS IAM Identity Center with an external SAML identity provider. When IAM Identity Center is used, successful federated login events are logged in CloudTrail as ConsoleLogin and AssumeRoleWithSAML events. These events are recorded in the organization's management account when CloudTrail is configured as an organization trail. This allows security teams to centrally search and correlate authentication activity across all member accounts."},
  {"id": 144, "text": "한 회사가 AWS Organizations에서 자사 AWS 계정에 대한 조직을 구성했습니다. AWS CloudTrail은 모든 AWS 리전에서 활성화되어 있습니다. 보안 엔지니어는 CloudTrail이 비활성화되는 것을 방지하기 위한 솔루션을 구현해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["조직 관리 계정에서 CloudTrail 로그 파일 무결성 유효성 검사를 활성화합니다.", "CloudTrail 로그에 대해 AWS KMS 키(SSE-KMS)를 사용한 서버 측 암호화를 활성화합니다. KMS 키를 생성합니다. 로그 복호화를 방지하기 위해 키에 정책을 연결합니다.", "cloudtrail:StopLogging 작업과 cloudtrail:DeleteTrail 작업에 대한 명시적인 거부 규칙이 포함된 서비스 제어 정책(SCP)을 생성합니다. 해당 SCP를 루트 OU에 연결합니다.", "회사 내 모든 사용자가 DescribeTrails 작업과 GetTrailStatus 작업을 수행하지 못하도록 하는 IAM 정책을 생성합니다."], "answer": "C", "multi": false, "explanation": "AWS CloudTrail is a foundational security service that records API activity and account events. According to the AWS Certified Security - Specialty Official Study Guide, the only way to centrally and reliably prevent CloudTrail from being disabled across multiple AWS accounts is by using AWS Organizations service control policies (SCPs). SCPs define the maximum available permissions for all accounts in an organization or organizational unit. By creating an SCP with an explicit Deny for the cloudtrail:StopLogging and cloudtrail:DeleteTrail actions and attaching it to the root OU, the security engineer ensures that no principal in any member account--including administrators--can stop or delete CloudTrail trails. Explicit denies in SCPs cannot be overridden by IAM permissions."},
  {"id": 145, "text": "한 회사가 Amazon EC2 온디맨드 인스턴스와 스팟 인스턴스를 혼합하여 실행되는 애플리케이션을 개발 중입니다. 보안 엔지니어는 모든 인스턴스의 로그를 단일 위치에서 확인할 수 있는 로깅 솔루션을 제공해야 합니다. 이 솔루션은 특정 사용자 그룹만 로그에서 이벤트 패턴을 분석할 수 있도록 허용해야 합니다. 또한, 해당 사용자는 로그에 대한 SQL 쿼리를 사용하여 근본 원인 분석을 수행할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["EC2 인스턴스가 애플리케이션 로그를 단일 Amazon CloudWatch Logs 로그 그룹으로 전송하도록 구성합니다. 특정 사용자만 로그 그룹에 액세스할 수 있도록 허용합니다. CloudWatch Logs Insights를 사용하여 로그 그룹을 쿼리할 수 있습니다.", "EC2 인스턴스가 애플리케이션 로그를 단일 Amazon S3 버킷으로 전송하도록 구성합니다. 특정 사용자만 S3 버킷에 액세스할 수 있도록 허용합니다. Amazon CloudWatch Logs Insights를 사용하여 S3 버킷의 로그 파일을 쿼리합니다.", "각 EC2 인스턴스가 애플리케이션 로그를 특정 Amazon CloudWatch Logs 로그 그룹으로 전송하도록 구성합니다. 특정 사용자만 로그 그룹에 액세스할 수 있도록 허용합니다. Amazon Athena를 사용하여 모든 로그 그룹을 쿼리할 수 있습니다.", "EC2 인스턴스가 애플리케이션 로그를 단일 Amazon CloudWatch Logs 로그 그룹으로 전송하도록 구성합니다. Amazon Detective에 해당 로그 그룹에 대한 액세스 권한을 부여합니다. 특정 사용자만 Detective를 사용하여 로그를 분석할 수 있도록 허용합니다."], "answer": "A", "multi": false, "explanation": "Amazon CloudWatch Logs provides a centralized, scalable service for collecting and storing logs from Amazon EC2 instances, regardless of whether the instances are On-Demand or Spot Instances. According to the AWS Certified Security - Specialty Official Study Guide, CloudWatch Logs is the recommended service for centralized log aggregation and near-real- time analysis of application and system logs. By configuring all EC2 instances to send logs to a single CloudWatch Logs log group, the security engineer ensures that logs from all instances are available in one centralized location. Access to the log group can be restricted by using IAM policies, ensuring that only authorized users can view and analyze the logs. CloudWatch Logs Insights provides a powerful query language with SQL-like syntax, enabling users to search, filter, aggregate, and analyze log data efficiently. This directly satisfies the requirement for SQL-style queries to identify event patterns and perform root cause analysis without requiring data movement or additional services."},
  {"id": 146, "text": "한 회사가 아마존 EC2 인스턴스 클러스터에서 애플리케이션을 운영하고 있습니다. 이 애플리케이션은 전 세계 사용자들이 이용할 수 있습니다. 회사는 AWS 웹 방화벽(WAF) 웹 접근 제어 목록(ACL)을 애플리케이션 로드 밸런싱(ALB)과 연결하여 트래픽을 EC2 인스턴스로 라우팅합니다. 보안 엔지니어가 애플리케이션 트래픽의 갑작스러운 증가를 조사하고 있습니다. 조사 결과, 두 국가에 걸쳐 수백 개의 IP 주소에서 상당량의 악성 요청이 발생하고 있는 것으로 확인되었습니다. 보안 엔지니어는 악성 요청을 신속하게 차단하고 싶지만, 정상적인 사용자의 애플리케이션 접근은 막고 싶지 않습니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS WAF를 사용하여 모든 수신 요청에 대한 속도 기반 규칙을 구현합니다.", "AWS WAF를 사용하여 두 국가에서 들어오는 모든 트래픽을 차단하는 지리적 일치 규칙을 구현합니다.", "ALB 보안 그룹을 편집하여 두 국가에서 들어오는 모든 트래픽을 차단하는 지리적 일치 규칙을 포함시키십시오.", "ALB 보안 그룹에 IP 주소로부터의 수신 요청을 금지하는 거부 규칙을 추가합니다."], "answer": "A", "multi": false, "explanation": "AWS WAF rate-based rules are specifically designed to protect applications from traffic floods and distributed attacks that originate from large numbers of IP addresses. According to the AWS Certified Security - Specialty Official Study Guide, rate-based rules automatically track the number of requests coming from individual IP addresses and temporarily block IPs that exceed a defined threshold. In this scenario, the malicious traffic originates from hundreds of IP addresses across two countries, mixed with legitimate user traffic. A rate-based rule allows the security engineer to limit excessive request rates without fully blocking access from entire geographic regions, ensuring that legitimate users can still access the application."},
  {"id": 147, "text": "한 기업의 보안 엔지니어가 IAM 사용자 계정 자격 증명 유출 사고에 대한 대응 계획을 수립해야 합니다. 이 기업은 AWS Organizations의 조직과 AWS IAM Identity Center를 사용하여 사용자 액세스를 관리합니다. 또한 위임된 관리자 계정을 통해 AWS Security Hub를 구현했으며, 이 위임된 관리자 계정에는 모든 이벤트를 Amazon S3 버킷에 기록하는 AWS CloudTrail 조직 트레일이 포함되어 있습니다. 더불어, 조직 이벤트 데이터 저장소(EDS)를 구성하여 트레일에서 발생하는 모든 이벤트를 수집하고 있습니다. 사고 대응 계획에는 보안 엔지니어가 보안 사고 알림을 수신했을 때 손상된 IAM 사용자를 즉시 ​비활성화하기 위한 조치가 포함되어야 합니다. 또한 해당 IAM 사용자가 모든 AWS 계정에서 사용되지 않도록 차단해야 합니다. 아울러, 손상된 IAM 사용자가 지난 7일 동안 모든 계정에서 수행한 모든 AWS 작업을 수집해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["조직 관리 계정에서 손상된 IAM 사용자를 비활성화합니다. Amazon Athena를 사용하여 S3 버킷에 있는 조직의 CloudTrail 로그를 조회하여 해당 IAM 사용자가 지난 7일 동안 수행한 작업을 확인합니다.", "조직 관리 계정에서 IAM 사용자에게 연결된 모든 IAM 정책을 제거합니다. AWS Security Hub를 사용하여 CloudTrail 로그에서 IAM 사용자가 지난 7일 동안 수행한 작업을 조회할 수 있습니다.", "IAM Identity Center에서 해당 IAM 사용자에게 할당된 모든 권한 세트를 제거합니다. Amazon CloudWatch Logs Insights를 사용하여 S3 버킷의 CloudTrail 로그를 쿼리하여 해당 IAM 사용자가 지난 7일 동안 수행한 작업을 확인합니다.", "IAM Identity Center에서 IAM 사용자의 액세스를 비활성화합니다. AWS CloudTrail을 사용하여 조직 이벤트 데이터 저장소에서 IAM 사용자가 지난 7일 동안 수행한 작업을 조회합니다."], "answer": "D", "multi": false, "explanation": "When AWS IAM Identity Center is used to manage user access across an AWS Organization, Identity Center is the authoritative control plane for enabling and disabling user access. According to the AWS Certified Security - Specialty Official Study Guide, disabling a user in IAM Identity Center immediately prevents that user from accessing any AWS account or role that is assigned through permission sets, satisfying the requirement to stop access organization-wide."},
