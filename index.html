  {"id": 258, "text": "한 회사의 애플리케이션 팀에서 Amazon S3와 함께 사용할 새로운 AWS 키 관리 서비스(AWS KMS) 고객 관리형 키가 필요합니다. 회사의 보안 정책에 따라 보안 노출을 최소화하기 위해 각기 다른 AWS 서비스마다 별도의 키가 필요합니다. 보안 엔지니어가 KMS 고객 관리 키가 Amazon S3에서만 작동하도록 제한하려면 어떻게 해야 할까요?", "choices": ["Amazon S3만 kms:Encrypt 작업을 수행할 수 있도록 키 정책을 구성합니다.", "kms:ViaService 조건 키의 값이 Amazon S3 서비스 이름과 일치하는 경우에만 KMS 작업을 허용하도록 키 정책을 구성합니다.", "Amazon S3가 iam:PassRole 작업을 수행할 수 있도록 애플리케이션의 IAM 역할 정책을 구성합니다.", "KMS 고객 관리 키와 결합된 경우에만 S3 작업을 허용하도록 애플리케이션의 IAM 역할 정책을 구성합니다."], "answer": "B", "multi": false, "explanation": "AWS KMS는 고객 관리형 키를 사용할 수 있는 방법과 위치의 범위를 엄격하게 지정하는 데 사용할 수 있는 조건 키를 제공합니다. AWS 공인 보안 - 전문 연구 가이드에 따르면 kms:ViaService 조건 키는 특정 리전의 특정 AWS 서비스에서 발생하는 요청으로 키 사용을 제한하도록 특별히 설계되었습니다. 보안 엔지니어는 kms:ViaService가 s3.<region>.amazonaws.com과 동일한 경우에만 KMS 암호화 작업을 허용하도록 키 정책을 구성하여 해당 키가 Amazon S3에서만 사용될 수 있도록 보장합니다. 다른 IAM 보안 주체에게 키를 사용할 권한이 있더라도 Amazon EC2, Amazon RDS 또는 AWS Lambda와 같은 다른 서비스에서는 해당 키를 사용할 수 없습니다. AWS 서비스는 주요 정책에서 자격 증명을 가정하지 않기 때문에 옵션 A는 올바르지 않습니다. 옵션 C와 D는 AWS 서비스에서 KMS 키를 사용하는 방식을 제어하지 않는 IAM 역할 정책을 수정합니다. AWS 설명서에는 조건 키를 사용하여 KMS 키 정책 수준에서 서비스 수준 제한을 적용해야 한다고 명시되어 있습니다. 이 접근 방식은 AWS 보안 모범 사례에 따라 강력한 업무 분리를 시행하고 폭발 반경을 제한합니다."},
  {"id": 259, "text": "한 회사가 로그 데이터를 저장하기 위해 아마존 S3 버킷을 생성할 계획입니다. 모든 S3 버킷에는 버전 관리 기능이 활성화되어 있으며, S3 Standard 스토리지 클래스를 사용할 예정입니다. 보안 엔지니어는 S3 버킷에 저장된 객체가 90일 동안 삭제되지 않도록 보호하는 솔루션을 구현해야 합니다. 이 솔루션은 관리자나 AWS 계정 루트 사용자조차도 해당 기간 동안 객체를 삭제할 수 없도록 보장해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["거버넌스 모드에서 S3 객체 잠금을 활성화합니다. 법적 보존 기간을 90일로 설정합니다.", "거버넌스 모드에서 S3 객체 잠금을 활성화합니다. 보존 기간을 90일로 설정합니다.", "규정 준수 모드에서 S3 객체 잠금을 활성화합니다. 보존 기간을 90일로 설정합니다.", "90일 동안 삭제를 방지하는 S3 Glacier Vault 잠금 정책을 생성합니다."], "answer": "C", "multi": false, "explanation": "S3 객체 잠금(compliance 모드)은 S3 객체에 대한 가장 엄격한 WORM 보호입니다. 객체 버전이 compliance 모드 보존으로 보호되면, AWS 계정의 루트 사용자를 포함한 어떤 사용자도 보존 기간이 만료되기 전에 보호된 객체 버전을 덮어쓰거나 삭제할 수 없습니다. 이는 관리자나 루트 사용자조차도 90일 동안 삭제를 방지해야 하는 요구사항을 정확히 충족합니다. Governance 모드는 특수 우회 권한이 있는 사용자가 운영 보존을 무시할 수 있기 때문에 더 약합니다. 법적 보유(legal hold)는 나중에 수동으로 제거하지 않는 한 시간 기반 90일 보존 기간을 사용하지 않습니다. S3 Glacier Vault Lock은 일반 S3 버킷의 S3 표준 저장 클래스가 아닌 S3 Glacier 금고에 적용됩니다."},
  {"id": 260, "text": "한 회사가 AWS Organizations 내의 조직에 AWS 계정을 보유하고 있습니다. 해당 조직에는 전용 보안 계정이 포함되어 있습니다. 모든 멤버 계정의 모든 AWS 계정 활동은 지정된 보안 계정에 기록 및 보고되어야 합니다. 회사는 모든 활동 로그를 지정된 보안 계정 내의 안전한 저장 위치에 2년 동안 보관해야 합니다. 로그를 변경하거나 삭제하는 것은 허용되지 않습니다. 운영 부담을 최소화하면서 이러한 요구 사항을 충족하는 단계 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["전용 보안 계정에서 Amazon S3 버킷을 생성합니다. S3 객체 잠금을 규정 준수 모드로 구성하고 보존 기간을 2년으로 설정합니다. 조직의 관리 계정이 S3 버킷에 쓰기 작업을 수행할 수 있도록 버킷 정책을 설정합니다.", "전용 보안 계정에서 Amazon S3 버킷을 생성합니다. S3 객체 잠금을 규정 준수 모드로 구성하고 보존 기간을 2년으로 설정합니다. 조직의 구성원 계정이 S3 버킷에 쓰기 작업을 수행할 수 있도록 버킷 정책을 설정합니다.", "전용 보안 계정에서 객체가 2년 후에 만료되는 S3 수명 주기 구성을 사용하여 Amazon S3 버킷을 생성합니다. 멤버 계정이 버킷에 쓰기 권한을 갖도록 허용합니다.", "AWS CloudTrail 조직 트레일을 생성합니다. 지정된 보안 계정의 Amazon S3 버킷으로 로그가 전송되도록 구성합니다.", "각 계정에서 AWS CloudTrail을 활성화하고 AWS Lambda 및 Amazon Data Firehose를 사용하여 로그를 전용 보안 계정으로 전달합니다."], "answer": "A,D", "multi": true, "explanation": "AWS CloudTrail 조직 추적은 최소한의 운영 노력으로 조직 전체에 중앙 집중식 로깅을 제공하도록 특별히 설계되었습니다. AWS 공인 보안 - 전문 분야 공식 학습 가이드에 따르면 조직 추적은 모든 회원 계정에 대한 모든 관리 이벤트를 기록하고 이를 단일 Amazon S3 버킷에 전달합니다. 로그를 변경하거나 삭제할 수 없도록 하려면 규정 준수 모드에서 Amazon S3 객체 잠금을 사용해야 합니다. 규정 준수 모드는 WORM(Write Once Read Many) 보호를 적용합니다. 즉, 루트 사용자를 포함한 어떤 사용자도 보존 기간이 만료되기 전에 객체를 삭제하거나 수정할 수 없습니다. 이는 2년 동안 변경이나 삭제가 허용되지 않는다는 요구 사항을 직접적으로 충족합니다. S3 버킷은 격리 및 강력한 보안 경계를 제공하기 위해 전용 보안 계정에 상주해야 합니다. 조직의 마스터 계정(옵션 A)에 쓰기 권한을 부여하는 것은 AWS 모범 사례에 부합합니다. 마스터 계정은 조직 추적을 소유 및 관리하고 모든 회원 계정을 대신하여 중앙에서 로그를 전달하기 때문입니다."},
  {"id": 261, "text": "한 회사가 IAM 역할이 수행한 작업을 조사하고 있습니다. 해당 역할이 AWS Security Hub에 마지막으로 액세스한 시점과 Security Hub에서 DeleteInsight 작업을 마지막으로 사용한 시점을 파악해야 합니다. 이러한 정보를 제공하는 솔루션은 무엇일까요?", "choices": ["AWS Trusted Advisor에서 보안 범주에 대한 검사를 사용하십시오. 역할을 검색하고 수행된 조치를 검토하십시오.", "AWS Identity and Access Management(IAM)의 액세스 어드바이저 탭을 사용하세요. Security Hub와 수행된 작업을 검색하세요.", "AWS Identity and Access Management(IAM)을 사용하여 자격 증명 보고서를 생성합니다. 보고서에서 Security Hub 활동을 검색합니다.", "AWS Identity and Access Management Access Analyzer에서 분석기를 생성합니다. Security Hub에서 역할의 작업에 대한 결과를 검토합니다."], "answer": "B", "multi": false, "explanation": "IAM의 Access Advisor 기능은 IAM 역할이나 사용자가 접근한 서비스와 각 서비스 접근 시점을 제공합니다. 이 기능은 IAM 역할이 마지막으로 AWS Security Hub에 접근한 시점을 보여줍니다. DeleteInsight와 같은 특정 작업을 찾으려면 CloudTrail 로그를 검토할 수 있지만, Access Advisor는 서비스에 대한 마지막 접근을 빠르게 확인하는 첫 번째 단계입니다."},
  {"id": 262, "text": "한 회사의 개발자들이 AWS Lambda 함수 URL을 사용하여 함수를 직접 호출하고 있습니다. 회사는 개발자들이 프로덕션 계정에 인증되지 않은 함수를 구성하거나 배포할 수 없도록 해야 합니다. 회사는 AWS Organizations를 사용하여 이 요구 사항을 충족하고자 합니다. 이 솔루션은 개발자에게 추가적인 작업을 요구하지 않아야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["개발자가 다른 도메인에서 함수를 호출할 때 CORS(교차 출처 리소스 공유)를 지원하도록 모든 함수 URL을 구성하도록 요구합니다.", "AWS WAF 위임 관리자 계정을 사용하여 프로덕션 계정에서 함수를 사용하는 계정의 OU를 기반으로 함수 URL에 대한 인증되지 않은 액세스를 보고 차단할 수 있습니다.", "SCP를 사용하여 lambda:FunctionUrlAuthType 조건 키 값이 AWS_IAM인 모든 lambda:CreateFunctionUrlConfig 및 lambda:UpdateFunctionUrlConfig 작업을 허용합니다.", "SCP를 사용하여 lambda:FunctionUrlAuthType 조건 키 값이 NONE인 모든 lambda:CreateFunctionUrlConfig 및 lambda:UpdateFunctionUrlConfig 작업을 거부합니다."], "answer": "D", "multi": false, "explanation": "AWS Organizations 서비스 제어 정책(SCP)은 애플리케이션 수준 변경 없이 계정 전체에 예방 가드레일을 적용하도록 설계되었습니다. AWS 공인 보안 - 전문 문서에 따르면 SCP는 특정 API 작업을 제한하거나 보안 표준을 중앙에서 시행하기 위해 특정 조건 키를 요구할 수 있습니다. AWS Lambda 함수 URL은 AWS_IAM 및 NONE이라는 두 가지 인증 모드를 지원합니다. 인증 유형을 NONE으로 설정하면 함수 URL에 공개적으로 액세스할 수 있게 되어 프로덕션 환경에서 심각한 보안 위험이 발생합니다. Lambda:FunctionUrlAuthType 조건 키가 NONE일 때 Lambda:CreateFunctionUrlConfig 및 Lambda:UpdateFunctionUrlConfig 작업을 명시적으로 거부하는 SCP를 사용함으로써 조직은 인증되지 않은 함수 URL이 프로덕션 계정에서 생성되거나 수정될 수 없도록 보장합니다. 이러한 시행은 AWS Organizations 수준에서 이루어지며 지정된 조직 단위(OU) 내의 모든 계정에 자동으로 적용됩니다. 개발자는 워크플로를 변경하거나 추가 컨트롤을 추가할 필요가 없으므로 추가적인 개발자 노력이 필요하지 않다는 요구 사항을 충족합니다. 옵션 A는 브라우저 기반 액세스 제어와 관련이 있으며 인증 또는 권한 부여 시행을 제공하지 않습니다. AWS WAF는 AWS Lambda 함수 URL에 직접 연결할 수 없으므로 옵션 B는 유효하지 않습니다. 옵션 C는 SCP가 권한을 부여하지 않기 때문에 올바르지 않습니다. 권한만 제한합니다. AWS 문서에는 SCP가 사용 가능한 최대 권한을 정의하고 IAM 정책보다 먼저 평가된다고 명시되어 있습니다. 이 접근 방식은 중앙 집중식 거버넌스, 최소 권한 및 예방적 보안 제어에 대한 AWS 모범 사례에 부합합니다."},
  {"id": 263, "text": "한 회사가 애플리케이션 로드 밸런서 뒤에서 프런트엔드 서비스를 호스팅하기 위해 Amazon EC2 인스턴스를 사용합니다. Amazon Elastic Block Store(Amazon EBS) 볼륨이 EC2 인스턴스에 연결되어 있습니다. 회사는 이미지와 음악과 같은 대용량 파일을 저장하기 위해 Amazon S3 버킷을 사용합니다. 회사는 잠재적인 랜섬웨어 공격을 예방, 식별 및 격리하기 위해 AWS에 보안 아키텍처를 구현했습니다. 이제 회사는 위험을 더욱 줄이고자 합니다. 보안 엔지니어는 공격자가 예방 및 탐지 제어를 우회하는 경우 정상적인 운영으로 복구할 수 있는 재해 복구 솔루션을 개발해야 합니다. 이 솔루션은 1시간의 RPO(복구 목표 시점)를 충족해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Backup을 사용하여 EC2 인스턴스와 S3 버킷의 백업을 매시간 생성합니다. 기존 아키텍처 구성 요소를 복제하는 AWS CloudFormation 템플릿을 생성합니다. Git 리포지토리를 사용하여 CloudFormation 템플릿과 애플리케이션 구성 코드를 함께 저장합니다.", "AWS Backup을 사용하여 EBS 볼륨과 S3 객체의 백업을 매일 생성하십시오. Amazon Security Lake를 사용하여 AWS CloudTrail 로그 및 VPC 흐름 로그를 위한 중앙 집중식 데이터 레이크를 구축하십시오. 자동화된 대응을 위해 로그를 활용하십시오.", "Amazon Security Lake를 사용하여 AWS CloudTrail 로그 및 VPC 흐름 로그를 위한 중앙 집중식 데이터 레이크를 구축합니다. 자동화된 대응을 위해 로그를 활용합니다. AWS Security Hub를 활성화하여 복구 절차를 위한 단일 위치를 설정합니다. 기존 아키텍처 구성 요소를 복제하는 AWS CloudFormation 템플릿을 생성합니다. Git 리포지토리를 사용하여 CloudFormation 템플릿과 애플리케이션 구성 코드를 함께 저장합니다.", "4시간마다 EBS 스냅샷을 생성합니다. Amazon GuardDuty 맬웨어 방지 기능을 활성화합니다. GuardDuty에서 Execution:EC2/MaliciousFile 오류가 발생하는 모든 EC2 인스턴스에 대해 가장 최근 스냅샷을 즉시 복원하는 자동화를 생성합니다."], "answer": "A", "multi": false, "explanation": "RPO가 1시간이라는 것은 회사가 최대 60분의 손실을 감수하면서 데이터를 복원할 수 있어야 함을 의미합니다. 옵션 A는 AWS 백업을 사용하여 컴퓨팅 계층(EC2)과 데이터 계층(S3) 모두를 시간별로 백업함으로써 이를 직접적으로 충족합니다. AWS Backup은 중앙 집중식 정책 기반 예약, 보존 및 (구성된 경우) 백업 저장소 잠금과 같은 변경 불가능한 보호 기능을 제공하여 랜섬웨어 복구 시나리오에서 중요한 백업 변조를 방지하는 데 도움이 됩니다. S3 버킷을 매시간 백업하면 사용자가 의존하는 이미지 및 음악과 같은 중요한 개체의 복구도 처리됩니다. 또한 \"정상 작업\"으로의 복구는 데이터 복원에만 국한되지 않습니다. 또한 인프라를 안정적으로 신속하게 재구축해야 합니다. 버전 제어 Git 리포지토리에 저장된 AWS CloudFormation 템플릿을 사용하면 ALB, EC2 플릿 구성, IAM 역할, 보안 그룹 및 관련 구성 요소의 일관되고 반복 가능한 재구축이 지원됩니다. 이 코드형 인프라 접근 방식은 사고 압력 하에서 인적 오류를 줄이고 재해 복구 실행을 가속화합니다."},
  {"id": 264, "text": "한 회사가 민감한 데이터를 아마존 S3 버킷에 저장합니다. 이 회사는 아마존 S3 관리 키(SSE- S3)를 사용한 서버 측 암호화를 통해 저장된 데이터를 암호화합니다. 보안 엔지니어는 S3 버킷에 저장된 데이터가 변경되지 않도록 보호해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["S3 버킷 정책을 구성하여 객체 삭제 및 PUT 권한을 거부합니다.", "S3 버킷 버전 관리가 활성화된 규정 준수 모드에서 S3 객체 잠금을 구성합니다.", "S3 버킷의 암호화를 AWS Key Management Service(AWS KMS) 고객 관리 키를 사용하도록 변경합니다.", "다중 인증(MFA) 삭제 보호 기능을 사용하여 S3 버킷을 구성합니다."], "answer": "B", "multi": false, "explanation": "규정 준수 모드의 Amazon S3 객체 잠금은 WORM(Write Once Read Many) 보호를 제공하여 지정된 보존 기간 동안 객체가 수정되거나 삭제되는 것을 방지합니다. AWS 공인 보안 - 전문 분야 연구 가이드에 따르면 규정 준수 모드는 루트 사용자에게도 불변성을 적용하며 재정의할 수 없습니다. S3 객체 잠금을 활성화하려면 S3 버킷 버전 관리가 필요하며 객체가 기록되면 보존 기간이 만료될 때까지 변경하거나 제거할 수 없습니다. 이는 데이터 수정에 대한 가장 강력한 보호 기능이며 규제 및 법적 보존 요구 사항에 일반적으로 사용됩니다. 옵션 A는 관리자가 우회할 수 있습니다. 옵션 D는 덮어쓰기가 아닌 삭제만 방지합니다. 옵션 C는 암호화를 변경하지만 수정을 방지하지는 않습니다. AWS 설명서에서는 규정 준수 모드의 S3 객체 잠금이 불변 데이터 스토리지를 위한 올바른 솔루션이라고 명시적으로 식별합니다."},
  {"id": 265, "text": "보안 엔지니어는 AWS CloudTrail이 여러 AWS 리전에서 꺼진 경우 다시 켜는 솔루션을 구축해야 합니다. 이 해결책을 구현하는 가장 효율적인 방법은 무엇일까요?", "choices": ["관리형 규칙이 있는 AWS Config를 사용하여 AWS-EnableCloudTrail 수정 작업을 시작하세요.", "CloudTrail.amazonaws.com 이벤트 소스와 StartLogging 이벤트 이름을 사용하여 Amazon EventBridge 이벤트를 생성하고, AWS Lambda 함수를 호출하여 StartLogging API를 실행합니다.", "cloudtrail.amazonaws.com 이벤트 소스와 StopLogging 이벤트 이름을 사용하여 Amazon CloudWatch 알람을 생성하고 AWS Lambda 함수를 호출하여 StartLogging API를 실행합니다.", "CloudTrail 로깅이 활성화되어 있는지 확인하기 위해 AWS Trusted Advisor를 모니터링합니다."], "answer": "A", "multi": false, "explanation": "가장 효율적인 접근 방식은 AWS Config를 사용하는 것입니다. Config는 지속적인 규정 준수 평가를 위해 설계되었으며, 리소스가 원하는 상태에서 벗어나면 관리형 교정(managed remediation)을 자동으로 트리거할 수 있습니다. CloudTrail이 로깅하지 않을 때를 감지하는 관리형 Config 규칙과 AWS-EnableCloudTrail 교정 조치를 결합하면, 맞춤 이벤트 처리 코드를 작성하고 유지 관리하지 않고도 CloudTrail을 자동으로 다시 활성화할 수 있습니다. 이는 Config가 여러 리전을 가로질러 구성을 평가하고 의도된 상태를 일관되게 시행할 수 있기 때문에 다중 리전 환경에서 특히 가치가 있습니다."},
  {"id": 266, "text": "보안 엔지니어는 Amazon GuardDuty에서 발견된 문제점을 조사해야 합니다. 해당 문제점은 Amazon EC2 인스턴스에서 암호화폐 채굴 활동이 의심된다는 것을 나타냅니다. 보안 엔지니어는 문제점을 검증하고 그 영향을 평가해야 합니다. 보안 엔지니어는 이러한 요구 사항을 충족하기 위해 어떤 데이터 소스를 분석해야 할까요?", "choices": ["Amazon CloudWatch에서 인스턴스의 CPU 사용률 지표를 확인합니다. 발견된 항목의 MITRE ATT&CK 전술 분류를 검토합니다. 관련 IAM 역할 권한을 검토합니다.", "인스턴스와 관련된 GuardDuty 발견 건수를 계산합니다. 인스턴스의 시작 시간을 확인합니다. AWS Security Hub CSPM에서 관련 경고가 있는지 확인합니다.", "발견 사항과 관련된 인스턴스의 프로세스 세부 정보를 검토합니다. 알려진 마이닝 도메인에 대한 DNS 쿼리를 조사합니다. VPC 흐름 로그를 사용하여 인스턴스의 아웃바운드 네트워크 연결을 분석합니다.", "인스턴스의 AWS Systems Manager 세션 기록을 검토합니다. Amazon Route 53 DNS 레코드를 확인합니다. GuardDuty 심각도 수준을 검토합니다."], "answer": "C", "multi": false, "explanation": "암호화폐 채굴 검증에는 단순히 발견에 대한 메타데이터뿐만 아니라 실제 채굴 행동에 대한 증거가 필요합니다. 프로세스 세부 정보는 인스턴스에서 채굴 바이너리나 의심스러운 프로세스가 실행 중인지 여부를 보여줍니다. DNS 분석은 알려진 채굴 풀 또는 의심스러운 도메인에 대한 조회를 나타낼 수 있습니다. VPC 플로우 로그는 인스턴스에서의 아웃바운드 연결, 목적지, 포트 및 트래픽 양을 확인하는 데 도움을 줍니다. GuardDuty는 DNS 로그, VPC 플로우 로그 및 CloudTrail 이벤트와 같은 기본 데이터 소스를 사용하여 의심스러운 활동을 탐지하므로, 동일한 소스가 발견 사항을 검증하고 범위를 설정하는 데 적합합니다. CPU 메트릭만으로는 유용한 맥락을 제공할 수 있지만 충분하지 않습니다. 발견 건수를 세거나 심각도를 확인하는 것만으로는 영향력을 입증할 수 없습니다. 세션 기록과 Route 53 레코드는 채굴 행동을 직접적으로 검증하지 않습니다."},

var TOTAL = ALL_QUESTIONS.length;

/* ── 상태 ── */
var mode = 'preset';
var selectedCount = 20;
var rangeFrom = 1, rangeTo = TOTAL;
var customCount = 0;
var selectedQIds = [];   // 그리드에서 선택된 Q id 목록
var quizQuestions = [];
var currentIndex = 0;
var userAnswers = [];
var selectedChoices = [];
var answered = false;
var startTime, timerInterval, totalSeconds = 0;
var isMidResult = false;

/* ── 유틸 ── */
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function gel(id) { return document.getElementById(id); }
function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function show(id) { gel(id).style.display = 'block'; }
function hide(id) { gel(id).style.display = 'none'; }

/* ── 문제 선택 그리드 초기화 ── */
function initQGrid() {
  selectedQIds = [];
  for (var i = 0; i < ALL_QUESTIONS.length; i++) selectedQIds.push(ALL_QUESTIONS[i].id);
  var grid = gel('qgrid');
  grid.innerHTML = '';
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    (function(q) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'qbtn on';
      btn.id = 'qb_' + q.id;
      btn.textContent = q.id;
      btn.onclick = function() { toggleQ(q.id, btn); };
      grid.appendChild(btn);
    })(ALL_QUESTIONS[i]);
  }
  updateQSelectCount();
}

function toggleQ(id, btn) {
  var pos = selectedQIds.indexOf(id);
  if (pos === -1) {
    selectedQIds.push(id);
    btn.classList.add('on');
  } else {
    selectedQIds.splice(pos, 1);
    btn.classList.remove('on');
  }
  updateQSelectCount();
  /* 그리드에서 직접 선택하면 다른 모드 해제 */
  mode = 'custom';
  clearAllCards();
  gel('customCountInput').value = '';
  gel('customCountDisplay').innerHTML = '직접<br>입력';
  gel('rangeFrom').value = '';
  gel('rangeTo').value = '';
  gel('rangePreview').textContent = '';
  gel('customRangeRow').classList.remove('active');
  gel('btnStart').disabled = (selectedQIds.length === 0);
}

function updateQSelectCount() {
  gel('qselectCount').textContent = '선택: ' + selectedQIds.length + ' / ' + TOTAL;
  gel('btnStart').disabled = (selectedQIds.length === 0);
}

function selectAllQ() {
  selectedQIds = [];
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    selectedQIds.push(ALL_QUESTIONS[i].id);
    var btn = gel('qb_' + ALL_QUESTIONS[i].id);
    if (btn) btn.classList.add('on');
  }
  updateQSelectCount();
}

function clearAllQ() {
  selectedQIds = [];
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    var btn = gel('qb_' + ALL_QUESTIONS[i].id);
    if (btn) btn.classList.remove('on');
  }
  mode = 'custom';
  clearAllCards();
  updateQSelectCount();
}

function invertQ() {
  for (var i = 0; i < ALL_QUESTIONS.length; i++) {
    var id = ALL_QUESTIONS[i].id;
    var pos = selectedQIds.indexOf(id);
    var btn = gel('qb_' + id);
    if (pos === -1) { selectedQIds.push(id); if(btn) btn.classList.add('on'); }
    else { selectedQIds.splice(pos, 1); if(btn) btn.classList.remove('on'); }
  }
  mode = 'custom';
  clearAllCards();
  updateQSelectCount();
}

/* 프리셋 선택하면 그리드도 연동 */
function syncGridToCount(n) {
  /* 전체 선택 후 그리드 표시만 업데이트 */
  selectAllQ();
}

function clearAllCards() {
  var cards = document.querySelectorAll('.opt-card');
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
}

function selectPreset(n, cardId) {
  mode = 'preset';
  selectedCount = n;
  clearAllCards();
  gel(cardId).classList.add('selected');
  gel('customCountInput').value = '';
  gel('customCountDisplay').innerHTML = '직접<br>입력';
  gel('rangeFrom').value = '';
  gel('rangeTo').value = '';
  gel('rangePreview').textContent = '';
  gel('customRangeRow').classList.remove('active');
  selectAllQ();
  gel('btnStart').disabled = false;
}

function focusCustomCount() { gel('customCountInput').focus(); }

function onCustomCountFocus() {
  mode = 'customCount';
  clearAllCards();
  gel('cardCustom').classList.add('selected');
  gel('rangeFrom').value = '';
  gel('rangeTo').value = '';
  gel('rangePreview').textContent = '';
  gel('customRangeRow').classList.remove('active');
  selectAllQ();
  var v = parseInt(gel('customCountInput').value);
  gel('btnStart').disabled = !(v >= 1 && v <= TOTAL);
}

function onCustomCountInput() {
  mode = 'customCount';
  clearAllCards();
  gel('cardCustom').classList.add('selected');
  selectAllQ();
  var v = parseInt(gel('customCountInput').value);
  if (v >= 1 && v <= TOTAL) {
    customCount = v;
    gel('customCountDisplay').innerHTML = '<span style="font-size:20px;font-weight:900;color:var(--accent)">' + v + '</span>';
    gel('btnStart').disabled = false;
  } else {
    customCount = 0;
    gel('customCountDisplay').innerHTML = '직접<br>입력';
    gel('btnStart').disabled = true;
  }
}

function onRangeInput() {
  mode = 'range';
  clearAllCards();
  gel('customCountInput').value = '';
  gel('customCountDisplay').innerHTML = '직접<br>입력';
  gel('customRangeRow').classList.add('active');
  var fv = gel('rangeFrom').value;
  var tv = gel('rangeTo').value;
  var f = parseInt(fv) || 0;
  var t = parseInt(tv) || 0;
  var preview = gel('rangePreview');
  if (!fv && !tv) {
    preview.textContent = '';
    preview.className = 'range-preview';
    gel('btnStart').disabled = true;
    gel('customRangeRow').classList.remove('active');
    return;
  }
  if (f < 1 || f > TOTAL || t < 1 || t > TOTAL || f > t) {
    preview.textContent = '범위 오류';
    preview.className = 'range-error';
    gel('btnStart').disabled = true;
  } else {
    preview.textContent = (t - f + 1) + '문제';
    preview.className = 'range-preview';
    rangeFrom = f; rangeTo = t;
    /* 그리드 연동 */
    selectedQIds = [];
    for (var i = 0; i < ALL_QUESTIONS.length; i++) {
      var id = ALL_QUESTIONS[i].id;
      var btn = gel('qb_' + id);
      if (id >= f && id <= t) { selectedQIds.push(id); if(btn) btn.classList.add('on'); }
      else { if(btn) btn.classList.remove('on'); }
    }
    gel('qselectCount').textContent = '선택: ' + selectedQIds.length + ' / ' + TOTAL;
    gel('btnStart').disabled = false;
  }
}

/* ── 시작 ── */
function startQuiz() {
  var pool = [];
  if (mode === 'custom') {
    /* 그리드에서 직접 고른 문제들, 순서 유지 */
    for (var i = 0; i < ALL_QUESTIONS.length; i++) {
      if (selectedQIds.indexOf(ALL_QUESTIONS[i].id) !== -1) pool.push(ALL_QUESTIONS[i]);
    }
  } else if (mode === 'range') {
    for (var i = 0; i < ALL_QUESTIONS.length; i++) {
      if (ALL_QUESTIONS[i].id >= rangeFrom && ALL_QUESTIONS[i].id <= rangeTo) pool.push(ALL_QUESTIONS[i]);
    }
  } else if (mode === 'customCount') {
    if (!customCount || customCount < 1 || customCount > TOTAL) return;
    pool = shuffle(ALL_QUESTIONS).slice(0, customCount);
  } else {
    /* preset: 전체에서 랜덤 N개 */
    pool = shuffle(ALL_QUESTIONS).slice(0, selectedCount);
  }
  if (!pool.length) return;
  quizQuestions = pool;
  currentIndex = 0;
  userAnswers = [];
  for (var i = 0; i < quizQuestions.length; i++) userAnswers.push(null);
  isMidResult = false; totalSeconds = 0;
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
  hide('startScreen'); show('quizScreen');
  renderQuestion();
}

function updateTimer() {
  totalSeconds = Math.floor((Date.now() - startTime) / 1000);
  var m = Math.floor(totalSeconds / 60); var s = totalSeconds % 60;
  gel('qTimer').textContent = '⏱ ' + (m<10?'0':'') + m + ':' + (s<10?'0':'') + s;
}

/* ── 문제 렌더 ── */
function renderQuestion() {
  var q = quizQuestions[currentIndex];
  var ua = userAnswers[currentIndex];
  answered = (ua !== null);
  selectedChoices = ua ? ua.selected.slice() : [];

  gel('qCounter').textContent = 'Q' + (currentIndex + 1) + ' / ' + quizQuestions.length;
  gel('progressFill').style.width = (currentIndex / quizQuestions.length * 100) + '%';
  gel('qTags').innerHTML =
    '<span class="q-tag">Q' + q.id + '</span>' +
    (q.multi ? '<span class="q-tag multi">복수 정답</span>' : '<span class="q-tag">단일 정답</span>');
  gel('qText').textContent = q.text;

  var list = gel('choicesList');
  list.innerHTML = '';
  var labels = ['A','B','C','D','E','F'];
  var correctArr = q.answer.split(',').sort();

  for (var i = 0; i < q.choices.length; i++) {
    (function(idx) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'choice-btn';
      var ls = document.createElement('span'); ls.className = 'choice-label'; ls.textContent = labels[idx];
      var ts = document.createElement('span'); ts.textContent = q.choices[idx];
      btn.appendChild(ls); btn.appendChild(ts);

      if (answered) {
        btn.disabled = true;
        var inCorrect = (correctArr.indexOf(labels[idx]) !== -1);
        var inUser = (selectedChoices.indexOf(labels[idx]) !== -1);
        if (inCorrect && inUser) { btn.classList.add('correct'); ls.style.color='var(--success)'; }
        else if (inCorrect) { btn.classList.add('reveal-correct'); ls.style.color='var(--success)'; }
        else if (inUser) { btn.classList.add('wrong'); ls.style.color='var(--error)'; }
      } else {
        if (selectedChoices.indexOf(labels[idx]) !== -1) btn.classList.add('selected');
        btn.onclick = function() { toggleChoice(idx, btn, q.multi); };
      }
      list.appendChild(btn);
    })(i);
  }

  /* 피드백 */
  var fb = gel('feedbackBox');
  if (answered && ua) {
    if (ua.skipped) { fb.className = 'feedback-box wrong-fb'; fb.textContent = '건너뛴 문제입니다. 정답: ' + correctArr.join(', '); }
    else if (ua.correct) { fb.className = 'feedback-box correct-fb'; fb.textContent = '✓ 정답입니다!'; }
    else { fb.className = 'feedback-box wrong-fb'; fb.textContent = '✗ 오답입니다. 정답: ' + correctArr.join(', '); }
  } else {
    fb.className = 'feedback-box';
    fb.textContent = '';
  }

  /* 해설 */
  var eb = gel('explainBox');
  if (answered && q.explanation) {
    eb.className = 'explain-box show';
    eb.innerHTML = '<div class="explain-title">해설</div>' + escapeHtml(q.explanation);
  } else {
    eb.className = 'explain-box';
    eb.innerHTML = '';
  }

  /* 버튼 상태 */
  gel('prevBtn').disabled = (currentIndex === 0);
  if (answered) {
    gel('submitBtn').style.display = 'none';
    gel('nextBtn').style.display = 'inline-block';
    gel('nextBtn').textContent = currentIndex < quizQuestions.length - 1 ? '다음 →' : '결과 보기 →';
  } else {
    gel('submitBtn').style.display = 'inline-block';
    gel('submitBtn').disabled = (selectedChoices.length === 0);
    gel('nextBtn').style.display = 'none';
  }
}

function toggleChoice(idx, btn, isMulti) {
  if (answered) return;
  var labels = ['A','B','C','D','E','F'];
  if (isMulti) {
    var pos = selectedChoices.indexOf(labels[idx]);
    if (pos === -1) { selectedChoices.push(labels[idx]); btn.classList.add('selected'); }
    else { selectedChoices.splice(pos, 1); btn.classList.remove('selected'); }
  } else {
    var btns = document.querySelectorAll('.choice-btn');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('selected');
    selectedChoices = [labels[idx]];
    btn.classList.add('selected');
  }
  gel('submitBtn').disabled = (selectedChoices.length === 0);
}

function submitAnswer() {
  if (!selectedChoices.length || answered) return;
  answered = true;
  var q = quizQuestions[currentIndex];
  var correctArr = q.answer.split(',').sort();
  var userArr = selectedChoices.slice().sort();
  var isCorrect = (JSON.stringify(correctArr) === JSON.stringify(userArr));
  userAnswers[currentIndex] = { selected: selectedChoices.slice(), correct: isCorrect };
  renderQuestion();
}

function skipQuestion() {
  if (answered) return;
  userAnswers[currentIndex] = { selected: [], correct: false, skipped: true };
  if (currentIndex < quizQuestions.length - 1) { currentIndex++; renderQuestion(); }
  else showResult(false);
}

function prevQuestion() {
  if (currentIndex > 0) { currentIndex--; renderQuestion(); }
}

function nextQuestion() {
  if (currentIndex < quizQuestions.length - 1) { currentIndex++; renderQuestion(); }
  else showResult(false);
}

function openModal(id) { gel(id).classList.add('open'); }
function closeModal(id) { gel(id).classList.remove('open'); }
function openHomeConfirm() { openModal('homeModal'); }
function confirmGoHome() { closeModal('homeModal'); goHome(); }

function openMidCheck() {
  var answeredCnt = 0, correct = 0, skipped = 0;
  for (var i = 0; i < userAnswers.length; i++) {
    if (userAnswers[i] !== null) { answeredCnt++; if(userAnswers[i].correct) correct++; if(userAnswers[i].skipped) skipped++; }
  }
  var wrong = answeredCnt - correct - skipped;
  gel('midSubText').textContent = '현재까지 ' + answeredCnt + '문제 풀었습니다. (남은: ' + (quizQuestions.length - answeredCnt) + '개)';
  gel('midGrid').innerHTML =
    '<div class="mid-stat"><div class="mid-stat-val green">'+correct+'</div><div class="mid-stat-lbl">정답</div></div>' +
    '<div class="mid-stat"><div class="mid-stat-val red">'+wrong+'</div><div class="mid-stat-lbl">오답</div></div>' +
    '<div class="mid-stat"><div class="mid-stat-val orange">'+skipped+'</div><div class="mid-stat-lbl">건너뜀</div></div>';
  openModal('midModal');
}

function finishFromMid() { closeModal('midModal'); showResult(true); }

function showResult(isMid) {
  clearInterval(timerInterval);
  isMidResult = isMid;
  hide('quizScreen'); show('resultScreen');
  var total = quizQuestions.length;
  var answeredArr = [], correct = 0, skipped = 0;
  for (var i = 0; i < userAnswers.length; i++) {
    if (userAnswers[i] !== null) { answeredArr.push(userAnswers[i]); if(userAnswers[i].correct) correct++; if(userAnswers[i].skipped) skipped++; }
  }
  var wrong = answeredArr.length - correct - skipped;
  var unanswered = total - answeredArr.length;
  var base = answeredArr.length > 0 ? answeredArr.length : 1;
  var pct = Math.round(correct / base * 100);
  var m = Math.floor(totalSeconds/60); var s = totalSeconds%60;
  var timeStr = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;

  gel('resultPct').textContent = pct + '%';
  gel('rCorrect').textContent = correct;
  gel('rWrong').textContent = wrong;
  gel('rSkipped').textContent = skipped + (unanswered > 0 ? '+' + unanswered : '');
  gel('rTime').textContent = timeStr;

  var grade, title;
  if (pct>=90){grade='합격 ★★★';title='훌륭합니다! 실전 준비 완료 🎉';}
  else if(pct>=75){grade='합격 ★★';title='잘 하셨습니다! 조금만 더 다듬어요 👍';}
  else if(pct>=60){grade='보통 ★';title='아쉽네요. 오답 문제를 복습해보세요 📚';}
  else{grade='불합격';title='더 공부가 필요합니다. 오답을 집중 복습하세요 💪';}
  gel('resultGrade').textContent = grade;
  gel('resultTitle').textContent = isMid ? '📊 중간 채점 결과' : title;
  gel('resultSub').textContent = (isMid?'('+answeredArr.length+'/'+total+'문제 응답 기준) ':'')+total+'문제 중 '+correct+'개 정답 · '+m+'분 '+s+'초';

  var circumference = 339.3;
  var offset = circumference - (pct / 100 * circumference);
  var ring = gel('ringFill');
  ring.style.strokeDashoffset = circumference;
  setTimeout(function() { ring.style.strokeDashoffset = offset; }, 50);

  var answeredCount = 0;
  for (var i = 0; i < userAnswers.length; i++) { if (userAnswers[i] !== null) answeredCount++; }
  gel('btnContinue').style.display = (isMid && (total - answeredCount) > 0) ? 'inline-block' : 'none';

  var wrongQs = [];
  for (var i = 0; i < userAnswers.length; i++) {
    if (userAnswers[i] && (!userAnswers[i].correct || userAnswers[i].skipped)) wrongQs.push({q:quizQuestions[i],a:userAnswers[i]});
  }
  var wl = gel('wrongList');
  if (!wrongQs.length) {
    wl.innerHTML = '<div style="text-align:center;color:var(--success);padding:20px;">🎉 모두 정답!</div>';
  } else {
    var html = '<div class="wrong-list-title">오답 목록 ('+wrongQs.length+'개)</div>';
    for (var i = 0; i < wrongQs.length; i++) {
      var q = wrongQs[i].q, a = wrongQs[i].a;
      var text = q.text.length > 70 ? q.text.substring(0,70)+'...' : q.text;
      var status = a.skipped ? '[건너뜀]' : '[오답: '+(a.selected.join(',')||'-')+' → 정답: '+q.answer+']';
      html += '<div class="wrong-item"><span class="wrong-qnum">Q'+q.id+'</span><span class="wrong-qtext">'+
        text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+
        '<br><small style="color:var(--error)">'+status+'</small></span></div>';
    }
    wl.innerHTML = html;
  }
}

function continueFromResult() {
  if (!isMidResult) return;
  var nextIdx = -1;
  for (var i = 0; i < quizQuestions.length; i++) { if (userAnswers[i] === null) { nextIdx = i; break; } }
  if (nextIdx === -1) nextIdx = currentIndex;
  currentIndex = nextIdx;
  hide('resultScreen'); show('quizScreen');
  startTime = Date.now() - totalSeconds * 1000;
  timerInterval = setInterval(updateTimer, 1000);
  isMidResult = false;
  renderQuestion();
}

function reviewWrong() {
  var wrongQs = [];
  for (var i = 0; i < userAnswers.length; i++) {
    if (userAnswers[i] && (!userAnswers[i].correct || userAnswers[i].skipped)) wrongQs.push(quizQuestions[i]);
  }
  if (!wrongQs.length) { goHome(); return; }
  quizQuestions = wrongQs; currentIndex = 0;
  userAnswers = [];
  for (var i = 0; i < quizQuestions.length; i++) userAnswers.push(null);
  isMidResult = false; totalSeconds = 0; startTime = Date.now();
  clearInterval(timerInterval); timerInterval = setInterval(updateTimer, 1000);
  hide('resultScreen'); show('quizScreen');
  renderQuestion();
}

function goHome() {
  clearInterval(timerInterval);
  totalSeconds = 0; isMidResult = false;
  hide('resultScreen'); hide('quizScreen');
  gel('rangeFrom').value=''; gel('rangeTo').value='';
  gel('rangePreview').textContent='';
  gel('customRangeRow').classList.remove('active');
  gel('customCountInput').value='';
  gel('customCountDisplay').innerHTML='직접<br>입력';
  show('startScreen');
}

/* ── 초기화 ── */
initQGrid();
</script>
</body>
</html>
