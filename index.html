  {"id": 54, "text": "한 기업이 AWS KMS 비대칭 키를 사용하는 코드 서명 솔루션을 구축해야 하며, 규정 준수 및 감사 목적으로 키 생성 및 사용에 대한 변경 불가능한 증거를 저장해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "choices": ["S3 객체 잠금이 활성화된 Amazon S3 버킷을 생성합니다. KMS 이벤트에 대한 로그 파일 유효성 검사가 활성화된 AWS CloudTrail 트레일을 생성합니다. 로그를 버킷에 저장하고 감사자에게 액세스 권한을 부여합니다.", "애플리케이션 이벤트를 Amazon CloudWatch Logs에 기록하고 내보냅니다.", "EventBridge를 사용하여 KMS API 호출을 캡처하고 DynamoDB에 저장합니다.", "CloudWatch 메트릭 및 대시보드를 사용하여 KMS 사용량을 추적합니다."], "answer": "A", "multi": false, "explanation": "AWS CloudTrail은 KMS 키 생성, 원본 및 사용에 대한 신뢰할 수 있는 기록을 제공합니다. 로그 파일 유효성 검사를 활성화하면 변조 감지가 보장됩니다. 규정 준수 모드의 S3 객체 잠금은 AWS 공인 보안 - 전문 자료에 인용된 핵심 감사 요구 사항인 불변성을 강화합니다. CloudWatch 및 DynamoDB는 규정 준수 증거에 적합한 불변 스토리지 보장을 제공하지 않습니다."},
  {"id": 55, "text": "한 회사가 매장 수를 늘리고 있습니다. 각 신규 매장이 문을 여는 날, 회사는 해당 매장 전용 웹 애플리케이션을 출시하려고 합니다. 각 매장의 애플리케이션은 비운영 환경과 운영 환경을 가지며, 각 환경은 별도의 AWS 계정에 배포될 예정입니다. 해당 회사는 AWS Organizations를 사용하고 있으며, 이러한 계정만을 위해 사용되는 OU(조직 단위)를 보유하고 있습니다. 이 회사는 대부분의 개발 작업을 외부 개발팀에 위탁합니다. 보안 엔지니어는 각 팀이 회사의 AWS 리소스 배포 계획을 준수하는지 확인해야 합니다. 또한 보안 엔지니어는 배포 계획에 대한 접근 권한을 필요한 개발자에게만 제한해야 합니다. 보안 엔지니어는 이미 해당 배포 계획을 구현하는 AWS CloudFormation 템플릿을 생성했습니다. 보안 엔지니어는 요구 사항을 가장 안전한 방식으로 충족하기 위해 다음에 무엇을 해야 할까요?", "choices": ["조직의 관리 계정에 AWS 서비스 카탈로그 포트폴리오를 생성합니다. CloudFormation 템플릿을 업로드합니다. 포트폴리오의 제품 목록에 템플릿을 추가합니다. 포트폴리오를 OU와 공유합니다.", "CloudFormation CLI를 사용하여 CloudFormation 템플릿에서 모듈을 생성합니다. CloudFormation 레지스트리에 모듈을 비공개 확장 프로그램으로 등록합니다. 확장 프로그램을 게시합니다. 확장 프로그램에 대한 액세스를 허용하는 SCP를 생성합니다.", "AWS 서비스 카탈로그 포트폴리오를 생성하고 계정 간 액세스를 위한 IAM 역할을 생성합니다. AWSServiceCatalogEndUserFullAccess 관리형 정책을 해당 역할에 연결합니다.", "CloudFormation CLI를 사용하여 모듈을 생성하고 확장 프로그램을 OU와 직접 공유합니다."], "answer": "A", "multi": false, "explanation": "AWS Service Catalog는 조직이 AWS 리소스를 대규모로 프로비저닝하는 방법을 관리하고 제어할 수 있도록 특별히 설계되었습니다. AWS 공인 보안 - 전문 분야 공식 연구 가이드에 따르면 서비스 카탈로그를 통해 관리자는 승인된 CloudFormation 템플릿을 제품으로 정의하고 해당 제품을 배포할 수 있는 계정, 사용자 또는 조직 단위를 제어할 수 있습니다. 보안 엔지니어는 마스터 계정에서 서비스 카탈로그 포트폴리오를 생성하고 이를 특정 OU와 공유함으로써 해당 OU 내의 계정만 승인된 인프라를 배포할 수 있도록 보장합니다. 타사 개발자는 사전 정의된 CloudFormation 템플릿을 통해서만 리소스를 배포할 수 있으며 일관성과 규정 준수를 적용하는 배포 계획을 변경할 수 없습니다. 또한 이 접근 방식은 개발자가 원시 템플릿이 아닌 서비스 카탈로그 제품과 상호 작용하기 때문에 배포 계획 자체에 대한 액세스를 제한합니다. 교차 계정 IAM 역할이나 과도한 권한이 필요하지 않으므로 공격 표면이 줄어듭니다."},
  {"id": 56, "text": "한 회사가 인터넷에 연결된 오픈 소스 소프트웨어 플랫폼을 운영하고 있습니다. 이 레거시 소프트웨어 플랫폼은 더 이상 보안 업데이트를 받지 않습니다. 이 플랫폼은 Amazon Route 53 가중치 로드 밸런싱을 사용하여 트래픽을 Amazon RDS 클러스터에 연결된 두 개의 Amazon EC2 인스턴스로 전송합니다. 최근 보고서에 따르면 이 소프트웨어 플랫폼이 SQL 인젝션 공격에 취약하며, 공격 샘플도 제공되었습니다. 회사의 보안 엔지니어는 24시간 이내에 SQL 인젝션 공격으로부터 시스템을 보호해야 합니다. 솔루션은 최소한의 노력으로 구현되어야 하며, 구현 중에도 정상적인 운영이 유지되어야 합니다. 보안 엔지니어는 이러한 요구 사항을 충족하기 위해 무엇을 해야 할까요?", "choices": ["기존 EC2 인스턴스를 대상 그룹으로 사용하여 애플리케이션 로드 밸런서(ALB)를 생성합니다. 이 공격으로부터 애플리케이션을 보호하는 규칙이 포함된 AWS WAF 웹 ACL을 생성한 다음, 이를 ALB에 적용합니다. 취약점이 완화되었는지 테스트한 후, Route 53 레코드가 ALB를 가리키도록 리디렉션합니다. 인터넷에서 직접 접근을 차단하도록 EC2 인스턴스의 보안 그룹을 업데이트합니다.", "EC2 인스턴스 하나를 오리진으로 지정하여 Amazon CloudFront 배포를 생성합니다. 이 공격으로부터 애플리케이션을 보호하는 규칙이 포함된 AWS WAF 웹 ACL을 생성한 다음, 해당 배포에 적용합니다. 취약점이 완화되었는지 테스트한 후, Route 53 레코드를 CloudFront를 가리키도록 리디렉션합니다.", "플랫폼의 최신 소스 코드를 가져와 필요한 업데이트를 수행합니다. 업데이트된 코드를 테스트하여 취약점이 완화되었는지 확인한 후 패치된 버전의 플랫폼을 EC2 인스턴스에 배포합니다.", "EC2 인스턴스에 연결된 보안 그룹을 업데이트하여 SQL 데이터베이스에서 사용하는 TCP 포트에 대한 인터넷 액세스를 차단합니다. 이 공격으로부터 애플리케이션을 보호하는 규칙이 포함된 AWS WAF 웹 ACL을 생성한 다음 EC2 인스턴스에 적용합니다. 취약점이 완화되었는지 테스트한 후 보안 그룹을 원래 설정으로 복원합니다."], "answer": "A", "multi": false, "explanation": "AWS WAF는 애플리케이션 코드를 수정하지 않고도 SQL 주입과 같은 일반적인 웹 공격을 즉시 완화할 수 있는 관리형 및 사용자 지정 규칙을 제공합니다. AWS 공인 보안 전문 문서에 따르면, AWS WAF를 Application Load Balancer 앞에 배치하는 것은 알려진 취약점이 있는 레거시 애플리케이션에 대한 신속한 대응 제어로 권장됩니다. 기존 EC2 인스턴스 앞에 ALB를 생성하면 원활한 트래픽 마이그레이션이 가능합니다. AWS WAF SQL 주입 규칙은 가동 중지 시간 없이 배포 및 테스트될 수 있습니다. ALB를 가리키도록 Route 53을 업데이트하면 정상적인 운영이 유지됩니다. 나중에 EC2 보안 그룹을 제한하면 WAF 우회가 방지됩니다."},
  {"id": 57, "text": "한 회사가 호스팅된 UI와 함께 Amazon Cognito 사용자 풀을 사용하여 고객을 인증합니다. 회사 보안팀은 아마존 코그니토 엔드포인트를 대상으로 하는 봇 활동 및 의심스러운 트래픽이 급증하는 것을 감지했습니다. 보안 엔지니어는 이러한 악성 요청을 차단하는 보안 솔루션을 구현해야 합니다. 이 보안 조치는 정당한 사용자의 접근을 중단 없이 유지해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "choices": ["사용자 풀에 Amazon Cognito 위협 보호 기능을 사용합니다.", "인증된 사용자만 액세스할 수 있도록 Amazon Cognito 사용자 풀 앱 클라이언트 설정을 구성합니다.", "AWS WAF 웹 ACL을 Amazon Cognito 사용자 풀과 연결합니다. 원치 않는 요청을 필터링하고 봇 트래픽을 관리하는 규칙을 정의합니다.", "Amazon CloudWatch를 사용하여 수신되는 Amazon Cognito 요청을 모니터링합니다. 의심스러운 사용자 에이전트를 차단하기 위해 ID 풀을 생성합니다."], "answer": "C", "multi": false, "explanation": "AWS WAF는 Amazon Cognito 사용자 풀과 직접 연결될 수 있습니다. 웹 ACL은 Cognito 호스팅 UI, 관리형 로그인 및 API 엔드포인트가 처리하는 HTTPS 요청에 대한 세밀한 제어를 제공합니다. 이는 원치 않는 요청, 봇 트래픽, 의심스러운 사용자 에이전트, IP 패턴 및 악의적인 요청 행동을 차단하면서 합법적인 사용자의 접근을 유지하는 올바른 방법입니다. Cognito 위협 방지는 적응 인증 및 탈취된 자격 증명 스타일 위험을 목표로 하며, 엔드포인트 계층에서 봇 트래픽에 대한 광범위한 요청 필터링을 위한 것은 아닙니다. 앱 클라이언트 설정은 Cognito 엔드포인트에 도달하기 전에 인증되지 않은 악의적인 요청을 차단할 수 없습니다. CloudWatch는 활동을 모니터링할 수 있지만 자체적으로 차단을 실행하지는 않습니다. AWS WAF는 이러한 엣지 지향 요청 필터링 요구 사항을 위해 특별히 설계된 예방적 제어 수단입니다."},
  {"id": 58, "text": "한 회사가 애플리케이션 로드 밸런서(ALB) 뒤에 있는 Amazon EC2 인스턴스에 자사 웹사이트를 호스팅하고 있습니다. 해당 웹사이트는 특정 IoT 기기 브랜드의 고유한 사용자 에이전트를 사용하는 글로벌 DDoS 공격을 받고 있습니다. 보안 엔지니어가 AWS WAF 웹 ACL을 생성하고 이를 ALB와 연결하려고 합니다. 보안 엔지니어는 웹 ACL의 일부로 요청을 차단하는 규칙문을 구현해야 합니다. 이 규칙문은 고객의 요청을 차단하지 않으면서 해당 IoT 장치에서 발생하는 현재 및 미래의 공격을 완화해야 합니다. 어떤 규칙 설명이 이러한 요구 사항을 충족할까요?", "choices": ["사용자 에이전트에서 IoT 장치의 IP 주소를 포함하는 IP 세트 일치 규칙 문을 사용합니다.", "지리적 일치 규칙 문을 사용하십시오. IoT 장치가 위치한 국가를 차단하도록 규칙을 구성하십시오.", "속도 기반 규칙문을 사용하십시오. IoT 장치에서 들어오는 요청 수와 동일한 속도 제한을 설정하십시오.", "사용자 에이전트에서 제공하는 IoT 장치 브랜드 정보를 포함하는 문자열 일치 규칙문을 사용합니다."], "answer": "D", "multi": false, "explanation": "AWS WAF는 보안 엔지니어가 HTTP 헤더(예: User-Agent 헤더)를 포함한 웹 요청의 특정 부분을 검사하는 문자열 일치 규칙 문(statement)을 생성할 수 있도록 합니다. AWS 공인 보안 - 전문 자격 스터디 가이드와 AWS WAF 문서에 따르면, 문자열 일치 규칙은 특정 봇이나 IoT 장치 브랜드와 연관된 고유한 사용자 에이전트와 같은 알려진 악성 식별자가 포함된 요청을 차단하는 데 이상적입니다. 이 시나리오에서는 공격이 고유한 사용자 에이전트를 사용하는 특정 IoT 장치 브랜드에서 발생합니다. User-Agent 헤더를 검사하는 문자열 일치 규칙은 정상적인 고객 트래픽은 계속 허용하면서 악성 요청을 정확히 차단할 수 있습니다. 이러한 접근 방식은 동일한 장치 시그니처에서 발생하는 현재 및 미래의 공격에 대해 목표 지향적인 완화를 제공합니다."},
  {"id": 59, "text": "보안 엔지니어는 Amazon S3 버킷에 저장된 민감한 데이터를 식별하는 솔루션을 구현해야 합니다. 이 솔루션은 기존 Amazon Simple Notification Service(Amazon SNS) 토픽을 사용하여 S3 버킷에 있는 민감한 데이터에 대한 보고서를 생성해야 합니다. 어떤 솔루션이 최소한의 구현 노력으로 이러한 요구 사항을 충족할까요?", "choices": ["AWS Config를 활성화합니다. S3 버킷의 민감한 데이터를 모니터링하고 SNS 주제로 알림을 보내도록 AWS Config를 구성합니다.", "패턴과 일치하는 민감한 데이터를 찾기 위해 S3 버킷을 스캔하는 AWS Lambda 함수를 생성합니다. 람다 함수를 프로그래밍하여 SNS 주제로 알림을 보내도록 하세요.", "Amazon Macie가 관리형 데이터 식별자를 사용하여 민감한 데이터를 식별하고 분류하도록 구성합니다. Amazon EventBridge 규칙을 생성하여 SNS 주제로 알림을 보내도록 합니다.", "Amazon GuardDuty를 활성화합니다. AWS CloudTrail S3 데이터 이벤트를 구성합니다. GuardDuty에서 발견된 사항에 반응하여 SNS 토픽으로 알림을 보내는 Amazon CloudWatch 알람을 생성합니다."], "answer": "C", "multi": false, "explanation": "Amazon Macie는 Amazon S3에 저장된 중요한 데이터를 검색, 분류 및 보고하도록 특별히 설계된 AWS 서비스입니다. AWS 공인 보안 - 전문 분야 연구 가이드에 따르면 Macie는 기계 학습 및 관리형 데이터 식별자를 사용하여 PII 및 금융 정보와 같은 민감한 데이터 유형을 자동으로 감지합니다. Macie는 기본적으로 Amazon EventBridge와 통합되어 최소한의 구성으로 결과를 Amazon SNS와 같은 다른 서비스로 라우팅할 수 있습니다. Macie 결과를 기존 SNS 주제에 전달하는 EventBridge 규칙을 생성하면 사용자 지정 코드 없이 알림 요구 사항이 충족됩니다. AWS Config는 객체 콘텐츠를 검사하지 않으므로 옵션 A는 유효하지 않습니다. 옵션 B에는 맞춤형 개발과 지속적인 유지 관리가 필요합니다. Amazon GuardDuty는 민감한 데이터 검색이 아닌 위협 감지에 중점을 두기 때문에 옵션 D는 올바르지 않습니다. AWS 설명서에서는 Macie가 S3의 민감한 데이터 식별을 위한 가장 간편하고 정확한 솔루션임을 강조합니다."},
  {"id": 60, "text": "한 회사가 운영 중인 애플리케이션을 호스팅하는 AWS 계정을 보유하고 있습니다. 이 회사는 Amazon GuardDuty에서 해당 계정에서 Impact:IAMUser/AnomalousBehavior 유형의 보안 사고가 감지되었다는 이메일 알림을 받았습니다. 보안 엔지니어는 애플리케이션에 영향을 주지 않고 이 보안 사고에 대한 조사 플레이북을 실행하고 정보를 수집 및 분석해야 합니다. 어떤 솔루션이 이러한 요구 사항을 가장 빠르게 충족할까요?", "choices": ["읽기 전용 자격 증명을 사용하여 AWS 계정에 로그인합니다. 사용된 IAM 자격 증명에 대한 자세한 내용은 GuardDuty 발견 사항을 검토하십시오. IAM 콘솔을 사용하여 IAM 주체에 DenyAll 정책을 추가합니다.", "읽기 전용 자격 증명을 사용하여 AWS 계정에 로그인합니다. GuardDuty 발견 사항을 검토하여 어떤 API 호출이 발견을 유발했는지 확인합니다. Amazon Detective를 사용하여 API 호출을 컨텍스트 내에서 검토합니다.", "관리자 자격 증명을 사용하여 AWS 계정에 로그인합니다. 사용된 IAM 자격 증명에 대한 자세한 내용은 GuardDuty 결과를 검토하십시오. IAM 콘솔을 사용하여 IAM 주체에 DenyAll 정책을 추가합니다.", "읽기 전용 자격 증명을 사용하여 AWS 계정에 로그인합니다. GuardDuty 발견 사항을 검토하여 어떤 API 호출이 발견 사항을 유발했는지 확인합니다. AWS CloudTrail Insights 및 AWS CloudTrail Lake를 사용하여 API 호출을 컨텍스트 내에서 검토합니다."], "answer": "B", "multi": false, "explanation": "Amazon GuardDuty 결과는 의심스러운 활동에 대한 높은 수준의 탐지 기능을 제공하지만 자체적으로 심층 조사하도록 설계되지 않았습니다. AWS 공인 보안 – 전문 문서에서는 Amazon Detective가 GuardDuty, AWS CloudTrail 및 VPC 흐름 로그에서 데이터를 자동으로 수집, 상관 관계 분석 및 시각화하여 신속한 조사를 지원하도록 특별히 구축되었다고 설명합니다. Detective를 사용하면 보안 엔지니어는 환경을 변경하지 않고도 상황에 맞게 API 호출, 사용자 행동, 리소스 상호 작용을 분석할 수 있습니다. 읽기 전용 자격 증명을 사용하면 조사가 프로덕션 애플리케이션에 영향을 주지 않습니다. Amazon Detective를 사용하면 조사관은 GuardDuty 결과에서 자세한 활동 그래프로 직접 전환하여 어떤 IAM 사용자가 비정상적인 호출을 했는지, 어떤 리소스에 액세스했는지, 행동이 기준에서 어떻게 벗어났는지 확인할 수 있습니다. 이로 인해 사건 조사가 크게 가속화됩니다. 옵션 A와 C에는 억제 조치이며 애플리케이션 가용성에 영향을 미칠 수 있는 DenyAll 정책 적용이 포함됩니다. 옵션 D는 수동 분석 및 설정이 필요하며 즉각적인 조사 워크플로를 위해 설계된 Amazon Detective를 사용하는 것보다 속도가 느립니다. AWS 사고 대응 지침에서는 GuardDuty 결과를 확인한 후 빠르고 비침해적인 분석을 위해 Detective를 사용할 것을 권장합니다."},
  {"id": 61, "text": "한 회사가 악성코드에 감염된 Amazon EC2 호스트를 격리하기 위한 사고 대응 프로세스를 개발하고 있습니다. 이 회사는 AWS Organizations의 조직을 사용하여 여러 AWS 계정을 관리합니다. 또한, 여러 AWS 리전에 걸쳐 실행되는 여러 계정의 탐지 결과를 수신하도록 조직 내에 AWS Security Hub를 구성했습니다. 보안 엔지니어는 악성코드 감염이 의심되는 모든 EC2 인스턴스에 대해 모든 보안 그룹에서 모든 규칙을 제거하는 AWS Lambda 함수를 개발했습니다. Security Hub에서 Lambda 함수를 사용자 지정 작업으로 배포하고 사용하려면 다음 목록에서 올바른 단계를 선택하고 순서대로 정렬하십시오. 각 단계를 한 번씩 선택하거나 선택하지 않아도 됩니다. (총 세 단계를 선택하고 순서대로 정렬하십시오.)", "choices": ["Security Hub에서 Lambda 함수를 사용하는 사용자 지정 작업을 생성합니다.", "Amazon EventBridge 규칙에 필터 세트를 생성하고 Security Hub에 적용합니다.", "Amazon EventBridge에서 규칙을 정의합니다.", "EC2 호스트 발견 항목에 대해 Security Hub에서 사용자 지정 작업을 선택합니다.", "보안 그룹 검사 결과에 대해 Security Hub에서 사용자 지정 작업을 선택합니다."], "answer": "A,C,D", "multi": true, "explanation": "1. Security Hub에서 Lambda 함수를 사용하는 사용자 지정 작업을 생성합니다. 2. Amazon EventBridge에서 규칙을 정의합니다. 3. EC2 호스트 발견 항목에 대해 Security Hub에서 사용자 지정 작업을 선택합니다. 사용자 지정 작업으로 격리 트리거를 만들고, EventBridge가 해당 이벤트를 수신해 Lambda를 호출한 뒤, 관련 EC2 발견 항목에서 작업을 실행합니다."},
  {"id": 62, "text": "한 회사가 AWS Organizations에서 조직을 사용하여 여러 AWS 계정을 관리합니다. 보안 엔지니어가 us-east-1 리전의 AWS Firewall Manager에서 WAF 정책을 생성합니다. 보안 엔지니어는 해당 정책의 적용 범위를 조직 내 멤버 계정 중 하나에서 WAF-protected:true 태그가 지정된 리소스로 설정합니다. 마지막으로, 보안 엔지니어는 규정을 준수하지 않는 리소스를 자동으로 수정하는 구성을 설정합니다. 보안 엔지니어가 회원 계정에서 웹 ACL을 사용하여 us-east-1 리전에 있는 Amazon API Gateway REST API를 보호하려고 시도했습니다. 그러나 몇 분이 지나도 REST API는 웹 ACL과 연결되지 않았습니다. 이 문제의 원인은 무엇일까요?", "choices": ["웹 ACL은 REST API에 적용할 수 없습니다.", "REST API에 WAF 보호 키가 포함된 태그와 true 값이 누락되었습니다.", "웹 ACL이 이미 다른 REST API와 연결되어 있습니다.", "웹 ACL이 이미 Amazon CloudFront 배포와 연결되어 있습니다."], "answer": "B", "multi": false, "explanation": "AWS Firewall Manager는 사용자가 정의한 정책 범위에 따라 AWS WAF 보호를 적용하고 시행합니다. 이 시나리오에서 정책은 명시적으로 태그 키가 WAF-protected이고 값이 true인 리소스에만 범위가 지정되어 있습니다. API Gateway REST API에 정확히 그 태그(올바른 키, 올바른 값, 올바른 철자/대소문자)가 없으면, Firewall Manager는 해당 리소스를 범위 외로 간주합니다. 범위 외 리소스는 규정 준수 평가를 받지 않으며 수정되지 않기 때문에 웹 ACL의 자동 연결은 발생하지 않습니다. 이것은 Firewall Manager가 태그 기반 범위로 구성될 때 \"아무 일도 일어나지 않는\" 가장 일반적인 이유입니다: 리소스에 태그가 없거나, 값이 다르거나(예: \"True\" vs \"true\"), 태그가 Firewall Manager가 평가하는 리소스가 아닌 다른 리소스에 적용된 경우입니다."},
  {"id": 63, "text": "한 회사가 Apache 웹 서버에서 웹 애플리케이션을 호스팅하고 있습니다. 이 애플리케이션은 Auto Scaling 그룹에 속한 Amazon EC2 인스턴스에서 실행됩니다. 회사는 EC2 인스턴스가 Apache 웹 서버 로그를 Amazon CloudWatch Logs 그룹으로 전송하도록 구성했으며, 해당 로그는 1년 후 만료되도록 설정했습니다. 최근 한 회사가 아파치 웹 서버 로그에서 특정 IP 주소가 웹 애플리케이션에 의심스러운 요청을 보내고 있음을 발견했습니다. 보안 엔지니어는 해당 IP 주소가 보낸 요청 횟수와 요청한 URL을 파악하기 위해 지난 한 주 동안의 아파치 웹 서버 로그를 분석하고자 합니다. 보안 엔지니어는 최소한의 노력으로 이러한 요구 사항을 충족하기 위해 무엇을 해야 할까요?", "choices": ["CloudWatch Logs 그룹 데이터를 Amazon S3로 내보냅니다. Amazon Macie를 사용하여 특정 IP 주소와 요청된 URL에 대한 로그를 조회합니다.", "CloudWatch Logs 구독을 구성하여 로그 그룹을 Amazon OpenSearch Service 클러스터로 스트리밍합니다. OpenSearch Service를 사용하여 특정 IP 주소 및 요청된 URL에 대한 로그를 분석합니다.", "CloudWatch Logs Insights와 사용자 지정 쿼리 구문을 사용하여 특정 IP 주소 및 요청된 URL에 대한 CloudWatch 로그를 분석합니다.", "CloudWatch Logs 그룹 데이터를 Amazon S3로 내보냅니다. AWS Glue를 사용하여 S3 버킷에서 특정 IP 주소가 포함된 로그 항목만 크롤링합니다. AWS Glue를 사용하여 결과를 확인합니다."], "answer": "C", "multi": false, "explanation": "CloudWatch Logs Insights는 이미 CloudWatch Logs에 저장된 로그 데이터를 대화형으로 검색하고 분석할 수 있도록 만들어졌습니다. Apache 로그는 이미 CloudWatch 로그 그룹에 있으므로, 가장 적은 노력으로 해결하는 방법은 이전 주 동안의 로그에 대해 Logs Insights 쿼리를 실행하고, 의심스러운 IP 주소로 필터링하며, 요청된 URL 필드를 파싱하거나 표시하고, 통계를 사용하여 요청 수를 계산하는 것입니다. 로그를 S3로 내보내거나, Glue로 크롤링하거나, OpenSearch로 스트리밍하는 것은 추가 서비스, 지연 및 운영 부담을 가져옵니다. Macie는 S3에서 민감한 데이터를 발견하기 위한 것이지, 로그 쿼리 분석을 위한 것이 아닙니다. Logs Insights는 이 정확한 조사 사용 사례를 위해 필터링, 파싱, 집계 및 표시를 직접 지원합니다."},
  {"id": 64, "text": "한 회사가 AWS 계정에서 Amazon Made, AWS Firewall Manager, Amazon Inspector 및 AWS Shield Advanced를 사용하고 있습니다. 이 회사는 계정에 대한 DDoS 공격이 발생할 경우 알림을 받고 싶어합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["Macie를 사용하여 활성 DDoS 이벤트를 감지합니다. Macie에서 감지한 내용에 따라 Amazon CloudWatch 알람을 생성합니다.", "Amazon Inspector를 사용하여 리소스를 검토하고 DDoS 공격에 취약한 리소스에 대해 Amazon CloudWatch 경보를 호출하세요.", "활성 DDoS 이벤트에 대한 방화벽 관리자 메트릭을 모니터링하는 Amazon CloudWatch 알람을 생성합니다.", "활성 DDoS 이벤트에 대한 Shield Advanced 메트릭을 모니터링하는 Amazon CloudWatch 알람을 생성합니다."], "answer": "D", "multi": false, "explanation": "AWS Shield Advanced는 진행 중인 공격을 나타내는 특정 CloudWatch 지표를 포함하여 DDoS 공격에 대한 내장 감지 및 가시성을 제공합니다. CloudWatch 경보로 이러한 지표를 모니터링하면 DDoS 이벤트가 감지될 때 회사가 거의 실시간으로 알림을 받을 수 있습니다."},
  {"id": 65, "text": "한 회사의 웹 기반 애플리케이션이 애플리케이션 로드 밸런싱(ALB) 뒤에서 실행되고 있습니다. 이 애플리케이션은 자격 증명 스터핑 공격을 받고 있으며, 이로 인해 수많은 로그인 시도가 실패하고 있습니다. 공격은 여러 IP 주소에서 발생하고 있으며, 로그인 시도에는 알려진 모바일 기기 에뮬레이터의 사용자 에이전트 문자열이 사용되고 있습니다. 보안 엔지니어는 자격 증명 스터핑 공격을 완화하기 위한 솔루션을 구현해야 합니다. 해당 솔루션은 애플리케이션에 대한 정상적인 로그인을 계속 허용해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["지정된 사용자 에이전트 문자열이 포함된 로그인 시도에 반응하는 Amazon CloudWatch 알람을 생성합니다. 알람에 Amazon Simple Notification Service(Amazon SNS) 토픽을 추가합니다.", "ALB의 인바운드 보안 그룹을 수정하여 공격에 연루된 IP 주소에서 오는 트래픽을 차단하십시오.", "ALB용 AWS WAF 웹 ACL을 생성합니다. 디바이스 에뮬레이터의 사용자 에이전트 문자열을 포함하는 요청을 차단하는 사용자 지정 규칙을 생성합니다.", "ALB용 AWS WAF 웹 ACL을 생성합니다. 유효한 사용자 에이전트 문자열에서 오는 요청을 허용하는 사용자 지정 규칙을 생성합니다."], "answer": "C", "multi": false, "explanation": "ALB에서의 크리덴셜 스터핑 공격은 레이어 7 문제이며 AWS WAF로 가장 효과적으로 완화할 수 있습니다. 공격자가 여러 IP에 분산되어 있기 때문에 보안 그룹에서 IP로 차단하는 것(옵션 B)은 효과적이지 않고 운영상 부담이 큽니다. CloudWatch 알람(옵션 A)은 알림만 제공하며 요청을 차단하거나 완화하지 않습니다. 악성 트래픽이 모바일 장치 에뮬레이터와 연관된 특징적이고 알려진 User-Agent 문자열을 사용하기 때문에, AWS WAF는 User-Agent 헤더를 검사하고 일치하는 요청을 차단하여 공격을 신속하게 줄일 수 있습니다. 이 접근 방식은 목표가 명확합니다: 에뮬레이터 User-Agent를 표시하지 않는 정상 사용자는 계속 로그인할 수 있도록 허용하면서 식별된 자동화 공격 패턴만 차단합니다. WAF 규칙은 기존 ALB에 연결된 웹 ACL에 즉시 배포할 수 있으며, 오탐지를 최소화하기 위해 추가로 세분화할 수도 있습니다(예: /login 경로에만 적용, 속도 기반 규칙과 결합, 또는 Bot Control과 통합)."},
  {"id": 66, "text": "일부 사용자의 경우 권한 불일치로 인해 CloudFormation 스택 배포가 실패합니다. 다음 단계 조합 중 어떤 것이 가장 안전하게 일관된 배포를 보장합니까? (세 가지를 선택하십시오.)", "choices": ["복합 주 서비스 역할을 생성합니다.", "cloudformation.amazonaws.com을 주체로 하는 서비스 역할을 생성합니다.", "서비스 역할에 범위 지정 정책을 연결합니다.", "정책 리소스에 서비스 ARN을 연결합니다.", "각 스택이 서비스 역할을 사용하도록 업데이트합니다.", "서비스 역할에 iam:PassRole을 허용합니다."], "answer": "B,E,F", "multi": true, "explanation": "AWS 모범 사례에서는 CloudFormation이 전용 서비스 역할을 맡도록 요구합니다. 이를 통해 사용자에 관계없이 일관된 권한이 보장됩니다. 역할을 전달하려면 사용자에게 iam:PassRole 권한이 있어야 합니다. 서비스 역할을 사용하도록 스택을 업데이트하면 균일한 배포 동작이 적용됩니다."},
  {"id": 67, "text": "컨설팅 회사가 한 회사의 운영 AWS 계정에 대한 보안 감사를 수행해야 합니다. 여러 명의 컨설턴트가 해당 계정에 접근해야 합니다. 컨설팅 회사는 이미 자체 AWS 계정을 보유하고 있습니다. 해당 회사는 운영 계정에 대한 모든 접근에 다단계 인증(MFA)을 요구하며, 장기 사용 계정 정보 사용을 금지하고 있습니다. 어떤 솔루션이 컨설팅 기관에 이러한 요구 사항을 충족하는 접근 권한을 제공할까요?", "choices": ["IAM 그룹을 생성합니다. 각 컨설턴트별로 IAM 사용자를 생성합니다. 각 사용자를 그룹에 추가합니다. 각 컨설턴트에 대해 MFA를 활성화합니다.", "컨설팅 회사의 ID 공급자(IdP)를 통해 인증하도록 회사 운영 계정에서 Amazon Cognito를 구성합니다. Cognito 사용자 풀에 MFA를 추가합니다.", "컨설팅 회사의 AWS 계정에 IAM 역할을 생성합니다. MFA를 요구하는 신뢰 정책을 정의합니다. 신탁 정책에서 회사의 운영 계정을 주 계정으로 지정합니다. 해당 신탁 정책을 역할에 연결합니다.", "회사 운영 계정에 IAM 역할을 생성합니다. MFA(다단계 인증)를 요구하는 신뢰 정책을 정의합니다. 신뢰 정책에서 컨설팅 회사의 AWS 계정을 주체로 지정합니다. 신뢰 정책을 역할에 연결합니다."], "answer": "D", "multi": false, "explanation": "AWS 모범 사례에서는 장기 자격 증명 사용을 강력히 권장하며, 타사 액세스를 위한 임시 자격 증명이 있는 교차 계정 IAM 역할을 권장합니다. AWS 공인 보안 - 전문 분야 연구 가이드에 따르면 리소스 소유 계정에 IAM 역할을 생성하고 신뢰할 수 있는 외부 AWS 계정이 해당 역할을 외부 액세스에 권장되는 패턴으로 가정하도록 허용합니다. 회사의 프로덕션 계정에 IAM 역할을 생성하고 컨설턴트 기관의 AWS 계정을 신뢰할 수 있는 주체로 지정함으로써 회사는 권한에 대한 모든 권한을 유지합니다. 신뢰 정책은 aws:MultiFactorAuthPresent 조건 키를 사용하여 MFA를 시행하여 모든 액세스에 MFA가 필요하도록 보장할 수 있습니다. 단기 자격 증명을 발급하는 AWS Security Token Service(STS)를 통해 액세스 권한이 부여됩니다. 옵션 A는 장기 자격 증명을 방지하기 위한 요구 사항을 위반합니다. 옵션 B는 AWS 계정 액세스가 아닌 애플리케이션 사용자 인증을 위해 설계되었습니다. 옵션 C는 컨설턴트의 계정에 역할을 잘못 배치하여 회사의 액세스 제어를 감소시킵니다. 이 솔루션은 MFA 시행을 충족하고 장기 자격 증명을 제거하며 AWS 타사 액세스 모범 사례에 부합합니다."},
  {"id": 68, "text": "한 기업에서 AWS 계정의 보안 취약점에 대한 근본 원인을 파악할 수 있어야 합니다. 해당 기업은 VPC Flow Logs, Amazon GuardDuty 및 AWS CloudTrail을 활성화했습니다. 기업은 보안 취약점과 관련된 모든 IAM 역할을 조사하고 그 결과를 시각화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon Detective를 사용하여 IAM 역할에 대한 조사를 실행하고 결과를 시각화할 수 있습니다.", "Amazon Inspector를 사용하여 IAM 역할에 대한 조사를 실행하고 결과를 시각화합니다.", "GuardDuty 결과를 Amazon S3로 내보내고 Amazon Athena로 분석하세요.", "AWS Security Hub를 활성화하고 사용자 지정 작업을 사용하여 IAM 역할을 조사합니다."], "answer": "A", "multi": false, "explanation": "Amazon Detective는 Amazon GuardDuty, AWS CloudTrail, VPC Flow Logs의 데이터를 자동으로 상관하여 보안 발견 사항을 조사하고 분석하도록 특별히 설계된 관리형 서비스입니다. AWS 공인 보안 - 전문(AWS Certified Security - Specialty) 공식 학습 가이드에 따르면, Detective는 보안 팀이 대화형 시각화를 통해 근본 원인, 이상 행동, 그리고 침해 지표를 식별할 수 있도록 합니다. Amazon Detective를 사용하면 조사관이 GuardDuty 발견 사항에 관련된 IAM 역할, 사용자 및 리소스로 직접 이동할 수 있습니다. Detective는 API 활동, 네트워크 트래픽 및 과거 맥락을 보여주는 행동 그래프와 타임라인을 생성하여 보안 사건이 어떻게 그리고 왜 발생했는지 이해하기 쉽게 만듭니다."},
  {"id": 69, "text": "최근 한 회사가 클라우드 기반 환경에 대한 악의적인 공격을 받았습니다. 회사는 공격을 성공적으로 차단하고 제거했습니다. 현재 보안 엔지니어가 사고 대응 작업을 진행하고 있습니다. 보안 엔지니어는 Amazon RDS 데이터베이스 클러스터를 마지막으로 정상 작동했던 버전으로 복구해야 합니다. 해당 데이터베이스 클러스터는 14일 동안 보존되는 자동 백업을 생성하도록 구성되어 있습니다. 최초 공격은 5일 전 오후 3시 15분에 발생했습니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["데이터베이스의 리전 클러스터 ARN을 확인합니다. 해당 ARN을 사용하여 특정 시점으로 복원 기능을 통해 리전 클러스터를 복원합니다. 대상 시간을 5일 전 오후 3시 14분으로 설정합니다.", "데이터베이스의 리전 클러스터 ARN을 식별합니다. 클러스터에서 생성된 스냅샷 목록을 표시합니다. 5일 전 오후 3시 14분에 생성된 스냅샷을 사용하여 데이터베이스를 복원하십시오.", "회사 RDS 데이터베이스의 모든 스냅샷 목록을 표시합니다. 5일 전 오후 3시 14분에 생성된 스냅샷을 찾아 복원합니다.", "데이터베이스의 리전 클러스터 ARN을 확인합니다. 해당 ARN을 사용하여 특정 시점으로 복원 기능을 통해 리전 클러스터를 복원합니다. 복원 대상 시간을 14일 전으로 설정합니다."], "answer": "A", "multi": false, "explanation": "Amazon RDS는 구성된 보존 기간 내에서 자동 백업을 사용하여 특정 시점 복구(PITR)를 지원합니다. AWS 공인 보안 - 전문 분야 연구 가이드에 따르면 PITR은 보존 기간 내 어느 순간이라도 복구할 수 있으므로 보안 사고 후 가장 정확한 복구 방법입니다. 보안 엔지니어는 공격이 발생하기 직전 시점(예: 오후 3시 14분)으로 데이터베이스 클러스터를 복원함으로써 복원된 데이터베이스가 악의적인 변경 사항을 포함하지 않고 마지막으로 알려진 양호한 상태를 반영하는지 확인합니다. 이 방법은 고정된 간격으로 생성되고 정확한 복구 시간과 일치하지 않을 수 있는 스냅샷에서 복원하는 것보다 더 정확합니다. 옵션 B와 C는 스냅샷 타이밍에 의존하며 손상된 데이터를 다시 가져올 수 있습니다. 옵션 D는 임의의 시간으로 복원하며 마지막으로 알려진 양호한 버전으로 복구하기 위한 요구 사항을 충족하지 않습니다. AWS 설명서에서는 정확한 복원이 필요한 사고 대응 시나리오에 대해 특정 시점 복구를 명시적으로 권장합니다."},
  {"id": 70, "text": "한 기업에서 수백 개의 AWS 계정에 걸쳐 자동 감지 기능을 갖춘 중앙 집중식 로그 모니터링 시스템이 필요합니다. 어떤 솔루션이 최소한의 운영 노력으로 이러한 요구 사항을 충족합니까?", "choices": ["GuardDuty 관리자 계정을 지정하고 보호 기능을 활성화합니다.", "CloudWatch 로그를 중앙 집중화하고 Inspector를 사용합니다.", "CloudTrail 로그를 중앙 집중화하고 Athena를 사용하여 쿼리합니다.", "Kinesis로 스트림 로그를 전송하고 Lambda로 처리합니다."], "answer": "A", "multi": false, "explanation": "Amazon GuardDuty는 위임된 관리로 구성된 경우 계정 전반에 걸쳐 완전관리형 위협 탐지 기능을 제공합니다. EKS 및 RDS 보호를 사용하면 최소한의 설정으로 워크로드 인식 감지가 가능합니다. 다른 솔루션에는 맞춤형 파이프라인과 더 높은 운영 오버헤드가 필요합니다."},
  {"id": 71, "text": "보안 엔지니어가 회사 AWS 환경에 로깅 솔루션을 구현하고 있습니다. 보안 엔지니어는 회사 AWS 계정에 AWS CloudTrail 트레일을 구성했습니다. 로그는 제3자 서비스 제공업체가 모니터링할 수 있도록 Amazon S3 버킷에 저장됩니다. 해당 서비스 제공업체는 S3 버킷에 접근할 수 있는 지정된 IAM 역할을 보유하고 있습니다. 해당 회사는 모든 로그를 고객 관리 키를 사용하여 저장 시 암호화하도록 요구합니다. 보안 엔지니어는 AWS 키 관리 서비스(AWS KMS)를 사용하여 고객 관리 키와 키 정책을 생성합니다. 또한 보안 엔지니어는 CloudTrail이 해당 키를 사용하여 트레일을 암호화하도록 구성합니다. 보안 엔지니어가 이 설정을 구현하면 서비스 제공업체는 더 이상 로그를 읽을 수 없습니다. 보안 엔지니어는 서비스 제공업체가 로그를 읽을 수 있도록 하려면 어떻게 해야 할까요?", "choices": ["S3 버킷 정책이 서비스 제공자 역할에 객체 암호 해독 권한을 부여하는지 확인하십시오.", "서비스 제공자 역할이 해당 키에 대해 kms:Decrypt 작업을 수행할 수 있도록 키 정책에 문을 추가합니다.", "서비스 제공자 역할에 AWSKeyManagementServicePowerUser AWS 관리형 정책을 추가합니다.", "키를 AWS Certificate Manager(ACM)로 마이그레이션하여 키에 액세스할 수 있는 공유 엔드포인트를 생성합니다."], "answer": "B", "multi": false, "explanation": "고객이 관리하는 AWS KMS 키를 사용하여 CloudTrail 로그를 암호화할 때, 로그를 읽기(복호화) 위해서는 해당 역할이나 주체가 키에 대해 kms:Decrypt 작업을 수행할 수 있는 권한을 가져야 합니다. 키 정책에 서비스 제공자의 IAM 역할에 kms:Decrypt 접근을 허용하는 문장을 추가함으로써, 보안 엔지니어는 서비스 제공자가 S3 버킷에 저장된 암호화된 로그를 복호화하고 읽을 수 있는 필요한 권한을 가지도록 보장할 수 있습니다."},
  {"id": 72, "text": "한 회사가 Amazon CloudWatch Logs의 로그 그룹으로 로그를 전송하는 애플리케이션을 운영하고 있습니다. 해당 로그에는 애플리케이션 사용자들의 이메일 주소가 포함되어 있습니다. 회사 개발자들이 CloudWatch Logs에서 로그를 확인해야 합니다. 보안 엔지니어는 로그 그룹에 접근하는 개발자들이 사용자 이메일 주소를 볼 수 없도록 해야 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["Amazon Macie를 사용하여 로그 그룹을 스캔합니다. Macie에서 이메일 주소 패턴을 식별하기 위해 정규 표현식을 사용하는 사용자 지정 데이터 식별자를 사용하도록 구성합니다. Macie에서 자동 데이터 검색을 활성화합니다.", "AWS 키 관리 서비스(AWS KMS) 키를 생성합니다. 로그 그룹이 해당 키를 사용하여 로그를 암호화하도록 구성합니다. 개발자가 CloudWatch Logs를 사용하기 위해 사용하는 IAM 역할에 대한 액세스를 거부하도록 키 정책을 구성합니다.", "로그 그룹에 대한 구독 필터를 생성합니다. 로그 구독을 구성하여 로그 데이터를 AWS Lambda 함수로 전송합니다. Lambda 함수가 로그 항목을 구문 분석하고 이메일 주소인 값을 마스킹하도록 프로그래밍합니다.", "로그 그룹에 대한 데이터 보호 정책을 구성합니다. 마스킹할 데이터 유형에 대해 AWS 관리형 데이터 식별자인 EmailAddress를 지정합니다. 로그 그룹에 대한 데이터 보호를 활성화합니다."], "answer": "D", "multi": false, "explanation": "Amazon CloudWatch Logs는 로그 그룹에서 이메일 주소와 같은 민감한 정보를 마스킹할 수 있는 데이터 보호 정책을 지원합니다. 로그 그룹에 대해 데이터 보호 정책을 구성하고 이메일 주소에 대한 AWS 관리형 데이터 식별자를 지정하면 회사는 로그에서 이메일 주소를 자동으로 마스킹할 수 있어 개발자가 이메일 주소를 보지 않고도 로그 데이터를 액세스할 수 있습니다."},
  {"id": 73, "text": "한 회사가 AWS Organizations의 조직과 AWS IAM Identity Center를 사용하여 AWS 환경을 관리합니다. 이 회사는 적절하게 구성된 AD 커넥터를 통해 온프레미스 Active Directory에 액세스하도록 IAM Identity Center를 구성했습니다. 회사 직원 모두는 Cloud라는 Active Directory 그룹에 속해 있습니다. 직원들은 조직 내 거의 모든 AWS 계정을 조회하고 접근할 수 있으며, 필요한 권한을 모두 보유하고 있습니다. 그러나 '계정 A'라는 이름의 계정에는 접근할 수 없습니다. 회사 측에서는 '계정 A'가 조직 내에 실제로 존재하는지 확인했습니다. 직원들이 A 계정에 접근할 수 없는 가장 유력한 이유는 무엇일까요?", "choices": ["회사는 계정 A를 조직 내 조직 단위(OU)에 추가하지 않았습니다.", "회사는 클라우드 Active Directory 그룹을 온프레미스 Active Directory와 동기화하지 않았습니다.", "회사는 유효한 권한 집합을 사용하여 IAM ID 센터에서 계정 A에 클라우드 Active Directory 그룹을 할당하지 않았습니다.", "회사가 계정 A에 IAM 권한 경계를 적용하여 계정 접근이 차단되었습니다."], "answer": "C", "multi": false, "explanation": "AWS IAM Identity Center(이전의 AWS Single Sign-On)에서 사용자와 그룹은 단순히 AWS 조직에 계정이 존재한다고 해서 모든 계정에 자동으로 접근 권한을 얻는 것은 아닙니다. 접근 권한은 특정 AWS 계정에 사용자가 사용하는 주체(사용자 또는 그룹)를 지정하고 권한 세트를 할당함으로써 명시적으로 부여됩니다. 권한 세트는 대상 계정에 IAM 역할로 프로비저닝되는 IAM 정책을 정의합니다."},
  {"id": 74, "text": "한 회사가 Amazon EC2 인스턴스에 대한 포렌식 분석을 시도하고 있지만, AWS Systems Manager Session Manager를 사용하여 해당 인스턴스에 연결할 수 없습니다. 이 회사는 EC2 인스턴스에 AWS Systems Manager Agent(SSM Agent)를 설치했습니다. EC2 인스턴스는 인터넷 게이트웨이가 연결되지 않은 VPC 내 서브넷에 있습니다. 회사는 해당 EC2 인스턴스에 보안 그룹을 연결했지만, 인바운드 또는 아웃바운드 규칙은 설정되어 있지 않습니다. 서브넷의 네트워크 ACL은 모든 인바운드 및 아웃바운드 트래픽을 허용합니다 . 어떤 조치 조합을 취해야 회사가 포렌식 데이터를 손상시키지 않고 EC2 인스턴스에 대한 포렌식 분석을 수행할 수 있을까요? (세 가지를 선택하세요.)", "choices": ["EC2 인스턴스 보안 그룹을 업데이트하여 0.0.0.0에 대한 포트 443에서 아웃바운드 트래픽을 허용하는 규칙을 추가합니다. /0.", "EC2 인스턴스 보안 그룹을 업데이트하여 VPC의 CIDR 범위로 들어오는 트래픽을 포트 443에서 허용하는 규칙을 추가합니다.", "EC2 키 페어를 생성합니다. 생성된 키 페어를 EC2 인스턴스와 연결합니다.", "EC2 인스턴스가 위치한 VPC에 Systems Manager용 VPC 인터페이스 엔드포인트를 생성합니다.", "VPC 인터페이스 엔드포인트에 보안 그룹을 연결합니다. VPC의 CIDR 범위로 들어오는 트래픽을 포트 443에서 허용합니다.", "EC2 인스턴스가 위치한 VPC에 EC2 인스턴스용 VPC 인터페이스 엔드포인트를 생성합니다."], "answer": "A,D,E", "multi": true, "explanation": "AWS Systems Manager Session Manager에는 EC2 인스턴스에서 Systems Manager 엔드포인트로의 보안 아웃바운드 HTTPS 연결이 필요합니다. 인터넷에 액세스할 수 없는 VPC에서 AWS 공인 보안 - 전문 문서에서는 인터페이스 VPC 엔드포인트를 사용하여 인스턴스를 인터넷에 노출하지 않고 프라이빗 연결을 활성화할 것을 권장합니다. Systems Manager용 VPC 인터페이스 엔드포인트를 생성하면 SSM 에이전트가 Systems Manager 서비스와 안전하게 통신할 수 있습니다. 엔드포인트에는 VPC CIDR 범위의 포트 443에서 인바운드 트래픽을 허용하는 연결된 보안 그룹이 있어야 합니다. 또한 에이전트가 연결을 시작할 수 있도록 EC2 인스턴스 보안 그룹은 포트 443에서 아웃바운드 HTTPS 트래픽을 허용해야 합니다. 키 쌍을 생성하거나 연결하면 포렌식 증거를 변경하고 포렌식 모범 사례를 위반할 수 있는 SSH 액세스가 가능해지기 때문에 옵션 C는 올바르지 않습니다. Session Manager는 EC2 인스턴스에 대한 인바운드 규칙을 요구하지 않으므로 옵션 B는 필요하지 않습니다. EC2는 관리 연결을 위해 인터페이스 엔드포인트를 사용하지 않기 때문에 옵션 F는 유효하지 않습니다. 이 조합은 증거 무결성을 유지하고 AWS 사고 대응 모범 사례를 준수하면서 법의학 조사를 위한 안전한 비공개 액세스를 보장합니다."},
  {"id": 75, "text": "한 회사가 SAML 페더레이션을 사용하여 사용자에게 AWS 계정 접근 권한을 부여합니다. 격리된 AWS 계정에서 실행되는 회사 워크로드는 사람이 접근할 수 없는 Amazon EC2 인스턴스에서 변경 불가능한 인프라를 사용합니다. 이 회사는 SAML 오류 발생 시 워크로드가 있는 AWS 계정과 인스턴스에 접근할 수 있는 특수 사용자(일명 비상 접근 사용자)를 필요로 합니다. 최근 감사 결과, 회사가 워크로드가 있는 AWS 계정에 비상 접근 사용자를 생성하지 않은 것으로 밝혀졌습니다. 회사는 비상 접근 사용자 계정을 생성해야 합니다. 또한, 비상 접근 사용자의 모든 활동을 기록하고 해당 기록을 보안팀에 전송해야 합니다. 다음 요구사항을 충족하는 해결책 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["보안팀을 위한 로컬 개인 비상 접근 IAM 사용자를 생성합니다. Amazon CloudWatch Logs가 활성화된 AWS CloudTrail에 트레일을 생성합니다. Amazon EventBridge를 사용하여 로컬 사용자 활동을 모니터링합니다.", "AWS 계정에 비상시 사용 가능한 EC2 키 페어를 생성합니다. 생성된 키 페어를 보안팀에 제공합니다. AWS CloudTrail을 사용하여 키 페어 활동을 모니터링하세요. Amazon SNS를 통해 보안 팀에 알림을 보낼 수 있습니다.", "계정에 비상 접근용 IAM 역할을 생성합니다. 보안 팀 구성원이 AssumeRoleWithSAML 작업을 수행할 수 있도록 허용합니다. Amazon CloudWatch Logs가 활성화된 AWS CloudTrail 트레일을 생성합니다. Amazon EventBridge를 사용하여 보안 팀 활동을 모니터링합니다.", "각 워크로드 인스턴스의 운영 체제 수준에서 로컬 개별 비상 접근용 IAM 사용자를 생성합니다. 해당 인스턴스에 무제한 보안 그룹을 구성하여 비상 접근용 IAM 사용자에게 액세스 권한을 부여합니다.", "Amazon EC2용 AWS Systems Manager Session Manager를 구성합니다. Session Manager를 기반으로 AWS CloudTrail 필터를 구성합니다. 결과를 Amazon SNS 토픽으로 전송합니다."], "answer": "A,E", "multi": true, "explanation": "SAML 연동이 실패할 때 브레이크 글래스 계정은 반드시 작동해야 하므로, 다른 SAML-가정 역할을 사용하는 것은 장애 시나리오를 해결하지 못합니다. 로컬 개별 IAM 사용자는 특정 관리자를 추적할 수 있는 긴급 액세스를 제공합니다. AWS Well-Architected 지침은 중앙 집중식 ID 공급자가 사용 불가능할 때를 대비해 긴급 액세스를 설정할 것을 권장합니다. EC2 인스턴스 액세스의 경우, Systems Manager 세션 매니저가 SSH 키를 피하고 관리되는 인스턴스에 대한 통제 가능한 감사 가능한 액세스를 지원하기 때문에 더 안전한 방법입니다. CloudTrail, CloudWatch Logs, EventBridge, 그리고 SNS는 브레이크 글래스 활동에 대한 모니터링 및 알림을 제공합니다. EC2 키 페어와 제한되지 않은 보안 그룹은 보안 통제가 부족하며, 관리되지 않고 감사가 어려운 액세스 경로를 생성합니다."},
  {"id": 76, "text": "한 회사가 AWS 계정에서 워크로드를 실행하고 있습니다. 보안 엔지니어가 Amazon GuardDuty에서 비정상적인 활동을 발견했습니다. 보안 엔지니어는 특정 IAM 역할을 조사하고 조사 보고서를 생성하려고 합니다. 보고서에는 비정상적인 동작 및 침해 징후에 대한 세부 정보가 포함되어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon Detective를 사용하여 IAM 역할에 대한 조사를 수행합니다.", "AWS Audit Manager를 사용하여 평가를 생성합니다. IAM 역할을 지정합니다. 평가 보고서를 실행합니다.", "Amazon Inspector를 사용하여 평가를 생성합니다. IAM 역할을 지정합니다. 평가 보고서를 실행합니다.", "Amazon Inspector를 사용하여 IAM 역할에 대한 온디맨드 스캔을 실행합니다."], "answer": "A", "multi": false, "explanation": "Amazon Detective는 의심스럽거나 악의적인 활동의 근본 원인을 식별하는 데 도움이 되도록 보안 데이터를 분석, 조사, 시각화하도록 설계된 목적 기반 AWS 서비스입니다. AWS 공인 보안 - 전문 자격 공식 학습 가이드에 따르면, Amazon Detective는 Amazon GuardDuty 발견 사항, AWS CloudTrail 로그, Amazon VPC 흐름 로그 및 Amazon EKS 감사 로그와 직접 통합되어 행동 그래프와 타임라인을 자동으로 생성합니다. GuardDuty가 이상 활동과 관련된 발견 사항을 생성하면, Amazon Detective는 보안 엔지니어가 특정 IAM 역할, 사용자 또는 리소스에 초점을 맞춘 조사로 직접 전환할 수 있도록 합니다. Detective는 과거 활동을 자동으로 연관시키고, 기준 행동에서의 편차를 식별하며, 이상 API 호출, 자격 증명 오용 또는 의심스러운 네트워크 활동과 같은 침해 지표를 강조합니다."},
  {"id": 77, "text": "보안 엔지니어는 외부 ID 공급자(IdP)를 사용하여 AWS IAM Identity Center를 구현해야 합니다.", "choices": ["IAM Identity Center에서 외부 IdP를 ID 소스로 구성합니다.", "IdP API 엔드포인트를 신뢰 정책에 지정하는 IAM 역할을 생성합니다.", "IAM Identity Center 설정에서 자동 프로비저닝을 활성화합니다.", "외부 IdP에서 자동 프로비저닝을 활성화합니다.", "IAM Identity Center에서 SAML 메타데이터를 가져옵니다.", "외부 IdP에서 SAML 메타데이터를 가져옵니다."], "answer": "E,F,A", "multi": true, "explanation": "1. IAM Identity Center에서 SAML 메타데이터를 다운로드합니다. 2. 외부 IdP에서 SAML 메타데이터를 가져옵니다. 3. IAM Identity Center에서 외부 IdP를 ID 소스로 구성합니다. SAML 연동은 메타데이터 교환 후 ID 소스 구성 순으로 진행합니다."},
  {"id": 78, "text": "한 회사가 AWS WAF를 사용하여 Amazon EC2 인스턴스 기반의 맞춤형 공용 API 서비스를 보호하고 있습니다. 해당 API는 애플리케이션 로드 밸런서를 사용합니다. AWS WAF 웹 ACL은 AWS 관리형 규칙 그룹으로 구성되어 있습니다. API와 클라이언트 애플리케이션을 소프트웨어 업그레이드한 후, 일부 유형의 요청이 더 이상 작동하지 않아 애플리케이션 안정성 문제가 발생하고 있습니다. 보안 엔지니어는 웹 ACL에 대한 AWS WAF 로깅이 활성화되어 있지 않다는 사실을 발견했습니다. 보안 엔지니어는 즉시 애플리케이션을 서비스에 복귀시키고 문제를 해결하며 향후 로깅이 비활성화되지 않도록 해야 합니다. 보안 엔지니어는 웹 ACL에 대한 로깅을 활성화하고 Amazon CloudWatch Logs를 대상으로 지정합니다. 보안 엔지니어는 요구 사항을 충족하기 위해 어떤 추가적인 조치를 취해야 합니까?", "choices": ["웹 ACL에서 카운트 작업이 포함된 규칙을 추가하도록 규칙을 수정합니다. 로그를 검토하여 어떤 규칙이 요청을 차단하는지 확인합니다. 모든 AWS WAF 관리자의 IAM 정책을 수정하여 AWS WAF 웹 ACL에 대한 로깅 구성을 제거할 수 없도록 합니다.", "웹 ACL에서 카운트 액션이 포함된 규칙을 추가하도록 규칙을 수정합니다. 로그를 검토하여 어떤 규칙이 요청을 차단하는지 확인합니다. AWS WAF 관리자가 AWS WAF 웹 ACL에 대한 로깅 구성을 제거할 수 없도록 AWS WAF 리소스 정책을 수정합니다.", "웹 ACL에서 카운트 및 챌린지 액션이 포함된 규칙을 추가하도록 규칙을 수정합니다. 로그를 검토하여 어떤 규칙이 요청을 차단하는지 확인합니다. AWS WAF 관리자가 AWS WAF 웹 ACL에 대한 로깅 구성을 제거할 수 없도록 AWS WAF 리소스 정책을 수정합니다.", "웹 ACL에서 카운트 및 챌린지 액션이 포함된 규칙을 추가하도록 규칙을 수정합니다. 로그를 검토하여 어떤 규칙이 요청을 차단하는지 확인합니다. 모든 AWS WAF 관리자의 IAM 정책을 수정하여 AWS WAF 웹 ACL에 대한 로깅 구성을 제거할 수 없도록 합니다."], "answer": "A", "multi": false, "explanation": "AWS 관리형 규칙의 오탐이 의심되는 경우, 즉각적인 안전한 대응은 영향을 받는 규칙을 Count로 덮어쓰는 것입니다. Count는 요청을 차단하지 않고 일치 항목을 기록하기 때문에, AWS WAF는 일치를 기록하지만 요청을 차단하지 않아 로그에서 증거를 보존하면서 애플리케이션 가용성을 복구하는 데 도움이 됩니다. CloudWatch 로그를 검토한 후, 엔지니어는 차단을 유발하는 특정 관리형 규칙을 식별하고 웹 ACL을 조정할 수 있습니다. 로그 기록이 다시 꺼지지 않도록 하려면 DeleteLoggingConfiguration과 같은 작업을 거부하여 IAM을 통해 접근을 제어해야 합니다. AWS WAF 리소스 정책은 규칙 그룹 공유 및 유사한 리소스 수준 권한을 위한 것이지, 관리자가 웹 ACL 로그를 비활성화하지 못하게 막는 올바른 메커니즘이 아닙니다. Challenge는 불필요하며 여전히 클라이언트 동작에 영향을 줄 수 있습니다."},
  {"id": 79, "text": "한 회사가 Amazon EC2 인스턴스에서 실행되는 웹 애플리케이션을 운영하고 있습니다. 해당 애플리케이션은 80번 포트와 443번 포트를 사용합니다. 이 회사는 AWS WAF와 함께 애플리케이션 로드 밸런싱(ALB)을 사용하여 SSL 연결을 종료하고 트래픽을 80번 포트로만 애플리케이션 인스턴스로 전달합니다. ALB는 NACL1이라는 네트워크 ACL과 연결된 공용 서브넷에 있습니다. 애플리케이션 인스턴스는 NACL2라는 네트워크 ACL과 연결된 전용 프라이빗 서브넷에 있습니다. 포트 5432를 사용하는 Amazon RDS for PostgreSQL DB 인스턴스는 NACL3이라는 네트워크 ACL과 연결된 전용 프라이빗 서브넷에 있습니다. 현재 모든 네트워크 ACL은 모든 인바운드 및 아웃바운드 트래픽을 허용합니다. 어떤 네트워크 ACL 변경 사항이 애플리케이션의 기능을 유지하면서 보안을 강화할까요?", "choices": ["NACL3에 다음과 같은 변경 사항을 적용하세요: - NACL2에서 5432번 포트로 들어오는 트래픽을 허용하는 규칙을 추가합니다. - NACL2에 대해 1024~65536 포트의 아웃바운드 트래픽을 허용하는 규칙을 추가합니다. - 모든 수신 및 발신 트래픽을 허용하는 기본 규칙을 제거합니다.", "NACL3에 다음과 같은 변경 사항을 적용하십시오. - 애플리케이션 인스턴스 서브넷의 CIDR 블록에서 포트 5432로 들어오는 트래픽을 허용하는 규칙을 추가합니다. - 애플리케이션 인스턴스 서브넷으로 나가는 트래픽을 포트 1024~65536에서 허용하는 규칙을 추가합니다. - 모든 수신 및 발신 트래픽을 허용하는 기본 규칙을 제거합니다.", "NACL2를 다음과 같이 변경하십시오: - RDS 서브넷의 CIDR 블록으로 나가는 트래픽을 포트 5432에서 허용하는 규칙을 추가합니다 . - 모든 수신 및 발신 트래픽을 허용하는 기본 규칙을 제거합니다.", "NACL2를 다음과 같이 변경하십시오: - RDS 서브넷의 CIDR 블록에서 포트 5432로 들어오는 트래픽을 허용하는 규칙을 추가합니다 . - 포트 5432를 통해 RDS 서브넷으로 나가는 트래픽을 허용하는 규칙을 추가합니다."], "answer": "B", "multi": false, "explanation": "네트워크 ACL은 상태 비저장형 서브넷 수준의 제어이므로, 요청 트래픽과 반환 트래픽 모두 명시적으로 허용되어야 합니다. PostgreSQL 데이터베이스 서브넷은 인터넷이나 관련 없는 서브넷이 아닌 애플리케이션 서브넷 CIDR 블록에서만 인바운드 TCP 5432를 허용해야 합니다. 데이터베이스의 반환 트래픽은 클라이언트 측에서 에페메랄(Ephemeral) 목적지 포트를 사용하기 때문에, 데이터베이스 서브넷의 아웃바운드 규칙은 TCP 1024-65536을 애플리케이션 인스턴스 서브넷으로 다시 허용해야 합니다. 옵션 A는 네트워크 ACL 규칙이 출발지나 목적지로 다른 NACL 이름이 아닌 CIDR 블록을 사용하기 때문에 유효하지 않습니다. 옵션 C와 D는 애플리케이션 서브넷 NACL만 수정하며 데이터베이스 서브넷 반환 트래픽을 올바르게 제한하고 허용하는 데 실패합니다."},
  {"id": 80, "text": "한 회사가 AWS Organizations를 사용하여 세 개의 워크로드 OU로 구성된 조직을 관리합니다 . 운영, 개발 및 테스트. 이 회사는 AWS CloudFormation 템플릿을 사용하여 OU와 연결된 AWS 계정에 워크로드 인프라를 정의하고 배포합니다. 각 워크로드 OU에는 서로 다른 SCP가 연결되어 있습니다. 해당 회사는 개발 OU와 테스트 OU에 있는 워크로드에 CloudFormation 스택 업데이트를 성공적으로 배포했습니다. 하지만 동일한 CloudFormation 템플릿을 사용하여 프로덕션 OU에 있는 계정에 스택 업데이트를 배포하려고 하면 업데이트가 실패합니다. 오류 메시지에는 IAM 권한이 부족하다고 표시됩니다. 보안 엔지니어가 이 문제를 해결하기 위해 가장 먼저 해야 할 일은 무엇입니까?", "choices": ["프로덕션 OU에 있는 계정의 AWS CloudTrail 로그를 검토하십시오. 배포 시도 중에 CloudFormation에서 발생한 API 호출 실패를 찾아보십시오.", "프로덕션 OU에 연결된 모든 SCP를 제거합니다. SCP가 CloudFormation API 호출을 방해했는지 확인하기 위해 CloudFormation 스택 업데이트를 다시 실행합니다.", "CloudFormation에서 사용하는 역할에 CloudFormation 템플릿에서 참조하는 리소스를 생성, 업데이트 및 삭제할 수 있는 충분한 권한이 있는지 확인하십시오.", "프로덕션 OU에 연결된 모든 SCP를 테스트 OU에 연결된 SCP와 동일하게 만듭니다."], "answer": "A", "multi": false, "explanation": "AWS CloudTrail은 AWS CloudFormation에서 시작된 호출을 포함하여 AWS 계정에서 이루어진 모든 API 호출에 대한 기록을 제공합니다. AWS 공인 보안 - 전문 연구 가이드에 따르면 CloudTrail은 거부된 작업과 서비스 제어 정책을 포함하여 거부를 유발한 정책 유형을 기록하므로 인증 실패 문제를 해결하는 주요 소스입니다. CloudTrail 로그를 검토하면 보안 엔지니어는 CloudFormation 배포 중에 실패한 특정 API 호출과 거부가 SCP, IAM 정책 또는 권한 경계로 인해 발생했는지 여부를 식별할 수 있습니다. 이 증거 기반 접근 방식은 구성을 변경하기 전에 권장되는 첫 번째 단계입니다. 옵션 B는 안전하지 않으며 프로덕션에서 SCP를 제거하여 거버넌스 모범 사례를 위반합니다. 옵션 C는 나중에 필요할 수 있지만 SCP가 근본 원인인지 여부를 식별하지는 않습니다. 옵션 D는 불필요한 위험을 초래하고 OU 전반에 걸쳐 차별화된 제어 목적을 우회합니다. AWS 설명서에서는 보안 제어를 수정하기 전에 관찰하고 검증하는 것을 강조하여 CloudTrail 로그 분석을 올바른 초기 문제 해결 단계로 만듭니다."},
  {"id": 81, "text": "보안 엔지니어는 회사의 암호화 작업에 사용되는 키를 생성하고 관리하는 솔루션을 구현해야 합니다. 보안 엔지니어는 AWS CloudHSM 클러스터 기반의 사용자 지정 키 저장소에서 키 자료를 생성하고 사용하는 대칭 키를 생성해야 합니다. 또한 애플리케이션 내에서 로컬로 사용하기 위해 대칭 및 비대칭 데이터 키 쌍을 활용해야 합니다. 더불어 보안 엔지니어는 키 사용 내역을 감사해야 합니다. 보안 엔지니어는 어떻게 이러한 요구 사항을 충족할 수 있을까요?", "choices": ["키를 생성하려면 AWS Key Management Service(AWS KMS)와 CloudHSM 클러스터의 사용자 지정 키 저장소를 사용하십시오. 감사를 위해서는 Amazon Athena를 사용하십시오.", "키를 생성하려면 Amazon S3와 CloudHSM 클러스터의 사용자 지정 키 저장소를 사용하십시오. 감사를 위해서는 AWS CloudTrail을 사용하십시오.", "키를 생성하려면 AWS Key Management Service(AWS KMS)와 CloudHSM 클러스터의 사용자 지정 키 저장소를 사용하십시오. 감사를 위해서는 Amazon GuardDuty를 사용하십시오.", "키를 생성하려면 AWS Key Management Service(AWS KMS)와 CloudHSM 클러스터의 사용자 지정 키 저장소를 사용하십시오. 감사를 위해서는 AWS CloudTrail을 사용하십시오."], "answer": "D", "multi": false, "explanation": "요구 사항은 AWS CloudHSM 클러스터가 지원하는 사용자 지정 키 스토어 내에서 생성되고 사용되는 키 자료를 보유하는 것입니다. 이것이 바로 AWS KMS 사용자 지정 키 저장소가 제공하는 것입니다. KMS는 키와 정책을 관리하지만 해당 KMS 키에 대한 암호화 작업은 연결된 CloudHSM 클러스터에서 발생하여 키 자료를 HSM 경계 내에 유지합니다. 로컬 사용 데이터 키(대칭 데이터 키 및 비대칭 데이터 키 쌍 모두)가 필요한 애플리케이션의 경우 KMS는 애플리케이션이 봉투 암호화 및 로컬 암호화 작업에 사용할 수 있는 데이터 키 및 데이터 키 쌍 생성을 지원하는 동시에 마스터 키 보호는 KMS 내에(사용자 지정 키 스토어를 사용할 경우 CloudHSM 내에) 유지됩니다. 감사를 위한 AWS 모범 사례는 KMS API 호출(예: CreateKey, GenerateDataKey, GeneDataKeyPair, Encrypt/Decrypt 등)을 기록하고 규정 준수 및 조사를 위해 변경할 수 없는 이벤트 기록을 제공하는 AWS CloudTrail입니다. Athena는 로그를 쿼리할 수 있지만 기본 감사 레코드 소스는 아닙니다. GuardDuty는 신뢰할 수 있는 키 사용 감사가 아닌 위협 탐지를 위한 것입니다. 따라서 올바른 조합은 KMS와 CloudHSM 지원 사용자 지정 키 스토어, 그리고 감사 가능성을 위한 CloudTrail입니다."},
  {"id": 82, "text": "한 회사가 협업 애플리케이션을 사용하고 있습니다. 보안 엔지니어는 해당 애플리케이션에 대해 us-west-2 리전의 AWS Security Hub에서 자동 알림을 구성해야 합니다. 보안 엔지니어는 Security Hub에서 새로운 탐지 사항이 감지될 때마다 애플리케이션 내 채널로 알림을 받고 싶어합니다. 보안 엔지니어는 메시지를 애플리케이션에서 요구하는 형식으로 변환하는 AWS Lambda 함수를 생성합니다. 이 Lambda 함수는 또한 해당 메시지를 애플리케이션의 API로 전송합니다. 보안 엔지니어는 Lambda 함수를 대상으로 지정하는 Amazon EventBridge 규칙을 구성합니다. EventBridge 규칙을 구현한 후 채널에서 Security Hub로부터 지속적으로 알림이 수신되기 시작합니다. 이러한 알림 중 상당수는 조치가 필요 없는 Amazon Inspector 알림입니다. 보안 엔지니어는 Amazon Inspector 알림 수신을 중지하려고 합니다. 어떤 솔루션이 최소한의 운영 노력으로 이 요구 사항을 충족할까요?", "choices": ["Amazon Inspector에서 발생하는 이벤트의 패턴 일치 항목을 찾고 결과를 숨기도록 Lambda 함수 코드를 업데이트합니다.", "Amazon Inspector를 제외한 모든 서비스의 결과를 EventBridge 이벤트 버스로 자동으로 전송하는 Security Hub 사용자 지정 작업을 생성합니다.", "EventBridge 규칙의 이벤트 패턴에서 ProductArn 속성 값을 다음과 같이 수정합니다. \"anything-but\": [\"arn:aws:securityhub:us-west-2::product/ aws/inspector\"].", "애플리케이션으로 메시지를 전송하기 위해 Amazon Simple Notification Service(Amazon SNS) 토픽을 생성합니다. 토픽 구독에 필터 정책을 설정하여 product/aws/inspector 문자열이 포함된 메시지를 거부합니다."], "answer": "C", "multi": false, "explanation": "특정 결과, 예를 들어 Amazon Inspector의 결과를 필터링하려면 EventBridge 이벤트 패턴을 사용하여 이벤트를 선택적으로 라우팅할 수 있습니다. 이벤트 패턴의 ProductArn 속성을 Amazon Inspector의 ProductArn(arn:aws:securityhub:us-west-)에 대해 anything-but로 업데이트하면 다른 서비스의 결과만 Lambda 함수를 트리거합니다. 이 방법을 사용하면 보안 엔지니어가 최소한의 운영 노력으로 2::product/aws/inspector의 불필요한 알림을 필터링할 수 있어 Lambda 또는 SNS에서 추가 필터링을 할 필요가 없습니다."},
  {"id": 83, "text": "한 회사가 Amazon EKS 클러스터에서 공개 웹 애플리케이션을 운영하고 있습니다. 이 회사는 Amazon CloudFront 배포를 사용하여 애플리케이션을 배포합니다. 애플리케이션 로드 밸런서(ALB)가 해당 배포의 오리진으로 구성되어 있습니다. 보안 엔지니어는 기존 Amazon SNS 토픽으로 알림을 전송하는 모니터링 솔루션을 구현해야 합니다. 이 솔루션은 애플리케이션이 5분 동안 동일한 최종 사용자 IP 주소로부터 10,000건의 요청을 수신할 때마다 SNS 토픽으로 알림을 보내야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["CloudFront 표준 로깅을 구성합니다. 로그를 Amazon CloudWatch Logs 로그 그룹으로 전송합니다. 요청 임계값이 초과될 때 SNS 토픽으로 알림을 보내도록 로그 그룹 메트릭 필터를 생성합니다.", "EKS 클러스터가 포함된 VPC의 로그를 Amazon CloudWatch Logs 로그 그룹으로 전송하도록 VPC Flow Logs를 구성합니다. 요청 임계값이 초과될 경우 SNS 토픽으로 알림을 보내도록 로그 그룹 메트릭 필터를 생성합니다.", "AWS WAF 웹 ACL을 자율 시스템 번호(ASN) 일치 규칙으로 구성합니다. 웹 ACL을 ALB와 연결합니다. ASN 일치 규칙 요청 임계값을 초과할 경우 SNS 토픽으로 알림을 보내도록 Amazon CloudWatch 메트릭 알람을 생성합니다.", "속도 기반 규칙을 사용하여 AWS WAF 웹 ACL을 구성합니다. 웹 ACL을 CloudFront 배포와 연결합니다. 속도 기반 규칙 요청 임계값이 초과될 때 SNS 토픽으로 알림을 보내도록 Amazon CloudWatch 메트릭 알람을 생성합니다."], "answer": "D", "multi": false, "explanation": "AWS WAF 비율 기반 규칙은 소스 IP 주소와 같은 집계 키별로 요청을 계산하도록 특별히 설계되었으며, 평가 창 동안 카운트가 구성된 한도를 초과하면 동작을 적용합니다. 5분 창이 기본 및 지원되는 평가 기간입니다. 애플리케이션이 CloudFront를 통해 제공되기 때문에 웹 ACL은 CloudFront 배포와 연관되어야 하며, 이를 통해 요청이 ALB 및 EKS 워크로드에 도달하기 전에 엣지에서 평가됩니다. WAF 규칙에 대한 CloudWatch 지표는 SNS 주제에 알림을 전달하는 경보를 생성할 수 있습니다. CloudFront 로그 또는 VPC 플로우 로그는 지연된 로그 처리 및 사용자 정의 카운트를 필요로 합니다. ASN 매칭은 개별 최종 사용자 IP 주소별로 요청을 계산하지 않습니다."},
  {"id": 84, "text": "보안 엔지니어가 공용 트래픽과 사설 트래픽을 분리하기 위해 VPC를 설계했습니다. 이 VPC에는 두 개의 가용 영역이 있으며, 각 가용 영역에는 하나의 공용 서브넷과 하나의 사설 서브넷이 있습니다. 라우팅 테이블은 총 세 개로, 공용 서브넷용 하나와 각 사설 서브넷용 하나씩 존재합니다. 보안 엔지니어는 네 개의 서브넷 모두 VPC에 연결된 인터넷 게이트웨이를 통해 트래픽을 라우팅하고 있음을 발견했습니다. 보안 엔지니어는 이 시나리오를 해결하기 위해 어떤 조치들을 조합하여 취해야 할까요? (두 가지를 선택하세요.)", "choices": ["각 가용 영역의 공용 서브넷에 NAT 게이트웨이가 프로비저닝되었는지 확인합니다.", "각 가용 영역의 프라이빗 서브넷에 NAT 게이트웨이가 프로비저닝되었는지 확인합니다.", "공용 서브넷의 라우팅 테이블을 수정하여 VPC CIDR 범위에 대한 로컬 경로를 추가합니다.", "개인 서브넷의 라우팅 테이블을 수정하여 0.0.0.0/0을 동일한 가용 영역의 공용 서브넷에 있는 NAT 게이트웨이로 라우팅합니다.", "개인 서브넷의 라우팅 테이블을 수정하여 0.0.0.0/0을 인터넷 게이트웨이로 라우팅합니다."], "answer": "A,D", "multi": true, "explanation": "AWS 네트워킹 모범 사례에서는 프라이빗 서브넷이 퍼블릭 서브넷에 있는 NAT 게이트웨이를 통해서만 인터넷에 액세스하도록 요구합니다. AWS 공인 보안 - 전문 연구 가이드에 따르면 NAT 게이트웨이는 퍼블릭 서브넷에 프로비저닝되어야 하며 프라이빗 서브넷의 아웃바운드 트래픽에 대한 기본 경로로 사용되어야 합니다. 각 가용 영역의 NAT 게이트웨이를 확인하면 고가용성과 내결함성이 보장됩니다. 0.0.0.0/0 트래픽을 NAT 게이트웨이로 전송하도록 프라이빗 서브넷 라우팅 테이블을 업데이트하면 아웃바운드 연결은 허용하는 동시에 직접적인 인터넷 액세스는 방지됩니다. 프라이빗 서브넷 트래픽을 인터넷 게이트웨이로 직접 라우팅하는 것은 서브넷 격리 원칙을 위반합니다. NAT 게이트웨이는 프라이빗 서브넷에 배치하면 안 됩니다."},
  {"id": 85, "text": "한 회사가 여러 AWS CloudFormation 스택을 사용하여 애플리케이션 제품군의 배포를 처리합니다. 회사 애플리케이션 개발팀의 팀장은 일부 팀원들이 스택을 배포하려고 할 때 권한 오류로 인해 배포가 실패하는 것을 발견했습니다. 그러나 다른 팀원들은 스택을 성공적으로 배포할 수 있었습니다. 팀 구성원들은 특정 권한 집합을 가진 역할을 부여받아 계정에 접근합니다. 모든 팀 구성원은 스택에 대한 작업을 수행할 수 있는 권한을 가지고 있습니다. 스택의 일관된 배포를 가장 안전하게 보장하는 단계 조합은 무엇입니까? (세 가지를 선택하십시오.)", "choices": ["필요한 권한이 필요한 각 서비스를 포함하는 복합 주체를 가진 서비스 역할을 생성합니다.", "서비스 주체로 cloudformation.amazonaws.com을 포함하는 서비스 역할을 생성합니다.", "각 CloudFormation 스택 ARN을 참조하는 정책을 추가합니다.", "권한이 필요한 각 AWS 서비스의 ARN을 참조하는 정책을 추가합니다.", "각 스택이 서비스 역할을 사용하도록 업데이트합니다.", "각 멤버 역할에 정책을 추가하여 서비스 역할에 대해 iam:PassRole 작업을 허용합니다."], "answer": "B,E,F", "multi": true, "explanation": "AWS CloudFormation은 서비스 역할 사용을 지원합니다. 이를 통해 CloudFormation은 전용 IAM 역할을 맡아 사용자를 대신하여 리소스를 생성하고 관리할 수 있습니다. AWS 공인 보안 – 전문 분야 연구 가이드에 따르면 서비스 역할을 사용하는 것은 사용자에게 다양한 권한 세트가 있을 때 예측 가능한 스택 배포를 보장하는 가장 안전하고 일관된 방법입니다. cloudformation.amazonaws.com을 신뢰할 수 있는 서비스 주체(옵션 B)로 사용하여 서비스 역할을 생성함으로써 개별 사용자가 아닌 CloudFormation이 리소스 생성에 대한 책임을 맡습니다. 이 서비스 역할을 명시적으로 사용하도록 각 스택을 업데이트하면(옵션 E) 모든 배포에서 동일한 권한 집합을 사용하여 불일치가 제거됩니다. CloudFormation이 스택 작업 중에 역할을 맡을 수 있도록 팀 구성원에게 iam:PassRole(옵션 F)을 통해 서비스 역할을 전달할 수 있는 권한을 부여해야 합니다. 이 접근 방식은 최소 권한 원칙을 준수하며 사용자가 상승된 권한에 직접 액세스하는 것을 방지합니다."},
  {"id": 86, "text": "한 회사가 온프레미스 레거시 시스템과 AWS 리소스를 모두 관리하고 있습니다. AWS 리소스에는 Amazon DynamoDB 테이블과 Amazon S3 버킷이 포함됩니다. 온프레미스 레거시 시스템은 DynamoDB와 Amazon S3에 정기적으로 연결해야 합니다. 현재 해당 회사는 VPC 내 공용 서브넷에 있는 배스천 호스트를 사용하고 있습니다. 회사는 온프레미스에 저장된 SSH 개인 키를 사용하여 배스천 호스트에 연결합니다. 배스천 호스트에 할당된 인스턴스 프로필은 Amazon S3 및 DynamoDB에 대한 전체 액세스 권한을 가지고 있습니다. 보안팀에서 모든 배스천 호스트를 제거해야 하는 새로운 내부 정책을 발표했습니다. 이 정책에 따라 모든 시스템은 인증서 기반 인증을 사용하여 인증해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Direct Connect 연결을 설정하고 필요한 서비스에 대한 VPC 엔드포인트에 액세스할 수 있는 VPC에 대한 VPN 연결을 생성합니다.", "온프레미스 시스템이 AWS IAM Roles Anywhere를 사용하여 인증하도록 설정합니다.", "AWS 프라이빗 인증 기관을 사용하여 SSL 인증서를 발급하면 온프레미스 시스템에서 AWS의 리소스에 액세스할 수 있습니다.", "IAM 역할을 일시적으로 수임하고 일시적으로 수임한 역할 자격 증명을 사용하여 필요한 리소스에 액세스할 수 있는 권한이 있는 IAM 사용자를 생성합니다."], "answer": "B", "multi": false, "explanation": "IAM Roles Anywhere는 AWS 외부에서 실행되며 임시 AWS 자격 증명을 얻기 위해 인증서 기반 인증이 필요한 워크로드를 위해 설계되었습니다. 이를 통해 온프레미스 시스템은 회사의 PKI에서 발급한 X.509 인증서를 사용하여 인증한 후 Amazon S3 및 DynamoDB에 접근할 수 있는 권한을 가진 IAM 역할을 맡을 수 있으며, 이는 바스천 호스트 제거 요구 사항과 인증서 기반 인증 사용 요구 사항을 모두 충족합니다."},
  {"id": 87, "text": "최근 한 회사가 Amazon GuardDuty를 설치했는데, 회사 내 IP 주소에서 높은 빈도로 탐지 결과가 나오고 있습니다. 보안 엔지니어는 해당 IP 주소들이 신뢰할 수 있고 허용된 주소임을 확인했습니다. 보안 엔지니어는 GuardDuty에서 해당 IP 주소에 대한 탐지 결과가 표시되지 않도록 구성하기 위해 어떤 단계를 조합하여 수행해야 합니까? (두 가지를 선택하십시오.)", "choices": ["신뢰할 수 있는 IP 주소가 포함된 일반 텍스트 구성 파일을 생성합니다.", "신뢰할 수 있는 IP 주소가 포함된 JSON 구성 파일을 생성합니다.", "설정 파일을 GuardDuty에 직접 업로드합니다.", "설정 파일을 Amazon S3에 업로드합니다. GuardDuty에 해당 파일을 가리키는 새 신뢰 IP 목록을 추가합니다.", "구성 파일 데이터를 수동으로 복사하여 GuardDuty의 신뢰할 수 있는 IP 목록에 붙여넣으세요."], "answer": "A,D", "multi": true, "explanation": "GuardDuty는 알려진 안전한 IP 주소(예: 회사 NAT 이그레스 IP, 보안 스캐너 또는 모니터링 시스템)에서 발생하는 활동에 대해 일반적으로 생성될 수 있는 결과를 억제하기 위해 '신뢰할 수 있는 IP 목록'을 지원합니다. 신뢰할 수 있는 IP 목록을 사용하려면, IP 주소를 포함하는 일반 텍스트 파일을 생성(일반적으로 한 줄에 하나씩 또는 지원되는 목록 형식)하고 이를 Amazon S3에 저장합니다. 그런 다음 GuardDuty를 구성하여 해당 S3 객체를 신뢰할 수 있는 IP 목록으로 참조하도록 합니다. GuardDuty는 주기적으로 S3에서 파일을 가져와 결과 생성 조정을 위해 사용합니다. 이는 직접적으로 옵션 A(일반 텍스트 파일 생성)와 옵션 D(S3에 업로드하고 GuardDuty에서 해당 파일을 가리키는 신뢰할 수 있는 IP 목록 생성)에 해당합니다."},
  {"id": 88, "text": "한 회사가 사용자들에게 모바일 앱을 다운로드할 수 있도록 제공하고 있습니다. 이 앱은 MQTT 기반이며 AWS IoT Core에 연결하여 특정 클라이언트 관련 토픽을 구독합니다. 최근 이 회사는 악의적인 공격자들이 정상적인 모바일 기기에 트로이 목마를 심으려 시도하고 있음을 발견했습니다. 이 트로이 목마는 정식 애플리케이션으로 위장하여 특수 문자가 삽입된 클라이언트 ID를 사용하여 클라이언트의 권한 범위를 벗어난 토픽에 접근합니다. 이러한 위협을 예방하기 위해 회사는 어떤 조치들을 조합하여 취해야 할까요? (두 가지를 선택하세요.)", "choices": ["애플리케이션에서 IoT 사물 이름을 클라이언트 ID로 사용하여 디바이스를 AWS IoT Core에 연결합니다.", "애플리케이션에 클라이언트 ID 확인 기능을 추가하세요. 특수 문자가 감지되면 서버 연결을 끊으세요.", "주체를 \"client/${iot:Connection.Thing.ThingName}\"으로 설정하고 \"AWSIoTWirelessDataAccess\"를 허용하는 AWS IoT Core 정책을 적용합니다.", "AWS IoT Core 정책을 디바이스에 적용하여 리소스를 \"클라이언트\"로 설정하고 \"iot:Connect\"를 허용합니다. /${iot:ClientId} \" .", "AWS IoT Core 정책을 디바이스에 적용하여 리소스를 \"클라이언트\"로 설정하고 \"iot:Connect\"를 허용합니다. /${iot:Connection.Thing.ThingName} \" ."], "answer": "A,E", "multi": true, "explanation": "위협은 권한 경계를 무너뜨리기 위한 클라이언트 ID 조작입니다. 가장 강력한 제어 방법은 임의로 제공된 클라이언트 ID를 신뢰하는 대신 MQTT 클라이언트 ID를 인증된 디바이스 ID(사물)에 바인딩하는 것입니다. 클라이언트 ID로 사물 이름을 사용하는 것(옵션 A)은 모호성을 제거하고 식별자를 예측 가능하며 등록된 ID에 연결되도록 만듭니다. 권한 측면에서 AWS IoT Core 정책은 정책 변수를 사용할 수 있습니다. 리소스가 client/${iot:Connection.Thing.ThingName}와 일치할 때만 iot:Connect를 허용하도록 설정(옵션 E)하면 TLS 인증서/사물 주체 컨텍스트의 인증된 사물 이름과 클라이언트 ID가 정확히 일치할 경우에만 연결이 허용됩니다. 이를 통해 공격자가 특수 문자를 삽입하거나 다른 클라이언트 ID를 선택하여 접근 권한을 상승시키는 것을 방지할 수 있습니다. 왜냐하면 정책 평가가 허용된 클라이언트 리소스를 공격자가 제어하는 문자열이 아닌 사물 ID에 연결하기 때문입니다."},
  {"id": 89, "text": "한 회사가 고객 요구사항을 충족하기 위해 새로운 규정 준수 요건을 시행하고 있습니다. 새로운 요건에 따르면, 회사는 기본 스토리지에 암호화가 적용되지 않은 Amazon RDS DB 인스턴스 또는 DB 클러스터를 사용해서는 안 됩니다. 회사는 암호화되지 않은 DB 인스턴스 또는 DB 클러스터가 생성될 경우 이메일 알림을 생성하고, 해당 인스턴스 또는 클러스터를 종료하는 솔루션이 필요합니다. 어떤 솔루션이 이러한 요구 사항을 가장 효율적인 운영 방식으로 충족할까요?", "choices": ["암호화되지 않은 RDS 스토리지를 감지하는 AWS Config 관리형 규칙을 생성합니다. AWS Lambda 함수와 이메일 전송 대상이 구독자로 포함된 Amazon SNS(Amazon Simple Notification Service) 토픽에 메시지를 게시하는 자동 복구 작업을 구성합니다. 암호화되지 않은 리소스를 삭제하도록 Lambda 함수를 구성합니다.", "암호화되지 않은 RDS 스토리지를 감지하는 AWS Config 관리형 규칙을 생성합니다. AWS Lambda 함수를 호출하는 수동 복구 작업을 구성합니다. Lambda 함수가 Amazon SNS(Amazon Simple Notification Service) 토픽에 메시지를 게시하고 암호화되지 않은 리소스를 삭제하도록 구성합니다.", "RDS 이벤트 패턴을 평가하고 DB 인스턴스 또는 DB 클러스터 생성 시 시작되는 Amazon EventBridge 규칙을 생성합니다. AWS Lambda 함수와 이메일 전송 대상을 구독자로 포함하는 Amazon Simple Notification Service(Amazon SNS) 토픽에 메시지를 게시하도록 규칙을 구성합니다. 암호화되지 않은 리소스를 삭제하도록 Lambda 함수를 구성합니다.", "RDS 이벤트 패턴을 평가하고 DB 인스턴스 또는 DB 클러스터 생성 시 시작되는 Amazon EventBridge 규칙을 생성합니다. 규칙이 AWS Lambda 함수를 호출하도록 구성합니다. Lambda 함수가 Amazon Simple Notification Service(Amazon SNS) 토픽에 메시지를 게시하고 암호화되지 않은 리소스를 삭제하도록 구성합니다."], "answer": "A", "multi": false, "explanation": "AWS Config는 규정 준수 요구 사항에 따라 리소스 구성을 지속적으로 평가하는 관리형 규칙을 제공합니다. AWS 공인 보안 - 전문 문서에서는 대규모 구성 규정 준수를 시행하기 위한 기본 메커니즘으로 AWS Config 관리형 규칙을 강조합니다. 암호화된 RDS 스토리지에 대한 관리형 규칙은 암호화를 활성화하지 않고 생성된 DB 인스턴스 및 클러스터를 자동으로 감지합니다. 자동 교정을 구성하면 AWS Config는 수동 개입 없이 즉시 수정 조치를 호출할 수 있습니다. 문제 해결을 Amazon SNS 주제와 통합하면 자동화된 이메일 알림이 활성화되고, AWS Lambda 함수는 비준수 리소스를 종료할 수 있습니다. 이렇게 하면 완전히 자동화된 감지-경고-교정 워크플로가 생성됩니다. 옵션 B에는 수동 수정이 필요하므로 운영 노력이 증가하고 시행이 지연됩니다. 옵션 C와 D는 구성 상태가 아닌 이벤트를 평가하고 지속적인 규정 준수 모니터링을 제공하지 않는 Amazon EventBridge를 사용합니다. AWS Config는 구성 규정 준수 및 거버넌스 사용 사례를 위해 명시적으로 설계되었습니다. 이 솔루션은 지속적인 모니터링, 자동화된 수정 및 중앙 집중식 알림을 최소한의 운영 오버헤드와 결합하여 AWS 거버넌스 모범 사례에 부합합니다."},
  {"id": 90, "text": "IAM 역할이 수정될 때 알림을 보냅니다.", "choices": ["Amazon Detective를 사용하세요.", "CloudTrail 이벤트와 함께 EventBridge를 사용하세요.", "CloudWatch 메트릭 필터를 사용합니다.", "CloudWatch 구독 필터를 사용합니다."], "answer": "B", "multi": false, "explanation": "EventBridge는 CloudTrail 관리 이벤트를 본래적으로 소비하며 거의 실시간 알림을 제공합니다."},
  {"id": 91, "text": "시스템 관리자가 새 AWS KMS 고객 관리 키를 사용하여 암호화된 부팅 볼륨이 있는 새 Amazon EC2 인스턴스를 시작하려고 했습니다. EC2 콘솔에는 처음에 시작이 성공했다고 표시되었지만, 이후 인스턴스가 종료되었습니다. 시스템 관리자가 사용하는 IAM 역할에는 다음과 같은 IAM 권한이 있습니다. - ec2:설명* - ec2:AuthorizeSecurityGroupIngress - kms:암호화 - kms:복호화 - kms:재암호화* - kms:GenerateDataKey* - kms:DescribeKey 시스템 관리자에게 부족한 IAM 권한은 무엇입니까?", "choices": ["kms:GetKeyRotationStatus", "kms:CreateGrant", "kms:GenerateRandom", "kms:EnableKey"], "answer": "B", "multi": false, "explanation": "EC2가 고객 관리 KMS 키를 사용하는 암호화된 EBS 부트 볼륨으로 인스턴스를 시작할 때, AWS 서비스는 인스턴스 워크플로를 대신하여 해당 키를 사용할 수 있어야 합니다. KMS 권한 부여는 통합된 AWS 서비스가 EBS 암호화 작업에 고객 관리 키를 사용할 수 있도록 일반적으로 필요합니다. kms:CreateGrant가 없으면 실행이 시작되는 것처럼 보일 수 있지만 나중에 EC2/EBS가 키를 사용하기 위해 필요한 권한을 설정하지 못하여 실패할 수 있습니다. GetKeyRotationStatus는 회전 구성만 읽고, GenerateRandom은 EBS 암호화와 관련이 없으며, EnableKey는 사용 중지된 키를 다시 활성화하기 위한 관리 작업입니다. 암호화된 볼륨 시작에 필요한 운영 권한은 CreateGrant입니다."},
  {"id": 92, "text": "한 전자상거래 웹사이트가 DDoS 공격으로 인해 1시간 동안 접속이 불가능했습니다. 공격 시간 동안 사용자들은 웹사이트에 접속할 수 없었습니다. 해당 전자상거래 회사의 보안팀은 향후 발생할 수 있는 공격에 대해 우려하고 있으며, 이에 대비하고자 합니다. 회사는 향후 유사한 공격 발생 시 웹사이트 접속 중단 시간을 최소화해야 합니다. 이 목표를 달성하는 데 도움이 될 단계는 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["Amazon GuardDuty를 활성화하여 악의적인 활동을 자동으로 모니터링하고 무단 액세스를 차단합니다.", "AWS Shield Advanced를 구독하고 공격 발생 시 AWS 지원팀에 문의하세요.", "VPC Flow Logs를 사용하여 네트워크 트래픽을 모니터링하고 AWS Lambda 함수를 사용하여 보안 그룹을 통해 공격자의 IP를 자동으로 차단합니다.", "AWS CloudTrail 이벤트를 실시간으로 모니터링하기 위해 Amazon EventBridge 규칙을 설정하고, 구성을 감사하기 위해 AWS Config 규칙을 사용하고, 문제 해결을 위해 AWS Systems Manager를 사용합니다.", "AWS WAF를 사용하여 이러한 공격에 대응하는 규칙을 생성하세요."], "answer": "B,E", "multi": true, "explanation": "향후 DDoS 이벤트 동안 다운타임을 최소화하기 위해, 회사는 활성 DDoS 보호 및 대규모 신속 완화 기능을 제공하는 서비스를 사용해야 합니다. AWS Shield Advanced(옵션 B)는 인터넷에 공개된 애플리케이션에 대한 향상된 DDoS 보호를 위해 설계되었습니다. 이 서비스는 확장된 탐지 및 완화 기능, 특정 경우에 비용 보호를 제공하며, 중요하게도, AWS Support를 통해 AWS DDoS 대응 팀(DRT)에 접근할 수 있어 회사가 공격 중 전문가를 참여시켜 영향력을 줄이고 가용성을 더 빨리 회복할 수 있습니다. 또한, AWS WAF(옵션 E)는 DDoS 이벤트에 종종 동반되는 애플리케이션 계층(레이어 7) 공격(예: HTTP 플러드, 봇 기반 악용, 알려진 익스플로잇 패턴)을 완화하는 데 도움이 됩니다. WAF는 의심스러운 요청을 차단하거나 방어하고, 비율 기반 제어를 적용하며, 관리형 규칙 그룹을 사용하여 악성 트래픽이 원본에 도달하기 전에 감소시켜 복원력과 가용성을 향상시킬 수 있습니다."},
  {"id": 93, "text": "보안 엔지니어는 특정 AWS 리소스에 대한 구성 변경 사항을 평가하여 해당 리소스가 규정 준수 표준을 충족하는지 확인하려고 합니다. 그러나 보안 엔지니어는 해당 리소스에 여러 구성 변경이 빠르게 연속적으로 발생하는 상황을 우려하고 있습니다. 보안 엔지니어는 일련의 변경 사항이 미치는 누적 영향을 파악하기 위해 해당 리소스의 최신 구성만 기록하고자 합니다. 어떤 솔루션이 운영 효율성을 극대화하면서 이러한 요구 사항을 충족할까요?", "choices": ["AWS CloudTrail을 사용하여 API 호출을 필터링하여 구성 변경 사항을 모니터링함으로써 구성 변경을 감지할 수 있습니다. 여러 API 호출의 누적 영향을 나타내려면 가장 최근의 API 호출을 사용하십시오.", "AWS Config를 사용하여 구성 변경 사항을 감지하고 여러 구성 변경이 있는 경우 최신 구성을 기록합니다.", "Amazon CloudWatch를 사용하여 API 호출을 필터링하여 구성 변경 사항을 모니터링하고 이를 감지합니다. 여러 호출의 누적 영향을 나타내려면 가장 최근의 API 호출을 사용합니다.", "AWS Cloud Map을 사용하여 구성 변경 사항을 감지합니다. 슬라이딩 타임 윈도우를 사용하여 AWS Cloud Map에서 구성 변경 사항 보고서를 생성하고 최신 상태를 추적합니다."], "answer": "B", "multi": false, "explanation": "AWS Config는 AWS 리소스에 대한 구성 변경을 감지, 추적 및 평가하도록 설계되었습니다. 이는 리소스의 최신 구성 스냅샷을 제공하며, 시간 경과에 따른 변경의 누적 영향을 캡처합니다. 여러 변경이 빠르게 연속하여 발생하는 경우, AWS Config는 모든 변경 후의 최종 상태를 기록하여 최신 구성만 효율적으로 추적해야 하는 요구사항을 충족합니다."},
  {"id": 94, "text": "한 회사가 AWS Organizations를 사용하여 단일 조직 내에서 AWS 계정을 관리하고 있습니다. 이 회사는 모든 OU에 FullAWSAccess SCP를 적용했습니다. 그러나 이제 특정 서비스에 대한 접근을 명시적으로 차단해야 합니다. 이 회사는 조직 내 모든 사용자가 명시적으로 차단된 서비스에 접근하지 못하도록 제한하는 솔루션이 필요합니다. 또한, 해당 솔루션은 조직 전체의 모든 Amazon S3 버킷에 최소 TLS 버전 1.2를 적용해야 합니다. 회사는 기존 계정 및 향후 생성할 모든 신규 계정에 적용되는 중앙 집중식 솔루션을 필요로 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["조직에서 제한된 서비스 목록을 차단하는 SCP를 생성합니다. TLS 버전이 1.2 미만인 s3:*에 대한 액세스를 차단하는 RCP를 생성합니다. 두 정책을 모두 조직의 루트에 연결합니다.", "조직에서 제한된 서비스 목록을 차단하는 SCP를 생성합니다. TLS 버전이 1.2 미만인 s3:*에 대한 액세스를 차단하는 RCP를 생성합니다. 해당 SCP를 루트 OU에 연결합니다. 조직 내 각 계정에 해당 RCP를 연결합니다.", "TLS 버전이 1.2 미만인 s3:*에 대한 접근을 차단하는 SCP 거부문을 생성합니다. 조직에서 제한된 서비스 목록을 차단하는 RCP를 생성합니다. 두 정책을 모두 루트 OU에 적용합니다.", "조직에서 제한된 서비스 목록을 차단하는 SCP를 생성합니다. TLS 버전이 1.2 미만인 s3:*에 대한 접근을 차단하는 선언적 정책을 생성합니다. 두 정책을 모두 조직의 루트 디렉터리에 연결합니다."], "answer": "A", "multi": false, "explanation": "SCP와 RCP는 이 거버넌스 요구 사항의 서로 다른 측면을 해결합니다. SCP는 조직 계정에서 IAM 사용자와 역할의 최대 권한을 중앙에서 정의하므로 명시적으로 거부된 서비스에는 SCP 거부 목록이 적절합니다. RCP는 조직 내 리소스에 대해 최대 사용 권한을 중앙에서 제어하며 조직 루트, OU 또는 계정에 연결할 수 있습니다. 모든 현재 및 미래 계정에 대해 S3 최소 TLS를 중앙에서 강제하려면 s3:TlsVersion이 1.2 미만일 때 S3 접근을 거부하는 RCP를 조직 루트에 연결해야 합니다. 현재 계정에만 연결하면 미래 계정을 놓치게 됩니다. 서비스 거부 목록을 RCP에 넣는 것은 잘못된 정책 유형입니다. 선언적 정책은 여기서 올바른 S3 요청 조건 제어가 아닙니다."},
  {"id": 95, "text": "기업은 AWS CloudTrail 데이터 이벤트를 수집하고 해당 로그를 7년 동안 보관해야 합니다. 로그는 변경 불가능해야 하며 복잡한 쿼리를 통해 검색할 수 있어야 합니다. 또한 기업은 로그에서 데이터를 시각화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 가장 비용 효율적으로 충족할까요?", "choices": ["CloudTrail Lake 데이터 저장소를 생성합니다. 결과를 시각화하고 쿼리할 수 있도록 CloudTrail Lake 대시보드를 구현합니다.", "AWS Management Console에서 CloudTrail 이벤트 기록 기능을 사용하세요. 콘솔에서 결과를 시각화하고 쿼리할 수 있습니다.", "CloudTrail 로그를 Amazon S3 버킷으로 전송합니다. S3 버킷에 액세스할 수 있는 영구 Amazon EMR 클러스터를 프로비저닝합니다. S3 버킷에 S3 객체 잠금을 활성화합니다. Apache Spark를 사용하여 쿼리를 수행합니다. Amazon QuickSight를 사용하여 시각화합니다 .", "CloudTrail 로그를 Amazon CloudWatch Logs의 로그 그룹으로 전송합니다. CloudWatch Logs 스트림을 설정하여 데이터를 Amazon OpenSearch Service 도메인으로 전송합니다. OpenSearch Service 도메인에 콜드 스토리지를 활성화합니다. 시각화 및 쿼리를 위해 OpenSearch 대시보드를 사용합니다."], "answer": "A", "multi": false, "explanation": "AWS CloudTrail Lake는 추가 인프라 없이 데이터 이벤트를 포함한 CloudTrail 이벤트를 저장, 쿼리 및 분석하도록 특별히 제작되었습니다. AWS 공인 보안 - 전문 문서에서는 CloudTrail Lake가 7년 보존과 같은 장기 규정 준수 요구 사항을 충족하는 다년 보존을 포함하여 구성 가능한 보존 기간을 갖춘 변경 불가능한 이벤트 스토리지를 제공한다고 설명합니다. 이벤트는 AWS에서 관리하는 변경 불가능한 추가 형식으로 저장되므로 운영 복잡성이 줄어듭니다. CloudTrail Lake는 이벤트 데이터에 대한 복잡한 분석을 위한 SQL 기반 쿼리를 직접 지원하므로 쿼리를 위해 로그를 다른 서비스로 내보낼 필요가 없습니다. 또한 CloudTrail Lake에는 별도의 분석이나 시각화 플랫폼을 설치하지 않고도 이벤트 추세와 패턴을 시각화할 수 있는 대시보드와 통합 기능이 내장되어 있습니다. CloudTrail 이벤트 기록은 최대 90일 동안만 이벤트를 보관하고 장기 보관이나 고급 쿼리를 지원하지 않기 때문에 옵션 B는 유효하지 않습니다. 옵션 C는 영구 Amazon EMR 클러스터와 추가 서비스를 요구하여 높은 운영 오버헤드와 비용을 발생시킵니다. 옵션 D는 7년 동안 OpenSearch Service에 대한 지속적인 수집, 인덱싱 및 저장 비용을 발생시키므로 CloudTrail Lake보다 비용 효율성이 떨어집니다. AWS 설명서에서는 CloudTrail Lake를 쿼리 가능한 장기 CloudTrail 이벤트 저장 및 시각화를 위한 가장 비용 효율적이고 운영 효율적인 솔루션으로 제시합니다."},
  {"id": 96, "text": "한 회사가 Amazon Elastic Container Registry(Amazon ECR)에 저장된 컨테이너 이미지를 사용하여 AWS Lambda 함수를 생성합니다. 이 회사는 컨테이너 이미지의 소프트웨어 취약점과 Lambda 함수의 코드 취약점을 식별해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["Amazon GuardDuty를 활성화합니다. GuardDuty에서 Amazon ECR 스캔 및 Lambda 코드 스캔을 구성합니다.", "Amazon GuardDuty를 활성화합니다. GuardDuty에서 런타임 모니터링 및 Lambda 보호를 구성합니다.", "Amazon Inspector를 활성화합니다. Amazon Inspector에서 Amazon ECR 향상된 스캔 및 Lambda 코드 스캔을 구성합니다.", "AWS Security Hub를 활성화합니다. Security Hub에서 런타임 모니터링 및 Lambda 보호를 구성합니다."], "answer": "C", "multi": false, "explanation": "Amazon Inspector는 Amazon ECR 컨테이너 이미지 및 AWS Lambda 함수를 포함한 컴퓨팅 워크로드 전반의 취약성 관리를 위해 특별히 설계된 AWS 서비스입니다. AWS 공인 보안 전문 문서에 따르면 Amazon Inspector는 운영 체제 및 애플리케이션 종속성의 일반적인 취약점 및 노출(CVE)을 식별하는 향상된 이미지 스캐닝을 수행하여 ECR에 저장된 컨테이너 이미지에 대한 자동화된 취약점 평가를 제공합니다. Inspector는 또한 알려진 소프트웨어 취약점에 대한 함수 패키지 및 컨테이너 기반 Lambda 이미지를 분석하기 위해 Lambda 코드 스캐닝을 지원합니다. 조사 결과에는 심각도 등급 및 해결 지침이 포함되어 있어 보안 팀이 위험을 효율적으로 식별하고 우선 순위를 지정할 수 있습니다. Amazon GuardDuty는 행동 분석을 사용한 위협 탐지에 중점을 두고 컨테이너 이미지 또는 Lambda 코드의 정적 취약성 검색을 수행하지 않습니다. AWS Security Hub는 다른 서비스의 결과를 집계하지만 스캔 자체를 수행하지는 않습니다. AWS 모범 사례에서는 컨테이너 이미지 및 서버리스 워크로드의 취약성 탐지를 위해 Amazon Inspector를 권장합니다."},
  {"id": 97, "text": "한 회사가 아마존 엘라스틱 쿠버네티스 서비스(Amazon EKS) 클러스터를 사용하여 쿠버네티스 기반 애플리케이션을 실행합니다. 이 회사는 아마존 가드듀티(Amazon GuardDuty)를 사용하여 애플리케이션을 보호합니다. GuardDuty에서 EKS 보호 기능이 활성화되어 있습니다. 하지만 해당 GuardDuty 기능은 Kubernetes 기반 애플리케이션을 모니터링하지 않습니다. GuardDuty가 Kubernetes 기반 애플리케이션을 모니터링하도록 하려면 어떤 솔루션을 선택해야 할까요?", "choices": ["EKS 클러스터를 호스팅하는 VPC에 대해 VPC 흐름 로그를 활성화합니다.", "EKS 클러스터에 CloudWatchEventsFullAccess AWS 관리형 정책을 할당합니다.", "AmazonGuardDutyFullAccess AWS 관리형 정책이 GuardDuty 서비스 역할에 연결되어 있는지 확인하십시오.", "Amazon EKS에서 컨트롤 플레인 로그를 활성화합니다. 로그가 Amazon CloudWatch로 수집되는지 확인합니다."], "answer": "D", "multi": false, "explanation": "Amazon GuardDuty의 EKS 보호는 Kubernetes 활동을 모니터링하고 잠재적인 보안 위협을 감지하기 위해 Amazon EKS 제어 플레인 로그에 의존합니다. EKS에서 제어 플레인 로깅(예: API 서버 로그)을 활성화하고 이러한 로그를 Amazon CloudWatch로 전송하면 GuardDuty가 Kubernetes 활동을 분석할 수 있어 EKS 클러스터에서 위협을 감지할 수 있습니다."},
  {"id": 98, "text": "한 회사가 AWS Organizations에 조직을 보유하고 있습니다. 이 조직은 여러 개의 OU로 구성되어 있습니다. 회사는 조직 외부의 IAM 주체가 조직의 Amazon S3 버킷에 접근하는 것을 차단해야 합니다. 이 솔루션은 각 OU가 기존에 S3 버킷에 접근하는 권한에 영향을 미치지 않아야 합니다. 이러한 요구 사항을 충족하는 솔루션은 무엇일까요?", "choices": ["모든 S3 버킷에 대해 S3 공개 액세스 차단을 구성합니다.", "모든 AWS 계정에 대해 S3 공개 액세스 차단을 구성합니다.", "\"aws:ResourceOrgPaths\": \"${aws:PrincipalOrgPaths}\" 조건을 포함하는 SCP를 배포합니다.", "\"aws:ResourceOrgID\": \"${aws:PrincipalOrgID}\" 조건을 포함하는 SCP를 배포합니다."], "answer": "D", "multi": false, "explanation": "aws:ResourceOrgID 및 aws:PrincipalOrgID 조건이 있는 SCP를 사용하면 동일한 AWS 조직 내의 IAM 주체만 S3 버킷에 접근할 수 있도록 보장할 수 있습니다. 이 SCP는 조직 외부의 IAM 주체로부터의 접근을 제한하는 동시에 조직 내에서는 접근을 허용합니다. 이 접근 방식은 OU 내 기존 권한에 영향을 주지 않으면서 요구 사항을 충족합니다."},
  {"id": 99, "text": "한 회사가 AWS Organizations에 조직을 보유하고 있습니다. 이 회사는 AWS IAM Identity Center와 외부 ID 공급자를 사용하여 액세스를 관리합니다. 이 회사는 ID 공급자에 장애가 발생하더라도 AWS에 대한 액세스를 유지할 수 있는 솔루션이 필요합니다. 또한, 이 솔루션은 비상 액세스 권한을 개별 관리자에게 할당할 수 있어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["비상 관리자용 IAM 사용자를 생성합니다. IAM 사용자에게 강력한 암호와 다단계 인증(MFA)을 설정합니다. IAM 사용자가 조직 내 계정에 대한 교차 계정 액세스 권한을 부여하여 긴급 변경 작업을 수행할 수 있도록 권한을 할당합니다.", "ID 공급자 내에 비상 사용자를 생성합니다. IAM ID 센터와 ID 공급자 간의 매핑을 보장하기 위해 도메인 간 ID 관리 시스템(SCDM) 프로비저닝을 활성화합니다. 비상 사용자가 비상 변경 작업을 수행할 수 있도록 IAM ID 센터에서 권한 집합을 할당하여 계정 간 액세스 권한을 부여합니다.", "IAM ID 센터에서 보조 ID 공급자를 구성합니다. 보조 ID 공급자에 계정 간 긴급 변경 작업을 수행할 수 있는 권한을 가진 긴급 사용자를 생성합니다. IAM ID 센터의 외부 ID 공급자를 보조 ID 공급자로 변경합니다.", "관리 계정의 루트 사용자에 대한 액세스 키를 생성합니다. 비상시 관리자가 사용할 수 있도록 액세스 키를 공유 비밀 저장소에 저장합니다. 액세스 키를 사용하여 조직 전체에 걸쳐 비상 변경 작업을 수행합니다."], "answer": "A", "multi": false, "explanation": "긴급 접근은 외부 아이덴티티 제공자 장애 상황에서도 유지되어야 하며, 개별 관리자를 여전히 식별할 수 있어야 합니다. AWS Well-Architected 가이드는 중앙 집중식 아이덴티티 제공자를 사용할 수 없는 상황에 대비해 브레이크 글래스 긴급 접근 프로세스를 구축할 것을 권장합니다. 강력한 비밀번호와 MFA로 보호된 명명된 긴급 관리자용 별도의 IAM 사용자는 개별 귀속과 실패한 IdP와의 독립성을 충족합니다. 동일한 IdP 내에서 긴급 사용자를 생성하는 것은 IdP 장애 시 도움이 되지 않습니다. 긴급 상황에서 IAM Identity Center를 보조 IdP로 전환하는 것은 운영적으로 위험하고 느립니다. 공유 루트 액세스 키는 개별 귀속을 제거하고 장기적으로 높은 권한의 자격 증명을 생성하며 루트 사용자 보안 모범 사례를 위반하므로 가장 나쁜 옵션입니다."},
  {"id": 100, "text": "한 회사가 AWS Organizations에서 100개의 계정으로 구성된 조직을 사용하고 있습니다. 이 회사는 관리 계정 내의 AWS Organizations에 대해 Amazon GuardDuty의 신뢰할 수 있는 액세스를 구성했습니다. 또한, 조직 구성원 계정 중 하나를 GuardDuty 관리자로 지정했습니다. GuardDuty는 정상적으로 작동하며 GuardDuty 콘솔에 조직에 대한 탐지 결과를 보고합니다. 해당 회사는 GuardDuty 심각도 수준에 따라 조직 내에서 심각도가 높은 것으로 판단되는 모든 GuardDuty 탐지 결과에 대해 보안 운영(SecOps) 팀이 실시간 이메일 알림을 받을 수 있도록 하기를 원합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["관리 계정에서 심각도 수준이 높은 GuardDuty 발견에 대응하는 Amazon EventBridge 규칙을 생성합니다. 해당 규칙이 Amazon SNS 토픽으로 알림을 보내도록 구성합니다. SecOps 팀의 이메일 주소를 해당 SNS 토픽에 구독합니다.", "조직 내에서 AWS Config에 대한 신뢰할 수 있는 액세스를 구성합니다. GuardDuty에서 보관되지 않은 발견 사항을 모니터링하는 AWS Config 규칙을 생성합니다. AWS Config에서 해당 AWS Config 규칙에 대한 규정 준수 변경 사항이 감지될 경우 반응하는 Amazon EventBridge 규칙을 생성합니다. EventBridge 규칙이 Amazon SNS 주제를 대상으로 하도록 구성합니다. SecOps 팀의 이메일 주소를 해당 SNS 주제에 구독합니다.", "GuardDuty 위임 관리자 계정에서 심각도 수준이 높은 GuardDuty 탐지에 반응하는 Amazon EventBridge 규칙을 구성합니다. 해당 규칙이 Amazon SNS 토픽으로 알림을 보내도록 구성하고, SecOps 팀의 이메일 주소를 해당 SNS 토픽에 구독합니다.", "관리 계정에서 조직에 대한 AWS CloudTrail을 구성합니다. ListFindings API 호출 시 실행될 Amazon EventBridge 규칙을 생성합니다. 해당 규칙이 Amazon SNS 토픽으로 알림을 보내도록 구성합니다. SecOps 팀의 이메일 주소를 해당 SNS 토픽에 구독합니다."], "answer": "C", "multi": false, "explanation": "GuardDuty는 발견 내용을 자동으로 Amazon EventBridge에 게시하며, EventBridge는 이러한 이벤트를 Amazon SNS와 같은 대상에 라우팅하여 거의 실시간 알림을 제공할 수 있습니다. 조직이 이미 위임된 GuardDuty 관리자 계정을 사용하고 있기 때문에 조직 수준의 발견 내용은 해당 위임된 관리자 계정에서 관리되므로 EventBridge 규칙은 그곳에서 생성되어야 합니다. 이 규칙은 GuardDuty 발견 이벤트와 일치시키고 심각도가 높은 발견 내용을 필터링한 후 SecOps 팀이 구독한 SNS 주제로 보낼 수 있습니다. 규칙을 관리 계정에서 생성하는 것은 위임된 관리 모델과 일치하지 않습니다. AWS Config는 GuardDuty 발견 알림을 관리하지 않으며, CloudTrail ListFindings API 이벤트는 실시간 GuardDuty 보안 발견의 출처가 아닙니다."},
  {"id": 101, "text": "한 회사가 아마존 API 게이트웨이를 사용하여 사용자에게 REST API를 제공합니다. API 개발자는 로그 파일을 분석하지 않고도 API 접근 패턴을 분석하고 싶어합니다. 다음 요구사항을 가장 적은 노력으로 충족할 수 있는 단계 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["필요한 API 단계에 대한 액세스 로깅을 구성합니다.", "API Gateway 이벤트에 대한 AWS CloudTrail 트레일 대상을 구성합니다. userIdentity, userAgent 및 sourceIPAddress 필드에 필터를 구성합니다.", "API Gateway 로그를 저장할 Amazon S3 대상을 구성합니다. Amazon Athena 쿼리를 실행하여 API 액세스 정보를 분석합니다.", "Amazon CloudWatch Logs Insights를 사용하여 API 액세스 정보를 분석합니다.", "필요한 API 단계에서 '상세 CloudWatch 메트릭 활성화' 옵션을 선택합니다."], "answer": "D,E", "multi": true, "explanation": "원시 로그 파일을 파싱하지 않고 최소한의 노력으로 API 접근 패턴을 분석하려면, 가장 좋은 방법은 메트릭과 내장된 쿼리 도구를 활용하는 것입니다. API Gateway 스테이지에 대한 자세한 CloudWatch 메트릭 옵션(E)을 활성화하면, 사용량 및 성능 패턴(요청 수, 지연 시간, 4XX/5XX와 같은 오류율 등)에 대해 거의 실시간으로 집계된 가시성을 제공하므로 로그를 직접 처리하지 않고도 추세와 급증을 식별하는 데 이상적입니다. 필요한 경우 보다 깊이 있는 패턴 탐색을 위해 CloudWatch Logs Insights 옵션(D)는 이미 CloudWatch Logs에 있는 로그를 대상으로 상호작용형 쿼리 경험을 제공하여 빠른 필터링과 집계를 가능하게 합니다. 실제로 개발자들은 메트릭을 사용하여 높은 수준에서 접근 패턴을 이해하고, Logs Insights를 사용하여 별도의 파싱 파이프라인을 구축하지 않고 요청 데이터를 세분화하여 분석합니다."},
  {"id": 102, "text": "한 회사가 동일한 IAM 인스턴스 프로필을 사용하는 특정 Amazon Linux 2 EC2 인스턴스에서 모든 SSH 키를 영구적으로 제거하려고 합니다. 하지만 IAM 사용자 계정을 가진 세 명의 직원이 중요한 업무를 수행하기 위해 SSH 세션을 통해 이러한 인스턴스에 액세스해야 합니다. 보안 엔지니어는 어떻게 이러한 요구 사항을 충족하는 접근 권한을 제공할 수 있을까요?", "choices": ["EC2 인스턴스를 AWS Systems Manager로 관리할 수 있도록 인스턴스 프로필에 IAM 정책을 할당합니다. Systems Manager를 사용할 수 있는 권한을 IAM 사용자 계정에 부여합니다. EC2 인스턴스에서 SSH 키를 제거합니다. Systems Manager 인벤토리를 사용하여 EC2 인스턴스를 선택하고 연결합니다.", "AWS Systems Manager 실행 명령을 사용할 수 있도록 IAM 정책을 IAM 사용자 계정에 할당합니다. EC2 인스턴스에서 SSH 키를 제거합니다. 실행 명령을 사용하여 EC2 인스턴스에 SSH 연결을 엽니다.", "EC2 인스턴스를 AWS Systems Manager로 관리할 수 있도록 인스턴스 프로필에 IAM 정책을 할당합니다. Systems Manager를 사용할 수 있는 권한을 IAM 사용자 계정에 부여합니다. EC2 인스턴스에서 SSH 키를 제거합니다. Systems Manager 세션 관리자를 사용하여 EC2 인스턴스를 선택하고 연결합니다.", "AWS Management Console에서 EC2 서비스를 사용할 수 있도록 IAM 사용자 계정에 IAM 정책을 할당하여 권한을 부여합니다. EC2 인스턴스에서 SSH 키를 제거합니다. AWS Management Console의 EC2 SSH 클라이언트 메서드를 사용하여 ec2-user로 EC2 인스턴스에 연결합니다."], "answer": "C", "multi": false, "explanation": "Systems Manager 세션 매니저(Session Manager)는 SSH 키 기반 접근의 올바른 대체 수단입니다. 세션 매니저를 사용하면 승인된 사용자가 SSH 키를 제공하지 않고도 브라우저나 AWS CLI를 통해 관리되는 EC2 인스턴스에 연결할 수 있습니다. EC2 인스턴스는 관리형 노드여야 하며, 이를 위해서는 Systems Manager 에이전트와 AmazonSSMManagedInstanceCore와 같은 Systems Manager 권한이 있는 인스턴스 프로파일이 필요합니다. 개별 IAM 사용자 또한 세션을 시작할 권한이 있어야 합니다. Systems Manager 인벤토리는 소프트웨어 및 구성 인벤토리만 수집하며, 대화형 셸 접근을 제공하지 않습니다. Run Command는 원격으로 명령을 실행하지만 SSH 세션을 열지는 않습니다. EC2 콘솔 SSH 클라이언트는 여전히 SSH 스타일 접근 방식을 사용하며 SSH 키를 영구적으로 제거해야 한다는 요구 사항을 충족하지 않습니다."},
  {"id": 103, "text": "한 회사가 외부 업체와 계약하여 여러 AWS 계정에 대한 감사를 진행하고 있습니다. 감사를 위해 감사 대상 계정 각각에 계정 간 IAM 역할이 생성되었습니다. 그런데 감사 담당자가 일부 계정에 접근하는 데 어려움을 겪고 있습니다. 다음 중 이 문제의 원인이 될 수 있는 것은 무엇입니까? (세 가지를 선택하십시오.)", "choices": ["감사자가 사용하는 외부 ID가 없거나 잘못되었습니다.", "감사자가 잘못된 비밀번호를 사용하고 있습니다.", "감사자는 대상 계정의 역할에 대해 asumeRole 권한을 부여받지 못했습니다.", "감사자가 사용하는 Amazon EC2 역할은 대상 계정 역할로 설정되어야 합니다.", "감사자가 사용하는 비밀 키가 없거나 잘못되었습니다.", "감사자가 사용하는 역할 ARN이 없거나 잘못되었습니다."], "answer": "A,C,F", "multi": true, "explanation": "외부 감사자를 위한 교차 계정 액세스는 일반적으로 각 대상 계정에 존재하는 역할에 STS AssumeRole을 사용합니다. 세 가지 일반적인 실패 지점은 다음과 같습니다. (1) 역할 ARN이 잘못되었거나 누락됨, (2) 감사자가 해당 역할을 호출할 권한이 없음, (3) 역할 신뢰 정책에서 요구하는 경우 외부 ID 불일치. 외부 ID는 대리인 혼동 문제를 완화하기 위한 제3자 액세스의 모범 사례입니다. 신뢰 정책에 sts:ExternalId 조건이 포함된 경우 감사자는 정확한 예상 값을 제공해야 합니다. 없거나 올바르지 않은 경우 AssumeRole이 거부됩니다. 또한 감사자는 sts:AssumeRole(권한)을 호출할 수 있는 권한을 자신 측(IAM 사용자/역할 정책)에서 승인받아야 하며, 대상 역할의 신뢰 정책은 감사 주체를 신뢰해야 합니다. 어느 쪽이든 잘못 구성되면 가정 작업이 실패합니다. 마지막으로 감사자는 각 계정에 대해 올바른 역할 ARN을 참조해야 합니다. 잘못된 ARN(잘못된 계정 ID/역할 이름/경로)을 사용하면 \"일부 계정\"만 실패하는 경우가 많습니다."},
  {"id": 104, "text": "한 회사가 인터넷에 연결되지 않은 프라이빗 VPC에 애플리케이션을 배포하려고 합니다. 회사 보안팀은 배스천 호스트나 SSH를 사용하는 방식으로 Amazon EC2 인스턴스에 로그인하는 것을 허용하지 않을 것입니다. 애플리케이션 개발팀은 AWS Systems Manager Session Manager를 사용하여 EC2 인스턴스에 연결하고 관리할 계획입니다. 보안팀은 어떤 조치들을 조합하여 취해야 할까요? (세 가지를 선택하세요.)", "choices": ["VPC 내의 모든 EC2 인스턴스에 Systems Manager 에이전트가 설치되어 실행 중인지 확인하십시오.", "VPC 내 EC2 인스턴스에 연결된 IAM 역할이 Systems Manager에 대한 액세스 권한을 허용하는지 확인하십시오.", "SSH 키 쌍 생성을 방지하는 SCP를 생성합니다.", "VPC에 NAT 게이트웨이를 시작합니다. 트래픽을 이 NAT 게이트웨이로 전달하도록 라우팅 정책을 업데이트합니다.", "Systems Manager 및 Amazon EC2에 대한 적절한 VPC 엔드포인트가 설정되어 있는지 확인하십시오.", "VPC에 트랜짓 게이트웨이가 연결되어 있는지 확인하십시오. 트래픽을 해당 트랜짓 게이트웨이로 전달하도록 라우팅 정책을 업데이트하십시오."], "answer": "A,B,E", "multi": true, "explanation": "세션 관리자는 대상 EC2 인스턴스가 관리형 노드여야 하며, 이는 Systems Manager 에이전트가 설치되어 실행 중이어야 하고 인스턴스 프로필이 Systems Manager 통신 권한을 부여해야 함을 의미합니다. 인터넷 연결이 없는 프라이빗 VPC에서는 인스턴스가 VPC 인터페이스 엔드포인트를 통해 Systems Manager 서비스 엔드포인트에 대한 프라이빗 연결을 가져야 합니다. 구성에 따라 엔드포인트에는 일반적으로 Systems Manager, EC2 메시지, Systems Manager 메시지가 포함되며, 관련 관리 작업을 위해 EC2 엔드포인트 액세스도 필요할 수 있습니다. NAT 게이트웨이는 인터넷으로 나가는 트래픽을 생성하며 프라이빗 VPC 요건과 충돌합니다. 트랜짓 게이트웨이는 자체적으로 AWS Systems Manager 서비스 연결을 제공하지 않습니다. SSH 키 페어 생성 방지는 세션 관리자 작동에 필요하지 않습니다."},
  {"id": 105, "text": "한 회사가 기존 시스템 중 하나를 온프레미스 데이터 센터에서 AWS로 마이그레이션하고 있습니다. 애플리케이션 서버는 AWS에서 실행되지만, 데이터베이스는 규정 준수상의 이유로 온프레미스 데이터 센터에 유지되어야 합니다. 데이터베이스는 네트워크 지연 시간에 민감합니다. 또한 온프레미스 데이터 센터와 AWS 간에 전송되는 데이터는 IPsec 암호화를 사용해야 합니다. 다음 요구 사항을 충족하는 AWS 솔루션 조합은 무엇입니까? (두 가지를 선택하십시오.)", "choices": ["AWS 사이트 간 VPN", "AWS Direct Connect", "AWS VPN 클라우드허브", "VPC 피어링", "NAT 게이트웨이"], "answer": "A,B", "multi": true, "explanation": "이 데이터베이스는 지연 시간에 민감하므로 연결 옵션은 지터를 최소화하고 공용 인터넷을 통한 연결보다 더 일관된 성능을 제공해야 합니다. AWS Direct Connect는 온프레미스 환경에서 AWS로 전용 네트워크 연결을 제공하며, 일반적으로 인터넷 기반 경로에 비해 더 안정적인 처리량과 낮거나 일관된 지연 시간 특성을 제공합니다. 그러나 Direct Connect 자체만으로는 자동으로 IPsec 암호화를 제공하지 않습니다. 트래픽에 반드시 IPsec 암호화가 필요하다는 명시적인 요구 사항을 만족시키기 위해, 일반적인 AWS 패턴은 Direct Connect와 함께 AWS Site-to-Site VPN(IPsec 터널)을 실행하는 것입니다. 이를 통해 트래픽을 암호화하면서 Direct Connect의 전용이고 예측 가능한 연결을 활용할 수 있는 'Direct Connect 위의 VPN' 방식으로 구성할 수 있습니다. 이 조합은 두 가지 요구 사항을 모두 충족합니다: 지연 시간 특성 개선(Direct Connect)과 IPsec 암호화(Site-to-Site VPN)."},
  {"id": 106, "text": "보안 엔지니어는 회사의 Amazon EC2 인스턴스에서 발생할 수 있는 잠재적인 보안 이벤트를 조사하고 대응하는 프로세스를 개발해야 합니다. 모든 EC2 인스턴스는 Amazon EBS 스토리지를 기반으로 합니다. 회사는 AWS Systems Manager를 사용하여 모든 EC2 인스턴스를 관리하고 있으며, 모든 EC2 인스턴스에 Systems Manager 에이전트를 설치했습니다. 보안 엔지니어가 개발하는 프로세스는 AWS 보안 모범 사례를 준수해야 하며 다음 요구 사항을 충족해야 합니다. - 손상된 EC2 인스턴스의 휘발성 메모리 및 비휘발성 메모리 법의학적 목적을 위해 보존되어야 합니다. - 손상된 EC2 인스턴스의 메타데이터는 다음으로 업데이트해야 합니다. 해당 사건 티켓 정보입니다. - 손상된 EC2 인스턴스는 다음 상황 동안 온라인 상태를 유지해야 합니다. 조사 대상이지만 악성코드 확산을 막기 위해 격리되어야 합니다. - 휘발성 데이터 수집 중 발생하는 모든 조사 활동 해당 과정은 반드시 그 과정에서 기록되어야 합니다. 보안 엔지니어는 운영 부담을 최소화하면서 이러한 요구 사항을 충족하기 위해 어떤 조치들을 조합하여 취해야 할까요? (세 가지를 선택하세요.)", "choices": ["손상된 EC2 인스턴스에 대한 관련 메타데이터를 수집합니다. 종료 보호를 활성화합니다. 인스턴스의 보안 그룹을 업데이트하여 액세스를 제한함으로써 인스턴스를 격리합니다. 인스턴스가 속한 모든 Auto Scaling 그룹에서 인스턴스를 분리합니다. 모든 Elastic Load Balancing 리소스에서 인스턴스를 등록 해제합니다.", "손상된 EC2 인스턴스에 대한 관련 메타데이터를 수집합니다. 종료 보호를 활성화합니다. 인스턴스를 모든 송수신 트래픽을 차단하는 격리 서브넷으로 이동합니다. 인스턴스를 해당 서브넷과 연결하여 액세스를 제한합니다. 인스턴스가 속한 모든 Auto Scaling 그룹에서 인스턴스를 분리합니다. 모든 Elastic Load Balancing 리소스에서 인스턴스를 등록 해제합니다.", "시스템 관리자 실행 명령을 사용하여 휘발성 데이터를 수집하는 스크립트를 실행합니다.", "손상된 EC2 인스턴스에 Linux SSH 또는 Windows 원격 데스크톱 프로토콜 세션을 설정하여 휘발성 데이터를 수집하는 스크립트를 실행합니다.", "후속 조사를 위해 손상된 EC2 인스턴스의 EBS 볼륨 스냅샷을 생성합니다. 해당 인스턴스에 관련 메타데이터 및 인시던트 티켓 정보를 태그하십시오.", "시스템 관리자 상태 관리자 연결을 생성하여 손상된 EC2 인스턴스의 EBS 볼륨 스냅샷을 생성합니다. 관련 메타데이터 및 인시던트 티켓 정보를 사용하여 인스턴스에 태그를 지정합니다."], "answer": "A,C,E", "multi": true, "explanation": "최상의 프로세스는 수작업 접근을 최소화하면서 증거를 보존합니다. 보안 그룹 격리는 표준 EC2 격리 방법이며, Auto Scaling 및 로드 밸런서에서 분리하면 조사 동안 교체나 운영 라우팅 변경을 방지할 수 있습니다. Systems Manager Run Command는 스크립트 수집을 감사를 추적할 수 있는 명령 기록과 함께 실행하고 증거를 오염시킬 수 있는 상호작용 로그인 활동을 피하기 때문에 SSH나 RDP보다 선호됩니다. EBS 스냅샷은 이후 포렌식 분석을 위해 비휘발성 디스크 데이터를 보존하며, 인스턴스에 사고 메타데이터를 태그하면 추적 가능성과 관리 연속성 워크플로를 지원합니다. 인스턴스를 서브넷 간 이동하는 것은 방해가 되며 불필요합니다. State Manager는 지속적인 구성 연관을 위한 것이며, 최소한의 부담으로 즉각적인 사고 관련 포렌식 수집을 위한 것이 아닙니다."},
  {"id": 107, "text": "한 회사가 민감한 데이터를 처리하는 애플리케이션을 배포하기 위해 Amazon Elastic Container Service(Amazon ECS)를 사용하고 있습니다. 최근 보안 감사에서 Amazon RDS 자격 증명이 회사 소스 코드 저장소의 애플리케이션 코드와 함께 저장되어 있는 보안 취약점이 발견되었습니다. 보안 엔지니어는 데이터베이스 자격 증명을 안전하게 저장하고 주기적으로 교체하는 솔루션을 개발해야 합니다. 자격 증명은 애플리케이션에서만 접근할 수 있어야 하며, 데이터베이스 관리자가 자격 증명을 평문으로 다른 팀원과 공유하는 것을 방지해야 합니다. 또한, 관리 오버헤드를 최소화해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족합니까?", "choices": ["AWS Systems Manager 파라미터 스토어를 사용하여 데이터베이스 자격 증명을 생성합니다. ECS 작업에 IAM 프로필을 사용하여 특정 컨테이너에만 데이터베이스 자격 증명에 대한 액세스를 제한합니다.", "AWS Secrets Manager를 사용하여 데이터베이스 자격 증명을 저장하세요. ECS 작업에 대해 IAM 인라인 정책을 사용하여 특정 컨테이너만 데이터베이스 자격 증명에 액세스할 수 있도록 제한하세요.", "AWS Systems Manager 파라미터 스토어를 사용하여 데이터베이스 자격 증명을 저장하세요. ECS 작업에 IAM 역할을 사용하여 특정 컨테이너만 데이터베이스 자격 증명에 액세스할 수 있도록 제한하세요.", "AWS Secrets Manager를 사용하여 데이터베이스 자격 증명을 저장하세요. ECS 작업에 IAM 역할을 사용하여 특정 컨테이너만 데이터베이스 자격 증명에 액세스할 수 있도록 제한하세요."], "answer": "D", "multi": false, "explanation": "AWS Secrets Manager는 암호를 안전하게 저장하고 일정에 따라 자동 교체를 지원하도록 설계된 AWS 서비스로, 일반적으로 Amazon RDS 자격 증명에 사용됩니다. Secrets Manager에 자격 증명을 저장하면 소스 코드에서 해당 자격 증명이 제거되고, 세분화된 액세스 제어가 가능하며, CloudTrail을 통한 암호 검색 감사 기능이 지원됩니다. 데이터베이스 비밀번호를 주기적으로 변경하고 저장된 비밀을 자동으로 업데이트하도록 교체를 구성할 수 있으므로 수동 교체 프로세스에 비해 운영 오버헤드가 최소화됩니다. 애플리케이션에서만 자격 증명에 액세스할 수 있도록 하려면 올바른 ECS 패턴은 작업에 IAM 역할을 사용하는 것입니다. 특정 암호 ARN에 대해 secretsmanager:GetSecretValue(및 필요한 경우 관련 작업)만 허용하도록 작업 역할의 범위를 지정할 수 있습니다. 해당 역할로 실행되는 작업만 런타임 시 비밀을 검색할 수 있으므로 광범위한 액세스가 방지됩니다. 이는 또한 데이터베이스 관리자가 일반 텍스트 자격 증명을 공유하는 위험을 줄이는 데 도움이 됩니다. 권장되는 운영 모델은 사람이 직접 액세스할 필요가 없어야 하기 때문입니다. 애플리케이션은 프로그래밍 방식으로 비밀을 검색하며, 필요한 경우 액세스를 Break Glass 워크플로로 제한할 수 있습니다."},
  {"id": 108, "text": "한 회사가 민감한 데이터가 포함된 모든 객체를 Amazon S3 버킷에 저장하려고 합니다. 이 회사는 서버 측 암호화를 사용하여 S3 버킷을 암호화할 예정입니다. 회사 운영팀은 S3 버킷에 대한 접근 권한을 관리하고, 보안팀은 암호화 키에 대한 접근 권한을 관리합니다. 회사는 두 팀의 업무를 분리하여, 어느 한 팀의 설정 오류로 인해 무단으로 평문 데이터에 접근하여 데이터가 손상되는 것을 방지하고자 합니다. 어떤 솔루션이 이 요구 사항을 충족할까요?", "choices": ["운영팀에서 Amazon S3 관리형 암호화 키(SSE-S3)를 사용한 서버 측 암호화를 사용하도록 S3 버킷의 기본 버킷 암호화를 구성했는지 확인하십시오. 보안팀에서 암호화 키 사용에 대한 액세스를 제어하는 ​IAM 정책을 생성했는지 확인하십시오.", "운영팀에서 고객이 관리하는 AWS KMS 키(SSE-KMS)를 사용한 서버 측 암호화를 요청 시 사용하도록 요구하는 버킷 정책을 생성하도록 합니다. 보안팀에서 암호화 키에 대한 액세스를 제어하는 ​키 정책을 생성하도록 합니다.", "운영팀에서 Amazon S3 관리형 키(SSE-S3)를 사용한 서버 측 암호화를 요청하도록 요구하는 버킷 정책을 생성하도록 합니다. 보안팀에서 암호화 키에 대한 액세스를 제어하는 ​IAM 정책을 생성하도록 합니다.", "운영팀에서 고객이 제공한 암호화 키(SSE-C)를 사용한 서버 측 암호화를 요청 시 사용하도록 요구하는 버킷 정책을 생성하도록 합니다. 보안팀에서 고객이 제공한 키를 AWS 키 관리 서비스(AWS KMS)에 저장하도록 합니다. 보안팀에서 암호화 키에 대한 접근을 제어하는 ​키 정책을 생성하도록 합니다."], "answer": "B", "multi": false, "explanation": "진정한 역할 분리를 달성하려면, 회사는 S3 접근만으로는 평문 데이터를 읽을 수 없는 설계를 필요로 합니다. 고객 관리 KMS 키가 적용된 SSE-KMS는 이러한 분리를 제공합니다. 왜냐하면 객체 읽기 성공을 위해서는 다음 두 가지가 모두 필요하기 때문입니다: (1) 객체를 읽을 수 있는 S3 권한, 그리고 (2) KMS 키를 사용하여 객체를 복호화할 수 있는 권한. 이를 통해 운영팀은 버킷 및 객체 권한을 관리할 수 있으며, 보안팀은 KMS 키 정책(및 권한)을 통해 키 사용을 독립적으로 제어할 수 있습니다. 어느 한 팀이 자신의 부분만 잘못 구성하더라도 데이터는 여전히 보호됩니다: 권한이 지나치게 개방된 버킷 정책만으로는 KMS 복호화가 허용되지 않는 한 평문이 노출되지 않으며, 마찬가지로 KMS 권한만으로는 S3 읽기 접근이 없으면 충분하지 않습니다."},
  {"id": 109, "text": "한 회사의 공개 웹사이트는 애플리케이션 로드 밸런서(ALB), ALB 뒤에서 상태 비저장 애플리케이션을 실행하는 Amazon EC2 인스턴스 세트, 그리고 애플리케이션이 데이터를 읽어오는 Amazon DynamoDB 테이블로 구성됩니다. 이 회사는 악의적인 스캐닝 및 DDoS 공격에 대해 우려하고 있습니다. 따라서 각 클라이언트 IP 주소가 5분 동안 최대 3번까지만 데이터를 읽을 수 있도록 제한을 두려고 합니다. 어떤 해결책이 가장 적은 노력으로 이 요구 사항을 충족할까요?", "choices": ["ALB 앞에 AWS WAF를 설정합니다. 각 IP 주소에 대해 5분 동안 3건을 초과하는 요청을 차단하는 규칙을 생성합니다.", "Amazon CloudWatch 요청을 기반으로 AWS Lambda 함수를 생성합니다. Lambda 함수가 5분 간격으로 각 IP 주소에 대한 요청 수를 계산하고, 요청 수가 3을 초과하면 알림을 제공하도록 구성합니다.", "EC2 애플리케이션을 수정하여 요청의 소스 IP 주소를 계산하고 5분 단위로 누적 합계를 계산합니다. 누적 합계가 3보다 크면 오류 메시지를 반환합니다.", "소스 IP 주소와 요청 시간을 DynamoDB 테이블에 추가합니다. 요청 시간을 기준으로 5분 TTL 설정을 추가합니다. DynamoDB 테이블 처리량의 읽기 용량을 3으로 변경합니다."], "answer": "A", "multi": false, "explanation": "이는 클라이언트 IP와 시간 창에 연동된 전형적인 레이어 7 속도 제한 요구 사항이며, AWS WAF는 속도 기반 규칙으로 이를 기본적으로 제공합니다. ALB 앞에 AWS WAF를 배치하면 회사는 소스 IP별로 요청을 롤링 윈도우 동안 계산하고, 임계값을 초과하면 조치(구성에 따라 차단, CAPTCHA/챌린지 또는 카운트)를 취할 수 있습니다. 이 접근 방식은 요청이 EC2나 DynamoDB 용량을 소모하기 전에 스캔 및 애플리케이션 계층 요청 폭주를 조기에 완화하며, 최소한의 사용자 정의 코드나 운영 작업만 필요합니다."},
  {"id": 110, "text": "보안 엔지니어는 VPC에서 실행되는 공개 웹 애플리케이션을 보호해야 합니다. 해당 VPC는 ​Amazon CloudFront 배포의 오리진 서버를 호스팅합니다. 이 애플리케이션은 여러 차례 레이어 7 DDoS 공격을 경험했습니다. AWS WAF 웹 ACL이 CloudFront 배포와 연결되어 있으며, 웹 ACL에는 평판이 좋지 않은 것으로 알려진 IP 주소를 차단하는 AWS 관리형 규칙이 하나 포함되어 있습니다. 보안 엔지니어는 수동 작업 없이 실시간으로 레이어 7 DDoS 공격을 탐지하고 완화하는 자동화 솔루션을 구성해야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["CloudFront 배포에서 AWS Shield Advanced를 활성화합니다. Amazon CloudWatch에서 DDoS 표시기에 대한 알림을 구성합니다.", "AWS Shield Advanced를 활성화하고 AWS DDoS 대응팀(DRT)과의 사전 예방적 상호 작용을 구성합니다.", "VPC에 AWS 네트워크 방화벽을 배포합니다. DDoS 공격 징후를 감지하는 보안 정책을 생성합니다. 공격 발생 시 웹 ACL 규칙을 자동으로 업데이트하는 AWS Lambda 함수를 생성합니다.", "웹 ACL에 속도 기반 규칙을 추가합니다. AWS Shield Advanced를 활성화합니다. CloudFront 배포에서 애플리케이션 계층 DDoS 공격 완화를 자동으로 활성화합니다."], "answer": "D", "multi": false, "explanation": "옵션 D가 올바른 해결책인 이유는 수동 개입 없이 애플리케이션 계층(Layer 7) DDoS 공격을 완전히 자동화된 실시간으로 감지하고 완화하기 때문입니다. AWS Shield Advanced는 Amazon CloudFront 배포와 같은 지원되는 리소스에 대해 활성화되면 자동 애플리케이션 계층 DDoS 완화를 포함합니다. 이 기능은 트래픽 패턴을 지속적으로 모니터링하며, 공격이 감지되면 악성 요청을 완화하기 위해 자동으로 AWS WAF 규칙을 배포합니다. AWS WAF 웹 ACL에 비율 기반 규칙을 추가하면 정의된 요청 임계값을 초과하는 IP 주소를 자동으로 차단하여 계층 7 DDoS 공격의 일반적인 특성을 막아 보호를 강화합니다. 이러한 조합은 웹 애플리케이션을 대량 트래픽 및 애플리케이션 계층 위협으로부터 보호하기 위한 AWS 모범 사례와 직접적으로 일치합니다."},
  {"id": 111, "text": "한 회사가 EU-West-1 리전에서 애플리케이션을 운영하고 있습니다. 이 애플리케이션은 AWS Key Management Service(AWS KMS) 고객 관리형 키를 사용하여 민감한 데이터를 암호화합니다. 이 회사는 애플리케이션을 EU-North-1 리전에 배포할 계획입니다. 보안 엔지니어는 새로운 리전에 배포될 애플리케이션을 위한 키 관리 솔루션을 구현해야 합니다. 이때 애플리케이션 코드 변경을 최소화해야 합니다. 보안 엔지니어는 이러한 요구 사항을 충족하기 위해 AWS KMS 구성에서 어떤 변경을 해야 할까요?", "choices": ["eu-west-1의 키 정책을 업데이트합니다. eu-north-1의 애플리케이션이 eu-west-1의 애플리케이션과 동일한 고객 관리 키를 사용하도록 지정합니다.", "해당 리전에 배포된 애플리케이션에서 사용할 새 고객 관리 키를 eu-north-1에 할당합니다.", "eu-north-1에 새 고객 관리 키를 할당합니다. 두 키에 동일한 별칭 이름을 생성합니다. 키 별칭을 사용하도록 애플리케이션 배포를 구성합니다.", "eu-north-1에 새 고객 관리 키를 할당합니다. eu--1에 대한 별칭을 생성합니다. 애플리케이션 코드가 eu--1에 대한 별칭을 가리키도록 변경합니다."], "answer": "C", "multi": false, "explanation": "AWS KMS 키는 지역 리소스이므로 여러 지역에서 사용할 수 없습니다. AWS 공인 보안 – 전문 문서에 따르면 여러 지역에 배포된 애플리케이션은 키 ID 대신 별칭으로 키를 참조하면서 지역별 고객 관리형 키를 사용해야 합니다. eu-north-1에서 새 고객 관리형 키를 생성하고 eu-west-1의 키와 동일한 별칭을 할당하면 애플리케이션 코드가 수정 없이 별칭을 계속 참조할 수 있습니다. 각 리전은 별칭을 올바른 로컬 키로 확인하여 암호화가 계속 올바르게 작동하도록 보장합니다. KMS 키는 지역 키이므로 옵션 A는 유효하지 않습니다. 옵션 B에는 애플리케이션 변경이 필요합니다. 옵션 D는 지원되지 않는 별칭 패턴을 도입합니다. AWS 모범 사례에서는 다중 리전 배포를 위한 별칭 기반 키 참조를 권장합니다."},
  {"id": 112, "text": "한 회사가 AWS Fargate를 사용하는 Amazon Elastic Container Service(Amazon ECS) 클러스터에서 컨테이너화된 애플리케이션을 실행하고 있습니다. 해당 애플리케이션은 여러 개의 ECS 서비스로 실행됩니다. ECS 서비스는 인터넷에 연결된 애플리케이션 로드 밸런서(ALB)의 개별 대상 그룹에 속합니다. ALB는 Amazon CloudFront 배포의 오리진 서버입니다. AWS WAF 웹 ACL이 CloudFront 배포와 연결되어 있습니다. 웹 클라이언트는 CloudFront 배포를 통해 ECS 서비스에 액세스합니다. 회사는 웹 클라이언트가 웹 ACL을 우회하여 ALB에 직접 액세스할 수 있다는 사실을 알게 되었습니다. 웹 클라이언트가 ALB에 직접 접근하는 것을 방지할 수 있는 해결책은 무엇입니까?", "choices": ["AWS PrivateLink 엔드포인트를 생성하고 이를 CloudFront 오리진으로 설정합니다.", "새 내부 ALB를 생성하고 인터넷 연결 ALB를 삭제합니다.", "ALB 리스너 규칙을 수정하여 CloudFront IP 범위만 허용합니다.", "CloudFront에 사용자 지정 X-Shared-Secret 헤더를 추가하고 ALB 리스너 규칙을 구성하여 헤더 값이 일치하는 경우에만 요청을 허용합니다."], "answer": "D", "multi": false, "explanation": "인터넷에 노출된 ALB를 CloudFront 오리진으로 사용할 때, 추가적인 접근 제어가 시행되지 않으면 여전히 직접 접근이 가능합니다. AWS Certified Security - Specialty 지침에 따르면, CloudFront IP 허용 목록만으로는 충분하지 않은데, 이는 CloudFront IP 범위가 변경될 수 있고 독점적이라고 보장할 수 없기 때문입니다. 권장되며 가장 안전한 방법은 CloudFront가 모든 오리진 요청 시 비밀 값이 포함된 사용자 지정 오리진 헤더(예: X-Shared-Secret)를 보내도록 설정하는 것입니다. 그런 다음 ALB 리스너 규칙을 헤더가 존재하고 예상 값과 일치할 때만 트래픽을 전달하도록 구성합니다. CloudFront를 우회하려는 요청은 이 헤더를 포함하지 않으므로 거부됩니다."},
  {"id": 113, "text": "한 회사가 타사 애플리케이션을 설치하여 여러 Amazon EC2 인스턴스와 온프레미스 서버에 배포했습니다. 이 회사의 IT 팀은 소프트웨어 유지 관리 작업을 수행하기 위해 SSH를 사용하여 각 시스템에 연결해야 하는 경우가 있습니다. 이러한 작업이 필요한 시간을 제외하고는 해당 시스템은 네트워크의 나머지 부분과 완전히 격리되어야 합니다. 이 회사는 SSH 키를 관리하고 싶지 않으며, SSH 연결이 있는 시간만큼만 비용을 지불하기를 원합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["머신에 연결하기 위해 포트 포워딩이 설정된 배스천 호스트를 생성합니다.", "임시 연결을 허용하도록 AWS Systems Manager 세션 관리자를 설정합니다.", "AWS CloudShell을 사용하여 서버리스 연결을 생성합니다.", "개인 연결을 위해 각 머신에 대한 인터페이스 VPC 엔드포인트를 설정합니다."], "answer": "B", "multi": false, "explanation": "AWS Systems Manager 세션 관리자는 인바운드 SSH 없이, 배스천 호스트 없이, SSH 키 관리 없이 관리형 인스턴스에 대한 대화형 셸 액세스를 제공합니다. 액세스는 IAM 정책을 통해 제어되며, 모든 세션은 감사 가능성을 위해 CloudWatch 로그/S3에 기록될 수 있습니다. 이는 'SSH 키 없음' 요구 사항을 직접적으로 충족하며, 포트 22를 닫아도 필요할 때 셸 액세스를 얻을 수 있으므로 네트워크 노출 범위를 줄여줍니다. 격리 요구 사항을 충족하기 위해 인스턴스를 인바운드 액세스가 없는 프라이빗 서브넷에 배치할 수 있으며, 필요할 때만 Systems Manager 연결(SSM 엔드포인트/에이전트를 통해)을 통해 관리 세션을 사용할 수 있습니다. 온프레미스 서버도 관리형 인스턴스로 등록(하이브리드 활성화)하면 Systems Manager로 관리할 수 있어, EC2와 온프레미스 환경 모두에서 동일한 SSH 키 없는 운영 모델을 적용할 수 있습니다."},
  {"id": 114, "text": "한 기업이 온프레미스 데이터 센터에서 핵심 워크로드를 운영하고 있습니다. 이 기업은 1시간 미만의 RTO(복구 목표 시간)를 달성할 수 있는 AWS 기반 재해 복구(DR) 솔루션을 구현하고자 합니다. 물리적 및 가상 서버를 지속적으로 복제해야 하며, 데이터 저장 및 대역폭 사용 비용을 최적화해야 합니다. 또한, DR 솔루션은 자동화되어야 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Backup을 사용하여 온프레미스 서버를 AWS로 직접 복제합니다. 리전 간 백업 복사 및 데이터 볼팅을 활성화합니다. 정의된 RTO에 맞춰 복구 지점을 구성합니다. AWS Step Functions를 사용하여 복구 단계를 자동화합니다.", "AWS Storage Gateway Volume Gateway를 구성하여 Amazon Elastic Block Store(Amazon EBS) 스냅샷을 복구에 사용하도록 합니다. AWS Backup을 구성하여 스냅샷을 관리합니다. 자동화된 복구 절차를 생성합니다.", "AWS 탄력적 재해 복구를 활성화합니다. 각 온프레미스 서버를 지속적으로 복제하도록 복제 에이전트를 구성합니다. 기본 스테이징 영역 서브넷 구성을 활성화합니다.", "온프레미스 데이터 센터와 AWS 간에 AWS Direct Connect 연결을 생성합니다. 장애를 모니터링하고 장애 발생 시 AMI에서 사전 구성된 Amazon EC2 인스턴스를 시작하는 AWS Lambda 함수를 호출하도록 Amazon EventBridge를 구성합니다."], "answer": "C", "multi": false, "explanation": "AWS Elastic Disaster Recovery(AWS DRS)은 낮은 RTO/RPO로 물리적 및 가상 서버를 AWS로 지속적으로 복제하도록 목적에 맞게 설계되었습니다. 경량 복제 에이전트를 사용하여 블록 수준의 변경 사항을 AWS의 저비용 스테이징 영역으로 스트리밍함으로써 스토리지 비용을 최적화(스테이징 리소스만 지속적으로 실행)하고 효율적인 복제 메커니즘을 통해 대역폭 사용을 줄입니다. 재해 또는 테스트 시 AWS DRS는 정의된 청사진(인스턴스 유형, 네트워킹, 보안 그룹)에 따라 AWS에서 자동으로 복구 인스턴스를 시작할 수 있어, 일반적으로 한 시간 미만의 RTO 목표를 충족하는 빠른 장애 조치 워크플로우를 가능하게 합니다."},
  {"id": 115, "text": "한 회사가 아마존 EC2 인스턴스 플릿에서 애플리케이션을 실행합니다. 이 회사는 애플리케이션에 아무런 위험 없이 플릿에서 인스턴스를 제거할 수 있습니다. 모든 EC2 인스턴스는 ProdFleet이라는 동일한 보안 그룹을 사용합니다. 회사 AWS 계정에서 Amazon GuardDuty와 AWS Config가 활성화되어 있습니다. 보안 엔지니어는 GuardDuty에서 암호화폐 탐지 이벤트가 발생할 경우 EC2 인스턴스가 외부 트래픽을 전송하지 못하도록 하는 솔루션을 제공해야 합니다. 보안 엔지니어는 외부 트래픽 규칙이 없는 Isolate라는 새로운 보안 그룹을 생성합니다. 그런 다음 AWS Lambda 함수를 구성하여 EC2 인스턴스를 ProdFleet 보안 그룹에서 제거하고 Isolate 보안 그룹에 추가합니다 . 이 요구사항을 충족하는 추가 조치는 무엇입니까?", "choices": ["GuardDuty가 CryptoCurrency:EC2/* 발견 이벤트를 생성할 경우 Lambda 함수를 직접 호출하도록 GuardDuty를 구성합니다.", "EC2 인스턴스에 대해 CryptoCurrency:EC2/* 구성 변경 이벤트가 발생하면 Lambda 함수를 호출하는 AWS Config 규칙을 구성합니다.", "GuardDuty에서 CryptoCurrency:EC2/* 찾기 이벤트가 생성되면 Lambda 함수를 호출하는 Amazon EventBridge 규칙을 구성합니다.", "AWS Config가 EC2 인스턴스에 대한 CryptoCurrency:EC2/* 구성 변경 이벤트를 감지하면 Lambda 함수를 호출하는 Amazon EventBridge 규칙을 구성합니다."], "answer": "C", "multi": false, "explanation": "Amazon GuardDuty는 의심스럽거나 악의적인 활동을 감지할 때 보안 결과를 생성합니다. 여기에는 EC2 인스턴스가 무단 암호화폐 채굴에 연루되었을 수 있음을 나타내는 CryptoCurrency:EC2/* 결과가 포함됩니다. AWS 공인 보안 - 전문 문서에 따르면, GuardDuty 결과는 이벤트로 Amazon EventBridge(이전의 Amazon CloudWatch Events)에 게시됩니다. Amazon EventBridge는 자동화된 사고 대응 워크플로를 구축하는 데 권장되는 서비스입니다. CryptoCurrency:EC2/* 유형의 GuardDuty 결과를 수신하도록 EventBridge 규칙을 생성하면, 보안 엔지니어는 Lambda 함수를 자동으로 호출하여 보안 그룹 연결을 수정함으로써 영향을 받은 EC2 인스턴스를 격리할 수 있습니다."},
  {"id": 116, "text": "한 회사가 인프라 및 애플리케이션 코드를 AWS 외부의 웹 기반 타사 Git 호환 코드 저장소에 저장하고 있습니다. 이 회사는 OpenID Connect(OIDC)를 사용하여 해당 코드 저장소가 회사 AWS 계정 내의 기존 IAM 역할을 안전하게 인증하고 수임할 수 있도록 하고자 합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["AWS Identity and Access Management(IAM) 페더레이션을 사용하여 OIDC ID 공급자(IdP)를 생성합니다. 코드 리포지토리가 IAM 역할을 수임할 수 있도록 IAM 역할의 신뢰 정책을 수정합니다.", "AWS Identity and Access Management(IAM) Roles Anywhere를 사용하여 OIDC를 사용하는 트러스트 앵커를 생성합니다. 코드 리포지토리가 IAM 역할을 수임할 수 있도록 IAM 역할의 트러스트 정책을 수정합니다.", "AWS IAM Identity Center 계정 인스턴스를 설정합니다. 고객 관리형 OIDC 애플리케이션으로 코드 리포지토리에 대한 액세스를 구성합니다. 애플리케이션에 IAM 역할에 대한 액세스 권한을 부여합니다.", "AWS Resource Access Manager(AWS RAM)를 사용하여 OIDC를 사용하는 새 리소스 공유를 생성합니다. 리소스 공유의 접근 권한을 지정된 코드 리포지토리로 제한합니다. IAM 역할에 리소스 공유에 대한 접근 권한을 부여합니다."], "answer": "A", "multi": false, "explanation": "AWS IAM은 OpenID Connect(OIDC)를 사용하는 외부 자격 증명 공급자가 IAM 역할을 인증하고 맡을 수 있도록 허용하여 자격 증명 연동을 지원합니다. AWS 공인 보안 - 전문 문서에 따르면 IAM OIDC 자격 증명 공급자는 외부 CI/CD 파이프라인 또는 Git 기반 리포지토리와 같은 타사 시스템이 장기 액세스 키를 사용하지 않고도 임시 AWS 자격 증명을 안전하게 얻을 수 있도록 하는 데 권장되는 접근 방식입니다. IAM에서 OIDC 자격 증명 공급자를 생성하고 외부 IdP를 신뢰하도록 IAM 역할 신뢰 정책을 구성함으로써 회사는 안전한 토큰 기반 인증을 활성화합니다. 신뢰 정책에는 역할을 맡을 수 있는 리포지토리, 분기 또는 워크플로를 제한하여 최소 권한을 적용하는 조건이 포함될 수 있습니다. AWS 보안 전문 분야 지침에서는 이 방법이 정적 자격 증명을 제거하고 OIDC 공급자가 발행한 단기 토큰을 사용한다는 점을 강조합니다. IAM Roles Anywhere는 OIDC가 아닌 X.509 인증서를 사용하는 AWS 외부에서 실행되는 워크로드용으로 설계되었기 때문에 옵션 B는 올바르지 않습니다. 옵션 C는 기계 간 인증이 아닌 직원 ID 연합을 위한 것입니다. AWS RAM은 자격 증명 연동 또는 인증 기능을 제공하지 않기 때문에 옵션 D는 유효하지 않습니다. 이 솔루션은 외부 워크로드에 대한 안전하고 확장 가능하며 오버헤드가 낮은 인증을 위한 AWS 모범 사례에 부합합니다."},
  {"id": 117, "text": "보안 엔지니어는 탄력적 IP 주소를 사용하는 네트워크 로드 밸런서(NLB)에 대한 DDoS 공격 방지 설정을 구성해야 합니다. 이 엔지니어는 NLB를 보호하기 위해 속도 기반 규칙문을 사용하는 AWS WAF 웹 ACL을 설정하려고 합니다. 보안 엔지니어는 정상적인 트래픽을 차단하지 않는 속도 제한을 설정해야 합니다. 보안 엔지니어는 소스 IP 주소를 기준으로 집계하도록 규칙 문을 구성했습니다. 보안 엔지니어는 NLB를 보호하기 위해 규칙을 어떻게 구성해야 할까요?", "choices": ["카운트 작업을 사용하도록 규칙을 구성합니다.", "차단 작업을 사용하도록 규칙을 구성합니다.", "모니터 작업을 사용하도록 규칙을 구성합니다.", "허용 작업을 사용하도록 규칙을 구성합니다."], "answer": "A", "multi": false, "explanation": "AWS WAF 비율 기반 규칙은 롤링 시간 동안 개별 소스 IP 주소의 요청 수를 추적하여 트래픽 플러드 및 애플리케이션 계층 DDoS 공격으로부터 애플리케이션과 리소스를 보호하도록 설계되었습니다. AWS 공인 보안 - 전문 분야 공식 학습 가이드 및 AWS WAF 문서에 따르면 비율 기반 규칙은 개수, 차단 및 허용을 포함한 다양한 작업으로 구성될 수 있습니다. 보안 엔지니어가 합법적인 트래픽을 차단하지 않는 적절한 속도 제한을 결정할 때 AWS 모범 사례에서는 초기에 Count 작업을 사용하여 속도 기반 규칙을 구성할 것을 권장합니다. Count 작업을 통해 AWS WAF는 지정된 비율 임계값을 초과하는 요청을 적극적으로 차단하지 않고 모니터링하고 기록할 수 있습니다. 이를 통해 트래픽 패턴에 대한 가시성을 제공하고 보안 엔지니어가 프로덕션에서 규칙이 어떻게 작동하는지 분석할 수 있습니다. 보안 엔지니어는 Count 작업을 사용하여 합법적인 사용자가 선택한 비율 제한의 영향을 받는지 여부를 안전하게 평가할 수 있습니다. 엔지니어가 임계값이 정상적인 트래픽과 악의적인 동작을 정확하게 구별한다고 확신하면 나중에 해당 작업을 차단으로 변경할 수 있습니다."},
  {"id": 118, "text": "보안 엔지니어는 AWS 계정에 대한 보안 감사를 준비해야 합니다.", "choices": ["AWS 아티팩트 보고서", "AWS Audit Manager 제어 기능", "AWS Config 적합성 팩", "AWS Config 규칙", "Amazon Detective 조사", "AWS Identity and Access Management 액세스 분석기 내부 액세스 분석기"], "answer": "A,B,F", "multi": true, "explanation": "AWS Audit Manager controls — CloudTrail, Config, Security Hub에서 감사 평가용 증거를 자동 수집합니다. IAM Access Analyzer internal access analyzers — 계정 내 IAM 주체가 특정 리소스에 접근할 수 있는지 식별합니다. AWS Artifact reports — AWS 보안·규정 준수 문서를 온디맨드로 제공합니다."},
  {"id": 119, "text": "회사의 웹 애플리케이션은 Auto Scaling 그룹의 Application Load Balancer(ALB) 뒤에서 실행되는 Amazon EC2 인스턴스에 호스팅됩니다. AWS WAF 웹 ACL이 해당 ALB와 연결되어 있습니다. AWS CloudTrail이 활성화되어 있으며 로그는 Amazon S3 및 Amazon CloudWatch Logs에 저장됩니다. 운영팀은 일부 EC2 인스턴스가 무작위로 재부팅되는 현상을 관찰했습니다. 재부팅 후 해당 인스턴스의 모든 액세스 로그가 삭제되었습니다. 조사 결과, 각 재부팅은 new-user- creation.php 파일에서 PHP 오류가 발생한 직후에 일어나는 것으로 확인되었습니다. 운영팀은 회사가 공격을 받고 있는지 여부를 판단하기 위해 로그 정보를 확인해야 합니다. 향후 유사한 사례 발생 시 공격자의 IP 주소를 식별할 수 있는 일련의 조치는 무엇입니까?", "choices": ["ALB가 위치한 서브넷에서 VPC 흐름 로그를 구성하고 데이터를 CloudWatch로 스트리밍합니다. CloudWatch에서 new-user-creation.php 항목을 검색하세요.", "ALB에서 CloudWatch 에이전트를 구성하고 애플리케이션 로그를 CloudWatch Logs로 전송합니다.", "ALB를 구성하여 액세스 로그를 Amazon OpenSearch Service 클러스터로 내보내고 new- user-creation.php 항목을 검색합니다.", "웹 ACL을 구성하여 로그를 Amazon Data Firehose로 전송하고, Amazon Data Firehose는 로그를 S3 버킷에 저장합니다. Amazon Athena를 사용하여 로그를 쿼리하고 new-user- creation.php 항목을 찾습니다."], "answer": "D", "multi": false, "explanation": "AWS WAF 로그는 소스 IP 주소, 요청 URI, 헤더 및 규칙 평가 결과를 포함한 상세한 요청 수준 정보를 캡처합니다. AWS 인증 보안 전문(AWS Certified Security - Specialty) 문서에 따르면, AWS WAF 로깅은 애플리케이션 수준 공격이 의심될 때 중요한 탐지 수단이며, 특히 호스트 기반 로그가 신뢰할 수 없거나 공격자에 의해 삭제될 수 있는 경우에 중요합니다. AWS WAF 웹 ACL을 구성하여 로그를 Amazon Data Firehose로 전송하도록 설정함으로써, 회사는 모든 향후 요청이 중앙에서 캡처되고 Amazon S3와 같은 내구성 있는 저장 서비스로 전달되도록 보장합니다. Amazon Athena를 사용하여 보안 팀은 이러한 로그를 쿼리하여 new-user-creation.php와 같은 특정 애플리케이션 경로를 대상으로 하는 요청을 식별하고, 해당 요청의 원본 클라이언트 IP 주소를 추출할 수 있습니다."},
  {"id": 120, "text": "한 회사가 Auto Scaling 그룹의 Amazon EC2 인스턴스 플릿에서 웹 애플리케이션을 운영하고 있습니다. Amazon GuardDuty와 AWS Security Hub가 활성화되어 있습니다. 보안 엔지니어는 AWS 모범 사례를 준수하고 애플리케이션 중단을 최소화하는 비정상적인 트래픽에 대한 자동화된 대응책이 필요합니다. 어떤 솔루션이 이러한 요구 사항을 충족할까요?", "choices": ["EventBridge를 사용하여 인스턴스 프로필 액세스 키를 비활성화합니다.", "EventBridge를 사용하여 영향을 받는 인스턴스를 Auto Scaling 그룹에서 제거하고 제한된 보안 그룹으로 격리하는 Lambda 함수를 호출합니다.", "보안 허브를 사용하여 서브넷 네트워크 ACL을 업데이트하여 트래픽을 차단합니다.", "GuardDuty 결과를 Amazon SNS로 전송하여 이메일 알림을 받도록 합니다."], "answer": "B", "multi": false, "explanation": "AWS 사고 대응 모범 사례에서는 손상된 리소스를 즉시 종료하기보다는 격리하는 것을 강조합니다. AWS 공인 보안 – 전문 문서에 따르면 Auto Scaling 그룹에서 인스턴스를 제거하면 교체 루프가 방지되는 반면, 제한적인 보안 그룹을 적용하면 포렌식 분석을 위해 인스턴스가 격리됩니다. Amazon EventBridge를 사용하여 AWS Lambda 함수를 트리거하면 GuardDuty 결과에 대해 자동화되고 일관된 대응이 가능해집니다. 이 접근 방식은 영향을 받는 인스턴스가 격리되는 동안 정상 인스턴스가 계속해서 트래픽을 제공하므로 애플리케이션 중단을 최소화합니다. 자격 증명을 비활성화하거나 네트워크 ACL을 수정하면 관련 없는 워크로드에 더 광범위한 영향을 미칠 수 있습니다. SNS 알림만으로는 응답 자동화가 제공되지 않습니다. AWS에서는 EC2 사고 대응을 위해 패턴을 격리하고 조사할 것을 권장합니다."},
